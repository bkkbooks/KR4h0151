body:
  text: 卷十二預宴七十七人詩八十七首吏部員外郎蘇凌阿年六十九恩光照大地四屆靡不周微草坼春榮豈復分遐陬紛紛被渥澤計日呈森修茁作向陽花徒懷中所酬臣從萬里回先聽長途謳謳者何所道道樂春臺遊吾民忘帝力但見恩澤稠逺者鼓舞同況在依皇州羲軒有超軼夔契亦比侔欣逢萬年會長荷百祿遒臣慚材策蹇敢云齒扶鳩仰戴天地恩何以答皇庥吏部員外郎劉世寧年六十驄馬符魚綰印銅榮叨中外寵光隆清班欣復來天上勝宴無須數洛中效職冬官慚省日荷恩南海竊觀風葵傾藿向知何自惟近朝陽愜寸衷户部員外郎書明阿年六十三百年三萬日並生天地宇里人驚異瑞遂至一百五生逢堯舜仁豈敢懷其私大千在掌握吏民舉熙熙九門插天開人與佳節會圭璋滿清班拜呼歡萬嵗樂事相繼武再見明光宫共享無邊春一笑開天容集蘇軾詩句户部員外郎馬昌言年六十七聽鼓趨朝玉漏永夀星午夜明於丙九重錫宴夀筵開藹藹和風煦韶景醍醐浹髓春陽早沃若渾忘節候冷微臣竊祿司版曹華髮初驚颯垂領饌珍幸飽仙厨賜紀恩歸向尚書省恪恭朝夕何敢忘敬事寧徒奉朝請户部員外郎雙全年六十四鳳闕朝暉麗珍筵出御厨觴傳千叟宴福自一人敷瑞洽榮階草祥占出洛圖升平何以報擊壤頌堯衢一春殿齊嵩拜鴻恩遍庶黎年因增馬齒詔許會龍墀日色浮仙掌霞觥介夀眉樗材非矍鑠榮沐露華滋二户部員外郎張烈年七十疊貺駢祥巽命申廣筵嘉會接重茵人來北闕都周甲曜集南弧盡拱辰國語昔叨分蕊榜臣由翻譯進士出身中書久愧近楓宸臣以中書纍遷戶曹農曹七十桑榆晚翔舞韶春景色新戶部員外郎髙謙年七十三令節回春斗柄中天日麗寅階四海歡騰有慶萬年福被無涯錫宴隆恩露渥齊班淑氣晴佳臣職度支祝聖持籌比鶴安排戶部員外郎興奎年六十六撫宇矩祖武簫韶昭陶堯羽部旅虎序瑶膏叨喬僚暑雨敘五土招搖標髙霄鼓舞譜舉戶操毫調交謡疊韻體户部員外郎牟尼珠年六十一憲乞昭殊典煌哉詔特宣紀元符大衍法祖敞華筵紫禁冠裳肅彤墀拜舞虔鏘鏘分皓首濟濟萃華顛五世曾元慶千齡福祉駢鴻慈覃葛藟麟趾衍瓜綿既醉歡朝右來同洽海壖升平多樂事長願播虞絃禮部員外郎諾敏年六十一養老儀隆上下庠容臺叨幸習為郎不圖親受天家賜皓首同昭日月光一威儀禮樂記三千夀世耆英數恰全為報寰中人億兆年年自此慶恩延二禮部員外郎瑺英年六十一筮吉春和始承恩萬國同上庠恢數典右個合呼嵩列序欣齊齒微班逮末躬從兹后倉禮更補曲臺中兵部員外郎福量年六十四春城曉色集祥雲雲外鈞天舞鶴羣羣到大羅天上望望中辰極煥星文一文墀交彩映瑶臺臺是登春獻夀杯杯裏光浮分寶露露華濃處即蓬萊二萊北臺南小雅陳陳詩祝聖宴中人人人都道何曾老老酌天漿又轉春三體蟬聨兵部員外郎博明年六十五職司掌庾效持籌臣現任倉監督自愧涓埃未得酬屢慶豐年頌多稼更陪廣宴飫羣羞上尊醇勝仙家醖百品珍逾羅氏鳩湛露恩深還憶昔簪豪曾到鳳池頭刑部員外郎五德年六十一郎官清秩忝曹司曾沐恩綸侍赤墀湛露無私沾渥澤需雲有慶洽昌期濫竽粉署慚官守鏘佩瑶階荷聖慈天際和風迎綺席座中春釀溢瓊卮鶴鳴正值三霄迥虎拜惟陳百福宜白髮蒼顔襄懋典絳帷黃幄景天儀生逢夀宇年華茂人到春臺嵗月熙此日笙鏞同樂愷耆英盛事話蓬池刑部員外郎明祿年六十三聨步趨紫垣侍宴承丹陛兼珍出大官九醖斟芳醴蒲桃玉碗盛琥珀雲罍洗龍文懸精鏐卍字疊宫綺受賜寵云渥飲和心孔喜微賤荷聖情無疆增帝祉刑部員外郎謝垣年六十八緹室開春序彤墀啓法筵恭從白雲署來拜紫微天治仰咸中慶仁由弼教宣養恬熙宇洽寬大巽風傳在宥欽洪幬無疆祝大千稱觥羅耉彥注籙盡羣仙益夀瓊卮捧承恩鶴髮聨晞陽慙小草聖日照長懸刑部員外郎觀音保年六十三南極一星髙春臺淑氣調也教青瑣吏同獻白雲謡清切曾何補殊恩竟共邀天厨珍飽飫羣羡主恩饒工部員外郎芳太年八十一古稀天子治化淳丕繩祖武耆筵陳引年尚齒三千紀薄海內外皆來賔嵗惟旃蒙月初吉青陽麗景開良辰五色慶雲殿廷集金花綵勝相鮮新微臣忝𨽻冬官屬犬馬齒巳逾八旬備員國史簪筆直隆儀巨典昭丹綸聽聞記載必徵實況復躬親遭際歌皇仁禹糧堯韭仙饌列紅螺之酌清而醇祝哽祝噎蒙賜杖牟尼文綺交紛綸式燕禮成叨異數純禧介祉宜駢臻感恩莫效涓埃報大書盛事垂千春工部員外郎韋陀保年六十六蘭署追隨預選蓂階福澤同臻六律仙韶雅奏百花寶醖芳醇匝地需雲廣被自天巽命重申承恩四十六載臣食俸四十六年長歌億萬千春理藩院員外郎八十九年六十四曾效軍胥佐佽飛洗兵飲至慶來歸凱歌萬里敷文命夀宇千年被德暉皓首長筵擎翠斚青陽左介覲龍旗九重春澤重重渥豈獨歡陳湛露晞理藩院員外郎伏魔保年六十四國隆巨典臣戴鴻恩各署榮齒合徵夀元維兹夀元非臣所有我皇握之栽培既久普天蒙福亦豈近臣惟附庥光遂及臣身臣欣臣年臣慶臣福臣福孔長長申華祝理藩院員外郎色騰額年六十一斗杓指攝提春氣先蓬島獻吉詹六辰作朋衍三老維皇御鴻鈞陶鑄同天造夀宇拓臺萊嘉宴聨魚藻元覆遍黃垠神施答蒼昊自今萬八千永契成鳩道理藩院員外郎阿林年七十六縻祿天朝嵗月賖更承渥澤拜恩嘉華封稠疊稱三祝薄海歡愈共一家宴接龍光欣有慶筵開鴛序靜無譁彤廷束帶身長健玉陛彯纓鬢未華閶闔開時承旭日蓬壺深處賜流霞共欽錫福兼中外萬里同聲盛事誇理藩院員外郎佛存年六十一養老天心篤筵開六合春共球超古盛福祿與時新皓髮排鵷序龎眉及雁臣歡聲騰紫籞四大仰皇仁理藩院員外郎哈拉爾岱年六十七洋洋大瀛東一一籌添屋菶菶朝陽岡翽翽鳴文鷟蔚為聖人瑞一堂備五福敷錫及臣庶恬養大鈞育因之耆耉多醇化所霑沐筵開華髮集春酌仙醪馥熙朝有九有臣職在典屬跨漢尉候區踰周要荒服內外札薩克久為我臣僕歸順蒙古全興屯回部熟暹羅及交趾琉球嵗貢肅請看高句麗陪臣稱觥伏理藩院員外郎諾木渾年七十三皇仁宣鬯迓祥庥綺宴春溫瑞露浮斗指南車爭獻雉人趨北闕快攜鳩曈曨日影開千户淡沱風光拂九斿飽飫嘉珍歌既醉太和翔洽遍神州提督衙門員外郎蘇爾德年七十八皇仁摩浹民在宥薰琴解愠韶蕭奏朝盈黃髮野鮐鯢同到春臺飲醇酎蒸成夀宇樂長生算綜京垓奉聖夀至當百順推福基大福由來大德佑玉牒綿瓜孫抱孫古稀天子凝祺懋九光芝彩啓絢爛文明曜拱南弧宿華髮春生露溢斚仙筵風藹煙攜袖微臣奉職𨽻金吾再造深恩赤心鏤馳驅粵嶠愧駑駘雨露依然到蒲栁盛遇欣占春共長鴻仁允被天同覆內務府員外郎舒明阿年六十五奕奕丙丁躔祥暉朗穹宇三階如衡平五曜同珠聚老人星見世太和黃髮鮐背盡是聖人之所豫需雲起泰交新頤以養鼎有陳大年肇周甲拱闕三千人算積萬年長合為一人夀豈第大椿之嵗八千為秋八千春甘醴盈堂前瑞萐生厨右階蓂六葉應春風歸昌協調開太蔟小臣拜手祝繁祺天錫純嘏德彌厚內務府員外郎花尚阿年六十五玉琯開韶律彤廷闢玳筵簪裾來橘叟衢壤祝松年備福疇逢九徴祥數倍千尚衣班秩忝管庫職司専恩許微臣逮春逢化宇宣五雲光近處人羡地行仙內務府員外郎福泰年八十四彩筆臺郎紀弧南瑞緯舒重熙恩洽再千叟數盈初軍伍櫜弓日儀曹竊祿餘覲光欣咫尺供職愧迂疏陪禮隨雕輦聨行侍玉除盛時追合雒夀宇藹華胥鶴髮寰瀛遍鮐顔楯陛臚香醪濡劍佩文綺萃簪裾拜手陳三祝揚言頌九如萬年歌帝德春慶滿車書內務府員外郎廷標年六十八大地陽和遍殊恩錫九重耆筵羅賜杖仙饌集華鐘列坐尊罍簇分行錦綺從熙春人矍鑠接晝禮雍容內府司儀久元辰令典逢在廷欣醉飽曼羡祝如松內務府員外郎老格年六十六鴻圖積祜闓澤舒祥聖人至德五代一堂序符大衍耆筵再張以示慈惠濟濟翔翔耄耋肄禮稽首拜揚堯羮舜酒近天子光帝錫難老則篤其慶齒爵居上手賜之觴酬酢殿陛藹如春陽臣叨末座愧附仙郎年逾甲子幸浥天漿于胥樂兮萬夀無疆內務府員外郎舒霖年六十五禁署承恩嵗月深輝騰建木拱瑶林三千鵷序娛康爵春滿人間化育心一紫芝白鹿紀祥多何似虞廷喜起歌慶溢華筵韶樂作敢同儀舞鬯陽和二內務府員外郎四達子年六十二青雲干吕海無波秩秩耆筵釀太和儀肅千官隨列仗詔從三殿集鳴珂仙厨捧膳兼珍溢御幄當軒瑞藹多白髮承恩歡既醉皇家渥澤被衢歌內務府員外郎福泰年六十九春啓璇璣得序輝生蓂莢敷榮聖恩廣推茀祿嘉宴溥逮耆英羡錫三靈協鬯圖披九服駢禎白髮郎官忝職彤廷盛典載賡內務府員外郎邴先蘭年六十一龍樓鳳闕仰垂裳景慶輝連日月長犀斚千班羅鶴髮鴻臚九􅉔肅鵷行淳龎允自天衷錫典禮欽依祖德將澤被瀛濛超禹甸道髙爻象邁羲皇淵澄嶽竦聨諸福鰈泳鶼飛會百祥中外鳬趨依秩宴萬年春酒頌無疆內務府員外郎萬保住年六十五巍峩帝德髙三五天廓鴻圖錫禔祜在朝耆耋奉徽猷遍野鮐黎樂農圃祥風所扇仁恩齊惠日初妍禮筵舉饗老儀開周八極引年典重超千古珍饌華簪賜禁闈小臣欣幸沐恩輝無疆聖夀如天夀南極星明映紫微內務府員外郎福申年六十五埏絃合作一家春耆宴從容拜紫宸同酌醇和申頌祝萬年琪樹日華新一珠殿崇嚴慶躍龍玉筵松桷職虔供巍巍聖德承光烈夀宇康衢協穆雍二章縫拜賜慶初元乾隆元年臣奉生恩詔給廕監五紀今蒙飲上樽願祝億千添甲子露蕭長得奉堯恩三內務府員外郎承翰年六十二扶輿溢淳和濃化滋滲漉禁籞環玉泉淙籟鏘鳴築萬夀嵐光霏恆春仙卉馥臣忝備園官韶景奉宸矚小草依福庭瀛波慶長沐至尊念耉耆長筵均錫福頭白上林丞班聨綴鸞鵠西山黛色迎春酒映新緑泰交萃而亨嘉會溫且肅髙厚無以酬賡歌瞻旱麓內務府員外郎楊維新年六十八皇極肇建萬流仰鏡先天創物世篤其聖聖皇紹祚四嶽增峻開榮灑澤太儀斡運人永其夀伊思鎬飲應會皇都竭誠盡敬翩翩者鴻翼翼飛鸞龍翔景雲月竁來賔諤諤黃髮彪之以文天錫難老福祿來臻元化滂流皇乎備矣振纓承華鸞觴酌醴超商邁周軒轅承紀晞陽豐條對揚帝祉集文選句內務府員外郎通源年六十二曈曨春旭繞祥煙閶闔宏開列綺筵斂福共欽天錫嘏呼嵩遍列地行仙含香竊附諸曹後侍直常慚建禮前豐草欣承湛露渥耆年長此頌堯年內務府員外郎福喜年六十二玉粒照筐筥匏樽酌行潦蓬萊春晝永把酒慶夀考卷阿詩可繼國恩久未報內景含天燭扶杖起相從仰荷天地德嵗華來無窮里巷自嬉嬉百嵗仍稚幼仙山與佛國頗有此樂不集蘇軾句內務府員外郎王立柱年六十一守職慙方面承恩近聖顔斑螭開兩序銅獸覲雙鐶燕喜祥飄勝鼇欣抃擁山三千鸞鵠侣獻夀彩雲間內務府員外郎景善年七十二閶闔天門仰至尊無疆聖壽軼羲軒堂開五代天垂慶祝晉三多野頌恩鳳闕呈祥飛鸑鷟蓂階獻瑞馥蘭蓀俯欣小草依春日湛露霄邊捧玉樽原任員外郎圖彬年七十彩幡華勝春融暢親捧雲罍玉階上寶扇平開奏曉鐘罏煙結篆排天仗古稀天子沛恩綸賜宴松喬偓羡倫箕翼已看瓜瓞盛璣衡彌著若英新部僚承乏蒙恩廣氣燮泰鴻日華朗疏仡循蜚寶籙多鴻鈞樂育人安養五百昌期慶靄稠八千嵗月記春秋趨蹌華髮升平頌饜飫衢尊百祿遒原任員外郎富盛額年七十練時日敷洪禔春風六葉仙蓂齊重光禮樂懋典稽五色璚露溢寶甕太乙仙仗分青藜小臣昔佩兩尺鞬鞭梢逺指月竁西臣曾出科布多兵差一次萬里琛贄集八紘仁夀躋卿雲糾縵瞻天題更從金闕觚稜上遙指弧南麗璧奎原任員外郎福寧年六十二泰階藴真符篤祜契蒼昊聖日宣重光郁華被八表鬱蔥佳氣中臣職𨽻灑掃馬齒逾六旬華髮久如縞吾皇大式宴露蕭歌夀考鵷鷺集盈庭自顧猶小草春暉得均被煦嫗振衰稿仙釀挹金莖龍光拜黼藻宸恩賜洪延永錫定難老介福慶攸同扶桑旭方早壇五品天官巴金泰年八十五豢養沾恩久叨榮六十年宏開仁夀宇欣遇太平筵焜耀葵依日帡幪蟻測天祥暉徵璧合麗彩協珠聨載頌如川句爰歌湛露篇飲和兼食德話與子孫傳壇五品地官佟泰年七十二明禋備職凛維虔芻秣恩深五十年嵗慶神庥光燭地齡依聖澤賜從天雕菰預擬炊丹甑仙醖真同挹醴泉既醉歌成同抃舞青陽淑氣正暄妍廟五品太官圖俊年七十八郎署從容捧豆籩耆齡長此樂堯年銜叨五品班行肅齒序千官賜豫駢春到廣庭濡湛露頌傳清廟仰升煙歡呼己幸隨台耉奔走猶堪佐吉蠲洛社耆英輸繪畫鎬京宴醑軼詩篇古稀正集無疆慶祝嘏還期衍萬千廟五品太官石海年七十七朝班與宴千人列廟獻論資五品官禮樂光華耆耉逮總濡天澤上雲瑞一盈廷華髮慶春長嘉會重編册府光五十紀元年論萬不誇丹策翠蓂祥二廟五品太官額倫泰年七十二恭承嘉鬯肅奉豆籩雲棟松牖丕顯在天皇帝薦饗懓愾益虔通微合漠契序高圓祖德穆穆帝心乾乾春秋四孟嵗暮吉蠲粵五十年如一日焉帝夀敷錫羣彚陶甄九宇性遂八極齒延方春之吉聿暢綺筵嗣我神祖千叟駢聨珠囊璀璨寶鏡昭宣醉酒飽德歌雅頌篇廟五品太官瑚雅善年七十一典重襜帷效肅恭仰惟法祖慶熙重三千叟集嘉筵啓繼序神堯頌顯庸一五品階躋鬯瓚司焫蕭光裏煥華芝恭承錫類參耆席嘉樂恆邀百福宜二廟五品太官圖豐額年六十九駿奔恪守常職嘉會欣逮微躬辰仰衆星環拱詩歌萬福來同瞻天共慶春煦養老尤欽禮崇丹陛歡騰鶴髮三多祝並呼嵩廟五品太官蘇楞額年六十八南極珠輝曜西池玉琯呈羣瞻霓仗列歡聽鳳簫鳴扇影和風裊爐霏瑞靄清升恆歌聖主几杖逮耆臣肅拜逢殊典賡揚達下情恬熙春浩浩夀宇樂升平廟五品太官善福年六十三蓬萊嘉宴飫仙醽嵗首祥舒第六蓂慶啓金枝增玉牒光生瑶闕聚珠星東藩臣預三千數上舍人尊百五齡夀世貞符髙典䇿端由建極協清寧廟五品太官花良阿年六十一春開大衍期繩武集千叟祥颸調鈞樂湑露滋仙酒憶昔屬櫜鞬微勞邀寵厚逮今榆景延蹌濟駿奔走時方麗新杓恩許酌大斗願言詠洪圖無強頌悠久廟五品太官關林年六十廣宴三千叟重熙典倍崇華年沾湛露麗日宴春風集福鳩羅杖延韶鳳協筒億齡綿景祚敷錫萬方同內管領巴哈布年七十五大千人瑞普拜舞盡騰歡宴闢瑶池曙風回黍谷寒聨翩來杖履蹌濟列衣冠尊酒涵春盎宫花帶笑看鬢踈羣點雪恩重輒還丹七十齡猶壯長遊化日寬內管領九格年七十五懋典欽重舉華年喜共邀奉觴趨紫殿扶杖拜丹霄嘉會天開泰新祺斗轉杓微臣躬灑掃獻頌繼春椒內管領馬達塞年七十一春開玉律時際風條瑶階湛露瀼瀼濃濃耆筵懋舉慶積熙重覃敷聖澤粟盈帛豐葵帎慕闕許覲丹楓上自扉闥下逮士農東越霞海西逾太蒙同臻夀宇並協時雍內府朝夕近日光融馬齒逾七志勵靖共天顔咫尺拜舞華封內管領立柱年七十一長樂鐘聲到曉撞曈曨麗日煥雲窗班分拜跪依瑶席宴合醇醲啓玉缸齡已百餘增夀愷叟從千計驗敦龎乾坤一德貞元合邃古遭逢未有雙內管領福慧年六十八鎬飲撰良辰紳佩集瑶殿典邁膠庠隆恩泝垓埏遍綵簴鏗雅音珍庖送兼膳臚頌歌介祺歡積蓬瀛宴何幸管庫微榮光沐殊眷願言山嶽崇惟慶盤石奠內管領六格年六十七皇帝陛下聖久道乃化成大哉事事超萬古允惟敬天法祖勤政愛蒼生大鈞育萬物浹化被八垠蠲租免稅澤滲漉踰千百萬仁外還施仁惟仁者夀克夀世潤以甘雨煦以熙旭協氣布濩普四天下咸彌綸褘夫介祺錫羡綜萬八千嵗為一甲子三皇之世鴻如春詩之既醉備五福小臣敢頌聖德祝效華封陳內管領神保年六十七嵩祝宸祺曼羡海涵皇澤鴻溶五福備臚周雅百男慶溢姬宗占瑞星弧躔拱捧爵露醴春濃茂典叨榮嘉會載賡頌叶華封內管領寶善年六十二景運蘿圖集瑶階蓂莢新恩筵諏六日耆叟溢千人福喜綿瓜瓞祥看集鳳麟微臣逰化宇抃舞向楓宸內管領清海年六十二斗杓東指天下皆春光華復旦品物咸新祥舒泰運慶洽昌辰乃開綺筵乃徵蒲輪紫殿溫煦仙仗玢璘惟老有養數典懋陳教孝教讓食饗禮均未若聖代福聚禔臻一宴三千醇醴華茵精鏐文錦扶杖懷珍化日之麗昊天之仁殊恩異數廣錫臣民臣職廷內鳬藻叨臻拜手稽首歡舞蹲蹲內管領全著年六十一聖治臻熙洽耆筵沛澤新南弧方見丙東旭正賔寅篤慶徵綿瓞延洪紀大椿普天同夀愷敷錫頌皇仁內管領化麒年六十一耄耆聨席到蓬萊詔許臣民一體陪異數幸邀春酒遍由來大地是春臺一賫金賜杖承恩疊祝華呼嵩獻頌三鯢齒數千環鳳闕慶同薄海寵光覃二內管領鍾泰年六十聖德覃敷健法天春祺溥錫宴髙年九霄露渥霑仙酒五色雲霏繞御筵班輯鵷鸞儀自肅恩流蒲藻澤無偏惟應億載添籌算虔奉奎章麗日箋三等侍衛兼茶上總領德克精額年六十六彤扉曉闢春風和羣叟序進陳賡歌翠水蓬山依咫尺五雲深處承恩多微臣欣幸澤無量九奏鈞韶聽天上已叨宿衛趨禁林更聽頒酺肅仙仗雲漿露液如醍醐翠碗分擎白玉除昔年司味調禹膳臣曾充飯上拜唐阿今日令典瞻堯衢衢尊同挹萬方喜鳳牒龍編古無比惟歌瑶紀與天長嵗嵗春華綏福履三等侍衛膳房五品官拴住年七十四就瞻喜入嵗華春宫栁含煙草織茵廣宴宏開樽溢露耆齡肅拜膳多珍宵光景宿隨垣朗曉色璚雲展幕新已慶琛球敷朔旦更欣珠璧會昌辰天將羲皥超羣帝聖以松喬錫萬人進退華顛胥秩禮趨從綺席並依仁寵綏已合髙卑序渥賜無分內外臣五十年來齊長養三千界內共龎淳奫淪詎可蠡窺遍躔緯寧教管測頻惟有葵忱傾皓日隨班抃舞仰鴻鈞三等侍衛公卜年七十三巖廊夙幸近光頻廣殿重叨聖澤新職奉金鍾襄盛典恩恢玉液逮微臣桑榆長仰光華旦雨露重敷天地春從此駐顔知有術已隨仙侣聽韶鈞三等侍衛富保年六十八夀鏡懸璇霄輝影聨珠璧散作寶華雲上拱微垣北羣雍際長春寰宇瞻瑞色吉辰嘉宴開星次耆英席充庭振鷺聲漸階翽鳳翼小臣得觀光聨茵殿巖側往扈上蘭狩班侍金門直荏苒望七齡粟豆糜棧櫪豈意枋榆姿仰接鴻鸞翮恭惟治重熙肖翹亦被澤願祝億萬年聖夀天無極三等侍衛塔坎保年六十七穆穆景霄厥苞孔彰閎閎珍壤厥符孔揚天苞地符於何見之八極同夀唯帝之儀皇極肇建九疇斂福月正六日亶茲百祿眉夀偕來萃于帝廷文筐伊蔚旨酒伊馨唯是眉夀惟帝錫豫拜手賡揚登三咸五地天之泰雲天之需帝心乾乾萬年樂胥三等侍衛蔣七格年六十五百昌戴天不知天之高萬物仰聖不知聖之勞自童顔而皓首唯鼓舞以遊遨隨作息於白日安耕鑿于青郊帝心以育物為則推恩錫福遍翹肖陽春溥夀祺餐和飲醇醪臣衍擊壤詩敬隨衢叟歌唐堯三等侍衛百福年六十二六合春如海千耆夀作朋陳疇綿福祿衍策肇雲仍慶協弧躔燦暄依綺旭升豹韜慙侍值佳氣藹觚稜欽定千叟宴詩卷十二
