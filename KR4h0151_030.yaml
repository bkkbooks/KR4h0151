body:
  text: 卷二十五預宴九十四人詩一百十首按察使職銜兩淮商人程謙德年七十五朝端佳氣接蓬萊恩錫瓊筵朵殿開眉夀趨蹌瞻玉戺頤年抃蹈捧霞杯琅琅法曲鈞天奏習習祥風淑氣催鳯綍自天沾寵渥龍章敷福慶昭回憲司加爵榮陳臬鹽莢持籌職阜財今日天家叨異數五雲深處上春臺卿銜兩淮商人江正大年七十四九華麗朝日瑞靄暾初升蓼蕭賦露湑天保符川增微臣隸淮海鹺轉江波澄鑾輿幸江介鳬迎藹雲蒸餘策寬百萬拜賜羣歡騰沾被臣獨渥天寵稠疊承榮銜點卿月殊錫叨金繒恩華逮臣子驅䇿愧寸能洊從郎署擢優獲藩符膺臣子蘭蒙布政恩任河南使隆施出匪望負荷恐不勝朂勵勉夙夜圖報矢冰兢旬宣布闓澤嘉應洽瑞徴仰體聖慈諭遍使康樂登涵濡沃膏露謳歌祝升恆恭惟夀宇啓玉陛慶作朋葵霍依黼座敬效躋堂稱布政使職銜兩淮商人江廣達年六十五翹首天衢曙色浮五雲多處奉宸斿金漿瑶饌恩筵敞紫籞丹墀湛露流此日朝端紅旭麗昨年江甸翠華逰小園屢幸紆仙蹕宸翰頻揮映玉虯六次瞻天陪豹尾萬年獻夀拜螭頭旬宣銜愧非材沗鹽策資邀聖澤周鹺使親承傳鳯綍皇圖長頌鞏金甌欣欣小草沾膏渥更與耆班感不侔道銜兩淮商人汪日初年六十四千仙肩籛佺六服屬頊嚳延年巔蓮船卜築族菊谷聨氊傳駢闐玉燭祝福祿筵前宣璇篇匐伏讀肅穆一新春旬輪辰黼寧普譽處人真循因親醑與簠筥伍申誾均奫淪傴僂覩鼓舞臣民寅陳豳譜古舉祖武二體疊韻監生山東商人徐永鑑年六十六青陽啓上旬率土慶長春綺宴羅千叟瓊觴飫八珍玉墀隨劍珮金奏聽韶鈞自愧菰蘆質銜恩到析津舉入山東商人楊伯塤年六十七愷澤蒙覃敷醇膏沐雱霈渥宴臚歡愈綺文拜寵賚小臣長蘆民海鹺習計會幼識經籍光長邀鄉舉解皤顔趨彤庭幸得預嘉會率舞奉恩施帝德如天大候選衛守偹山東商人張長庚年六十二習習曉風和愔愔晝漏永彤階霽日華黼座祥光炳薄海溥耆宴微忱欣引領幸許隨簪纓趨晨奉朝請雅奏聆由庚夀星慶見丙錫類降鴻龎歡愈樂韶景監生長蘆商人茅祚宏年六十五斗極泰階平弧南夀曜明元正承職貢嘉宴會耆英鶴髮歡衷洽龍光大賚榮微臣草茅賤深幸到蓬瀛捐職從九品長蘆商人董調元年六十一三垣平八方夀帝治蔚光華兩曜同長久瀛嶼喁喁承恩趨風五十鴻圖大衍始思赴北闕呼中嵩帝錫濃華耆宴豐隆合卿尹浹農工商為四民一江淮之南長蘆東實多皓首鮐顔沐大化俾來入宴臣以微銜從瞻雲日隨鵷鴻此生真大幸曠古盛典臣躬逢舉人董治年七十聖治際久道文教恢汪洋菁莪樂有儀棫朴奉圭璋興賢三年典多士四海望稠疊奉特旨恩科矞輝煌中多華國材蔚為黼繡光復以銓選格上厪宸念詳逾格慎挑試疏通等明揚經史積枕葄吏治敷循良次第秉儒鐸儀校序膠庠直省大吏奏屆嵗風詹場八十復九十一一以名彰帝用旌耆儒優銜輝青緗年過百齡者爵以鴛鷺行閩臣鄧鍾嶽首列千叟觴實由一青襟疊賜會與鄉赴闕嘉忱悃榮服司業章斯為升平瑞用炳帝治昌儒業蒙深恩更牒數未遑微臣賡聲句附咸韶鏗鏘舉人張琴年六十九九天閶闔開玲瓏祥雲高捧扶桑紅咸池雅奏殷碧漢瓊筵列座春風中金羮玉碗瑶席美眉梨耉鮐禮遇隆一人有慶萬福同翔鸞舞鳯臨丹楓籌添十屋浩大海三千叟算集聖躬無疆之夀軼羲皥光被六合超鴻濛玉階新桐長百尺瑞徴麟趾延斯螽堂顔五代福萬世翹瞻景慶呼華嵩舉人蔣楷年六十七飲和食德際升平嵗首春光滿帝城歌鹿鳴來曾式燕奉鸞章錫又稱觥千詩競説詞章富三爵欽承雨露盈新傍蓬壺歌樂只漫須良會羡耆英舉人龔濬年六十五春光臘幹恰盈旬慶衍循環甲紀新鳩杖迎韶符玉琯弧南星耀拱楓宸一嘉惠儒林錫慶豐辟雍新殿肇成功聖皇首禮喬年叟闓席圜橋一嵗同二貢生吳之爵年八十四韶春溥錫巨典鴻融皇帝萬夀八方來同臣衣青襟獲承淳風齒八盛典親辟雍宫虞殷周禮偹于鎬豐若金元明其制未崇帝創隆儀實尊實洪黼殿雲立星橋蚴通汲井甃石象海奫溶穹碑屹峙奎訓昭隆輝以藻繪列之鼓鐘創始癸邜成甲辰冬帝沛恩綸禮舉時從將由春丁陳彛錫庸先是正月景慶龎窿有三千叟駢覲宸楓大貺所頒周瀛被濛臣隸太學蒼顔赤衷覿兩大禮先飫醇醲古稱尚齒饗燕舂容徒設席位膠庠序中曷若聖代丹陛敷穠景運凝合禔福申重請合周雅臺萊樅鏞奉聖主夀莖咸軒農貢生李烒年七十二龍池日暖擁朝霞鳩杖春融驗嵗華五代庥祥榮史策百年盛典慶天家仙厨分饌羣稱嘏玉殿傳餐共拜嘉肄禮成均逢景運耆筵溥暢渥恩加貢生馬履掄年七十一升日騰華湛露瀼春開夀宇聖當陽章縫老與明經選髦譽欣觀太學光伏幸鴻儀圜水慶先逢懋典禮筵張銀鏐文綺便蕃錫引養寧推上下庠貢生翁夢圻年七十一酺席開彤陛瓊卮酌紫霄執經參上舍拜賜及新韶會有雲呈鶴真看露在蕭輝煌敷盛典講席企圜橋貢生劉文灼年七十臣遊國子學儒服趨丹墀仰觀天文煥奎壁光參差重修記以述功成三勒碑穹亭麗雕礎五雲籠蟠螭石鼓得宸詠古槐題御詩夏絃與春誦奉君以為師詩文集宏富琅函襲丹緹殿鐫經史版頒藏在有司博士弟子員被服欽文思敢曰抱經老頗悔向學遲至教既沐浴恩燕還追隨願述所誦習聖門言難為計曰臨辟雍更讀彛訓詞監生張鈿年八十四胭腽慶煙積于穹壤如日輪環如春氣盎既酌醴醹曰被文襁華耀宣明鏐文笻杖俯仗覲光醉飽拜貺惠及耆齡舞歌宸象監生章維時年七十六敬述熙朝景運凝祥碧漢黃輿千叟億齡以上三雍四代之初詩稱在泮飲酒恩荷入監讀書臣沗芹莪夙齒頌聲先洽燕譽監生陳璧年七十五曼齡介祉德巍巍錫宴三春耀曉暉黃耉欣霑官醖碧歡呼同拜聖恩歸中天麗日慶芳辰醲化淵翔世似春一介青襟承帝澤欽先鐘簴展華茵二監生汲天佑年七十四聖主斟元化恩覃首引年巽申敷雨露需宴協雲天圓鼎羅珍膳方壺貯醴泉番番齊鼓腹願上祝堯篇監生張拱乾年七十四丹詔宣金闕華顛覲玉宸鴻儀承祖烈曠典遍耆民法醖斟千爵春盤繼五辛紛葩鸞鳯序洽鬯管簫鈞拜稽同天上歡愈到海濵華禋欣醉飽鼓篋頌皇仁監生李澤基年七十二煌哉仁夀時羲旭光郅治雕氣蒀為氛露珠集成瑞華胥萬國同康壤九衢遂帝推天府珍廣植耆夀氣景運垂億年仙朋合千萃皤髮娛春風鸞鳯歡鼓吹監生田疇年七十一春朝祥靄布錫宴共叨陪眉夀千英粲階蓂六葉開新韶明玉仗麗景滿春臺翹首卿雲麗蓬瀛紫氣來監生原希聖年七十一醍醐一酌嵗年長露有餘甘甕有光生世總由醲化洽又同耆耋飫神漿一先從玉戺定鵷班欣伴羣仙霄漢間一百五齡司業在從師弟子舊儀嫻二監生邵塏年七十一太學首儲材羅列貢與監貢以獻士稱監名尤非泛直舉本官署國子貢不忝飫詩書以華習禮義無儳國家隆教養聖學篤典念日課精以勤月廩贏靡欠聖訓懸彛倫六館奉矩鑑仲丁帝視學升香肅帷幨大禮待時舉璧宫環瀲灔生逢盛儀肇鼓舞篤鉛槧誰言砥學心白首敢慵厭天子勵乾乾五福疇敷斂耆筵不遺物老得覿華贍卑微肄業生珍厨屬飫饜圜橋宣教澤恩綸己先掞笙簧酒醴歌肄雅鼖鏞兼貢生陳嶦年六十九宫敞乾清綺席稠筵開八百列螭頭鈞天樂普金簫應碧海醪頒玉瀣流賜帛已呈千樣錦錫珍如集九成邱環區化浹春無量大衍開韶暢孟陬監生周元敬年六十九中天輝麗日嘉禮協芳辰己慶文成化真看世似春鴻恩錫齒舊開歲引年新九宇淳和洽無疆頌聖人監生胡元亨年六十七煙衢囷鬱韶華敞賜福開筵風長飬共候三千海息波如聞萬嵗山傳響皇仁所煦氣同春九域松喬皆夀人溯從髫齔餐郅德直至鮐耉飲甘醇重熙纍洽陽光泰赤貝蒼球粲王會龍庭月竁總恩沾禔祉如天錫無外監生蕭載興年六十七繁祉鴻恩言錫華髮俾回春顔俾躋夀闥祁祁是來東西􅙡窟王會耆英禎圖總括日星璪麗端倪軒豁臣以青襟獲趨帝闕春風融怡宇頌懷葛監生歸􅭆年六十五圜雍文治焕廣宴夀祺敷樂奏簫韶曲筵頒萐莆厨恩叨沾教澤班許綴耆儒願獻南山頌駢闐紀瑞符生員李大文年八十四蛾術頻年守一經欣逢耆宴酌仙醽待從璧水聆敷教先向瓊筵慶錫齡禮積隆文超憲乞養推淳氣協清寧章縫得與尤榮幸更老鴻文更竦聼生員劉竒男年八十二鴻濛肇闢一畫垂乾偹四德雲雨施法天行健作之師久道變化恆四時賁文震武綏大有鼎亨養賢漸羽儀雲天需澤山雷頤晉晝日接兑澤滋荷衢有慶畜養隨大觀在上敦臨綏德謙澤解涣號垂節以立論井以養豐亨豫大今一時屯蒙履泰升陛祝三皇之夀大過之慶際祥開大衍歲比事敢衍羲經辭卦名體生員高志年八十一聖治垂焕文天心合在宥棫朴雲漢篇上叶作人夀淵海慶圖書奎壁燦辰宿光華欽照臨孰序廣翹秀臣受博士經矻矻至皓首莫測聖海深恭遇曠典懋新韶敷華茵耆年宴玉豆儒衣彤陛登虞庠法斚侑那須軟輪乘得拜鳩杖授臨雍聼圜橋行喜上儀覯生員王鴻基年七十二紫禁春韶寶宴張膠庠下士例稱觴詩書涵泳多膏澤何幸身依日月光一天門詄蕩暢和風恩紀汪洋樂愷同家在夀光真夀宇臣籍𨽻山東青州府夀光縣長瞻泰岱頌延洪二武生倪吉年七十七象闕晨鐘啓龍樓寶仗開簫韶雲際度湛露禁中來黃耉分瑶席紅鱗泛玉杯更承恩賚渥真幸到蓬萊武生白光弼年七十三玉燭輝寰極韶開淑景妍緝熙欽聖德開宴預耆筵決拾材曾肄冠襟序亦聫人誇黃髮健春到紫霄懸舉觶承恩渥提筐拜賜駢千秋傳盛事光軼史臣編武生謝清舉年七十一重熙彰國慶施恩象鴻鈞朔合辰書亥春回斗建寅九成聽舜樂三祝效堯民武學沾文教滇南萬里人奉祀生王至善年七十二玉斚瓊筵次第陳堯厨賜酺奏韶鈞時逢熙洽臚千叟慶錫駢闐仰一人溥海共逰仁夀宇敷天同繪太平春沗隨儀部齋郎秩異數重邀寵渥新奉祀生宋惠仁年六十八我皇錫福普穠光廣殿需雲縵吉祥履近星辰趨鳳闕花迎劍佩粲鵷行天題志喜奎章麗聖夀延洪瑞景長祠部隨班欣奉牒耆筵式燕荷承筐春生軒管和風盎樂鬯虞韶協氣翔幸際昌期邀曠典螭頭拜舞頌平康天文生陳楫年七十一條風舒暖律韶景晝初遲漏點催金鑰珂聲動玉墀耆年欣接履御座喜傳巵慈惠恩彌普葵私效祝釐天文生盧藩年六十八黃圖苞茂慶霄新軒莢榮占五甲巡南極夀星長見丙筵開百福應昌辰一紀周五甲運璿樞瑞拱南躔燦玉弧世夀皆緣仁夀錫蒲筵開處聼嵩呼二天文生羅彥芳年六十五言登觀象臺昕夕測儀象不知其理習其數雲物歲占臣所掌鬱鬱天體儀銅球螺柱古無兩南北軸承子午圈統大圓容歸測仰輔以赤道及黃道地平經儀地平緯儀地平經緯儀精製攝摩蕩璣衡撫辰昔未有重環映合帝所昉軒皇靈憲虞璿玉洛下張衡詎佛髣世當大順百福俱天人格應捷于響燦爍元旦書庥徵開翠幌試看三千耆叟錫嘉宴歲歲年年祥氛囷鬱層霄上天文生陳又新年六十五禮崇羞耉賁宸章共戴帡幪迪吉康微賤業參辰緯序吉雲敷處普春陽一龍首弧南兩夀星春初環彩拱彤庭從知經緯周天數駢向辰居耀萬齡二天文生賈國瓛年六十四九衢康樂競歡謳人向乾清捧玉鳩錫爵共膺天子福登墀都與地仙儔春來六日承元日海上三洲并十州欲識廣輪周八極方輿燦列在儀球天文生王貽桂年六十四仙籞晴雲暖韶光獻歲初九天開象緯大地協車書蘭饌沾膏始椒觴拜賜餘露濃霄漢近歡忭更誰如天文生鍾世儀年六十三稽時晷影堂在觀象臺下儀制設圭表曦暉晝交射漏壺凡三重壺室置靜厦曰日天夜天及平水交寫均調晨夜刻測春秋冬夏熙朝時序正四氣入醇化春正開六日珠璧萃躔舍嘉會際陽和賡歌起嵩華臣職刻漏科肄業識慿藉積元會運世福祿恆交迓天文生楊鍾育年六十三周天三百六十度極星所蒞為正中京師北極出地四十度我皇斟化扶龎鴻大地七萬二千里益算亥步無能窮東偏三度己際海渡海直亘朝鮮東西偏一百二十有餘度厥有伊犂回部外及哈薩克至愛烏罕際大濛版章及朝貢繪成輿地全圖緯以極星中星輪廣成橫縱洪鈞一氣夀宇同帝所申錫遍帡幪熙朝輿圖測彛器光燦萬古超炎農天文生賈瑞年六十三一堂五世慶瓜綿瑞靄朝開霄漢懸今日瑶階徵異事天文生伴地行仙一仲叔羲和古帝崇在衡齊政有虞風人慿儀器知天易天在吾皇燮佑中二天文生鈕兆鳳年六十赤儀通軸立軸黃道經圈緯圈雙單環分度刻螺龍柱飾遊旋小臣習觀彛器垂老親到耆筵仰見慶霄咫尺真踰虞典璣璿天文生朱文龍年六十羲畫首觀天軒皇衍策年夏時春啓度元旦日輝躔螭序千耆會鴻圖億祀聫新增再甲子時憲紀年編欽天監西洋人那永福年七十二歐邏巴州西天西意逹里亞臣所棲六城環以地中海高墉架海橫天梯人有醫治教道四科學物有金剛珊瑚哆囉珠象犀康熙九年入覲貢自後嵗奉金牒航狻猊懷仁若望始守職跪奉睿製天體地平赤黃經緯壺與圭世世惠養復徵祿俾恪守彛器慎測稽逺國知藝學天藻欽褒題畫法界劃入徴妙取以刻摹戰迹金川回部偕伊犁豐功偉烈古未有補圖皇輿極星中星經緯翔端倪佛説四大州西説五州一世界我皇撫之仁夀躋八萬里臣得入千叟宴福島冰海咸奉𨽻職同蒸黎欽天監西洋人業宗孝年六十七惟天有三垣紫微實帝宫天乙太乙輔左樞右樞從兩傍列營衛華蓋勾陳融御靈秉萬幾天皇處厥中文昌映北斗魁杓玉衡穹天厨垣以外西勢承三公太微為治朝華掖分西東明堂耀靈臺台明泰階隆下垣實天市侯屏稱籓庸占野二十二斗斛映三宗經宿環二七東方為蒼龍角首尾作尾牙瓜粲煜熊西虎北元武朱鳥南翔翀周臚區四色環輔帝座崇歲星辰與填火金舒昌丰高低列五緯運與二曜同璣衡飾靈憲八紀垂鴻絧微臣讀星經職守彛器鐘欽若聞伊耆旁羅始有熊深覃泰西法悉秉睿製鎔含譽格澤見昴星禎符通南極應夀昌萬年拱宸楓西洋人錢德明年六十六法羅海島銅人像巴必鸞城公樂場逺志七竒傳國俗虔依萬夀祝天皇筵霑尊斚寰瀛福身傍璣衡霄漢光龍角開杓瞻北闕紫微天座燦中央西洋人趙進修年六十二化宇金甌奠昌時玉燭調扶鳩觀盛典式燕慶熙朝星日瞻靈憲賡揚叶大韶梯航望南極八萬里非遙庫掌四格年八十八瑞牒欣傳億萬年老餘榮喜荷恩便始知夀宇皇能夀恰似仙宫吏亦仙法酒遍傳瑶席外名花初映御筵前膠庠盛事超千古養老先教慶八埏庫掌常祿年七十六春風來嶰管吹上萬年枝式燕承嘉會龎鴻值盛時泰交符鎬洛頤夀邁軒羲願比康衢叟謳歌頌聖祺庫掌五逹色年七十三身在卿雲最上層璚筵拜賜蔚蒸蒸聖恩優渥長春酒三爵油油愧不勝一扶鳩歲歲祝春風閬苑仙葩欲放紅不羡神丹教駐景九重和氣更沖融二庫掌赫逹色年七十三九天垂慶澤春風臻千耆舒為雲霞彩繪出春風儀金闕曉曈曨晴光郁曙曦黃霞捧仙漿絳雪承瓊爢俾益歲月健能回鬢髮絲承恩侣鵷珮唯頌萬年巵庫掌德華年七十三重海輸忱效貢九霄錫福延齡珍駢天和地産道在宇夀民寧龍首春輝奕奕弧南福曜熒熒知共攝提杓轉垣邊主藏一星庫掌富文年七十一彤階五色彩雲生入座仙韶次第鳴願祝三多叶天保慶霄金掌露初擎一玉醴分甘荷聖恩滿庭桐豫藹春溫應偕負曝晴簷叟長率孫曽頌至尊二庫掌瑚理年七十日曜金烏麗風迎綵燕先引年春設醴錫福帝敷筵雅會逾蓬䦘齊齡有偓佺聨曹同玉府管鑰慶恩延副司庫六十三年七十九長夀幢邊瑞旭紅黃麾仗裏簇春風衢謡一曲衢尊飲人在羲皇歲月中一泉府欣參典守班向陽葵藿彩雲問逺勝絳縣徒書亥笻杖精鏐拜賜嫻二副司庫六格年七十一重熙開瑞景百祿敞韶筵周雅歌升日虞庠重引年夀徵來海外福相到雲邊人合官民遍天將禮樂宣依光龍幄近獻夀玉巵聨管庫欣參掌殊榮頌阜川庫守四保年八十一翠籙注耆齡帝廷啓仙宴人天共歡喜明良愜情眷普周四海內同集九衢遍近光列瓊瑶環宇捧粟絹桂醑駐華顏蘭肴餌珍膳拜手稽首言賡歌附謡諺庫守雲保年七十七庫守微臣荷聖慈餘齡望八捧瑶巵廣儲地寶天珍會積慶皇模帝範垂幸厠蓬池偕綺偓同瞻黼座祝軒羲漢唐分館含元殿詎稱熙朝萬一儀署庫守福勒赫年七十五仙宴依彤陛瓊筵拜玉階共知春似海親捧酒如淮浩蕩天恩渥毶㲚國老偕微臣司管鑰飲德頌無涯庫使善保保年七十芳序協三微隆儀被千叟彤墀列綺席金觥酌醇酒百爾序以賢小臣隨其後臣職在管庫珍儲慎所守典藏既夙齡叨恩感逾厚我皇普春祺億萬年昌阜副司俎掌海安年七十三寰瀛歌誦進臺萊南極尊從北闕開河洛衍成無量夀萬年長奉紫霞杯一綏桃安棗佐辛盤稠疊恩波海樣寬便是蓬萊真慶會人天齊拱五雲端二催長六兒年七十八孟陬啓華宴陟此閬風高皤皤黃髮老綺席慶分曹瑶盞斟玉英雕籩燦綏桃小臣榮末坐熙運逢泰交嶽瀛萃珍貢天地呈符苞拜手祝萬年歡抃渥恩叨催長烏靈阿年七十七榮傳鳳詔自五雲端喬齡惟叟溥逮恩瀾朝聨于野農從于官飾仙家珮峩日下冠薦地紫茵接席雕盤均頒御饌並捧珍紈東墀濟濟西序桓桓有一百五榮服健餐是合禮樂是錫康安進旅退旅九衢翹觀億萬斯年長奉宸歡催長朱萬年七十三九重積慶啓雲仍上日筵開夀作朋人意並如春色好主恩長與歲華增均排二膳初行酒欲翦千枝待試燈深愧散材膺盛典歌衢擊壤共歡騰催長陳良輔年七十三自天箕福錫如日聖華重簪紱聨嘉會尊罍盛禮容春祺敷鬯疊懋典慶時雍微賤沾尤感符催馬走供催長扎普善年七十二鏗華鐘進天酒聖人年天長久三千人祝同拜手乾苞坤符天畀聖人膺五乘十千春萬春敷為和風甘雨蔚以景星慶雲宵衣旰食惠下民小臣頌聖歌詞俚上奏玉宸顔有喜俾爾夀耆逮齯齒小臣載拜受帝祉催長六十六年七十一盛典超前古敷天喜覲光龍墀尊俎列鳩杖玖瓊彰喜接紳冠紫恭瞻黼藻黃大哉仁化溥同軌樂豐康催長官保年七十雲開槫桑暾攝衣入天門誰云袀衣賤今日覲至尊元辰鏗鍧大合樂雲霞圖畫輝芝嶽鮐顔如玉聨千珏東海為杯供瀺灂珍饌雕盤薦捧觶九華殿亦有耆齡未逮人銀牌普錫蓬瀛羡聖華覃被萬域同夀宇咸躋靡不遍乾元甲子億萬年簽名同入雲天燕催長德格年七十引年傳盛典扶杖聚彤庭香飫迎年斚春歸應候蓂熙陽逢化宇芳宴遍喬齡雲裏鈞天奏鏗鍧此日聆親隨頭目海保年七十臣以親隨頭目得窺盛世苞符上追軒羲寶録普頒瀛閬仙壺疆索恢皇輿表琛球奉職貢圖大宇都臻怡夀韶春同饜醍醐清茶頭目烏爾慎年七十四澤布青陽肇上春瑞先人穀協靈辰三千夀耉同扶杖跽進霞觴祝紫宸一帝錫恩光萬國諧班分列席慶同儕九天韶樂鏗方奏早見頒茶繞玉階二校尉頭目六十一年七十五早年沐聖慈新歲邀宸眷顧此樗櫟材幸厠蓬萊宴才添周甲乙甫涉上夀半聖恩所不遺濃華溥英絢虞周燕饗盛景運遜彪焕晉室華林園唐葉含元殿何能希懋祉慶昊顒敷遍署史六逹塞年八十三臚歡宴赴叟三千繩武恩榮邁史編海屋籌應添億萬耆年長奉聖人年一璿律初調玉燭新耆齡飫澤慶良辰掌書贊治周胥列長捧丹函展紫綸二署史高英年八十二夀宇春祺普延年玉斚馡瑞圖增寶笇福範運璿璣丙殿鳩騰彩寅階鳳覽輝恩筵容末士祝嘏拜瓊扉署史哈豐阿年七十七春恢璿律玉燭恆調九宇耆夀延齡迎韶良辰饜飫式溥香醪班序鬱律錦文纂雕微臣何能皓首榮邀掌書贊治職在天朝曽覩丹函慶展歌謡署史二逹子年七十五瑞靄蘢蔥旭景高耆筵撰日沛恩膏古稀天子無疆夀慶積干支紀大撓一鴻儀斡運聖符天五位循環肇大年四海夀人翹帝闕洪鈞一氣沛陶甄二署史倉兒年七十五崇崇開彤閶麗日輝金榜有來咸肅雍春風新蕩漾黃髮鮐背侣列序奉華仗帝賜蔚以駢珍瑰佐頤飬拜舞聨聲詩和風協韶廣微臣沗何能府下胥徒上亦得與羅鳩會極臻平蕩拜唐阿屈住年八十二渥澤垓埏洽鴻慈耄耋覃軒齡增莢萬堯祝疊聲三戴斗尊辰北占星仰極南試量瀛海水未喻湛恩涵拜唐阿福保年六十乙奮寅光啓辰書亥字先瑞羣徵聖夀恩普錫耆年並著長生籙為逢綺歲筵物情都皥皥帝思益乾乾祝效三多盛珍踰五豆鮮微臣同拜手景祐萬斯年承應人二格年八十繁祉欣駢集殊恩樂廣施引年歡有合戩穀罄皆宜麗日舒長候韶風浩蕩時蓼蕭真舉處長此慶春祺承應人六十五年八十二聖代懋純禧耆筵豐錫賚皤皤黃髮羣濟濟盈庭拜臣名協夀徵臣年八二歲年耄尚齠童佺喬敢同隊職為承應人守值熙和代幸仰天顔近羣沾帝澤沛萬年綿景祚呼嵩長愛戴承應人裴宫保年七十五一人有慶啓芝筵詔許耆年覲九天欽聼賡歌同奏日需雲都作慶雲連一五福延和萬國咸普天黃髮各髟髟宴酣秪覺春如海籌算無勞絳鶴銜二承應人明德年七十五綺歲恩綸特沛恆春歲月徐添禮兼以宴以饗澤深引養引恬鶴髮長能鼓舞鵷行齊愜就瞻乾行法天益健需雲澤物均霑承應人五十九年七十五天門開詄蕩春光布芳妍彤廷翔異彩忭舞萃後先聖人隆齒德廣殿羅華顛爵秩辨有等膏澤沾無偏言依寸草榮欣覩堯蓂鮮共懷鼓腹私長此開華筵繼自今以往欲至于萬年承應人七十兒年七十扶來鳩杖喜連肩丹陛高依北斗懸一體恩教同在列就中行自各推先銅蠡延漏傾三爵金鳯翔輝下八埏數溢三千猶有賜定知榮更羡羣仙欽定千叟宴詩卷二十五
