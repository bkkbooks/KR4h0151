body:
  text: 卷六預宴九十四人詩一百八首參領劉嵦年六十三史册饒他莫並肩我皇文德洽垓埏四編詩集瀾觀海七閣全書日麗天學啓塞垣塗二萬講臨璧水士三千舜歌堯戒豐岐鼓史册饒他莫並肩一史册饒他莫並肩武功赫濯震無邊一人睿算成三捷兩度鴻勳速五年闐璧宛駒爭貢篚崑邱濛畎熟屯田軒皇棡鼓成湯斾史册饒化莫並肩二史册饒他莫並肩功成治定倍寅虔六飛屆處勞巡省七帙開除厪惕乾課雨占晴與民共宵衣旰食以神全盤銘又日書中昃史册饒他莫並肩三史册饒他莫並肩即論此會盛謨傳三千餘衆民猶子百九四家孫抱元數溢期頤師博士里逾八萬隸司天膺圖五十京垓積史册饒他莫並肩四未恭衍首尾御製詩句作吟體參領王法年六十三頒春開渥宴錫福逮羣臣藻樂周京詠雲書太史陳遍行酣法醖賜坐耀華茵長養資微末陽和仰大鈞參領希布禪年六十三九五龍飛五十年引年典重叟三千五雲捧日朝凝闕五緯連珠夜合躔建極五疇推禹範遊河五老慶堯天萬年帝德咸超五五福堂徵萬福綿參領能泰年六十三上殿稱萬歲北極捧星辰南嶽配朱鳥佳氣日氛氲東岱雲峰起西嶽崚嶒竦處尊聖夀宜過一萬春今春喜氣滿乾坤閶闔晴開詄蕩蕩御厨絡繹送八珍和風日沖融八荒開夀域湛露即歌詩感激動四極壯哉崑崙方壺圖神仙中人不易得羣仙夾翺翔葵藿傾太陽如澠之酒常快意老極老人應夀昌集杜甫句參領福星泰年六十三參領小臣福星泰夙備戎行瞻華蓋耆齡忭舞飫星厨天子萬夀恩初沛憶昔轉戰依廟算大槊在手長羽帶雷輥一百二十場慿仗天威拓無外臣北路用兵接仗一百二十次懸牌鏤伐錫師中軍歸宿衛隨飛龍鳳凰在阿華平茁雒常逺羾拘彌通安于盤石夀旗翼車駕觀饗酣春風臣泰紀恩恩重重欣此復預遭何隆常泰年六十三春日載陽合宫總章卿月民星壤慶廷揚煌煌矞矞濟濟蹡蹡酌彼康爵純嘏爾常帝齡錫羡瓜瓞集慶協風吹萬渥澤溥洋臣叨禁衛軍旅昔襄蠶叢峩峩岷源湯湯天威赫濯弓矢允藏參旗井鉞袵席寧康詔預嘉宴光寵浩穰願申悃祝福夀無疆參領依爾通阿年六十三憶逐貔貅喜奏功昔年邀賚感恩隆臣食俸餉四十八年屢次出兵打仗得功牌六箇蒙恩賞賜銀兩耆英會後羣趨拜榮幸徒慙豢養豐一恭預華筵樂未央天時人事共韶陽惟同四海歌堯日春正長時日倍長二參領琳昌年六十三化日啓熙宇瓊筵飫上珍大千同飽德凡百本依仁長養風常茂敦龎俗自淳置慙皓首快覩茁葭春參領都爾松阿年六十三浹日韶光暖律新禮筵康爵喜初陳共瞻渥澤真如海普散寰瀛總是春千叟期頤徵瑞聚一廷喜起拜恩均齡餘周甲花添綺胄衍宗潢派接銀捧出賜珍膏湛澍賡來藻翰韻璘彬分行竊喜陪鴛鷺普宴曽叨接鳯麟瓞衍綿瓜符逺慶豐歌有芑繼昌辰萬年樂愷超周雅雅化還欽夀作人參領薩爾泰年六十三聖德符乾運嘉筵協泰交引年趨北極尚齒軼東膠石凍分仙醁蒲風扇帝庖端辰三始節內法八珍肴賜杖鳩延嗉聞韶鳯振苞重熙敷錫廣異數逮衡茅參領那彥泰年六十二春風砌敷蓂莢曉日闕啓芙蓉拜衮欣隨百辟呼嵩共仰九重夾陛雲璈響徹傳杯玉醴香濃何幸年才逾甲叨陪賜宴雍容參領肇慶年六十二盛世庥光集熙朝德意將引年知有慶介夀頌無疆芬苾中厨出輝煌御宴張冠裳看肅肅鏞鼓聼鏘鏘禮遍東西陛恩周上下庠鳩扶新賜杖虎拜並傳觴喜氣承三殿歡聲逹九閶微臣歌既醉蠡管愧賡揚參領明福年六十二融風協青律蠲吉維孟陬欽瞻景福繁大小來共球皤皤眷黃髮一一添海籌三槐九棘中濃露祥光浮小臣飫俸糈三十九春秋駑駘仰大恩年甲旋已周甲周一何幸長共堯民逰復此拜華筵萬歲賡衢謳參領尚玉德年六十二長筵序飲異屠蘇淑景熙熙旭彩舒六日開春占既醉萬年拜祝樂于胥雲霞縹眇縈三島日月升恆頌九如敬為環瀛告耆老今朝只是奉恩初參領二逹塞年六十二羽林列職排仙仗長以菲材蒙厚養年年秋獮扈從行紫塞風高馳颯爽肄武因之命詰戎微勞邀賞非竒功功牌得八白金百聖恩所被誠過隆樗年今已踰六十筋力未須扶即栗況際彤墀燕衎時敢云舞踏糾儀失惟皇錫福遍萬方風雨調和日月光黃耉台背樂未央飲衢擊壤歌洋洋臣雖虎旅慚賡揚猶能把筆書無疆參領鄭馥年六十二紫禁回翔羣叟黃樽浥注天漿四海覃敷德遍九霄共樂春長尺五人依列職大千臣與榮光遙稔野歌熙皥豈惟廷效賡揚參領富倫泰年六十二我帝命溥將養老廓古憲曰維時郅隆人瑞多耆獻上者系天潢下亦及絳縣我帝顧而怡溫綸普垂眷飲以玉色醴饗以內法膳隆禮繼前典是日千叟宴恩深數倍多樗質臣俱殿榮幸知何如萬載不多見年年願際此詘彼喬與羡參領常寧年六十二花長春山萬夀蓬瀛圖畫開晴晝微臣列衛依仙囿臣叨直圓明園共被恩華太液波欣承嘉宴鈞臺奏古稀天子申洪釐天家慶羡當昌期新韶六日大和會衣冠杖履咸恬熙盛事史書都未有重光兩舉欽高厚漫誇三萬六千齡章蔀紀元同悠久夀算真須命𨽻首嵩呼濟濟三千叟參領覺羅薩炳阿年六十二敦葦承天恩蓼蕭奉嘉宴玉律調春臺矞雲覆芳甸衢樽長共浥鳩杖欣殊眷錫福慶無疆欽與羣黎遍參領那爾善年六十一羲皇策衍天地數五中宫河洛環而周萬有一千甲子譜伏惟古稀聖天地合其數敷錫大小臣僕越及衛士一一納之仁夀宇堯尊舜甕咸涵醹稽首奉玉陛臣昔備旗鼓雕弓繡弧仰稟聖武轉戰百二十有五次幕府上功簿臣曽三次出兵接仗百二十五次屢得功牌賞銀天家錫賚承便蕃銀鏐雪色耀華組荏苒綺甲周老馬踠足無寸補豈知耆年會依光侍尊爼請奏夀人曲仰叶含哺鼓腹康衢舞參領巴雅爾年六十一萬夀瓊筵閶闔開耆年羣幸到蓬萊承恩共景熙朝福供職殊慚武庫材虎帳風清環羽衛鳯墀春滿布尊罍笙歌更聽鈞天奏瑞氣還應上斗台參領佛保住年六十一獻歲春初麗開筵日正長叨塵三品秩預捧萬年觴袖挹爐煙藹尊浮瀣露香願瞻仁夀鏡長此頌無疆參領閔獲春年六十一歡聞溫詔下丹除曠典隆儀邁古初離照朗周耆艾福巽風廣被綺筵舒幸逢萬古文明盛曾備三驅武力餘珠罕星旄雄列障雕弓畫戟效隨車虞廷鸑鷟真咸若周囿麒麟得所於北極瑶光輝寶樹南山翠色護宸居頓忘桞質因霜悴長矢葵心向日紓何幸九天承寵渥太平民物到華胥參領脫吉納年六十卿雲糾縵綺霞開行慶恩從上日來飲饋道欣超燕禮帣鞲人共到春臺策名憶賦從軍樂錫福長逢獻夀杯臣在班中年最少幸周花甲醉蓬萊參領關保住年六十乾健而運厥體至剛貞元四德往復周行仰惟一人大道溥將年豐人夀俗敦化厖既洽郅理闡藴孔彰無息不息厥分誠明聖合天德夀與天長釀為吉雲醖為霞漿滲漉九土啿啿昌昌式啓嘉宴用襲衍祥參領觀音保年六十仁者樂山而夀聖人大德曰生鶼鰈南東洊至鳯麟郊藪畢呈天地本乎恆久福祉備以道亨六膳拜嘉何幸卷阿詩願載賡參領成德年六十絲綸溫語紀恩隆盛事稱觴遍百工虎衛今欣陪綺席龍旗舊憶拓雕弓騶虞化洽仁風溥鳴鹿聲和瑞露融此日耆英齊抃舞葵心長向五雲中參領扎魯岱年六十雉膏占鼎養鶴算慶同徵黼扆千齡會珍符萬福凝衢尊環海酌盤露向天承恩似長春渥年隨時憲增普天依浩蕩亘古頌升恆虎拜同叨慶歡心矢服膺參領尚維塤年六十盛典重逢慶自今小臣何以效葵忱身慙薄質程材劣運際中天戴德深瑞荷一人躋夀宇春融四海見天心惟期耄耋偕羣叟長聼南薰舜殿琴一太和祥靄繞瓊筵春殿晨趨集衆仙虎拜九重齊祝萬鳩扶五色倍盈千春臺樂共靈臺詠南極輝依北極懸更是龍光凝湛露醍醐沾溉及垓埏二參領集成年六十維清緝熙天子萬年照臨下土四方于宣錫爾純嘏有命自天春日載陽其車三千黃髮台背序賔以賢三夀作朋釃酒有藇既載清酤天子所豫笙磬同音簫管備舉肴核維旅維筐及筥于胥樂兮有秩斯祜小大稽首福祿來為飲酒樂豈莫不令儀為龍為光夀考維祺昊天有成命聖敬日躋率由舊章嘉賔式燕又思集詩經原任參領明圖年八十六重豆飲鄉賓省醴差國老尚齒肇有虞曲臺足稽考我朝氣敦厖曼夀錫蒼昊詔徵千叟宴樂愷符周鎬微臣覯熙洽邀恩弱齡早日食太倉粟鼓腹慙素飽至今榆景延悉荷鴻慈造作歌效康衢作詩續天保原任參領庫北年八十一和風麗日藹春臺五色雲承閶闔開耆叟三千齊拜舞繁禧錫自帝廷來一年年長日愛韶陽自喜年華九九長竊祿依依趨禁衛願年年獻萬年觴二原任參領英泰年八十昌符際熙洽天瑞承便蕃八柄以馭福敷錫欽至尊耆筵令日啓霑沃逮虎賁少歲幸通籍頍辨參戎幡仰稟神武律北幕西崑崙百戰厯晝夜歸叨凱宴恩勾陳環衛列左右依金根臣依圍三十二次自從賜間後曝背迎朝暾樗年啓八秩淑氣調三元延齡玉節杖駐景椒花樽願陳既醉頌華祝何足論原任參領蘇成額年七十七元紀龍飛五十年古稀天子德如天車書一統皇圗逺日月雙輪夀鏡懸制作聿新周禮樂平成增擴禹山川太和翔洽多人瑞鸞鶴紛紜集綺筵原任參領白靈阿年七十二瑞莢迓昌辰綵旭麗韶景九重湑宴開授几朝儀整法醖注宫壺芳肴積瑶皿微臣曾荷殳乞間安里井回思四十年素餐殷內省忽來蓬山遊瑶圖豁真境鳩杖快扶將逐隊奉朝請皓首荷殊遭寸忱託葵影願祝聖夀洪嵩呼迭引領星光耀南極丙位長冏冏原任參領周宗文年六十五鴈仗魚旃昔忝鈎陳儀衛頻依效悃齒逾花甲綴班恩被紫微玉醴載欣霑飫御煙慶引芬霏樗散仰邀鴻造葵傾喜戴德輝原任參領文彥年六十三南極一星明四海應夀昌聖人久道垂衣裳耆臣備列鵷鷺行嘉宴千叟流霞觴引年繩武宣重光九拜秩秩萬舞洋洋鏡圓仁夀花吉祥雲橑芝宇輝煌煌大樂既合大禮肅將帝曰豫兹受祜膺天慶及爾臣僚錫嘏是常臣昔掌印務丹砂願得延夀方望秋蒲栁迎青陽身退猶蒙恩澤滂得侍金華宴曝背知春長原任參領常德年六十一皇仁御寶宇四海安亭育雨露洽馮生奕祀蒙禔福維昔有夀宴欣衍依祁祝推恩載繩祖欽兹復敦復山呼齊曰萬歲始辰啓六恢以三千人瑞氣靄黃屋擎觴九拜中慈惠寬祗肅恩賜延洪庥瞻言韶景淑火器營翼長文德年六十六雷霆輥耀天光赩威練炎融超古昔軍儲嚴密列隊雄櫜鞬慎守臣之職年年秋獮期上蘭勤訓飭玉露及金風紫塞扈清蹕岡巒蔚鬱靈囿開敬奉魚麗兼鸛翼太平熙洽憶萬年聖仁豢養隨珠勒獻歲春風和欣逢嘉宴錫昌朝多瑞人環樞光轉翊南極一星夀宇長離明積照恢文德笙簧酒醴淑氣孚湛露恩深感何極委翼長喀巴年六十一熙熙春臺積和煦萬方祺夀同歌舞愚臣一介羽林星祝頌曾聞九如語憶昨天聲揚逺陲身經百戰荷戈隨臣曾打仗一百八次微勞纍積雲騎尉臣議敘功牌功牌賞給雲騎尉仍剩四策勳慙未搴將旗歸來飲至趨華殿拜捧朱提輝繡段臣忝入凱宴得緞六銀百兩光榮不敢説衰年今日蒙恩錫嘉宴長筵鵷鷺與貔貅升平歲月總優遊西極蒲梢服天皂玉禾飽饜崑崙邱健鋭營翼長舒臣年六十宫雲絢曉漏沉虯簪笏聨行待殿頭徑旅每承天語奬衰年更荷主恩優鑾輿扈蹕弓開韘雁磧銷兵劍脫鈎時節太平人夀凱九垓長此慶金甌園圓明營總伊常阿年六十承恩歌舜日叨宴列堯階萬國衣冠會千官羽仗排青陽暄物態皓首荷宸懷幸預稱觴末春風鳯管諧園圓明營總竒成額年六十二寵詔優耆耋堯厨錫賚均賁逢需宴日俱是泰亨人早歲從軍樂微功獲賞頻臣曾出兵打仗十九次殺賊六人得功牌二壯心隨綺甲華髮慶元辰綵縷宫縑錫芳軒禁臠陳千行同祝嘏萬象普回春瑞露凝朱草祥雲護紫綸共欣仁夀宇星萃燦龍麟園圓明營總二逹色年六十二鳯紀昌期應鴻圖瑞景融葵傾當旭旦椿祝應和風夀宇恩齊被耆筵典更隆微臣叨彩衛隨仗效呼嵩園圓明營總薩爾圖年六十一九門閶闔開綵旭曈曨曙玉醴飫瓊筵恩膏溥湛露億姓騰歡謠八紘咸暢泝古稀聖日新健行協天祜耆艾獲均霑千載此一遇小臣樗櫟材執策隨輦路何幸沐榮光蒲柳依溫煦欣瞻萬福皆拜伏聆韶頀園圓明營總那顔年六十天家慶被萬方覃熙宇春生淑景涵福衍九疇敷用五燕開千叟數涵三仙園夀鏡依光近紫禁長筵酌醴甘環衛清街欣奉職仰瞻珠曜麗弧南園圓明營長三逹色年七十五蓬萊佳氣入春妍糾縵卿雲捧御筵曼夀佛開千佛會老人星焕五星聨龍飛策衍乾元數魚藻詩傳愷樂篇稱彼兕觥齊獻祝拜來螭陛擬登仙兵蘭幸長勾陳列嚴衛親依禁籞前身傍璇霄琪樹璨光含仁鏡寶華懸幾重山翠圓名嶠第一春波玉瀉泉偏喜周廬環福地况承嘉宴奏鈞天原任水師協鎮彞靈阿年六十八於皇受命贊化育敬天天畀無疆福鳯紀書年大衍符五世一堂膺茀祿嵗惟乙巳月建寅廣播恩綸逮羣牧垂紳委珮集高年拜舞彤墀膏露沐臣昔分營𨽻水師艨艟組練揚旗纛聖朝威德播逺方天吳陽侯均飭服但承英簜攝鯤鯷不藉干鋣截鴻鵠恭承異數朝闕廷擊壤謳歌聞鼓腹於萬斯年樂未央長欣東海添籌屋原任協領七保年六十五大圓鏡內敷仁夀浩蕩同登熙世春俾爾艾耆欽聖賜于焉愷樂遍臣鄰乾符洵自包河洛人瑞由來勝鳯麟幸𨽻羽林供協贊天家懋典仰璘彬原任鳯凰城守尉潭保年七十九金甌式鞏寶籙長延曰夀曰樂如山如川氣調鐘籥祥昭日躔詔褒衆叟恩覃八埏俾沾仙醖載飫瑶筵小臣食祿垂六十年搴旗擐甲莫效微涓感深挾纊澤被無邊載拜蹈舞聖夀符天原任岫岩城守尉剛泰年七十星拱龎眉列觚稜郁曙曦臣年符絳老化宇協春祺綏萬書膏飫論千集夀耆從來沙比算况際日重熙式宴羣仙接依光小草知滇雲曾荷戟洱海憶搴旗並點干城責欣逢偃伯時班齊馮翊尉鑰忝岫岩司山海輸華祝臣前任岫岩城守尉為山海要區雲天荷聖慈願從㲈奏裏敬上萬年卮太原城守尉永明年六十一珠囊期泰寶籙運隆莢榮堯日徽譜舜風耆英集闕台耉呼嵩無疆介祉久道延洪引年巨典式宴禮隆長筵晝啓瑞旭春融幸陪曲宴預祝華封如川方至如日再中八埏額慶四海來同王府長史明祿年七十七大鈞覆物澤遍邇遐臣猥弱質遊泳聖涯入忝榮秩出乘戎車臣曾出兵一次逮兹華髮稽首拜嘉湛湛仙馞妍妍日華皇慈茂蔚賚及臣家朱提燦雪紫綺流霞敬依華闕嵩祝有加王府長史烏龍阿年七十六鳯城雲景接蓬萊佳氣蔥蘢夀宇開末秩叨隨藩府後餘齡欣接御筵來瓊階啓曙光分座玉盞浮春暖潑醅杖飾仙鳩分隊集錦標瑞鶴共齎回祥徵五世昌辰萃算倍三千福履該飽德幸承天賜渥小臣何以答涓埃王府長史博爾明阿年七十三辰麗霄漢九野輝璇璣始和春陽映際曉湛露霏皇仁洽區域鼎養萃耄耆蘭肴設芬馥玉醴揚甘馡巨典擴瀛海異數昭雲逵盛朝億萬載愷澤隆前規微臣荷陶植長養依祥輝載拜輸丹悃聖福逾軒羲王府長史五十九年七十瑶林小草粲春葩雨露霑濡未有涯蹌濟簮纓隨鶴列同來天上酌流霞一龍樓向曉吉雲開親見天天顔有喜來聖夀萬年綏五福康衢謡已遍埏垓二王府長史永安年六十九紫禁瓊筵啓和羮錫上方瞻雲開雉尾近日荷龍光養性鳩扶杖為儀鷺序行萬年欽法祖盛典邁羲皇王府長史留住年六十八文昌鬱雲興昊天降豐澤垂慶惠皇家慶泰欲重疊風動萬年枝流雲靄青闕列宿正參差神仙排雲出舒文廣國華芳風被鄉耋金樽盈清醑列坐金殿側竒齡邁五龍瑶草正翕赩泠泠祥風過吹萬羣方悅集文選句王府長史舒林年六十六仁夀覃敷頌聲蔚作屋紀蓬瀛籌銜瑞鶴龍墀錫宴耆頤愷樂昊天祐命歲啓璿籥聖人無逸日強奉若臣昔隨班肄圍景爍行殿秋風屯煙萬幕仰見神弓飲羽拂鍔習勞講武煒煌謨略今兹良辰叨侍飫酌緯席拜跪禮容三爵祥光俯照起衰矍鑠顧咏恩私葵忱雀躍王府長史誇色年六十六律轉兮東風春來天上蓬萊宫尋常杖履不可到此日欣隨庶老同呼嵩九英梅獻嵗六葉蓂開砌幾番風信試燈前雪晴鳷鵲韶光霽含黃柳色映青旗班白人來覲紫闈誰到鈞天聆廣樂仰見瑶閶詄蕩爐香馣馤而霏微聖祖錫百福華筵歌夀愷六十餘年更見今熙重洽纍康寰海靈臺偃伯焕文明匡敇幾宜百度貞肇建辟雍躬釋尊先開廣內會耆英吾皇纘述光前緒舊典以時重修舉臣沐恩深録棄瑕臣前任內管領革職蒙恩録用厠身重簉鴛鸞侣中和奏九㲈禹膳飫分調玉肪寶餌生不知其味雲漿斗酌英瓊瑶衎衎飽德兼醉酒番番台背與黃耉羣向堯階拜稽首敬上聖主如天萬萬夀王府長史富代年六十一紫殿巍峩敞帝居綺筵黃髮遍階除廣延東璧西球瑞逺軼金繩玉檢書復旦星雲賡八伯敷天粟帛捧千廬春歌湛露霑豐草蓂莢剛添六葉初頭等護衛福僧額年七十九聖夀越萬紀國慶開億年天五與地十璧合復珠聨恭逢上章庚萬夀夀同天厥歲紀在五五緯昭辰躔越兹旃蒙乙鳯紀十曜宣聖齡粵躋五五位剛乘乾敬惟五與十天地同方圓今歲際五十泰運天之先古稀晉五福介福增如川黃帝製甲子嘉祥詎同駢刪書斷唐堯未聞幾此焉四海萃百齡錫宴盈三千敬繹五十紀上貢苞符篇頭等護衛巫靈阿年七十八鴻化允迪福緒日溶景緯協紀八風循通嘉會黃耉錫宴斯隆仰繩祖武俯洽臣工一穆穆天容時和則樂祁祁羣老修儀則恪備禮曰豐恩溥六幕蘭肴孔馨醇醴命釂二柏受甘露古有瑞徵光兹誼軌驗彼祥經若操圓桴響應于聲延禔萃祉嶽曜川增三頭等護衛阿爾遜布年七十五綺筵肆啓簇春盤綵仗風和候玉鑾集慶一堂開五世延洪萬夀宴千官明光執戟承恩渥僚寀稱觥洽衆歡忭喜耆齡逢盛事扶鳩蹌濟列朝端頭等護衛關保年七十五龎眉皓首慶喬年捧爵欣依御仗前天子康強人樂夀宜春苑裏敞雕筵一南極新杓指夀星春先十日到彤庭太平景象舒醽醁長祝天祺萬萬齡二頭等護衛富倫年七十二惟春伊始惟日正中開仁夀鏡扇長養風四方和會萬福攸同祥先蟄啓户闢昆蟲周甲逾紀含煦淳龎際兹嘉會浹宇延洪期開剪勝典洽呼嵩萌勾折甲小草蘢蔥羣依若木化日沖融敬獻葵祝人夀年豐頭等護衛四格年七十二玉陛春風靄銅鉦曙色明崇年開廣宴上日會耆英鵷鷺霑優賚韶韺奏慶成承恩綴蘭錡拜舞竭微誠頭等護衛阿肅庫年七十一新陽獻初歲良卜月在寅吉日人日前和氣凝紫宸芝蓋天中央扣砌羅臣民鮐耆頌至德珠璧聨光勻神漿挹沆瀣寶露沾玢璘優遊太平世嵗沐皇家仁喬齡列雷宴邃古誠罕倫頭等護衛石逹色年七十二聖人之夀昊天所右度越六帝維德之茂聖人之阼大衍既裕象所不知而況滋數聖人之福瓞綿慶篤曾元來晜億載詒穀聖人之文昭漢麗雲戒為堯焕歌為舜薰聖人之武大啓疆土懷凖柔回金川編户聖人之世日月開霽民安樂康物無疵厲治至聖人飲醴啜醇五帝之夏三皇之春乾闡其符坤流其珍山出器車藪遊鳯麟用錫眉夀燕洽臣鄰願億萬年長如兹晨頭等護衛阿三年七十一紫極高垂拱華封工致辭聖人敷福夀五代開金枝濟濟鴛鷺行青青松柏姿時維孟陬吉錫福歡瑶墀玉琯吹黍律金支揚鸞旗鴻運積元會愷樂頌雍熙小臣濫榮秩欣言捧瓊卮階下三千人同傾藿與葵頭等護衛武通保年七十一繽紛華髮集丹墀龍紀旃蒙五度時上日六晨云卜吉作朋三夀用為儀班依護衛惟循分圖入耆英喜捧卮北闕湛恩漸被廣老人星燦拱南離頭等護衛烏雲保年七十一盛典優耆耉齋心嘏協純衢原同飲醴臺許盡登春涵演重熙久中和六氣均鴻儀光郅治優渥逮微臣頭等獲衛阿爾法年七十開夀宇啓長筵斂育敷錫引大年聖皇曼夀仁如天恩如春陽溥無邊黃髮台背拜手稽首申祝虔鴻鈞恢雨露覃施及垓埏無生不育靡性不遂詎論山陬及海壖況當和風生律琯回春妍珠囊寶鏡萬載懸皤皤之臣盈三千率隨鵷鶴列齊奏擊壤康衢篇頭等獲衛京文泰年七十薄海遵皇路鴻模仰化成堯尊欣再設軒甕慶長盈六日華筵啓千班瑞靄明春隨眉夀集嘉氣滿蓬瀛頭等護衛七明年六十八耆筵冠蓋盡仙班法曲鈞韶霄漢間日麗風和春盎盎童顔拜舞覲天顔一瓊漿仙瀣勝醍醐拱極星文戴斗樞長夀幢邉雲五色萬年天子渥乾符二頭等護衛巴格年六十八三陽開旭景千叟拜彤闈地近卿雲爛恩深湛露霏荷戈慙駑蹇列坐有光輝試看南弧瑞朝來映紫微頭等護衛曽生年六十七曈曨曉旭觚稜起瑞氣霏微曙雲紫南極珠聨拱北垣長筵正設明光裏聖主龍飛五十春湛恩廣被光風辰峩冠列坐皆國老扶杖再拜多耆民次第杯盈上尊酒郁芬几溢天厨珍香山洛社何須擬鎬宴汾歌未足陳盛事古今真莫並樗材得逮尤深幸萬年琪樹鬱枝柯栁宿分光依玉井渥澤霑來霄漢濃爐煙滿袖靄春風承華久備櫜鞬列奉爵歡歌鵷鷺同頭等護衛佛保年六十七春奉弧南列宿曉隨羽衛金門萬國被鸞文錦通衢飫鳯凰樽耆夀惟皇所鍚謳歌曰帝之恩華髮從容賜爵龍光遹遍乾坤頭等護衛費揚阿年六十六龍飛五十春連衢歌帝力萬歲效嵩呼千叟分鵠立鍚宴笙簧宣拜手欣就列輝煌張慶筵時維孟春吉天閶北闕高玉律東風入歡隨耆艾倫微分驚殊溢禹膳甘以腴堯樽香有飶斂鍚福自天太平長此日舞羽三階前恩波浩何極頭等護衛永安年六十六初頒鳯紀歲華新六莢開蓂應吉辰玉陛筵階瀛海樂禹糧堯韭總含春一久膺冠組沐恩波列預三千福夀多五色雲開添絳氣華堂芝彩玉山禾頭等護衛恩特合莫年六十六衢尊酌元氣萬物開繁昌至德被海隅宙合皆福祥舉世登春臺鶴算慶浩穰初和逄盛典式宴齊鵷行藻魚邁鎬飲酌兕逾豳堂辰輝拱帝座南極煒以煌跪捧百福卮祝帝增夀康頭等護衛三布年六十六四代盛王聞尚齒虞燕夏饗殷食禮周人修而兼用之米廪膠庠傳議擬國老庶老數莫紀三五之説後所倚豈如聖皇億萬春春風赴闕三千人飲以甘醪飫以珍貴爵重齒手賜醇堂亷一體臨臣民聖皇古稀夀晉五國慶同天天所祜巽命重申繼祖武史䇿前聞軼萬古臣聆廣樂到鈞天欣預彤階八百筵敷天粟帛同飽暖身在重熙纍洽年頭等護衛西拉布年六十六校藝深慚未出羣榮邀帝賚挹祥氛層霄福與濃膏被祕殿筵偕旭景分典緝重熙鳩列杖慶延五葉瓞垂棻蓬壺佳氣春無量萬象迎韶傍紫雲頭等護衛白達色年六十五聖德範太和垓埏合泝暢華髮蒙庥祥寵祿自天貺嵩呼壤祝萬國貢微忱鳯舞鸞歌至治歸欣鬯載稽往籍昔未有鶴侣三千鍚宴依瓊仗和風初鼓舞春日正怡愈惟歌日升月恆頌不藉金泥玉檢書更效李沖上千萬歲夀祥麟神雀常見聖皇都頭等護衛新普年六十五鳯城丹詔聽頒酺令典欣占惠有孚春滿千筵人矍鑠祥開雙闕澤覃敷螭頭瑞洽龍顔喜鮐背歡騰鷺序趨列坐盡叨靈夀杖行杯更飫大官厨六旬算衍榮縑帛卌載恩承飽俸糈臣食俸四十二年化日舒長純嘏茂正聞歌頌遍康衢頭等護衛海會年六十四彤雲擁日麗層霄嘉會雍容典懋昭寶鼎祥氛凝斗極盈階仙珮肅官僚中厨萐脯徴堯瑞編琯笙簧叶舜韶臚愊羾歡齊拜舞萬年玉燭慶長調頭等護衛孫榮年六十三貞符值嘉會帝德邁軒羲自天鍚綺宴雲開五色芝泰運徴久道寅月布春祺星垣列羣耉輦轂萃衆耆逺及薄海外趨走依階墀鳯紀億千春拜跪祝迓釐天地共氤氲佳氣盎若斯榮華被六合景爍瞻光儀頭等護衛塞得喜年六十三福錫庶民會隆佳節眇眇祥雲霏霏絳雪春殿生溫天厨孔潔碧眼方瞳期羡在列小臣卑陋幸從耄耋珍祕駢蕃醍醐清洌式歌且舞雲中雙闕頭等護衛富蘭保年六十三元旦恩推紫極六辰宴錫彤闈虎旅銀牌耀雪耆民錦匹添緋列宿三千拱斗天顔咫尺瞻威小臣榮叨春爵羣依蕩蕩巍巍頭等護衛阿克敦年六十三卿雲糾縵日光華南極星輝拱帝車聖代引年多異數宫壺拜賜逮千家一輇材何幸得追陪玉液恭擎介夀杯扶杖相看增矍鑠萬年天子賜酺來二頭等護衛文寶年六十三三辰麗八風調東方祥風風首條明庶物運七杓乾坤清寧萬象昭景運溢中天蒼涼霽日上九霄詔開閶闔延佺喬三千蔑不周醇醪逺逮廣莫繽紛恩膏慶依虞陛聽簫韶八風體頭等護衛胡林年六十二華髮瞻文陛春風入夀卮一人膺曼福千叟祝洪釐愷宴騰鳬藻鈞韶協鳳儀趨蹌偕衛士擊壤效陳詞頭等護衛明玉年六十一鶴髮垂肩鷺序分御香春殿繞氤氲從教下乘仙班末一樣敷茵列五雲一元正閶闔麗祥輝晴旭蔥蘢焕紫微長頌升恆遒百祿乾符坤寶擁瓊闈二頭等護衛鶴青年六十柏葉瓊卮泛梅花玉砌繁共瞻卿月座齊拱夀星垣福衍千人算祥徴五世孫微臣虔頌禱周甲荷鴻恩欽定千叟宴詩卷六
