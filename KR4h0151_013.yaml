body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年卷八預宴九十四人詩一百六首副參領五達色年六十九拜手祝三多願告華封老今昔多殊科祝曰願聖人夀我皇之夀方如初日升陽阿法天行健強不息即以宵旰為頤和祝曰願聖人富我皇之富藏富在民無偏頗深宫節儉普蠲貸損上益下涵恩波祝聖人多男子我皇祥麟威鳳五福堂前羅五代孫枝方衍慶曠古玉牒未見人編摩臣今鬢髮黃且皤幸與夀宴顔醉酡良知四海老人祝聖有大願告炙背之樂各自安婆娑華封之祝衍作歌今日慶比堯民過副參領李珣年六十九鞗革載歌君子彤弓以饗元侯何幸戎麾參佐得隨嘉宴觥籌聖主釐申曼羡小臣卮獻帣鞲億萬齡周甲子八千歲紀春秋副參領武正泰年六十六夀宇鴻開樂燕胥熙怡耄耋會簪裾春和天語環階聽羣頌升恆日月如一雲開紫禁肅千官良醖珍羞愧素餐共識陽春初布澤萬方樂奉聖人歡二副參領蘇爾達年六十八萬年觴捧螭陛百福筵開蕊宫飛控金羈尚健飽餐玉饌何功坐聮國老庶老人舞仁風景風共識天顔有喜向陽齊獻葵衷副參領德楞額年六十七於皇聖祖仁治道豐耆筵普饗闓澤融融嘉樂君子運會日中繩其祖考惠我臣工稽古典謨養老有則肆筵授凡杖鄉杖國維兹良辰詠和蹈德舜樂堯樽歌我帝力天漿桂馥仙帳蘭馨風翔雲鬱環繞御屏既醉既飽虎拜彤廷何以祝之夀考且寧副參領文德年六十六南極星輝北極崇春臺處處扇春風帝城曉日開新霽暖律初吹玉殿中一杯斟玉液酒如淮既醉咸歌福孔皆更荷駢蕃頒寵賚林林期羡拜金階二副參領巴彥岱年六十五舞階銜夀酒列宿頓輝光交合丹青地風生錦繡香紫微臨大角白日到羲皇萬象皆春氣神功接混茫集杜甫句副參領文治年六十五玉液千觴玉陛稱恩周率土夀同登椿年何幸容蒲栁復旦長瞻旭日升一兩隊歡聲溢拜嘉三千叟各醉流霞人間喜向春濃處共覩祥雲是帝家二副參領富僧額年六十五大酺廣樂宴官曹謭陋何期異數叨蹶茂春前似蒲栁導和天上有笙璈長楊從獵馳秋騎仙仗隨班耀錦袍糜祿已欣添馬齒恩榮况預酌瓊醪副參領那福年六十五聖人統元大千樂夀迪惟前光治隆典懋瑤戺蘭㽔蘿圖松茂瑞景熙和嘉宴耆秀太極函三數符千叟蘭尊載陳宫懸式侑臣列參佐戎牙是副仰荷龍光欣聆鈞奏元縡甄陶八紘在宥於萬斯年天惟純佑二副參領陳廷璧年六十五天澤覃敷遍海隅春朝吉語聽頒酺乾坤浩蕩難摹繪願獻堯河五老圖一圖傳五老燦中天頤養還知遍大千紺髮方瞳齊作伴躋堂直到聖人前二副參領常德年六十五喬松期羡列如雲乍啓韶光已十分姬囿騶虞仁廣被堯階蓂莢瑞頻聞園官恪守名思義臣侍直圓明園淳俗名彌質濟文稱萬夀觥歡拜舞碧霄晴靄布絪緼副參領七十五年六十五乙躔鶉火次丙曜大弧前夀與春韶應人從玉陛聮饌分仙鼎味衣繞御爐煙願比華封頌長依萬萬年副參領保住年六十五春回玉律芳序樂奏璇琯鈞天錫極箕疇福五稱觥豳雅人千螭坳拜舞雲煥鷺序趨蹌瑴聮恩寵仰邀稠疊京垓長頌羲年副參領文保年六十五春風初上萬年枝耆老聮翩拜玉墀渥賜欣欣承曠典益知身世勝軒羲一齒序三千歲不同臣周花甲共呼嵩從來草木稱嘉瑞全荷天家長養功二副參領增德年六十四千叟筵開瑞景凝弧南朗曜叶祥徵深宫共仰純禧懋寰極咸看上夀登丹詔十行春靄靄金枝奕葉慶繩繩願隨擊壤偕歌咏如阜如山莫不增副參領佟保年六十四聖主當陽日彤弓福履綏引年彰盛典錫福懋隆儀宴樂占雲上恩膏頌露斯良辰寅肇正吉日丙為期舞鶴諧韶奏羅鳩叶夀眉微臣霑愷澤驤首祝春祺副參領色爾明阿年六十四普錫春祺敞御筵日華雲爛正中天萐厨瑞聚三千叟蓂紀祥開五十年酒賜延齡恩湛渥杖携靈夀福增延傾葵幸仰龍顔近醉飽長叨聖澤宣副參領都隆阿年六十四聖德孚穹昊寰瀛玉燭和羣黎霑化雨九宇湛恩波鳩養耆而艾魚麗旨且多升恆祝天保醉飽頌鑾坡副參領六達塞年六十四勾萌鬯達荷滋培恩共春從天上來王字日方輝九宇老人星共擁三台珍符疊為昌辰獻仁夀原於至道該鳯管龍笙仙樂動頌南山更咏臺萊一卿雲糾縵兆春辰齒序三千鶴兩行劍佩爛榮金仗彩簪纓濃帶御爐香瑤階早晉南山頌綺席同浮北闕觴共效葵忱輸祝嘏萬年景福煥祥光二副參領敬文年六十四錫福厥庶民斂福由皇躬夀宇極蟠際遍九野九共遂蠲大衍吉詄蕩開法宫三千集耆耋賜燕羅羣工髙爵夾皋禹外吏招黃龔士農年及格商賈業各攻笙瑟肄鹿鳴鐘鼓設彤弓清齊三爵泛珍膳六豆供龍光以燕譽氣和禮益恭庭皆安期生野有東王公始知春長養大矣造物功一韻體副參領六十七年六十三夀宇宏開宴恩波洽九州韶年書紀鳯耆老杖扶鳩珍膳天厨啓醲膏玉斚浮嵩呼承慶澤海屋遞添籌副參領富廣年六十三韶春嘉宴樂時雍仙樂初調緑酎濃皓髮千行依舜日矞雲五色煥堯封恩覃薄海歡逾洽慶衍天家化更醲自顧微臣同小草欣霑雨露鬱蔥蘢副參領那彥圖年六十三爻閭赫奕張雲棟瑞輯金船㵼銀甕羣臣雀抃共朝天鮐鯢背齒顔梨凍我朝王會歲可圖似此春光自古無紀恩願繪三千叟福夀咸蒙帝允俞副參領二達塞年六十三春風遍地沐殊恩夀愷嘉筵惠意敦銀甕萐厨霑普渥瓊漿玉液喜便蕃幸陪虎旅環宸極更簉鵷班近至尊既醉歌成歸儤直回瞻瑞色繞天門副參領希靈阿年六十三泰山不足髙滄海不足深苑麟亦常獸阿鳯亦常禽琪花瑤草徒作林雲芝露术徒産岑何如我皇德化翔洽八維之民心仁敷夀亘覩象聽音熙熙于于忘德之欽舊章千叟宴兕觥受酌斟三千一庭朋盍簪又昔所無始見今臣受賜頌德繹且尋願皇譜此蟠天際地之運會一一絃入薰風琴副參領竒理格忒年六十三紫宫何峥嶸辰輝蔚飛揚坱圠蒼精聚蜿蜒翠氣翔仙境啓閬崑夀星明角亢單厚戩穀宜優遊純嘏常既錫豐崇算爰晉茀祿觴耆齡樂無極慶賚普八荒副參領殷世林年六十二盛世昭人瑞雲端敞御筵龍飛春五十鶴髮叟三千北闕瞻依切南山頌禱傳億齡歌聖夀詎僅羡彭籛副參領常新年六十二清曉鳴鐘集鴛鷺麗日和風溫室樹紫宫華宴敞需雲白髮長年歌湛露古稀天子夀而康五世麟振福緒長柏葉行杯分御酒梅花拂座散天香小臣無似備旗職曉漏晨珂趨左掖正隨步武接雲霄更覩光華依日月升平樂事萃昌辰沐浴謳歌六十春試向南弧占彩滿爭來北闕紀恩新副參領李煥年六十二建極皇猷煥敷天夀域開祥光聮五緯瑞氣靄三能濟濟霑蕭露雍雍集耉鮐捧觴同抃舞錫福慶埏垓副參領福住年六十二玉陛祥飈輯瑞慶霄湛露飛甘箕疇陳福有五華封進祝維三耆老呼嵩斗北頤年獻夀山南聖德賢堯舜逺皇猷與天地參副參領印保年六十二皇仁逺播八紘就日道率由庚運嫓太乙青陽調吕東風應律鬱鬱蔥蔥鳯五麟七雲罕星廬周環璇室春慶無疆福來如櫛宴以示慈自天祐吉欲紀盛典慚無鴻筆副參領六十八年六十二夀星連亢映角弧曜出丙入丁環海人同矍鑠陳疇天錫康寧三爵愷傳鎬藻六龍近拱堯蓂蹌濟耆生碩學歡歌軒陛虞廷副參領陳芝年六十一盛典紹鴻業闓澤欣滂敷皤皤三千叟矍鑠彤陛趨登臺既以春酌尊如在衢大烹象占鼎宴樂義取需近光咸肅拜既醉偕歡呼惇史紀瑞應夀昌嫓軒虞副參領烏靈阿年六十一慶霄康爵慶重重冠佩三千喜氣濃坐近日邉逾挾纊恩敷天上許扶笻五更欲笑桓榮禮九老尤超白傅蹤人瑞國華開曠典行瞻璧水聖臨雍副參領鄭咸吉年六十一聖代隆羞耉筵開紫禁中恩榮九宇遍典禮兩朝同觴引瓊漿美盤供玉饌豐小臣叨執戟歡忭效呼嵩副參領全福年六十一雍容神雀翔璀璨文芝發濃雲護紫闈麗景暉黃髮敷席區墄平滌豆調甘滑瀛嶂繹會同鍪笠通典謁殊恩古未聞率土逺不越邐迤來佺喬瞻竦芙蓉闕副參領克蒙額年六十一穆穆大典蒸黎寵洽近天子光注長生牒饜飫拜舞醴芝肴萐臣職星萃榮依韎韐昔忝成丁兹逾周甲臚頌恩膏岱嵩崨嶪副參領那思圖年六十二碧落升持節黃庭坐隱牀臞仙無足羡春宴正迎祥同列朝金闕重霄捧玉皇應知蓬海上願共沐恩光副參領明住年六十一物之瑞兮甘露靈芝人之瑞兮耄耋期頤恭逢夀宇遍九有但見龎眉鶴髮濟濟來昌時吾皇端拱敷蕃禧三千之叟趨龍墀兼珍羞御膳仙醖酌金卮春臺熙熙春日遲遲願祝聖夀萬億秭敬賡喜起陳歌詩副參領拉卜竒岱年六十一恩詔賁龍章韶春開鳯紀九宇荷天恩萬年駢福祉扶老杖刻鳩錫宴觥稱兕嘉肴既孔多夀酒亦云旨覆載聖恩深雲日天顔喜小臣被寵光拜手陳巴里副參領達桑阿年六十大地春和扇殊恩錫九重瓊筵頒秩秩黃髮會雍雍瑞洽需雲藹樽㪺湛露濃耄耆咸飫德純嘏頌如松副參領拜綳阿年六十瓊樓旭日啓瞳朧鶴髮聮翩拜舞同肅奉皇恩承玉斚趨陪嘉宴賦彤弓萬年運兆鴻圖逺五葉祥開瑞牒隆優渥天施何以報玉爐香裏效呼嵩副參領西凌阿年六十開紫闥溥華樽言隨籛偓同覲軒轅春蓂開六莢歲德曜乙垣合天地人祝夀統運會世唯元三千朋裏臣年少花甲才周便沐恩三言至七言體原任副參領科升額年七十六皇帝至聖燾冒包兼南諧北燮東被西漸臣自部曲鼓奮戈銛恩賚駢疊霡霂優霑時和且阜物熙以恬昌期泰協禮宴需占帝庸作歌喜洽堂廉臣拜稽首小言詹詹佐領扎爾泰年八十五率土樂期頤承恩傍玉墀德光春發育澤比雨蕃滋酒挹金莖露花開玉樹枝普天瞻聖藻賡載九如詩佐領郭興阿年八十三春祺錫闔閶春晝聖恩長獻瑞千班仗含醇百福觴風傳仙漏韻雲擁御爐香自愧枋榆質來參鵷鷺行鈎陳森作衛華蓋逺垂芒渥澤叨稠疊賡歌喜拜揚佐領尚廷棟年八十一雲閶晴布三素芝閣春蕤九光獻瑞鳬趨恐後沛恩鳯紀方長賡歌喜起千載衍慶雲仍一堂共樂華胥國土敷天景福穰穰佐領馬國宗年七十七衍莢斟元環周甲子聖人曼夀自今以始夀宇鴻開春臺燕喜朝有黃耉野有耆齒帝周敷錫咸受爾祉吉阼五十往牒孰㜶佳會千叟熙朝再紀纘述前徽暢泝隆軌臣職旗籍趨陪華戺曽列戎行兹霑宴酏天保詩陳卷阿音矢雲縵星暉貞符志媺佐領賦泰年七十六七旬萬夀庚子年臣叨晉級天恩駢五閲歲陽今乙巳煌煌丹詔舒九天兵民宿齒遍恩賞大段精鏐寶楔懸一丁侍養始七十八十米肉絹與棉九十期頤加遞倍旅錫旗籍臣職專臣齡例得與恩宴春風拜舞人三千無論入宴未入宴敷天耆耋均陶甄國家休養復生息仁育義正禮樂宣五年迭一周慶澤逾億萬紀常常然九州萬國合抃祝臣效丹悃依華筵佐領貴保年七十六咸五復登三隆恩慶普覃春風先剪勝令節繼傳柑宴集千班盛恩深四海涵樽罍依御席寮寀盍朋簪瞻拜儀初肅醇醲詔許酣微臣真厚幸皓髮預朝參佐領色克年七十五皇躬萃萬善法祖事必述髙年韶集宴始和用諏吉宫雲靄天髙仙侣聮坐密師濟齒攸崇舞蹈樂之實瑤席香浮浮玫砌禮秩秩覆載照奉三清寧貞得一願附九如歌賡揚太平律佐領黑達色年七十五聖夀無量皇仁誕敷爰集華髮共飫天厨千叟俱來鶴步鳬趨既醉既飽以怡以愈衰齒承乏自維朴愚韎韋隨蹕櫜弓以趨臣隨圍十九次兹陪宴醑勝酌屠蘇於萬斯年敬效山呼佐領福善年七十五穆清仰行健斡運成四時施為春雨露太和含華滋聖人體乾德保合均無私需雲上流蔭式燕登龍墀嘉肴飫翠釜旨酒浮金卮鴛聮千叟溢眉夀歌維祺臣班列校後獲備禁旅司願陳萬年祝長近萬年枝佐領穆哈善年七十五叟集三千籌是海歌賡八伯慶為雲辛盤老飫天厨膳舊屬弓刀𨽻領軍一恩榮喜得步金閶列職星垣嵗月長萬户春風羣洽喜人人樂夀迓蕃昌二佐領訥清格年七十五金紓烏翮碧紓蟾春景遲含化景恬難老定從疏仡紀疑年肯使絳人淹未教則百堂顓美便受登三頌尚謙愷飲羣歌魚在在臚歡慶洽鳥鶼鶼夀卮晉向天容近法部聲徐羽仗嚴內膳擘來芝脯腝上尊承處蔗漿甜豈煩顔駐尋丹訣且喜頭銜署緑籖待矢好音賡雅頌自慙健者屬韜鈐佐領白啓圖年七十五慶錫光天樂事同班隨人瑞景怡融螭坳饜飫髙深德鶴髮聮翩矍鑠翁玉醴甘馨滋湛露瓊筵和鬯普春風紫霞杯進升平頌稽首賡揚聖治隆佐領富德年七十四久道聖化成寰宇均祉福九重迓繁釐百爾多耆宿獻歲詔開筵雲日麗清淑蓂葉數方盈椒花頌餘馥龍墀盛樽爼鷺序簇章服番番衆黃髮瓊液霑美祿微臣效奔走皓首恩偏沐幸此拜堯階願效華封祝佐領何綳阿年七十四蕃釐普錫共延洪長在熙春煦育中帝澤汪涵千叟慶衢歌忭躍九垓同香煙暖映曈曨日廣樂和音明庶風幸飫芳尊逢盛典榮霑世祿荷前功臣叨騎都尉世職職叨旗戶欣駢衍身近天家荷覆幪拜手虔依衢壤祝聖人曼夀麗高穹佐領喻達年七十四啓籥歲華新青陽始上旬延祥依樂夀錫福遍臣鄰接席陳三雅堆盤布八珍玉罍餐沆瀣金奏叶韶鈞私愧尋常質沾恩六十春對揚叨簡末深幸際昌辰佐領劉永照年七十四中天遲日麗鳯闕氣佳哉拾級聮翩至呼嵩次第來計年欣矍鑠飽德慶恢台饜飫臣鄰洽祥風遍九垓佐領巴彥都年七十三筵開雙闕藹曈曨臚讚千班肅曙風五色雲端傳鳯綍古希天子慶延洪一杯斟元圃三霄露杖倚台山萬歲藤翔步乍驚凡骨換蓬萊親到最髙層二佐領佟泰年七十三豹尾呈輝滿螭頭錫宴濃百齡兼耄耋四極達畿封並入層霄座都㪺寶露濃惟南歌聖夀丹悃矢虔恭佐領黑達色年七十三梧岡翽鳯集朝暄五十年春慶紀元福備一人開夀宇化涵六幕遍仁恩大年周甲例稱叟上齒逢辰號達尊溫室晷延暉盎郁卿雲旦復彩紛緼老因晉爵天家盛賤不遺農至意存樽酌醇膏霑露液琯調鈞奏叶雲門尊三記訂儒先舛見老記御製三吹萬風行禮教敦榮及微臣濡闓澤紫垣髙處景星繁佐領佛住年七十三聖人出海宇昌德曜中外威鬯四方般般既有獸噦噦復有鳯瑞氣降芬蘭戺珍露呈味瑤房朝元千叟蓬萊殿白髮欣欣拜紫皇佐領富森布年七十二天人一氣由一理純固敦龎即泰始在天景星與慶雲在人華髮兼兒齒年逾周甲得稱夀夀過百齡真瑞矣藝生同在大宇中盛世常多百歲翁自從大撓作甲子孰綱維是詢鴻濛臣聞聖人一天也溥以耆齡錫天下直教淳朴過羲軒疇勿康強等嵩華春風初至夀筵開三千醰醰饜緑醅海隅出日識天近東西琛賮咸麋來小臣榮忭琅霄裏元氣絪緼挹斗魁佐領西平年七十二春風煥綺筵藹藹禁城煙盛事髙王會繁星祝帝年紀連周甲六人預作朋千大宇同榮幸歡歌到海壖佐領趙正潢年七十一金殿從容覲聖顔執殳末秩點朝班坐聽天上宫壺永身在華胥化日間一爐煙裊裊轉和風椒酒春盤列座中歸向子孫誇盛事玉皇親宴蕊珠宫二佐領明禧年七十一聖祖垂典率時我皇晉萬年觥錫千叟觴維南有極煜爚其光夀宇孔恢悅豫且康臣忝世職臣世襲雲騎尉觀禮天閶誠歡誠忭顒祝延長佐領石栁年七十一氤氲瑞景韶春煦彤廷尚齒開霞觴皤皤黃髮列宴爼崇班整肅聮鴛行小臣奉職長旗伍嵩呼華祝隨趨蹌身心踴躍遊夀宇許霑御宴㪺天漿願言拜手賡且舞古希天子夀無疆隔句韻體佐領遜扎齊年七十一慶霄濃露首春含耆舊推仁廣覆函共仰九疇皇極建咸知八表聖恩覃期頤景福天申錫大衍昌辰澤普涵雲近蓬壺開夀宇雪飄絲鬢藹朝簪瑤枝蓂莢看舒六廣樂簫韶聽奏三二膳分嘗珍膬飽滿甌羣浥醴泉甘就瞻紫禁辰依北抃舞彤墀宿曜南千載遭逢欣盛際微臣忝預但懷慚佐領武隆額年七十韶序開青律榮光近紫垣萬年逢盛典一介沐殊恩齒得班中禁衢同飲上尊長欣揚拜日率土荷禧繁佐領王國材年七十玉琯調春陽南弧拱星曜自維螢爝光幸仰太陽照頒酺逮羣工挾纊承溫詔蒼顔入畫圖歡舞聞命釂七旬忝世僕趨走百無效欣霑宴賫慈愧乏涓涯報佐領佛成年七十鳶魚翔泳萬方安同戴仁天共洽歡慶奉瓊筵霑玉醴延年豈數大還丹一周雅吹笙典自隆欽逢國慶道彌豐朝紳野服依瑤砌都在卿雲湛露中二佐領雅爾哈年七十肆筵春開閶闔錫斚下逮衡茨豈獨太平黼黻須知大道綸彌老人閲事多矣聖樂與民同之從此闡揚皇化教孝教悌教慈佐領楊德堅年七十仁夀臺前萬象函陽和下洽禮森嚴東鶼西鰈來殊瑞嶽貢川珍效逺緘庶品長看登化宇皇心常自顧民碞逢春錫宴昭耆耋祝夀騰歡叶濩咸十日漢酺從古樂百壺周燕豈須監雕笻捧出光同玉珍果擎來色勝瑊蟻泛深杯沾法庫鶴飄華髮映朝衫微臣頂趾皆鴻造盛引年光感倍銜佐領孫可儀年六十九獻歲韶光藹欣逢復旦辰一人閎夀宇遍德引羣倫瀼露叨偏渥需雲布更新康衢春滿處歌壤共堯民佐領尚維綸年六十八聖主龍飛五十年崇開夀宇宴班聮青陽令序才三始白髮耆英敞肆筵彩耀雲移瓊扇影濃香繞玉階煙恩榮曠典真竒遇何啻長椿紀八千佐領依蘭泰年六十八元日彤扉開冠裳真燦爍萃象鞮譯寄之大球及靺任禁佅之逺樂六日嘉宴啓鮐耆同旖旎六十以上上所養一百有五真人瑞鳯皇銜詔天上來早溥萬國登春臺麒麟不動爐煙上螭頭鴈序森差排帝心嘉與爾黃耇五十鴻圖億萬夀熙朝盛事史策無蕩蕩皇春開宇宙皇春賦物物增妍來者崑臺碧海壖日暖風和齊愷樂齡凡草萬叟三千佐領班泰年六十八天迪茂祉我皇膺之建極用錫百爾承之般乎麟遊紛乎芝秀上瑞維人黧鮐輻輳在帝之庭夀胥與試伊齒是尊德邵斯貴彬彬彧彧澤溥化醇歡呼抃蹈共戴皇仁佐領佟世禮年六十八校卒昔年職忝臣由披甲領催承襲今職世官厯載恩深仙陛分來尊斚禮筵侑以瑟琴入座蒼顔矍鑠分行白髮蕭森千叟叨陪鶴侣萬年祝獻蟻忱佐領劉承鑄年六十八大德必得天錫祉施及萬彚洽夀齒蒼龍杓轉歲俶始三素雲祥占太史閶闔開旭華紫黃幄臨近尺咫仙樂鏘洋法醖旨番番黃髮扶杖拜起曲􅎽帣鞲莫不歡喜微臣襲慶列蘭錡恩承奕葉逮葑菲奉觴敬祝皇帝萬萬歲川流山峙日星以為紀佐領巴隆阿年六十七笙詩南山篇君子祝黃耉天保答鹿鳴日升而松茂古者燕饗歌一一稱萬夀三千人為朋雅頌所未覯恭惟聖古稀敷錫遍耆舊遂令陛楯郎亦聆鈞韶奏執戟卌九年卅扈鑾輿後臣食俸四十九年隨圍三十次兕稱遍中外華祝擁左右鳬聮萬叟迎雲日喜瞻就紵黃色玢璘牌銀字鈒鏤歡聲忭康衢和氣薰合宙蹕途幸觀光圖繪不能究兹幸盛典逢濡湑逮華首受釐綜京垓元吉自天祐佐領李潮年六十七清時仁夀洽乾坤廣宴重開紫氣蕃正候農星符舜律得隨卿月湛堯樽一周甲外駑駘質三素雲中湛濊恩願祝天長還地久臣家道德五千言佐領富海年六十七盛典重開紀孟陬萬年仁夀卜金甌羽林愧列耆英後渥宴長叨闓澤優一曽持金戟扈行圍長沐恩光近紫微此日千班陪鴈序華芝騰彩揚春暉二佐領德紹年六十六鳯苑承恩久臣兼外南苑員郎龍驤忝職優髮齊丹頂鶴力愧玉花騮咫尺天顔近涵濡聖澤周載賡魚藻詠千載志鴻庥佐領文德年六十六仁皇錫宴時微臣才三齡埀老預渥澤帝德賜康寧涓埃蔑報效何以餐甘馨生長大化中教育夙所聆忠誠人所性孝悌天之經踐此始克夀不負天地扄春陽敷綺席萬古垂儀型老老復貴貴逮農工兵丁並祝聖帝夀忱悃如南星佐領吉慶年六十七鴻鈞在宥陽澤斯溥熙熙春臺萬物咸覩納福祿林躋仁夀宇百辟來會千叟羣聚禮光虞庠樂諧韶舞孔燕且樂駢圭聮組周廬領衛亦用洽醹敦弓序賓實邁隆古佐領萬舒保年六十六不老依龍闕長生住鳯城敘筵依品秩叨宴即耆英雖有涓埃思難為巍蕩名微臣思錫姓願以頌由庚佐領額樂歡年六十七六合清和庶績咸理惟皇禔福錫爾卿士需雲普汜愷樂燕喜百末蘭生酎飲其旨璚露改顔春風入髓侑爾黃髮庶復兒齒惟億兆人函蒙繁祉民悅無疆敢紀惇史佐領柏永吉年六十六登金門上玉堂不待生羽翼相隨飫雲漿天苞陳地符啓夀人在天下數以億萬紀聖人敷錫臻上理與於雅頌洽以禮雅有燕饗之樂歌頌有於爍兼猗那盛王引年國老庶老耳未聞三千同日銜恩波鴻溶降自天身到九霄邉春風盈衢不可繪惟同民物熙熙然佐領圖山年六十六笙簧式燕隨諧老靺鞈依班近五雲虎拜同時稱萬夀羽林十二蔚星文一丹詔謄黃又六辰遍邀粟帛自天申家家歡喜春無量心似筵前拜舞人二佐領色爾布年六十五春酒煥醍醐春雲儼鬱紆老承天子養福自聖人敷瑞響聆貞玉祥輝覿寶珠列仙同作侣拜跪契禎符佐領熊季堯年六十六元辰溥恩綍洪禔鬯垓埏佳氣聳北闕夀輝溢南躔有詔集羣叟作朋數盈千太和釀為醑瑞靄鋪成筵餐甘復飲醇芝侣同翩躚夙承華雲被兹值吉日蠲葳蕤金莢啓燦爛瓊桃鮮何以報髙厚唯歌擊壤篇欽定千叟宴詩卷八
