body:
  text: 卷十九預宴九十三人詩一百五首驍騎校達三泰年六十一我皇秉至德傳瑞生光輝蕩蕩風雲會明明闢皇闈中坐溢朱組金瓶泛羽卮徘徊蓬池上風動萬年枝沾潤既以渥舉觴詠露斯集文選句驍騎校保成年六十一九天壽宴紀恩鴻鶴髮仍參豹尾中坐上還教誇宿技夜來弦月憶張弓一三千人數試周輪榮與蓬山醉幾巡須記蟠桃花欲放一人管領一年春二驍騎校邱應祥年六十一祥飈扇閶闔景旭輝冠裳詔許榮引年授几羅椒漿鳬趨歡既洽拜手欽賡揚願附柏梁篇臣職慚戎行恩綸沛元日率土從風翔惟效擊壤歌葵忱向當陽驍騎枝富僧額年六十一太平之世熙然同春洪惟純嘏蟠天際地敷錫臣民遊於皥宇澤覃福備景慶駢臻需雲思露粵嵗乙巳月正丙辰懋典斯舉上自邸第下衆圭紳兵農工賈德飽酒醉誼洽情親樂和酒敘三千在位咸頌皇仁超萬萬古縱橫用韻體驍騎校富成額年六十一璣衡齊七政簫韶鳴九成欣逢熙皥時獻壽來彭鏗古有引年禮飲爵重老更於今逢曠典布席㪺瑤觥頒賚遍耆耋敷福覃埏紘飲和葆大年永以為干城驍騎校吕輗年六十一德邁陶姚上恩敷霄漢邊鈞韶諧玉琯仙露湛瓊筵人壽昭嘉瑞皇仁洽大年欣看松柏茂處頌九如篇驍騎校王孝年六十一我皇御宇德同羲軒四海承澤經五十年爰諏元辰萃彼國老禮樂交暢歡騰熙皥九州萬國咸來會同扶杖濟濟詠歌皇風臣荷聖德早備宿衛薦屆懸車林臯許遂屆兹耆宴復謁紫宸九閶晨闢厠迹簪紳捧爵稽首樂依魚藻罄無不宜敬頌天保驍騎校四達塞年六十卅載含糈忝受恩稱觥宇下被春暄何圖馬齒驅馳久得近龍顔笑語溫鶴帶卿雲來海屋鳯翔朝旭向天門從今嵗嵗依辰極長捧丹墀白獸樽驍騎校梁寬年六十耆年但解效衢歌編入輶風叶太和何幸期門環衛士肩隨彭羡沐恩波一慶雲甘露遍重霄壽宇鴻開樂奏韶為報寰中扶杖叟年年長此祝神堯二驍騎校阿琳年六十協氣盈寰宇諸福物畢臻八荒咸在闥鼚軒樂羣倫聿修引年典恩波逮微臣霑濡既優渥雨露施惟均六十甫及格長年熙陽春况兹逢盛軌異數逾常珍祥風滿丹陛旭日麗紫宸願陳岡阜頌流慶永無垠驍騎校髙廷桂年六十景星現彤雲蔚嘉應煌煌天經緯四海羣瞻糾縵光萬年永奠鴻濛氣羽衛小臣列伍偏金絲絡馬年復年間教白首同扶杖不識黃沙往控弦決拾同賡周雅復拜恩丹墀下驍騎校髙於恆年六十耆筵欽法祖嘉會協斟元熙宇開仁壽春臺邁昊軒星雲接霄漢花柳媚煙村獨慶叨榮地偏承侍從恩驍騎校哲山年六十太平之世何佳哉吾皇曼壽臨春臺微臣馬齒初周甲亦隨父老歌臺萊歌臺萊聽韶頀憶曽擐甲隨軍門不數文通十餘遇今年湛露濡早春耆年皆得承恩綸據鞍顧盼人難老海宇惟瞻帝澤新驍騎校班寧年六十聖皇純嘏皆天保茂集繁釐慶萬年五福徴祥瓜衍瓞九重開宴菊流泉叨榮騎士踞鞍後分列耆英授几邊浩蕩恩波樂遊泳何殊蓬島會羣仙驍騎校武當阿年六十昭融淑景天閶開氤氲佳氣吹蓬萊耆筵式啓集人瑞歡扶鳩杖登春臺聖皇夀祺茂引翼虞琴播詠薰風來庶草共沃膏澤厚仙柯更喜陽春回竊祿微臣效奔走韜鈐深愧干城材抃舞彤墀祝純嘏惟欣荷澤同埏垓驍騎校連城琮年六十普繁禧集耆耉開廣筵燕千叟杖以桃枝酌春酒維皇建極德孔厚斂福錫福天人紐小臣榮幸拜敢後驍騎校六十七年六十紫極臚千叟春祺被九寰長筵比蓬島疊祝效嵩山福自蘿圖啓年從綺甲環上儀行次第璧水聽橋圜驍騎校保昌年六十耆英濟濟會彤墀飫飲霞漿泛玉卮風信初番閶闔扇春韶幾度鳯凰枝萬方輯瑞登仁壽五代同堂茂福釐鶴舞山南駢獻瑞人瞻斗北慶賡詩邀榮久傍龍旗扈飽德還容鳩杖持亭育洪恩齊幬載拙誠惟擬華封辭驍騎校膺福年六十嵗旃蒙月孟陬龍集六日恩膏流惟皇懋德凝仁宇還與人瑞多添籌籌滿屋盈千積萬長生籙嘉豫羣工浩蕩春彤廷宴啓雲璈曲微臣環衛效趨蹌何幸班隨鵷鷺行㪺海為樽山為頌純嘏嵗嵗歌無疆驍騎校六十一年六十全家食祿感深恩擐甲從來𨽻虎賁南苑春搜軍日習上蘭秋獮騎雲屯鸛鵝七校功無取鶴鹿千齡夀可論四十五年安養甚更扶鳩杖拜天門驍騎校開元年六十七校榮分宿衛一官幸厠期門休風普鬯春序湛露同承聖恩額手瞻依舜日龎眉拜捧堯樽六十臣年初屆三千叨福何蕃驍騎校巴延年六十新韶播淑景舒長弧炳兹辰兆吉祥知是傳柑佳節近共來天上挹瓊漿一人遊壽宇勝蓬壺螭陛春風杖得扶計日臨雍還講學聨翩盛典史書無二驍騎校孫玉年六十靄靄晴煙煥彩曈曈旭日流光獻壽欽瞻黼座引年欣捧瑶觴錦綺恆春廣被筠藤扶老分行吉雲幸邀普護湛露敬志勿忘驍騎校劉登峻年六十北闕排仙仗南山引壽觴堯蓂舒六葉羲卦首三陽典與春俱麗恩隨日並長何期參虎旅白首沐龍光驍騎校那清阿年六十九重麗景敞蓬萊糾縵晴雲閶闔開元化無私覃壽宇太平有象洽春臺耆年榮許螭坳侍御宴恩容鶴髮陪扶杖共欣霑聖澤熙熙獻頌日邊來驍騎校甘士端年六十壽算應昌期鈞臺備禮儀鸛鵝曾比列鸞鶴許追隨入座和風扇浮樽湛露垂引年惟法祖抃舞慶熙熙前鋒校存保年八十三恩筵啓彤墀皇仁廣錫慶華髮羣依光春熙朗金鏡臣昔隨營列鸛鵝天威逺讋揮天戈八旗子弟皆徑旅棡鼓十二鏗靈鼉微勞勉效錫鏹更優渥郊臺奏凱曾聽鐃笳和餘齡被涵育間居給俸騎馬食肉安飽均恩波叨承湛露復此預嘉宴仰祝古稀天子德懋昭三多前鋒校五十年七十四聖治光千古皇仁播九垓引年天錫祉賜宴帝傳杯日暖爐煙細風和扇影回戎車今偃息丹陛忝趨陪前鋒校蘇爾泰年七十四璇杓轉斗蒼龍序雍穆祥颸扇寰宇六葉蓂開韶晝長萬年枝茂春光煦分行曳履挾鳩杖列坐敷茵擘麟脯隨班榮預到虎賁五紀曾糜大農糈臣食餉五十五年露蕭譽處龍光近帝德同天一何普鶯花都作蓬池春雲霞又絢天門午前鋒校富塞里年七十一上春行慶典賜爵酒鱗紅垂老餘筋力當年習戰攻持鋒慙賈勇飲至忝論功寶鏹誇同列金牌錫在公臣北路出兵得功牌二五賞銀十兩舊蒙恩不次新被澤無窮筵傍仙蓂近班承湛露融鶴齡趨魏闕虎拜厠羣工凱宴回思昔英含颯爽風前鋒校馬三泰年七十偓佺食松毛七寸不作貔貅徒詡健東方曼倩學詼諧雖有蟠桃何足獻執戟之臣慙折衝齒加駑下龍雲從金莖沆瀣承霄漢明日鬚眉青更濃前鋒校伊昌阿年六十四民熙熙春盎盎宴布階墀恩浩蕩環瀛都入丕冒中榮感微臣近仙仗昔事君王以壯年今見老者隨其肩豢成馬齒真萬幸何意併列耆英筵拜手歌樂愷凍梨顔色生光彩獻祝何所言朝宗福壽籌增海前鋒校彥祿年六十二瑞日辰占六韶陽泰啓三春融恩浩蕩宙合壽包函倚杖登瑶席飛鞭記錦驂從來嚴算爵榮賜不知酣前鋒校窩興額年六十玉殿春風肆綺筵南弧彩曜燦珠連婆娑鶴舞嵩呼萬登降鳩扶叟倍千瑶席羅珍嘉旨有華裾列彩映澄鮮酡顔既醉欣韶景景福長欣協萬年護軍校張常年八十三畢雨箕風九有安葛天唱和共騰歡衢尊溢處人人酌不數金莖有露盤一萬年嘉慶啓韶春髙列耆筵近紫宸從此長堪誇火伴微臣身是宴中人二護軍校永泰年八十一五色卿雲捧日華桃符新處頌椒花九衢喜氣瞻雙闕六合恩波溥一家莞席蒲筵崇禮數白鳩丹鳯集庥嘉我皇慈惠真超古養老虞庠詎足誇護軍校納爾錦年八十引年紀三代燕饗開權輿壺尊房序列鄉飲未聞蹌濟登玉除古稀天子備諸福嘉與耆耉申樂胥太蔟紀月元辰撰初曉開廣殿大和會秀眉駘背一一聨簪裾是時彩旭騰華蓋蓼蕭湛露紫雲靄永平袒割頗不經含元几杖寧稱最何况香山社同甲會五老九老紛圖繪盛事不越枌榆外皤皤衆叟三千為朋㪺北斗而斟酌頌南山之岡陵臣班列校志榮遇天保晉祝符升恆護軍校三柱年七十九皇建極兮綏萬方躋仁壽兮民用康春祺茂兮降福穰詔大酺兮開天閶百寮集兮千叟翔丹墀步兮琅璆鏘綴期門兮隨鵷行霑渥澤兮何滂洋謹拜手兮效賡揚億萬年兮壽而昌護軍校中德年七十八嘉宴稱千叟耆年聚聖時九如榮獻頌百福懋陳詩揚拜隨鮐耉趨蹌集鳯墀天顔瞻有喜旭日正遲遲護軍校二格年七十八天壽紀周書平格貫三格統舉五福疇歸之攸好德至聖握貞符純佑協元吉雨階慶舞干八紘調緼瑟嘉祥萃駢闐大德欽必得緑字河呈圖蒼牙策推日臚頌俾熾昌介祺以引翼瓊筵春殿開耆彥拱而翊韋辨𨽻兵蘭榮幸玉階陟願上南山觴升恆綿萬億護軍校蘇滿圖年七十七東鶼西鰈指南車王會圖開道路賒已見華峯船似藕新來海上棗如瓜萬年嵗月同春晝重譯河山總帝家躋得八埏同壽宇朝鮮使者醉流霞護軍校伊常阿年七十七曈曨日映丹墀曉需宴雲深布晴昊闓陽淑氣滿皇都星衛森環瞻羽葆挽強飛騎守戎行老馬由來愛路長何幸榮叨天子宴拜恩親得近龍光蒼顔皓髮欣鱗次蕭露濃濃歌既醉聞道堯民壽乃常獻歌何必稱人瑞護軍校麥圖年七十七春來正值獻鳩時盛事重逢茂燕詒黃髮皤皤歌宴鎬兩階醉舞祝鴻釐一舜琯昭華糾縵雲恰先人日倍氤氲詔書嵗首常存問史册徒誇漢孝文二護軍校巴格年七十七上方樽斚瀉香醪歌鹿吹笙坐列曹曲是薰風能解愠酒如春雨遍流膏親軍長靜屯千騎壯士無勞佩六韜却喜濫竽陪皓首春來一例醉仙桃護軍校黑塞年七十六旭日韶光麗耆筵綺席敷引年登壽宇錫福仰皇謨濟濟鵷行肅垂垂鶴髮趨彤階欣拜舞鼓腹飫天厨護軍校羣子年七十六惇史紀大年普天晉上壽斗北環辰居弧南曜角宿桃實呈上池藕船出華岫絳老裾互集洛英輻交輳省醴歡燕衎陳詩樂勸侑芳浥瓊漿流潤滋玉液潄丹藿邀殊榮傾心永春晝護軍校阿那漢年七十五昔讀君奭書天壽稱平格鴻鈞篤祜無所私三才通貫歸皇極洪惟古稀聖乾元合其德斂敷九五協大同八紘並注長生籍昨朝靈臺占垣曜聨珠璧壽星角亢野天上耆英席椅桐蕤鴻鸞翼秀眉鯢齒玉階側為龍光令儀色稠疊恩華天咫尺瀼露沾濡到把棘下逮列校蒙餘瀝請祝聖齡千萬億護軍校四福年七十五珠緯南弧慶靄九重雨露春和聖德祥敷五福休徴瑞集三多嘉會幸陪簪履賡揚雅叶笙歌拜手需雲宴衎羣霑湛露恩波護軍校興住年七十五席蘿圖張海屋衍珍符膺寶籙郅治邁循蜚耆齡嫓軒頊三千黃髮盡呼嵩萬里句麗來貢牧天潢首被燕毛恩月尹齊沾尚齒祿上自牧伯下簿尉間有歸田往而復粗如介辨徴工商舟盡杭川車運陸更有七閩叟百年同捧康爵醉多福酒馳車幣量谷億萬場還賡續護軍校達三泰年七十五養老霑恩宴春溫斗柄回天臨仁壽鏡人醉太平杯此日衣冠肅當時璧壘開豈知儕七萃亦得傍三台護軍校烏和訥年七十五紺髮方瞳矍鑠增杖扶緑玉拄蒼藤聖恩猶厪勞筋力詔許兒孫擁陛升一東風解凍叶韶年寒氣全消暖氣宣昔日從軍如挾纊今朝賜宴又添綿二護軍校費揚武年七十四昌辰符大衍廣宴引髙年紀瑞蓂舒六呼嵩叟溢千青陽遲淑景紫極繞祥煙酒醴歡心洽英咸協氣宣同邀三錫賚齊頌九如篇列校叨持戟傾葵向日邊護軍校八十五年七十四太平天子壽同天往復周環豈計年車斗總行黃道裏羽林長護紫微前川珍嶽貢輸金鼎苑栁宫花拂篆煙閶闔雲中韶樂動萬方同頌福如川護軍校書眀阿年七十四絪緼太和天地交泰協氣潛孚遘兹嘉會惟皇錫福布濩紘埏是徴人瑞壽耉駢肩乃諏榖旦乃秩良宴國老庶老引年以衎欽惟皇祖受天之祐肇錫耆筵永綏純嘏吾皇踐祚克揚前光茂典具舉則篤其慶百祿是總萬福攸同小大稽首祝華呼嵩護軍校巴靈阿年七十四球圖集瑞車書一天佑聖朝全盛日五緯編珠鸞鳯儀萬年刻玉麒麟出紀元五十韶序溫古稀天子推殊恩戶多孝弟邀旌賞家有期頤荷秩存羲軒之民松喬友圭綬袀襏列千叟譬如句甲茂成林自天雨露栽培久蓬池仙鱠啓瑶觥祝華呼嵩集鳯城青瑣丹墀班耉長玉階金戺會耆英護軍統屬貔貅士射聲校尉期門子秋獮頻歌吉日篇春筵乃挹雲牙美樂育熙平鬢髮斑自慙箭服虛黃間卻隨鮐耉扶笻竹憶共貔貅看劍鐶護軍校顔柱年七十四蒼縡降康黃祗助順日麗祥暉風傳芳訊八伯頌堯五老祝舜添萬籌盈呼三嶽應綺席分榮銅鋪旅進小草含滋湛露浥潤虎拜載揚龍光仰覲護軍校祿通年七十四天子錫燕開華筵時鄰人日春光妍鳩扶魚貫螭階側黃髮鮐背來羣仙殊饈二膳盛莫嫓隆儀史册前誰編欽惟我朝已再見帝歌臣載萬古傳小臣執殳六十年扈圍出甲曽周旋臣食糧六十年出兵一次圍十二次懷恩感遇效駑下口不能罄心拳拳護軍校善喜年七十四遙起祥煙繞帝宫近瞻仙仗曉曈曨金池芝草年年長瑶水桃花嵗嵗紅廣殿即今聆廣樂春臺何處不春風空同路向青天入太液波從碧漢通羽爵甘醪新燕溥餅鏐文綺舊恩隆寒逢人日前頭解氣向蓬山頂上融交戟千枝容海鶴一堂五葉仰宸楓古稀天子鏡仁壽試聽嵩呼萬國同護軍校木章阿年七十四微臣昔忝虎賁列躍馬曾踏卬崍雪風霆所向蟻穴平皇仁逺播天威烈軒德堯勳遍九垓雍雍翼翼歡聲徹臣今雍容幸陪宴聖恩下逮滋稠疊由來盛世多壽人㴠養熙怡臻耄耋長途老馬更秣芻此後彌多間嵗月護軍校台斐英阿年七十三古稀天子懋幾康詔舉耆筵化日長人聚三千推大耋年逢五十著嘉祥賜酺特許來中禁授杖欣看出上方夾陛覲光歌燕喜分階列席接鵷行鏗鏘共聽韶鈞奏愷樂咸擎聖壽觴巨典幸邀霑澤溥升恆獻祝正無疆護軍校五什哈年七十三獻嵗蓂舒六葉引年觴賜九重蕊宫皓首雲集蓬島仙醴春濃忝𨽻羽林執戟偏教螭陛扶笻天顔咫尺許近曠典千春幸逢護軍校孫保年七十三米廪記虞庠珍膳載周制稽古崇引年典禮未云備猗歟泰階期耆耄幸遭際繩武敞華筵康酌盈千計張樂韻琅璈羅饈馥蘭惠菲材𨽻期門薄職依禁衛燕譽慶旁敷龍光占下濟流霞觴乍飛湛露歌同繼鞠􅎽頌純嘏籥紀旃蒙嵗護軍校雅青阿年七十三娛遊集聖世九宇來共球東鶼西鰈逺軼周書王會解赤麟朱鴈不數漢賦西京牟臣叨豢養五十有四載鳴鉦伐鼓朔漠均懷柔臣食餉五十四年北路兵一次秋巡訓練覲武烈上蘭行幄從畋搜臣與秋圍十次曼珠徑旅古無匹目笑漢家故事徒貙劉犬馬齒才逾六紀臣年七十三躬叨慶澤簪黻同優遊洪河太嶽上祝聖主壽燾載萬國康金甌貝勒門上護軍校伊使年七十三雲日輝仙仗蓬萊敞御筵龎眉歡並洽神策慶增綿淑氣東郊應祥光四海聨禮成多愷樂長此戴堯天護軍校五逹塞年七十二皇圖際重熙民康物咸阜上紹聖祖緒太和浹九有嵗在乙巳春開宴集千叟自王公以下鳬趨樂奔走賜杖賜金帛錫豫一何厚樂協舜琴絃几設堯樽酒燕譽禮既成龍光福偕受鳴瑞降星躔臚歡萃耆耉三多祝以三九如頌凡九臣今七秩餘欣附朝班後歌天子萬年敬拜手稽首護軍校海連年七十二煌煌紫微垣瑞應言天經誰其占者二氣之交赤與青豈知羽林十二皆景星主壽萬臣亦連光千百齡試看五十年來仁風翔洽四海康以寧南雉西獒既莫不庭蓬婆滴博逺振旅臣隨征金川身復三十八度隨鸞鈴臣隨圍三十八次春開六茁階前蓂與嘉宴賜仙醽仙醽之賜樂何極臣但知天大臣昧談天職欣聞人説三百六十五度天可則景星熒熒黃其色唐堯時景在翼護軍校順太年七十二太平黼黻著皇猷佳氣長凝大九州身且優遊忘嵗月何慚從不戴兜年一榮依鶴隊共翔翺此日還親壽宴髙縱有歡歌心未罄歸惟傳説與同袍二護軍校色楞額年七十二璇杓運斗陽和布南極一星呈福祚霞眀萬嵗山花發恆春樹閬嶠為儀鳯九苞玉階垂蔭雲三素酒酌醴齊樂陳韶頀仙籌北海添壽籙東皇注瀛洲親到祝長生漢苑不須誇大酺三千華髮樂恬熙汪濊恩波叨異數護軍校托金年七十二飽遊熙皥世暮齒休戎行犬馬力雖衰拜跪欣向強蒙恩與壽宴效祝當春陽獻曝應區區山呼願方長願此八埏中壽宇同安康下以胥一世上以超三皇護軍校周廷椿年七十二一人懋建中和極寰宇同登福祿林喜遇九重懸壽鏡得參千叟盍朋簪紫垣幸備勾陳隊黃道恭瞻黼扆臨列坐旭華雲蔭裏萬年琪樹璨璆琳護軍校鶴齡年七十二雲烘旭日爛金門酒介春祺玉盞溫盾鼻乍磨書甲子靈椿丹桂沐天恩一彤廷拜舞海風恬桃實千年雪點髯細聽洋洋仙樂語龍吟鳯噦鶴籌添二護軍校額爾成額年七十二仁壽天開數大年殊恩下逮敞耆筵羣工喜仰天顔肅庶老欣瞻聖澤綿鳯紀書春已五十瑶池記果恰三千從兹史册傳嘉會帝德光同日月懸護軍校福升年七十二猗歟如春如三皇世福宇山凝昌祺川至零露瀼瀼嘉禾穟穟此日投戈當時拔幟飲兹食兹既飽既醉拜手揚言為一人媚護軍校佛保年七十二元化苞文武昌辰叶地天由來樂愷宴多在太平年是日千官會方春萬彚鮮倬雲豐邑詠依藻鎬京篇虎旅頻叨秩龍墀預賜筵芝英餐益壽柏實啖能仙執戟星廬衛櫜弓月竁旋自今綿景貺長此頌洪延護軍校和布登額年七十二東風吹太液宫樹敷新春碧天萬里纒紫氣乃有五雲髙擁重華輪重華之夀萬有千億無紀算特於五十載始錫宴黃髮臣榮光浮昴宿出齊三英燦五緎鳩杖百行班秩秩羽林護軍府列校肅行伍韎韐昔從征蕩平昭聖武駟騵彭彭𨽻方召旟旐翩翩逐申甫臣從征一次揭徑箭麾霓旌麗星陳從天行行圍掩獸徒御不驚臣從圍八次臣年十八霑天祿臣食俸餉五十五年臣齒七旬與稱祝嵩呼華頌和其聲聖夀洪延駢景福護軍校五更年七十一祥颸布暖綺筵開羣老趨蹌預宴來仙酒百壺天上醉從教曵杖看花回一虎士桓桓曲共賡隨班拜舞忝殊榮從今三老皆千數敢以臣名備五更二護軍校文殊保年七十一嵗紀旃蒙耀斗躔青陽協氣鬯韶年三無德共徴三極大衍恩推及大千歡覲龍顔臨廣殿榮登鯢齒敞髙筵九重斂福熙崇輯六幕同春慶普延戊校沗承膏澤渥辰旗長覩矞雲駢豳觥介景歡情洽不數香山勝事傳護軍校逹塞年七十一貞符欽叶泰元會仰乘乾化宇光華茂春城景色妍肇寅占斗柄見丙曜星躔普錫松齡曼同欣鶴算綿養恬膠序擴仁壽鏡輪懸敢效丹葵向還歌湛露篇護軍校拉住年七十一幡矟前驅備折衝蒼顔倍沃露華濃雲開絳闕駢千叟春滿蓬壺宴九重蘭奕桐蕤綿景祜橋門璧水際時雍百年禮樂欽巍煥共集昌期慶備逢護軍校邊他哈年七十一暮齒戎行一事無蓮驍欣得巧投壺忽聞丹詔傳宣日已入新年瑞應圖一紫殿雲移雉扇開韶春風裏各銜杯眉間黃氣人人見太史應占抱日來二護軍校阿吉圖年七十一律轉春融淑景妍壽祺溥鬯啓瓊筵期門肅仗欣叨秩廣砌承恩荷賜氊策衍神蓍符五十籌添海屋恰三千古稀天子無疆壽拜手稱觥黼座前護軍校二達塞年七十一景福欣逢壽宇春祺寵錫華筵曈曈仗移朝旭靄靄爐含曉煙湛露恩霑仙醴薰風化洽虞絃小臣樂隨衛士瑶階虎拜萬年護軍校察渾年七十一復旦光華瑞靄重耆筵介壽慶躬逢丙符祥曜呈朱鳥辰叶昌期紀六龍文級武階同矍鑠堯天舜日遍和雍露霑小草長春茂好伴青青紫禁松護軍校福勒賀年七十一虎文衣褶豹文韉扈從龍媒老執鞭帝許承恩霑兕爵騰歡添健七旬年一宿昔曽聞世幻誇亦懷甘露亦流霞今朝大斗從教酌不是仙家是帝家二護軍校那爾圖年七十一耆艾徴多瑞春祺普賜筵卿雲籠八百桃實結三千世慶軒皇主人來曼倩仙回思汗馬處鼓腹已忘年護軍校德勇年七十一六位敷春慶辛盤入頌初光依丹闕迥節近綵幡舒鈞奏欽雍肅霞觴賦樂胥仙筵同五竺嘉會溢千裾保極通平格為儀叶燕譽萬方同福祿一統大車書執戟參朝籍周廬奉帝居載賡先舞蹈川嶽聖齡如護軍校阿爾當阿年七十一壽宇祥占熙皥春韶宴啓蓬瀛奉職忝陪豹尾銜恩欣預兕觥仗外風宣閶闔雲中樂奏韶韺小草竊同葵藿依光共慶升平護軍校五達塞年七十一壽宇貞恆永天文糾縵長萬方逢景運聖主慶當陽莢應瑶階瑞芝生繡甸祥露華承沆瀣仙樂播笙簧令日延千叟初暾郁九芒睿顔瞻有喜洪算引無疆戎閫參微秩軍符憶肅將纎勞甄馬走壯志勵鷹揚老沗勾陳隊欣儕振鷺行華封難罄祝備福協穹蒼護軍校清海年七十一帝德乾行健耆筵巽命申宏開仁壽宇共樂太平春保合兼三極生成在一人時和風遍洽道久化彌醇執爵崇元老聨班及小臣星榆榮守衛月莢映朝紳豈接夔龍步惟希鸑鷟鄰從兹徴盛會恩共嵗華新護軍校雙滿年七十一恩榮鶴髮敞瓊筵斂福覃敷洽瑞年式燕歡心歌樂只扶鳩嘉會慶熙然春融湛露滋堯酒和引祥飈入舜絃鶴髮三千遊壽宇欣逢弧曜燦南躔護軍校五十六年七十一彩雲會合總從龍八隊旌旗護九重歌舞萬年春幾度持戈間手已扶笻一年年春宴仰天髙忽際身榮預列曹四海化醇濃似酒不徒西極數蒲萄二護軍校巴林年七十一聖壽祥逾軒籙臣躬餉竊松齡五十六年粟秣臣食餉五十六年萬八千嵗椿靈敷福日􅙡月竁同流天清地寧羅鳩杖鳩數典鯢齒鮐背盈庭護軍校賽出呼年六十昴宿五老降光華八伯賡史册志其事如欲誇蓬瀛不聞千叟集黃髮彯華纓九天啓閶闔玉仗條風迎偕來就雲日一氣敷春榮龍光燕語洽􅌬醁飛金觥韶景煥初旭昌運綿升平從霑湛露渥不羡靈芝英欽定千叟宴詩卷十九
