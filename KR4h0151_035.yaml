body:
  text: 巻三十預宴一百十三人詩一百二十七首馬甲滿常年七十五憶昔金川師摧碉奮犂庭廟謨制全勝乃設健鋭營雲梯嶤嶤登如飛馬射歩射虞張機騰空躍馬不動衣刀鞭花舞兩手揮駕船駛風嫻水圍香山勝地鬱崔巍旗門鱗次拱太微嗣此卜師貞屢奏膚功成輿圖訖濛汜巍巍赫天聲時平不忘戰功底肄武每荷天顔喜春秋佳日常簡閲歲有衣糧月有米今復入嘉宴老兵猶矍鑠拜君王飲康爵歸語家人樂莫樂馬甲傻子年七十五古無雙今火器十連環雄七萃星如注雷為聲矜便捷鳴鐃鉦衣糧給厚叨生成身依尺五天邊榮還隨嘉㑹聽咸英馬甲官夀年七十五履端於始宴以示慈惠享而既具禮以行義年同以尊示有等威聖王同之敢不慎儀茍有位於朝共而從君序民人無不及焉其所以蕃齒老夀者使與之齒老有加惠君貺之以大禮禮無違者翼戴天子而加之以共分之采物其樂也融融飲酒樂同福禄舉兕爵如天之福集左傳馬甲福住年七十五元正六日煦春和梧菶朝陽鳳翽柯絳色秘瓷斟露液玉烟香篆拂雲羅翊茵共仰龍顔喜扶杖真看鶴髪多何幸康衢同鼔腹許將擊壤繼賡歌馬甲保成年七十五春融紺露珠駢羅帝廷黼黻宣賡歌兠鍪亦厠鵷鷺侣笙簧燕衎濡恩多精鏐鏤牌荷寵賚鶴髮婆娑齊九拜春風春日太平人飲酒豈樂魚在在八埏雨露洋恩波暫輟雲梯上馺娑朝朝暮暮香山住九老圖中未是過馬甲常格年七十五觚稜初旭麗華雯律啟新韶吉語聞老值青陽欣淑祉暉承紫極捧鴻文菊觴布席偕春盎芝篆穿楹近午分懋典本多逾格賜籖名許厠玉鳩羣馬甲黄徳保年七十五紫闕韶陽正麗瓊筵曉色初開上瑞真符丙曜人家本在春臺翊序祥麟威鳳衘觴舞鶴耆鮐四三皇六五帝暢八埏泝九垓馬甲多隆悟年七十五一人臻曼夀寰海喜同春尚齒遵前烈分榮逮老民協風吹寳律凝露渥殊珍華髪聯行拜嵩呼達紫宸馬甲他思哈年七十五春祺普渥又重經皓首龎眉拱紫庭太史書占天上象老人星昨兆祥齡一宫茵臚列燦華紋蓬鱠分嘗武衛軍引老更䝉恩賜渥劍銘齊勒杖銘文二馬甲四達色年七十五仁風洽九垓至徳邁千聖引養以引恬斯陶而斯詠鶴算泰階盈鮐耆太平盛占弧炳吉曜逢辰叶嘉應翊陛捧瑶觴環瀛輝寳鏡賡歌億萬年時雍集蕃慶馬甲七十兒年七十五璇殿開嘉宴耆年遍翊茵仙壺上晴旭寳律叶良辰宜老春尊侑聯情玉篚新自慚蒲栁質長此荷鴻仁馬甲六十一年七十五駢臻嘉慶浹瀛寰上日耆筵鳳綍頒蕭露什賡慈惠洽崑璈律叶景彤環行行華髪生春燠叠叠黄封錯錦斑播在聲詩輝億萬帝歌臣拜肅鵷班馬甲六十六年七十四七字傳天藻星雲仰大文慶筵駢盛事佳話洽多聞華髪叨稱叟長年錫自君三巡渥春酒率土遍訢誾馬甲福祿年七十四春祺啟八紘皇極徴五福敷錫浹寰海耆宴集華祝愷澤人人霑熈春欣並育仙韶聽球鳴官饌濡蘭馥人瑞協年芳階蓂春及六黄髪共鳬趨下走效芹曝馬甲九徳年七十四昌辰開鳳紀嘉㑹集鮐年錫福疇當五臚歡叟軼千賜樽恩寵渥授杖禮文全尚齒稽前史虞周詎比肩馬甲官永年七十四惟皇聖徳至誠至仁以育萬物以蕃兆人煦之如日凾之如春文謨既備武烈具陳乃以上春巽命載申玳筵肆張黄髪樂親和氣旁流充塞九旻惟皇斂福以錫萬民馬甲萬有夀年七十四夀嶽夀圖獻夀寓夀牒呈夀世夀悠久夀人夀耆英佛夀夀無量國夀夀有徵錫夀夀在野獻夀夀在廷益夀夀筵啟介夀夀席盈夀仙赤松古夀民絳老増夀星輝角亢夀地移蓬瀛樂有夀和曲宫有夀成名琖泛夀芽碧觴㪺夀酒清木夀有松栢草夀有芝苓走者夀鹿牌飛者夀鶴翎咸現夀者相來夀於帝廷皇夀天地人聖夀清寧貞臣名萬有夀祝夀夀聲賡句用字體馬甲朱國良年七十四殊闕卿雲糺縵䕃輝生戎隊感恩多秋風羽箙心猶壯上日觩尊氣倍和積翠西山開畫㡧増籌東海浥汪波履端四序開長日持比壺中幾倍過馬甲徳保年七十四杖鄉杖國杖朝人瀛嶂梯航到雁臣無量大千春世界善縁與結轉祥輪一卜晝承漿宏錫福禮無愆度肅班齊餐芝飲菊尋常語此日人登大閬西二馬甲厄爾登厄年七十五寳律調風奏舜韶重熈禮樂煥丹霄圓明夀鏡春為㝢浩蕩酺尊斗挹杓真喜晞陽光必照遂教被練澤同邀仙笻拜捧琅玕節一例耆英荷杖朝馬甲七十三年七十四有虞氏養老庠以上下分周人重養老東膠虞庠聞皆曰貴老老恩意所浹恒慇慇然而文繁已滋漢儒誤老更謬説徒紏紛其於設學既無當即云養老亦覺於義為虚文我皇闡經訓析理衷大順養老與立學兩義不柏瞵上春詔舉千叟宴於此括養老化俗淳風斯大振自王公卿尹士農工啇卒伍逺暨西瀛北漠浿水桃關以外莫不聯行而遞進頭銜九祑禮加渥膝前宣召手賜爵匪頒位次自秩秩春風一氣周六渥堯衢尊舜歌風無徧無黨王道蕩蕩君民一體是之謂大同微臣亦被春膏融古云荷戈之士皆知書拙詞益自慚拘墟忻惟今日得如在鎬依蒲魚馬甲曹自興年七十四嘉宴優年典恩榮許共叨儀韶諧廣奏斟醴浥醇膏景緯連躔耀仙雲結篆髙仁風長渥被六幕荷鈞陶馬甲劉勲年七十四夀身夀世真仁夀五十春開億萬春琯叶三陽傳令甲蓂舒六莢記良辰熈臺煦嫗歡頻洽大幕帡幪治益臻小草知榮霑渥錫袀衣叨許列冠紳馬甲百起圖年七十四瑶磩筵開黼綺雲璈樂奏中和星懸角亢夀次林森松栢喬柯儀舞同臻聖世賡颺下逮衢歌萬物並霑湛露戎行慶沐恩波馬甲六達色年七十四燕金開寶勝鳩玉盛鮐耆人瑞集鄉國心歡傾藿葵樂承三爵飲賡載萬年詩春水魚依藻敷仁衆彚滋馬甲蘇住年七十四民安化日舒時和景風扇古稀天子聖詔開千叟宴三千矍鑠翁皤皤集春殿福爵有手賜上袠䝉殊眷位序夀作朋㴠醇逮愚賤既醉朱顔酡仙腴嘗禁膳稽首頌昇平雍熈周海甸馬甲巴通阿年七十四鳳麟洲上瓊作田五百里草何芊芉如𤓰之棗蓬萊邉如船之藕太華巔五粒松九光芝水玉成烟甘如飴神仙服食術莫殫毎云得之可以長生可作大還丹豈知主聖臣賢民安樂人人皆大年神仙何必學一酌天酒都長生黄髪鯢齒鮐背闕下盈五福備歌既醉三千人廿萬歲馬甲連仲年七十四養老虞庠重兹辰典更超三千耆叟㑹萬億聖年昭忝與鵷聯讌歡隨虎衛朝昇平瞻盛軌下管叶鈞韶馬甲楊起麟年七十四優齒詔開宴蕭露荷寵光耆耋遍坤絡鳬集朝天閶聖皇厚撫綏垓埏悉井疆時平武備飭禁旅雄騰驤幸列貔虎隊嘉㑹容趨蹌升恒頌一人敬上天保章馬甲白雲龍年七十四璇殿卿雲捧日紅前楹黄幄正當中春祺淑豫八方洽闓澤霑濡一例同榮覺光輝生執㦸拙慚文采效呼嵩笻枝玉節牌銀字九拜筵前錫賚豐馬甲富隆阿年七十四宴啟五雲端璚珠玉醴團元臣夀觴祝耆庶慶祺歡以此髙年衆從知愷澤寛環瀛同列㑹寧作大酺觀馬甲明安年七十四盛典重逢敞夀筵條風協候播虞絃慶暉晴藹熈春字寶液膏融紀瑞牋為吉鳳儀阿閣上分行虎拜玉墀前吹笙酌醴均霑渥歸騎争看緑髪仙馬甲薩陵阿年七十四恩暉帡幬延千叟聖澤醍醐及萬方慶瑞從來稱最備綜將人瑞祝君王一春熈渥澤被無邊下逮樗材入盛筵賜杖叨年七十四逢人亦譽地行仙二馬甲常來年七十四春祺普洽上春臺此日躋稱萬夀盃榮近龍墀親咫尺慶延鶴算舞毰毸敢云健臂推同隊自有期頥接上台皤髪屢聞開盛典籖名心竊願常來馬甲唐國祥年七十四羽箭傳三箙銀槍勵六甄春還生馬齒露亦飫芳晨餙􅒶仙韶翕華茵吉曜巡翼鳩鐫杖首扶植荷皇仁馬甲保禄年七十四天子萬年夀四海登耆耉敷錫億兆人宴詡皤皤叟瑪瑙甕㪺露琉瓈鍾酌酒端綺篚煒煌精鏐牌蚴蟉貞元上下合威儀三千有鮐集鳬趨隨歡洽頌岡阜馬甲李從善年七十四彤墀春旭麗三陽湛露開筵淑景長優養太平逾七十欣叨榮遇荷恩光一嵗籥開韶纔六日律風叶候奏新音堯時寳露斟壺渥人比華封祝更深二馬甲梧桐保年七十四時逢初吉開耆宴迓福從來錫福俱璐彩階前聯慶席珠光殿角萃貞符仙蓂六莢遲新晷瑞牒三芝紀勝圖何幸微臣叨異數日長特地到蓬壺馬甲周鼎年七十四嶤嶤須彌山積算境逾劭又如大瀛海福流真廣𨗳上為一人夀六幕䝉帡幬其下飫和久長年盛耋耄引年以化俗恩言頒渙號三千大千界萬里一堂奥仙腴分禁臠法酒斟醇膏姓名記瑞笈矢竭葵誠報馬甲吉郎阿年七十四耆年翊拱列茵稠瀛屋春深鶴紀籌三爵夀康君賜重龍文牌面耀精鏐一鴻開夀㝢慶同躋華髪三千拜舞齊恩養年年成皓首得因優老錫洪禔二馬甲白凌阿年七十四夀世夀人運隆鳳紀皥皥熈熈黄髪鯢齒瑞徵南弧慶洽燕喜帝命集廷肆筵授几春韶煦育肴旅酒㫖於萬斯年天錫繁祉馬甲馬祿年七十四五風十雨庥徵協詔舉耆筵大慶駢軒紀積籌逾廿萬堯衢酌斗集三千濡和共浥春如海摛藻欣瞻日在天一視同仁真蕩蕩瑞符稠叠豈勝編馬甲七爾薩年七十四紅杏近暘谷銀榆植星街天光日華普臨照春風獻瑞當蓂階豈知夀鏡照六合蜎飛蠕動一例皆白頭九拜康爵賜長年長養邀綏懷三漿六膳春筵排葳㽔芝篆銀鐫牌弓衣備數羽挿靫承恩列坐聯青緺松喬籛偓攜手偕採芝不羡仙山厓馬甲姚國裕年七十四八紘歌頌播臺萊氣轉洪鈞夀㝢開六葉階蓂萬年酌天光長共日昭囘一鳩杖銀牌聖澤覃春風六幕一時酣歌詩記取南山句勝是華封效祝三二馬甲孫沐祖年七十四我皇秉大徳滋至迎天庥三多進華祝五福臚箕疇祥暉溢寰宇禾黍占豐収丹墀敞綺筵黄髪皤皤稠禮樂盛三千尚齒恩意周虞庠禮詎備周道典亦修耋耄際昌期春膏鴻沛流願獻南山杯瀛鶴添瑶籌馬甲李天堦年七十四太平人即地行仙慶洽寰瀛福並延皇澤如春臣似草載將醇露記年年一食經五鮓真難擬閬苑三漿得更如㡳是宜春並宜老杖銘初記七旬餘二馬甲陳斌年七十四寰海同風日卿雲復旦時引年皆有慶受福本無私控騎聯雲隊承恩拜玉墀餘齡逢盛事願進九如詩馬甲王倬年七十四春林蔚蔚千雲上虬枝騰作三千杖扶老延齡不記年天家優齒䝉殊奬榑桑暾燭黄金榜鵷班排列耆筵敞叨幸㣲翎殿角翔真看小草瀛洲長身來天上被光風紋舒纈面春韶盎馬甲葉布肯年七十四觚稜郁郁曙暉紅同在熈臺化日中玉杖朱提光照席一時拜賜勝彤弓一曽聞擊壤頌伊耆尊設中衢斟酌之仁夀筵開到黎庶春祺蕩蕩本無私二馬甲索住年七十四吉日詔開耆宴普天同奉堯樽華髪晴暄春靄仙蓂瑞晃朝暾引老真逾周典摛文共仰王言願獻華封三祝欣偕禁旅八屯馬甲少太年七十四星躔呈瑞泰階平盎盎春囘玉宇清黄髪春多徵藹吉紫庭儀鳳叶元聲一杖扶靈夀兼鄉國醴浥長春飫菊芝歸路人傳太平事勝遊何必羡安期二馬甲常清年七十四維皇錫福黄髪騰歡幸叨武伍以恬以安廼斟仙醴廼列辛盤班分左右濟濟千官含元未央儲胥露寒詎如乾清蓬閬齊觀馬甲圖桑阿年七十三瓊砌嘉筵敞隨班拜紫宸七人先令甲十日入陽春爆竹喧初曙笙簧協悉新叨榮飲康爵長此戴堯仁馬甲巴顔太年七十三惟天覆幬惟地持載惟聖立極居中成位法祖敬天徳洋恩濊合廿萬齡開千叟㑹鳩杖連蜷慶雲靉靆徳裕福基五福五代文治武功并包無外逺暨鴈臣大集鮐背顧惟卒徒例執鞭鎧猥以掄年得飲仙瀣敬瞻黼扆稽首九拜蕩蕩巍巍惟天為大馬甲書倫年七十四七十餘齡健衣糧感厚叨春巡瞻豹尾秋老憶龍韜慶洽需雲㑹醇濡湛露膏聯行蓂砌右煦育荷鈞陶馬甲官寧年七十三聖祖崇引年嘉筵集千叟繼武仰吾皇慶典行嵗首春風閶闔開歡宴來黄耉鮐鯢集三千上瑞洵希有仙露浥金莖徧渥醇膏厚拜舞祝宸釐天地同悠乆馬甲恒徳年七十三一人開夀㝢八表樂康衢耆宴鯢鮐集春臺頌祝俱醲膏周庶老異數逮烝徒更慶籌添屋寰瀛荷澤敷馬甲萬保年七十三人瑞由天錫家祥頼國恩一旬春早到四代典重論運啟初陽泰祥符大地坤御香濃藹席春日暖開樽靈杖真扶老霞縑共挾温嵩呼齊拜祝晴旭燦華軒馬甲博陵阿年七十三衎燕令儀成醇和聖治鬯昔聞夀云醻酌獻酒無量祥星泰階旁圓蓋綺陛上鸞奏翕崇墀鶴羣依仙仗寧知兎罝夫榮渥大官釀曼齡祝黼扆盛事紀戎帳馬甲七成額年七十三一人建極萬物由庚敕幾慎憲久道化成執兩用中夀世夀氓嵗籥既開蓂莢六呈啟千叟筵聯上下情皤皤偕來以晉豳觥恭惟我皇保泰寰瀛懋臻郅化遹駿厥聲小臣拜颺載竭悃誠願皇萬年泰階永平馬甲博齡年七十三良辰芳讌敞頒膳自天厨淑景依璇戺晴暉映玉鋪漿還斟北斗星恰炳南弧薄海登仁夀熈熈徧九衢馬甲李天祐年七十三徳備箕疇福備臻敷天愷樂慶芳辰殊恩羡錫三千杖懋治祥開五十春温樹旭升融紫仗慶霄雲盎藹丹宸東瀛北漠共球集五代堂開頌聖人馬甲勒始安年七十三旭日上龍樓春添瀛屋籌鴻鈞華序叶燕喜慶筵稠紳列新稱兕戎行舊擁矛承篚同拜賜洛社詎能侔馬甲鄭國章年七十三大仁如天大福如海玉琯均調珠躔聯彩春日載陽耆老咸在幸厠貔貅自慚駑駘如依蒲魚同歌樂愷紀瑞方長延期億載馬甲塞楞年七十三化日徵蕃齒新韶詔啟筵歌詩先露草筮易得雲天福酒傳仙仗靈椿頌大年身微列戎隊得侍聖人前馬甲達住年七十三紫禁春晴藹瑞烟韶咸雅樂響鈞天趨陪喜附三千叟仁夀宏開五十年金鼎調羮頒貳膳玉階敷席列長筵恒春共上春祺祝得與書名紀瑞編馬甲富楞太年七十三餘齡猶健共歌衢許向堯階逐隊趨一種賜來靈夀杖香山圖畫得應無一芝笈璚緘殊瑞紀仙漿玉膳禁腴嘗巨芝滑潔無須擣已減朱顔一半霜二馬甲明海年七十三曉漏隨班入筵開沐寵光敦風惟尚齒介夀共稱觴環海承醲化殊珍出尚方春風遍大地雲物紀年芳馬甲文泰年七十三海㝢昇平協泰交耆年濟濟列螭坳春臺一例稱人瑞霑得醲膏遍草茅一聯行卿月及星黎拜捧詩牋仰玉題史䇿全繙真莫並總惟大徳集繁禔二馬甲舒山太年七十三嵗籥初開九㝢歡法宫前殿擁千官紫芝叶奏元聲鬯赤羽薰晴曙色溥春藹嘉筵翔瑞鶴祥依珍樹集文鸞葵心傾向真何極霑渥恩波與海寛馬甲元福年七十三臚曜階符泰瞻雲卦叶需慶祥延寶算大衍應瑶圖鈞奏諧陽律璚筵集上腴袀衣霑異數紀瑞軼蓬壺馬甲巴充阿年七十三皤皤黄髪集鑾坡闓澤覃敷月始和瑞應駢知民氣樂栽培久識帝恩多為儀今喜陪鵷鷺飭伍長叨列鸛鵝願誦九如天保什紀逢嘉㑹與賡歌馬甲恒通年七十三淑序開芳讌祥延夀㝢洪一人真有慶萬福自來同璇戺春雲靄芝筵法醴融三多華祝徧率土煦和風馬甲常在年七十三九重錫宴際良辰弧曜臚祥記上春紺露普沾珠殿暖慶雲初繞玉階新詰朝人日簪幡吉幾候花風語鵲頻煦育餘齡列戎伍飲和還許拜恩均馬甲伊林年七十三芝秀三英符慶瑞景暉春滿秩初筵吉祥如意年年事都福庭中集衆仙一多㫖嘉肴雕爼列鏘鳴韶樂玉階陳自嘗菊醴顔増壯健臂猶能挽六鈞二馬甲成徳年七十三春初騰鳳詔闕下效鳬趨矍鑠鞍仍據婆娑杖可扶金觴浮碧醥玉饌出仙厨盛典如能繪羞稱洛社圖馬甲王建善年七十三朶雲祥捧九重髙露下三霄浥玉膏扶杖即今猶沐澤荷戈自昔愧同袍引年典懋徴熈洽介夀筵開暢燕敖深荷渥恩忘弱植此身已擬列仙曹馬甲田進祖年七十三候曉耆英集恩榮逮賤臣觴稱一人夀澤溥萬方春紫塞祥颸協彤階淑景新白頭屯戍長何幸遇昌辰馬甲王大榮年七十三將進酒斟瓊觴小臣幸近天子光大酺珍饌出尚方迎風玉佩嗚鏘鏘南弧之星麗斗極普天鼓腹夀且康聖人懋徳膺景貺禔福衍羡方洪長馬甲葉邦傑年七十三五色雲中萬福同戎行也許厠羣工自欣扶杖來天上小草都承長養風一一統萬年凝寶籙七旬五世茂瓊枝耆英鱗集三千叟咫尺瞻依荷聖慈二馬甲佟文志年七十三尚齒開筵日初囘斗柄春需雲崇盛㑹解澤布芳辰洽禮迎繁祉騰歡遍賤臣稱觥金闕上長慶物華新馬甲寗如先年七十三熈昌駢吉瑞象著南極躔萬年寶籙富五代金枝綿近光儼咫尺拜賜盈三千法祖紹盛典春廷敞瓊筵一巡瑶爵徧湛露瀰九天歡呼同介夀無疆慶洪延馬甲朱徳龍年七十三璇庭廣啟徵耆艾釋耒􅌢戈隨劍佩和風麗日韶春開列茵賜饌恩膏沛三千黄髪繞華筵古來罕覯三千㑹下走曽依七萃前只今更獲侍龍顔鳩杖一枝藤夭矯銀牌九字文斑斕願將松栢南山句譜就無疆萬夀篇馬甲徳昌年七十三聖人緝熈誕膺純嘏如日方升敷天之下握其權衡運以陶冶闓播夀祺靡不被者元紀五辰錫是爵斚慶合崇庳歡聯朝野龎耆允升魚魚雅雅袀服恩沾瓊盃露㵼圖繪詩賡陋哉洛社馬甲善住年七十三欣瞻仙仗擁鴻儀次弟風中法曲吹耆耋飫甘叨異數聖仁禔福錫繁釐圜雍梧鳳呈祥日天室雲礽衍慶時抃舞堯階榮預宴騰懽齊獻萬年卮馬甲三保年七十三敷文光治化尚齒溥春熈福紀延洪㑹耆筵樂愷時醇醲霑瑞液舄奕拜瑶墀扶杖咸稱慶皇躬懋引祺馬甲金文芳年七十三巍巍文治成三千慶禮樂赫赫武功奏二萬恢疆索煒兹黄髪人參聯玉聚珏當軒穆穆有來雍雍雲罍山尊靈夀笻前楹黄繖開天容日華光裏歌燕喜俾爾鮐背復鯢齒聖人錫爵臣稱兕千秋萬嵗從此始試教繙徧古今史幾見耆英盛如此馬甲髙成龍年七十三夀㝢臚歡溥春祺沛澤深扶鳩來象闕賜酺拜鸞音垣覩卿雲縵樽容湛露斟環衢齊獻祝葵藿效愚忱馬甲髙忠年七十三彤矞開中天仁澤周埏紘春臺集龎眉久道欣化成瑶階布茵席愷樂揚和鳴三古溯惇史漢室陋老更維皇膺茂祉錫羡於耆英培養百册年年豐物阜盈人瑞邁往牒祝頌抒丹誠馬甲李模年七十三恩宴隆耆老重霄集慶雲九重情下逮六豆禮前聞盛事超惇史雍宫鼓大昕橋門還指日四海聽敷文馬甲他克什太年七十三鳳綍承瑶闕鮐耆集玉庭稱觴齊上夀飫宴獲延齡碧䕃三花樹丹舒六葉蓂朱綅頌昌熾緑字範康寧更老義當正膠庠典有經都將豳雅頌吹入管絃聽馬甲多隆武年七十三虎拜忱依鳳闕嵩呼慶滿螭坳臣民並叨需宴天地欣逢泰交縱轡老慚飛電開弓勁謝鳴􅐴一體躋堂獻燾春和暢引笙匏馬甲和尚年七十三景慶聯珠緯升恒頌玉宸需雲千叟㑹夀㝢一家春被澤連豐草齊齡有大椿仙盃歌燕譽微末荷陶甄馬甲葛本年七十三夀愷應昌運多祺沛黎元瓊筵齊飫徳耉台齒是尊萐蒲渥含膏氍毹列坐温鈞天聆廣樂有咸池雲門人間未聞此生世逢羲軒下臣叨異數拜舞歌湛恩馬甲那欽年七十三旭日開黄道祥雲䕶紫微璚筵徴鶴算金戺卓龍旗曰夀仁之效如天衆所依推恩敷浩浩引典布巍巍淑景呈端月光風拂九畿敢言歌湛露長此戴春暉馬甲達冲阿年七十三膏澤蒸人瑞耆年洽太和需雲承闓讌湛露沛春波恩許聆軒樂榮陪和舜歌三千呼萬嵗誠溢祝三多馬甲七格年七十三鮐顔集慶傍金鋪鳩杖趨朝捧玉壺溥錫深仁躋夀㝢重開嘉㑹暢熈圖呼嵩祝華咸遵道擊壤㪺樽總溢衢幸頌太平歌醉飽恩榮逺軼漢唐酺馬甲黑格年七十三人瑞應昌期洪恩賜酺時萬方同樂愷千叟洽韶熈列席傳珍賚依光獻夀卮彤墀春正靄抃舞頌多祺馬甲佟澤深年七十三闡繹斟元運㑹昌惟天巍蕩日舒長下臣久荷生成徳珍膳重叨給尚方一闕下瓊筵次第開五雲深處得徘徊太平盛㑹真榮幸耆耋三千獻夀杯二馬甲髙渥飛年七十三糺縵光華復旦延洪夀㝢齊登張酺萬方同慶肆筵千叟為朋鳩杖拄時鵠立錦茵藉處雲蒸春殿從容天語介眉有酒如澠馬甲楊彬年七十三條風叶鳳琯瑞靄盈皇都聖恩播揚澤夀愷欣洪敷華筵列九霄珍膳頒仙㕑霑被徧黄髪鳩杖紛鳬趨分甘飫萐莆含淳㪺醍醐戎行榮預宴䖍效嵩山呼馬甲拴住年七十三聖主時幾敇熈朝庶事康詔開千叟宴恩戴一人長閩嶠弧星彩瀛東使客航歲長天共逺茀禄夀無疆馬甲六十四年七十三聖徳超三古祥徵兆萬年貞符開夀㝢熈運煥中天恩錫臣鄰共懽臚億兆連皤皤來逺服翼翼啟華筵紫氣呈霞闕黄雲捧日躔小臣何以獻長願福如川馬甲蘇章阿年七十三聖祖福黎庶千叟開廣宴我皇紹丕緒大酺張金殿濟濟盈三千錫爵中外遍里逾二萬遥臣有百五算鳩羮同飲和馬齒亦與選盛事曠代無呼嵩共歡忭馬甲五爾圖年七十三九重開夀宴黼座慶純禧大衍年初紀韶春日正熈齒慙符絳縣身幸厠彤墀袀服承恩久長霑雨露滋馬甲胡雄毅年七十三祥風囘玉琯協氣朗珠囊十二春風轉三千身力彊臣民歌且舞神聖夀而康盛徳超千古深仁浹萬方卿雲舒瑞景旭日麗晴光叨附耆年後銜恩嵗月長馬甲麻靈阿年七十三貞符集睿聖久道廓區宇純禧庇羣生景懿軼三古四維翕森張八表劑和煦紀元大衍䇿仁夀長膺祜瑶宴集大廷瓊筵布廣廡弇鄙藴寸丹衢謡頌何補懿鑠億萬年鴻䂓盛三五馬甲國興阿年七十三萬國尊親戴三多祝聖人祥徴皇極建夀集帝城春歌聽維祺萃詩吟既醉新拜颺班羽衛微末荷陶鈞馬甲巴顔圖年七十三郅治葆太和喣噢仰髙厚文教崇術四武烈式圍九化成慶孔洽嘉宴開嵗首龎眉集殿除和氣溢郊藪抃舞臣工偕愷樂瀛漠有敬頌南山詩天漿酌耆耉馬甲木克登額年七十三禔福覃敷錫耆年集禁闈讌開珍膳飫歡洽玉觴飛職在師干隊恩沾挾纊衣和風閶闔扇南極燦星輝馬甲金泰年七十三濟濟冠裳福祿穰三千人晉萬年觴鳩迎玉杖春風麗鶴舞瓊筵化日長得並班聯隨國老欣依丕冐飫天漿葵衷向日蕭漙露惟仰彤墀共拜揚馬甲阿林年七十三太平有象夀弧懸敷錫多祺重引年詔下三霄開廣宴恩覃萬㝢集羣仙嵩呼愷洽彤墀下鶴髪駢依玉陛前聖夀無疆膺昊貺歡承湛露慶洪延馬甲達蘭太年七十三寶祜承天祐瑶圖慶古稀九鴻調郅化八伯頌祥禨軒鏡冠裳耀虞絃解阜揮耆年邀渥澤列服朗春暉露作丹黄采雲成卿矞霏長將歌舞願環極拱璇璣欽定千叟宴詩巻三十
