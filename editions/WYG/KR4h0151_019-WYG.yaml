body:
  text: 巻十四預宴九十五人詩一百五首歩軍校富爾敏年六十六六合灑霖雨春風開紫殿制作參造化文質何炳煥三千堂上客童年皎如練恭承鳯凰詔列星燦成行光輝照天下玉盃賜瓊漿入侍瑶池宴草木皆天香琴奏龍門之録桐朝共琅玕之綺食象牀綺席黄金盤直上青雲生羽翼天子九九八十一萬嵗人自寧天地皆得一自言羲皇人百年三萬六千日葳蕤紫鸞鳥衣冠何翕赩躡星虹振緑髮飛龍趨歴西極五色獅子生彼月窟鳯飛九千仞鶯歌聞太液榮華有如此北斗酌羙酒大君若天覆恵澤及飛走造天闗獻聖夀集李白句歩軍校孔紹賢年六十六曈曨旭景麗初春芳宴開時喜氣新玉液瓊漿頒恵日蒼顔皓首受恩人螭坳香惹爐煙近鷺序衣沾曉露勻介夀佇㸔南極耀五雲片片繞丹宸歩軍校黒格年六十六一人福二儀慶三階平四時柄五代記衍祥六帝説標正七旬勵宵衣八表朗榮鏡九成春臺登十煇天瑞應百福來總既受釐千叟開筵爰布令萬口效呼嵩億齡同祝聖兆告嘉祥曰太平之盛京師畿甸采衛及要荒垓埏暢􅑴承天凝寳命數名體歩軍校巴凌阿年六十六鳬趨雀躍上公堂拜舞齊稱萬夀觴瑞衍銀潢綿五世祥開玉戺靄三陽同欣脱劍諸邊靜惟祝膺符萬禩長始信華胥非擬議袛應擊壤頌羲皇歩軍校那清阿年六十六閶闔霞蒸曙色殷引年千叟宴初頒人遊化日光天下春在堯階舜陛間百爾靖共心似水九重端拱夀如山版圖久拓編氓富瀛海綏豐瑞靄環執㦸舊隨貔虎列捧觴新預鷺鵷班小臣竊幸同颺拜喜起賡歌仰聖顔歩軍校綽哈那年六十六南極常聯奎璧光作人雲漢倬為章乾爻億載羲爻著祖徳重熙舜㝢昌巷舞衢謳春鬯洽敷筵授几露零瀼榆街環迾參戎校珍宴還欽飫尚方歩軍校特克慎年六十六天上人間盛事春王正月新年大衍策開五十恩筵席列三千祖武重徴熙洽天庥大慶綿延爭覩老人星現重霄璧合珠聯歩軍校何圖年六十六鵷鴻隊裏拜堯天環衛班中忝備員蚤得功牌縁荷㦸臣出兵三次䝉恩賞給功牌六面新䝉尚齒與霑筵聖恩稠叠榮施日國慶聯綿溢喜年屬國定知誇盛事呼嵩人已拓三千歩軍校富英魁年六十六聖世祺祥彚崇年曠典頒歡聲騰虎拜喜氣浹鵷班慶洽埏垓外恩承霄漢間抒誠葵悃切額慶仰南山歩軍校楊世顯年六十五九莖茁芝英五采翔鳯凰聖世重養老稠叠徴嘉祥我皇御宇五十載人民愷樂夀而康八公與五老河渚時彷徉爰舉曠典表人瑞煌煌温綍先遐方安車蒲輪集輦下文茵藻席陳螭廂辛盤纔薦廣筵繼大宴千叟調笙簧仙厨法膳罇爼芬芳皤皤黄髮拜手殿廊微臣執戟隨趨蹌如天澤被何汪洋願􅆽瓊漿祝聖夀萬年引進崑崙觴歩軍校常恵年六十五寳籙綿昌運寰瀛浹太和湛恩覃九有懋祉協三多仙樂調絲管雲閶集珮珂㣲臣霑賜渥敬進萬年歌歩軍校西成年六十六列校依仙仗周廬䕶禁垣含糈埀暮齒荷㦸負春暄一度隨營壘臣曽出兵一次得功牌頻年住里門功慚標夏部老更上天閽伏櫪嘶駘蹇扶蕂並鷺鵷從今娯日月賜嵗總君恩歩軍校庫爾庫年六十五尊罍擎出紫雲邊少小逢辰自記年縻禄春秋剛五十臣食俸餉五十年開筵姓字預三千曽無勲績堪書帛尚憶還軍荷賜錢臣以出兵曽得賞銀憶脱鐵衣歸𤨏闥更從金馬長華顛生平日月惟弓矢老去恩榮又管絃喜極不知霑醉久升恒願頌九如篇歩軍校徳敏年六十五聖主臨樞五十年歡騰萬國慶重駢龍飛健自同天徳虎拜榮教列地仙百戰搴旗慙勁旅兩階舉爵忝先鞭幸因馬齒儕常格列校容教傍御筵歩軍校舒明阿年六十五羲軒在位嘉祥滋至協氣濡蒸蔚興人瑞天子引年以示慈恵曠典更舉殊恩逺被玉杖雲集金戺鱗次時大合樂禮隆醬饋羣工奉觴都呼萬嵗持㦸小臣載舞載拜官厨既飫㫖酒既醉暄景榆年皆帝之賜歩軍校馬占年六十四聖主鴻圖洽耿光萬年盛㑹啟當陽鵷班虎旅齊臻列海耋山耆儼布行慶積雲深蓬閣敞春催花發御墀香方瞳紺髪依堯壤篆玉同呈既夀昌歩軍校鄭廷璽年六十四龍鳥超前帙珍符集麗辰夀褀燾萬宇福澤浩三春樂奏鈞天敞圖呈葢地新蓼蕭歌譽處雲物耀輪囷歩軍校常賽年六十四綿長寳祚荷天庥膏雨彌綸化日悠太史書年符大衍九重敷福騐申疇丹階春暖舒蓂莢瑤席花明侑翠甌何幸羽林邀慶洽同依金殿受恩稠歩軍校文啟民年六十四嵗星朗潤光攝提兆帝王夀與天齊氣盛東方徳在木禎符曽向宋志稽方今聖人真古稀均禧六㝢駢鮐耆蓬菜宫闕排雲敞九龍五鳯紛葳蕤彭籛斟雉膏赤松獻玉脂一一黄髮兼眉棃珍厨乳酒送頗黎飲之勝食齋房芝惟皇斟元陶萬象鴻化旼穆無端倪㑹延寳算億及秭何湏逺訪崆峒更具茨歩軍校那朗阿年六十三九霄爛漫仰卿雲忝列三千鶴髮羣廣殿即今來與宴邊城憶昔去從軍功牌叠受頒天府臣出兵一次得功牌三飲酺遙㸔慶海垠稠叠隆恩何以報願隨華祝答堯文歩軍校福住年六十三天開夀㝢㬅羡延長朱霞燦爛日耀九芒宵占南極圜海騰光于胥樂兮熙熙穰穰今日耆耋燕歌賡颺惟我聖神永錫安康歩軍校額爾色年六十三負羽從軍奏凱還微勞積嵗荷恩頒臣出兵三次得功牌五誰言筋力非强健自有天膏為駐顔一普天耆夀戴皇慈春麗長筵燕喜時郤幸近臣依禁闥向無私處感恩私二歩軍校孝順阿年六十三廣筵開嵗隨斗轉春風回春風近從天上發一日九宇皆春臺春臺之樂人所羡受賜不知無貴賤惟欽身作近天臣先得承恩預堯殿堯殿春光萬萬年普天湛露無私偏慎荷生成告凡百嵗來共許登耆筵歩軍校林龍年六十三韶華先百卉觀草已見齊大地湧仙源飲泉常浥醴眇躬逄盛朝受禄有常體何幸叨長年拜賜廷濟濟沾恩萬載同徴瑞三春啟望氣占黄星獻夀陳丹陛歩軍校固蘭年六十二瑞氣藹南極嘉讌開丹墀瓊筵綘露浥玉陛光風吹尚方六豆列珍饌雲漿北斗􅆽霞卮三千耆叟共抃舞榮及末校相追隨九霄沛温語三爵無繁儀願頌天保日升月恒川至山阜岡陵松栢之茂共被聖功利用厚生正徳水火金木土榖惟時歩軍校李廷銀年六十二羣工蹌濟蔚星稠帝錫康寧徧九州金戺蓂英敷甲子瓊霄弧影軼春秋綵籌耀日頻添鶴綠杖凌風總飾鳩慶值怡顔酺宴賜太平翔舞效輿謳歩軍校五保年六十二膺職多年儕七校叨榮此日與羣仙春光照地環瀛海湛湛露長依聖主筵一天閶盛樂九韶諧鯢齒如分羽仗排文綺精鏐頒絡繹紀恩還憶賜功牌臣出兵三次得功牌十二歩軍校戴爵年六十二吉雲捧日仰天門四海羣歌萬載恩鉅典盛昭繩祖武繁禧逺慶衍仙源龍飛五十舒醲化叟集三千奉至尊直軼虞庠隆燕禮漢唐酺飲詎同論歩軍校三保年六十二華封三多天保九如祝頌獲效中誠乃抒維皇御宇仁被八區天眷郅隆超古栗胥日暄雨潤化靡不孚功小恩醲齒榮歩趨萬夀維祺祝何以臚健維天行厚曰坤輿歩軍校來炳阿年六十一荷㦸微功䝉溢賞鐃歌聲裏百夫長臣出兵三次得功牌七賞銀三十兩閒來但覺恩逾深老至仍誇氣遒上敢説健兒身手好由來天子威稜仗前驅已向戰圖寫下走容教耆席傍小校長依環衛中馬秣官芻人飽餉全家衣食總天家六十以上上所養歩軍校呉文明年六十一久道天長眷祥光日再中重熙繩祖武景福集皇躬錫宴昭無外娱春詠在公何期週甲嵗早際慶辰同歩軍校窩什布年六十一一試舞纛手永櫜矢與弓臣曽出兵得優等功牌五次王師本無戰安得爭竒功歸娯犬馬年含淳蠕翹中錫宴恩何深虎拜隨羣工熙韶麗春景寰海翔仁風仁含得夀理春裕養物功歩軍校博爾中武年六十一尚齒曽聞載往編榮光今麗衆星躔真超四代膠庠典詎論三雍醬饋筵湛露方欽需燕譽丹墀先慶近龍顔昇平治具昭隆備佇聴圜橋璧水邊歩軍校玉徳年六十一樂愷龍光典盛雲仍燕翼禧蕃瑞叶千秋嘉慶覃敷九宇鴻恩曼夀南恒拱北循環貞復當元主聖是徴仁瑞臣微何以颺言歩軍校蔡加錫年六十一聖朝錫慶洽重熙筵集千人再倍之六幕氣調天蕩蕩萬年春麗日遲遲螭坳集處聯瓊珮鳩杖扶來飲玉卮説與連營諸火伴君王神武溢堯眉歩軍校張恒年六十一列虎拜聞簫韶山呼萬夀羣趨朝俯覺風和春晝永仰見日麗中天髙髙高華盖雲凝彩六合承庥千萬載頻報榮光曉塞河長瞻鏡色春融海河海呈祥效帝功斯民獲慶何其豐小臣得夀皆兼福况復叨恩錫宴同歩軍校巴蘭泰年六十一韶春丹陛荷恩光鶴髮趨陪鵷鷺行錫福榮頒千叟宴延齡齊獻萬年觴晶瑩厨萐承仙露糺縵宫雲靄御香七校微臣逢盛㑹盈皆拜舞共蹌蹌歩軍校郭爾敏年六十一錫慶重熙日臚歡大衍年蒼顔依露彩黄髪奉星躔雲敞蓬萊闕春深錦綺筵惟南呈拜頌萬載荷陶甄歩軍校蕭相儀年六十一春盎垓埏淑氣含引年盛典荷恩覃福敷寰宇歡臚萬宴啟仙壺祝效三角亢星皆依斗北春秋分見候弧南阜財久叶時薫咏更沐天膏浥露甘歩軍校清保年六十一早登軍帖荷金戈紫塞無塵海不波今日天漿教獻酢武夫也擬效巻阿一棡鼓聲中掃幕庭蒲桃釀酒凱筵馨殿前今奏簫韶曲試比鐃歌更好聴二歩軍校薩靈阿年六十慶露依雙闕春臺仰九重班聨同抃舞鞮譯盡賔從芝映蹁躚鶴松蟠蜿蜒龍捧觴欣上夀闓澤徧堯封歩軍校阿産年六十荷戈曽出長安道超距輕身㨗于鳥落日萬里邊塵銷齊唱凱歌鳴鼓鐃功成敢詡弓刀伍廟算天聲播神武同􅂁同澤樂從戎八旗子弟舊家風疑年六十剛及格此後長齡皇所錫即今宴樂拜御筵雕菰露醖皆延年歩軍校郭煜年六十軒鏡雲凝華葢堯階日麗端辰叟集三千盛宴恩榮萬古常春馬齒周纔一甲鵷行慶得同申從此山呼萬夀年光嵗嵗彌新歩軍校胡世勲年六十中天日月麗升恒閣道連輝繞玉繩瑞氣曙融丹露渥祥光霄暎霄雲凝三陽盛際春開泰四海同歌夀作朋身列期門依尺五萬年嘉㑹得同登歩軍校劉永祚年六十萬國朝正候良辰六日詹維堯天宇大曰夀帝廷僉拜舞臯䕫盛榮華福禄兼典行周海内七校喜均霑歩軍校朱登年六十糺縵卿雲焕紫宸輝煌綺席列華茵舉觴盛㑹超前史賜杖殊榮眷老臣翌旦惟人占七日先期有慶兆三辰飫恩早景中天運霑澤常熙大地春淑氣融怡開夀㝢祥烟晴霽藹温綸幸隨羽仗分簮紱更捧瑤圖識鳯麟松嶺羣仙徴徳聚洛陽九老遜風醇遭逢正喜瞻依近繁祉咸欽帝化純歩軍校伊靈阿年六十尚齒徴前典扶鳩慶異粻重熙協堯渚渥澤軼虞庠堂陛清寧合松喬嵗月長端春開禮宴拜舞叶龍光五品典儀中徳年七十八慶洽青陽節歡臚紫禁城珍符開大衍曠典邁耆英齒席龍光近櫜弓虎拜榮椿年歡共祝栢琖跽同擎夙效馳驅力彌増拊躍情身依天咫尺心忘嵗崢嶸綘老羣工隊黄圖衆叟名從兹千億載盛舉紀元正五品典儀官七十兒年七十四蕭露歌傳燕喜除風序轉鴻鈞華髮人遊夀㝢介眉酒協陽春洽慶豳圖觩晉論年軒紀環循藩衛榮叨五品重熙典繼初廵五品典儀官柏彦泰年七十四皇心隆宿齒身到紫霄間祝衍千人算恩叨五品班清香依畫省白髮映童顔仙斚從容授珍厨次第頒福深猶頌海慶積效呼山已覩西池上駢琛獻玉環五品典儀官趙邦俊年六十六洪鈞錫夀燦東皇芳律依春漏箭長職忝典儀趨玉陛花前鶴髪預行觴一周甲餘齡又六年飲和長是樂堯天欣逢繩武傳嘉㑹人瑞重開尚齒筵二五品典儀官海寧年六十二皇風天浩蕩積照樂春臺尚齒排芳讌調元賜玉醅松篁霑滲渥鵷鷺集髙嵬竊愧衰庸質羣邀厚徳培五品典儀官和昇額年六十錫宴來千叟恩深湛露濃日添春莢六時積慶熙重綵勝先華髮醇膏飫玉鍾錦茵敷次第鳩仗列雍容膳醴加常秩賡颺逮賤庸奉觴登夀㝢歡祝效葵悰三等䕶衛永泰年八十四聖主斟元握金鏡熙績撫辰叶通正雨晹時若泰階平瑞徴朗曜南弧映夀㝢崇開洽太和保佑自天膺景命錫福彤廷鉅典昭開筵廣殿耆英盛小草俱䝉湛露濡寰瀛共獻卿雲詠欣陪蘭錡浥天漿九如申祝偕稱慶三等䕶衛郎圖年八十四長生籙注百春秋不及君王錫予優己駐童顔杯泛蟻更添老健杖扶鳩一雉尾晨開彩仗霞新陽抃舞頌椒花臣僚駢上軒皇夀海屋籌探鶴算加二三等䕶衛徳福年八十一寸草㴠天澤頺齡荷聖慈盃傳春㶑灔筵集夀期頤仙侣分曺接韶光浹日知八旬叨䕶衛抃舞話昌期三等䕶衛白二格年七十五九莖芝彩映銅池潏露飛甘澤倍滋瑞集百僚嘗玉醴祥開五葉茂金枝已超億萬雲龍紀肇輯三千雅頌詩惇史聯翩書姓氏編年廿萬㑹彤墀三等䕶衛林住年七十四老食天閑週甲年臣供職甫八年榮參列衛應星躔更從鶴禁羣仙籍歡洽榆街益夀筵一普奉恩綸賤不遺班隨鵷鷺蔚光儀金甌玉燭長調日黼藻舒華徧耄耆二三等䕶衛常福年七十三黼座開華繖琪筵侍彩斿星輝依綘闕雲景勝瀛洲酒挹金波釀盤承玉粒饈康衢同鼓腹備福進箕疇三等䕶衛七拉布年七十二光華復旦泰階隆平儲祥萃祉景曜彰明帝敷闓澤中外耆英大禮秩秩和樂喤喤接以筐篚應以鏐笙旃䝉肇啟攝提初貞齡依鳯牒春滿龍閎遊燧皥世等佺喬生東海算積南極輝瑩玉筵康爵蕩蕩由庚三等䕶衛倭興額年七十一瑞叶三元開夀㝢祥迎六日敞春臺鑪香瑞藹氤氲上玉座遙瞻紫氣來一邸第班隨渥澤覃娱遊盛世愧儋耼七旬又一身猶健頌禱心殷華祝三二三等䕶衛徳楞額年七十一廣樂延祺茂初陽益夀偕福疇天子叙恩綍兆人偕瑞積星雲藹春敷竹栢荄微臣叨渥錫壤祝許聯儕三等䕶衛和明年六十七穆穆皇仁溥被率土五十年春受天之祜既熾爾昌迺夀而康禹糧堯韭樂及萬方厚澤恢恢耆老偕來雲占太史瑞獻靈臺恵我黄耉酌以大斗億萬斯年拜手稽首三等䕶衛保徳年六十七上軼羲農軒世以及姒子姬年圖籙重熙累洽徳澤翔霄浹淵丕冒已過日出弗違真在天先敢效管蠡衷赤敬賡耆叟千筵三等䕶衛鄂永年六十六氤氲佳氣繞蓬萊翠䍐遙瞻曙色開一曲英莖仙樂令金階同進紫霞杯一廣殿賡歌解阜風卿雲八伯綴詞同三千禮樂隨芳宴更續衢謠頌泰鴻二三等䕶衛伯齊泰年六十六仰清㝠掎春星珠聯璧合象緯凝指圖經稽地靈東瀛西汜輪廣應洽儀形壽萬齡聖皇御世嘉祥蒸啟八扃兆六蓂耆顔壽耉趨觚稜飫蘭馨觴桂􅌬大禮和樂聲華騰頌康寧依帝庭拜手稽首歌咸登三等䕶衛徳興年六十五古稀天子備諸福敷錫寰㝢為一家羣生普現壽者相化成乆道舒光華玉階羽儀列鵷鷺方瞳壽眉絢彩霞長春仙籙天上錫申以需宴龍光加小臣六度備扈從勾陳嚴衛隨瑵葩記擐重甲𨽻驃騎腰珮兩鞬馳駿騧先登何功荷牌給臣出兵時曽接仗三次獲有功牌壯志直欲搴戎牙凱歸厩櫪感豢養嵗月冉冉赴壑蛇陽輝垂照到寸藿露華濃浥隨春葭八紘文徳正熙洽臣效虎拜凛寵嘉三等䕶衛五十六年六十三虞歌卿雲八伯駢賡周歌燕鎬耆艾揚觥漢唐賜酺藻飾昇平曷若聖代兩舉咸莖覆冒之徳上嫓太清百千萬億皓叟同禎來趨絳闕三千有贏賜爵賞賚實實閎閎帝徳帝壽泰元光亨惟知愷樂共矢葵誠敬依瓊陛竊附瑶笙三等䕶衛木騰額年六十二聖代際重熙化成躋乆道光天積曜舒麗日揚暉杲皇宇本如春春到惠耆皓簪紱萃顔皤祳袀同髪暠極建福斯備敷錫同壽考喜起聨虞廷愷樂燕周鎬儀鳯應韶石湛露沾豐草煦育徧寰瀛生成鼓洪造三等䕶衛札爾虎年六十二太和保合仁恩覃堯天雨露均濡㴠昇平有瑞先夀耉長筵錫坐聯裾簪有來趨蹌髪㲯毿飫以醇醪餐以甘唐時雨師赤松子周家太史儋與耼葆精毓壽匪異術太和醇化之所含聖帝彌綸軼羲昊大宇孰不沾醲醰小臣醉飽叨異數自慙蒲柳誠何堪自慙蒲栁誠何堪萬有千載長樂湛三等䕶衞琦􅟴伯年六十二閶闔祥光啟鵷鸞喜氣増陽春臺共洽仁壽㝢同登算積黄星朗歡從紫海騰皇圖緜萬禩愷燕日方昇三等䕶衛圖明阿年六十一青雲連襼趨丹陛白髪依光近玉除叟輯班聨周甲始春来瀛嶼建寅初列筵臚拜仁風漙帝座親臨麗日舒此日香醪邀異數萬年嘉㑹慶簮裾三等䕶衛六保年六十一緝熙承世徳煦育遍寰區黄耉沾恩渥青陽拜賜俱華筵張錦綺仙杖綴瓊琚舞蹈隨鵷末羣瞻曠典敷三等䕶衛依拉竒年六十瑞紀珠囊麗時占玉燭調龍光承帝眷燕譽洽臣僚有詔徴黄髪隨班上紫霄百年樽手賜一品爵先邀華杖盤鳩鶴香函艶綺雕豐亨儀鎬洛豫大樂咸韶露湛三陽廻風和萬景昭天顔欣咫尺綏福懋春朝三等䕶衛都隆厄年六十慶洽敷天盛生逢擊壤時淳和千載㑹保定九如詩麗旭輝螭陛祥風展鳯旗恩覃寰海徧大造仰無私三等䕶衛鄂金保年六十螭吻春雲際曉開合班咫尺到蓬萊瑶階高下聯羣叟綺席東西序上台次第頒珍華溢俎雍容賜醴湛盈盃手扶仙杖榮黄髪國慶天恩仰聖裁雲騎尉常鈞年八十四金闕青陽啟瑶階麗景妍鳯圖欣錫羡鶴算幸長延天上耆英㑹人間蓬島仙蓂香春茁六椿老叟逾千尉忝承雲騎班慚預綺筵頽齡叨厚禄五十有三年臣食俸五十三年雲騎尉堆青額年七十六愷宴千叟集玉陛羅􅋛珩傳觴並鵠立序齒連雁衡聖人統天時一徳占元亨元為衆善長亨乃嘉㑹成三陽協交泰羣雍慶咸寧微臣忝世𨽻葩瑵依芝英奉職六十載華髪叨殊榮黄流映玉瓚福禄萃昊清願進萬年祝昌運三階平雲騎尉色克圖年七十五香繞爐烟刻漏遲春風先上萬年枝翩聨鳩杖承恩舞宫啟乾清飫玉卮一緑髪蒼顔到海潯天埀翠幕湛華斟萬人歡洽先耆壽都是皇家長養深二雲騎尉額爾登額年七十四愷澤新同嵗月添老人星向玳筵瞻頒酺茂典千行渥貴齒隆儀四代兼列坐從容分翠斚尚方珍寵賁霜縑白頭乆沐恩波濶丹陛初承湛露霑雲騎趨陪華秩忝海籌叠衍聖齡占共聆韶樂逢昌際賡詠還聞頌禱僉雲騎尉保全年七十一北辰拱曜南弧燭洽氣駢填景朝旭天閶九重詄蕩開瓊筵㸃注長生籙聨行華髪太平人共祝三多向紫宸野萃地行仙有幾人沾天上宴稀聞敷茵翊序逢韶嵗仙醖時饈澤咸逮嶰琯儀凰鈞律新芝雲篆鶴卿暉麗醇膏霑渥樂融融論年以萬萬福同天顔有喜春常滿玉斗珠衡燦昊穹雲騎尉百神保年七十六日韶光正麗億齡曼夀方長星拱雲從侍座金壺玉醴稱觴蓬島方籠瑞靄觚稜正耀朝陽拜舞欣逢嘉㑹歌謠慶集百祥雲騎尉傅蘭年六十九春風揚詡天地和恩光喜起中朝多詔徴千叟嘉㑹合藻魚樂頌瞻居那㣲臣少小事鉛槧五十年來憶遊泮勲階延賞藉華資茂典宣慈預清讌訢誾景物依蓬萊青鳥值序晨司開紕幕華裀列廣座排雲彷彿金銀臺㣲才世選良家子躬逢盛事榮莫比螭頭拜賜同山呼歸來敬述天顔喜雲騎尉公泰年六十九慶襲榮叨世賞延霞驤羽轡五雲邉龍光晝接昭囘景馬齒榮承壽耉筵祝進華嵩同廿萬算符鸞鶴集三千餘齡綘縣將開袠豢飬恩深舞勺年臣食俸己五十五年雲騎尉宗柱年六十八酒既清肴既馨於皇樂胥耆老攸寜敷天慶仁壽率土揚威靈樂萬民之所樂蔚嶽峙而淵渟吾皇福履綏四海征僑靈圉來於庭韶咸載奏兮聲冷泠願歌萬嵗兮祝千齡雲騎尉郎元福年六十八古稀天子頌康年王㑹圖開福禄綿萬國謳吟登夀世九霄宫殿敞耆筵聞韶風暖笙簫叶餐綺霞舒黻佩聯卿月移來環鳯閣景星聯處暎貂蟬玉盤彩泛丹砂注綺席香浮碧藻鮮春滿皇州人盡樂康衢鼓腹意陶然雲騎尉發哈年六十八河洛圖疇肇啟星雲景審交輝瓊臺共斟仙醴玉座同瞻紫㣲庭樂躬聆韶石爐烟身被香馡拜賜榮隨簮黻稱歌懽逺垓圻雲騎尉明全年六十七雲麾舊職隸元戎從獵曽鳴霹靂弓五十年來承雨露還依春殿坐春風一祥擁紅雲綺席新春祺敷錫八埏均豳堂鎬宴庸堪擬介夀三千眉壽人二雲騎尉塔清阿年六十七盛朝眉壽擁仙班遲日瓊筵渥澤頒春色滿衢尊泛灔榮光入座錦斑斕趨承豹尾叨恩乆抃舞螭頭捧賜還敢以頌揚為報稱嵩高人自效呼山雲騎尉巴音岱年六十六太平多長壽吉徴著論衡祥風和氣普四海春來草木皆增榮乃知聖皇斟至化肖翹跂息莫不含熙醖泰滋生成在朝盛黄髪在野多鮐氓聨行翊序皤髪三千叟請祝聖人曼壽而稱觥魚麗酒鹿鳴笙熙朝嘉㑹今重覯不數遊河五老華渚飛明星雲騎尉富克精額年六十四聖世蒸人瑞延洪萬福同在廷賡燕喜向日有葵衷異數㸔攜杖昌時早挂弓遙瞻春霽色輝映夀杯中雲騎尉恩特赫年六十三至治享萬年大衍蓍甫揲五世協嘉瑞慶衍綿綿瓞孟春啟御宴盈廷皓叟列趨歩齊珪璋光華耀藻祓下希征與喬上追𨽻與頡是皆沐長養髫齡至耆耋錫宴既優渥延齡逾蔚鬱拜祝效堯封傾葵向龍闕雲騎尉三格年六十二昔傳里社懋集耆英煒煌盛事行册騰聲矧際昌期千叟接席鶴序鵷儀覲于瑤闕歡騰萬國慶洽三春天子萬壽賚錫璘玢穆穆懋典上廸前光重華昭徳儼肅賡颺是輯歌聲惟頌惟雅臣襲世賞永依韶夏雲騎尉永寧年六十一春祺欣普錫聖祚慶洪延授杖臚千叟稱觥祝萬年恩綸頒紫極雅奏叶鈞天舞蹈瑶階下丕昭帝澤宣雲騎尉兆魁年六十春風詄蕩壽㝢開日邉丹詔雲龍裁岳祇瀆靈普􅆄蠁廣被萬國耉與鮐耆齡日竁併月􅒸新陽咸㑹芙蓉闕光敷玉殿啟階蓂露湛金盤出厨萐厨萐階蓂麗且鮮聖皇乆道開琪筵文明上徹碧霄逺列宿焜燿依辰躔期門末校趨班序禮盛裳華多譽處韶樂中和九奏宣嵩呼三聲齊拜舞欽定千叟宴詩巻十四
