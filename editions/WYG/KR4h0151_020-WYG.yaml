body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻十五預宴七十六人詩八十五首原任同知李暉年七十九同知臣暉言吾皇元樞調追庖羲軒轅踰伊耆溈姚功勲天聲揚文章心精超乾坤師天行深宫勤衣宵因兹彌頤和無疆春秋髙寰瀛多耆齡鴻鈞咸埏陶前期騰絲綸嘉筵開端朝旃䝉闓熙春新正當辰朝觚稜初陽暹罘罳和風條前庭陳元音鏗鏘中和韶瓊墀連瑤階旉茵排螭坳雲漿醲醍醐珎羞淳母熬鳩頭笻枝扶銀牌精鏐雕無功䝉恩優惟因長年褒稱觥躋公堂元臣偕卑寮藩封尊桓信羣官推䕫皋微如農工儔旁施濛瀛遥千人誠云多還盈三千饒隨肩安期生相邀初成茅同添稀齡籌須彌山岧嶤熊熊天邊星南弧環璇杓翹瞻薇垣光京垓懸層霄全平體原任同知李納璧年七十日月舒昌運衣冠集上台恩從雙闕下筵向九霄開步武文鸞接班聯皓鶴陪春風叨湛露樂夀慶栽培原任同知干殿琰年六十九協氣流春條風入吕均九垓禧錫萬國酺朝登師師野游旅旅臻福禄林㑹仁夀宇祝帝之夀夀同天壤水滌河禎山凝嵩響黄髪為儔煦以長養優游娛嬉如小兒狀七曜遵度三靈翔和醴流滂渥芝成祥華禎圖瑞典降福孔多臣飫茂澤蹈詠賡歌原任同知廣寧年六十八糺縵卿雲開升恒咏天保濟濟三千人夀宇登熙皥樗材昔佐郡服官非不早無以報國恩鼔腹隨庶老介眉近龍光尚齒賦魚藻慶洽典嫓隆萬彚歸洪造盛世多長生詎必安期棗原任同知實徳年六十同到蓬萊頂上行雲璈徐奏倚瑤觥珠囊久映金繩麗黼座長調玉燭明千載卿暉増緯度九重仙靄宴耆英欣欣小草含膏露披拂春風自向榮原任守備徳成額年八十二弁纓一介奮力於原帝念微勞錫以渥恩臣出兵一次仰䝉兩恩賞給功牌銀功牌紀績榮貽子孫何期皓首祇奉堯尊華筵有秩嘉賚式蕃自維衰賤感極何言原任守備李肇英年七十三萬姓飲和食徳中天備福儲祥鳥紀秩逾巢燧龍圖瑞越羲皇赤子咸臻黄髮紅飴不數丹囊恩宴新春式啟羣歡麗日同長原任守備常凌年六十七人可夀夀以仁徐幹論夀首王澤古皇之世恒如春泰上成鳩萬有八千嵗鶡冠誦說非虚云揚雄述方言燕梨齊眉豫耋秦耉八方多夀民老聃二百修道而養夀彭祖乃以久特聞登夀車履福衢聖皇錫福盡性至命含龎淳何但南陽飲甘菊豈惟漆園紀大椿臣效啟期歌陋彼麥邱之封人原任守備文治民年六十四㫖酒錫金罍耆筵鳯闕開萬年觴共獻千叟宴還陪盛典輝前古鴻恩徧九垓太平偕擊壤歌詠樂春臺千總候補守備王為琮年七十五皇握寳鏡光錫厚禔位五合十羲圖端倪夀躔蒼宿陬貞攝提遘兹嘉貺蔚頒紫泥日宇下夀其公堂躋孰鮐其背復齒而齯能效一職輻凑航梯文階武級恬示蒸黎國典有常繩歌鳬鷖數再倍千兒扶杖攜臣沐巍化兵庫于奎例榮復及恩銜春荑何以芹獻􅎽鞠首稽承是權輿嵎東􅒸西泰元媪神曼夀亘齊千總候補守備李克私年六十八臣本期門舊列陪蹶張曽是預掄材臣由武舉入仕居安亦右千夫長難老欣擎萬夀杯轉粟上天將畫舳捧觴匝地總春臺昇平榮遇寧私慶浩蕩皇仁遍九垓千總候補守備胥廷佐年六十七㪺雲漿飫珍饍萬國來朝宗彤廷鍚嘉宴鬖鬖白髮三千人瓊瑤一酌回春艷小臣生長事票姚引年迎慶同卑僚與嘗玉饌奉醇澤長生共慶歌簫韶千總候補守備石元龍年六十三羲和仲叔首春時官序䕫龍禮典夷慶典務光天益夀臺萊朱草溢丹墀一眉夀髙于嵩泰顛何須終古問彭籛千班虎拜容成後乘雅真教籀頡傳二體人名千總候補守備孫鼐年六十三昔聞歌鎬飲今見集耆筵瀛嶽諸祥集星雲衆緯聨億齡皇建五三倍叟盈千仙杖叨恩賜還顔近日邊千總候補守備席徳亮年六十三鶴髮承恩拜玉除曈曈旭日御筵初大官中使傳宣疊飽食惟慚報稱疏一授几傳觴傍五雲中和韶樂碧天聞聖皇奎藻敷耆席薄海䖍觀景慶文二千總候補守備傅登衢年六十穆穆健行天巍巍頌聖年八方仁夀宇一體耋耆筵飽徳榮分座迎禔慶合氊堯衢春到早奚事訊喬佺五品恩賞銜西拉布年六十一狼比地有大星秋分之曙見于丙春分之夕見于丁皇帝春秋億萬紀増受泰元神筴載周而復始福汪洋雍神庥四海貢圖籙萬國駢珍球肇從拓迹開統來鴻徴衍溢列史無與儔新春錫嘉宴拜舞賡洪算祚流萬葉基無疆芝草告祥郁光燦五品恩賞銜髙照年六十七聖夀古稀叠衍帝廷需宴重頒酒正饔人在列鯢齒鮐背以班五品幸邀渥賫七旬優予寛閑殊遇難期千載至樂願布九寰五品恩賞銜西元年六十六鳩杖聨翩至螭坳次第登九天垂雨露萬國頌升恒燕饗經雖重賡酬史未曽千筵崇聖代茂典慶頻仍五品恩賞銜色爾福年七十一聖主龍飛五十春特開齒宴召蒲輪萬方耆耋來仙闕重譯梯航萃老臣玉斚酒分金掌露瑛盤果列尚方珍陽和布暖羣心恱葵藿抒忱三祝陳奮軋生機干在乙蕃滋人統月逢寅恭維嘉㑹符天象南極星輝拱北辰奉直誥封大夫胡鑑年七十九箕子疇陳五皇極探本惟曰攸好徳吾皇大徳與天合法天行健强不息對越常存乾愓心顯承兼施創守力一日二日理萬幾一夫一婦籌衣食五十年中宵旰勤三千界裏敦龎集以此格天天鍚嘏聖夀聖福徴必得古稀有五容晬穆猶日孜孜無倦色慶開五福五代堂孫更生孫孫千億考之史册見未曽安用駢詞藉文飾兆民頼之方恬恬帝乃用敷徧四國數典重啟千叟筵先春兆和特降敕期頤耄耋者偕來兼及東藩與西域數増前宴兩倍贏人是重熙百年植維時新韶蓂葉六皓首同躋五雲側九旬一品手賜巵餘亦各頒鳩彩赩精鏐文綺賚有差浩蕩恩波深莫測松蒼柏翠應駐顔鶴舞鸞翩更摩翼稱觥齊獻萬夀觴拜手咸歌天保什士農工賈盡依光有喜寧惟近臣識用知鍚福信有由敢向箕疇徵以寔奉直誥封大夫馮熠年七十二扶桑升兮煦萬方士老牖下亦得瞻天光瞻天光兮飲且食羣黎百姓徧為徳臣生江鄉嵗月遒虎阜崒嵂胥江水悠悠聖人六度勤巡蹕沐浴闓澤歌豫遊長與父老望雲日臣生七十有二不能通籍拜獻知無由何幸天顔覲咫尺一介草莽今得拜冕旒酌堯尊調舜膳杖扶鳩兮斚錫燕歸向兒孫語傳將閭里羨臣之子侍御史一為考功郎訓以夙夜匪懈庶幾報上徳與有榮焉臣老得義方奉直誥封大夫李琲年六十七九霄捧卿雲五鳯銜天詔帝澤同春陽光輝無私照微臣長西川煦嫗荷福曜欣隨耄耋肩來集蓬壺嶠良辰值新韶霽色瞻徳耀引年恩有加角徴諧古調青竹杖扶攜紫霞杯飲釂夀世人夀増丹顔駐如少奉直誥封大夫邱倫年七十四紫殿雲輝朝麗彤堦霞彩春温杖刻鳩方拜賜斚臚兕以承恩緑髮千班瑞鶴丹衿兩序祥鵷都沐天顔錫福長歌帝載調元奉直誥封大夫劉溥年七十一人夀彰嘉瑞耆筵靄上春稱觥臚耄耋敷福徧臣民誥荷殊恩沛歡逢盛典新叨陪鳩杖列醉飽頌皇仁奉直誥封大夫習傳禮年七十蓬萊宫闕綘雲昭咫尺天恩下九霄齒以上中排鶴序班將内外合鵷僚玉笙早入東風律翠斚頻斟北斗杓白髮蒼顔䖍拜賜微臣榮遇勝松喬奉直誥封大夫任雲路年六十九韶序需雲啟和風鶴髮恢紀恩瑤殿逈繩武綺筵開北斗傾天酒南山獻夀杯齒慚期耄耋身幸到蓬萊羽衛墀邊肅仙班日下陪皤皤千叟集拜舞上春臺奉直誥封大夫汪居敬年六十九鍚福自聖人仁夀躋斯民偕來北闕下共獻南山春笙竽聴雅奏酒醴頌清淳熙熙衆叟列苾苾芳筵陳臣昔司士鐸華黻䝉恩綸殊榮拜渥賜惟有舞蹈頻奉直誥封大夫杜述曽年六十六千叟羅芳宴三陽啟令辰華茵敷九陛康爵洽羣臣鶴髮煙霞列鸞坡雨露新長筵週數甲懋典肅維寅倬漢聨星緯熙臺集珮紳泳遊􅇽聖化申錫荷恩綸臣以子臣杜兆基任吏部主事恭遇慶典恩封實深榮幸朂報丹忱勵依光紫禁親敢云詒式榖勉以荅洪鈞燕譽隨耆老鮐顔拜玉宸登瀛雲景麗捧日霽暉匀漏刻仙壺永爐煙香案春願將天上賜歌咏鑑湖濱奉直誥封大夫裴藍仙年六十五雞籌報曉鳴珂響春殿凝祥春盎盎瑶臺雪㸃玉梅香丹陛風開羲馭朗小臣挾䇿試昌辰榮以蕪詞邀睿奬瀛州子舎沐醲膏御宴榆年被殊賞奎文炳煥燦天章兩世欽承慶澤長敢謂文章能報國願從鵷鷺共稱觴年年歡洽人増夀長仰皇仁嫓髙厚天上春深億萬年一人夀合三千叟奉直誥封大夫邊念祖年六十四上日符交泰彤廷奏樂胥主恩燕蕭露臣賤守蓬廬綵勝通金戺黄樽拜玉除來同歌萬福直是邁黄初一夀世鴻祺鬯熙時玉燭調重輪週甲算叶瑞指寅杓嵫景榮封綍嵩呼許杖朝飛觴斟玉液梨頰盡迴韶二奉直誥封大夫姜永亨年六十一聖皇舉典首從時五十鴻圖炳上儀嘉與八埏同福夀慶臻千席捧仁慈光天化日鵷鸞喜積祉儲祥景卿隨作息鼔歌咸帝力游衢野老又何知五品誥封職銜張海光年八十一慶積重霄靄恩敷萬國駢含飴從赤子飲醴到華顛久沐昇平化重開樂夀筵通衢傳賜杖璀璨五雲邉五品誥封職銜趙敏年六十一新杓燦珠斗麗日揚天街舒祥宙合滿積慶寰瀛偕帝治越軒皥人夀臻羲媧禮筵溥耆耋華髮趨庭階上自扉閣重下逮矜紳儕瀛濛齊拜舞鞮譯同潔齊斟元一氣合賜福三朋皆目矚藻黼盛耳聆鈞韶諧唯歌億萬紀敷天泳聖涯内閣侍讀齊里克圖年六十三月正上日天子萬年耆筵嘉宴來集三千三千之集既齒而爵海㑹有源山呼惟嶽大廷肅穆天語和温授杖於陛錫醴於樽夀㝢同登鈞天並奏臣竊樗姿薇省春茂便蕃之賜既莫不同涓埃効少海嶽恩豐左春坊左中允韋謙恒年六十六郅治超隆古春祺萃禁中耆筵繩祖武健徳備宸躬五十年初紀三千叟大同自天開景象率土荷陶融懋典延逾廓光儀洽倍隆皋䕫聨組綬雨露逮蒿蓬周甲人増算由庚樂奏矇遥瞻星極紫近映日華紅濟濟來壺嶠番番軼鎬酆已欣顔矍鑠更被澤龎鴻臣筮鴻漸陸初諧鳯在桐遂叨蕋珠榜更預玉蟾宫臣由迎三名鑾試授中書及殿試一甲賜進士第芝苑春光靄槐㕔午翠籠九重承簡命多士忝從風乍返三齊轡旋乘六詔驄外臺宣徳化行省竭愚衷臣於山東學政任滿䝉内疊擢滇臬㸃藩䕶理黔撫三年之荷殊恩深慙非分眷注慚深篤愆尤忽己叢滌瑕邀汜濩破格仰磨礲詔許蘭臺校銜從秘閣充宫坊階洊晉講握籍重通報答曽何有馳驅附在公頻䝉天澤沛獨受聖恩洪臣以䕶理巡撫失察属吏獲譴旋䝉殿提恩賞編修在四庫全書處行走充武英調文淵閣校理第一分書成洊擢贊善中允充講起居注官兹縁二三四分成書尚速復荷日特㫖議叙加無髙厚恩施有己馬齒駸駸長螭頭步歩崇依時占瑞莢得地望宸楓况復輝雲日相隨祝華嵩萬斯年受祜錫羨更無窮吏部主事沈鎧年六十四韶風應律啟芳辰喜氣騰隨燕譽新玉陛為儀聯鳯翽天家珠瑞衍麟振香浮柏葉杯中酒歌叶昭華琯裏春忝列銓曹隨儤直萬年長此協忱恂戸部主事富興年六十二韶景開新嵗豐亨處處皆鳯書銜魏闕雲􅀢擁天街扶杖瓊筵集稱觴鶴髮偕陽和兼帝澤汪濊頌無涯户部主事書英阿年六十三韶陽布木徳雨露滋桑麻川原錯繡春城花古來活畫未有此粉本惟我皇上丕冒敷光華算計户口恒河沙一夫不失所捐租免漕惟恩加林林丁壯日水耕火畬年豐人夀五十載四海樂利同一家翠華問俗且屢蹕黄髮受貺真無涯仁念近侍臣日依黼座觀亨嘉英年奉職各成叟庶其洽慶排朝赮况啟盛宴集千叟恭繩祖武期非遐倍之又倍勢如此雖増十倍寧為誇微臣職司㑹分曺惟勉持籌牙朝參効趨走逢春翠色垂青緺年希張蒼喜得半恩列轅固榮何賖陳詩欣得紀萬幸長願從此嵗嵗與宴餐青霞户部主事富爾泰年六十四堯日正舒長騰歡遍八方榮依周甲日宴及度支郎夀鏡千秋籙仙椒萬嵗觴繁殷計生齒保慶荷無疆禮部主事福川年六十七皇猷洋溢邁羲炎曠代鴻施海㝢霑幸列容臺循秩序更叨綺席引怡恬珠囊瑞合三辰正寳饔香浮百福兼萬夀筵開輝紫極九霄路湛洽蒼黔班分劍佩齊鵷列曲譜琳瑯協鳯占帝語如春知澤溥天顔有喜切雲瞻祥源茂衍綿𤓰瓞泰運休嘉致鰈鰜此日耆年齊効祝華胥樂意化同漸禮部主事哈精阿年六十七瑞靄繞祥煙蓬萊鍚綺筵遭逢趨殿陛歌舞徧垓埏祝預春官後身沾帝澤偏椒觴長入咏蒲轂豈誇懸數協三千禮恩隨尺五天蒼顔真是瑞輝映錦窠邊禮部主事林檎年六十一賜爵加恩禮賡詩咏緝熙長逢春盎盎共愛日遲遲授几龍光叶添籌鶴和隨上林何所見風動萬年枝刑部主事張脉年六十八昌符衍數運昇平仁夀同綏慶普行蓂莢瑞敷春啟籥藻蒲愷浹宴傳觥星聯南極珠光爛人詠西曹鶴髮榮六十八齡初錫杖從兹嵗嵗到蓬瀛刑部主事伊敏年六十一大衍貞符協前光慶典遵恩膏翔廣宴瑞靄布新春祝萬重熙日盈千再倍人蒼顔傾緑酒歌舞豈勝陳工部主事書麟年六十一嵗首紀春王御極年五十千莖芝英生五彩鳯凰集夀㝢開八絃龎眉滿京邑賜酺何足云羞耉典斯輯一猗兹皤髮叟近承天子光載拜或載頫鴛鷺紛成行寵鍚未有艾俾爾夀而康願言慎其儀飫徳矢勿忘二工部主事張為裘年六十一糺縵光華旦瞻依浩蕩天恩敷寰海外慶近泰階前花甲籌添嵗元辰斗應躔需雲占易象蕭露叶詩篇水部名殊愧金梯路可縁扶鳩來玉陛舞鶴向瓊筵盛㑹兼微末分曺復接聨欣榮依夀㝢共作夀官傳工部主事伊明阿年六十七昌運洪延景福開喜看四海頌春臺自榮樗質依楓宁拜舞同擎獻夀杯一杖鄉嵗月樂韶曦躬際文明郅盛時不信五鳩并九鳸一齊榮翼鳯凰儀二工部主事烏爾賽年六十七昌辰萬福臻駢闐春熙敷錫覃八埏天門朝暾開詄蕩黄髮濟濟登耆筵我皇繩武道逾擴日新富有超古先萬年基鞏磐石固五世慶衍金支綿川増福至岳獻夀京垓億秭誰窮詮况循懋典拓嘉燕倍之又倍寧惟千臣𨽻版曺積有嵗報答徒愧無埃涓恩膏既滋甘露渥炳耀復與南弧連遭逢聖時一何幸瞻依仁夀均無偏拜颺豈稱効祝意惟仰久道仁如天理藩院主事多爾濟扎布年七十四於鑠皇恩八表懷服憬彼維藩巽命爾榖更闢昄章天樞地軸奔走偕來翕受多福箕疇皇建周詩百禄錫厥庶民既優既渥至于萬邦醴膏滲漉夀㝢延洪耉耆雍穆維五十載月正日六畢雨維星芝英㪚馥恵靄膏浮禮成儀肅禧均垓紘歡騰岳牧親接龍光方典國屬預讌分榮呼嵩效祝理藩院主事巴克當阿年六十六軒管三陽啟堯蓂六葉敷引年覃聖澤錫宴㑹仙壺盛軌諸藩慶歡心薄海俱曺司陪典屬嵗嵗效嵩呼理藩院主事阿萬達什年六十四郅化道成於久覃恩慶洽惟隆喜聴風謠寰海祥徵日贊羣工宴拓膠庠典懋光敷繡甸春融曼夀仰依黼座向陽齊効葵衷理藩院主事富通阿年六十四前代職貢稀僅𨽻四譯館我朝疆索開遂置理藩院洪惟天聰天命年王迹肇基自東甸䝉古四十有九旗九白充庭偹藩翰康熙分封喀爾喀雍正大定青海亂鱗集麇至諸部増我皇鴻勲繼述善凖回兩部大凱奏逆者既除順者受天眷安集延暨布魯特二萬里外敂闗皆内面遂於理藩院屬特置徠逺司薄來厚往情無間土爾扈特歸順後遂胥䝉古之族一民我輿臺尺地我㝢縣王師底定兩金川土司土木土舎亦附年班旅朝見越裳雉竒肱車漢以博望使唐以立本圖方今隘矣安足羨不見北沙漠西濛氾浿水之東桃闗之外其人皆入千叟宴内務府主事兆信年六十七瓊筵髙敞彤雲翔金膏瓊醴紫瀣光瑶圖炳焕景貺集龍紀五十開珠囊萬國歡聲臚闓澤西逾月竁東扶桑游河五老星象聚惟聴萬嵗嵩呼揚大羅天上擎瑶爵不數香山社在洛丹陛同歡御酒來普天還飫衢尊酌珍重堯㕑寳饌羅臣職彭羮調太和臣叨直房御膳吾皇玉食每至旰惟願四鬴民間多内務府主事興徳年六十二屑以赤松之水玉糜以涓子之木精卭疏石髓毛髮古方回雲母身軀輕夀可延顔既駐拍肩挹袖應無數郤笑千年山澤臞遭逢未有今榮遇遇若何仙班共向堯廷羅大千分吸崑崙露紫極垣髙瑞靄多内府微臣敢稱老飲和食徳皆天造恩賜欣容上界遊赤心惟獻安期棗内務府主事維新年六十嵗籥舊連新迎春己浹辰萬方齊集福明日瑞占人愷弟叅寮末耆英領席珍雲需榮燕衎風涣布絲綸平格瞻天夀賡歌仰聖神欽知依宇下亘古荷鴻鈞門景運主事托倫布年六十五夜雞人趣禁鐘龍光夀宴慶雲從星髙雙闕春光曙花覆千門喜氣濃守鑰竊欣依碧落升僊復得比昌容扶鳩為報同游侣景運今開第一重原任主事依里布年八十二玉杖金樽次第頒千官鵠立擁仙班自欣辭職周星紀臣於乾隆三十七年告休閱今十二年䝉恩預宴實為異數白首重來謁聖顔一新韶舒疊曉曦鮮閶闔雲開列綺筵葵藿愚忱知獻頌古稀天子夀如天二原任主事廣明年七十七曠典周璇極春祺萃玉珂萬年昭鳯紀奕世叶麟歌瑞應耆英合嘉筵恵澤多書同賡喜起雅意奏巻阿軒鏡呈仁夀羲爻布太和九人嗤㑹洛五老陋從河几杖盈廷鍚珍竒式序羅小臣曽珥筆臣前任翰林院侍讀學士才忝頌恩波原任主事福住年七十猗猗豐草膏露滋之菶菶華桐朝日晞之我皇式宴以鍚夀祺春生皓髮喜隘龎眉臣忝青鎻瑕釁自貽已罣吏議重荷聖慈南榮偃曝髙厚所施寸忱捧日如彼藿葵勝裁百福圖陳九芝晉三多祝獻萬年巵原任主事瑪靈阿年七十景運洽太和聖風陶庶彚啿啿飫醇醲九有耆英蔚陽春行慶敷恩筵肩摩踵接叟三千仰瞻泰階賦湛露盛治逺超懷葛羲黄年臣昔佐秋曺協中觀化普皇仁自與幬載齊臣職詎有涓埃補而今皓首重趨朝欣承渥澤頒三霄舞干羽鳴簫韶卿雲糺縵鑪烟飄愧無能名巍巍蕩蕩之景象竊附華封人祝康衢謠候補主事佛尼勒年六十二復旦賡歌化宇寛春和始布詔恩溥大千世界無疆夀三百班聨十倍官藜杖近依羣鶴舞瓊筵髙映五雲攅耆英似昔稱河洛誰識稱觴萬國歡都察院都事董元鏡年六十二尚齒虞庠盛端春特賜醽千行排鶴髮六茁記仙蓂海屋光環繞雲階慶叠増天潢五支麗宫樹萬年青拜舞霑甘露聨翩近景星仰依仁夀鏡品物荷流形都察院都事張廣基年八十五丹墀麗雲宴韶光照黄髪皇眷紀恩私啟序端正月同仁重一視升階後官閥悉以耆年登共酌金杯凸精鏐與文綺盛自尚方發扶杖拜賜歸肌骨健超忽曕依曷有既東竁極西􅙡萬載協清寧普天望峩闕都察院都事張自道年六十五雲漢長瞻七曜聨不知身亦與瓊筵三台恒正依辰極萬象還昭入夀躔露沃榮光花勝上風生春色酒鱗邊循環細數蒼龍角真信張星本在天大理寺右寺丞額爾謹年七十三古稀聖主日升月恒鳯紀茂祉符應咸登文謨武烈莫不顯承三亹九曲河海清澂曽元侍陛衍慶雲仍迺宴千叟懋典欽繩臣荷化育具官棘丞欣沐夀祺三千其朋登歌合樂禮舉歡騰惟天行健茀禄攸凝對揚麻命勉竭夙興來同萬福如川方増寺丞銜陳謨年八十五山澤臞儒化宇游同天䝉賜列仙流臣以八十觀塲癸夘年䝉給寺恩特賜舉人次年㑹試後恩丞銜青春不負争先甲紫陌還看立上頭向日承恩歡叠沛飲霞吐氣願何酬竹西歌吹揚州路六度迎鑾拜彩斿臣籍𨽻揚州儀徵縣迎遊鑾六次歡奉豫樂部寺丞楊承福年六十一盛典臚千叟仙班及二毛臣心猶自壯天澤已均叨瑞數堦前莢春移海上桃涓埃何所答率隊奏雲璈光禄寺署正杜兆羆年六十仙㕑膳飲効羮和徴瑞還呈寳鼎歌不信流霞久霑飫恩深明許醉顔酡一夀宴新排八百筵紫庭佳話報新年從兹禁署惟栽竹个个平安祝萬年二欽天監冬官正惲源景年六十七錫福逢新序延齡啟瑞圖獻鳩環北斗紀鳯迓南弧出丙春祺普開辰夀曜符晉書天文志十二次度數夀星在辰正月初六日恰值丙辰開天夀㝢鴻人協應蟬聯耆叟集燕樂聖情娛申命頒華綍寅衷紹逺謨慶綿𤓰蔚瓞恩湛萐盈㕑晝日爻占晉卿雲宴協需蒲筵排雁序楓陛效鳬趨酺宴超炎漢韶音奏有虞悃忱通屬國歌咏遍康衢玉燭慙窺管金甌鞏握樞堯封頻祝嘏億禩澤覃敷欽天監五官正保善年六十七聖徳溥髙厚中外歸一體祺延億兆春疆拓二萬里番番列黄髮臣工仰鍚祉帝命賜瓊筵曠典隆無比禮酒拜三行嘉殽飫八簋小臣職占星頒朔遵鳯紀萬夀慶添籌履端協乾始欽天監五官正莫爾根年六十三紫宸錫福綺殿開筵恩敷六幕班集羣仙春旗簇仗雅樂鳴絃衢尊露湛聖藻雲鮮小臣窺管職𨽻司天金行執矩弧彩占躔歌賡復旦瑞紀非煙拜手以祝天子萬年太醫院左院判張肇基年六十六木公東海馳星䍐西有昭華奏瓊琯杖藜拜闕夀筵開六日迎春春已暖帝徳如春萬物熙引年䝉賞青囊醫長生永奉調元體舜陛堯階瑞草滋太醫院御醫李徳明年七十五祥輝慶靄玉階明萬彚滋榮各效英不向林蘭探秘笈聖人恬養洽還瀛一仙班紫府叅微秩康爵耆筵荷渥恩芝草延齡花益夀太和保合體乾元二太醫院御醫張淳年七十一聖人治區夏元氣栽培若鼔冶岐伯俞跗不須並世生仁夀生民錫純嘏浥甘露扇和風筵開千叟歡宴同人多碧眼及方瞳廿四人聞京兆銅豈如我朝聖澤之龎鴻臣老而夀非臣術頤養順時咸有秩欣䝉皇建演箕疇世溢康强慶逢吉從來盛世瑞足徴瑶光降葠成人形臣雖熟習百草靈伏惟聖徳清泰協無極仁覆宙合皆長生直使上藥徒偹仙家經太醫院御醫姜晟年六十七國脈延洪世夀康上池何必飲長桑䕶持元氣三千界都有人天駐景方一夜看巻舌耿醫星黄帝長留本草靈忽悟駐顔鴻秘術只須丹地覔仙醽二欽定千叟宴詩巻十五
