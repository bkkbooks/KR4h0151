body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻七預宴七十八人詩八十六首輕車都尉承紹年八十二金碧觚稜旭景鮮詔從紫禁敞雕筵奉車已荷華資廕就席欣看禮數䖍麟殿賜氊排彩仗鳳樓觀酺汜朱絃早逾東序延耆老未羨南榮曝偓佺家法羲軒欽繼武朝儀睢洛遞差肩古稀天子承天慶五世瓊枝祚萬年輕車都尉鐵保年七十八聖人首出恩膏溥八表共球集庭户淳風保赤邁古皇曠典引年繩祖武三漿絡繹出天厨六膳繽紛飾雕爼熙熙白髪儼趨蹌戢戢華簪同拜舞聿稽宴衎古有行前者鈞臺後鎬京未聞邀澤皆耆耋兒齒方瞳遞舉觥臣叨世禄慙無報執㦸從征記年少赫濯天威奏凱還從容聖世依鴻造金鏞迭奏鶴籌添薄海蒼黎聖澤霑小臣敬獻登三頌禁扁欣聞五福兼輕車都尉四十一年七十八丹詔輝煌自九重由來耄耋未身逢天將星日流為瑞人盡風雲識所從並列千筵浮玉醴羣扶九節倚仙笻輕埃莫效賡颺意萬嵗嵩峯復華峯輕車都尉瑪爾洪阿年七十五文字浩千萬綸綍謨猷盛和聲隨祥風上戴天子聖吾皇詔祖烈積照涵德鏡俾夀浩無涯坐與億兆慶東風右掖春九州花相應穆穆鸞鳳友金舂撼玉應帝載彌天地元祗祉兆姓崑崙髙萬里鷄唱聞清禁下已億萬年瞻相北斗柄集韓愈句輕車都尉覺羅安德年七十一渥宴彤庭開秩秩醰粹醇醲恩普溢詔集耆齡預廣筵獻嵗發春之六日融融芳序轉三陽暖律微和日漸長疊拜瓊饈兼玉醑羣看鶴髪綴鴛行扶鳩抃舞霑慈惠周雅欣同歌既醉耄年更預引年觴喜共松喬班齒位仗外輕風入柳條雲中廣樂奏仙韶于胥愷樂歌嘉讌長願稱觥頌帝堯輕車都尉吉祥保年七十九重堯闕旭初升令莭先期近試燈十日春風纔送暖億齡夀㝢喜同登鸞旗莅學歌難老鶴髪盈廷慶作朋嘉㑹曠逢千載盛華筵夐設五雲層珍羞飫處雕盤燦玉醴斟時露瀣凝螭陛鈞韶偕樂愷鵷班黄綺共趨承虞廷世賞叨恩渥鎬宴歡騰頌福増壤叟康衢齊抃舞躋堂親見兕觥稱輕車都尉柏凌泰年六十七慶襲華資𨽻奉車腰鞬長得扈鑾輿三漿六膳天家饌身傍紅雲侍燕胥一棧豆虚糜卌二年欣榮復綴叟三千金盤齒馥和羮味綺席肩差介夀筵二輕車都尉五格年六十七璿璣斡運穆矣天行聖協厥撰久道化成春祺啿啿光被八紘洪惟仁祖叟集千英皇則繩之數倍而贏三殿敞赩五齊泛清鱗集鳬萃鏘鏘佩珩臣惟散木洊至華纓承恩襲祉奉車叨榮禮參飲饋樂聆英莖仰祝曼夀稱彼兕觥輕車都尉金忠年六十六列爵趨丹禁叨榮侍玉除謾云參上駟敢詡駕輕車盛世人増夀餘年帝錫譽三千符禮樂百五邁圖書就列擎春酒依行入直廬丹忱歌愷樂嘉㑹日方舒輕車都尉巴哈布年六十六軒鏡臨丹極堯尊酌紫宸獻鳩隆國老躍雀及微臣騎昔隨千帳盤纔列五辛紅雲遥捧處瑞靄指勾陳輕車都尉魁住年六十五廣殿祥風和氣韶春慶禮芳筵錫純爰進千叟繩武於昭萬年燕飲詩傳周雅賡歌韻叶虞絃奉車世承右職登瀛名𨽻列仙輕車都尉薩哈岱年六十四元正啟祚光風被蓂舒六葉呈金戺長庚星朗拱松軒三多競祝三陽始引年錫宴㑹蓬壺申命春酺各尚齒醲霑紫府碧雲漿分甘黄耉天顔喜耆英矍鑠數倍千異瑞庥徴承帝祉雲璈天半徹瑶池九閶佳氣螭頭起備員羽衛沐優班幸與崇筵荷綸㫖願從無量頌長生鶴算循環億萬紀輕車都尉塞泰年六十三琅璈仙奏叶雲韶帝澤涵濡雨露饒皓首龎睂羣侍從武臣榮幸傍丹霄一祥烟瑞日煥楓宸濟濟簪纓拜舞均願上華樽稱聖夀攜鳩長樂太平春二輕車都尉慶海年六十三霽日輝丹極需雲啟御筵恩光榮四照春慶集新年卦揲全蓍衍籌添列屋連玉觴齊捧處真覺福如川輕車都尉伊林泰年六十一惟聖建極資始體乾作人雲漢峻極于天洪纎燾覆中外陶甄申命巽布斟闡化權深仁涵育慶五十年廸維祖徳重光聿宣濟濟耆彦莘莘華顛乃蠲初吉乃設酺筵臣忝中尉奕世賞延莫崇惟岱纎埃棲旃莫深惟海涓流納焉合叟之算増如嶽川聖齡永慶夀鏡大圓輕車都尉馬成麟年六十一帝德邁羲唐海宇登仁夀羣欣化日長疊荷恩寵厚玉詔下紫宸金闕集黄耉仙樂動南薰天漿頃北斗拜舞覲龍光曠典得未有微臣事執殳竊祿卌年久深慙馬齒増每隨豹尾後何幸異數頒錫宴與千叟願進萬年觴長此歌岡阜輕車都尉佟連貴年六十襲職承恩渥非材忝羽林趨風慙駿足向日矢葵心玉醴頒三爵雲璈奏八音引年隆曠典聖德萬方欽輕車都尉色爾登年六十慶值中天祝聖時盈廷拜舞㑹期頤貞符溯自仁皇啟廣宴重叨大澤滋春入九閶人靄靄歡同八表物熙熙雲漿便是延齡味不羨金膏與玉芝廵捕右營叅將馬乾宜年七十四夀㝢擴無際苞赤縣神州冀以涓垤思超華祝衢謳恩兖兖四塞瑞緼緼溥周六蓂青陽啟萬國蒼顔稠舒徐萃纓祓重疊捧饌羞自對揚蹌濟迄懸車巖陬庶老謝荆扉名藩赴星郵扶桑偕闓豫南極同炳彪奎章柏梁賦開宴佳氣浮橐筆上雍容執㦸明光儔稱觴復稱祝億載鞏金甌九州名體原任叅將孟克年八十二夀㝢韶光麗祥飇鼓太和引年真懋舉紀盛許賡歌曾識風雲氣長哉雨露柯據鞍慙馬援健飯比廉頗易卜需之泰詩云㫖且多嵩呼並華祝洋溢是恩波原任叅将富爾遜年七十玫戺春浮翠葆金鋪曉敞瓊筵三漿唐陛杯斚九奏虞廷管絃叨秩久慙豢養賜閒仍荷傳宣壺郎敬書嘉應瑞緯南天早懸原任叅將寧順年七十紫氣蓬萊仗星筵霄漢間醴肴逢饜飫珍綺逮班斕禮樂叨今數韜鈐是舊班十齡周甲後恩渥駐衰顔原任叅將福明年七十八紘齊慶福如幾三殿筵開春晝暉絳算共隨仙籙永夀星羣拱帝垣輝恩華今喜聨尊斚戎隊曽經列靺韋琪樹萬年雲五色敬從瑶戺識瞻依原任叅將王希曾年六十七昊天儲祉錫聖天子敬德欽承萬國綏履天五地十龍飛瑞紀肇億萬年贊元扶理四海耆夀龎睂􅆅耳來㑹於廷星雲錦綺以人為瑞值春方始肆筵設几酒香肴㫖鳩杖斑斑文紈儗儗駢錫無量三千迤邐唯聖天子天徳合揆唯萬國臣翊拱垣紫豈唯豳歌躋堂酌兕萬夀無疆軼千聖軌原任叅將堆欽額年六十六盛世耆鮐數乾坤億萬家並邀天澤渥共紀帝恩賖地接琅霄近光騰若木華擎巵漿似玉懷核棗如𤓰煇抱羲輪珥辰開斗柄車青陽齊愷樂緑髪最亨嘉夙忝犀函列今慙馬齒加翎猶揚五色轡尚控三花六葉周餘甲重英建後牙為看環海祝溢慶靄閩闍原任遊擊千佛保年八十無邊福德仰巍巍慧日祥輪耀九圻一切微塵臻極樂衆生夀者普皈依三千世是華嚴界五百厨餐薝蔔馡八祑小臣千佛保萬年敬頌佛光輝原任遊擊星保年七十六微臣名星保敬知仰北斗耀傍紫微垣主錫天下夀一星名天樞璇璣權迭受玉衡及開陽瑶光實杓首貞陬萬物春燦爍光華糺是時泰運昌天子錫千叟肅穆覲華葢五精廿八宿含譽暨格澤暉映天厨酒經緯積靈憲精英絢澤藪小臣依末光駢羅仰蚴蟉昔忝觜參末今隨角亢後連珠耀南極天地同長久原任遊擊達冲阿年七十二天威震疊式九圍鎮西宜禾我藩籬執殳憶從羆虎師偏裨備職供指揮臣於乾隆三十年曽在烏什城打仗運籌决勝仰聖算振師奏凱孚神機功牒優加及營弁邊陲底靖成功巍暮齡歸老復邀寵引年盛典頒彤闈生逢六紀荷聖慈龎睂華髪相因依春殿從容隨鶴列榮光俯照銜恩暉即今崑臺併月窟操璠握瑾同㑹歸小臣拜手獻謡頌羲圖萬里呈祥機原任遊擊韓寧逺年六十九維皇錫極燾冒九圍允文允武作君作師儀型萬方綱紀四維新陽吉日麟舞鳳儀酌尊甘露佐膳臄脾皤皤黄髪以恬以嬉考驗往籍孰嫓惠釐開榮灑澤駢頌皇祺原任遊擊黒黒年六十八萬年開夀㝢千叟彚臣僚北斗璿衡轉東風玉律調衢尊方叶慶華祝更増謡錫宴鵷聨序賡歌鳳舞韶非烟瞻瑞靄就日捧璇霄鎖鑰雄邊寄臣前任宣化府遊擊櫜鞬懋賞邀敢誇臨陣勇已荷䇿功超臣出兵打仗前後得功牌十䝉賞銀兩列衛衣裁褶隨營射舉標臣前後隨圍六次力應慙矍鑠班喜𨽻驃姚燕譽承恩重詩篇記露蕭原任遊擊常格年六十八寰宇翔太和化成資久道仁夀萬斯年永世錫難老韶光開玉衡春宴麗魚藻臣齒自髫齡忝列戎行早厯官備遊奕振旅從征討臣曽出征打仗三十四次得功牌七駐景荷恩慈不羨安期棗宴預千叟倫于胥邁軒昊九如莫不増詩人善頌禱微臣願賡颺虎拜陳天保原任遊擊佟保年六十六曾分戎閫到黔陽萬里熙和慶靄長玉醴金盤分湛露耆齡此日奉恩光一椒屏獻嵗啟春暄朶殿臚歡奉帝恩世載素餐臣職愧葵忱敬獻萬年罇二原任遊擊趙宗灝年六十五福地承恩渥滇雲紀嵗華榮隨仙仗近慶拜御筵嘉彩鳳儀還舞靈桃實又花如天歌聖夀春色浩無涯原任遊擊德住年六十一陽春育物雨露滋薄植悉荷皇天慈㣲臣竊禄四十有七載退休幸得瞻洪儀仰惟仁祖朝千叟觴彤墀乃今童顔皓首列坐數再倍自耆而老而耄期臣昔奉軍符奮力黄沙陲旌庸賜鏹典稠渥感激久已淪膚肌臣出兵打仗五十六次蒙賞功牌銀兩邇來涓埃百無效大官月廪猶虚糜何期樗櫟材獲賡魚藻詩願頌大斗敬祝無量夀長依化日瞻皥熙通議誥封大夫達春年九十一天惟純佑命皇建其有極和恒四方民明哲實作則乃承敘萬年用丕式見德在璿璣玉衡協時月正日廸唯前人光子孫其逢吉則無遺夀耉越小臣諸節有服在百僚乃言底可績俊民甸四方純其藝黍稷唯兹唯德稱乃賡載歌曰五服五章哉予擊石拊石以昭受上帝萬邦惟無斁集書經武翼誥封大夫白為公年八十四祥圖天地寶道聖夀日月升恒獻嵗詔開閶闔長春瑞洽觚稜臣齒剛周七紀仙班叨預三朋欣共文麟威鳳慶依玉檢金繩三等台吉阿布都尼雜爾年六十九帝德超三古皇仁暢九圍淳文開傑閣神武定戎衣崑嶺逾西極葱山拱北闈河瓊來紫緑宛馬貢騂騩康阜咸州縣迢遥若輔畿羣瞻天覆燾共耀日光輝絃喜薰風溥詩歌湛露霏萬年崇聖夀千列荷恩暉末齒儕黄髪春光覲紫微瑶圖恢海屋願逐鶴籌飛三等台吉帕爾薩年六十四靉靆卿雲現瞳矓化日舒獻琛來絶域執㦸侍周廬虎拜瞻金闕鸞歌奏玉除微忱隨擊壤湛露霈崑墟廟四品太官黒達塞年八十化宇躋仁夀芳筵啟上春天庥滋備福人瑞集良辰銀甕呈瑶圃璇樞麗紫宸典申重有慶澤沛浩無垠誠召三靈叶圖呈萬葉新駿奔臣職分榮被帝陶甄弱質舒微藿長年䕃大椿欽兹慶雲宴賡得和輪囷廟四品太官保住年六十五蒼顔黄髪聚耆英濟濟三千愜聖情盛有箑蒲頒帝座不煩斟雉自臣鏗萬方齊樂春韶永九夏曽聽大樂成肅穆聨班仍序齒駑駘何以答恩榮四品頂帶原任頭等䕶衛闗保年八十六九宇駢黄髪三多祝紫閽夀徴觴上夀孫慶榖詒孫笑語堂廉洽瞻依庶類蕃自榮環衛士就日捧堯樽内務府茶房二等侍衛三格年八十三解識人間瑞草魁筵開天上許追陪耆英榮入三千數甲子欣排五百迴蟹眼曽容調湛露龍團每喜聽春雷南陽菊水猶能汲長瀹頭綱萬嵗杯二等侍衛舒通阿年八十一薄海陽和煦元功化育該有生依夀㝢至樂共春臺雨露層霄降鵷鸞逐隊來藜光從丙見蓂莢向辰開清切依丹禁恩施飫緑醅鈎陳忝宿衛獻頌愧鄒枚二等侍衛農阿里年七十八天地貞符健君臣慶㑹同筵開雙闕北樂奏五雲中嵗届冲融日春深長養風幸躋華皓列長得奉宸躬二等侍衛尚茶正依拉布年七十六璧月龍團瀹雲腴兼扈豹尾從風馳天顔有喜示臣愚玉泉之泉伊遜水荷露雪水天漿殊不數中泠品第一銀斗鑒别程錙銖五十年來膏澤渥職微已幸霑醍醐碧琳春酒新宴俱三千數復儕庭隅恩榮長此何所如日升若木星為榆二等侍衛書通阿年七十一夀㝢歡聲孚有顒瑶樽仙醴大官供三千協數隨羣鶴九五乗時附六龍從此年長宜著令不遺人賤到恒農醉歸先與家人説枝上春光日正濃二等侍衛布克進年六十九皇慈孔洽如春之熙溥兹寰宇錫以夀祺皤皤黄髪千載一時叨預華讌進拜彤墀班聨以序賚予有差陽和所被衰朽不遺昔邀簡拔獲佐偏禆金川殄冦玉壘還師朱提夏服受言藏之臣出兵金川蒙箭十賞功牌二梅針勛微賞渥感積愧滋豈期皓首更睹上儀偕衛士列祝天子釐兕觥春酒臣何人斯二等侍衛七十一年六十九帝車運中央寶座衆星拱勾陳麗天垣閣道叶禁甬㣲臣榮地近翔步荷天寵上下符台平少壯糜禄重新禧迎春斗齒衰氣彌勇黄中萬夀觥慶向紅雲捧二等侍衛福森布年六十九春殿冲融響玉珂傳宣欣被湛恩多九天嘉㑹堂廉近一曲雲璈鼓太和一金紫聨翩玉戺間流雲滿酌駐童顔始知身在仙班内不數蓬壺海上山二二等侍衛睂夀年六十八六葉蓂開曉日九重燕啟朝陽身近雲霄黼座杯斟沆瀣天漿鳳管鸞璈廣樂鵷班鷺序仙行願以臣名睂夀堯天敬獻千觴二等侍衛福照年六十八養老邦之典皇慈念所均鴻庥凝萬國嘉宴倍千人紀盛年為已開陽月建寅九韶諧律盛六莢覩蓂新酒喜巡三爵羮欣飫八珍龍光孚笑語虎拜協臣隣共切南山祝同叨北闕春有生逢曠典長願荷陶鈞二等侍衛覺羅蘇昌阿年六十七庥徵人瑞龎睂紺瞳耆英盛宴仁夀大同氣轉洪鈞祥榮紫禁遹豈汾歌隆惟鎬飲萬年際㑹八表嵩呼知逺自近歡騰九衢臣列仙班夙依羽仗春與蓂舒心傾葵向南山北山有臺有萊猗歟盛矣唐哉皇哉二等侍衛斐凌阿年六十六堯時聞説賜耆筵鶴髪千人擁仗前曠典重循逾甲子依然慈惠繼當年一仙禁曈曨曉色開聨翩鳩杖舞春臺郤慙仍藉三霄露共上南山萬夀杯二二等侍衛二逹色年六十五雅咏南山篇南山之髙髙極天萬古黛色與天連天行一周五十一萬三千六百八十七里有奇數是為三百六十五度四分之一之常躔衆星萬有一千五百二十隨以旋中有南極星輝爍光流衍長對北極作樞轉北極出地三十六度髙乃為紫微之層霄吾皇握樞運天德南極北極中建極夀聖無疆聖仁天則民安其業官守其職聿自黄帝甲子四千四百八十二年來未之有此一千八百五縣與夫朝貢之邦皆夀國庭中三千龎皓輔以翼亦猶可名之星熒熒色雅咏南山篇不如髙頌天天何言吾皇法天日乾乾二等侍衛薩哈連年六十三淵耀無垠夀康寵錫闓陽初布純祉時積雉扇春容螭堦舄奕鶴趨鰲抃有來絡繹職𨽻周廬榮參常伯征僑偓佺娯遊聖澤二等侍衛三德年六十一微臣祝萬紀恩私長慶天行扈從時肅望朝暉開扇雉靜聞晝漏近坳螭禹糧堯韭春膏溥契拜臯颺盛典推有昔榮班俱溢分況論馬齒受瑶巵二等侍衛阿敦年六十曠典超前古芳春盛宴開鼎亨隆酒醴頤養遍耆台咫尺龍顔近三千鶴髪陪期門慚奉職忽地上蓬萊雲麾使和寧年六十法殿羅鳩杖彤墀戞玉珂惠風天澤溥化日夀徴多瑞繞恒春樹祥融太液波三千人拜舞億兆獻衢歌副叅將傅明年八十二新年紹序紀星回丹鳳銜書下露臺萬國棃鮐添喜色春光先自日邊來一恩榮咫尺得瞻天自幸生依紫禁邊八十二年從此始願惟長是與華筵二副叅將韋䭾保年八十一我皇御宇綏萬國彛訓鴻敷建中極丕基惟日廓洪延行健同天勵不息大文體道涣號布恩威戢逺穹碑泐垂裳端拱治無為長令民躋仁夀域琯叶三陽大地春珠聨五緯中天翊引年秩典故華筵詔引耆英拜殿側臣叨豢養八十年戎衣一勉駑駘力師貞恩賫溢微勞夙夜兢兢多曠職何意天光榮小草春風被處滋繁植珍庖饜飫歌湛露徧錫珍奇使各得雖欲颺頌臣無能盛典惟知萬古特副叅領巴延年七十六彤雲靄朝暉春風融曙雪嘉宴啟璇宫日紀蓂六茁天子纘祖典四海幾耆耋盈千遂再倍郅化理已徹春生春酒中花迎花勝節戎行若㣲臣乃兹叨預竊同時華髪人歡動鴛鸞列盛典願屢逢頤和萬方悦副叅領額圖渾年七十五堯廷傳五老鎬宴紀千官合作同朝盛應知自古難華筵欣舞鶴盛世集翔鸞渥賜還均及真騰四海歡副叅領巴哈年七十四新春靄靄韶光禮宴欣欣恩賚嵩呼近溢日中鈞樂遥聞雲外耉年生際昌期藩國來同王㑹歡情已入詠歌盛事真堪圖繪副副叅領珠爾杭阿年七十三敷錫崇頒酺賡歌覲紫宸臣心榮向日帝澤盎如春鏐綺班分荷韶咸樂具陳上儀真邁古抃舞頌堯仁副叅領中科泰年七十三星明南極耀光芒帝賚髙年錫福長愧領虎幡參八校幸陪鶴鬢預千行杯斟玉醴濃天露茵接瑶軒藹御香譽處歌中欣式燕恩流神䇿感騰驤副叅領佛隆武年七十三集英廣殿靄祥烟喜傍丹墀益夀筵鳴鳳已同青帝律扶鳩初及絳人年臣年七十三嵗充廷蹌濟升黄髪侍坐從容勝列仙德合無疆欽久道治逢有慶祝洪延仰參豹旅三垣衛願奉觩觥萬福平從此據鞍彌矍鑠承恩常近五雲邊副叅領六十五年七十二太虚蔚層雲糺縵五色絢上接老人星炯燿祥光現淑景舒以長和風靄紫殿皤皤黄髪翁濟濟邦之彦春酒競趨蹌養恬荷天眷恩波及微臣勝㑹澤周遍執殳曽前驅扈從備䇿遣今歌鹿鳴三復與鎬京宴願進萬年觴舞蹈攄歡抃副叅領伊興阿年七十二扶輿開景運浩蕩仰皇猷德邁中天盛恩敷四海周𤓰綿輝玉牒松茂叶金甌千叟耆筵集還隨麟鳳遊副叅領柏靈阿年七十二青旗簇仗曉烟開瑞氣氤氲入座來鵠立歡騰聞雅奏萬年春進紫霞杯一蹌濟班聨厠羽林瞻雲濃處聖恩深筵開榮列三千叟常戴天家豢養心二副叅領巴達塞年七十二重熙燦禮樂倬彼雲漢章軒紀嵗俶始羲景晷舒長上尊列丹陛協氣延青陽蹌蹌集羣彦尚齒同虞庠周雅紀饗燕頌祝申無疆未聞肆筵几耆耉羅千行仰惟天行健恭遇典矞皇遂使虎旅榮咫尺依龍光副叅領翰班年七十二異數頒從天上醲春早到人間欣是長年禁旅叨隨此日仙班共酌堯樽北斗同歌周雅南山六甲週還一紀蒼顔幸仰天顔副叅領王興邦年七十二弱齡奉環衛聽鼓先走馬受禄五十年效力慚駑下兹晨一何幸逐隊聆肄雅彤廷預宴席沆瀣分瓘斚頓令樗散姿更復為壯者天保許陳詩稽首葵忱寫副叅領富清年七十一䌡經紀養老虞燕夏以饗饌珍設醬語不經漢家故事惟有上尊及鳩杖皇矣耆宴開太和洽休養瑞牒祥編禮樂華重熙再見瓊筵敞雲非烟以冪棟日騰輝而在掌九重仙籙名𨽻三千叟雲中樂奏鈞天廣小臣八袠開樗材散木永荷雨露長昔隨列校班䕶軍榮陟偏禆膺懋賞俯慙駑駘姿惟堪充立仗芝席蘭尊闐玉雕駐顔頓覺春和盎舞康衢歌擊壤歡飫天漿矍鑠增老人之星奕奕南弧朗副叅領黒格年七十一稽雅星名夀天樞數最長應時昭鳳紀錫宴洽龍光八表金甌鞏三霄玉露嘗松喬容列席稽首頌羲皇副叅領佛什保年七十一聖皇握矩聲教敷德威遐鬯臨函區雪嶺蓬婆昔阻化旄頭西指封狼貙小臣荷㦸從幕府縛賊入獻天顔娯白金朱芾錫異數尚衣榮更相傳呼臣曽出兵二次得功牌十五面獻俘索諾木賞銀百兩朝衣一副自來縻禄荷豢養但看熙景遊華胥作人夀寓集人瑞又瞻千叟羅簪裾衰朽餘齡預賡拜螭蚴共沐春膏濡微才效答分寸無惟歌既醉諧嵩呼副叅領庫爾坤年七十久照垂温廣榮光逮小臣瑶階隨接武玉律共迎春樗櫟材原下涓埃效未伸無窮受禔福何以報皇仁副叅領阿彦保年六十九鶴序朝班覲紫垣風披脯萐醴浮罇齊聽萬夀無疆祝可道三千是虎賁一名喜山中九老圖祥徵天上六階符從知嘉宴凌前古魚藻魚麗澤並敷二副叅領珠爾杭阿年六十九皇帝陛下備諸福羣生燾覆無不育春臺羣仰萬化鈞夀宇長調四時燭嵗在乙巳斗指寅春祺啿啿雨露新東皇盛德播青陸南極一星朝紫宸詔下廷臣集千叟共飫中厨大官酒引年不數漢庭三為圖更笑香山九小臣家世沐恩深擐甲丁年𨽻羽林龍堆秣馬稱敵愾鐃吹歸來餘賜金臣出兵三次曽打仗殺賊得功牌蒙賞銀兩郅治昇平銷劍㦸仁夀蒼生登袵席引年嘉與六合同斂福咸由一人錫龎睂皓首再倍千海鶴添籌鷺序聨願將天地無疆夀拜獻君王介夀筵欽定千叟宴詩巻七
