body:
  text: 欽定四庫全書欽定千叟宴詩巻首二聨句詩千叟宴聨句用柏梁體有序寅荷昊蒼眷佑之長衍之數五十仰承祖徳孳培之舊予有臣三千爰稽家法以開筵共迓天恩而益夀式舉柏梁之詠代拈茶宴之題維時啟韶嵗之奮生近中天而已盛弧眀見丙籌積逢辰開句而綸播國祥浹日則綵攢人勝屬叶禔於泰運遂布愷於乾清樂在堦楹几聨墀廡衣宵食旰乃向眀咨庶政之庭爵洗弓堅忽憶昨燕宗盟之㑹人引杖鄉以上五年差以隨肩予多志學之齡百爾達之尚齒或華連共鄂逮於班宁棘槐或水溯還鄉又作朝宗江漢老而更事外宣牧伯之臣業且傳家下臮農商之侣年躋百五四門登孔氏之堂嵗賀元正一介來箕子之國仙集彭佺安羡賚優鏐杖衣裳其有一品頭銜九旬頤近不辭舉手召黼座以來前惟以介眉酌瓊巵而親賜依堯文之舊韻律叠一先得岐政之新知記詮三老十體分臯陶之賡載百韻殿方朔之嵗星幼緬垂髫盛觀倚膝天為一笑遲卅年始揭紀恩日敢重光遜一載方期歸政况復祥徵衍瓞孫生孫皆聖祖之孫願同體有喬松老吾老及庶人之老毋徒效雅九如之作誦庶幾共疇五福之敷言喜起眀良庶事康哉我君臣其猶抑之戒黄髪鮐背耉老夀也同億兆慶如皇之時御製夀世頻開千叟筵康熈癸巳年壬寅皇祖六旬舉行行萬夀筵宴年再舉千叟宴慶錫福耆耉盈庭余時年方十二預觀年因盛典今余仰承天佑古稀有五臨御已届五十繩祖武復舉千叟宴於乾清宫實為從古未有之盛事敬祈宸藻例依前乾隆丙寅惇敘殿柏梁體聨句宗室凡一百三人皆上所賜句又香山九老履親王允祹詩亦乞賜句上代為者臣本不工詩今敬依此例乞上晋封郡王品級貝勒臣允祁萼華忝竊領耆賢臣今年八十嵗忝於宗室中齒為最長得侍恩宴首班昨又䝉慶衍賜御書宗翰慶頤扁額皆賴王臣聖徳召禧宗牒實深榮感和碩裕親廣禄恩叨湛露過滌湔臣於雍正年間曽蹈重罪蒙爵復以檮聖恩赦出授為内大臣加封公昧失察家奴生事獲咎愧懼未遑乃邀逾格倍深鴻慈仍授為散秩大臣恩施淪浹感激臣與裕親王廣祿皆夙失學猥以近支敢引履親王允祹之例並乞上賜句散秩大臣臣𢎞晸上逮宗支下氓編預宴諸臣宗室王貝勒現任文武大臣官員予告大臣官員王覃恩受封文武官階紳士兵丁耆農工商外藩公台吉囘部藩部土官土舍朝鮮賀正陪臣共三千人餘各給予銀牌視康熈年間千叟宴數逾三陪益徵福禔之厚昄章之廓舉一世而躋仁夀之域也大學士公臣阿桂元氣長養資大圓大學士臣嵇璜敷福有原斂福先大學士臣蔡新福者徳之致信然大學士伯臣伍彌泰天其子一曰敬天極翼皇上旦明宥密無事不敬以作所而對越昭事尤翼小心見諸詩文訓諭中者深切著明無少懈弛亦無少間㫁不特為辦大學昊天宗子直與造物同體矣協士户部尚書臣梁國治嵗三大祀躬致䖍毎嵗冬至雩常大祀孟春展恪致祈穀孟夏親詣行禮䖍五十年精誠如一及太廟日北郊亦如之王廟月壇帝社稷壇中文廟諸祀凡遇感親祭亦必精禋蠲潔徳馨諴吏部尚書臣劉墉禱雨告風至諴宣己夘年孚立御製禱雨告風文仁愛相通感應禮部尚書臣徳保信天主人著論詮西師蕆功主人御製開惑論昭揭天以折羣䝉申明順信天者昌由頤有慶之理禮部尚書臣姚成烈四言詠寳義迴旋天聖祖寳以鈐世宗傳用敬勤民御書言皇上敬紹詩闡天民心傳一例寳用迴旋御製四視聽一二二一協應之理臣刑部尚書喀寧阿二曰法祖佛仔肩皇本朝承上敬創制顯庸事事超越前古成之謨烈凡列聖已業緒皇上善述而神明之恭讀皇上善繼而光大之列聖未竞之御製創業守成難易説昔之業為守成耿光太烈皆今之任丕顯丕承以創實一身兼其工部尚書臣金簡寳録寳訓旦誦專出視上毎日夙興恭覧復始而列祖實録後始事分帙環誦周而於祖民宗寳訓毎述以告諭天下臣原任左都御史臣張若溎衣冠騎射謨罔愆昔貝勒大太宗文皇帝垂訓萬世嘗時時習諭諸王臣等衣服語言悉遵舊制練騎射毋効漢俗卧碑皇上敬述示子孫前猷屢降遵諭㫖並立於箭亭鎸臣庶俾敬聽毋忘復於雍記御製全韻詩及禮噐圖式序新建圜水辟中申重祗述都統臣徳保陪都四莅􅘦澗瀍盛京為我承堂構列聖發祥基命之地皇上敬慕篤􅃵墻自癸亥嵗都追法駕東巡暨甲戌戊戌癸夘陳逺展誠御製盛京賦上四莅列陪朝丕績下述器神臯土風若民察吏壇慶施惠廟山川秩祀禮㒺弗修舉訓行有加無已進都統臣王㤗治定紀恩堂額懸康熙壬寅春開雲皇上始覲明之鏤月嗣侍聖祖聖祖於圓於避暑山荘以萬壑松風為讀書之所來内踐阼以後無時不厪懐恩脊數十年恬外闢治定恭讀功成至嵗丙戌乃兩顔其堂曰紀仰見恩御製紀恩堂記二首之皇上亹繼篤繩敬勤至意都統臣五岱三曰勤政矢惕乾暑山皇上凡夀山臨御聽政之所如政避荘萬静宜園皆有勤殿葢本之殿額聖祖舊題瀛臺加推廣世宗舊題圓明園也皇上更日鍳在兹即兩字具仰将軍三朝心法江寜臣萬福宵旰曽靡一日遷於未皇上宵旰勤勞雖沍寒溽暑皆明求衣五十年常如一日近入垂念三品以上大臣年逾七十者免其凌寒早起朝勞已恤人有位咸深忭勉福州将軍臣常青詢政晝殿批行㫋本馳皇上日接廷臣疇咨延晷帷宫巡幸時閣奏各省大吏驛函帳殿丹毫批閲凡外吏覆奏少逾時日即者問命廷寄馳詢而於軍務河務賑務事闗重大夜再三到即軍宗批答莽杭州将室臣古賚引對小吏弁佰仟各省文武職官凡保薦銓調來京者均引對録用其月選分發員弁文職下至丞尉武職下至千把亦必帶領引見寜夏将軍公宗室臣嵩椿四曰愛民心體連記曰民以君為心君以民為體相通皇上痌瘝在抱乙夜誠求一體或䏻記注所不盡書豈篇什所罄述廣州将軍臣存泰賑貸萬萬司農錢皇上愛養元元間遇水旱偏灾有司入告必限者施恩賑貸積歉之區且有頻年常賑不予月毎嵗新正特頒數十恩展用普春祺又豁免各省積欠錢糧動逾百萬蹕路所經蠲免地丁錢糧十分之三凡以藏富於民俾臻殷阜直𨽻總督臣劉峩一笞一杖銖兩權勾到皇上矜慎庶獄毎嵗秋審讞辭並榜親核再三時復酌其情罪輕重無枉無縱示案由使衆共悉且有於臨期雪至指示案中疑竇復命大臣鞫訊平反昭平時案件無不裁以大公因其自取即一笞一杖之㣲亦不使畸重畸輕又屢經恩赦減等法外施仁而於辦理刑名諸臣問擬失當者分别失出失載入處分以昭慎重兩江總督臣薩課雨占雪佃爾田親舉皇上屢行天下耕耤之典西成四推率先至於東作甘霖時玉問夜占雲形諸三馳詢地方大吏並再吟咏或稍愆期即申諭毋許諱飾一經奏報優霑必有天和誌喜誌慰之作田功勤即所以感召綏豐屢慶也浙閩總督臣富勒渾行此四者超俈顓措正皇上勅幾凝績舉凡宏綱細日施行原不可以偏辭摹繪天日而勤政愛敬四大端天為民尤法聖心所祖兹在念兹者臣等管窺之下臚舉件系僅以紀李世聖徳聖政之實於萬一四川總督臣傑文章之夀道徳淵文章之盛本諸道徳纂輯皇上貫功徳以立言鴻開館局羣書皆上秉度大睿裁指示訂正其有闗於世道人心典章制則經藴史法小則博物洽聞聖學崇深觀文成化煥乎文章可得而聞矣散秩大臣公臣觀音保御詩四萬文盈千詩皇上載道以為詩文極富有日新之盛四自丙辰以來毎十二年編為一集初集千一百五十餘首二集八千四百餘首三集萬有一千七百餘首兹四集刻至癸夘九千七百餘首自甲辰未刻者又九百餘首彚之以四萬計至今文自丙辰至癸未編初集者五百餘首甲申擬編二集者幾及五百首彚之以千計有嬴自有文字以來集部中從無此鉅製也散秩大臣公臣傅玉樂府五什四聲全御製用白居易新樂府題成五十章述俯祖徳之崇隆昭繼述之兢業雖曰同之作而意義廣大足為萬世法戒又以四聲全韻從無按次拈吟者幾餘發詠閲三月而成一百六首上下平聲則紀我則朝發祥東土及得列聖宏規上去入三聲舉唐虞迄勝朝失炯鍳進退百王據事直書而終於敬標治譜天命守神器三致意焉二編雖示詩教實散秩大臣臣富保汗流愈甫僵且顛自古䏻詩文者必推杜甫韓愈聖製詩文發揮道徳經緯天地逈足包韓軼杜如愈之師説千里馬説及雜説内紀綱理亂一語甫之北征諸詩一經散秩闢正真可開拓萬古心胸矣大臣臣呼尼爾圖四閣四庫功告竣乾隆癸巳藏發秘閣之詔求海内遺書兼命詞臣校輯並於永樂大典内採集散編以復古籍舊觀内定為四庫全書毎部三萬六千冊於大欽盛京源御園四避暑山荘分建又文淵書文􅘦擇文文津閣藏弆各一部於全中掇精華為薈要二部部各萬二千冊分貯年大内之告摛藻堂御園之味腴書屋於上十二月成皆御製皇上親加乙覧訂純駁而正魯魚並多詩文冠首復發帑繕録三分於揚州傳文滙閣金山南文宗閣西湖布文瀾閣庋架流㫖許東人士傳抄廣䕶軍統領臣塔永阿書畫顧陸鍾王研游藝皇上多䏻天縱妙印鍾王臨池大而擘窠尋文小而細楷蠅頭各臻極詣墨刻帖墨御書敬勝齋帖垂則墨海雪堂帖内府鎸三希堂妙軒帖重刻淳化閣帖快蘭亭八柱帖各有題識鍳别精審書學集成至非拈毫㸃染旁涉繪事元氣在握造化為師有陸顧之規規六法所䏻彷彿䕶軍統領臣喀木齊布勲業之夀金石鐫皇上膚功耆定依古在泮之義御製碑文立於大學如平定金川平定準噶爾平定回部平定兩金川豐碑四勒萬世瞻仰又於戰勝攻取之地犁庭掃穴之區紀以碑銘用昭撻伐如西師則勒銘伊犁勒銘格登山後勒銘伊犁勒銘葉爾竒木勒銘伊西爾庫爾淖爾兩金川則勒銘美諾勒銘勒烏圖勒銘噶喇依照耀殊域又以戰績分繪為圖系以紀事詩章泐成西師戰圖兩金川戰圖二册以沁貝頒賜中外衮烏珠穆勒臣逹什布準回兩部恢幅員準噶爾部乃元之逋孽自化聖祖仁皇帝平定朔漢後對狼貙羆終梗大恩弔罷兩朝經營厥緒未竟皇上御極之初兵廣示燾載乃喇嘛多爾齊逹瓦齊簒奪相仍部衆睽擕敂闕内面願見天日皇上大仁大勇拯一隅而張九伐爰於乙亥嵗出兵兩路直抵伊犁一戰而克達瓦齊就俘嗣阿睦爾撒納潜蓄異志中途叛逃羣醜蜩螗争應一時衆志然疑睿謨獨㫁宵小既就爬梳逋逃旋伏𡨕殛準夷之事大定囘部兩和卓木始為準酋纍繫我勞皇上加㤙復其爵位乃敢偝徳反叛重師貞克敵致果囘部之功既集哈薩克布魯特拔達克山愛烏罕安集延痕都斯坦霍罕之屬二萬餘里皆幅員所届矣爾喀貝勒臣阿玉爾喀屯越戊巳包先零準囘兩部平定後屯政大開田安特命大臣分駐經理種地兵丁咸得宅宅佃居樂業客民四達幅輳報墾升科動成聚落至刑徒弛罪之人皆給廬舍牛種又自哈薩克來歸之厄魯特皆入旗籍並自盛京移貧乏西僰察哈爾諸旗貧乏察哈爾於伊犁皆給以牛羊俾安游牧民户日増兵餉不費行之二十餘年天時順成地利墾闢各該處大臣頻年奏報大熟分數有至二十上下者都爾博特貝子臣博第宛駒徠皁璧撈闐西極自古稱多馬之地囘部既歸版圖愛烏罕部哈薩克西部烏爾根齊部啟齊玉蘇部皆各奉其地産歸我天閑皇上掄其神駿錫以嘉名若哈薩克十駿愛烏罕四駿拔達山八駿皆得仰荷宸題而哈薩克之貿易伊犁者每匹價不過三四金較之内地馬價僅三之一以充屯田之用並給沿邊營伍嵗以内府縀匹充馬價物良值平中外䝉利即古御製反白居易陰山道樂府皆紀實也和闐于闐自史記已稱産玉今囘人之採獻者優加彭素賞賚用旌其勞扎魯特公臣克土爾扈特歸順堅土爾扈特舊為凖噶爾四衛拉特之一因苦俄羅斯徵調取質挈全部來歸皇上優加撫恤分地安居就糧資牧出牧羣之息以饋之發帑運茶市羊及裘充其衣食使無凍餒封御製土爾扈特歸順優恤二記紀其事貝勒恩渥巴錫為卓里克圖汗其下親王郡王貝子台吉等有差入來先覲山荘倍加札薩恩禮葢䝉古自國初以後臣服内外克久荷已逺帡幪至平定準噶爾後惟土爾扈特一部先竄至是而不加征討不事招徠萬里向化是順非降所謂無尺土天與人歸不期然而然者從此䝉古諸部不入職方無一人不供僕𨽻國家福崇之廓仁浹而愜皇上纉緒於是列聖締搆之成功志蕆誠萬全極盛矣音囘部公臣額色剪兩金川湯沃蝝金川居西蜀桃闗徼外於雍正年間從征得受符檄與諸土司齒後金川莎羅奔郎卡與隣畨搆釁自作不靖乾隆戊辰大師進剿革面請降開綱革布宏仁加之赦宥甫十年而郎卡即與内地之什咱綽斯甲布三雜谷諸土司為難逆子索諾木與小金川僧格桑狼狽為奸我皇上决策征之廟算既定不惜帑費不窮兵力寛以五年期於烹網魚而縶檻獸大軍抵噶喇依賊巢飛走路窮面縛乞命俘於邊徼廟寜其各社大功告成設營駐守分地屯種永土司土官土舍頭人毎年分班入部皆覲䝉有恩賚有加此次千叟宴中與準回兩恩入座者克什克騰頭等台吉札薩克臣根敦達爾札制作之夀垂丹鉛制作皇上酌古凖今因時損益一時萬世法程如禮樂則釐訂追大駕親王法駕復睿恩禮儀駕王定諸行駕鹵簿從太廟祀賜復諸王始封位號増通厯代帝王廟位祀勝朝殉節諸臣專諡諡更定壇舞廟方朝㑹設江宴饗樂章増用囘部畨部西藏樂官則添寜布政使缺各省驛傳事務歸按察司添設安西道府州縣各缺承徳府屬各州縣缺兵制則添設内外武職養亷改京城三營為五營各省坐糧名糧改挑實兵設立健鋭火器二營四川省及直𨽻密雲添設駐防兵弁工程則重修功告成壇武建武成廟葺宫殿閣文廟改用黄瓦殿紫光乂修葺各部院衙署京城内外城垣幷城外各石道凡大城内外溝渠河道每年簡派大臣稽查發帑修理翰林院貢院落成書匾臨幸賜宴賦詩又修理庶常館特賜御額郭爾羅斯頭等台吉札薩克臣阿喇布坦右壇薦璧雩升烟乾隆二十四年無薦玉之禮諭上祭庇嘉穀社稷壇以儀注以玉於答陰之義為稱飭所司用玉將事著為令啟蟄龍雩祭大禮向未舉行乾隆七年上以見郊雩並重大祀同巴命禮臣集議舉行與日至林和碩額駙臣丹津法噐範古肅豆籩乾隆十三年圖著範凡上監定禮噐考天地奠菜廟祭一切社尊日簋月豆神鉶祗農蠶之壇之爵簠籩登篚爼為匏為陶為銅為竹木各随方色用將祼獻詳見柱皇朝禮器圖式吏部侍郎宗室臣玉鼎鎛鐘特磬諧㲈巻乾隆己夘江西臨江府得古鎛鐘以獻上既考古定名貯之韻古堂復貢玉詔樂部仿鑄鎛鐘十二以備宫懸并以和闐琢特磬十二以儷鎛鐘依律分宫備聲振始終之節而於御製銘詞歸本於示精詳祖徳天庥立均出度闡中和韶樂之奏與㲈巻比盛矣户部侍郎臣諾穆親杏壇十事陳蘭櫋乾隆己丑上丁所藏上詣太學卣罍釋奠前一日洗各命出内府周笵鼎尊壺簠簋觚爵一陳林大成殿前以備禮噐辛夘嵗事陳東巡謁孔詔班内府周笵銅器十闕里廟廷既副習禮之觀更體從周之志禮部侍郎臣荘存與更取士制播誦絃丁丑㑹試始試朝命於二場増五言排律八韻鄉試及召考同之其各省學臣嵗科兩試則用五言排律六韻永為取士定制俾士子揄揚鳴盛益溥誦弦之化兵部侍郎臣瑪星阿冬賚冰嬉秋獻豜定制八旗與内府三旗簡習氷嬉之技每嵗冬令太液鏡凝分棚校閲擲綵毬設旌門懸的演射仍按等行賞義又御製冰嬉賦以旌勇均賜而歸本於觀徳之毎嵗秋小從上幸木蘭行圍八旗之旅期門佽飛之士大公䝉古札薩克王公台吉等率所部千二百人隨圍執役威神上親御弧矢率先騎射或用虎神鎗天技有一日殪數虎射鹿數十者䝉古王公等互進詐馬宴作什榜以侑食陳相撲及教駣之技圍畢出鹿柴門恩賞王公筵宴下逮蒙古𨽻役之屬柔逺示惠葢依古三田之制神而眀之尤為本朝大政兵部侍郎臣紀昀四學聽講圜水漣辟雍見於王制葢昉文王靈臺武有天下遂定為天子之學先是廷臣建議請立部議以乏水而格癸夘春雍汲上命詳稽古制於太學彛倫堂前肇建辟井穿池引為圜水甲辰之冬工竣可泥親製碑文記其經始並嵗上申訓復古而不古以垂戒萬世将以今丁釋奠禮成後祖迄親臨講學以光令典北京國子監建自元世今五百餘年而辟雍之制乃備葢者兼聖人在上制度考文徳位時三之矣刑部侍郎臣穆精阿恩澤之夀浹瀛壖年中皇上徳洋恩溥浹洽寰區五十如覃恩頒詔九次並准臣工貤封伯叔兄嫂與外姻尊屬其大臣之宣力者則官其子孫為陰生中書舉人加恩國初功臣録其後裔雖忠於勝朝者如袁崇煥熊廷弼子孫亦邀録用内閣禮部毎年恩賜養亷至八旗紅白事件均例有旗地賞給外此如養育兵鰥寡孤獨等錢糧及八租銀兩告退出力官兵全半俸餉京城之普濟堂毎冬例外加給米三百石又於河工工料例價之外准銷銀數百萬其軍需例外開支亦數十准銷數千百萬並豁免銅厰節年欠項前後百萬其餘暹錫予便蕃不可縷舉即新疆蕃部及朝鮮安南羅琉球諸國均䝉賞賚凡朝覲來京者逾格侍郎隆施無逺弗届圖署理藩院臣薩音博爾格至三至再漕賦蠲史冊所載捐租賜復之詔或僅及一隅或僅免次降其半未有普免正供者乾隆丙寅庚寅丁酉三漕糧㫖普免各省正賦丙戌己亥兩次普免七省皆輪年停運五載而遍恩施叠溥亘古無匹臣原任兵部侍郎史奕昻截糧平糶給粥饘嵗令督撫奏報民數榖數順天府月報糧價偶遇一隅水旱愆期即勘未成災者於青黄不接時特頒恩㫖截漕以裕民食平糶以減市價復設厰念京師地大物博糧價稍昻時發豆麥減價平糶而於無業貧民三冬艱食者毎嵗五城設飯厰至春中乃罷原任兵部侍郎臣蒋元益巡狩慶讓虞典篇江浙自喁喁望聖祖仁皇帝六次南巡後民幸皇上登極緩至十五年之久始登進法士崇秩祖肇舉時巡采風察吏宥過賚老髦祀典嗣丁丑壬午乙酉庚子甲辰凡六次禮帥如初他若者三巡河南者一巡五臺者四巡山東聖巡天津者一戒儲鑾輅所臨無非事者而毋呵心克已時以偫省供帳為諄諄斥騎農田弗躪備屬車者遵法度迓之曠清蹕者樂就瞻非徒紹班岳之縟文修升中典而已原任兵部侍郎臣錢士雲省河觀海農田河工海塘為東南民生財賦所係未嵗翠華戾止訓示周詳河工如辛之増築髙堰五􅄵建淮安城西北石堤丁丑則於徐州北䕶城土堤易石壬午定清口出水誌疏濬六塘下游庚子加髙徐州城外石工改築韓家山至奎山石堤至海塘潮勢不常􅃯令督撫月報情形庚子頒凡三㫖大興工作於老鹽倉迤西塘工改柴為石千四百九十丈甲辰復命於章家菴迤西至烏龍廟接建石工而留范公堤柴塘種樹實土以為重門保障之計皆上親臨相度衣指示機宜不惜帑金數千百萬為小民計農田食之安萬世永頼江西巡撫臣伊星阿行葦具邇錫冠蟬壬寅餘閒上諭将宗室王公子弟帶癸恩給官頂其散宗室概給予四品頂夘新正賚有賜宴山乾清宫臣農錫差西巡撫起特科大選矜寒氊乾隆丙辰壬申庚辰庚寅己亥皆以逢之國大慶特開恩科鄉㑹試猶念士久困公車者選途壅滯因於壬戌甲戌會試後閲選落巻為明通榜丙戌壬辰辛丑㑹試後命王大臣挑選下第舉人分别等第引度年見以七品小京官知縣教職分發補用其自衰不任民社者考後賞給京銜有差選拔貢生十二年一舉諸朝分别録用如舉人例又巡狩獻賦生舉人召試録取中書舉人又老儒鄉試業銜恩賜㑹試賜檢討學正且有至司者各以年嵗為差多士沐隆甲教澤際榜昌辰皆得奮志功名歡騰寒畯乾戌科武顧麟辛丑科文榜錢棨皆鄉㑹殿試三元數百年科目盛事實涵育於壽考作人之化湖北巡撫臣李綏黌序開上塞新邊熱河既設郡縣户口日増秀良之士蒸蒸日上向就試附近州縣取入上命於承徳府建立平廟學設教授置生員府學者六名其屬灤平泉豐寜建昌赤峯朝陽六州縣各四名並舉人一名新建文廟落成上予鄉試取中御製碑文勒石又嘉峪闗外鎮西一府廸化安西二州宜禾奇台昌吉阜康綏來燉煌玉門七縣皆設學官弟子鄉試中式者為西恩許馳驛㑹試上塞乃前代甌脱之區新邊羗烽燧之地今户盡絃歌人皆庠序外矣廣文治光昭斯真無西巡撫臣呉垣以兹夀宇祥氣填福建提督公臣黄仕簡甲子重叠迴璣璿時憲書後舊有紀年一帙自一嵗逆數至六十嵗辛夘上推皇上夀逾六旬普因命欽天監重周花甲至一百二十嵗為天下増年金湖廣提督臣俞鰲昇平人瑞地行仙定例民間夀至百齡者題報建坊曰昇平人瑞五十年來嵗舉毎以十數賜詩上於百嵗以上者加賜内府縀匹或荷璸賜額尤極榮寵廣東提督臣竇數世同居三古還民間八世同居者二家七世同居者一家九世同居者一家並建坊之褒異賜詩或大夫御書額以封振威臣李瑞百九四家孫見元間有上以初得元孫非常吉瑞因四家命查民元孫者直省奏聞凡百九十元旦欵覃恩詔内優予賞賚為從前詔所未有副都統臣台䝉阿皇備諸福為陶甄副都統臣徳福古稀有五増洪延皇上七句萬夀採杜甫詩意刻古稀天子之寳並御製古稀説謙徳尊容因文示義勵慎始日新之志自庚子至今籌添已五而䖍恭寅畏無時或釋所由洪延曼夀以莫不增也副都統臣圖思義紀年大衍方至川帝王享國五十年者三代前自黄帝顓頊帝俈堯舜以下凡十二君三代後則惟漢武帝今乗五聖夀古稀有五合天臨御適届五十年以五天數五地數五地之數而成十推而衍之至萬有一千五百二十所以撰合清寜誠徵悠久也内閣學士臣伯興五福五代歌瓞綿甲辰閏三月宫顔上喜得元孫即寜夀宫之景福曰五福五代堂且為之記以誌古今希有之瑞復上六念我至朝自太祖髙皇帝至皇世下皇元孫為十世因奉字命宗人府查賜名曰太祖長子禇英支下為派二人奉福奉夀葢自宗積慶太祖以下為十一世矣足徴我隆祖之厚尤際今聖神篤祜之臣内閣學士塔彰阿猶日孜孜心懃拳文曰上既篆孜即古稀天子之寳下方繼以刻猶日孜一璽篆抑埴中而持盈保泰全神若揭趙内閣學士臣鍈旦吟逾什筆如椽毎日皇上披覧章奏之暇即寄興咏吟常十數首精敏固由典學强固具仰上駟夀徵臣内務府大臣銜院卿討住巡䏻攬轡獵控弦鍳其時巡所届擁道歡迎慰就上毎愛戴為却輿按轡以瞻至於秋獮行圍控弦命中不改弓燥手柔之素良由保佑自天聖壽日増而康强純健故䏻如此河内務府大和臣銜熱總管臣永行建自然匪拘牽恭讀辟雍誠者御論天一日一周健也中庸所謂天之道出於自然也若誠之之君子則宜自勉强自彊不息大哉矣言自道所得葢行健有常與天合徳聖原任内務府大臣銜武備院卿臣西寜遂啟嘉宴集偓佺山東登州鎮總兵臣馬如麟繼述祖徳典相沿大典皇上慕法命察康聖祖毎舉大政事行禮必熈年間例行仰見叟紹庭之念也宴猶初志繼序之思兹之兵臣再舉千山西太原鎮總福敏泰昔惟髫侍今端綖史記五帝皆一家之胄而年代隔逺聖與聖不相及禹不詒孫湯非翼子成康聖君不䏻逮事文武孰若我恩顧以皇上親侍聖見聖之聖祖備承製千叟盛御宴依韻詩有曰追思侍艧之勤陛髫垂日訝至當軒手賜年松雲之慕丹撫今追昔情深文明具於十四字中臣等生晚無康熈年間入仕者不獲從殿庭班列望見聖祖穆穆之清光抑可知當日宴中千叟拜手階前遥瞻天上庸䏻知紫㣲帝座之旁垂髫侍陛之尚有之必聖人乎惟備多福聖祖之明灼知皇上䏻臻上理以再舉千叟之宴故深加縱之聖顧復隠付托以神器之重惟稱皇上天必得其夀舉千叟之宴即一觥之美賜爵之間而知浙江處授鎮總受之隆繩承均非偶然也州兵臣明安八八六十四卦聨自皇上重聖祖肇舉耆筵至年修茂典凡六十四適符周易全卦之數魁浙江衢州鎮總兵臣賈武三千黄髪􅘦始鬋預宴臣民六十五嵗以上者皆生康熈年間小草纎莖尚涵堯露四川重慶鎮總兵臣馬鎮國親見堯舜史莫傳稽古養老之儀無可深考若三老五更之制人數取義諸説紛如且有慿臆而害理者所御製説既斥其謬近復三老作記一篇取孟子云文王治岐三語以為注脚以經注經實千古未發之藴若夫恩滂喜聖祖來史神孫兩舉盛宴普天率土洽從冊所無也兵廣西左江鎮總臣薩郎阿鳳詔初覃土牛鞭今年祥符協應當五十年正月元旦皇上御極之特頒恩詔溥錫新祺臣雲南臨元鑣總兵陳大紱蓂開六葉風和鳶本日為正月初六日御都察院左副都史臣梁教書法宫觚稜淑景娟大理寺卿臣富炎泰瓊筵平城排沿縁坐席各以品級班位凡八百筵大理寺卿臣藍應元醍醐泛盎希芳鱻詹事臣徳昌韶樂清樂聲鼘鼘樂歌欽定千叟宴於升座韶樂奏隆平之章於夀愷昇平瑞之章於大宴進茶清樂奏進酒清樂奏紫禁春開之章於允諧還宫韶樂奏慶平之章寺夀世元音徴角相悦之盛太常卿臣肅普通阿天章成不移漏蓮原韻御製千叟宴恭依祖徳景皇祖詩一章念梁天貺彰詩國慶樹義大而觀成埀訓逺復仿柏體聨句親製發端二句遴諸臣績賡臣太僕寺卿蔣良騏敢曰唱醻恩所憐臣等質㣲學陋恭承矜誨恩命賡績府尹奎章語拙情真知邀順天府臣虞鳴球頭行上夀寵詎偏預宴三千人中王貝勒以下至一品大臣凡五十三人九十以上至百五嵗者凡十人以爵以齒領䄂耆年尤為被爾杭恩獨厚奉宸院卿臣珠阿座前手爵行毋遄是日至上者上召官躋一品及年届九十以御座前手賜巵酒用示優老引年之至意來頭等侍衛宗室臣泰八寳如意大願船宴間賜珍便蕃如意尤徵吉語禪䕶軍叅領宗室臣希布鳩杖扶老枝連蜷預宴人叅賜鳩杖一具爾䕶軍領宗室臣都松阿銀牌刻字文蜿蜒賜銀頒牌寺四品宗室光禄少卿臣誠速貂錦段布亳墨箋凡豐貂文錦彩段蠲布湖穎徽墨松箋諸珍物皆按品學閔頒賚内閣侍讀學士臣曹睿句捧出蓬萊巔預宴御筆千叟宴詩摹印徧懸用賜諸臣盥誦之下恭捧髙以傳示子孫永戴士臣聖徳熊侯補内閣侍讀學吉夢君夀如天臣彭籛江寜織造臣成善耆英林下杖履便准闗監督臣福海老農大有雲壓阡左中允臣韋謙恒工商三倍利盈㕓候補國子監司業臣王太岳太平之象霄際泉候補國子監司業臣曹錫寶萬萬嵗坐而理焉上時以始勤終怠為戒今年猶作信天主人自箴詩我國家法度既極修眀紀綱既極整飭一張一弛不過隨時化裁所謂無逸者心無為者治足為萬萬年久安長治之謨即為私忱萬萬嵗頤神養夀之道此中外臣民祝願之敬於蹈徳含淳之下為監正當宁獻欽天監臣喜常大書屢書弧見躔典既盛舉從此更五載為算将八旬萬夀又五載為臣備六十紀年無疆之見大書屢書不一書員靈臺謹嵗占南弧見瑞欽天監監正臣髙慎思外藩安樂届九埏下國䝉嵗列聖隆施俯鍳誠順近復荷有頒東藩繩美匾額昨嵗復恩逾格前御製詩章埏朝御製古稀説文房秘寳之陪臣賜暢垓􅑴鮮尤為首被朝鮮正使李徽之維海有屋東朝鮮陪臣等以奉使朝正適逢語瀛鉅慶馬齒及格遂忝末筵歸裔君臣備述歎知天朝福徳之隆出為恩禮之篤共知膜拜讚必有海屋仙籌中國聖人瑞應姜朝鮮副使陪臣世晃百有五嵗積籌駢臣以泉南下士皓首儒業遭際䝉觀場聖世己亥次年恩科鄉試以九十九嵗賜舉人南巡迓蹕復賜進士甲辰恭逄街恩加國子監司業六巡江浙趨迎道左章昨恩賜御製詩復夢想頒賞慶頤􅓺序芥微御書匾額皆生世百年所不到者自分末将芹獻臣今百有五嵗乗之以百則為萬有五百嵗全登盈數畸協昌期願祝聖齡符兹積算云恩賜國子監司業銜臣郭鍾岳御製重熙家法貽萬年我承祖裕毎宗昌後燕詒保世滋大予仰成重垂事必景前猷今夀宴禮熈慶洽予所以心保我皇祖之心蒙諦思天之福者長此䖍鞏流謙惕乾臨子孫曽元其之以引我大清億萬年丕丕基也欽定千叟宴詩巻首二
