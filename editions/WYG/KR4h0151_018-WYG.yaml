body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻十三預宴九十二人詩一百四首委叅領綽克托年八十四天高九重穆穆厥容鬱儀豐隆萬彚帡幪帝壽億禩閎閎厥祉金漿玉醴千筵秩綺物秉于天翕闢直專其徳曰乾闡化之權人泳於帝元㑹運世其道曰㤗樂光之被羣品欣欣藴澤涵文藻采鋪棻敬仰蒼雯微臣謭謭承華掖輦榆齒渥腆肅歌鴻典委㕘領武林布年八十三廣大配天地容保民無疆以行其典禮利用賔于王致天下之民冒天下之道恒徳之固也八卦以象告勿疑朋盍簪其出入以度雲上於天需雷出地奮豫各指其所之修辭立其誠有孚惠我徳承天而時行集易經委㕘領福禄年八十祥齡慶洽三千叟嘉㑹重開五十年福錫庶民風皥皥古稀天子日乾乾圖成安羡多人瑞身列蓬壺盡地僊願以微臣名兩字報恩申祝九如篇委㕘領京文年八十聖皇御世三光明九宇寧人臻樂壽物與長生引年之典古所有叟以千計史策罕嫓衡熙朝兩舉宴巍巍蕩蕩久道而化成三千大禮炳蔚曲與經三千詩歌鏗鬱雅頌聲盛時符象焜燿有若此醴泉甘露流於庭臣齡八十身依穆清仰沭元化俯陶下情笙簧磬筦樂交作里歌一曲拜手賡韶莖委㕘領八十五年七十一帝開乾清宴喬與鏗韶樂既作清樂載賡惟此喬鏗承華振纓三千其侶于古靡京帝庸錫之瑶尊手賜又增錫之盈苞積笥爵齒同榮臣民均被日光月華照爛天地敬捧錫賫敬飫醪漿春風和煦春日載陽樂豈之飲樂只之光萬有千歳帝澤洋洋委㕘領佛岱年六十九少壯食帝糈耄老臣何能猶然列參佐燦灼命服膺皇化成久道日月占升恒重熈積禔祉燭調鼎命凝聖祖賜宴時弱冠衣纔勝吾皇禮重舉八十歳月增遂得随班聯酌醴飫肴蒸典鉅史策罕恩隆海宇昇皤顔敢言老懽抃歌咸登委㕘領黑達子年六十八錫壽升恒並照作人雲漢爲章靡測調元斟化唯知飲徳餐香微臣敢言黻飾盛典自有笙簧千叟鱗舒翼次萬方澤泳霄翔委㕘領富廣年六十七有華顛袀士暨皓首天民造儒林耆碩合詞蔚前陳㳟惟聖皇治緯武而經文八荒在堦闥萬國登醲醇同遊極樂世允萬億千春今逄錫嘉宴爲世開洪鈞叟聿以千計千復三其倫甘馨實饜飫錫賫光玢璘懵不知史策稽首俯自循鴻恩孰報稱千古復誰鄰耆碩致詞言瑋哉知所詢稽經諏列史漢唐未足申在周豐鎬頌二帝章韶振不聞叙千叟兩舉敷華茵聖皇溥徳澤萬萬古靡臻生當太平時耆耋沾陶薰兵當肅紀律農當訓耕耘百僚恪乃位列士㳟其身天恩詎答報帝澤惟洪淳益躋四海壽環拱吾皇仁鉅典述炳爍羣情暢歡欣皥皥羲皇世無名無能云問答體委㕘領他那年六十六昊天積運萃于聖朝帝心宥宻丕顯宣昭凝承靈貺萬國燮調曰宇下人齒宿顔韶遂聨華祓言覲紫霄三千爲羣珮玉聆簫春風萌芽粲頴開苕宴錫龍光華被綺雕天禎駢闐帝賫渥饒惟億萬紀仰北斗杓委㕘領金梁年六十五聖世需雲樂耆年荷寵榮鴻開仁壽㝢歡洽地天情楓陛羅千叟芝房擢九莖樗材慚拜手欣頌泰階平委㕘領寳明年六十五歲華初轉物華新華髪山呼拜紫宸十二日春開鳯紀三千叟宴慶芳辰憶隨雲輦臨晴甸夙荷霜戈作候人此日玉階承宴賞據鞍歸覺倍精神委㕘領英阿年六十四肆綺席陳瑶觥先期十日春風生祝聖壽賀元正蓂開六葉敷耆英禮秩序樂和鳴慶奉玉帛聽韶韺抒帝藻揚睿情大哉萬古超法程宴兩舉人千贏茹和食徳頌太平隨花甲循由庚唯天之大無能名委㕘領徳福年六十三五福綿金支瑞圖衍籌永歡臚偓佺儔春盎華胥境綺席泛玉漿瓊筵列金鼎紫薇尺五近黄髪三千併東風盤獻辛南極弧輝丙酌酒慶熙時長此怡暄景委叅領齊家保年六十三至道清寧貞合鴻釐徳位時兼大禮式昭光岳新春溥被洪纎齒叙曰期曰耋恩深引養引恬拜捧金樽玉杖長欽日就雲瞻委㕘領胡圖克年六十二趨陛記鳴鞘朝正纔放仗壽星此逄辰習習祥颸暢仰瞻華綍頒疊荷春膏盎壯日效執殳獲邀天有貺餘齡得奉卮長祝壽無量委㕘領松保年六十一角亢星躔拱帝居蹌蹌蓬閬接仙裾瑞凝芝露饒三秀歡洽松雲頌九如亥字書添徵朔合寅賔蓂茁報春初天厨飽飫恩膏渥億兆京垓慶有餘委㕘領格靈圖年六十一穆穆符天運乾乾劭帝心八埏敷福澤千席蔚壬林欽奉觩樽湛曽㕘羽衛森還從羣叟後曼壽祝高深委㕘領阿克東阿年六十一荷戈曾未著微勞奏凱空慚幕府褒一自歸來贏歲月壯心時㸔舊弓刀一臘底春囘已浹旬南弧佳氣協良辰三千夀考符洪祚萬歳聲中覲紫宸二委㕘領祥保年六十人瑞符泰交貞恒集繁祉弧曜自南來斗杓恰東指傳盃湛露中列仗春風裏策飲憶分麾恩筵特尚齒祥靄布彤廷歡聲㑹金戺共識人意樂即邀天顔喜包衣㕘領富年年七十三懿古黄帝握化樞其臣大撓制甲子三元遞衍無終極循環五際有至理爾雅釋天出周公歲陽歲名特詳紀以枝配幹用紀年六甲由漢太初始我皇敬授人時先普爲蒼生錫夀祉新増瑶牒朗珠囊自子至亥甲至癸靈臺時憲標重輪百二十年週復起三千人喜入燕席六十歲方預名紙試從書尾問生年一層重叠皆可指壽考共知天所付養恬實乃恩靡已格物豈惟辨麈角壽人均予添馬齒包衣㕘領徳貴年六十五百年三萬六千日一年四時十二月析月各分半有二十四節析節各三候七十二候森以列大者天象細物情其中占候多半爲農耕始雨水雨時行麥秋至禾乃登凍解田事始泉動春氣盈始知前聖制作有妙理我皇乃以天章一一賡古無此體今剏見上以含括乾運時行與物生下以敷布人時東作與西成作詩豈惟以詩鳴十有二月二十六日立春節距今十有二日正當立春第二候之期臣如肖翹蠉蝡脈脈復跂跂出自蓬户羾閶闔蟄蟲始振今其時包衣㕘領蘇楞額年六十五二十有五寳藏之坤寧久上以鈐絲綸下以昭信守不矜藍田材不侈交龍紐作記證今古在徳義以剖聖壽登七旬制文刻瓊玖曰古稀天子曰猶日孜孜皇天大寳命聖人情見辭乾以天行健恒以久道成外王而内聖兩語括其精閲上中下古豐鎬溯軒羲武功與文徳實乃逺過之詎惟紀聖壽萬壽以爲期今日千叟宴豈非古所稀包衣㕘領永泰年六十三汝歌古稀寳我誦古稀説聖以宵旰爲頤和皇之康寧在兢業小康世益仰尊光大徳元惟嚴對越試尋史册見前代莠言秕政無芽蘖謨烈豈但六帝超年齡直以千叟合古稀天子古稀説申祝頌代問答包衣㕘領柏靈阿年六十一三老五更著説重申作記以彰論定服䖍鄭佑義徵孟子文王羣生皆上所養四代之禮未詳願以今朝燕禮垂爲萬古典章包衣㕘領住格年六十二紀恩堂乃在圓明園之牡丹臺又在萬壑松風避暑山莊隈聖齡十二侍聖祖含飴一笑天容開堯授之舜舜授禹太王王季文王緒謨烈萬世光繼述一家聖直從治定功成時堂構羮墻方誌慶今日千叟筵前藻韵叠一先猶憶當日侍陛髫垂年歩軍副尉二達塞年七十四皇威逺畧被八埏垂裳郅治揮虞絃三辰協律斗應躔恩逮黄耉華筵開微臣肅侍丹墀陪荷恩欲報微涓埃昔參勁旅揚戈鋋廟謨神算出萬全駑駘策奮功牌懸行圍秋爽風雲迴雁行魚貫七萃來吉日車攻歌雅材欣預瑶席偕羣仙地天泰合需雲天鴻圖鞏固億萬年歩軍副尉那親年七十三筵開春日捧瑶觴獻歲承恩樂未央白髪臣僚逄宴衎彤墀琛賮極梯航材慚貔虎供奔走地接䕫龍許拜颺魚藻鹿苹歌且舞古稀天子壽無疆歩軍副尉李廷相年七十一末秩随軍尉餘齡歲月賒條風來帝闕法酒出天家愷澤三霄渥新絲兩髩華春涵仁壽鏡旭朗吉祥花歸語兒孫喜行歌道路誇所欣衰朽質扶植類蓬麻歩軍副尉張才良年七十一昊天眷命於皇我大清列祖受之我皇曼壽躋隆平福及四海深仁樂壽久道而化成春陽愷宴上答天心祖烈於赫揚駿聲鳯牒萬禩已超循蜚栗陸九龍十紀昭庥禎微臣飽徳惟偕鵷鸞之班貔虎之旅擎跽歌恩榮歩軍副尉色克圖年六十六吉旦開華讌熙春仰壽暉問年頒翠斚拜賜出彤闈列坐騰歡忭扶攜任醉歸白頭軍尉忝光彩溢朝衣歩軍副尉馬士雄年六十六彤閶曉闢曙雲開緑髪青睛次第來齊祝一人千萬壽和甘風雨遍埏垓一聖徳同天闓澤勻平分四氣藹先春耆臣耋叟膺康爵願譜聲詩協鳯鈞二歩軍副尉四達子年六十四待漏瑶墀謁至尊雕筵初敞映朝暾耋耆拜舞天顔喜錫賫便蕃帝語温開袠萬年輝玉劵衍祥五代藹雲孫綴班蘭錡叨分秩湛露榮霑荷聖恩歩軍副尉成仲年六十四曉啟五雲絳闕春翔千隊文鸞珍頒太府玉府典重禮官樂官山響和聲效嶽木華寳蔭敷蟠史氏剬詩輯頌雍容衢壤同歡步軍副尉賈榮祖年六十四聖皇膺寶籙郅治蒸寰區昊貺樂壽洽川嶽呈嘉符御極五十載壽世疇福敷優詔宴羣叟臣庶歡聲臚耄耆趨丹禁珍膳頒中厨禮兼几杖設恩與金帛俱引年自三王盛典史罕書我皇迪前光溥錫昭鴻模三千耆而艾皞皞歌康衢熙洽洵上瑞陋彼誇嵩呼歩軍副尉佛定住年六十四智慧威神蔭大千衆生極樂溥良緣旃檀叢映祥華徧薝蔔筵開瑞靄連俯繹臣名知戴佛仰邀聖澤本同天八方饜飫醍醐性圓覺光中福壽延歩軍副尉郭仁泰年六十三聖世躋仁壽淳風遍海隅昌期數典協芳讌沭恩殊六膳頒瓊府三漿出御厨甕開晨露煥囊揭早霞敷鳩羽雕爲杖麟蹄餙作鏤自天舒燕衎遍地湧歡娯康宇東西濶耆臣大小俱班虬看夾仗赤雀自呈符霽日祥交泰凝雲瑞合需惟將瞻就意擊壤舞堯衢歩軍副尉富爾泰年六十三至治昭寰㝢春和物象融三陽開壽讌四海仰元功澤被臣民徧恩頒綺貝豐箕疇衍五福錫極頌皇躬歩軍副尉鄂碩霍年六十三我皇御宇五十春詔宣千叟開嘉宴月正六日華筵陳早梅送馥迎芳苑下逮蒲襏上簮紳逺集梯航近郊甸壽世爰多耄耋臣肆筵授几雨露徧仙厨六膳多且珍大官法醖清而釅堂上堂下法曲新夾陛龍旂擁鸞扇歌容下里與巴人貴重未提及宮絹龎眉鶴髪荷皇仁垓埏協氣蒸燕衎慶緒茂衍福嘏純無疆聖壽天錫羡二韻體歩軍副尉胡琨年六十三祥風藹洋溢春氣漸和煦化日何熙熙八方開壽㝢古稀天子超羲軒詔下引年尚齒上日耆筵舉蓬萊粲高㑹三千随歩武既奏韶清樂亦廣任韎舞已欣仙液霑衢尊更慶仙厨頒萐莆此時黄髪快竒逄如鳯在梧麟在圃朱草萌慶雲覩醴泉溢甘露湑穹昊集竒珍列史未足敷皇仁巍蕩敷錫惟繩祖小臣幸際康阜期被澤濡毫敬頌徳施普歩軍副尉隆昌年六十一景運超皇古春風漾九衢百僚咸壽耉天子正都俞下逮兵農徧旁兼象譯俱馮生休養盛河洛萃疇圖南苑防禦蘇柱年八十三鳯城春曉接蓬萊瑞靄氤氲壽㝢開鶴髪同瞻三殿日鵷行齊集九成臺文謨武畧貞元合燕譽龍光典禮該昔日濫榮曾拜賞于今掞藻愧非才原任防禦三官保年八十條風協琯迎韶年春風已占梅花先彤閶晨開秩高宴躋廷介壽羅華顛一人備福福天下化成壽㝢春常延算綜甲子數積萬弧見丙丁祥盈千古稀天子命千叟長生籙記蓬瀛仙朝多黄髪趨廣殿野有台背參華筵微臣駘質任防尉馳驅圖效心銘鐫征衣曾記兩接戰文鏹優渥沾恩駢臣曽打仗二次得賞銀五十兩八十馬齒尚菣豆臣告休得蒙恩食半俸得聞廣樂來鈞天兹辰嘉㑹洵希覯五福五代堂新顔司炮章京姜燦年七十六式宴瑶階異數榮蓬萊深處萃耆英小臣職忝陪龍豹快向周廬舞太平一賜酺歡洽拜庭中老健猶堪手拓弓一飫堯尊添氣色瓊膏入髓散春融二司炮章京佛爾清額年七十四壽㝢承天祐吾皇闓澤饒笙歌傳紫禁鸞鶴集丹霄禮向春官肅羮随上相調小臣叨賫賞抃舞效衢謡司炮章京李焜年六十二海宇綏豐溥君王錫羡穰引年開燕飲尚齒序鵷行軒鏡天同朗堯樽物共嘗齡從花甲始身到斗辰旁盛事臻成數深仁積逺慶琯恒開白玉律正動青陽厨萐膏胥沐階蓂旭正長仰瞻顔有喜懋典迪前光司炮章京劉應登年六十皇威逺奮偃戈鋋奉職慚居虎旅先欣值泰交全盛世普霑需樂屢豐年多珍不數金光草極樂何殊大願舡聖壽無疆還益壽合齡廿萬叟三千歩軍校丹巴年六十四我皇仁壽綏寰㝢郅治登三復咸五歳籥開韶宴耄耆徧飫堯樽覩虞舞萬方齊效華封祝盛典煌煌邁前古微臣叨秩𨽻期門曾效馳驅仗神武竊祿榮邀愷澤優熙春更荷隆施溥翹首天顔咫尺臨卿雲糺縵輝丹黼歩軍校王絢年八十三一生欣蒙豢養三朝慶遇昇平韜兵日閑輿衛賜燕春啟王正列席螭坳之側同扶鳩杖以行何幸期門小校獲登廣殿仙瀛歩軍校何爾庫年八十二曈曨佳氣藹鑾坡舞蹈班中樂奏和鶴髪華簮同拜賜五雲深處頌聲多一彎弓跋馬附鷹揚嘗咏騶虞縱獵場願此年年擕兕爵舞階長晉紫霞觴二歩軍校伊騰年八十一詔重耆英㑹祥光叶宴温日華舒化㝢風澤被期門景福偕春永鴻禧錫類繁叨榮還自慶天上浥堯樽歩軍校馬芝芳年八十鳷鵲晴含三素雲雍容綵仗導勾陳玉鑪香䕶龍顔喜金戺班随鶴髪新花外遲遲送銀箭春臺並坐霑春醼躍馬曽踰瀚海場鳴鑾今到蓬萊殿青旓兩度繞邊庭翠葆頻年䕶禁營自幸櫜弓邀策飲更教扶杖頌昇平九如天保歌單厚差等百王昔未有堪嗤瑶水謡歈陳豈羡東都几杖授藩服輸誠古越裳外臣稽首共稱觴應知一統車書㑹萬國昭囘日月光歩軍校閆達年七十八聖治凝禧日貞符啟泰辰榮河祥籙獻壽曜瑞華新耆彦籌増海長筵氣盎春沾恩聨舞蹈臣職𨽻勾陳歩軍校佟澤沛年七十八鳯詔頒廷慶協恭首春列宴與榮逄頭銜舊作鈎鈐衛眉壽新沾雨露濃烟靄繽紛聨劍佩冠裳蹌濟集球共萬方爭獻長生頌錫壽先瞻自九重歩軍校劉竒年七十七身世長依宇太和等閒七十七年過恩光更較春光早節近雲開雨露多一鈞天身到聽雲和入昴遊河未足過七十七年度春首今年樂事入春多二一二首韻歩軍校王昇年七十六盪盪慶霄容容紫闥方洋累載傱風扶轄仰矚睿化萬物棣通躋之由庚上下昭融盛哉鑠乎隆我耆耉曰萬之三人輻其輳飲酒樂豈祁祁欣欣洸洸﨣﨣瞻之如雲欽申釐祝肹蠁衍溢内恧無華慤抒悃愊歩軍校寳山年七十六小臣逄聖世歌詠效康衢竊祿憑刀箭酬恩愧髪膚欣随人壽耉共集地蓬壺醉飽歡無極長懷雨露濡歩軍校王永登年七十六聖世榮眉壽隆恩及小臣欣逄嘉宴錫正值歲華新的皪梅初放芳菲柳欲春貔貅曽忝列鸞鶴許相隣玉管徐聞奏瑶觴獲飲醇祥風來上苑瑞雪潤芳津光寵陪黄髪榮華接紫宸熙時方錫福厚澤被無垠歩軍校張瑚年七十五律應條風放早梅人依元運上春臺周京燕喜宜張仲竊忝同斟介壽盃一長随驂乘䕶龍飛入侍垂旒一綴衣愧乏功能叨盛典喜随鵷鷺拜彤闈二歩軍校孫文徳年七十五矞雲爛爛春載陽階蓂六葉騰輝光鳩扶鶴歩怡且肅人瑞麕集朝天閶八紘九㝢承恩久飲甘酌醴羅台耉惟天錫祉帝用敷壽而康兮㫖且有元辰稠疊頒恩綸又預耆筵式燕新臺莱樂只陳周雅國慶綿延億萬春歩軍校戴起祥年七十五北闕承恩久南山拜賜殊鴻行欣在列鳩杖幸同扶酒喜傾仙醖肴看出御厨普天沾愷惠拜手盡嵩呼歩軍校麻色年七十五壽富多男致祝曽萬方欣覩寶符膺體天健合時雍化五世璇源慶日増一瑲瑲玉佩集彤墀鶴髪人皆比鳯儀曉和雝雝鳴一一春風初上萬年枝二歩軍校賽明阿年七十四雲盡春風出絳霄鳯樓佳氣鬰岧嶤古稀景福逄熙運嘉㑹歡聲溢早朝九館羊珠誇洞府三山鼇首詡虹橋何如渥宴懷慈惠敷錫殷殷仰帝堯歩軍校邱良侯年七十四聖人御極五十載解澤汪洋周海内惇憲隆規重引年特啟芳筵普恩賫駑駘飽秣習天閑馳驅曽預戎行再稠叠叨霑雨露濃扶鳩得附千官隊閶闔風宣預賜酺鷺鵷班引偕鳴珮信知蕩蕩本難名萬方惟慶堯天戴歩軍校葉潤泰年七十四愔愔者廣樂聽之和且平鳯凰從風翔崇阿交相鳴兆民際盛化莫不歡有生于斯億萬年皆荷吾皇情盈朝擴高宴矍鑠耆而英臣自顧何人懋矣乃聨名逄時有小草敢比松柏榮雨露本無偏雖微亦合并歩軍校五爾登額年七十四聖心涵造化錫福慶當陽泰㝢耆英萃仙壺淑景長敷筵輝壽曜賜斚挹天香蘭錡參戎隊承恩列拜颺歩軍校巴里克圖年七十三聖皇御宸極純嘏膺天保敷錫大推恩張筵宴羣老微臣荷生成自顧同小草執殳備戎行效命播天討凱旋仗威棱獲賜朱提寳復欣逄嘉㑹抃舞均鳬藻萐莆飫珍厨鵷班依羽葆獻頌厪寸忱共戴仁恩浩歩軍校薩拉年七十二乙帳春初麗寅階日正升祥光黄道合瑞氣紫雲凝萬古成嘉㑹千官得壽稱效功曾後乘受賞類先登臣曽得功牌一虎拜班随後鳩扶杖足憑九霄齊抃舞筋力更飛騰歩軍校何琅年七十一玉律初韶青陽載啟日先旛勝宴授觴几葵藿小草樗櫟朽齒春風所風向榮階戺臣職武衛臣身帝里請祝聖人萬年天子歩軍校庫徳年七十二仰戴隆恩少壯餘春光普照秩筵初空慚一例弓刀伴學向彤階頌九如一瞻天咸愛近堂亷自幸身當羽衛嚴從此更希叨鶴俸爲銜籌向帝廷添二歩軍校七十一年七十二介壽開嘉宴耆年沐雨膏星輝南極近地接北辰高肄雅歌三㨗銷兵戢六韜帣韝陳頌禱敢擬和雲璈步軍校金大鳴年七十二綺歲春開六日華筵叟集千班簫韶虞陛繼作靈憲軒圖迭頒四紀餉沾天糈臣食餉五十二年九如福溥人寰微臣歌舞聖世鵠立森森珮環歩軍校官保年七十一昌期生長幸如何得與瑶筵鶴髪羅列宿環樞宸極拱衆流趨海福源多期門獲聽神仙曲羽校欣傳眉壽歌入昴長庚徵帝瑞㑹看五老出游河歩軍校頓住克年七十闓嘉宴敷韶風熙熙泰㝢承帡幪鳯紀巡環協河洛軒齡億萬呼華嵩春祉撰初吉旭景逄方中璚露布如醴芝山秀成叢列校職微末尊斚侍法宮天威定朔漠羽􅊾奔走臣曽供龍沙戈壁齎函奏健歩晝夜走風騣銀鏐雪璀璨拜捧天賜臨丹楓臣出兵差十八次因自軍營齎摺至京馳行七晝夜蒙恩賞賚有加慶兹雍穆洽逺徼蕩平皇路車軌通嘉生遂性物蒙祉燾載所及樂壽同一家中外聨鷺序聖人錫福誠龎洪歩軍校圖們特年七十吉月孟陬日在執徐載陳醧讌㫖酒樂胥惟此羣老髪之皤然式䝉天顧有喜􅚳􅚳足足者鳯般般者麟賔連華木匪物之珍匪物之珍惟人之瑞化穆重熙慶絣萬嗣酺樓既設衢尊是同誼靡不浹澤罔不豐莘莘期門職兹宿衛近帝之光嘉承寵惠歩軍校勒生額年七十小臣今年政七十五十二年糜餉日雕戈出塞憶前畨憑仗天威授師律合圍六六風雲生臣曽打仗三十六次八旗勁旅真罕匹幾人畫像紫光閣小校愧無功足述臣曽得功牌九郊臺再見凱歌還弓矢載櫜戈載戢近來食粟少防邊老傍仙厨餐玉粒金盤露滿萬年枝小草欣榮亦霑濕歩軍校孔傳曾年七十於穆我皇受天之祜重熙累洽欽繩祖武躋民仁壽徳洋恩普階蓂應春庭萐扇暑一歲紀㫋䝉月正初六迺開壽讌用錫厥福貴分邸第賤逮蔀屋萬族一家咸臻茀祿二茀祿伊何黄髪皤皤飲和食徳式舞且歌靈壽之杖以搘婆娑龍光下賁樂意孔多三湛湛甘露被于貞榦煌煌靈芝産于甲觀赫赫我皇日月昭煥於萬斯年民莫能贊四歩軍校七達色年七十玉律啟青陽翕習條風轉敷錫溥壽祺引年舉盛典稠叠几筵張燦爛􅉊毺展耆耋共邀恩彤墀許遊衍小臣年七旬曽預持矛選竊祿荷生成内顧増慚㥏何期綴鵷行天厨飫豐腆願附祝堯篇依光獻愚款歩軍校黄文獻年七十温綍先時降紫宸蓂開六莢報初旬年徵絳縣人惟舊酒醖黄封味更新六典歌風開上壽九衢霑露樂陽春嵩呼次第歡聲應樗散偏欣比大椿歩軍校九成年七十景運際洽熙便蕃錫恩紀光榮逮庶老魚藻賡燕喜穆穆大廷開肆筵授之几樗材備執㦸年已七十矣長叨太倉粟豢養犬馬齒五十二年來淪肌還浹髓今復覯盛典天顔臨尺咫渥賫欣預霑夢寐非所企敬誦天保詩華祝繼前軌歩軍校邁拉遜年六十九射柳仍彎玉靶弓當時幕府記從戎臣曽出兵阿爾台一次得受銀賞精鏐永寳天恩渥壽斚還沾露醖同共仰函三開泰宇俯欣吹萬被韶風扶鳩拜手彤墀上春入酡顔暎日紅歩軍校恩特賀年六十九聖神天子允文武小臣效命慚貔虎身經大小數十戰老與期羡三千伍紀恩稠叠恩更深春風紫殿厠華簮從今歲月皆天錫葵藿長懷向日心歩軍校覺奈年六十八左青龍右白虎前朱雀後元武中央天樞運萬古臣參旂校廿八年羽獵皆在前驅前臣食俸二十八年随圍二十八次長見天顔久彊固從容閒暇控轡絃今隨千叟飲醇酎佳氣榮光彌世宙奎壁文章角亢壽羽林小星天闕右歩軍校張廷杰年六十八大造公無私陽春乘歲籥天慈覆中外徳化流廣漠元辰命行慶鳯詔頒懿鑠登進三壽朋珍厨甘醴酌忝職依陛楯許仰麒麟閣拜手瞻聖人需雲叨宴樂歩軍校色爾炳阿年六十八黄道雲開閶闔綺筵人在蓬萊耆耉欣承慶典鴻恩渥沛崇垓壽㝢舉叨厚植小臣竊忝深培異格特超蒲柳爭榮共樂春臺歩軍校烏爾青阿年六十八曈曨日上五雲中春滿層城瑞靄濃遥慶萬方傳舞鳯自榮七校翼飛龍年依天壽人常健惠協皇仁典共逄感戴獨深叨賤旅聨班齊拜大官供歩軍校徳祿年六十八昊縡敷貺惟聖受釐億萬甲子衍是神蓍雍宫泮水蓀祉蘭祺天家洪慶逺軼軒羲畨畨國老暉吉爲儀瓊筵肆設六葉蓂㽔霞舒文綺露湛仙卮仰被祉福普示惠慈臣惟列校鴛鷺榮隨天光下臨洪纎畢施拜稽作頌幸際昌期歩軍校七十九年六十八訢誾韶景春舒疊人瑞物華高往牒六幕熙熙化日長四門穆穆和風協臚頌恭逄國慶駢湛恩覃被羣驩愜當年聖武逺折衝堅昆大宛威稜讋龍沙萬里勒天聲鐃歌大樂昭戎㨗微臣曽綰尺五符抽旋左右短兵接牌頒幕府受言藏欲並雕弧傳奕葉歸來列衛承嚴更盛治南諧還北燮簮裾廣殿耆宴開仙蓂六葉抽新莢鈞韶鳯籟叶嗈喈寳露觩觥咸鬯浹聖人申錫無算壽松喬上壽蹤堪躡歩軍校達青阿年六十七日麗韶春永風清羽衛閒稱觥随虎旅扶杖入鵷班壽共依仁宇祥瞻霽聖顔欣惟同效祝萬國仰南山歩軍校宜兆鳯年六十七至誠合天徳盛治敷駿厖景慶煥六幕共球聨萬邦瑞符懋圖牒編紀紛芸江嘉辰宴千叟紳佩諧琤瑽壺瀛延壽籙香海華嚴幢仙佛不足擬純風格愚惷臣職𨽻列校兵蘭司矛鏦鮐顔升玉砌鴛綴依雲杠温言賜沾洽醇和酌蘭缸願進華祝語仰叶衢歌腔歩軍校拜凌阿年六十七臣十七歲拜天恩臣自十七歲食餉今五十年半生報稱無可言曽經二十四行陣翠䍐前驅十往還牌懸雙繐腰金重臣曽得功牌二賞銀三十兩更以列校侍宴登九閽筵前露斯湛几上春更温弢弓槖矢適以糜廪祿幸不衰老儤直堪晨昏祝鳩扶杖非等倫臣以筋力答至尊吾皇億萬斯年御區㝢臣陪虎旅鷺序長侍金馬門歩軍校五達塞年六十七瑞協瑶圖淑氣和堯厨萐莆沛恩波三千合奏長生曲總是星雲燦爛歌一燕設傳柑佳節前鵷鴻隊裏序耆年恩深直是符蒼昊一氣洪鈞轉八埏二歩軍校諾爾泰年六十七一色麟衫映日萬年鳯紀開春瑞啟六丹蓂茁祥隨三素雲臻慶典周敷四海拜恩再倍千人聖徳備隆穹宇壽官亦詡微臣欽定千叟宴詩巻十三
