body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻十六預宴九十一人詩一百三首壇六品天官常清年六十九堯典首欽若周雅媺昭事聖人與天通精禋有深意我皇自即阼逮今五十年三大祀必親弗懈滋益䖍先一日誓戒視版省牲豆玉輦詣齋宫潔蠲答純佑酌匏薦蒼璧晋爼及燔柴典重敬罔弛心肅禮允諧即今七旬外不改初踐儀仰知乙夜間長如對越時天以圓而神聖以徤而壽合徳養萬物一世皆耆耉壇六品天官克孟額年六十一精禋昭久道帖妥奉壇圜為近星辰側長叨雨露偏上辛擎盥日周甲杖藜年榮幸臣何述賡歌錫壽筵壇六品地官基鼐年七十二瓊漿滿酌泛金卮丹殿需雲燕衎時天澤共邀如意杖春風偏暖向陽枝歡騰北闕祥煙動光耀南弧淑景遲漢代老更奚足數我皇錫羡沛恩施壇六品地官希寧阿年六十八八變寅清洽蕃釐曼羡増崇嚴官守重嘉應瑞符徵老際重熙㑹恭逢聖日升玉階黄綺集胥慶盍簮朋原任六品官地壇豐盛阿年六十五渥澤傳敷上日隆儀記習當年職藉黄琮翔地恩仍丹陛朝天萬載顔承有喜四㳺光被無邊寳軸三千六百奠安似列瓊筵壇六品社稷官安布年六十八吉蠲夙夜奉天儀秩祀寅清慶受釐薦璧恭承嘉榖蔭升馨仰望瑞雲彌豐綏屢恊三登兆恬養同欽萬載期時若雨暘調六幕彬璘禮樂紀重熙載申衎燕敷瑶席嘉與耆年介壽眉共喜芝圖呈化日已看花勝扇祥颸金樽優渥層霄露仙杖扶攜九節枝㐲幸恩華臣得被億齡駢疊軼炎羲壇六品社稷官保住年六十三徐方土北里禾産芝作醴嘉祥多惟天佑聖億萬壽深仁丕冒登謳歌謳歌之日不勝計垂髫今已成畨畨恩鴻復錫耆老宴有生何幸福禄皆駢羅欣榮還紀邁殊格踐土食毛戴顜畫樂歳如太倉春臺若磐石大有無疆手慶額扶杖熙熙娯衰白祝聖壽被聖澤典禮以知右社稷建位臣隨小宗伯壇六品社稷官豐生阿年六十二春滿鳯凰城耆筵兕觥舉欣榮依太乙恊慶咏由庚椿嵗同稱壽葵衷各獻誠堯階有斟雉臣竊效彭􅃵内管領克們年七十二八表呼嵩介壽衆星拱極稱觴聖祚萬年綏福孫枝五世延長玉殿恩擎甘露金階榮被韶光皓髪黄眉絢耀歡呼齊仰垂裳内管領六十九年六十七黻座延禧廣讌開龎眉皤髪喜偕來樗材榮列長生籍蕭路醇流益壽杯尚齒人多臻耄耋養頤恩早浹埏垓叨霑渥澤瞻顔霽竊詡微躬近上台内管領項雲成年六十三恩洽明良㑹天開景慶圖春從丹陛布人向紫震趨鳳管諧金奏瓊漿注玉壺耆年䝉燕衎身備寵榮殊内管領莫爾根額年六十三吉日啟帝廷初陽麗金掌國老扶鳩庶老隨雍容共向天街上大庖仙膳昔所誇欣飽恩賜惟天家歸時人共見春色從此不老言非賖内管領善保年六十三聖人壽萬邦共慶延洪祚仙宴啟瓊霄醴恩拜湛露四代燕饗食八音韶咸濩陶姚未有盛綺皓艱前遇祥呈不夜花暖發恒春樹小草幸依光春和景長駐原任六品管領永福年六十二太平世多耆壽皇慈溥及邇遐廣坫文筵肆列庶羞束帛有加法酒領來帝闕華縑寵逮臣家菲材曾職奉御渥貺禮敢拜嘉副内管領平穏年七十二壽星彪列麗弧南明屬天街瑞色含八萬聖恩千叟算禹疇羲畫位參三一閣道周廬奉紫宸寸葵常仰日華新詎知垂老恩逾渥嘉宴同陪玉陛春二副内管領明保年六十七天家傳世徳人瑞恰相符禮數空前古歡聲溢大酺一人開鎬宴千叟效嵩呼典以宜年重恩縁逮賤殊作朋堂下拜掌貳府中趨守藏曽供職分田幸食租昭華揚舜琯藁飫扇堯蒲欲獻無疆頌康謡徧九衢副内管領全保年六十七軒紀盛古稀撫辰徵康强紀元符衍揲繁祉歌無疆集廷三千人一一承恩光豈惟榮渥賜方此開嘉祥蘭㽔綿瓞𤓰春滿五代堂豐苞頌燕翼備善超虞庠四海望喁喁九重詔煌煌人神俱禔福臣愚何賡颺副内管領七十三年六十六聖治光昭溥耆英履福祺綺筵開玉陛寳醖酌金卮養老恢庠序敷恩浹髓肌歡歌溢膠轕慶舞振葳㽔淑氣洪鈞靄祥暉大地熙休嘉知帝力仰答愧彌滋副内管領華亷布年六十五九重春靄瑞光融恩普耆筵錫慶同合億兆歡承聖主龎眉一一效呼嵩一列坐騰歡各引曹瓊瑶為膳玉為醪人間遥望知何似五色雲連玉陛高二副内管領岱明阿年六十四拜手三千侣瓊筵淑氣多齒隨春益慶澤以普同歌帖燕初翔瑞扶鳩共飲和如山符夀愷寰海沐恩波副内管領常保年六十三貞符亘萬古湛恩霈稠叠上擴怙冒宏下感肌膚浹龍集紀木徳萬彚頌調燮既開泰序交遂卜晋晝接化隆億兆熙宴盛三千恊共扶刻杖鳩欣覩扇厨萐祝夀獻金鑑銘功鏤瓊牒史筆統可稽孰似皇情愜副内管領福達禮年六十二旭日開銀鑰春風動羽旄龍光娯宴集鶴算列仙曹露下金莖迥煙縈寳鼎高微臣何厚幸尚齒亦榮叨原任副内管領福保年六十三雲蒸島樹排恒春迎韶獻歳吉語新弧南之星麗斗極我皇同樂逮下臣臣職舊忝内府籍大酺所被恩光匀撰辰元正日次六開筵養老頒温綸我朝耆筵此重㑹又况五代三雍嘉慶申捧霞觴兮拜紫宸瑶編紀數符大衍行徤不息徵至仁六品掌膳官八彦泰年七十三徳孚天産地産化恊養陰養陽睿照逺開金鏡夀星齊集珠囊加長何殊馬齒分榮遂列鵷行臣職敬宜椒頌詞賡敢與柏梁六品掌膳官二黑年六十九盛世升恒頌凝庥湛露團慶超千紀上宴錫五雲端夀㝢恢三島恩光洽上䦨雉􅃵臣所職膳宰應周官六品飯上官倭申太年六十五祥輪寳鏡古無嫓創守兼垂萬代基道泰文光兼武烈時徵累洽復重熙敬天陶璧精禋洽法祖􅃵墻謨訓垂樓鳳頒綸騰薄海橋虹圜璧入春池祥開五葉雲仍聚夀恊三朋耄耋隨錫宴新陽蓂六葉發春太液栁千絲職叨玉粒供珍膳賫重金膏泛彩卮坐致太平非易事親瞻旰食不遑時六品包衣達三竒哈年七十六官栁稊榮階蓂葉扇需雲上天解澤降甸禮舉引年恩隆逮賤酒正行觴膳夫供饌龎皓雍容康爵酬獻遐及垓埏邇由畿縣天子曰俞澤宜溥徧蒲質春生葵誠日戀於萬斯年敬銘宸眷六品包衣達范武年七十五凝命惟居敬宵衣正體元御筵春乍霽介夀日初暄仙仗鴻禧集良辰彩勝繁榮隨夀星聚仰近紫微垣六品包衣達阿琳年六十五九重恩宴許追陪仙靄氛氲瑞景開日月光華人夀宇八紘四極一春臺一鈞天朗奏樂時雍寳鼎祥煙傍衮龍為飫耆年叨侍宴金莖長浥露華濃二六品包衣達國保年六十四淑氣報新年獻節叶諏吉和風動金勝靈辰近人日煌煌千叟宴鍚福恩禮溢始知化宇遊不在覓仙術唐虞亦養老稽古有典秩豈若今日盛萬方歡恊一原任六品包衣逹十達色年六十六春回斗轉節初長詔錫芳筵溥樂康雉尾移時開扇影螭頭排處裊爐香物欣瑞莢依天上人慶靈槎到日旁湛露沾濡分玉液吉雲醖釀浥璚漿涓埃乏報縁投老草木滋榮正向陽聖澤溥霑珍賚重弧南長此驗星祥六品包衣逹程柱年六十五黄金榜色明初旭隔嵗迎春春己復春臺蒲柳早沾榮應道蓬山異茅屋臣自承恩臣感私非云身外無由知且陳歡慶抒愚悃拜手彤墀醉玉卮玉卮照影春如海白髪三千人共在亦有老農茅屋歌同風八表輶車採司庫蘇爾通阿年六十五王㑹爻閭輯時和玉燭調引年逢至聖飫徳拜重霄眉介先祈爵枝蕃慶衍椒好風披拂處還聽九成簫司庫盛格年六十五祥飈度處玉簫鳴末席慙沾賜醴􅃵天為開春和以暢人因就日慶還榮蓂舒六葉臨螭殿花發千枝暎鳯城閭左歸來頻蹈詠豐年嵗嵗祝昇平司庫巴揚阿年六十五詄蕩天門向曉開琱鳩人共上春臺梨花釀熟斟瑶斗正値華林放早梅一聖恩浩蕩與天同法祖耆筵典特崇南極星邊光爛熳願將億萬祝皇躬二司庫福慶年六十珣玗琪出醫無閭璆琳琅玕崑崙墟萬年錫貢九州産竹箭筋角兼儲胥我皇所貴不在此曰惟黍稷稻梁苽麥民須饒且餘食之可以夀而徤共㳺化宇安其居翠華屢勤天下俗但覺五土沃衍瑞應一一呈周廬司庫小臣亦何事嵗計出入操觚書時聞賑濟數十萬乃知天家百産皆為民藏諸新春六日宴耆耉以年叨復來丹除匪頒渥賚盛拜受尚方之積盈雲車何以報答忱且舒依班共祝惟南夀仰見日升月恒松栢之茂福至并川如庫掌常徳年七十天授聖人萬物咸覩多福多夀化周寰宇慶無不洽典懋必舉耆宴隆開亘超今古猗歟洪熙申錫斯祜史册光昭後先繼武臣以微衿備員武庫臣由文生員補用筆帖式歴陞武備院庫掌週甲逾旬幸叨異數謹獻歌詩以賡拜舞庫掌五逹色年七十糺縵雲開元圃老人星聚丹邱翠莢方舒六葉緋桃恰報千秋箕翼先占帝瑞垓埏共迓天庥願以月要日㑹評量海屋添籌庫掌烏那哈年六十六維天眷聖維聖率祖式燕耆英茂典再舉曰惟迓祉曰惟繩武帝有恩言用頒觴俎時維肇祚風和日煦五代五福瓞綿夀㝢進兹黄髪酌以玉醑筦庫微臣糜禄天府預沐殊榮追陪鷺序願效嵩呼願隨巷舞於萬斯年受天之祜庫掌扎克㪚年六十五浩蕩春融沛澤流雲仍衍慶恊箕疇休誇廿一萬餘嵗聖徳延洪萬萬籌一夀宴三千賜近臣普天早已運鴻鈞從兹歳拓無疆福富有還曕典日新二庫掌達福年六十五雲韶調鳳律紱佩覲龍顔恩似醍醐灌珍從膳宰頒春開花艶艶風動鳥闗闗小草承天寵賡言祝壽山庫掌常徳年六十五仁壽逢熙朝庶老欣利見法祖重引年乗春錫嘉醼彤階日華暖麗藻天章絢攜杖荷隆恩列席羅珍饌傾葵效微悃呼嵩滿遥甸長此共羣黎靈貺昭天眷庫掌永普年七十二惟天行徤惟聖綏猷洪燾函夏巍巍與侔萬福來集百禄是遒嘉與庶老式燕尊卣韶春始鬯吉日載諏充庭振露撰杖集鳩於古有訓壽以云醻觩䚧玉瓚中有黄流酌言以獻恒沙紀壽綿八萬歳合三千叟元㑹章蔀環而復周委署司幄徳住年六十七曙色啟天扉羣工拜紫微霏霏雲氣動一一鶴聲飛就列鳴仙珮分榮及綴衣誰知恩錫壽胥樂醉言歸宫咸安教習五達子年七十一欣欣兮樂康皥皥兮翺翔皇帝陛下盛徳邁陶唐𤓰綿瓞衍慶純嘏昭華玉琯來天閶耆筵啟壽㝢昌豈徒遣人存問三老束帛而異粻敷錫五福㪺仙漿下及熊羆之士芻蕘之人咸使矍鑠以騰驤躬逢盛典惟有拜手稽首䖍頌羡貺膺洪長宫咸安教習達色年六十三九天恩寵恊韶風員嶠山西閬苑東榮得蒼顔長錫宴序班何羡黒頭公一化沐菁莪感倍深作人維壽仰天心梧桐岡畔朝陽鳳願率多材共矢音二宫咸安教習嵩音年六十一先慶迎春候管後需佳節傳柑十日中開宴序九衢同渥恩覃千叟倍陳極北百官溢祝山南敬以臣名恊瑞齊呼萬歳聲三六品頂帶官學教習鄂賫年七十五太平之世敷春祺眉梨台耉來熙怡舒長化日齊拜舞肆筵設席陳丹墀羣生沐膏澤小學實所司觀乎人文珠斗燦青衿髦士咸攸宜飲和食徳需雅奏乃挹甘露含華滋懋典古未有我朝兩舉之進霞觴奉瑶卮維皇法祖永固億萬丕丕基六品通官烏林布年七十二日麗韶春滿鳳城九衢歌咏各謬榮從來耆老知無限誰見天家許列名一百五春秋寒士寒四門博士列朝端應從鳥火雲龍後直到皇朝壽賜官二六品頂帯原任軍台筆帖式清寧阿年六十五開嵗乍逢六日履端肇始三陽盛際引年懋典欣依鴈齒隨行曡賚精鏐文綺先承露液霞漿普率堯階臣庶咸近天子之光藍翎侍衛薩哈爾索丕年七十六曡沛恩膏出紫宸萬方千叟拜堯仁筵開金闕祥光繞酒泛瓊巵瑞氣新彩勝桃符初啟嵗琪花瑶草早迎春願期聖夀如天夀常被醍醐沐化醇藍翎侍衛富英阿年七十五世如春人皆夀夀讌還宜啟春首黄髪同時數千叟天閶澹蕩條風新青帷朱幕次第陳甘醪酌大斗重豆羅八珍行間臣昔叨恩賜更幸餘齡逢盛事仙椿萬葉祉祚流泰平嵗月長優游藍翎侍衛全得年七十二螭陛傳觴列錦茵慶逢夀世恰如春南弧綺曜寅杓合東海瑶籌甲紀新繡㦸千廬瞻日近瓊筵九醖荷恩頻蓬壺彩旭迎韶祉為報延年恊令辰藍翎侍衛石圖年六十三鵠立仍朝序鳬翔列旅賁隨班攜玉杖叨坐醉金樽力蹇慚心壯恩隆覺齒尊從兹望青𤨏身欲比高鵷藍翎侍衛六逹色年六十一迎和玉琯啟三陽法宴傳宣集九閶仗指春旗迎曉色杯樽天酒沐恩光和風静度雲璈迥麗日初舒午漏長惟沗侍臣叨既醉無才隨列効賡颺苑丞永詝年七十六律回春暖慶洽青陽宴傳綸詔筵出尚方金盤玉饌斚瑶瓊漿作鈞天樂進萬夀觴臣職苑丞臣年天造惟識韶光先依翠葆盛叨渥澤樂偕羣老翔地何言欣同寸草苑丞育徳年七十一黄道長開日光華麗九天引年隆逮下法祖盛開筵福備疇推五恩覃叟倍千瞻依叨禁近南極頌昭宣苑丞永保年六十六寵頒曡被紀恩覃宴啟春初麗景酣此日金鑾傳盛典夀星光更耀弧南一禁苑紛敷錦繡春液池碧漾水鱗鱗小臣省識恩暉早㸔取繁花蓓蕾新二苑丞佟舒年六十五紫極恩暉洽華春瑞氣敷卿雲依鳯闕仙篆颺狻鑪鍚福鴻流慶開筵軼賜酺耉眉環綺席璚液溢春壺夀㝢徴籛偓宸歡叶藻蒲城南南苑近遥望見南弧臣沗丞南苑苑苑丞常清年六十五上林長幸一枝棲自喜蒼顔比凍梨叨得聖恩天浩蕩春風更向夀筵躋一負曝年光共飲和萬年枝上五雲多不知此日身誰似麟在郊兮鳯在阿二苑丞蘇冲阿年六十四盛典超皇古耆筵敞紫庭八風諧舜律六日展堯蓂晋錫占三接謳歌浹四溟自慚蒲栁質榮許醉仙醽苑丞明保年六十二御園桃李正迎春眉夀筵開洽令辰盤異五辛叨寵渥算逾六甲拜恩新飲和竊喜心長壯介祉同知願欲申葵藿忘微還向日况承渥澤近楓宸苑丞莫爾根年六十一臣年週甲子己獲侍恩筵豫慶延綿福長依廣大天黄圖春正暖赤縣澤無邊佇聽南山祝臚歡北闕前苑丞常徳年六十一法祖宴千叟届節迎春禧婆娑凍梨顔盈廷再倍之臣年甫週甲榮已叨盛儀受生幸如何共樂逢昌期譬比韶春中小草發華滋願培南陽菊潭水流淸漪臣䝉清漪恩侍直園六品牧長徳楞額年七十二丹禁清嚴淑景融引年高讌集羣工萬方愷樂天同覆百歳休祥日再中走馬坡前懐射鴈晾鷹臺畔記批熊自慙頽齒曾無補化宇惟霑沛澤鴻六品牧長富申泰年七十一占恊維魚瑞臣叅坰牧司吉黄千歳壽雲錦萬重披閬苑同瑶席金門奉玉卮蒲梢何足紀八表慶重熙六名牧長四達色年六十九聖皇膺運錫福寰瀛既富且壽以安羣生民安物阜亦徵郊牧振鬛飛花攢蹄噴玉吉行有慶天閑耀輝豈誇八駿惟式九圍臣守是役日歌蕃盛辨六齊三為校人政恩隆暮齒榮列壽筵何以效辭超籋雲篇六品牧長㑹林年六十二天地日月恩光覃惟我皇奉無私三鳳銜紫詔下彤陛鳩笻鳬舄趨朝參盈觴法酒泛緑蟻曡笥宫錦輝氷蠶禮寛筋骨復賜杖恩許醉飽還傳柑軒䇿羲圖福祚永虞庠夏序淳風涵迺賡載歌効葵忱以媚天子樂且湛六品司牧富徳年七十九韶年開綺宴麗日耀彤墀聲律簫韶㑹臣民樂愷時歌恩同拜手食徳徧龎眉法醖三漿渥天厨五味宜祥飈何浩蕩淑景正融怡玉戺傳綸綍金門盛羽儀天庥綿燕翼國慶萃鴻釐忝附雲霄近扶鳩共洽熙六品司牧曾秀年七十一燕喜堂亷叶泰交朋來耆耉彚征茅皥熙歳似遊軒頡淳樸風應紀燧巢壽境仙函開化㝢乾符坤瑞發元包吉雲自捧觚稜角甘醴常霏綵仗梢已向衢尊斟沆液更欣珍膳飫中庖綏豐仰恊維魚兆蕃庶同占錫馬爻何幸恩華沾圉牧本來臣職𨽻芻茭萬年釦草青敷莢六葉階蓂翠色苞噴玉噴沙歌壽榖願臚嘉頌獻螭坳六品備弓恊尉蘓彰阿年七十四履道欣如矢占屋喜近弧問官司夾庾錫宴勝彤盧掛識承平久持慙審固殊願因男子志長戴帝弓趨親隨鳥鎗頭目六十五年七十四身是長楊扈獵臣風雲魚鳥各相因忘年但自娯熙景毎聽聲聲爆竹春一春筵列坐白頭旁毎歳親隨秋獮場親見君王文武聖天題鐫記虎神槍二親軍校達色年七十九天門曉麗瞳曈日日在娵訾歳開乙萬福來同錫宴開千官拜下承恩溢詔許微臣亦引年年纔什一追彭籛射鵰曾幾隨人後臣隨圍三十三次斟雉初逢到帝前醍醐受賜春生斚已覺仁輝徧區夏既醉無湏鳩杖扶臣猶矍鑠能騎馬親軍校六格年七十六獻節開嘉宴瑶樽次第頒千官駢鶴髪一笑霽龍顔醉飽榮施渥趨蹌禮數嫻㑹歸皇極建錫福五雲間親軍校富爾當阿年七十三衆星拱宸極萬象囘陽春皇心眷佳日錫壽三千人自惟樗櫟姿詎足依楓宸就列共一筵乃知天澤均周廬夙供職稍食慚已頻禮成既醉歌列校邁等倫親軍校明安太年七十二壽㝢龎鴻壽宴開逢時共慶上春臺不妨既老誇餘勇曾習軒皇蹋鞠來一式序欽同聽玉音羽觴醽醁後先斟新正不尚屠蘇次惟感年深澤愈深二親軍校額倫太年七十一藹藹春回芳甸融融瑞啟崇墀聖神文武備矣禄位名壽兼之曠世上儀紀盛熙朝羞耉逢時古稀開秩無算祝嘏輸臣寸私親軍校佟泰年七十一紫殿集千官張酺燕語歡羽林榮甲士瑶席荷辛盤壽宇同歡衆天顔帶笑看南弧朝北斗凝望彩雲端親軍校雅九保年七十一九華春殿敞瓊筵尚齒温綸賁自天漢史漫誇更與老幾曾同日列三千一銀甕黄封備百司丹墀先後叙班資迴翔齊慶天恩渥踴躍私申湛露詩二親軍校明福年六十六五十年來衛馺娑烏衣赤幘荷琱戈三驅屢從伊綿谷九伐曾踰察罕河鳳闕光華依化日龍池浩蕩沐恩波今朝更賜流霞酌三爵油油飲太和親軍校官福年六十六祥風播符瑞來延壽㝢登春臺一人有慶禔福逺旁沂八埏暢九垓小臣司執㦸豢養慚微才威稜四耀武功定侍從每得依蓬萊欣逢嘉瑞荷天寵玉階日暖祥雲開景運從知邁三五嵩呼共上萬年杯親軍校明安年六十五邃古制作推羲軒不聞介夀開金樽况恢隆典合天下三千晉接昭慈恩惟皇禔福膺天眷臚觀萬㝢開芳讌葑菲微才𨽻羽林相從鶴髪瞻金殿荷戈欣遇止戈時扈獵頻年豹尾隨臣曾扈一圍三十次聖武光昭文徳懋恩容拜舞預瑶墀親軍校穆隆阿年六十五百爾效媚兹賡歌富篇什福夀多男謡往往相仍襲雖抒臣子忱鋪張豈盡實嬴劉易代還治化不足述勲華千古隆百世無以匹孫枝衍幾代不聞載緗帙乃知造化竒備福詎能必篤眷四千年昌期際仐日萬夀仰升恒五世欣繞膝玉陛稱瑶觴駢闐千叟集燕喜荷温顔鴻施沛末秩許擕天瓢漿天恩徧洋溢親軍校金其祥阿年六十四蔀檐喜獻椒盤頌紫禁欽逢寳宴陳日照鳯梧温室煦風披魚藻液池春周原共慶葵抒悃堯韭還承萐效珍從此萬年熙洽慶耄耆叠沐聖恩頻親軍校多遜爾年六十四麗景升長日韶光集令辰萬年綿夀籙千叟沐恩綸雅奏鈞天樂熙陽化宇春瓊筵歌既醉同是杖朝人親軍校四達色年六十五珍饌設芳醪斟維皇養老展徳音雍雍王公逮耆庶尊者賜綵卑賜金小臣何人斯夙昔職羽林身遊太平己週甲幸叨大饗從朝簪桑榆益可愛葵藿長傾心年年捧御觴稱祝三千同醉韶春深親軍校朝旺年六十七運㑹苞符啟稱觴祝萬年鳯翔金殿上鶴舞玉階前浩浩皇仁渥欣欣恵澤便小臣原虎旅以齒亦班聨親軍校闗寧年六十一聖徳同天徳絪緼夀㝢開祥徴三秀草春暖萬年杯康爵分南極仙韶徹上台臣隣歌澤普宇宙慶恩該保合皇猷盛昭融瑞象來乾清朝啟處佳氣繞蓬萊親軍校徳福年六十一鳯紀恊旃䝉衢尊六㝢同長生符受籙㬅夀聽呼嵩綵仗迎朝旭仙璈度曉風天宫摛景緯早映朶雲紅親軍校雙保年六十一武烈鞏奠文治張萬方沐化同翶翔雍容赴宴及介士渥賜沛溢眞非常非常之典古無有聖詔以恩臣以夀臣夀何曾敢自誇生成豢養皆皇授即今既醉歌一篇合祝聖夀人三千三千人夀各計百便成卅萬吾皇年年時榮記春正吉鎬飲豐歌協韶律賡颺睿藻臣豈能八伯卿雲需大筆親軍校寧住年六十一萬國行春慶隆恩錫夀祺金門榮就列玉陛喜叨隨綺甲初周日黄封共醉時罝揚雅化猶足賦中逵欽定千叟宴詩巻十六
