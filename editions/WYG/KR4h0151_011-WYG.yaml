body:
  text: 巻六預宴九十四人詩一百八首㕘領劉嵦年六十三史册饒他莫並肩我皇文徳洽垓埏四編詩集瀾觀海七閣全書日麗天學啟塞垣塗二萬講臨璧水士三千舜歌堯戒豐岐鼓史册饒他莫並肩一史册饒他莫並肩武功赫濯震無邊一人睿算成三捷兩度鴻勲速五年闐璧宛駒爭貢篚崑邱濛畎熟屯田軒皇棡鼓成湯斾史册饒化莫並肩二史册饒他莫並肩功成治定倍寅䖍六飛屆處勞廵省七袠開除厪惕乾課雨占晴與民共宵衣旰食以神全盤銘又日書中昃史册饒他莫並肩三史册饒他莫並肩即論此㑹盛謨傳三千餘衆民猶子百九四家孫抱元數溢期頤師博士里逾八萬隸司天膺圖五十京垓積史册饒他莫並肩四未恭衍首尾御製詩句作吟體㕘領王法年六十三頒春開渥宴錫福逮羣臣藻樂周京詠雲書太史陳徧行酣法醖賜坐耀華茵長養資㣲末陽和仰大鈞㕘領希布禪年六十三九五龍飛五十年引年典重叟三千五雲捧日朝凝闕五緯連珠夜合躔建極五疇推禹範遊河五老慶堯天萬年帝徳咸超五五福堂徵萬福綿㕘領能泰年六十三上殿稱萬歳北極捧星辰南嶽配朱鳥佳氣日氛氲東岱雲峰起西嶽崚嶒竦處尊聖夀宜過一萬春今春喜氣滿乾坤閶闔晴開詄蕩蕩御厨絡繹送八珍和風日冲融八荒開夀域湛露即歌詩感􅈭動四極壯哉崑崙方壺圖神仙中人不易得羣仙夾翺翔葵藿傾太陽如澠之酒常快意老極老人應夀昌集杜甫句㕘領福星泰年六十三㕘領小臣福星泰夙備戎行瞻華葢耆齡忭舞飫星厨天子萬夀恩初沛憶昔轉戰依廟算大槊在手長羽帶雷輥一百二十塲慿仗天威拓無外臣北路用兵接仗一百二十次懸牌鏤伐錫師中軍歸宿衛隨飛龍鳳凰在阿華平茁雒常逺羾拘彌通安于盤石夀旗翼車駕觀饗酣春風臣泰紀恩恩重重欣此復預遭何隆常泰年六十三春日載陽合宫總章卿月民星壤慶廷颺煌煌矞矞濟濟蹡蹡酌彼康爵純嘏爾常帝齡錫羡𤓰瓞集慶協風吹萬渥澤溥洋臣叨禁衛軍旅昔襄蠶叢峩峩岷源湯湯天威赫濯弓矢允藏參旗井鉞袵席寧康詔預嘉宴光寵浩穰願申悃祝福夀無疆㕘領依爾通阿年六十三憶逐貔貅喜奏功昔年邀賚感恩隆臣食俸餉四十八年屢次出兵打仗得功牌六箇䝉恩賞賜銀兩耆英㑹後羣趨拜榮幸徒慙豢養豐一恭預華筵樂未央天時人事共韶陽惟同四海歌堯日春正長時日倍長二㕘領琳昌年六十三化日啟熙宇瓊筵飫上珍大千同飽徳凡百本依仁長養風常茂敦龎俗自淳置慙皓首快覩茁葭春㕘領都爾松阿年六十三浹日韶光暖律新禮筵康爵喜初陳共瞻渥澤真如海普散寰瀛總是春千叟期頤徵瑞聚一廷喜起拜恩均齡餘周甲花添綺胄衍宗潢派接銀捧出賜珍膏湛㴻賡來藻翰韻璘彬分行竊喜陪鴛鷺普讌曽叨接鳯麟瓞衍綿𤓰符逺慶豐歌有芑繼昌辰萬年樂愷超周雅雅化還欽夀作人㕘領薩爾泰年六十三聖徳符乾運嘉筵協泰交引年趨北極尚齒軼東膠石凍分仙醁蒲風扇帝庖端辰三始節内法八珍肴賜杖鳩延嗉聞韶鳯振苞重熙敷錫廣異數逮衡茅㕘領那彦泰年六十二春風砌敷蓂莢曉日闕啟芙蓉拜衮欣隨百辟呼嵩共仰九重夾陛雲璈響徹傳杯玉醴香濃何幸年才逾甲叨陪賜讌雍容㕘領肇慶年六十二盛世庥光集熙朝徳意將引年知有慶介夀頌無疆芬苾中厨出輝煌御宴張冠裳看肅肅鏞鼓聼鏘鏘禮遍東西陛恩周上下庠鳩扶新賜杖虎拜並傳觴喜氣承三殿歡聲逹九閶微臣歌既醉蠡管愧賡揚㕘領明福年六十二融風協青律蠲吉維孟陬欽瞻景福繁大小來共球皤皤眷黄髪一一添海籌三槐九棘中濃露祥光浮小臣飫俸糈三十九春秋駑駘仰大恩年甲旋已週甲週一何幸長共堯民逰復此拜華筵萬歳賡衢謳㕘領尚玉徳年六十二長筵序飲異屠蘇淑景熙熙旭彩舒六日開春占既醉萬年拜祝樂于胥雲霞縹緲縈三島日月升恒頌九如敬為環瀛告耆老今朝只是奉恩初㕘領二逹塞年六十二羽林列職排仙仗長以菲材䝉厚養年年秋獮扈從行紫塞風高馳颯爽肄武因之命詰戎微勞邀賞非竒功功牌得八白金百聖恩所被誠過隆樗年今已踰六十筋力未須扶卽栗況際彤墀燕衎時敢云舞踏糾儀失惟皇錫福徧萬方風雨調和日月光黄耉台背樂未央飲衢擊壤歌洋洋臣雖虎旅慚賡颺猶能把筆書無疆㕘領鄭馥年六十二紫禁回翔羣叟黄樽浥注天漿四海覃敷徳徧九霄共樂春長尺五人依列職大千臣與榮光遥稔野歌熙皥豈惟廷効賡颺㕘領富倫泰年六十二我帝命溥將養老廓古憲曰維時郅隆人瑞多耆獻上者系天潢下亦及絳縣我帝顧而怡溫綸普垂眷飲以玉色醴饗以内法膳隆禮繼前典是日千叟宴恩深數倍多樗質臣俱殿榮幸知何如萬載不多見年年願際此詘彼喬與羡㕘領常寧年六十二花長春山萬夀蓬瀛圖畫開晴晝微臣列衛依仙囿臣叨直圓明園共被恩華太液波欣承嘉宴鈞臺奏古稀天子申洪釐天家慶羡當昌期新韶六日大和㑹衣冠杖履咸恬熙盛事史書都未有重光兩舉欽高厚漫誇三萬六千齡章蔀紀元同悠久夀算真須命𨽻首嵩呼濟濟三千叟㕘領覺羅薩炳阿年六十二敦葦承天恩蓼蕭奉嘉讌玉律調春臺矞雲覆芳甸衢樽長共浥鳩杖欣殊眷錫福慶無疆欽與羣黎徧㕘領那爾善年六十一羲皇策衍天地數五中宫河洛環而周萬有一千甲子譜伏惟古稀聖天地合其數敷錫大小臣僕越及衛士一一納之仁夀宇堯尊舜甕咸涵醹稽首奉玉陛臣昔備旗鼓琱弓繡弧仰禀聖武轉戰百二十有五次幕府上功簿臣曽三次出兵接仗百二十五次屢得功牌賞銀天家錫賚承便蕃銀鏐雪色耀華組荏苒綺甲週老馬踠足無寸補豈知耆年㑹依光侍尊爼請奏夀人曲仰叶含哺鼓腹康衢舞㕘領巴雅爾年六十一萬夀瓊筵閶闔開耆年羣幸到蓬萊承恩共景熙朝福供職殊慚武庫材虎帳風清環羽衛鳯墀春滿布尊罍笙歌更聽鈞天奏瑞氣還應上斗台㕘領佛保住年六十一獻歳春初麗開筵日正長叨塵三品秩預捧萬年觴袖挹爐烟藹尊浮瀣露香願瞻仁夀鏡長此頌無疆㕘領閔獲春年六十一歡聞温詔下丹除曠典隆儀邁古初離照朗周耆艾福巽風廣被綺筵舒幸逢萬古文明盛曾備三驅武力餘珠䍐星旄雄列障琱弓畫㦸效隨車虞廷鸑鷟真咸若周囿麒麟得所於北極瑶光輝寳樹南山翠色䕶宸居頓忘桞質因霜悴長矢葵心向日紓何幸九天承寵渥太平民物到華胥㕘領脱吉納年六十卿雲糺縵綺霞開行慶恩從上日來飲饋道欣超燕禮帣鞲人共到春臺策名憶賦從軍樂錫福長逢獻夀盃臣在班中年最少幸週花甲醉蓬萊㕘領闗保住年六十乾健而運厥體至剛貞元四徳往復周行仰惟一人大道溥將年豐人夀俗敦化厖既洽郅理闡藴孔彰無息不息厥分誠明聖合天徳夀與天長釀為吉雲醖為霞漿滲漉九土啿啿昌昌式啟嘉宴用襲衍祥㕘領觀音保年六十仁者樂山而夀聖人大徳曰生鶼鰈南東洊至鳯麟郊藪畢呈天地本乎恒久福祉備以道亨六膳拜嘉何幸巻阿詩願載賡㕘領成徳年六十絲綸溫語紀恩隆盛事稱觴徧百工虎衛今欣陪綺席龍旗舊憶拓雕弓騶虞化洽仁風溥鳴鹿聲和瑞露融此日耆英齊抃舞葵心長向五雲中㕘領扎魯岱年六十雉膏占鼎養鶴算慶同徵黼扆千齡㑹珍符萬福凝衢尊環海酌盤露向天承恩似長春渥年隨時憲増普天依浩蕩亘古頌升恒虎拜同叨慶歡心矢服膺㕘領尚維塤年六十盛典重逢慶自今小臣何以效葵忱身慙薄質程材劣運際中天戴徳深瑞荷一人躋夀宇春融四海見天心惟期耄耋偕羣叟長聼南薰舜殿琴一太和祥靄繞瓊筵春殿晨趨集衆仙虎拜九重齊祝萬鳩扶五色倍盈千春臺樂共靈臺詠南極輝依北極懸更是龍光凝湛露醍醐沾溉及垓埏二㕘領集成年六十維清緝熙天子萬年照臨下土四方于宣錫爾純嘏有命自天春日載陽其車三千黄髪台背序賔以賢三夀作朋釃酒有藇既載清酤天子所予笙磬同音簫管備舉肴核維旅維筐及筥于胥樂兮有秩斯祜小大稽首福禄來為飲酒樂豈莫不令儀為龍為光夀考維祺昊天有成命聖敬日躋率由舊章嘉賔式燕又思集詩經原任㕘領明圖年八十六重豆飲鄉賓省醴差國老尚齒肇有虞曲臺足稽考我朝氣敦厖曼夀錫蒼昊詔徵千叟讌樂愷符周鎬微臣覯熙洽邀恩弱齡早日食太倉粟鼓腹慙素飽至今榆景延悉荷鴻慈造作歌效康衢作詩續天保原任㕘領庫北年八十一和風麗日藹春臺五色雲承閶闔開耆叟三千齊拜舞繁禧錫自帝廷來一年年長日愛韶陽自喜年華九九長竊禄依依趨禁衛願年年獻萬年觴二原任㕘領英泰年八十昌符際熙洽天瑞承便蕃八柄以馭福敷錫欽至尊耆筵令日啟霑沃逮虎賁少歳幸通籍頍弁參戎幡仰禀神武律北幕西崑崙百戰厯晝夜歸叨凱宴恩勾陳環衛列左右依金根臣依圍三十二次自從賜閒後曝背迎朝暾樗年啟八秩淑氣調三元延齡玉節杖駐景椒花罇願陳既醉頌華祝何足論原任㕘領蘇成額年七十七元紀龍飛五十年古稀天子徳如天車書一統皇圗逺日月䨇輪夀鏡懸制作聿新周禮樂平成増擴禹山川太和翔洽多人瑞鸞鶴紛紜集綺筵原任㕘領白靈阿年七十二瑞莢迓昌辰綵旭麗韶景九重湑宴開授几朝儀整法醖注宫壺芳肴積瑶皿微臣曾荷殳乞閒安里井回思四十年素餐殷内省忽來蓬山遊瑶圖豁真境鳩杖快扶將逐隊奉朝請皓首荷殊遭寸忱託葵影願祝聖夀洪嵩呼迭引領星光耀南極丙位長冏冏原任㕘領周宗文年六十五鴈仗魚旃昔忝鈎陳儀衛頻依效悃齒逾花甲綴班恩被紫微玉醴載欣霑飫御烟慶引芬霏樗散仰邀鴻造葵傾喜戴徳輝原任㕘領文彦年六十三南極一星明四海應夀昌聖人久道垂衣裳耆臣備列鵷鷺行嘉宴千叟流霞觴引年繩武宣重光九拜秩秩萬舞洋洋鏡圓仁夀花吉祥雲橑芝宇輝煌煌大樂既合大禮肅將帝曰予兹受祜膺天慶及爾臣僚錫嘏是常臣昔掌印務丹砂願得延夀方望秋蒲栁迎青陽身退猶蒙恩澤滂得侍金華宴曝背知春長原任㕘領常徳年六十一皇仁御寳宇四海安亭育雨露洽馮生奕禩䝉禔福維昔有夀宴欣衍依祁祝推恩載繩祖欽兹復敦復山呼齊曰萬歳始辰啟六恢以三千人瑞氣靄黄屋擎觴九拜中慈惠寛祗肅恩賜延洪庥瞻言韶景淑火器營翼長文徳年六十六雷霆輥耀天光赩威練炎融超古昔軍儲嚴密列隊雄櫜鞬慎守臣之職年年秋獮期上蘭勤訓飭玉露及金風紫塞扈清蹕岡巒蔚鬱靈囿開敬奉魚麗兼鸛翼太平熙洽憶萬年聖仁豢養隨珠勒獻歳春風和欣逢嘉宴錫昌朝多瑞人環樞光轉翊南極一星夀㝢長離明積照恢文徳笙簧酒醴淑氣孚湛露恩深感何極委翼長喀巴年六十一熙熙春臺積和煦萬方祺夀同歌舞愚臣一介羽林星祝頌曾聞九如語憶昨天聲揚逺陲身經百戰荷戈隨臣曾打仗一百八次微勞累積雲騎尉臣議叙功牌功牌賞給雲騎尉仍剰四策勲慙未搴將旗歸來飲至趨華殿拜捧朱提輝繡段臣忝入凱宴得緞六銀百兩光榮不敢説衰年今日䝉恩錫嘉讌長筵鵷鷺與貔貅昇平歳月總優游西極蒲梢服天皁玉禾飽饜崑崙邱健鋭營翼長舒臣年六十宫雲絢曉漏沉虯簪笏聨行待殿頭勁旅毎承天語奨衰年更荷主恩優鑾輿扈蹕弓開韘雁磧銷兵劍脱鈎時節太平人夀凱九垓長此慶金甌園圓明營總伊常阿年六十承恩歌舜日叨宴列堯階萬國衣冠㑹千官羽仗排青陽暄物態皓首荷宸懐幸預稱觴末春風鳯管諧園圓明營總竒成額年六十二寵詔優耆耋堯厨錫賚均賁逢需宴日俱是泰亨人早歳從軍樂微功獲賞頻臣曾出兵打仗十九次殺賊六人得功牌二壯心隨綺甲華髪慶元辰綵縷宫縑錫芳軒禁臠陳千行同祝嘏萬象普回春瑞露凝朱草祥雲䕶紫綸共欣仁夀宇星萃燦龍麟園圓明營總二逹色年六十二鳯紀昌期應鴻圖瑞景融葵傾當旭旦椿祝應和風夀㝢恩齊被耆筵典更隆微臣叨彩衛隨仗效呼嵩園圓明營總薩爾圖年六十一九門閶闔開綵旭曈曨曙玉醴飫瓊筵恩膏溥湛露億姓騰歡謠八紘咸暢泝古稀聖日新健行協天祜耆艾獲均霑千載此一遇小臣樗櫟材執策隨輦路何幸沐榮光蒲柳依温煦欣瞻萬福皆拜伏聆韶頀園圓明營總那顔年六十天家慶被萬方覃熙宇春生淑景涵福衍九疇敷用五燕開千叟數涵三仙園夀鏡依光近紫禁長筵酌醴甘環衛清街忻奉職仰瞻珠曜麗弧南園圓明營長三逹色年七十五蓬萊佳氣入春妍糺縵卿雲捧御筵曼夀佛開千佛㑹老人星焕五星聨龍飛策衍乾元數魚藻詩傳愷樂篇稱彼兕觥齊獻祝拜來螭陛擬登仙兵蘭幸長勾陳列嚴衛親依禁籞前身傍璇霄琪樹璨光含仁鏡寳華懸幾重山翠圓名嶠第一春波玉瀉泉偏喜周廬環福地况承嘉宴奏鈞天原任水師協鎮彞靈阿年六十八於皇受命贊化育敬天天畀無疆福鳯紀書年大衍符五世一堂膺茀禄嵗惟乙巳月建寅廣播恩綸逮羣牧垂紳委珮集高年拜舞彤墀膏露沐臣昔分營𨽻水師艨艟組練揚旗纛聖朝威徳播逺方天吳陽侯均飭服但承英簜攝鯤鯷不藉干鋣截鴻鵠恭承異數朝闕廷擊壤謳歌聞鼓腹於萬斯年樂未央長欣東海添籌屋原任協領七保年六十五大圓鏡内敷仁夀浩蕩同登熙世春俾爾艾耆欽聖賜于焉愷樂徧臣隣乾符洵自包河洛人瑞由來勝鳯麟幸𨽻羽林供協贊天家懋典仰璘彬原任鳯凰城守尉潭保年七十九金甌式鞏寳籙長延曰夀曰樂如山如川氣調鐘籥祥昭日躔詔褒衆叟恩覃八埏俾沾仙醖載飫瑶筵小臣食禄垂六十年搴旗擐甲莫效微涓感深挾纊澤被無邊載拜蹈舞聖夀符天原任岫岩城守尉剛泰年七十星拱龎眉列觚稜郁曙㬢臣年符絳老化㝢協春祺綏萬書膏飫論千集夀耆從來沙比算况際日重熙式宴羣仙接依光小草知滇雲曾荷㦸洱海憶搴旗並㸃干城責欣逢偃伯時班齊馮翊尉鑰忝岫岩司山海輸華祝臣前任岫岩城守尉為山海要區雲天荷聖慈願從㲈奏裏敬上萬年卮太原城守尉永明年六十一珠囊期泰寳籙運隆莢榮堯日徽譜舜風耆英集闕台耉呼嵩無疆介祉久道延洪引年鉅典式宴禮隆長筵晝啟瑞旭春融幸陪曲宴預祝華封如川方至如日再中八埏額慶四海來同王府長史明禄年七十七大鈞覆物澤遍邇遐臣猥弱質游泳聖涯入忝榮秩出乘戎車臣曾出兵一次逮兹華髪稽首拜嘉湛湛仙馞妍妍日華皇慈茂蔚賚及臣家朱提燦雪紫綺流霞敬依華闕嵩祝有加王府長史烏龍阿年七十六鳯城雲景接蓬萊佳氣葱蘢夀㝢開末秩叨隨藩府後餘齡欣接御筵來瓊堦啟曙光分座玉盞浮春暖潑醅杖餙仙鳩分隊集錦標瑞鶴共齎回祥徵五世昌辰萃算倍三千福履該飽徳幸承天賜渥小臣何以答涓埃王府長史博爾明阿年七十三辰麗霄漢九野輝璇璣始和春陽映際曉湛露霏皇仁洽區域鼎養萃耄耆蘭肴設芬馥玉醴揚甘馡鉅典擴瀛海異數昭雲逵盛朝億萬載愷澤隆前規微臣荷陶植長養依祥輝載拜輸丹悃聖福逾軒羲王府長史五十九年七十瑶林小草粲春葩雨露霑濡未有涯蹌濟簮纓隨鶴列同來天上酌流霞一龍樓向曉吉雲開親見天天顔有喜來聖夀萬年綏五福康衢謡已徧埏垓二王府長史永安年六十九紫禁瓊筵啟和羮錫上方瞻雲開雉尾近日荷龍光養性鳩扶杖為儀鷺序行萬年欽法祖盛典邁羲皇王府長史㽞住年六十八文昌鬱雲興昊天降豐澤垂慶惠皇家慶泰欲重疊風動萬年枝流雲靄青闕列宿正參差神仙排雲出舒文廣國華芳風被鄉耋金樽盈清醑列坐金殿側竒齡邁五龍瑶草正翕赩泠泠祥風過吹萬羣方悦集文選句王府長史舒林年六十六仁夀覃敷頌聲蔚作屋紀蓬瀛籌銜瑞鶴龍墀錫宴耆頤愷樂昊天祐命歳啟璿籥聖人無逸日强奉若臣昔隨班肄圍景爍行殿秋風屯煙萬幕仰見神弓飲羽拂鍔習勞講武煒煌謨畧今兹良辰叨侍飫酌緯席拜跪禮容三爵祥光俯照起衰矍鑠顧咏恩私葵忱雀躍王府長史侉色年六十六律轉兮東風春來天上蓬萊宫尋常杖履不可到此日欣隨庶老同呼嵩九英梅獻嵗六葉蓂開砌幾番風信試燈前雪晴鳷鵲韶光霽含黄柳色映青旗班白人來覲紫闈誰到鈞天聆廣樂仰見瑶閶詄蕩爐香馣馤而霏微聖祖錫百福華筵歌夀愷六十餘年更見今熙重洽累康寰海靈臺偃伯焕文明匡敇幾宜百度貞肇建辟雍躬釋尊先開廣内㑹耆英吾皇纘述光前緒舊典以時重修舉臣沐恩深録棄瑕臣前任内管領革職䝉恩録用厠身重簉鴛鸞侣中和奏九㲈禹膳飫分調玉肪寳餌生不知其味雲漿斗酌英瓊瑶衎衎飽徳兼醉酒番番台背與黄耉羣向堯階拜稽首敬上聖主如天萬萬夀王府長史富代年六十一紫殿巍峩敞帝居綺筵黄髪遍階除廣延東璧西球瑞逺軼金䋲玉檢書復旦星雲賡八伯敷天粟帛捧千廬春歌湛露霑豐草蓂莢剛添六葉初頭等䕶衛福僧額年七十九聖夀越萬紀國慶開億年天五與地十璧合復珠聨恭逢上章庚萬夀夀同天厥歳紀在五五緯昭辰躔越兹旃䝉乙鳯紀十曜宣聖齡粤躋五五位剛乘乾敬惟五與十天地同方圓今歳際五十泰運天之先古稀晋五福介福増如川黄帝製甲子嘉祥詎同駢刪書斷唐堯未聞幾此焉四海萃百齡錫宴盈三千敬繹五十紀上貢苞符篇頭等䕶衛巫靈阿年七十八鴻化允迪福緒日溶景緯協紀八風循通嘉㑹黄耉錫宴斯隆仰䋲祖武俯洽臣工一穆穆天容時和則樂祁祁羣老修儀則恪備禮曰豐恩溥六幕蘭肴孔馨醇醴命釂二柏受甘露古有瑞徵光兹誼軌騐彼祥經若操圓桴響應于聲延禔萃祉岳曜川増三頭等䕶衛阿爾遜布年七十五綺筵肆啟簇春盤綵仗風和候玉鑾集慶一堂開五世延洪萬夀宴千官明光執㦸承恩渥僚寀稱觥洽衆歡忭喜耆齡逢盛事扶鳩蹌濟列朝端頭等䕶衛闗保年七十五龎眉皓首慶喬年捧爵欣依御仗前天子康强人樂夀宜春苑裏敞雕筵一南極新杓指夀星春先十日到彤庭太平景象舒醽醁長祝天祺萬萬齡二頭等䕶衛富倫年七十二惟春伊始惟日正中開仁夀鏡扇長養風四方和㑹萬福攸同祥先蟄啟户闢昆蟲周甲逾紀含煦淳龎際兹嘉㑹浹㝢延洪期開剪勝典洽呼嵩萌勾折甲小草蘢葱羣依若木化日沖融敬獻葵祝人夀年豐頭等䕶衛四格年七十二玉陛春風靄銅鉦曙色明崇年開廣宴上日㑹耆英鵷鷺霑優賚韶韺奏慶成承恩綴蘭錡拜舞竭微誠頭等䕶衛阿肅庫年七十一新陽獻初歳良卜月在寅吉日人日前和氣凝紫宸芝葢天中央釦砌羅臣民鮐耆頌至德珠璧聨光匀神漿挹沆瀣寳露沾玢璘優游太平世嵗沐皇家仁喬齡列雷宴邃古誠罕倫頭等䕶衛石逹色年七十二聖人之夀昊天所右度越六帝維徳之茂聖人之阼大衍既裕象所不知而況滋數聖人之福瓞綿慶篤曾元來晜億載詒穀聖人之文昭漢麗雲戒為堯焕歌為舜薫聖人之武大啟疆土懐凖柔回金川編户聖人之世日月開霽民安樂康物無疵厲治至聖人飲醴歠醇五帝之夏三皇之春乾闡其符坤流其珍山出器車藪游鳯麟用錫眉夀燕洽臣鄰願億萬年長如兹晨頭等䕶衛阿三年七十一紫極高垂拱華封工致辭聖人敷福夀五代開金枝濟濟鴛鷺行青青松柏姿時維孟陬吉錫福歡瑶墀玉琯吹黍律金支颺鸞旗鴻運積元㑹愷樂頌雍熙小臣濫榮秩欣言捧瓊卮階下三千人同傾藿與葵頭等䕶衛武通保年七十一繽紛華髪集丹墀龍紀旃䝉五度時上日六晨云卜吉作朋三夀用為儀班依䕶衛惟循分圖入耆英喜捧卮北闕湛恩漸被廣老人星燦拱南離頭等䕶衛烏雲保年七十一盛典優耆耉齋心嘏協純衢原同飲醴臺許盡登春涵演重熙久中和六氣均鴻儀光郅治優渥逮微臣頭等獲衛阿爾法年七十開夀㝢啟長筵斂育敷錫引大年聖皇曼夀仁如天恩如春陽溥無邊黄髪台背拜手稽首申祝䖍鴻鈞恢雨露覃施及垓埏無生不育靡性不遂詎論山陬及海壖況當和風生律琯回春妍珠嚢寳鏡萬載懸皤皤之臣盈三千率隨鵷鶴列齊奏擊壤康衢篇頭等獲衛京文泰年七十薄海遵皇路鴻模仰化成堯尊欣再設軒甕慶長盈六日華筵啟千班瑞靄明春隨眉夀集嘉氣滿蓬瀛頭等䕶衛七明年六十八耆筵冠盖盡仙班法曲鈞韶霄漢間日麗風和春盎盎童顔拜舞覲天顔一瓊漿仙瀣勝醍醐拱極星文戴斗樞長夀幢邉雲五色萬年天子渥乾符二頭等䕶衛巴格年六十八三陽開旭景千叟拜彤闈地近卿雲爛恩深湛露霏荷戈慙駑蹇列坐有光輝試㸔南弧瑞朝來映紫微頭等䕶衛曽生年六十七曈曨曉旭觚稜起瑞氣霏微曙雲紫南極珠聨拱北垣長筵正設明光裏聖主龍飛五十春湛恩廣被光風辰峩冠列坐皆國老扶杖再拜多耆民次第盃盈上尊酒郁芬几溢天厨珍香山洛社何須擬鎬宴汾歌未足陳盛事古今真莫並樗材得逮尤深幸萬年琪樹鬰枝柯栁宿分光依玉井渥澤霑來霄漢濃爐煙滿䄂靄春風承華久備櫜鞬列奉爵歡歌鵷鷺同頭等䕶衛佛保年六十七春奉弧南列宿曉隨羽衛金門萬國被鸞文錦通衢飫鳯凰罇耆夀惟皇所鍚謳歌曰帝之恩華髪從容賜爵龍光遹徧乾坤頭等䕶衛費揚阿年六十六龍飛五十春連衢歌帝力萬歳效嵩呼千叟分鵠立鍚宴笙簧宣拜手欣就列輝煌張慶筵時維孟春吉天閶北闕高玉律東風入歡隨耆艾倫微分驚殊溢禹膳甘以腴堯樽香有飶歛鍚福自天太平長此日舞羽三階前恩波浩何極頭等䕶衛永安年六十六初頒鳯紀歳華新六莢開蓂應吉辰玉陛筵階瀛海樂禹糧堯韭總含春一久膺冠組沐恩波列預三千福夀多五色雲開添絳氣華堂芝彩玉山禾頭等䕶衛恩特合莫年六十六衢尊酌元氣萬物開繁昌至徳被海隅宙合皆福祥舉世登春臺鶴算慶浩穰初和逄盛典式宴齊鵷行藻魚邁鎬飲酌兕逾豳堂辰輝拱帝座南極煒以煌跪捧百福卮祝帝増夀康頭等䕶衛三布年六十六四代盛王聞尚齒虞燕夏饗殷食禮周人修而兼用之米廪膠庠傳議擬國老庶老數莫紀三五之説後所倚豈如聖皇億萬春春風赴闕三千人飲以甘醪飫以珍貴爵重齒手賜醇堂亷一體臨臣民聖皇古稀夀晉五國慶同天天所祜巽命重申繼祖武史䇿前聞軼萬古臣聆廣樂到鈞天欣預彤堦八百筵敷天粟帛同飽煖身在重熙累洽年頭等䕶衛西拉布年六十六校藝深慚未出羣榮邀帝賚挹祥雰層霄福與濃膏被秘殿筵偕旭景分典緝重熙鳩列杖慶延五葉瓞垂棻蓬壺佳氣春無量萬象迎韶傍紫雲頭等䕶衛白達色年六十五聖徳範太和垓埏合泝暢華髪䝉庥祥寵禄自天貺嵩呼壌祝萬國貢微忱鳯舞鸞歌至治歸訢鬯載稽徃籍昔未有鶴侣三千鍚宴依瓊仗和風初鼔舞春日正怡愉惟歌日升月恒頌不藉金泥玉檢書更效李冲上千萬歳夀祥麐神雀常見聖皇都頭等䕶衛新普年六十五鳯城丹詔聴頒酺令典欣占惠有孚春滿千筵人矍鑠祥開䨇闕澤覃敷螭頭瑞洽龍顔喜鮐背歡騰鷺序趨列坐盡叨靈夀杖行杯更飫大官厨六旬算衍榮縑帛卌載恩承飽俸糈臣食俸四十二年化日舒長純嘏茂正聞歌頌徧康衢頭等䕶衛海㑹年六十四彤雲擁日麗層霄嘉㑹雍容典懋昭寶鼎祥氛凝斗極盈階仙珮肅官僚中厨萐脯徴堯瑞編琯笙簧叶舜韶臚愊羾歡齊拜舞萬年玉燭慶長調頭等䕶衛孫榮年六十三貞符值嘉㑹帝徳邁軒羲自天鍚綺宴雲開五色芝㤗運徴久道寅月布春祺星垣列羣耉輦轂萃衆耆逺及薄海外趨走依堦墀鳯紀億千春拜跪祝迓釐天地共氤氲佳氣盎若斯榮華被六合景爍瞻光儀頭等䕶衛塞得喜年六十三福錫庶民㑹隆佳節緲緲祥雲霏霏絳雪春殿生温天厨孔潔碧眼方瞳期羡在列小臣卑陋幸從耄耋珍秘駢蕃醍醐清洌式歌且舞雲中䨇闕頭等䕶衛富蘭保年六十三元旦恩推紫極六辰宴錫彤闈虎旅銀牌耀雪耆民錦匹添緋列宿三千拱斗天顔咫尺瞻威小臣榮叨春爵羣依蕩蕩巍巍頭等䕶衛阿克敦年六十三卿雲糺縵日光華南極星輝拱帝車聖代引年多異數宫壺拜賜逮千家一輇材何幸得追陪玉液恭擎介夀杯扶杖相㸔増矍鑠萬年天子賜酺來二頭等䕶衛文寶年六十三三辰麗八風調東方祥風風首條明庶物運七杓乾坤清寜萬象昭景運溢中天蒼凉霽日上九霄詔開閶闔延佺喬三千蔑不周醇醪逺逮廣莫繽紛恩膏慶依虞陛聴簫韶八風體頭等䕶衛胡林年六十二華髪瞻文陛春風入夀卮一人膺曼福千叟祝洪釐愷宴騰鳬藻鈞韶協鳳儀趨蹌偕衛士撃壤效陳詞頭等䕶衛明玉年六十一鶴髪垂肩鷺序分御香春殿繞氤氲從教下乘仙班末一様敷茵列五雲一元正閶闔麗祥輝晴旭葱蘢焕紫微長頌升恒遒百禄乾符坤寶擁瓊闈二頭等䕶衛鶴青年六十柏葉瓊卮泛梅花玉砌繁共瞻卿月座齊拱夀星垣福衍千人算祥徴五世孫微臣䖍頌禱週甲荷鴻恩欽定千叟宴詩巻六
