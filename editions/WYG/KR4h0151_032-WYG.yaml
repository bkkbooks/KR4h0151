body:
  text: 巻二十七預宴一百十一人詩一百三十一首馬甲愛新年九十閶闔詄蕩春雲浮丹墀蹌濟杖拄鳩自宗藩百僚庻士逮農襏襫兵兠鍪各以齒序列左右華首稽拜百禄遒有生生值熙皥世沐浴至澤華胥遊櫜弓囊矢秣驊騮久𨽻戎伍稱貔貅州來將兵何矍鑠武公抑戒何勤修等九十耳偏自喜侍宴秘殿誰能儔古有此年無此遇萬萬嵗慶恩滂流馬甲强兒年九十暖律勻調叶瑞徴敷天樂氣共霞蒸在公鱗集惠元吉列隊鳬趨壽作朋賜果嘗遵禮懐核當階拜許老扶藤戎行尤沐醲膏渥綺甲周逢卅載増馬甲八十年九十六日春開瑞氣新堂簾嘉㑹撰良辰身同絳老能言甲細數韶華九十春一什伍編中過耄耋三千人裏列觴壺彎弓調馬風雲壯天上筵開夢想無二馬甲八十七年八十六再拜奏北闕煌煌一統業上天佑仁聖養老霑微秩和氣扇大爐蓬壺仙聖宅飛觀崢嶸天宇寛金鼎養丹暾海日瀛海日月淵天地大如許人人遣長生皇祖聖謨髙萬古鳯舞鸞歌宴蘂宫詎須更覔安期翁隆寛荷聖時五雲出瓢中廣殿羅仙官侍宴跨青鸞律吕諧鸞鳯竒葅映玉盤一日可敵千年壽錯被人呼作地仙稽首餐芝英未嘗一事横胸次淳風還復羲皇初虙羲至今三十餘萬歲仙班最近玉爐香近臣上壽天顔喜日精月華鍊陰陽香獸煙濃刻漏長六十七十已為壽玉京清都奉紫皇三千同徳士笙鶴來翩翩詩句帶花香錦囊三千篇手扶仙人綠玉杖雙鬢皤然氣浩然集陸游句馬甲舒敏年八十六錦旭麗雙闕彩雲翔萬山壽域齒為籙仙墀眉作班沛澤歲書首飲和春駐顔慶典盛超古玉巵榮特頒仄起體馬甲額爾登額年八十五乾清晨啟都福之庭一人曼壽萬宇怡寧追松軼喬奉萐依蓂春敷闓豫宴錫甘馨日臨甲乙躔耀丙丁辰垣景赤華闥雲青臚歡垓極繡野文坰馬甲李萬保年八十五同和聞壤曲共酌洽衢尊何幸需雲宴還叨湛露恩時雍聨頖璧國慶萃蘭蓀韶景仙壺永天光布霽温馬甲松太年八十五前驅隊詎習鈐韜豢養年深慶戢櫜猶記天戈西指日千山苜蓿馬騰槽一吉雲蓊布現蓬萊扶杖人人拜賜來帝徳如天澤如海春風何處不春臺二馬甲葉仲良年八十五聖代人多壽陽和遍九垓頒恩欣澤普錫福自天來典紹前光舉筵循尚齒開庥嘉徴化宇煦育勝春臺巵泛芳醪滿壺聆晝漏催櫜弓欽帝徳什伍亦銜杯馬甲黒逹塞年八十五聖世陽和日臣民樂拜嘉引年春泛盎洽喜歲芳華雨露誠加渥喬佺未足誇百男與三壽盛事屬天家馬甲唐進孝年八十四曠典列長筵期羡各鳬藻赳桓預斯選拜舞瞻穹昊彀發長楊弓閑佶飛黄皁疇昔賦采薇兹辰頌天保雍容示兹恵勁旅古所少聖朝豢養深用壯安其老馬甲朱爾柰年八十四舜陛耆年集祥增瑞靄融龍躔三祝進虎拜萬方同斚汎金漿馥盤羅玉饌豐多珍恩賚渥舞蹈樂春風馬甲克䝉額年八十四玉殿耆英咸集捧觴臚拜聖人乾符方啟大衍需宴共荷鴻鈞黼黻雲霞交麗壺觴雨露益新萬年歌我帝徳宙合漙慶長春馬甲趙和尚年八十四禁林春靄露華濃皓首來聽鳯闕鐘壽籙簽名天上詔雲璈張宴奏笙鏞一細栁當時效執戈八旬倐又數年過廿年前記武成宴太液池邊聽凱歌二馬甲存住年八十四巽申綸綍敷春澤需宴雲天法舊章序接三元韶景麗宴開千叟湛恩洋九成共聽簫韶奏六葉初看蓂莢芳鶴髪鵷行齊獻頌捧巵亦得逮戎行馬甲楊昌年八十三濊澤敷霮䨴方春遍化宇頤和壽人多戢戢徧營伍國家兵制邁前古訓練精詳勵熊虎勁弓長箭一敵百人人願作巴圖魯每當表禡出師時率先自奮争鼓舞曼珠舊俗識尊親天子威稜自神武臣壯不如人老乃䝉恩煦扶杖歌捧觴舞千叟筵開日正午馬甲八格年八十四尚齒筵開列錦筃人間天上見聞新三千叟致稱觥祝合慶皇躬萬萬春一紫閣圖形唱凱旋霞觴飲至勝羣仙太平億載耆年㑹乂奏雲璈和五絃二馬甲夏起宗年八十三聖世耆筵集嘉祥入歳來春先一旬至日以上辰開仁夀懸金鏡恩榮舉玉罍䕫龍同拜舞櫜鞬獲趨陪馬甲舒魯年八十三丹闕祥光徧布春臺春日同登九重大開酺宴億兆長衍雲仍玉斚瓊漿式飲華筵麟脯于升一人用敷慶典拜賜萬國歡騰馬甲周邦彦年八十三觚稜瑞色布瀛寰春盎彤廷霽聖顔浩蕩鴻慈常格外雍容燕禮慶雲間庸材樗櫟耆年選珍醖醍醐内府頒簪紱叨陪榮虎旅櫜鞬途分厠鵷班蓂階耄耋華顛集蘭殿㑹元玉葉環共喜瓊筵開夀㝢蓬山佳㑹頌南山馬甲曹鳯年八十三三十𨽻驃姚從征鴈磧外旅振龍飛年臣出北路兵一次于乾隆元年撤回名挂馬甲隊荏苒五十春歌謳太平代乞閒曝南榮有夢遶北塞賦糈長年多入燕隆恩逮沆瀣酌瓊卮翹首慶雲靄馬甲張成受年八十三旭景中天麗三千集燕毛紫芝心貌古黄鶴嵗年高地迥新扶杖營連舊佩刀拜恩彌慶幸鈞奏聴雲璈馬甲阿巴里年八十三履端布恩詔暢垓宣惠風雍容千叟㑹貴賤同帡幪臣本介胄士幸躡籛偓蹤醽醁飲長生况挹露湑濃金甌永寜謐高廪長綏豐請上萬年頌樂􅄎春熙融馬甲禄隆福年八十三聖世優耆老加珍出尚方千秋殊典渥三爵寶筵張閶闔宣鈞樂烟煴藹御香壯年儕虎旅此日荷龍光湛露榮逾分需雲樂勝常萬方叨錫福同慶夀而康馬甲達薩年八十三玉衡貞孟陬東風初入律拜恩近元朝翦勝開人日諏吉啟法筵我皇隆繼述三夀乃作朋七校列坐宻銀幣賜尚方吹笙復鼓瑟請誦天保詩徧徳民之質馬甲額里庫年八十三柏露含膏闓澤新延洪帝祉自天申太平錫福寰瀛洽熙皥長遊化宇春一師行轡沃吉行良鴈磧龍庭蹀躞場此日彤墀歌既醉春風更試紫游繮二馬甲額林勒年八十三聖夀踰古稀康强受天祜至健法乾行鴻慈繩祖武歛福彌錫福春祺遍寰㝢耆台萃嘉宴醉飽式歌舞襏襫亦登筵介胄還預伍不以爵以年夀㝢信公溥馬甲靳五十四年八十三億萬年開大衍初十行詔布景風舒旋承禹膳頒三爵長戴堯天頌九如一西賮東琛輯帝畿老人星現倍光輝戎行猶憶開嘉宴幾度櫜戈奏凱歸馬甲夏湖年八十二玉殿啟瓊筵祥光靄雲牖詔進耆年人升階酌醴酒三千黄髪朋臺省逮林藪長年今皤皤壯氣昔赳赳老記少時事樽罍易刁斗湛恩滲漉長懋典古未有馬甲達松阿年八十二聖世八垓登夀㝢太和溯洽見風淳特張廣宴優黄髪遍集耆年侍紫宸三爵禮成真邁古五辛盤薦恰當春日臨黄道輝卿矞筵列彤墀燦佩紳獻瑞醴泉流琖馥承恩萐莆出㕑新福庭敷錫咸懽忭虎拜扈趨浩蕩春馬甲六十兒年八十二欣逢仁夀世共煦九衢春華首環南極龎眉拱北辰肆筵排雁列扶杖刻鳩新拜賜歌天保恩滂雨露均馬甲四格年八十二芳宴欣聞巽命嘉祥合獻乾符龍笙協夀人曲雀躍羅王㑹圖坐接角亢躔次身遊霄漢蓬壺三千鶴髪稱祝億齡闓澍覃敷馬甲王廷柱年八十二韶景開瓊籥晨光羽仗齊盍簪台背列聨珮玉階躋露液霑恩讌雲章焕御題葵忱勤獻頌黼扆懋凝禔馬甲䨇全年八十二五紀開龍躔時和調玉燭長筵列鯢鮐末坐列鞬箙鏐幣有差等齒爵以次屬仙樂奏韶鈞醇醴芳甘沃籌添萬億饒桃屆三千熟時春凾大同徳基翕諸福馬甲􅎲住兒年八十二南極星輝斗柄東祥開夀㝢萬方同舒長化日瞻天近汪濊恩波被澤融聨綴玉階惟獻曝依光黼座效呼嵩兼珍幸飫仙厨味身在蓬萊閬嶠中馬甲保金年八十一三春開甲殿百禮頌壬林爵立杯銜玉鳩飛杖撰金鸎花韶景盎魚藻湛恩深執㦸依堯陛千齡進雉斟馬甲郭保年八十一六㝢㤗階平芳序調温淑聖人重引年行慶敷五福吉日開華筵珮玉鵷班肅珍饌欣分甘兕觥泛醽醁同歡率土騰純嘏萬年卜欣歌在鎬章擬和虞韶曲馬甲蘓靈阿年八十一北指旌旗奏凱還臣出北路兵一次長年賦粟臥戈間金漿㶑灔彤階飲玉杖扶攜紫禁頒兩樹寳旛齊引領九重釦砌竟容攀期佺彭羡皆為侣耒耜弓刀亦共班春滿共欣腰脚健心歡未覺髩毛斑椿榮桃實天邉種雨露饒還到草菅馬甲二達塞年八十一聖澤優耆耋彤廷式宴初崇儀叨授几嘉㑹喜聫􅅂慶洽歌衢叟懽同在藻魚泰階多瑞靄暨被徧扶輿馬甲常泰年八十一綴班蘭錡憶從軍赫矣天威覩筞勲沐澤仍偕貔虎隊登筵乂列鳯鸞羣珍分玉膳中厨出錦織龍紋内府分駑馬方慙無報稱瞻天何幸籋青雲馬甲阿哈年八十一醲化臻熙洽春祺重引年雍雍臚庶老秩秩敞珍筵合殿光迎旭芳樽錫自天欣隨麟鳯侣儀舞玉階前馬甲䨇保年八十一翠釡氷盤玉饌鮮雲璈吹徹九重天彎弧也預扶鳩伴要祝君王夀萬年一福衍箕疇景運昌廣筵開處藹韶光微臣親飫瑶尊醴不數簞醪河水香二馬甲八十四年八十一宙合皇威播身忘部曲微前驅雲叠棧飲至錦裁衣席布丹霄迥杯承玉醴馡又逄期羡㑹鶴髪沐恩輝馬甲林宏勲年八十星雲爛日月光天地繁㑹百寶昌我皇乾健行不息直合京垓億兆延綏康恩膏廣沛謨洋洋用紹祖武耆筵張皤皤者黄髪嵩呼舞蹈相扶將微材叨𨽻貔虎隊嘉㑹幸列鵷鸞行聖恩如天高且厚彤墀廣讌陪霞觴仰瞻斗極春正長馬甲八達塞年八十綺嵗豐占瑞靄融筵開夾陛日曈曨天庥駢疊人懽忭帝徳光昭聖夀崇一彤廷高宴集簪紳下逮戎行酒醴均韶樂中和宣九奏元音偹紀萬年春二馬甲武蘭太年八十舜殿揮絃日堯衢撃壤時敷天開夀算率土徧春熙黄髪扶鳩杖雕筵敞玉墀八旬逄盛典千叟頌繁禧晴旭輝金闕和風泛玉卮綴班依七萃竊擬九如詩馬甲額爾登年八十廣殿春融化日長開筵黄髪引千行夀人夀世知無量鼔舞衢尊樂未央一欣陪酺宴綴朝紳雲日光輝仰聖神凱宴昔年曽飲鎬觥詩今日又龡豳二馬甲拉住兒年八十朶朶晴雲曉漏傳珮聲鷺序共朝天誰知賦粟牙旗侣也許分甘玉案前錦艶葡萄旗鳯羽螺斟鸚鵡鼎龍涎自今扶杖彤庭後歸傲蓬萊海外仙馬甲三竒哈年八十恩綍新頒重引年皤皤黄髪競随肩傳來玉斚霑膏渥拜舞咸瞻咫尺天一紫塞風高羽獵雄雲屯七萃引琱弓習勞肄武年時慣恩宴偏隨鶴髪翁二馬甲碩占年八十縫掖圜橋方望澤袀衣先得沐春暉梅羮調後晴初麗寶甕分來日未晞正喜紅雲開紫極欣隨黄髪拜彤扉茅檐腹鼔堯厨宴隊隊酡顔䇿杖歸馬甲燕堵年八十大徳曰生仁者斯夀玉劵蘿圖自天申祐敷錫庶民筵几聿授千叟偕來九韶迭奏聖算萬年福洪徳懋馬甲王廷佑年八十身閒怡化日伏處仰陶甄鵝鸛思同隊駑駘憶舊韉短檐惟負曝小草亦知年已許辭鞭弭還容厠几筵三巡歌醉飽四豆飫甘鮮不盡迎陽意傾葵老益堅馬甲達爾瑪年八十恩筵鱗集古無䨇西越流沙東海邦廿萬餘齡同致祝暢垓豐樂俗敦龎一祥和風動萬年枝翾動機翔甲茂滋拄杖幸隨簪組後捧卮同賦蓼蕭詩二馬甲西爾大年八十大衍乾符啟耆年齒徳昭肆筵排玉砌叶律奏瓊簫麋夀三千集鴻釐萬億饒華胥真樂境寜復羡松喬馬甲姚之耀年八十引年典茂授几撰杖期頤耄耋爵班齒讓小大稽首臚愉貢忱稱萬夀觴禮洽壬林莘莘祁祁魚魚雅雅及爾陪臣儀秩心寫維引翼之又蕃滋之于萬斯年鞏丕丕基馬甲劉傑年八十鵷鷺班行肅稱觴玉陛前健誇雲際鶴樂倍地行仙北斗瓊漿酌南山夀籙綿三千齊舞蹈香染御爐烟馬甲郎鐸年八十郅治徴昌運維皇受祉駢膺圖年五十拜席叟三千夀㝢躋真徧宸躬慶更延自天純嘏錫覃被洽垓埏馬甲林茂清年八十宴千叟祝萬年肆延設席瑤階前古稀天子夀如天蘭㽔五代國慶駢願將熙皥康衢舞譜入中和韶樂絃馬甲徳恵年八十維聖繼聖恩重光千叟嘉燕開紫閶老更義析騐岐政陪𨽻賤逮登虞庠飲和食徳被康樂重熙累洽凝嘉祥億兆春調四時燭三千人進萬夀觴馬甲大保年八十古稀天子慶當陽南極星輝耀角亢燦爛雲霞齊拱北佽飛拜賜並鵷行一酒號延齡瑶斚捧杖名靈夀玉階扶三千黄髪熙朝瑞不數香山九老圖二馬甲五保年八十紫禁新韶麗光華敞綺筵階蓂敷六葉眉夀集三千宴鍚辛盤後稱觴玉座前便蕃歌既醉億萬慶長延馬甲明通年八十芝宇蓂階瑞靄霏筵開錫福福如㡬耆年扶杖酡顔喜春滿蓬瀛賜宴歸一序啟青陽晷影遲耉鮐人夀邁周詩天家沆瀣羣沾得絶勝屠蘓最後巵二馬甲徳義年八十執殳赴雁磧搴旗越龍沙宣揚神武畧貔虎力倍加臣本駑駘質豢養澤靡涯金漿暨珍綺垂老獲拜嘉長為徧徳民飽食安室家不餐赤松實不羡安期瓜馬甲查漢太年七十九綘闕啟兮華鐘鏗珮鏘戞兮韶濩鳴髪皤皤兮傴僂行三千人兮廿萬齡肴核陳兮㫖酒馨既醉歌兮天保呈懿文徳兮四海寜天行徤兮久照恒馬甲和順年七十九皇風調玉燭闓澤運鴻鈞觴進羮斟雉筵開脯擘麟釦墀容䇿杖文磶許敷茵天保陳周雅中和調更新馬甲王玉年七十九今日長筵蔚瑞華溟觴嶽豆浩無涯生逄聖世人多夀都向彤墀酌紫霞一時和正值泰階平賚予便蕃逮騎兵鳩杖盡題靈夀字精鏐咸載職方名二馬甲雍熙臣年七十九聖治邁隆古緝熙綿祺福世皆遊佺僑治己軼軒俈麟趾歌三章鶴髪人百禄盛禮陳尊罍大樂偹鞉祝精鏐龍拏牌流蘓鳩踏竹湛恩敷濊汪淪浹徧九服馬甲趙文貴年七十九昇平嘉慶啟天閶千叟羣歌零露瀼酒泛瑶尊稱曼夀律吹玉琯正春陽九華日絢曈曨采五色雲開糺縵光擐甲餘齡榮與宴欣㸔六幕瑞符昌馬甲蔡璟年七十九羲馭寅賔出年輪甲子推新春開舜日曼夀識堯眉優渥擎金斚光華拜玉墀環瀛當此際長慶洽重熙馬甲高名立年七十九䝉莊殊眇見大年誇大椿春秋八千嵗自謂無其倫不知嵗月長本滋雨露均雨露之所濡草木皆延春生逄熙盛朝日就光華新扶杖登九陛布席羅八珍拜手以颺言有願咸得伸所願夫如何非在榮一身年榖靡不豐風俗一以淳凝庥萬萬古亘仰吾皇仁馬甲金濟年七十九歌青陽舞雲翹春來浹旬布九霄慶重熙洽夀宴帝歌卿雲旦復旦盛典開天亘古無恬和萬物貢貞符貞符緝嘉祥集尚齒恩隆無等級執戈之士禄亦及馬甲林燦年七十九於赫大宇廣運無疆皇仁風扇天徳日强仙蓂萬葉瑞日鴻昌春祺敷錫玉醴霞漿葆元怡粹瞳方髪黄祥光溢霄積禩彌長馬甲徐世美年七十九慶際運㑹隆道載宥宻廣闓澤春布濩鴻禧日肹蠁引年盍朋簪列宴依仙杖千行罍匜馨兩部韺䪫響東風恊氣和旭日天宇朗介士一何榮老復霑懋賞馬甲達塞年七十九大哉陽徳茂盛世績咸熙絳老霑醲澤蒼生荷聖慈兕觥稱共舞鳩杖拜同持環祝金甌鞏春臺徧八維馬甲長安年七十九鍚福普紘埏廣讌示慈恵鶴髪簪紱輝階墀雲日麗三千人瑞徴咫尺天顔霽中和有餘音尊爼皆至味沗陪珪組倫亦逮鞬箙士盛典徃牒無顒頌前光繼馬甲來住年七十九大氣鴻鈞轉京垓景運開龍章頒巽命鶴髪舞春臺共喜迎祥徧還欣拜賜迴便蕃由錫福福更自天來馬甲化有禮年七十九衎宴式敷韶序懽承無算觥籌羲軒上臨黼座期羡環侍龍樓法膳帣鞲用飫仙醽舞蹈以酬真喜夀人徧宇樂邁閬苑瀛洲馬甲耿興耀年七十九旭景開嘉宴歡聲滿帝都衣冠耆社㑹尊斚漢廷酺精鏹分瓊庫珍餈出玉厨禮成歌既醉萬載慶昌符馬甲楊芳茂年七十九帝籙祥呈萬仙曹慶倍千恩光埏極合春氣斗衡連玉琯調昌運瓊樽溥御筵夙承琱甲後今到綺筵先尚憶風雲壮唯欣雨露鮮敬依蒲藻詠愷樂誦瑶篇馬甲陳永年七十九乾天紀五十普天敷樂夀長筵令節開盈階集黄耉集黄耉兮登春臺梯嶂環瀛亦奔走泛東海以為觴壘昆侖以為豆樂同雲門咸池大章大巻大韶大濩和人随木公洪厓安期羡門偓佺彭籛後沗隨鳩杖班式宴酌春酒介鴻喜協悠久馬甲三逹塞年七十九淑氣氤氲初徧九重酺宴斯張兆民以引以翼景運而熾而昌九醖香浮玉琖三呼聲徹雲閶願陳周雅醉飽珍幣更錫尚方馬甲三保年七十九霜髯雪髩侍丹除宴鎬欣同在藻魚來聴鏗鍧天樂奏倍知聖治邁華胥一春韶旖旎景暄妍冠佩雍容列綺筵聖夀怡康齡萬億臣心藹吉叟三千二馬甲常清年七十九六幕新韶晝景長一人有慶頌無疆肆筵饌擘麒麟脯尚齒班随鵷鷺行廣殿風和春浩浩層霄露渥曉瀼瀼承恩竊附賡天保共仰宸題倬漢章馬甲五十七年七十九綺旭升金掌彤宫敞夀筵爵雖殊貴賤齒亦序班聨醬爵有加禮栽培無盡年弧南星晝現相顧悉期佺馬甲武爾登額年七十八蓬壺日月紫霞杯親向堯天拜賜來花砌景遲仙杖擁雲璈響合綺筵開爐香馥處臚籛羡華藻敷時盛馬枚率土共登仁夀㝢樗材尤幸上春臺馬甲那三泰年七十八聖皇御宇開五紀乾坤之䇿大衍起京垓億兆徳積累萬國豐康俗淳美乃召國老庶老偕眉梨鮐背三千排三爵秩秩簫管諧古稀天子超萬古垓維燾載歸安懐馬甲張美年七十八黼座純禧懋春筵皓首排牲牢羅玳席鐘磬奏金階咫尺瞻顔近三千拜手偕耆年登樂愷康阜惬宸懐馬甲和色賁年七十八玉律調風肇轉瓊筵慶澤維長乾坤䇿開大衍星雲垣映重光北極千宫擁仗南山萬歳稱觴臣以戎行飽徳惟祝聖夀無疆馬甲金文燦年七十八福疇敷九五懋典廸維前星合丙丁現齡推甲子駢雲仍延萬禩鮐耉廣三千自愧彎弧老稱歌在藻篇馬甲安泰年七十八引年冠佩集共球萬福攸同百禄遒如大願船收碧海若恒春樹種丹邱金漿玉醴承三爵文綺精鏐徧十洲共戴皇慈葆長徤盍簪人盡偓籛流馬甲福舒保年七十八卯際南山什寅杓北斗魁春生熙世滿恩比古皇該大衍乾坤積長祥日月開慶行虞廪米酺鍚漢宫醅典並圜橋聴歌從撃壤來鳩笻無鯾䭇鮐髪總䯽䰄卑末儕千叟怡愉徧九垓願同瓊露飲長喜祝臺萊馬甲常永年七十八南極耀晴霄氛氲團瑞霧華筵設紫闥各試青雲步皓鶴森成行玉斚浮甘露曈曈瑞日旉耆筵喜氣欣溢酺樓前醉飽共承膏澤渥中和仙樂奏鈞天馬甲恵昌年七十八鳯琯宣韶淑景開趨朝耄耋喜紛來親聆玉陛韶韺樂徧荷瓊霄沆瀣杯鍚賚共欣邀曠典霑濡何幸及凡材鏘鳴闕下冠裳集五色祥雲䕶上台馬甲陳綱年七十八春王正月行慶施恵受兹介福施及四海叶黄耉鮐背敬如君所飲食衎衎則燕則譽叶君子萬年福禄綏之光被四表無不宜之集經語馬甲四黒年七十八海宇邀恩日嵩呼入覲時自天頒寵澤匝地荷鴻慈翠釡調珍膳瓊筵捧玉卮微忱同拜祝萬嵗集蕃禧馬甲沐彛林年七十八嵗陽奮軋啟新春太蔟司宫第六辰班序彤墀䖍祝嘏羽林都是列仙身一閶闔晴暾麗九天氤氲香氣靄爐煙歡闐鯢齒三千軰霽展龍顔億萬年二馬甲徳通年七十八南弧朗耀老人星長傍微垣光氣紫聖皇御極五十年化成久道大衍紀三階共仰世昇平羣頌古稀聖天子封人拜手祝三多雲仍五葉謌麟趾盈階此日夀樽開詔許當朝授筵几瑶觴共捧衆心歡春曦煦育天顔喜馬甲富森保年七十八法祖敞耆筵天膏飫醴泉燕毛惟尚齒鶴髪許随肩柏露符嘉瑞琅霜介聖年銜恩歸細桞韶景浩無邉馬甲増紹年七十八珠緯垂芒焕斗樞寶光雲裏慶張酺春秋億萬軒齡紀甲子三千叟數符載喜堂亷交叶泰還忻蒲桞燕承需長生漫説東華籙鍚羨天邉史牒無馬甲郭邦彦年七十八寶籙敷鴻庥夀㝢恢九有恭惟泰運開彚征集羣叟錫宴溥春祺歡顔洽黄耉遥瞻南極星光輝燭奎斗馬齒算已長鳩頭杖在手侣征僑安羡祝日月岡阜馬甲狗兒年七十八萬年天子慶昇平法祖重開夀讌成皓首龎眉同拜舞欣欣草木亦滋榮一合大九州為夀㝢徧三千界悉耆年彤墀鵠立鳬趨者位列長生最上仙二馬甲哈占年七十八五十開陽籥三千集老臣並登仁夀㝢恒樂太平春授几初筵秩㪺漿大斗醇卿雲昭復旦億載沐恩新馬甲齊那里年七十八新韶令節慶敷恩閶闔雲開覲至尊天鍚九疇先五福禮延千叟肇三元長生酒進娱佺偓靈夀鳩扶樂綺園同向春臺觀朗曜夜來南極拱微垣馬甲豐盛額年七十七皓髪龎眉背隠鮐新恩賜杖跨鞍回道旁笑語期門侣親吸瓊尊御酒來一南弧長燦老人星瑞應多從治化徴環海謳歌騰祝日福籌齊慶萬年増二馬甲廣福年七十七啿啿春祺盛開韶協氣温引年頒寵誥敷宴啟仙崑羽爵天膏沃山龍帝座尊願言備廣福微賤以名掄馬甲䨇喜年七十七趨陪嘉㑹聴鳴珂湛露榮霑日下多但覺蓬池春意滿醍醐濃亦似恩波一鐵騎琱戈少壮曽只今馬齒又新増恩光被處同申祝熙景歡聲羽衛騰二馬甲烏蘭泰年七十七玉燭均調日瑶階六葉蓂一人欣有慶萬國樂咸寜旭日衣冠集春風酒醴馨白頭叅騎隊恩許宴彤廷馬甲那爾泰年七十七武臣欣入宴脱劍換朝衫華俎珍羅海甘醪蜜啟巖芝英招綺皓樹羽聴䪫咸養老崇隆典雲書五鳯銜馬甲長徳年七十七行間早歳列期門異數欣叨覲至尊甲米月錢多請受不教效力但䝉恩一紀恩祝聖立班同白髪三千映日紅若道羣仙誰得似今朝都在五雲中二馬甲管承燦年七十七夀㝢春祺普羲爻叶泰占春辰開綺盛小草近陽暹入座觥同酌濃恩露許霑三千人舞蹈雲日共依瞻馬甲王應元年七十七法酒均霑入宴榮瓊筵開處㑹耆英華胥世界多人夀合雒時光最泰亨黄髪在廷増順象紅雲遥望頌昇平寸荄小草恩波及忻對南山進兕觥欽定千叟宴詩巻二十七
