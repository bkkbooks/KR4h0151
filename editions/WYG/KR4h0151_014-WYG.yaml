body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻九預宴八十八人詩九十九首佐領邵源浩年六十六皇握寳樞均七政􅁲日開筵洽歡慶月紀堦蓂茁六英萬年仁夀懸金鏡木公排夀人三千似水朝宗星麗躔共仰垂裳瞻藻火謳歌率土齊争先七政體佐領素普東阿年六十五星雲燦爛絪緼宴兩舉叟千羣瓊肴玉醴綺杖元纁龍圖逾碧海鳯紀協蒼雯邁皇王之逸軌鋪天地之大文已笑周蒲徒宴鎬何論漢鼔但横汾芝華垂五葉而麗彩蟠木高萬仭以祥氛蕩蕩平平皇建其有極巍乎煥乎唯堯之為君一字至九字體佐領圖敏年六五五采彰施五色八音宣暢八風一人錫福浩浩四極被化顒顒黼扆大觀在上璇闈萬福攸同欽值青陽闓宴雲需露湛豐崇佐領廣涵年六十五鳯闕榮千叟鴻恩及庶司繡衣趨殿陛華髪傍旌旗武衛修臣職陽春與物熙賡歌揚盛事典軼蓼蕭詩佐領五逹色年六十五綴衣㣲秩荷恩隆逾甲欣逢錫宴同玉陛露滋歌既醉五雲華萐扇春風一風光先上萬年枝箧有瓊瑶座有芝人在太和元氣裏韶顔都似首春時二佐領德恒年六十四一宴三千人人皆六十上熙朝典兩舉萬古無能傍夀者稱神仙神仙或虚誑陳書解王㑹未紀鮐黎状綱常倫紀中老少長以養巍巍大清朝福德真無量敬天迓蕃釐法祖錫洪鬯小臣識衢歌拜手同賡颺佐領珠隆阿年六十四紫禁春祺瑞靄濃杖朝杖國慶追従最欣法醖來天上沆瀣纔沾輙駐容一趨蹌金闕聽韶英磬管聲中祝頌聲繡黼盈庭三爵賜禮和樂節泰階平二佐領伊蘭太年六十四太極之精河圖之位皇帝紀元聖人長世夀萬千年春敷品類鮐背雲臻鶴髪霞萃飲食醉飽冲和醰粹沾溉靡遺恩榮倍至小大稽首敷天光被佐領德成年六十四綘闕趨黄耉中尊出上闌躬依天緯紫心映禁楓丹虎拜千行肅鸞歌萬國歡億年綏祉福黼幄瑞光蟠佐領王維賓年六十四詰旦閶闔開列宿耀紫㣲日月垂光景與天享巍巍彤庭赫宏敞阿閣三重階六樂陳廣座㫖酒盈金罍華容溢藻幄並坐侍丹帷獲我擊壤聲願以黄髪期俯仰生榮華千秋長若斯集文選句佐領王言年六十四堯階六葉茁仙蓂千叟茵聨祝曼齡沆瀣共餐金掌露黄明齊望老人星庠儀不復推虞燕酺飲従來陋漢庭中外一家同被賜尊開北海算東溟佐領博爾和年六十四堯舜兢兢業業松喬皥皥熙熙七十衣帛食肉三千翳鳯擎芝綘氣翔青漢表鴻恩溥緑雲陲聖夀與天無極大中式叙倫彛佐領德楞額年六十三天家景福共春頒香案前頭玉作班上日辛盤羅夀耉初筵藁飫合瀛寰玉函雲笈籖開帙翠甕銀罌酒駐顔綵勝風中恩共沐不將仙㑹羡三山佐領扎拉芬年六十三福祚九天協慶鴻恩四海覃敷六日祥開蓂莢萬年瑞應蘿圖嘉宴龍光榮被耆英鳬藻同趨樂徧金門羽籥春長玉漏仙壺佐領胡世隆年六十三敕遣中厨進蕙肴雲龍供帳夾螭坳黄唐嵗月多頤夀鎬洛尊彛叶泰交玉壘懸軍曾走檄松山唱凱記吹鐃櫜弓卧鼓時康樂鳴鹿詩篇應鳯匏佐領李宗仁年六十二星紀躔營室春祺薄海覃祥蓂階吐六雅管奏盈三鶴算昌而熾鳬趨樂且湛賡颺偕進祝聖夀二儀參佐領覺羅伊勒圖年六二聖祚億萬載泰筴揲大衍煦嫗應綺序耉耋荷燕衎偓羡集紫禁酒醴舉懋典曷以晉悃祝小雅頌榖戩全仄體佐領常福年六十二聖主敷淳化敷天介夀祺蓼蕭歌燕譽春酒祝鴻禧禹甸呈銀甕堯階煥紫芝敷榮同小草雨露被蕃滋佐領明亮年六十二獻嵗新韶錫慶蕃鴛行濟濟洽黄尊龍飛五十周元紀鶴髪三千拜渥恩馝馞玉爐霏瑞靄光華金掌郁初暾蓬萊幸到超塵􅅽駐景無須仙帙繙佐領永安年六十二珠囊朗㣲垣雲霞高列嶽一人敷夀祺八紘浹康樂清醇設壺尊拜舞聽韶箾珍膳調翠釡和􅃵㪺珠杓北斗柄天高南弧象春灼㣲翎厠鵷鸞仰忻蔭雲幄佐領豐盛額年六十二景運維皇盛繁禧與德齊春臺欣共上夀域樂同躋酌兕親甘醴扶鳩聽紫泥衢尊還徧飲受福普羣黎佐領李梅年六十二廣殿和風嘉宴開番番黄髪集春臺聖人樂夀同天下九節仙笻萬嵗杯一簽名己注長生籙揚觶還登百福筵捧出黄封萬人看耆齡都是帝恩延二佐領海福年六十二萬有一千贏易紀乾之筴見丙老人祥有壬嘉禮洽百五計長庚六十起週甲老更百家訟饗食四代法露斟甕有華風扇厨生萐寰海晉仙籌如南夀嶐嶪佐領七十八年六十一聖祖懿爍耆宴懋作洪惟我皇纉篤前光日新富有視兹鮐耉其數三千依光近天皇備萬福臣受百祿猗歟盛哉萬福偕來二句用韻體佐領于文炳年六十一瑞旭中天麗寰瀛化㝢登雍雍耆彦會濟濟玉階升億萬開乾策三千作夀朋湛恩沾小草拜手紀貞恒佐領長慶年六十一韶春喜入序舊嵗記周甲零一似􅀈初恩與英耆協天砌三耦蓂天厨萬年萐際此泰交亨欣得晉晝接同列為臣幸拜起稍覺捷賜杖維高擎喬偓期追躡佐領趙鳴陞年六十一聖徳乗乾七政齊萬年仁㝢夀同躋舉觴春醉長生酒賜杖人扶太乙藜一咫尺渾忘羽衛嚴春衣㸃㸃酒痕沾拜恩天上東華近夾路塵香到蔀檐二佐領高崗年六十一日華麗正泰階平千叟雍容上兕觥華葢仙芝輝景慶玉階儀鳯叶韶韺酺尊不數祥符宴綺甲寜推洛社英寸壤纎塵棲太岳三多惟效拜颺聲佐領平徳年六十一嘉宴當陽啟恩榮協此辰祚貞一人夀福亘萬年春大衍乾坤策中天日月輪依光欽景運旋幹慶常新佐領常寜年六十一花甲溯軒律滋數起羲卦生初原一根極盛紀分派仙會三千年佛度三千界洪惟我熙朝合徳無弗届帝大夀萬春臣㣲眇一芥上頌三千人恩榮賡羣拜佐領福伸年六十一舉兕觥操象觚膳夫衛士走躣躣上為森嚴無私疊字體宫蕊珠居然兩廂坐􅉊毺舞者鶴趨者鳬帝曰三千叟其㪺餌九轉丹灌醍醐臣齒尚少臣質駘駑句傳字字聞鴻臚歌既醉帣鞲鞠跽願上萬夀泰階符佐領和臣布年六十一廣殿啟韶筵晉日龍光接聨瑞紀彬璘敷貺仰稠疊卿雲五色輝璚露三山裛人瑞集兩階國祥衍五葉皇春與帝夏希有見圖牒臣幸佐戎符叨沐天恩浹佐領伊爾登額年六十一皥皥熙熙世魚魚雅雅時迎春春盎盎就日日遲遲賜杖因扶杖傳卮遞拜卮叟千千再倍私慶慶無私佐領連城年六十一四時泰萬物豐膏澤流沛衆潤同我皇紫詔布元旦大地風行恩浩瀚百官守職級有加兆民賜酺恵無涯人言熙洽恩如此不獨今年盛可紀惟開夀宴新云云况叟三千昔未聞臣答斯言析此義為言老者何従至有生共在大造中五十年深長養功今日登筵歡既洽拜手陳詞述所答臣民受福福未央惟祝聖夀夀無疆佐領多保年六十嵗籥占交泰瓊筵接上台乗天五緯合頤老九闗開鶴髪趨朝隊猊香上夀杯冠紳咸鞠􅎽岳牧或遥來祇効前驅力寜希大雅材衢歌殷拜獻雅詠在春臺佐領賈起雲年六十九重春色慶熙和蕭蓼方賡既醉歌慚是無能名聖徳惟隨千叟祝三多一麗景長筵無算籌雍容盃斚沐恩稠九華光裏瞻天近縵縵紅雲暎綵斿二佐領阿福年六十欣比康侯晉榮升樂宴需亨豐歌大有交泰叶中孚頤養䝉咸被隨班震豫呼無疆推大衍衍慶運羲圖卦名體佐領興安年六十九宇膺福萬方躋夀民安不知九重頒詔萬國沾澤民知而怡民愚如此宜彼堯人共忘帝力我皇錫宴慈恵臣工惟示之則林林總總莫匪夀耆豈繄三千惟臣荷恩實比斯列欣與華筵華筵既登渥賜既受何以獻納萬福攸同萬夀無疆祝共民逹三句用韻體原任佐領塞克慎年八十三嵗幹陽臨乙星杓候協寅花開年論甲菜圻日先人一視長生牒重逢慶宴新鏡涵仁夀世杯照太和春曜映聨躔翊疇臚萬福申㡬行紳黻老兼數曝芹民康爵凝仙醖時饈錯上珍月筩聽嶰竹暘晷動階茵歡溢華筵列詩賡黼扆陳名原占瑞籙賚更渥恩綸豢養朝容杖生成化飫醇羨期千數倍堯舜兩身親昔仰年方冠臣年八十有三康熙千臾宴時方二十兩逢盛典忭幸實深今陪髮已銀家居叨渥錫還許仰楓宸原任佐領薩靈阿年八十條風扇律漙陽和日日歡聽擊壤歌先自算來三萬日受皇恩日比人多一天漿羣渥醉顔舒祇覺春光倍玉除聖帝億齡行茂典兹辰賜杖紀恩初二原任佐領蘇楞額年七十八時和軼邃古上軒下蒼頡欽聖夀祝萬握維恩溥八臣書不秃錐臣射不穿札但仰豢養私豈有計勲劼盛際洽嘉宴歡舉以嵗察伏聽賡颺聲率舞和䕫戛原任佐領雙全年七十七昔仰陪都盛今瞻法仗羅入春華宴敞既醉悦心多共識龍顔霽叨倍鶴髪皤天慈濡物溥人夀兆時和物徧龎洪慶臣賡泮奐歌萬年承恵愷蹈舞向鑾坡原任佐領富明阿年七十五夀㝢貞恒呈道泰闓澤湛波浹汪濊福籌東海仰朝宗慶祝南山歌保艾當年聖武闢西陲天聲奎畫銘硍礚奉使㣲臣橐筆馳龍沙萬里開圖繪大宛康居互絡緜河源葱嶺紛縈帶敢誇聚光列山川仰慶同春合中外歸獻臨軒拜賜金臣曽奉䝉處繪圖命於伊犂等恩賞賫垓埏洪燾如天大老馬逡廵策不前餘齡休暇君恩丐恭承嘉宴啟初韶樗櫟新萌吐芳薈瀼露三霄挹瑞芝叢雲五色承仙檜不數諸天兜率筵真成萬國耆英會三千拜手效賡歌曈曨曦旭升華葢原任佐領巴祿年七十四粤若稽古唐堯年遊河五老紀載編聖朝仁夀合寰海榮光紫氣炳煥天衢躔乾筞廵環叶河洛元辰珍貢輯嶽川鳯麟區區不足以言瑞羣生熙皥登華顛慶兹三千叟蹌濟玉陛延條風兩候蓂六葉棃顔鮐背輝映春韶妍小臣列㕘佐玉軑從櫜鞬老鶴􅂒􅂒馬􅗿蹀幸承湛露登長筵水碧金膏餐異醖瑤函雲笈書羣仙千叟之夀胥聖夀有若雲霞糺縵仰繪天原任佐領海齡年七十四日輝麗正瑞光迎奉職曽叨紫禁行陛楯為郎司執㦸鹽梅尚膳記和羮臣以三等侍衛侍直膳房一人歛錫無疆福萬國長占大有亨已喜樂章符曼夀仰稽謨典協欽明星環北極輝南極草獻華平紀太平列席共欣依玉砌御香兼得裛犀觥敢云枯朽芝能長自被陽和草更萌班直珍厨經㡬載瓊饈今得飫蓬瀛原任佐領福格年六十一皇帝御宇曼夀洪延五世一堂禔福綿綿遂進耆耉設席肆筵既醉既飽以炰以燔寰海臣庶長沐湛恩拜手稽首天子萬年原任佐領巴龍年七十一元紀五辰敷五福賡歌千叟慶千春曈曨曦旭觚稜起舒疊韶風玉陛新賜杖扶來笻九節仙厨捧到膳兼珍賞牌昔荷頭功紀轉憶搴旗月竁垠四圓明園品營總常忠保年八十三西園環衛接龍津樗散長依上苑春恩紀三朝欣累洽歌聨七萃慶昌辰驅馳牧圉猶前健拜舞堦墀逐後塵竊喜遭逢同晝接萬年天子播鴻鈞歩軍協尉老格年八十二五色金泥頒鳯閣韶韺叶奏鈞天樂溥天列土遍謳吟和暢陽春錫康爵小臣綴籍戎行間貔貅屢捷從襃鄂赤墀叨沐賜與稠功牌一一寵懿鑠鴻慈未得涓埃報耆筵又沐恩施博旌旗日煖爐烟濃皤皤黄髮獻酬錯泰交翔洽人瑞臻䖍頌仁風熙六幕步軍協尉色克圖年八十星廬忝攝尉武力塹桓桓久叨祿糈渥未聽鼙鼔讙年今及八十矍鑠能據鞍兩鬢雖已雪寸心長自丹叟宴彤庭開沾飫隨千官慶雲積糺縵濃露霏甘漙願言效奔走長聽衢歌歡步軍協尉高起龍年七十八南極星明閬苑高衰顔寵讌列仙曹分行座喜肩隨雁羅拜人疑首抃鼇綵勝浮烟凝瑞柏瓊卮浥露醉仙桃更看珍賚從天䧏分得爐香襲錦袍步軍協尉巴雅思呼朗年七十四龎眉何磊磊華髪何􅆴􅆴千叟共拜皇恩覃嘉肴列爼㫖酒盈甔㣲臣馬齒七十四詰姦牧圉隨驂驔食祿五十餘載空懐慚兹辰復得班華簪矢音紀事樂且湛永言聖澤長濡涵步軍協尉富寜阿年七十四古稀天子文武聖神歛時五福敷錫庶民久道成化夀㝢皆春番番黄髪委佩垂紳合三千叟咸沐皇仁綿綿𤓰瓞帝祉駢􅀈禎祥迸集儀鳯師麟拜颺稽首嵩祝䖍申步軍協尉海祿年七十三八景琅函五嶽圖長生不待説蓬壺三千同慶齡無算九五居尊福用敷盃酌紫霞欣遞鳯杖承靈夀快趨鳬禁闉忝列勾陳隊榮幸雲天叶燕需步軍協尉七十三年七十一乾元符太乙恩宴錫春寅蹌濟聨千叟曦韶先七人軍符龍朔騎臣出北路兵一次翼尉鳯城闉慶與逢初吉光華被八垠步軍協尉高鉞年七十一上夀皆華髪祥暉拱紫廷綜年環綘亥占瑞協弧丁吉日輝青帝淳風軼大庭當筵逢手賜依古未身經福自一人錫春咸六㝢寜㣲臣叨渥宴鈞樂喜恭聽步軍協尉孫必謙年七十一上古有靈椿嵗以八千計蟠固托元功洪算延無際熙朝人瑞凝休和御筵歡忭雲嵯峨金盤玉豆擘麟脯琪葩瓊樹交鸞柯謭陋㣲臣典旌纛快軼横汾超燕鎬蓬壺日麗開天閶翩翾黻珮聲鏘鏘欣依帝座霑瑶漿樽前一曲春風長步軍協尉兼佐領常福年六十九鷺序趨三殿嵩高祝萬齡羽林班久忝玉輦奉曽經仙掌分甘露珍符兆景星鈞天方奏曲皓首喜同聽步軍協尉劉鑄年六十八廣内肆瓊筵明光開渥宴舉旅行酬羅貴賤引年俱饜中厨膳既醉既飽或酢或獻灑如三爵春風涣何當馬齒邀宸眷㣲臣執㦸扞圉司組練餘齡幸得朝金殿叨榮竊祿五十春拜紀恩光仰星漢遥知九州擊壤増依戀聖夀萬年之樂歡歌徧步軍協尉富勒渾年六十七三素雲開宴紫霄充庭鸞鷺集羣僚光明餙處真華國靈夀扶來許杖朝㶑灧恩波浮玉斚鏘洋仙樂叶琅璈瞻星共慶南弧彩就日纔回北斗杓米廪較於虞養懋蒲輪比似漢儀超階躋協尉班仍㸃牌記頭功賞獨饒閣道長欣隨豹尾屬車屢喜傍雞翹瓊筵得奉流霞酌聖治巍巍上纘堯步軍協尉五徳年六十七聖治熙和洽穹壤薄海同瞻太平象㣲臣衰朽沐陽春雨露根荄長以養憶昔荷戈從軍時奮威行陣偕虎貔姓名幸入紀功牒太府頒金列等差盛世修文復肄武帝垂衣裳舞干羽烏弋黄支齊向風鶴髪蒼顔樂仁宇春風春日彤階前三千羣叟簪裾聨座上金尊飫甘醖盤中玉饌羅芳鮮六十餘年老軍尉含哺鼓腹華胥世捧觴拜手祝南山身在五雲最深際步軍協尉富勒渾年六十六詄蕩雲開侍閶闔長筵廣殿恩波洽春風吹蓂舒六葉日之升月之恒嘉祥大備和氣蒸三千黄髪夀作朋酌天酒介眉夀帝用錫之拜稽首下逮庶老多祉受臣職隸步軍謡歌親見康衢叟啿啿春祺播九有歩軍協尉兼佐領楊繹年六十六隊是鷹揚幸預陪榮叨恩渥自天培銅街宿直隨閑衛丹陛趨蹌愧下才増算總縁逢夀世餘齡何幸上春臺㣲臣忭挹凌霄露願奉吾皇萬嵗杯步軍協尉范建鐸年六十五老安長廑聖人懐詔集耆英宴玉堦鴻算共占籌滿屋恩波真覺酒如淮一職分雲校列天衢快覩熙朝王㑹圖今日綺筵優皓首露華辰彩徧星廬二步軍協尉戴應麟年六十四金榜天門麗旭開耆英濟濟㑹朝來羣趨虞陛依仙仗䖍奉堯階獻夀杯波暖龍池真浩蕩風和鷺序信徘徊萐厨普賜延齡酒竊幸㣲臣許共陪步軍協尉海明阿年六十三昌辰舉懋典景慶星雲攢閬苑偓佺侣一一如鳯鸞蓼蕭與天保共詠瑶席端㣲臣備袀服夙昔扈上蘭星廬副列校訓練率紏桓嵗月積霜鬢榮光預綺盤坐聽宫漏遲彌覺天宇寛熙熙華胥世萬國同臚歡步軍協尉吳家寳年六十二獻嵗韶開六日引年班列千官風藹雲璈入律春融霄瀣凝盤夙預期門候仗欣聞紫禁和鑾拜舞追隨鵷序天恩巍蕩同歡步軍協尉邉從禮年六十二三㣲呈瑞景六葉吐祥蓂夀宇開仙戺耆筵敞帝廷圖翾青鳯羽輝積老人星惟頌天行健羲爻冠五經一三朝熙洽乆百四十餘年海嶽謳歌地星雲復旦天夀登筵廿萬人協禮三千皇澤春無際長沾雨露鮮二城門領何文魁年八十五璇闕濃暉麗祥筵啟令辰無疆膺曼夀有慶肇長春國老聨羣老陪臣接雁臣梯航觀盛集冠珮入華茵靄己昭彤霱洲還聚鳯麟㣲材依末秩八袠抱嚴闉愷樂陶唐世歡欣擊壤人自天敷渥澤億載帝圖新城門領蘇成額年八十三春光凝杓輝麗旭南極東華開寳籙大千淑氣滿皇州億萬仙籌添海屋龍墀慶宴備恩禮鷺序聨翩䝉錫福是時階蓂六葉敷首先四序調玉燭駑駘老入千驥羣豢養獨受三朝祿臣食俸在康熙年間至今六十五年記得華陽歸息馬臣前出兵一次還於苹野鳴隨鹿貞符上瑞徧期頤瑶草芝英滿山谷越裳貢雉海無波曼倩呈桃嵗初熟敢擬闗門仙尹占願效華邑封人祝城門領韓興濶年八十一北斗城西白首郎慣聞清蹕覲天光春雲普覆盈墀宴八十齡霑雨露長一仙醖傳觴到小臣欣看瑞氣繞層闉昆池遍引恩波濶願祝吾皇萬萬春二城門領王泰年八十聖人御宇操乾符紀年數叶大衍圖有詔元正敞華讌黄髪台背鳩杖來于于徳星齊集角亢區仰瞻芝葢雲五色黄金塗羣仙翌載龍顔愉八方九宇咸樂胥金帛寵賚恩澤濡臣職司啟閉拜手瞻天衢四門穆穆徳教敷億萬斯年熙皥遊唐虞城門領圖桑阿年八十鵠立千官傍玉墀握韜末校荷恩私綘霄稽首還分坐華髪齊眉許並隨久掃烽烟西域定又膺管鑰北門司長春恰遇初春候請誦南山介夀詩城門領索柱年八十八十監門吏重逢萬嵗春瞻雲隨鶴髪覲日繞龍鱗㡬候函闗叟曽疑綘縣人户樞勤不敝天闕藹常新夀色浮丹嶠祥光動紫宸宴酣唯鼓腹倚杖向城闉城門領正克年七十九禁苑恩光春到新彤階瑞氣鬰玢璘請看萬國朝正侣多少童顔鶴髪人一下走深慚管鑰材三千䝉許燕蓬萊北辰樽儗南弧夀萬象春明萬扇開二城門領盧呈瑞年七十八筦鑰司門職掌専欣逢仙宴醉瓊筵慣看紫氣東来滿更仰瑶光北斗懸少日聨肩遊昊世清時鼓腹慶羲年神駒内廐䝉恩賜馬齒於今㡬倍延臣北路兵迴䝉賞馬一城門領宛得祿年七十八巍峩五福堂四海被龍光刻玉千耆會流霞九醖觴天増太平日人仰古稀皇牌賜承恩後恩長夀履長城門領蔡璋年七十六賓門穆穆太平春北斗城邊筦鑰臣持檄㡬充奔走吏執殳曾試健彊身九重介福邀嘉錫四海臚歡際令辰聖夀無疆徵瑞久東來紫氣遍層闉城門領逹爾素年七十五陽和布膏澤華闕藹芙蓉趨蹌萃千叟璀璨如鸞龍條風扇階蓂祥雲擁棟松宿直司城鑰清曉隨禁鐘雲韶啟丹陛露醑占黄封願添億萬籌敬以獻九重城門領黑格年七十四優老禮傳鳩杖序年記協燕毛備福一人曼羡長春六幕鈞陶曲譜紫芝叶奏醴濡瓊瀣凝膏嘉㑹重熙誌盛㣲臣渥錫榮叨城門領吉靈阿年七十四荷㦸紀從戎執殳榮扈蹕龍韜乏殊猷鶴鑰謹臣職名猶列八屯年己逾七秩何意玉殿趨獲霑金鼎實既飽天厨珍寵被湛恩溢聖夀祝萬年九有常寜謐城門領吉爾章阿年七十三誰何舊隸金吾署詄蕩雲開侍九闗欣遇酺筵開北闕得叅夀耉頌南山先驅曽備勾陳列超距榮分太府頒湛露濃華珠緯慶身依綵仗鶴為班城門領麻色年七十三昌符駢羡鬯韶春黄髪叨榮覲紫宸敬捧堯觴歌帝徳喜隨仙侣聽韶鈞一職隸金吾司管鑰班依玉戺列冠裳綺筵福祉無邊錫仁夀同登荷寵光二城門領兵格年六十八我皇法祖仁夀普登錫此嘉宴千叟為朋初筵孔秩嘉樂序升白金文綺賫予頻仍門尉末職昔預軍興臣曽出兵金川一次勇慚敵愾武遜後乗馬齒加長龍光祗承敬祝鴻貺川至日増城門領熊復隆年六十六諏吉排嘉宴千班綺席均舉觴逢獻嵗被澤共如春夀宇原無外皇心本至仁恩施同雨露歌舞遍耆臣城門領官徳年六十六簫韶既奏綺席斯陳元覆攸廣沛澤如春華髪鯢齒媚兹一人一人有慶兆民是頼戸禮高年家登耆艾春酒朋樽式此嘉㑹臣忝司門筦鑰是職榮與簪紳禮儀用飭於萬斯年醉酒飽徳城門領二逹色年六十五雲詄蕩開天閶南山華闕騰旭光㣲臣領候尉闢門恭遇聖道昌西瀛東鯷何止重數譯元㑹肅穆趨冠裳皇帝臨御五十載弧星宣光日華抱戴中衢露甕酌沆瀣咨爾耆年龎眉鯢齒輩重熙浹洽膏澤沾溉蒼龍轉斗仙蓂敷瓊筵三殿恩波逮㣲臣昔厠貔虎隊戰績紀十三仰被天家賚臣出兵時接仗十三次叨領功牌賞銀車書候尉逢樂康衣冠商洛凛拜颺懐柔震疊周頌章萬有千嵗聖夀升恒長城門領巴爾禪年六十三御筵五色祥雲開華髪濟濟升蓬萊小臣執㦸荷恩宴自顧㣲末同涓埃櫜鞬昔憶熊貔朂今朝試聽雲韶曲耆英之列許追陪至尊為􅄎長生籙九閶峩峩如九天玉階芝宇霏祥烟人日以前集人瑞高年齊頌聖人年欽定千叟宴詩巻九
