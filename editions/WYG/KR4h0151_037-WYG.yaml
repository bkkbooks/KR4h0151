body:
  text: 巻三十二預宴九十五人詩一百五首馬甲塔金泰年七十一重重慶典國徴祥沛澤鴻叨普地翔笻倚夀符鳩輯瑞仗排仙序鶴分行濃花聚候呈春好翠莢開時計日長逢此共占眉溢喜從來福宴協期昌回文體馬甲亮徳年七十一天顔咫尺瞻龍光彤墀宴集鵷鷺行衣冠濟濟鬚眉蒼微臣顧何人得與承庥祥弱冠事執㦸垂老猶受粻伏聞絳縣之老不知嵗第以甲子長短相較量臣今四百餘甲子屈指将與斯人當華筵寵沐尚方賜自幸旅力猶堅剛擘玉脯餐瑶漿鏗鐄雅奏宣璈琅拜手稽首晉夀爵古稀天子萬年逢吉身康强馬甲伊郎阿年七十一春風拂拂景遲遲盛際熈熈皥皥時就日日從黄道見疑年年共絳人推鷺振振集淵淵鼓鳯翽翽翔菶菶枝迾卒愧桓桓糾糾瓊筵欽濟濟師師瀼瀼露澤欣欣渥燦燦雲華旦旦垂願此繩繩長祝聖将将翼翼肅朝儀疊字體馬甲格圖肯年七十一杓迴北斗斟天酒天上陽和播九有番風兩候舒仙英鳯樓麟閣春光盈殿前鶴髪蹌葱珩葱珩聲叶紫芝曲萬年枝上鵷鸞賡古稀天子協久道八埏夀曜輝長庚宴出蓬壺千人列膏垂雨露萬卉榮微臣鵲躍恩髙厚羽騎環從末堦右嘉名聖錫榮稱叟仰祝曼夀如山阜馬甲曽浩年七十一愔愔末騎榮登天閶未嫻儀節詎知賡颺懸弧之志以射天狼日戈霜鋋載列戎行雉有力奮迺隨鳯翔嵗溢花甲欣際恩光朱鷺之鼓白鶴之觴萬載鴻笇六合春陽馬甲李兆祿年七十一九華麗日靄初升天保詩歌靡不増青瑣闥前頒醴鬯紫宸殿外拜殽蒸欣看夀侣嬴千耦各奉恩光錫百朋叨預耆筵隨立仗未嫻俎豆倍兢兢馬甲徐登舉年七十一皤髪龎眉臚夀㝢卿雲紺露記華春從來史牒聞希覯嘉㑹重熈第二廵一職近星廬霑錫渥營隨雲騎煦春温三千叟共奉康爵七十齡先沐聖恩二馬甲七十兒年七十一丹禁清嚴地春輝逮虎賁寵榮依羽仗騶迾傍倚門幸際耆英㑹彌沾化育恩日華瞻舜藻山鞏慶堯樽鳯闕雲霞麗龍顔笑語温紫猊烟馥郁絳鶴舞翩翻帝極三辰朗天庥百福繁萬方同獻夀叶氣滿乾坤馬甲朱丙信年七十一虯箭匀催天向曉璇霄五色祥光繞鵷班雲集玉珂鳴千叟承恩㑹蓬島鴻施疊賁法筵開緑蟻春醪汎玉盃古貌蒼松兼翠栢韶光細栁共新梅微臣芻秣受恩久得伴華簪隨錦綬豹尾曽知侍屬車龍驤不用鳴刁斗玉堦拜手祝無疆慶澤光天化日長雀躍鳬趨鳩杖健鑾坡頻捧萬年觴馬甲福勒賀年七十一聖人作錫夀康極一星臨九閶曈曨紫殿煜爚青陽鳩杖連蜷鶴髪蒼詔賜無算爵擎拳曲􅎽承璚觴黄神十樂鏘宫商微臣媿樗質末校聨班行精鏐拜捧承天慶丹霄湛露滋瀼瀼醲恩曷以報願億萬載夀㝢恢無疆馬甲二達塞年七十一宏規十二仰天閽閶闔晨開拜聖恩奉職老曽司互􅈀計年春許飫壺樽何勞巡警傳營汛惟見謳歌入國門籛偓攜來安羡侣春風衢上飲堯尊馬甲代保年七十一天閶詄蕩丹地崇髙春浮玉醴樂奏雲璈簪纓黄髪列侍金鼇遹在鮐耉扶杖均叨俯慙駑劣榮預趨朝太倉豢養卌載常邀環營列衛鞭弭時操鴻釐溥錫燕喜欣遭新韶迓祉咸沐恩膏馬甲恩倬年七十虯箭神傳寳讌開敷天同慶上春臺九州鮐耋如雲集諸部鴻臣向日來瑞莢輝分青玉杖甘膏醲汎紫霞杯銜恩叨奉銀牌賜小草均邀帝力培馬甲敦巴年七十淑景麗彤廷和風扇芳樹一人古稀聖羣彦春臺聚天光仰下臨秀眉式歌舞亨衢列環衛舄奕見簪組忝以騎士微敢企露膏湑恭承尚齒筵天上榮尊俎仙醴溢醇和永言頌多祜馬甲達賴年七十鳬鷖既醉歌太平未若聖世多豐亨天苞地符物畢致夀衢福宇人同登漙漙瑞露斟仙酒祥星煜煜輝南斗龎眉扶杖三千人稱觥同祝聖人夀椒屏萬福瑞光延接席連茵春滿筵鵠立班餘隨騎士雕盤捧得御珍還馬甲金偉年七十慶衍洪長運恩開愷樂筵椒盤三露潤芝葢五雲鮮洗爵逢嘉㑹歌鐃記昔年長懐雲日想忭舞覲堯天馬甲皂保年七十少曽隨羽士策馬疆場先凱功荷天算芻豢安餘年鳯紀周五甲瑞應南弧躔獻嵗延淑景尚齒開仙筵年已七十矣虎賁隨三千精銀捧駢賜緑醑邀遞宣惟皇集繁祉䖍頌春風前馬甲官柱年七十卿霄濟濟集鵷鸞錫慶春風滿上闌馬齒喜隨驃騎後龍光親奉紫雲端萬方觀聴齊元㑹九拜賡歌洽聖歡何幸微生週七甲預從執爵侍金鑾馬甲愛隆阿年七十嵗届春和雲麗慶霱黄髪番番羣遊化日仙韶鏗鏘祥飄金闕湛露恩深瓊筵禮秩臣忝櫜鞬亨衢遮迾夙叨芻養榮被蓬蓽慶際熈時得隨耉耋飽飫珍厨舞蹈詠述聖人錫福茂育萬物馬甲齊克慎年七十金戺韶和列綺筵欣陪酺宴覲堯天班隨虎旅常依闕春許鳩扶為引年瑞應三階雲郁郁昌符五世瓞緜緜葵忱擬獻昇平頌共慶蘿圖景祚延馬甲陳富國年七十令節慶元㑹嘉筵啟孟陬共欽錫福遍中外䝉仁庥式燕以衎耆老儔三千濟濟誰與侔菲材叨食粟豢芻積春秋雲街星户麗遮迾司扞掫常懷驅走效自愧非驊騮春風訢訢閶闔啟得以夙齒環螭頭扶玉杖捧精鏐堯樽北斗歡醉止欣仰萬年玉燭符圖疇馬甲五逹禮年七十春風奚敢跂鵷行馬齒榮叨帝澤長七十齡猶隨虎旅三千人共荷龍光堯尊共浥三霄露舜陛叨霑九醖觴既醉瓊膏増矍鑠春和銷却鬢邊霜馬甲馬知年七十弱冠叨芻秣馳驅五十年衰齡隨豢養駢接一千筵杯泛三微露身依尺五天春風真得意捧賜趁歸鞭隔句對體馬甲格布奈年七十七十霜華照鐵衣葵心親對日光輝從戎舊逐熊羆健臣出兵二次射獵頻看雉兔肥隨圍十次甲子長年諮絳縣春王正月侍彤扉好将物象占天象福曜端應䕶紫微馬甲九格年七十赫奕天朝武孔揚漸被聲教綏遐荒丁年荷㦸事戎旅烟沙漠漠幕府張三十九次臨戰塲功牌垂腰生輝光歸來紫閣歌凱宴黄封白鏹賜尚方臣曽得賞銀五十兩今叨嘉燕上閶闔扶鳩受賜黼座旁飽餐玉粒酣瓊漿稱觥三復天保章馬甲石圖年七十一人曼夀頌無疆瀛海昇平日月長頤養百年雲映紫睂開千叟氣添黄銜恩自覺顔増渥捧賜惟賡澤孔長老作騎兵無報稱猶知棡鼓聴軒皇馬甲寗廷顯年七十調元鬯春臺錫福建皇極九重夀㝢開尚齒兼尚徳顧臣小草荄何期與斯席憶從奮霆雷彎弧拓雙㦸騰驤萬龍騋非驥亦鳴櫪韜甲禁城隈捧觴聖人側謬以蓬葆材著在蓬壺籍亦解北山萊賡歌續八伯二韻體馬甲曹文魁年七十大衍祥開景祚緜殊恩錫福布耆筵非徒挾纊歡聲動樂府新添華祝篇一末騎曽經列戰場凱歌聲裏舉春觴昔隨萬陣貔貅旅今厠千筵鵷鷺行二馬甲宋文璜年七十磨盾俯書絳甲荷戈上直星匡有位共添海屋列騶預浥仙漿令徳令儀令色如山如阜如岡燕樂以需君子敷錫厥福惟皇馬甲馬越年七十堯階六葉抽仙蓂南弧宿映角亢庭九重華讌召耆叟翩聨鶴髪趨闕廷鈞天載奏廣筵闢衰朽亦得霑餘榮小臣微末預行陣曽從捧檄看洗兵蜀徼湟源及西路攻城奪寨恢星營國家威稜暨無外東鶼西鰈通寰瀛仁夀之朝萃人瑞白頭接武歌昇平拜手稽首稱兕觥萬年長聴臚歡聲馬甲魏華封年七十藹藹雲敷遲遲日永宇積慶光燦爍彪炳帝錫隆儀與慶霄並俾耆耉倫耀蓬山境材愧赳桓顧叨殊等赴宴春臺髙年翼引湛露渥滋祥星照炯臣名知祝效華封詠馬甲關住年七十七甲周餘被澤霶殊恩今喜上天閶干支細數年齊絳旂物均頒色首黄憶昨從戎過細栁幾回講武侍長楊儲胥媿逐風雲䕶田表親依日月光糈沐薪芻叨月廪翼分左右綴星行敢言衰朽鞍難據重際昇平甲久蔵敬以夙齡逢錫福欣隨庶老亦登堂承恩頓覺衰顔駐兑澤需雲快飫将馬甲伍爾登額年七十皇帝曼福民樂胥澤洋恩普覃九區御極五十年嵗在旃䝉初春韶錫宴開天厨凡百卿尹以及士夫國老庶老咸臻步趨小臣何幸逢頒酺沐浴膏澤同霑濡分營習軍伍嵗月積以紆叨沐芻秣惠微勞愧靡抒即今年垂週甲餘不才自分櫟與樗幸偕千叟倫共獻九如圖聖人萬載調璇樞馬甲馮智舒年七十鳯紀重熈日龍飛大衍年承天欽建極法祖特開筵鮐耉丹墀集絲綸紫誥宣酒如仙液滿肴自大官傳託迹雲霄上攀光日月邊樗材依夀㝢景福頌如川馬甲李廷灼年七十臣聞五福一曰夀維皇膺福古無有健行不息五十年川岳乾坤共長久威加六合恩八紘彩鳯般麟集郊藪良時偃武更修文嵗紀屢豐民物阜小臣司迾忝星騶知祝升恒日翹首欣逢曠典預華筵忝附耆英酌大斗既醉稱歌樂未央全勝豳風獻羔韭馬甲金玉璽年七十慶積昇平世頻思豢養初紀元符大衍受糈愧微樗湛露零瓊闕春風徧玉除欣陪耆老集載燕樂于胥馬甲董深年七十惟天祚聖聖紹祖引年鉅典若稽古夀宿森芒叟計千神蓍衍策數逢五宋代賜飲五百竒上遡唐時或倍之坐列冠裳間裋褐鵷行鮐背兩差池我皇錫宴開長樂劍珮趨朝兼齒爵叨秩星騶侍玉鑾承恩廣殿浮金勺猶憶從師衣絳袀憑仗威稜送喜頻昇平世宙梯航合偃武韜戈積慶新敢言矍鑠䝉天眷皓首還陪禁中讌南弧耀彩角亢明聖祺引翼羣黎徧馬甲黄維有年七十丹墀錫宴㑹鵷鸞羽士承恩列佩冠騶騎敢誇勤職守星營長幸扈巡䦨九重春色珠垣粲百福瓊漿露掌團自幸此身依日月叨榮時奉萬年歡敖爾布富本年八十七登蓬萊望扶桑不如九宇遊春陽采仙芝訪雲岫不如四海人人夀其夀維何瞻泰始奕禩錫之自天子天子萬夀賡喜起擊壤熈熈洽化美有詔臣工來逺邇歡宴一庭榮預此大小拜颺惟以齒稽前古盛無比不信試徵廿三史敖爾布趙士英年七十九日色瑶階麗春色夀宇濃鶴當珠樹集龍喜彩雲從逐隊申多祝叨榮幸此逢願惟長鼓腹恩賜慶重重敖爾布門衛國年七十八夀星現紫微聖人萬萬嵗餘輝被下土歡躍及臺𨽻濟濟千叟筵錫羡示慈惠添籌共祝釐近仰天顔霽萬年夀㝢中仙次壺與桂銜花微蟻忱亦助慶雲麗敖爾布蒋玉年七十七六莢仙蓂啟上春堯階瑞色紀恩新䕫龍稷契衣冠偉亦厠遊河祝華人一食工絳縣或疑年步伐馳驅壮者先誰似小臣逢曠典星杠晃耀紫微前二敖爾布徐琪年七十五華黍歌韶春品彚日滋長造物豈有私雨露均含養生遊熈宇中同入軒鏡朗不遺駑下材嵗月逐輪兩耆筵優寵宴樂聼鈞天廣迢迢霄漢間承露望仙掌礟手王士禄年八十效職曽馳紫塞承恩與宴彤廷千叟榮霑厨萐六符祥協階蓂既醉申以嵩祝同歌蕭斯露零南弧環拱紫極長輝春丙秋丁礟手王天喜年七十四萬年寰宇靄仁輝戰士還家耀錦衣鼓化惟聴雷啟蟄閒雲長䕶佛郎機一錫夀欣逢届上辰恩膏洋溢忭微臣登筵近列三千佀擊壤還同億兆人二養育兵張士南年八十聖治上登三箕疇敷用五樂夀徧八紘禔福逾千古戎行小臣介習武忽聴耆筵坎坎鼓欣榮化宇太平人萬載同依慶隆舞巻錦鞲擎霞盃春光皥皥從天來養育兵二格年七十六星麗南弧春回北斗地蟠天際主聖臣夀懋昭盛典以引以恬上自鵷閣下逮茅檐臣隸戎行七十有六得近光華皆荷優渥月給緡錢日餐廪粟未敢言兵但感養育養育兵塞克圖年七十五聖夀符升恒姬瓞衍千億韶春始和鬯共球賀萬國錫羡沛龎鴻濟濟羅耆徳玉墀啟髙宴仙醴酌温克頭白魚麗士忝列拜紫極惟仰膏澤深延年駐顔色養育兵張士傑年七十三肅肅列期門末熈熈同夀㝢春夙慚鷹揚奮勇近樂兔罝化仁宴錫韶風鬯被歌賡湛露榮均慶遇昌符駢疊列隨虎拜歡陳五營馬兵張永徳年七十七共聼新春詔仁輝布九天鴻禧凝上日嘉宴集髙年鳩祝歡隨列鳬趨慶接聨膏傾金掌露香惹玉爐烟心忝戎行末身叨渥澤偏龍鍾忘倚杖矍鑠竟揚鞭兩翼期門外千營禁籞邊承恩臣早逮溢喜已先傳五營馬兵劉漢文年七十五夀宴階墀列天家錫福新稱觴同燕喜紀律仰鴻鈞禮習衣冠肅光依譽處頻戎行一何幸歌舞樂熈春五營馬兵馬芳年七十三詹吉先人日耆年紀典崇行分槐棘下身入鷺鵷中玉陛光華燦瓊筵禮數隆顔知春倍溢額慶賜偏豐蓂紀韶初啟葵傾日正中歡歌遍遐邇萬福頌來同五營馬兵吕奉鐸年七十三青陽啟律金殿稱觥人羅佺偓福被埏紘需雲既上晉日初升儀寛仗陛喜溢蓬瀛矍鑠三千星雲匝合榮及介士恩厚何答敢効歌詠以伸獻納億萬斯年稽首閶闔五營馬兵陳起龍年七十一錫福開隆燕吾皇重引年依天恢夀㝢就日次髙躔懋典超虞夏仙班儷偓籛景風歡雀躍湛露詠蟬聨春愛寅賓届人同亥字傳誰知厮養賤親得拜堯天五營馬兵顧天池年七十一紫禁班從鵷鷺聨蓬萊地迥得春先月華西館來靈圉星麗南榮耀偓佺球玉總隨王㑹集璣衡逺邁保章傳皤顔咫尺依醲化肅拜醇醪飫綺筵五營步兵樊自誠年七十六玉案紅雲遥拱彤墀霽旭初暾鳩笻幾輩就列魚藻三章共論紫陌徼巡賦餼層霄錫宴銘恩聖神天子多夀共酌康衢設尊五營步兵劉俊年七十三聖神御世億萬載恢皇綱掲帝紘東焜西爥六合盡仁宇峩峩夀者來簪纓蟻忱跪祝環紫極聿舉令典肇錫嘉宴吹簧笙金樽寳醑釀自九霄露和以崑圃瓊芝英嵗陽旃䝉律太簇日在丙辰嘉禮成三千人濟濟鳬趨雀躍稱觩觥有芑邁豐水于蒲超鎬京漢唐賜酺豈足數如天巍蕩臣真無能名五營步兵呉彪年七十一九如頌裏歌升日三素雲中拜聖人康爵賜均千叟㑹夀祺溥作萬方春銀旛拂勝韶風麗丹砌開蓂淑景新潄醴含膏胥鬯洽天家懋典古無倫五營步兵趙國棟年七十二三靈翔協氣九有熈昌時天錫純嘏帝受之恢為萬古升恒不息之鴻禧是以太和所蒸被八埏四海多龎眉今年春正加寵綏上徵虞庠典旁搜周雅詩饗燕之隆未有三千聨席如今兹帡幪仰在宥榮預示惠慈何以頌景運拜手罄臣私惟願飽食春日長遊嬉望中佳氣充九逵五營步兵張坤年七十一錫爵從來重引年欣逢耆宴列春筵兕觥鳩杖天階上畢雨箕風太古前運際重熙遊浩蕩恩隆渥賜沛連駢六街巡衛身何似小草榮霑雨露便五營步兵楊進忠年七十一夀㝢瓊筵盛春光玉燭調相隨鳩祝杖共聴鳯儀簫瑞軼遊河叶恩均宴鎬邀老看黒衣隊榮奉紫宸朝五營步兵何成貴年七十一太平熈景樂新春佳㑹欣逢寵命申燦爛星雲連玉闕蹁躚鸞鶴集楓宸銀牌徧給文鐫夀綵勝初裁日近人禁衛森嚴叨列卒九重深處沐恩綸五營步兵黄徳年七十一慶澤周無外春逢燕喜時陽和隨豹尾瑞靄繞龍旂蒲萐承恩膳醍醐介夀卮㑹躋千叟列頌有九如詩仙樂鏗鏘奏祥雲糺縵移微軀同燕雀飛傍萬年枝五營步兵馬玉年七十露草匪陽周雅星雲復旦堯天時平乂用五福夀引欲至萬年甄陶鴻化無外巡衛鸞旂在前何幸叨榮渥賜春暉中近星躔五營歩兵孫建徳年七十式燕春旉澤羅鳩杖賜耆同人登夀世大衍應昌期籥轉三陽泰蓂占六葉滋瑞圖繩祖武福範茂孫枝帝錫延年慶人遊化日熈翔鵷環藻席祝鯁遍楓墀淑啟需雲象歡騰湛露詩願陳岡阜頌蓬島近堯曦五營步兵于清年七十喬嶽敦艮大圓洪覆悠久無疆嘉生咸茂煦之大和俾爾單厚是惟貞符朝多耆舊泰元俶辰晉日接晝鳩杖咸羅獸尊式侑樂聆九㲈禮忝四豆何以祝華聖人多夀五營步兵趙玉章年七十世如春而多夀皇恩祜以受釐九陌雞人曉唱五雲犀斚榮持臣甲週逾星紀王春數協神蓍籌算爵添無數臺熈人慶重熈步甲稍兒年九十二上日諏春吉彤墀敞御筵南弧星照地東海福増川式燕同芳醴扶鳩各長年蹶張居步隊抃舞共堯天步甲黒子年八十七瑞靄曈曨啟端月雲華髙映蒼龍闕玉筵瓊席羅殽蒸三千人為一大朋中外擎拳小大忭躍圓壺方嶠蓬萊山仙人何如老人樂聖人三萬六千年河圖逢十長開筵自此叨榮受恩始蟻縁雀躍臣願長至前􅇍甲關得年八十七日上紅雲早天臨紫陌寛乾符徵大衍需宴洽長安祺與春光集詩聴湛露漙叨從依玉陛榮擬上金鑾蒲質長分潤葵心共効丹迎陽歌燕喜還協萬方歡步甲六十一年八十六聖徳符三極春祺暢八垓無疆推日筞有慶奉霞盃鳩杖人寛賤鵷行㑹許陪耆英傳盛事筵向九重開步甲徳福年八十六神芝出地星麗穹和氣所積寰區同迓庥儲祉溢中外熈皥如見唐虞風獻嵗新晴應璿律斗杓東指春融融蒼顔鶴髪列嘉㑹珂鳴紘颺齊呼嵩小臣年經幾甲子異數喜以垂老逢七萃風雲向頻忝九重雨露今何濃賜酺從嗤鳯樓集作圖不數香山工堯天日月綿萬紀單厚多益皇基隆步甲五十九年八十五八旬有五荷仁暉盛典叨榮近紫微鳩杖登筵諧鷺序兕觥當仗映龍旂黄圖此日欣長健赤羽從來効一揮矍鑠莫言身下走袀衣真惹御香歸步甲伯成年八十四景運孚璿筩昌符應南極茀禄隨春來渾噩協帝則夀合三千臣延齡肇萬億仙露浥三漿芝雲絢五采佳氣藹鉤陳小草荷滋植步甲麥住年八十二栁營環列步生風干羽猶能舞慶隆化㝢熈臺遊最久太平嘉宴沐恩同一炊金饌玉出天厨藁飫分榮賜大酺韶景年年常得駐仙盃春喜溢屠蘇二步甲王坤年八十二春滿象魏闕下恩深魚藻池邊盛超漢室酺燕榮及絳人嵗年日月光臨砥屬松雲夀養蜵蜎放諸薄海而凖身在太古以前步甲文保年八十一久道敷仁夀韶暉紀盛筵鴻鈞旋淑氣景福曜中天鶴髪尊罍共螭頭拜舞駢捧觴同有祝篤慶萬斯年步甲趕生兒年八十一干羽升階日春和帝有俞養恬恢舜典藁飫渥堯厨淑氣籠雙闕歡聲溢九衢叨霑逮厮養身賤亦嵩呼步甲胡徳年八十七顯顯令徳懿鑠淳茂萬夀維祺亘古罕遘長養率土載歌黄耉和以天倪亦孔之厚福禄來崇龎眉皓首帝曰臣民綏爾眉夀眉夀祝聖自天降康子孫千億五世一堂推恩錫類蘭殿稱觴華封三多天保六章職無貴賤載賡載颺仁風之煦化日之長步甲二徳年八十太蔟回春律蒼龍斗轉衡萬方同福禄奕禩頌昇平宴喜開蓂砌恩叨酌兕觥合簮隨綺角聨袂接籛彭步伐何分賤追陪共慶榮年年逢此㑹願預聴咸英步甲白達子年八十新詔開鳯紀恩宴及芳辰象闕圖王㑹螭坳集老臣三千耆夀盛八十嵗華新叨預春光照榮加賤者倫步甲劉得年八十古皇養老召祥符丹鳥青鸞瑞應俱何似聖朝隆作述耆筵兩度燿蘿圖一綵斿日霽動天顔春酒恩榮次第頒惟願需雲長燕衎年年身預列仙班二步甲陳延年八十詄蕩天門啟春風綵仗齊金莖均浥露鐵甲已藏奎席接千官末笻分九節攜不圖芻秣賤叨向泰階躋步甲閆士榮年八十槐街迾卒愧無能八十驚心馬齒増今日天家頒慶賞鵷行玉陛喜同升一小草長邀雨露恩白頭何幸挹蘭樽從兹擊壤歌衢後擁曝茅檐話子孫二步甲舒昌阿年八十砆石五百嵗久成黄澒稽淮南以知人間物惟其夀者増竒談况臣尤厚幸夀命皆䝉元氣涵恩榮預錫宴賤微一一偕朝參巻􅎽拜天子既歌且醉樂且湛欽聞元日詔道敷四海恩方覃步甲他思哈年七十九中天輝麗日嘉禮協芳辰已慶文成化真看世似春戎行叨齒長耆耉引年均渥澤深霑浹惟慚荷聖仁步甲二達色年七十九瑞滿蓬萊旭日紅筵開天上集羣工嵩呼華祝區區意步向雲衢願總同一寰宇昇平瑞應多人躋仁夀樂婆娑賜酺人與登廷宴鼓腹皆為飲太和二步甲三格年七十九五福堂中瑞瓞緜熈春慶溢廣輪圓詔開廣宴梯航集班序髙年鵷鷺聨蕭露徧霑皆夀愷蓬壺能到即真仙微臣願比封人祝盛典長叨億萬年步甲張六年七十八聖恩優詔大年人引養筵開宴列臣身樂太平長嵗月今朝近仰九重春一行間効力被恩多挾纊年年自有歌從此承筐霑兕爵不須醵飲重紅螺二步甲九兒年七十八盛世彰人瑞三千鶴髪排温綸敷日下春讌啟天階令節翔和氣年光愜壮懐叨榮受康爵渾忘束鞞靫步甲官得年七十八黼藻洽萬類鴻龎臻百福錫祉萐盈千慶瑞蓂啟六雲瞻碧漢崇氣映瓊階淑南極乍呈黄東皇正舒緑仁夀懤九宇龍光燦輦轂詎言山澤臞餐芝餌甘菊步甲立住年七十八邊陲即叙久韜戈帝闕開筵錫太和吹萬熈臺春色滿三千黄髪醉顔酡一稍食天家賜予寛持更戒夜𨽻兵籣丹霄喜共陪耆席春酒温生氣不寒二步甲成得年七十八帝城麗日耀昌辰稠疊恩施巽命申金戺崇開千叟宴玉墀齊慶萬年春自天澤溥鵷行徧率土歡騰鶴髪均文綺精鏐同錫福霞漿雲液總含淳祥飈入律笙鏞叶徳貺充庭玉帛陳扶杖幸承天有喜熈遊長作太平人步甲二格年七十八玉饔兼銀饔長占瑞應圖姬爻需有象羲畫泰相孚四閣敷文治三登協聖娛貞符隨曼夀扶杖聴都俞步甲陳得年七十八星雲迎策日龍鳥紀官初景運開䟽仡皇猷邁赫胥瀛濛恢赤縣珠璧䕶丹除愷樂從髫齔娛游徧粒糈春祺耆耉洽華宴醴肴舒盛世歌熈皥濃恩頌燕譽鵷班聨肅穆璃珮集紓徐帝夀超千億神穹福祉儲欽定千叟宴詩巻三十二
