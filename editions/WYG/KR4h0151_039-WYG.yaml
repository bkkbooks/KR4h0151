body:
  text: 巻三十四預宴九十三人詩一百四首䥷草人李恒榮年九十六天閑十萬馬老猶賦菣芻堯封億兆民老乃賜粟􅃭始知聖朝最重老賤者原不遺臺輿今朝三千人入宴食天禄夀最高者一百五民乃次之九十六草細馬易肥恩深人亦少捧出銀牌三十兩歸告孫曾嚇嚇笑學作口號詩人生樂莫樂九十身同一品貴萬年天子手賜爵䥷草人盧萬敖年九十四彤廷真夀㝢佳㑹接仙寰豈有芻蕘獻同依葵藿班羣英徵洛社盛事陋香山手爵殊恩錫還丹更駐顔䥷草人丁國榮年九十二迢迢五雲中濟濟神仙羣霏霏屑珠璣粲粲輝簮紳下集三千叟上奉萬年君桃獻東方實曲奏南風薰嘉㑹浹歡讌引年循禮文臣賤週甲復逾半自謂頗不後於人豈知尚有一百五嵗之老即以齒序自媿非其倫太平之世人多夀猗歟盛典超前聞歸來告語鄰里笑賜爵添得酡顔醺䥷草人兆宗年九十聖皇御夀㝢萬邦和㑹同開韶麗紫禁凌晨趨丹楓錫宴恩溥被羣遊大化中華芝光燦燦仙茅彩氃氃天厨欣屬饜榮鬯披春風履蹈咸肅穆斑鮐益龎鴻三呼申華祝聊以抒葵衷䥷草人高雲昇年八十九春早葭飛律正調東來紫氣靄層霄延洪有慶星辰㑹幬載無私雨露饒詔啓瓊筵臚耄耋禮頒鳩杖徧臣僚誰知也及芻蕘賤九十明年惠更邀䥷草人邵宗炳年八十八帝治邁軒昊元氣運台斗恩榮逮八極敷鬯徧薪槱吉日蠲孟陬肆宴集耆耉列坐先臺萊逮賤及澤藪猗歟泰運隆崇山峙嶽阜仁徳揚春風草木無私受共進萬年觴宙合躋仁夀䥷草人隨亮年八十八萬國冠裳蹌濟九重玉帛繽紛皓首筵陪北闕康衢人坐南薰廐馬秣之加惠庭蕭蓼彼揚芬竊幸堯天長戴春祺普錫仁君䥷草人竇國林年八十六時清徵國瑞引年殷宸衷諏吉孟春始詔開乾清宫珍羞羅山海仙音流絲桐煌煌南極星環向微垣中何圖草莽臣得躡耆英蹤敬抒葵藿心嵗嵗齊呼嵩䥷草人國順年八十六天顔知有喜國瑞慶希逢黄髮盈䨇闕丹書沛九重大年添鶴算華饌動虬鐘庭列延齡草階蟠益夀松秣芻欣職掌芝菌驗丰茸錫杖矜扶老逾常雨露濃䥷草人劉邦吉年八十五天子萬夀居明堂保合太和綏萬邦春王正月越六日帝曰我受命溥將俾爾夀而臧以飲食宴樂萬邦惟慶君子耆老齊齊翔翔庶人耆老濟濟蹌蹌小人之徳草以近天子之光集經語䥷草人蕭國輔年八十五芝檢傳宣下玉階芙蓉金闕八音諧菲葑下體承恩遍帝澤如春小草偕一草是恒春應候新氷梨火棗尚方珍仙麻炊飯桃花酒五色雲中拜聖人二䥷草人蕭鼎年八十三古稀天子坐明堂握符闡珍撫萬方中天盛世何所似熈熈皥皥虞與唐已見吉雲來海徼更徵朱草生堂隍百官效職大小序禮樂糺縵以輝煌日暄雨潤五十載㤗階玉燭徵時昌旃䝉嵗啓乘青陽嘉兹人瑞華筵張芝顔松彩列庭右鬱金杜若揚芬香職供芻秣饜飫久黄髮兒齒隨趨蹌捧流霞觴歌盛典嵩呼華祝申無疆䥷草人卓四年八十四臚歡賡夏諺偕樂上春臺七紀芻忱久三霄寳笈開照顔金綵勝接席玉霞盃願挹浮邱袖年年獻夀來䥷草人吕五年八十三春色肈盈仙仗天光榮被鑾坡華杖刻鳩示養韶鈞鳴鹿惟和果腹賡難老頌還顔進萬年歌鵷鷺行餘甿𨽻皇恩錫福孔多䥷草人周明年八十二太和春盎及芻蕘白髮欣承異數邀稽古曾聞隆憲乞恩深能否嫓熙朝一萬夀祥開五福堂史書佳話邁虞唐華筵宴後圜橋集更溥春祺上下庠二䥷草人謝仲金年八十二嵗序開韶暢皇仁逮菲葑依春同藿靡被澤益丰茸夀有千筵積祥真億載逢小臣榮盛燕九節擁仙笻䥷草人韓住兒年八十一洪惟聖皇斟元撫辰函之如海養之如春海以為福涵被奫粼春以為澤豫茂輪囷琪花瑶草大海之珍仙蒲瑞芝恒春之淳大福備矣五紀方新熙春茂矣千叟來臻帝錫威儀宴及耆民猗與盛哉萬古莫倫䥷草人張文鑑年八十一聖夀無疆愷澤醲得賡盛典傍堯封八旬開一韶光洽萬嵗聲三喜氣雝小草榮叨依鳳掖長齡恩許策鳩笻庠芹池藻寜堪數人瑞輝煌古未逢䥷草人孫國柱年八十嵗鳳紀詹新嵗龍光荷聖朝開筵趨廣陛賜酒㑹羣寮砌草依初日衢尊挹大瓢八方同渥澤一例到芻蕘䥷草人王五年八十一春色何如慶典隆仙茅紫脱萃豐鴻偓佺上夀松喬舞一體臣民愷讌同一飲醇人盡上春臺縵縵彤雲向曉開白髮圉臣増矍鑠古稀天子賜酺來二䥷草人陳三年八十春庭華宴溥耆夀集三霄賤𨽻欣開袠隆恩許杖朝屠蘓分上日燈火近元宵薄海榮敷錫歡聲洽九韶䥷草人馬五年七十九中天際景運春祺普四海晨光飛五色紛郁彤庭彩天子錫嘉宴臣民咸夀愷醴醪敷鬱金珍羞薦蕙茞耳聆笙磬音目覿雕繢綵生平所未經慶積皓首皚蹌濟隨千叟圉臣䖍匪怠拜跪嗤無文歌謠慚並采敬惟衢祝詞福夀綿億載䥷草人王九年七十九玉琯呈祥霽景垂仙壺錫福慶追隨臺添春色登熙洽宴及耆民荷惠慈華髮共瞻丹禁彩瓊筵欣奉紫霄儀無知無識羲皇世懋福惟賡萬夀卮䥷草人盧金年七十八南極星辰麗蹌蹌集衆官知偕滄海内環祝紫雲端草芥春先到鮐黎齒未闌為䝉芻豢久俾浹醴醪歡次第芝同彩蒼􅀷松共蟠愚偏親禮樂賤亦預龍鸞道大乾坤泰恩多嵗月寛覲光榮曷似天子賜還丹䥷草人任黑子年七十七佳節傳柑近春和淑景陶衣冠皆齒序耆耋更年髙雉彩開宫扇猊薰繞御袍韶光熙夀宇晴雪潤恩膏紫禁開魚鑰彤庭建羽旄肆筵陳玳瑁舖錦豔葡萄示惠施葵藿聯情及草茅莫徒歌既醉寵賚拜嘉叨䥷草人立柱年七十六蓬壺春盎敞華筵五色鳩扶舞蹈聯珠榜珊珊疇錫九金貂奕奕數盈千笙簧響遏螭雲縵組綬班承鸐髮鮮何幸推恩逮圉牧嵩呼同預祝堯年䥷草人郭思敬年七十六寳座環耆碩如星拱帝居五霞凝上爵十日逮厮輿尚齒儀文重承恩拜跪徐野人何以獻惟頌福川如䥷草人黄庄爾年七十五聖主徳齊幬載昌辰瑞紀綏豐萬億京垓景祚東西南朔同風夀㝢廓敷禹甸耆英共獻堯鍾圉僕叨塵班末依光敬頌延洪䥷草人黄國泰年七十五京尹門前牓示懸近畿次第老人傳嘉辰千叟沾春宴吉亥三推舉耤田一兒孫迎送一家歡銀布攜歸笑共看籤寫賤名天有喜由來國泰在民安二䥷草人孫恭年七十五瑞靄䕶宸居恩筵錫福初寅賓羲仲日亥宇老人書職稱思駉馬年豐兆衆魚輿臺霑盛典拜舞樂何如䥷草人馮住兒年七十三律轉星迴春滿郊身隨千叟拜螭坳萬年康阜依乾健九㝢融怡叶泰交長養從來資雨露霑濡何幸及蓬茅恩光徧地含生意嫩甲敷榮亦觧苞䥷草人路守榮年七十三天馬徠西極春遲苜蓿繁連雲披逺塞浥露上髙原掌圉從徵役瞻墀幸拜恩欣榮同小草長沐惠風暄䥷草人王林年七十三絳霄並慶玉燭均調徳風廣洽長被芃苖萬夀惟祺作隆周雅鮐耉眉梨逮芻蕘者欣榮草芥仰近松喬導和鼚豫惟奏衢謡䥷草人謝住兒年七十二向日心同藿盈堦瑞騐蓂東風方拆甲南極已占星玉陛羅黄髮金尊汎緑􅙩恩敷羣拜舞億載慶盈寧䥷草人四兒年七十二律轉三陽斗柄東九衢春旭照曈曈天家錫福來千叟齊向瑤階拜舞同一祥敷六㝢際昌期况在蓬萊泛玉巵似海恩寛慙報稱惟知擊壤太平時二䥷草人張三年七十一洪惟仁夀宇老者聖人安自念馳驅賤欣逢禮數寛芝田榮秣馬閬苑聴和鸞際此申臚祝應知曠古難䥷草人黑色年七十一化日優游化宇深禮年嘉宴賁綸音中林漫笑丁丁韻也繼康衢撃壤吟一金爵觚稜瑞色凝欣逢羞耉百司徴草人敢似周官職身到丹墀得未曾二老民郭㷍年八十五聴老民歌大清自民屬有生天下乆太平田幾頃菜幾稜𤓰蔓引架豆縛棚日出而作日入息餘糧棲畆家添丁牛領犢齕草喌雞喔喔雛啾鳴八十餘年不聴尨夜驚織布暖勝繒麥飯軟勝秔春社冬臘比鄰老㓜邀且迎昨者鵲噪簷曉聞里正歡呼聲乾隆五十年新正皇帝大開千叟宴京兆府帖首列老民名問何謂叟云是老人之通稱上自宰相下及農商工自六十七十以上咸集於帝廷老民無知乂無官職何以受此格外之恩榮東鄰理襟帶西鄰整冠纓北鄰𨗳前路南鄰相送行天開日朗紫禁城玉階列坐亦弟亦兄盤肴疊至私問答不能但叩首謝恩萬嵗聲歡騰拜舞領賞歸兒孫迓柴荆詰詢欣羨出至誠共祝我皇帝萬萬年康寜老民年年嵗嵗五穀皆豐登老民謝惠年八十五野老邀天福欣瞻榜詔黄一時同受賞近者得觀光早覺春陽暖親擎御酒香從兹霑聖澤億載願為常老民錢玉潤年八十五蹕途春省拜鑾輿畿甸頻邀秸􅖽除久幸含餔歌聖澤欣敎釋耒列朝裾枌榆嵗月符恬養尊斚光華洽燕胥芹曝敬將天保頌康衢野叟紀恩初老民王國興年八十四福疇敷錫古稀聖麗正中天懸夀鏡化宇同躋八表寛農祥仰叶三登慶黛耒年年帝耤耕杏花影裏乳鳩鳴每從繡壤瞻雲日親為茅簷課雨晴熙熙樂嵗盈寜共臺笠東郊亞旅從扶杖春秋醉社醅含餔朝夕歌豳頌莞席瓊筵天上開田間優許老農來獻芹恭效三多祝鞠􅎽歡承百福盃老民李邁千年八十三耆瑞韶華旭景和老農欣得列朝珂豳風圖裏稱觥祝春酒筵前擊壤歌黼座斂敷長樂夀茅簷耕鑿浹熙和銀牌鳩杖身親捧禮較虞庠沐賜多老民王進玉年八十風吹香露繞金鑪黄髮聨班拜賜俱夀宴宏開恩浩蕩老民何幸飫仙厨一年時拄杖出柴門桑柘隂中據席尊自此歸家入春社敬從鄉里頌皇恩一老民莫鼇年八十一曝背日初長春風徧八方年髙身亦貴恩重福難量但愧謳歌陋先求禮數詳南榮望南極人道近龍光老民龔貴文年八十一里居依輦轂熙熙還皥皥作息勤三時歡歌少而老田家豈不苦所樂在安飽長荷皇仁深養拙不求巧欣逢開耆筵推恩及華皓咫尺便瞻天渥賜得珍寳膏雨無不滋欣榮及小草老民孫世琇年八十一螭陛春遲曉漏聲仙班高㑹列蓬瀛瑶籌十屋頻添算酒醴當筵拜賜榮一條風吹暖上珠竿四海人騰夀㝢歡勝引鑪烟縈碧篆萬年長此進春盤二老民李天爵年八十春祺宏錫福華讌敞彤扉花影濃移仗爐香馥繞衣幸叨從國老喜見霽天威草野恩何紀惟知往牒稀老民盧從民年七十九一垡深犁一稜秧田家二鬴瓦盤嘗三更餵犢籬邉草四月牧蠶屋後桑五角六張成喜事七人八穀兆嘉祥九重御宴沾恩大十倍豐年早納糧數名體老民潘在田年七十九九醖傳中使千珍出上方承恩同有慶祝嘏本無疆芹獻羅松牖葵傾仰栢梁生依畿甸邇雨露近天光老民呉思問年七十八彩霞百道繞蓬萊聖澤如天慶宴開砌集星班祥炳蔚筵臨羲御福恢台夭喬盡是依天養鞮譯都縁就日來萬國頻年邀粟帛百齡上日泛尊罍英芝耀色餐三秀蓂莢舒英溥八垓豈待金泥兼玉檢聖朝真瑞錫耆鮐老民劉啓瑞年七十八大衍符昌運恩覃九㝢中椒蘭叨法饍葵藿切愚衷綺席耆英滿茅檐樂愷同一從霑渥賜暮齒感春融老民劉殿臣年七十七杏花尚未開菖葉尚未青春耕未忙春酒馨昨日屠蘇後幼齡今朝健步趨皇廷隨班拜祝南山夀凡百應先讓南畆上幸祈穀龍見雩但見皇心為民厚民以髙年鼓腹嬉皇躬長厪行三推又聞來月辛亥吉盛率保介瞻庖羲老民齊世倫年七十七聖主推恩雨露漙引年行慶萬方歡自慚朴野無知識但覺天家禮數寛一桑麻黍稷一村村耕織圖成保赤恩從此定須添畫筆老農身向九重門二老民蕭文炳年七十七綵旭升東瀛芝雲耀南極宏開介夀筵髙敞神仙域民為褦襶儔稼穡有常職倐辭綠野中敬在彤墀側司徒昔掌教養老列保息不聞親見天稽首近契稷禮寛恩愈厚齒長樂無極試獻田間歌式穀祝萬億老民胡信年七十六遊聖世占農祥此星煌煌在東方斗杓指之開泰陽永與南極連輝光年豐人夀無不足吹籥歌豳滿茅屋一朝朝天預頌祝歡聲處處騰樵牧小民生年七十六年年嵗嵗邀天福五風十雨時徃復慶綿長不待卜老民盧清臣年七十六巍巍神聖君造福同髙天萬年奠四極耆夀徵羣仙鴻恩敷億兆丕冒無私偏民幸畿甸居策杖隨三千豈復知賤微上與官階聨拜呼效祝聖雖樸當遙傳老民張忠吉年七十六百族淳龎萬國偕泰鴻調氣被無涯人依北極占南極象叶堯階正泰階共識夀多惟斂錫不知名賤亦班排古來縱數枌榆社何似䝉恩入禁街老民王良材年七十六暖律藹荆扇春風播紫微稱觥榮帝賚扶杖念民依朶朶祥雲集家家彩燕飛身如近暘谷獨早受曦暉老民徐務本年七十六七月流火豳風詩七十二候循環推春鶊秋蟀遞膢臘東風解凍今其時我皇惠民念微物恭聞睿詠揚天慈天時未及運回斡先天有旨昭昭垂小民隨時老耕鑿日受皇眷誠何知遭逢盛典又錫予傳酒捧杖觀威儀高筵既醉謝渥賜祗覺夀㝢皆龎眉臚歡騰歌豈備述擊壤惟進田家詞老民王克欽年七十六瑞雲凝瑣闥珠榜集簮裳喜得偕華髮相隨捧御觴春祺歌有慶聖夀頌無疆幸竊長庚曜欣承北極光老民任兆基年七十五皇仁暢蠕蜎慶賚承漿醑八闥集童顔四瀛皆夀㝢人徵中上夀世越逺近古顓愚本無識光被依多祜憶從少壯來醉飽偕率土西濛赤縣同南極黄星聚環跪頌無疆二儀輝藻黼老民沈國經年七十五嵗陽在乙暢春膏人仰天階綺席高聞説華胥開夀㝢親來蓬閬㑹仙曹恩垂草野開蓮漏風動階庭響玉璈正是昇平遊化日聖皇萬載庇神臯老民劉豹年七十五上瑞熙朝集春風瑣殿開萬方朝北極千叟萃中台鶴髮羅瑤席酡顔映玉杯歸應耀閭里曾飽御厨來老民牛從徳年七十四重霄璀璨紫烟霏皤髮連羣捧御闈五代祥欣同國慶萬齡仁更切民依耄耆有象徵人瑞草莽無知被德輝渥宴自天新嵗月恒歌蕩蕩復巍巍老民趙愷年七十四天之高也民則戴之春之温也民則被之年逾七十無知無識宴賜三千如淵如天伊三千人積廿萬嵗在億兆中其數莫記天子賜之少懷老安乂增賜之玉醴金盤闕庭峩峩華筵馞馞仙杖捧歸皇衢四達逢彼姻婭話於家人帝夀億載福禄來申老民魏泰履年七十四高廪三農慶謳歌頌太平聖心宏樂夀曠典逮耆英人識詩書耨家傳禮義耕黄冠歌草履紫殿奉珠甖嵗月軒皇賜閭閻綺皓并逺聞周粟帛邇得聼韶韺仙酒千筵遍祥雲五彩生從兹扶緑杖枌社話恩榮老民王瑞年七十三帝心優庶老盛宴與嘉辰花蕊芳林曉波聞太液春力田霑玉饌頌德捧香醇解聼昇平樂皤顔草莽臣老民劉自玉年七十三聖恩仰戴天高厚飲和食德安隴畆玉燭調時撃壤嬉春臺登處含餔久綵仗省耕温霽曕綸音賜復便蕃受星拱欣占農丈人社酺竊擬鄉祭酒恭逢優老張韶筵覲光仰列三千叟寳甕芬氲酌露英仙笻璀璨䥴瓊玖願將里諺祝筵前真覺豳圖開座右老民李永祺年七十三泰運春開日天恩賜福祥長筵開雉尾庶老荷龍光饌飫仙厨美壺斟玉瀣香殊恩稠疉遍瞻拜頌陶唐老民劉萬魁年七十三四海内㡬百家子孫曾元衍瓞𤓰建坊銀迭聞賞百嵗有餘輝楔牓飫粟肉被黄絹月正元日皇恩徧聖神天子五十春凡厥有生皆夀人夀而康夀而富養之教之優禮之莫非天子之所予上天生人都畀以夀善則迎祥明神所佑民愚無知洊及黄耉獲趨耆筵以釂以侑始知化育之深仁統乾坤内皆在宥歌盛典拜堦庭安生樂業成大瑞年年錫羨乂添齡老民劉興朝年七十三耆筵練日開乾清椒花柏葉晉兕觥侑卮下逮康衢叟圖繪寜推洛社英社甕村蒭醉豐樂何期九陛聫酬酢服疇食德紀樗齡就日曕雲添爵躍三殿春風挹霽温歡歌帝力復天恩茅堂曝背同亞旅萬嵗千秋祝至尊老民白世瑞年七十二帝澤慶寰中編茅錫福同八紘咸輯玉萬嵗共呼嵩眉夀春先集頤愉嵗愈豐華筵駢賚錫扶杖覲宸楓老民鄭作通年七十二三殿筵開廣惠慈田間老叟慶班隨書陳康樂圖豐樂澤普春祺洽夀祺耕鑿幸敎依繡甸淳和喜得奉金卮擊轅擊壤音慙雅拜捧銀牌切向葵老民秦志年七十二懋典洪開瑞旭升自田間至玉階登頌陳天保民之質班殿耆英夀作朋帝以敦龎敷宇宙人將淳厚答升恒丙丁見處三千合甲子書來四百增尊設中衢超酺酌禮崇貳膳飫肴烝年年鼚舞皇仁徧豈僅豳堂兕載稱老民楊萬年年七十二聖人御宇薄海昇平敷錫百福咸荷生成懋舉盛典讌集耆英鶴髮鯢齒三千數贏東方桃熟南極星明日麗風和春光載榮彤階率舞皓首稱觥載誦衢歌式和鳳笙老民陳珩年七十一耕鑿優游頌大田綴行欣得與耆筵劭農普衍倉箱慶藏富頻欣藁秸蠲寰宇夀祺增似海聖恩恬養拜如天署名喜得同華祝稽首螭坳上萬年老民朱堂年七十一玉衡杓建青陽始毓大蔟宣和旃䝉錫福聖夀億齡耆氓比屋聿安耕鑿長慶土穀今至鮐顔得參瑞籙露浥吉雲輝騰建木漿醴斯飫樽疉有馥五慶三矞臚歡晬穆老民王永富年七十一五雲深處奏仙璈蓬閬春温賜玉醪勝似瓦盆春酒熟飲教亞旅各分曹一惟有田間樸茂多偕來華闕仰巍峩五風十雨年年慣樂夀歌聫豐稔歌二老民王徳純年七十一聖德溥泰階平和氣洽春風生禮秩秩樂喤喤國有慶逮耆氓錫宴敷嘉瑞臚懽飫夀觥小臣榮附三千叟衢壤歌偕華祝賡老民徐祖佑年七十一九重昭曠典優老逮朝鮮赴闕三千叟瞻雲咫尺天春韶添翠琯瑞露滿芳筵編户均叨賜稱歌祝萬年老民陶孝斌年七十一條風扇瀛洲禔福被寰宇洪惟古稀聖登三更咸五樂夀覃皇風熙洽躋淳古朝列多芝眉恩禮逮蓬户甘膏汎衢尊白粲給神庾與宴皆彭佺金門即元圃天顔和且温法曲南薰譜太平躬耕桑異數欣同普抱甕知俯仰承蜩愧痀僂抒誠獻芹曝既醉乃軒舞老民莫家魁年七十一角亢聫翩表夀星訾娵六日賚喬齡璣衡斡運三階正直邁尊盧軼大庭襏襫鎡基頌有年康寧為圃福為田生成都是天家賜億萬鴻圖夀㝢懸二老民楊生年七十帝德眷喬齡如春錫嘉宴醴觴載露醑璚錦披霞燦生成仰天地耆耉及郊甸有慶積寰瀛為基達愚賤知識康衢氓福夀華封衍留甘鼎始調餘慶雲常煥枝榦接鴻濛容成詎能算老民翁樂諺年七十夀人閲厯比人多敬上吾皇至治歌日月在天光有耀江河行地海無波含生盡得喬齡賜尚齒還徵綺席和獻嵗迎祥開玉律隨班叩首醉顔酡老民張樹仁年七十璇圖啓太乙嘉燕洽韶春何幸恩綸被恭沾湛露新年華齊絳縣耕鑿𨽻齊民稱兕風堪繪依葵日最親賚頻邀粟帛詔許殿簮紳歡捧銀牌重欣擕鳩杖珍茅簷深雀躍草野荷鴻鈞擊壤還參雅謳歌聖化淳老民許士亮年七十瑞旭初開慶賜酺三千黄髮飫仙厨階前拜舞春雲麗齊效嵩山萬夀呼一駢闐敷錫洽春祺不數成周湛露詩慶衍蘿圖膺景貺聖皇萬載德為基二老民劉永年七十曉聞鳴珮玉珊珊麗嵗先春淑氣還華髮羣工分鷺序龎眉庶老與仙班占風課雨勤天鑒望日趨雲近聖顔今日御爐香篆裏欣陪鶴侣頌南山老民韓邦賢年七十錫福純麻被承恩嘉宴叨星騰南極麗垣拱北辰高春釀斟雲液仙鱗膾錦刀田歌不成調也染鳳池毫老民梁從賢年七十旃䝉獻嵗韶陽新恢峩峩彤庭綺席宏開連羣接武同覲鸞階滋濡湛露饜飫新醅聖帝優錫恩溥埏垓百年長養齒髮鯢鮐敬守蓬葆日藝蒿萊榆齡溢望福衢春臺從搢紳後次序瓊瑰晬穆天表光榮上台醲華春永耆宴追陪惟知擎跽頌萬年杯老民項萬年年七十玉燭調春協氣宣恩周耆叟宴三千共欣瑞萐承堯膳齊慶薰風洽舜絃錫福已看覃薄海受釐端合紀中天賡颺更切稱觴頌微賤名先兆萬年老民王德夀年七十生為太平民民愚何所知但解飽喫飯裋褐以為衣子孫得長養風雨樂順時不識不知者正如康衢詩側聞諸道路幸生在郊畿天子愛小民恒為衣食思入冬盼雪澤未旱望雨滋占星候雲霓乙夜衣常披章騰御座置詔詢驛騎馳正供及嵗漕五次蠲普施或有偏歉告牛種利耘耔長賑復加賑萬萬國帑糜三皇五帝來未聞若今兹小民生盛世歡樂不可支田多大有年飯白霜流匙前村老翁嫗曾孫乂抱兒一日復一日不覺臻耄耆幸來沾恩宴老伴聚彤墀果腹大官膳卅兩懷朱提歡頌慚草野欲言拙於詞惟祝萬萬年恩德身被之朝鮮國陪臣正使李徽之年七十一春回夀域物熙熙五紀光臨福履綏惠澤廣推千叟宴慶庥爭獻萬年卮堯蓂日月垂衣地禹貢山河集玉時身惹御香同内服欣聼管籥頌恩私朝鮮國陪臣副使姜世晃年七十三勝日金宫敞御筵熙朝歡慶入新年七旬遐夀人稀有五紀光臨史罕傳宇内羣生爭蹈舞樽前千叟與周旋小邦賤价躬親覩還報吾君共祝天欽定千叟宴詩巻三十四臣允祁等謹奏為恭謝天恩事欽惟我皇上健叶乾元光符恒照太和醖釀四瀛共樂恬熙至治馨香五福聿昭敷錫夀如君奭垂紳者半屬耆英人樂陶唐擊壤者時逢野老不知不識淳風日習於華胥可詠可歌醲化實超乎疏仡蓋自我朝之啓運㑹合貞元洪惟聖祖之當陽澤覃翾蝡皇春帝夏經三朝培養之餘卿月民星均一氣陶鎔之内沃土之發榮有力松柏多蕃恩波之滋溉無涯鯤鮞易育時和人夀幸逢極盛之年治定功成乃舉非常之典丹臺註籍姓名炳列于琅函黄髮聫吟萹什長鐫于金版至今日傳為盛事恒溯前徽惟我皇曩在沖齡親逢嘉㑹含飴有喜一堂而聖聖相承刻玉延禧三世而心心遞授當萬象蕃昌之後更被以慈祥際九州清宴之期彌加以愛養天和感召疉致庥嘉民氣懽愉咸歸仁夀兒童竹馬四民各長其子孫耆老銅鳩百嵗頻登于章疏優游化宇㡬忘太昊春秋沕穆淳風惟記唐堯甲子週而復始循環開大衍之圖合而居中推筴紀旃䝉之嵗體元惟聖書無逸以延年申命自天詠宜民而受禄七旬勤政信知夀考惟祺五世同堂是曰康彊逢吉惟皇建極道隆而諸福來同與物皆春恩溥而庶民用錫爰徵舊制式開尚齒之筵乃命新正特舉禮耆之㑹朔逢辛亥適符絳縣之高年日紀丙辰恰合黄軒之初嵗律吹葭管應協氣于三陽瑞驗蓂階抽仙莖於六葉蒼龍闕迥鴻臚𨗳朱邸之封白獸樽陳閣使引黄扉之老九官備位序卿士之崇資四岳分行任封疆之重寄雁行綴列武階駢立乎文階鮐背扶擕末秩追隨乎華秩雪明白髮佩鍵參控鶴之軍草映青袍鼓篋有囊螢之士列百工於六職匠氏不遺生九穀以三農村翁亦逮十洲路近兼徵海客於東瀛五色雲高同映星文於南極絳霄春暖度日景之遲遲紫殿晨開仰天光之穆穆先親先貴身依黼座西東序爵序年席接彤墀左右華茵重疉但看錦繡周羅廣樂鏗鏘兼見魚龍曼衍天厨饌玉分餐佛界之香神鼎烹雲飽飫仙人之膳加籩示惠侍衛擎盤賜酒䝉恩皇孫執斚壺寜百福酌北斗以連醇人效三呼祝南山而稱慶夀星叶瑞角亢絢采于瓊霄睿藻飛文奎璧連輝于寳刻如意帶天花之蕊宛轉隨心牟尼貫寳海之珠匀圓入掌紅藤扶老未輸藜閣之光紫毳袪寒絶勝蟬冠之珥􅉊毺充篚織皮來自崑崙吉貝輸賨緝羽貢從溟渤七襄組織絲絲出天女之工四寳璘㻞事事擅文房之勝鐫文九字共看捧出精鏐委佩䨇垂更喜錫來鞶帶至於未題仕版而耄耋之已登亦容親謁天閶得金繒之均賚自國老達于庶老義取兼收由大臣逮及羣臣仁同一體地天叶泰欣帝道之光明宴樂占需因人情之悦懌歡心浹洽同游夀㝢之寛喜氣融怡共頌春祺之渥蓋五十年㡬經長養雨露霑濡斯三千人俱荷帡幪風雲際㑹化成久道自然福驗康寜運值昇平乃使物皆昌遂老成嚮用朝廷昭平格之符耆舊熙遊草野有期頤之慶處處松喬之伴侣何待茹芝人人園綺之衣冠無須餐玉後先繼軌惟孫謀祖武之重光古昔無倫實帝典王謨所未睹洵哉矌典允矣鴻規臣等幸際昌期久承聖澤質同樗櫟資膏潤以回春老比駑駘叨秣芻而能步舒長化日桑榆之景應延温煦恩光葵藿之心倍切齊歌寵錫音如大海潮音願祝福綏數似恒河沙數乾坤翕闢周回納甲之干支風雨和甘涵育逢辰之草木溟盃嶽豆遇乙嵗而重陳松棟雲軒偕三光而齊耀書隆儀于金匱迥超乎七十二代之功紀聖夀于瑤圖逺逾乎萬八千年之數所有臣等感激歡忭下忱謹率同官員兵丁耆民等合詞繕摺恭謝天恩伏乞睿鑒謹奏
