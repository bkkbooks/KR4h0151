body:
  text: 巻三十一預宴一百二人詩一百六首馬甲馬永禄年七十三伊犁昔隨征分旗列戎伍禡牙卜吉士氣騰節制雄師惟禁旅問罪魁安新附朝發軍符分兩路時雨之師二月來至誠洞燭先㡬裕格登山麓夜斫營大鞣大膊填壑盈以二十五人降七千餘衆大功倐忽觀厥成露布馳大勲集天聲赫赫日出入凱唱親聞卅載久身荷生成等髙厚和甘飫渥至皓首詔舉春筵重引年如臣微亦云叟馬甲劉得明年七十三伊犁既蕆功囘部更大定自身列戎行一一記制勝神機本獨斷聲罪不容瞬窖米與樹丸天心助大順二酋駾喙逃諸部犄角偵神兵自天下遮邏周阹迸傳檄未踰時獻馘爭相慶飛旗吉語聞恰逮初陽令青郊百尺臺大凱鐃笳應嶤嶤紫光閣五十功臣盛豐碑屹太學五載兩勲竣戰圖重補詠常武豈云勝耳目記盛事忭語每難竟衣糧濡和久嘉宴逮衰鬢酌醴慶長生仙籙挂名姓馬甲厄奈年七十三金川戰圖十載剞乃識金川行師奇况叨隨征列戎陣欲摹鴻績拙置詞趲拉促浸濟同惡冀凴地險仇番落我臣我土敢跳梁天兵一震風行籜百尺穹碉寸難進氷滑石仄連峯峻那知雄師天上來轟霆到處千山振吉林索倫鷹奮揚火器健鋭鋒誰當層碉迭下後路刷揚武十盪復十決勒烏圍破遞飛旗軍如建瓴看犁穴繫頸以組下噶依穴無脱自古稀擒渠吉語先送喜郊臺唱凱收征衣圖開紫閣碑太學膚功底定真超卓皓首猶能説盛事更逢嘉慶頻年鑠衣糧豢養多歡樂耆宴還叨飲康爵長生入籙説籛偓同儕爭羨歌聲作馬甲克什克年七十三春池魚依蒲雅詠美飲鎬疇聞長春筵舉典廣引老惟笙龢斯吹有鼓坎以考三千來仙蓬灝醴瀰小草弓衣叨戎行引養首已皓膏霑人人春美比閬圃棗平上聲體馬甲他清阿年七十三强弓惟心調駿駟藉轡馭分旗編戎行練肄貴備豫年豐人優糧嵗晏􅀈燠絮餘齡皆生成况慶荷盛遇名留長生編沆瀣更㴻飫彤雲輝天中熳熳璐殿曙平去聲體馬甲厄魯特托克托年七十三昇平耆年繁舄奕式牒帙堯仁多堯民息育弗一日宵衣求民情絶域若密室春風吹垓埏郁郁訖日出人和觥稱豳鹿集律協瑟鮐鯢羅寰瀛酌爵悉秩秩兵民咸濡醇渥錫沐遝溢春臺真邕熙一一籙籍述平入聲體馬甲王言年七十三卿雲靉靆現蓬萊鶴髪同聴鳯詔來玉律新春占六日金甌全盛爥三台千年紀瑞超惇史庶老承恩捧夀杯盛事欣逢歌樂只丹墀虎拜愧樗材馬甲二格年七十三陽囘黍谷栁條新宴賜髙年普萬民鼓腹含哺歌帝力飲和食徳頌皇仁金觥釀熟厨揺萐玉盌傳來脯有麟栢子香焚鑪篆吉椒花盤獻酒鱗春中朝耆碩盈班列閩海師儒邁等倫絳縣有人書甲子丹臺無事守庚申八公蹤蹟淮南健九老風流洛社真羲昊重占天子夀康衢惟聴頌聲頻馬甲九格年七十三景運中天盛春囘斗柄東六蓂欣紀莢萬嵗效呼嵩夀宴聨翩集恩膏次第融九區欣履泰八表慶書豐和氣氤氲布仁聲近逺通海籌増鶴算受福荷皇衷馬甲達桑阿年七十三億載承天運衢尊咏太平祥雲興衆嶽甘露達重瀛集樹披鸞錦巢阿協鳯笙耆年沾被厚萬物頌由庚馬甲明徳年七十三賜杖用昭尚齒稱觥懋錫引年咫尺聖顔怡豫拜颺耆叟聨翩薄海懽依化宇率土共戴仁天小草榮霑露液仰惟福祚洪延馬甲王存義年七十三露濃芳醑飫金卮五福箕疇錫慶時夀㝢敷祺開玉殿上春張宴徧彤墀鈞韶樂奏元音暢鏐綺恩覃庶老熙寰海飲和多耄耋生成總是荷鴻慈馬甲尚存志年七十三綺序迎春旭恩榮敞夀筵紀元基大衍入讌侣羣仙瑶砌滋靈莢金爐裊瑞煙餘齡承寵渥長頌九如篇馬甲雅圖年七十三鴻鈞斡運淑氣凝圖萬國環衛億載貞符黔黎雀躍皓耋鳬趨帝錫嘉祉春澤怡愉羮和神鼎饌飫仙厨凝祥峻極斗耀靈樞馬甲保少年七十三東風㡬日禁城新法宴傳宣集紫宸春酒介眉歌夀考天家尚齒遍臣民琅璈共聴鈞㲈奏肴核都分内府珍謾説三千是仙侣更多粟帛杖鳩人馬甲札爾太年七十三西鶼南雉來貢玉甕金船並陳萬萬嵗凝禔福丕丕基荷鴻鈞藻筵肴核惟旅芳序和甘聿均何必疑年甲子共知逢吉昌辰馬甲明月年七十三景福觴春正月一人久道臨紫宸百辟趨朝慶黄髪紫宸喜見黄髪新惟此燕樂宜老臣紀元恭遇五十春巍巍仰溯堯文煥糺縵光華旦復旦人瑞天符倬雲漢馬甲薩哈禪年七十三玉律和風到瑶階錫醴筵春光開九十鶴髪萃三千願獻南山夀咸歌湛露篇傾葵欣向日拜手益歡闐馬甲和尚年七十三曉色曈曨啓禁闉引年嘉㑹徧臣隣人添桃實三千數祚衍蓍莖五十春天上賜甌傳衛士階前捧觶逮耆民願隨擊壤康衢祝億載賡颺覲紫宸馬甲七十五年七十三赫曦覲陽徳沆瀣擷顥氣顯經恢文猷隠權擴武緯盛際車圖出嘉祥矞彤萃同臻夀㝢中寰瀛夙漸暨矧兹大小臣遊乎皇之世矧兹㕓畮儔因彼民所利馬甲孫觀保年七十三錫福仁覃熙宇引年澤被神皋秩秩同躋夀㝢熙熙共飫恩膏羮説彭鏗斟雉果看度索成桃鏡裏春囘雪鬢尊前露浥霜毫馬甲伊蘭保年七十三煌煌神聖恩光泰開禔福嵩衡積嵗年瀛海為􅊷幅流霞浥斗匡瀼露引若木蕃釐洽化權億禩沾芬馥言開耆耋宴用溥千億禄訢合章亥步昭明長庚卜馬甲章保年七十三天子萬年有慶春正六日開筵鵷鷺頭銜燕樂鯢鮐眉夀蟬聨康衢尊滿同飲樂府歌成若仙徳邁虞庠養老典踰周禮引年馬甲奇永保年七十二丹鳯樓頭絢綺旭千耆共效躋堂祝紅幡綵燕供尚方燕豆華尊飫天禄玉枝健以夀藤裁瓊露甘踰春酒熟八極同時惠澤周承恩釦砌渥且優九品冠裳列簪紱萬方瀛嶂集共球生逢聖代超前代千叟齊添舞鶴籌馬甲倭深年七十二慶靄層霄景集瑞圖九野勻開紫宸光覲金戺翠幄香沾玉醅億萬年歌衢壤三千人上春臺大矣功躋仁夀湛恩徧飫埏垓馬甲文住年七十二玉宴敞丹霄殊恩荷聖朝引年頒几杖呈瑞集松喬仙液霞杯飫和聲鳯琯調敷天仁夀洽樂愷鬯春韶馬甲三雅圖年七十二昌期錫羨溥垓埏千叟從容集禮筵玉醴歡承無算爵鈞韶齊奏大羅天春風入座簪裾韻瑞露凝階杖履仙七十餘齡叨渥澤頒酺好作書圖傳馬甲英海年七十二晴旭開春殿平明上碧墀奇珍臚玉饌法醖酌金卮瑞靄鑪烟裊祥聲璚管吹普天仁夀慶抃舞樂昌期馬甲敦朱克年七十二閶闔啓九霄晨曦彩仗煥仙蓂六葉敷祥雲紛糺縵奉詔來三千螭頭侍御案欣隨鷺序後載拜瞻霄漢盛典古未有帝徳昭巍煥臚歡仰奉三扶杖齊祝萬馬甲五保年七十二綿聨福自昊蒼申欣見瑶枝五葉新况上春臺多夀耉太和氣久育斯人一吉已良辰曠典修瓊筵仙集海添籌天皇萬八千年夀同賜華胥國裏遊二馬甲六格年七十二斟元陳化綏我烝黎躔開五紀惠我鮐鯢廿萬齡衆菶菶萋萋爚若角亢聚如壁奎涵淹引翼和厥天倪浮邱挹袖喬松肩齊馬甲索住年七十二皇帝五十載首祚莅青陽春祺溥海甸耆宴開霞觴眉夀來萬國濟濟分鵷行詔許臣民俱雀躍翔雲閶仙醽浮緑蟻再拜飲瓊漿敬獻九如頌衢歌繼賡颺馬甲重禄年七十二祝聖籙萬國歡春光浩蕩翔鵷鸞聖恩燾昌天地寛令民户封俗茂恬以安夀祺錫羨乃詔鶴髪之千官末校近光古所難况逢咏彼蕭斯濃露漙雲施駢疊頒金鑾臣拜稽首陳厥端願同康衢之老擊壤鼓腹同臚歡馬甲常保年七十二丹詔下雲霄璇樞應斗杓何當來末校亦與聴仙韶熙洽恩光普繩承祖武昭葵忱惟向日擊壤獻衢謡馬甲佟紹年七十二煦嫗春囘閬苑舒榮瑞應仙蓂引年先具法膳羞耉咸臻闕廷廣樂宣時雲駐御爐拂處衣馨聖夀與天無極億萬常占嵗星馬甲田敬年七十二綴衣何幸列螭頭紫禁春添雨露稠萬禩綿延開玉葉八方豐樂鞏金甌一何湏梨棗給瑶壇法酒甘逾露滿盤養老牌懸欽賜字闐駢扶杖拜金鑾二馬甲張朝相年七十二泰運斡二儀維皇建五福鳩杖集繽紛鶴觴湛􅌬醁上聖古所稀優老禮最渥恩覃膏雨醲幬載羣生育八伯和卿雲天保歌戩榖不采商嶺芝不飲南陽菊馬甲陳璽年七十二禁林春靄靄夀讌泛瓊觴見丙祥星耀由庚雅樂張肅然偕虎拜蔚矣荷龍光億載甘膏溥羣欣茀禄康馬甲萬保住年七十二方春始和嵗幹在木聖夀川増斂時五福璿宫旦開耆耉祇肅山立雍雍天容穆穆曰惟康哉綏我淳淑和樂仙韶上尊醽醁鴈序公卿鴛行侯牧小臣何人亦兹寵沐庖珍飫嘉爐香近郁用綴衢謡同抒華祝馬甲那爾布年七十二帝廷寳宴啓昇平千叟趨蹌沐寵榮日麗仙班鵷鷺集風迴秘殿管絃清羲年昊嵗民仁夀化日光天物順成試向五雲深處望南山咫尺是蓬瀛馬甲二達色年七十二閶闔晴開覲帝旒近臣交捧兕觥觩大官巧飣雕盤果内府頒來折俎羞有蔭椿杉長卓午向陽蒲栁亦勝秋齒因堪數原同馬噎不湏防免祝鳩拜飲自欣沾渥寵聞歌真欲效衢謳歸來説與扶笻輩親入羣仙隊裏遊馬甲七徳年七十二垓埏覃夀㝢錫宴在彤墀成憲千秋炳新恩萬國施仙厨歌列鼎瑞萐卜觀頤露液凝金掌霞漿汎玉卮斟元欽藻詠臚頌展葵私大地春無量優游化日遲馬甲常春年七十二紀年大衍古來稀鳩杖偕扶達九畿淡蕩春臺晴日麗恬熙夀㝢瑞煙霏天厨寵渥沾餘潤仙侣分隨仰聖暉話與兒孫傳盛事茅簷袖惹御香歸馬甲佛岱年七十二曼夀延昌圖恒泰啓嵗籥祥迎玉杖鳩暖䕶瑶池鶴壺中就日暄天上流霞酌甕㪺三霄露韶傳五雲閣拜手就敷筵惠心厪調幕式燕喻椅桐抒忱比葵藿馬甲八十一年七十二一人恩澤四瀛覃五十瑶圖萬古涵嘉宴兩開辰紀六龎眉千計數盈三八風洽應春纔始百彚同昌譽並含齊頌億齡姟兆慶九芝七鳳邁鏗耼馬甲那爾太年七十二弧南有徳星恒向熙世見占曰實夀人凝輝映廣殿天子坐九重徴夀錫春讌世成今唐虞人集古安羨爵序實齒序戎行飫内膳猗歟盛世事維皇承天眷惇史且未聞載籍豈易見馬甲永成年七十二律囘玉琯轉青陽紫殿晨開慶露瀼千載再逢千叟宴萬方同進萬年觴嵗華啓籥條風洽月莢敷榮旭日光拜手稱詩歌既醉葵忱億載頌無疆馬甲王二達子年七十二璧水圜橋鵠立銀潢繞膝麟振疊盛熙朝上慶霑醇夀㝢長春論籌數添瀛屋稱觥祝叶周豳小草叨䝉化育華筵渥荷恩綸馬甲愛申年七十二愚賤語質樸摛頌慙無文何以擊壤歌流傳同星雲願以天籟紀天徳唐謡夏諺騰懽忻敉寜兵甲櫜康田農事勤西極蒲類東日出數萬餘里開鋤耘雲漢天章仰巍煥雨暘玉燭調烟煴小臣執殳際熙宴含甘潄醴和氣薰殊恩綺筵敞紅日彤霞雯從兹籛偓得齊夀願以億齡萬嵗上聖君馬甲六十一年七十二聖治諴和中外禔福協氣所蒸朝熙門穆爰敞華筵千官祇肅日麗風融露甘雲郁皤皤黄髪普承優渥拜捧衢尊飫聆鈞曲引養引恬咸登淳樸敬頌萬年歡臚三祝馬甲三格年七十二夀㝢慶長春天恩賜宴新瑞蓂開六葉綵燕試兼旬玉饌膏逾沃瓊漿飲最醇莫名髙厚徳引翼到戎袀馬甲六兒年七十二巽命恩周黄髪需雲慶接丹宸松嶺羣仙星聚香山九老風淳况值鴻開夀㝢欣逢燕洽陽春竊擬華封三祝稱觥祝我聖人馬甲海興年七十二南極臨黄道春祺溥太和大官分翠斚仙侣集鑾玻燕譽龍光集鴛行鶴髪多幸依仙仗末拜手頌恩波馬甲存徳年七十二迎韶佳氣滿彤廷詔賜華筵及耄齡共仰恩波承太液兼留前典在金屏雲中奏樂聞笙磬花外傳觴醉醁醽六幕歌風咸皥皥九衢沾露自泠泠交梨火棗皆含澤玉筍金芝總帶馨紫極辰依無量佛赤方丁曜老人星呼嵩巖叟聲相接紀瑞詞官筆未停身際隆平偕夀域庥徴五福協堯蓂馬甲石圖年七十二夀㝢開閶闔春臺啓嵗華非烟凝曉靄如醴綴晴葩綵映曈曨日杯浮瀲灧霞千齡逢曠典額手慶庥嘉馬甲七紅年七十二撰良辰協吉日闓陽播氣韶光勻奠鼇極積鳯紀履端肇慶膺貢珍羞溢俎醴凝爵皤眉皓首覲紫宸鳩飾杖螭耀錦六璈八闋淳以振光萬葉垂億禩皓皓元氣摶鴻鈞馬甲伊拉庫年七十二芬漉雲牙捧玉墀班隨鵷鷺厠熊羆龍躔中啓圖書數虎拜環陳山阜詩風暖祥烟縈細細晝長綺旭度遲遲敷天共慶恩筵設五十年徴億載基馬甲六十九年七十二至仁協蒼縡民咸樂康阜訢暢由敷施淵衷乃翕受載布耆瑞筵酌以祈黄耉華祝歌南山祥輝耀北斗介福懋引祺有孚自盈缶才慚黼黻文班列鵷鸞後跪進萬年觴來獻無疆夀馬甲全保年七十二甲子三千寳籙増瓊筵濟濟合簪朋斂敷本自寰瀛合耆耉同欣湛露承知者樂兼仁者夀日之升與月之恒無文祝聖陳經語豳雅觩觥敬共稱馬甲孫國玉年七十二我皇懋徳業寰宇臻隆平下洽羣黎之詠蹈上超邃古之咸英光天之下至于海隅蒼生蕩蕩乎無能名春溥夀祺廣宴張彤廷蹌蹌濟濟冠裳盈三千耆耋咸稱觥黄髪鯢齒來籛彭雁臣駢慶輝弧星聖仁齊幬載聖夀自與天地均叶億萬年兮膺天慶叶馬甲存徳年七十二旭景扇堯蒲祥雲藹帝都廣筵隆夀耉耆老醉春酺揲卦剛逢泰添籌正衍圖欣瞻天咫尺拜手效嵩呼馬甲五福年七十二昌期敷渥澤庶老聴傳宣運際膺圖久人惟尚齒先盈廷暄瑞旭列陛集耆年餅疊膏環潤觴行醴液鮮雍容酺宴頌紀述鎬京篇共荷恩施普歡騰尺五天馬甲伊爾圖年七十二吉已開恩讌良辰設綺筵初舒軒帝紀更賜木公年國瑞徴人瑞情田懋福田一堂代肇五再㑹叟逾千漫溯遊河事寜論宴鎬篇春臺真饜飫洛社遜聨翩耄耋醍醐渥勾陳雨露鮮萬驩騰禁旅舞蹈祝堯天馬甲廣徳年七十二九天敷錫湛恩濃千叟筵開盛典逢南極景星聨瑞曜東華綵旭作韶容化成棫樸人文萃聲暨梯航使譯重飫徳既深思獻頌衢謡長願效華封馬甲富清年七十二皇道惟融羣生茂育叶氣流春引年錫福露浥瓊筵雲圍翠幄醴泉滂流嘉珍紛郁日月珠連風雨玉燭龎眉皓叟既霑既渥敬調九如願歌三祝馬甲劉徳年七十一大徳名兼夀皇圖熾益昌雲仍綿萬葉燕譽順三陽瑞紀星霞麗光依日月長遭逢欣盛際悠久祝無疆馬甲張星年七十一皇帝御宇徳隆功懋大化翔洽風俗龎厚天眷遹崇廣錫耆夀如鳯在庭如麟在囿氤氲太和洋溢宇宙長筵肆陳鈞樂廣奏堯莆以甘舜榼以侑臣何人斯亦既來遘為龍為光萬國燾覆六府孔修安老懐幼耆武右文百福奔凑巻阿載賡億齡時祐馬甲崔進忠年七十一夀㝢稱無量春韶慶大千幸陪羣叟列獲預大酺筵寵賚承天澤優游羨地仙萬年稱祝日拜舞樂華顛馬甲雷志道年七十一榮依雙闕下天際望金莖况入鮐耆宴徐聴鳯律鳴螭頭分授几龍尾坐傳觥嘉㑹先人日前聞正老更重熙符令甲萬彚慶由庚崇品分珪組遥天到渤瀛櫜弓登馬齒􅢠飫列鳩羮春布祥暉永歡歌頌太平馬甲蔣錦年七十一中厨恩許遍嘗羞玉斚斟來碧酒浮更喜醉顔歸路穏賜來笻杖刻雙鳩一香殿晨開瑞靄重置人幸接䕫龍從知仁昊無私覆一律春囘草木容二馬甲周啓太年七十一舜琯暢條風殊恩幬載隆熙春霄漢上式燕殿庭中耆叟卿雲爛仙杯湛露融遥知逢此㑹抃舞萬方同馬甲黄毓佩年七十一盛典臚耆叟敷天樂愷時韶華開淑序和氣洽昌期劍珮千官肅笙簧百福宜恩光齊拜手春煦徧龎眉慶溢堯封祝歡聴舜陛詩微臣何厚幸叨近仰宸慈馬甲周國棟年七十一廣殿春祺布耆筵詔許登依魚樂蒲藻聴鹿協芩苹天酒衢尊溢川籌福海増恩波同被日擊壤早騰聲轆轤韻體馬甲成徳年七十一耆筵初秩洽春光皤髪居然擬鶴翔祝溢三多邁周瓞人臻百五列虞庠一人備福民臚頌千叟含醇帝錫慶軒夀萬年開化宇介眉長此祝無疆馬甲佟􆀨年七十一慶洽耆年宴璇宫舉典優恩波魚列隊夀㝢鶴添籌協化超三古來同溢九州蕭斯歌湑露臣福亦星稠馬甲周肇紅年七十一郁穆朝暾麗鳯樓靈臺雲物滿皇州蓬山稠叠籖開帙福海延洪屋紀籌籙應升恒開綺席光舒樂夀到星騶微材未效騰驤力老捧春風碧玉甌馬甲徒弼鳯年七十一蕩蕩門開九油油爵引三一人恩下逮千叟澤均覃星向樞環北山從夀鎮南聨行齊效祝仙醴洽春酣馬甲于世興年七十一尚齒榮叨嘉㑹承恩渥飫慶筵星弧上拱薇宿露甕中有醴泉衍數京垓秭兆貞符安羨籛佺遭逢一何厚幸忭舞以聴鈞天馬甲王興寜年七十一春溢文明書耆筵啓上辰重熙繩祖緒錫夀布恩綸象協星雲瑞時迎雨露新騰歡同率土長慶作堯民馬甲完之佩年七十一熙時郅化翔九區夀人夀世成珍符詔舉耆筵洽歡慶龎眉鶴髪堯階趨上有碩輔松喬侣旁及良弼皋䕫徒介胄之士襏襫民其惟夀者三千俱虚縻倉粟長馬齒駑下幸復遊康衢戎行効力忝無補叨此嘉予天瓢㪺飲和飽徳春日永惟有獻祝同嵩呼馬甲曾成弼年七十一璇闕春光曙祥和溢九圍貞符開慶㑹嘉宴布慈輝舉爵欣依列扶笻詠醉歸深知環海意同此仰巍巍馬甲辛乾年七十一青𤨏晨開彤庭春啓仙仗和風御爐烟紫漏報雞籌筵鋪燕喜五色雲中萬年天子徧徳羣黎發祥隤祉羽衛星騶亦與嘉祉賤有不遺䝉福以齒堂哉皇哉式光惇史馬甲陳濱年七十一卿雲爛條風和麗仙陛盈玉珂祁祁雲臻駢駢星羅鶴髪耆而艾瓊筵㫖且多不遺馳驅末士亦隨糺縵賡歌天家樂事真無量那羨羣仙詠大羅馬甲朱倫太年七十一錫福純庥被承恩嘉宴叨星騰南極麗垣拱北辰髙春釀斟雲液鮮鱗膾錦刀寧慚兎罝侣也染鳯池毫馬甲七林太年七十一鶴髪熙春拜紫宸筵開正值物華新漢家賜酺徒誇異那及堯樽共飲醇一喜隨鵷鷺酌仙漿拜舞瑶階祝夀康自是聖朝多曠典芻蕘猶得荷龍光二馬甲哈爾布年七十一星衢麗日𤨏殿祥春言披曉色是布華茵玉階金戺環衛勾陳咸池大章是協韶鈞蓬萊紫氣有來玢璘榑桑萬仞光華聿新帝錫闓宴大宇陶甄溥八極内咸為夀人臣雖末騎叨與鴻淳飲和頌徳拜舞訢誾馬甲布什吞年七十一至治超千古仁風被八垓敷天同夀㝢率土上春臺耆叟星雲㑹恩筵雨露培養頤分玉饌尚齒酌金罍履接鵷班序笻扶鶴髪來戎行霑渥賚拜手詠康哉馬甲朱進忠年七十一引年行盛典瑞應正駢羅懋祉天潢衍純禧玉燭和嵩呼聞萬嵗華祝慶三多鳩杖聨翩集抒誠共矢歌馬甲昶士林年七十一東郊迎氣瑞烟攢帝錫維祺夀㝢寛掌旭升華承百福爐烟拂曙溢千官貞符載筆丹墀右異數邀恩玉杖端不用紏儀三爵後躋堂濟濟列鵷鷺馬甲額特和年七十一朝陽含暉春復秋四海萬物䝉鴻庥五十年來太平日無復逺戍更番休禁城肅肅陳迾卒鼔聲但作傳更籌夀筵有慶詔下諏走卒恩與臯䕫侔誰言馬齒不足貴昇平皆與松喬遊請瞻華葢雲彩稠承趨一一隨星斿老人之星本弧彩秋丁春丙天南頭馬甲額爾登布年七十一老馬馳驅列禁城欣瞻紫氣靄神京東郊春迓彌旬候北極懽騰萬嵗聲數典再逢鳩杖錫呈祥五見鳯芝生蓬山㑹裏傾瓊液慶衍龎鴻遍八瀛馬甲蘇生年七十一彩旭祥縈仙仗需雲宴洽芳辰蕩蕩唯天為大熙熙與物皆春分隊長依虎旅拜恩榮對楓宸稽首九華光裏惟曰願祝聖人馬甲吳林保年七十一睿藻仰昭囘卿雲接上台九重開夀㝢千叟在春臺荏苒前驅士蹉跎下乘才賡歌隨樂軄盛典幸叨陪馬甲西藍太年七十一璇閶曉啓臨八埏春承御宴恩光駢彤階釦砌森几席鴛行魚貫來翩翩大官給饌衛士捧觀者肅穆登如仙臣昔少壯年插羽從行間霜戈萬隊鐵馬千曽負弩矢相周旋釋甲歸來老騎士歡呼復拜恩自天慶逢八紘九有銷戈鋋十方重譯簪􅅂聨稽首拜祝聖皇福夀増如川馬甲英住年七十一紫籞天開繡黼春雲斗轉璿璣仙蓂六葉啓秀鳯紀萬禩呈輝身忝栁營匼匝恩沾綺席芬馡馬齒叨依金戺鳩笻榮近瓊扉馬甲花成年七十一曉漏聴金鑰傳宣集紫宸引年九重㑹上夀萬年春五緯祥符叶三霄瑞靄新隨行共沾澤醉飽頌皇仁馬甲官音保年七十一天錫純嘏睠惟我皇仁逮耆艾綏祉無疆獻琛納舉踵來王式宴嘉㑹聖謨洋洋昔弩矢士効力戎行鐃歌凱旋磕磕硠硠文化允輯武偹無忘與從秋獮虎旅龍驤青旗雲壯黄纛風翔外藩部長歡舞來將湛恩汪濊以燕以康臣慙樗栁熙遊春陽戢戈櫜矢捧爵稱觴京垓億兆夀㝢舒長馬甲李延恭年七十一籍𨽻嚴營忝荷戈引年聖主錫天和逢春蒲栁偏添翠帶雪松筠不改柯萬嵗聲中傳五福九重殿上祝三多清班附處承恩寵湛露蕭斯聴雅歌馬甲吳九鵬年七十一戎亭息警喜銷兵闓澤如春布八紘舞羽庭階恢版宇投戈海甸頌昇平崑崙河潤千瀾色嵩嶽山呼萬嵗聲温詔頒來佳氣滿慶筵開處露華盈賦傳羽獵詞卑漢句有車攻徳配京忝列貔貅環禁衛歡隨鵷鷺近蓬瀛承恩力奮桑榆景向闕心殷葵藿誠自幸此生逢夀㝢丹墀肅肅捧金觥馬甲郎應玥年七十一班綴耆英逢燕譽鏡懸仁夀荷陶鎔瞻依雙闕雲初曙沾被三霄澤最濃新捧瑶觴聨席與舊參羽騎屬櫜從拜恩歸喜鞍能據健祝三多學華封二韻體馬甲黑達色年七十一銅街典衛厠華茵寵錫恩深暨小臣不逺蓬萊春許到無私雨露澤常新欽諧虎拜依同列齊效山呼仰令辰躬遇昇平傳盛事三多祝共九如申馬甲九達色年七十一淡月疎星鵠立和風麗日鸞翔欽若久依軒葢恭承時仰虞裳久忝芻糧列隊榮叨齒録干行聖徳如天覆幬萬年長戴恩光欽定千叟宴詩巻三十一
