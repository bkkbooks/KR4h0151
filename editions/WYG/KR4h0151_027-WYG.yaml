body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻二十二預宴九十五人詩一百八首編修勵守謙年六十六古稀天子垂衣裳功巍文煥超陶唐民生其間多壽耉涵濡聖澤偕樂康碧海恬波帖犀弩黄河底績歌宣房休徵傱萃介繁祉雲礽五世歡同堂昊天篤眷祖武緝嘉予中外同嘉祥耆筵大會古未有三千餘叟趨巖廊詔許微臣列嘉宴自顧樗質何能當念臣四世沐恩遇臣曾祖勵杜訥臣祖勵廷儀臣父勵宗萬世受國恩三朝服事隨班行遭逄聖主渥世禄􅕊年禁近身囘翔愆尤屢獲屢矜宥欲報未竭涓埃將詞曹奉職愧無補復參四庫羅縑緗勉繼家聲厠文苑跪誦宸翰增慚煌觀成未効贊成力恭逄盛治文明彰四庫開館時䝉文苑御製題趙蕤長短經第四章有津瀛繼家聲四庫搜羅俾贊成之句辟雍新建復古制引年敷教覃恩光洪惟紀元五十載式當國慶齊稱觴期頤耄耋萃春殿文階武級高筵張憶臣曾祖事聖祖昇平與宴賡明良臣曾祖杜訥於康熙年間曾預昇平宴今兹盛典溢普被微臣又獲供趨蹌祖孫先後沐寵疊一家沛澤何滂洋泥首丹墀效嵩祝惟皇萬壽歌無疆内閣中書明安圖年六十五大君至徳邁圖疇四序交和四極周元善亨嘉惟利物皇春帝夏共王秋南弧壽曜三霄燦北闕貞符六府修玉佩丁冬叨綺宴東琛西賮遍神州四徳四時四方體原任中書覺羅龍海年六十六獻歲蓂旉六葉祥辰占曼壽日舒長原知歲月贏休養又慶恩綸賜玉觴一絲綸曾直禁東偏紅葯蒼苔謝眺篇路傍薇垣趨北闕恩光重到五雲邉二工部委署主事佛爾卿額年六十一沛澤行敷日豐功坐論時五材咸底飭萬福罄惟宜春宴榮叨日冬官忝委司熙熙仁壽㝢藻繪亦何詞通政司經歴永熙年六十八謁者賔門傳奏時喜逄綸綍沛恩慈安車詣闕崇年禮貳膳施筵尚齒儀南極凝輝依翠葆卿雲結綵暎瓊芝杖朝錫燕非常典逮賤榮殊澤倍滋通政司經歴李鳯彩年六十一壽㝢歡臚億兆耆筵會盛三千徧飫衢尊優渥咸霑厨萐芳鮮銀臺夙參掾屬寳讌欣預羣仙依光敬頌純嘏惟曰天子萬年原任光禄寺署丞安平年六十六惟皇建極惟徳動天經文緯武敬以率先熙熙皥皥蕩蕩平平乃集千叟以開壽筵兩陛羅列九醖甘鮮龎眉鳩杖雪鬢霜顚稽首醉飽與春俱妍紫微南極仰若同躔太和元氣普被無邉歛時五福萬八千年御史衙門七品筆帖式咸寧年六十一紫霄鵷鷺翔金殿碧落霱雲揚雉扇清時人瑞洽耆年春滿蓬壺錫華宴華宴初開珍膳盈天厨絡繹玉盤擎酒斟醽醁飛三爵樂叶鸞凰奏九成九成三爵皇恩普麗日祥暉暎珪組夙昔班曾侍繡衣新年身已遊縣圃縣圃風光敞綺筵龎眉壽耉集三千從今天上仙椿茂永祝洪延萬萬年通政司筆帖式巴通阿年六十一奉職欣窺八會書依光禁近列簪􅅂耆筵榮許霑蕭露六葉堯蓂獻瑞初一壽弧光耀九霄明錫羡延洪瑞應呈抃舞願隨羣叟後敬賡天保頌如升二繙譯官候補筆帖式逹春年六十八和風應律開晴昊萬象精華歸黼藻皤顔入宴賜春祺星麗天垣日黄道東逾若木西崑臺暘谷寒門奥宇開便以耆筵作王會一四天下何埏垓大撓甲子隨錯綜億萬喬齡福來總巢林遊藪古誰嫓般般者麟足足鳯司庫誠格年七十一㤗階際昌期嘉會紹鴻運耆艾燦列星蹌濟歡斑鬢皇猷溥六合燕衎滋醲醖臣昔歩蘭署供職慙廉慎吉日懋典興拜手堯天近忻言共飲醇悦豫形歌詠申之以天章觀文殊斗暎麟遊鳯來儀皇家衍瑞慶陽春藹晴昊鈞曲和平聼熙熙龎叟躋九如頌仁聖司庫劉保住年六十四巷舞衢歌滿帝畿熙春人盡樂春暉明霞煥彩鋪丹地瑞日舒光耀紫微五世堂開今特盛三千叟宴古逾稀無疆申錫昭宸極跪拜親瞻咫尺威司庫積忠額年六十四仙音播韶濩絡繹揚九閎拜手同稱萬壽觥乃是眉壽之臣耼與彭臣忝微員何足數叨列班行齊拜舞得到蓬瀛世所稀曰惟聖惠開仁宇累洽重熙春復春盛徳鴻功難具陳萬年巍煥曠古典敬告丹臺珥筆人司庫額勒亨額年六十二錫壽承三殿揚庥被八溟春初開赤縣人共近黄星雲錦天舒瑞瓊芝地效靈皇家均渥賜司鑰不教扃司庫佛保年六十二恩覃慶洽超唐虞駢羅耆瑞朝天都千叟長筵啟壽㝢九疇敷錫披鴻圖閶闔風和張寳讌頒來玉醴兼珍膳紫籞輝煌長樂花卿雲糺縵􅍭元殿綿綿𤓰瓞天家歡何湏蓬島仙桃蟠海内咸歌旦復旦宸𠂻無逸安求安高厚難酬叨食禄欣綴鵷行儕華祝長向堯階捧壽觴年年聼奏簫韶曲司庫吉靈阿年六十一瑞靄籠三殿春風播九重日華天瑞珥露掌嶽青蓉拜舞隨臯稷謳歌附偓松榮叨仙籙注委佩慶恩濃七品庫掌惜欽保年六十三韶開六琯恩龎鴻衢歌巷舞熙春風曰耋曰期古斯尚以引以翼今尤隆酺歡高列千叟集嵩祝齊聼三呼同五老遊河長生宇飛星入昴堯天崇呉體子七品堂官杜保年七十三聖人御宇景祚綿長黄髪台背荷福八方蔚如淑氣􅆄蠁無疆况遘大慶春日初陽特舉盛典言循舊章駢蕃殊錫共沐恩光筵開爵錫跪拜趨蹌臚歡共祝壽宇咸康禮部七品通事官四格年六十四聖人斂福世恬熙錫羡無涯介壽眉臣是舌人觧重譯譯言都是頌鴻慈一鮐耉聯翩宴上辰瓊筵齊慶物華新容臺禮數春臺象報與春官習禮臣二欽天監靈臺郎多慶年六十二羲和日月仰堯天南極星輝北斗聯紫氣朝浮金鳯闕卿雲晝靄玉爐煙酒斟瓊液恩波洽詩疊霞牋壽籙綿慙愧管窺糜厚禄桑榆年復列耆筵欽天監靈臺郎陳際新年六十二北斗璇杓轉南弧壽曜開聖恩歌湛露臣職隸靈臺問歲隨羣老占星遍九垓五雲遙望處瑞景仰昭囘七咸安宫品教習永㤗年六十五皇州春色熙熙象聖徳如天天浩蕩嘉會重開進耄年偕來逺近同瞻仰舞蹈歡騰介壽爵婆娑醉倚延年杖小臣薄植荷生成幸復叨敷膏澤廣耆英隊裏追陪入鵷鷺班中近仙仗玉饌珍盤拜賜多懐鉛竊比康衢壤景山七品教習塞欽年六十三仁壽覃敷㤗宇文明共仰重華瓊筵慶啟寳讌福酒光流玉霞噦噦鳯鳴春樹綿綿瓞衍天家臚頌聖齡億萬引恬引養無涯如意館七品官姚文瀚年七十三自古有盛事欲令萬世垂寫之以圖畫播之以聲詩臣未能學詩畫久淑予私筆染寳露濃墨沾吉雲滋狩典圖南廵武功圖西陲伊古所未有臣乃奏筆為衆各以藝進每荷天章題名忝内供奉業愧老畫師幸預嘉筵末停翰倍丹墀願以所親見藻繪萬年期法宫開閶闔殿閣交參差日射黄金牓晴薫赤羽旗中央御氣紫兩部丹仗㽔陛前陳廣樂鐘鼓琴管篪右平左階墄分行如魚麗設豆四五六酌酒尊罍彛其旁布賞席箋硯鏐幣皮智珠百八圓如意供指揮牌面龍爪拏杖首鳩翼飛堆盤影重疊著色光陸離前楹柘黄繖穆穆天威儀龍顔日角表温霽春融怡元臣奉壽觴鞠􅎽前致辭三千九拜下鱗集鳬趨隨安得一筆畫具此千叟姿綵衣錯絺繡章服區崇庳右列氣桓糾左班度委蛇末有高麗使衣冠從其宜番番百五翁儒縫垂長緌瞳方眼湛碧背鮐齒豁鯢傴僂童孫扶康彊健歩移千形復萬態喜氣皆溢眉人間競傳寫陋彼洛下耆豳風公堂觥上掩馬和之烏林逹七逹色年六十三慶典出王正春光繪太平一人徵樂壽萬物荷生成酒醴笙簧會明良喜起情小臣惟醉飽何以答恩榮尚茶副科陞額年六十八輯貢長從日注來火前欣見翠旗開副臣併入耆英會供奉原為瑞草魁一拜手稱觥祝帝釐春光四照萬年枝恩膏翔洽醍醐灌榮過龍團賜品時二城門官黒格年七十三古稀天子讌開紫宸無小無大以齒等倫卑秩門官得飫天珍何論卿士以及守臣臣司筦籥唯謹昏晨何足比數恩波亦均願效三祝如華封人城門官花尚阿年六十七淑氣催春麗物華九圍被澤浩無涯欽瞻五鳯樓前詔先下長安百萬家一鶴髪聯翩赴鶴書禁城曉啟集安車叨榮臣本司金鑰沐慶相隨拜玉除二城門官金齊祥阿年六十五太平錫福徧遐陬高會還聞吉日諏五十年惟繩祖武八年春共迓天庥星移旗翼祥光燦地近蓬瀛瑞靄浮喜報朝陽梧集鳯欣攜扶老竹聯鳩金門日暖曾司啟朶殿雲開亦紀籌七品衣冠依禁近六旬歲月總優遊賜酺差擬新恩渥執爵重聞舊典修願更長年隨豹尾再陪千叟上螭頭城門官逹桑阿年六十五詄蕩層霄奉帝闉天衢紫氣仰瞻頻樗材伏幸同仙尉益壽筵前拜聖人一萬方鶼鰈賀昇平元會纔瞻嘉禮成旛勝韶風開兩候耆年瑞露裛金莖二城門官格綳額年六十二上林豫春色梅栁舒芳妍龍旜漾光風鳯闕輝祥烟玉漏乍停刻微垣會瀛仙皤皤黄髪臣拜舞丹陛前親從天潢胄貴自方召賢賤逮採薪子逺至重譯傳洗爵以酌醴靡不趨瓊筵微臣職司籥乃忝九賔連祝如朝陽升高擁紅雲鮮城門官占代年六十二淑景開三陽和風扇九有共樂春臺有脚春咸歡壽宇無疆壽臣年六十歲月長臣官七品班聯後曾司魚鑰衛金城亦捧龍韜警刁斗干今五十年幸厠三千叟臣如雞人絳幘伺晨昏願侍楓宸歲歲年年介春酒原任七品苑副福禄年七十二帝徳遍紘埏皇恩配高厚八方盡歡樂六宇開仁壽齒宴啟元正蒲輪召千叟微臣叨禄秩幸附班聯後服官數十載循分効奔走奉詔趨廣殿高班隨台斗載賡湛露詩獻祝㪺天酒七品廏長四逹塞年七十五聖朝牧政超萬古臣長牧廏隸内府夏卿太僕既蕃衍供御千羣雲錦聚皇城廏設萬壽山南苑七廏就豐膴盛京大凌河養息牧攸處外至上都逹布遜諾爾逹里岡崖以時出入肄水上䝉古索倫歲歲貢馬駝喀爾喀藩西藏番僧歸隸圉邇來天馬徠西極逺至濛海之濵拔逹克山部豈惟周禮七尺為騋八尺龍己見瑞圖上獻文明宇臣以廏長歌馬政魯頌騅駓􅀈騏伾伾曷足數七品牧長秋永年七十二聖人統天天合徳觀文成化星聚奎奕奕南弧麗東壁振振蓀砌連蘭荑榮河啟瑞煥緑字岱嶽封禪嗤金泥歲惟旃䝉春俶始申以需宴集壽鯢鳬趨鱗集大千界九重黼幕張青緹堯尊舜榼互斟酌䚧觩康爵鏤文犀小臣奉職忝牧圉雲錦爛燦天閑齊月權星臚安足數賮贄歲獻康居西拔逹山及愛烏罕八駿四駿攢霜蹄吉黄乘之壽萬歲仰協瑞應仙毫題思臧兆魚陋雅頌九㝢福禄林同躋慶兹耆席獲稾飫欽明懋典粤若稽七品牧長善保年六十一光風泛肖蓿權竒集逺塞房星十二閑騰躍皆殊態齊力亦齊色團團五花隊臣職菣豆餘年時曝冬背叨䝉豢飬恩以齒超同輩預入壽宴榮重沐天珍賚逺知渥産蕃近喜立仗對萬年從六飛長此春輝戴維魚占衆兆謳吟類可載嗤彼西極歌敢比今起邁副䕶軍校六格年六十七蘭錡祥輝集桃符瑞節開恩綸敷壽㝢慶宴渥春杯榮接添籌鶴歡同啟蟄雷龍旗風颺處列隊仰趨陪副䕶軍校灶保年六十四九重春殿晨光徹藻席瓊筵分序列古稀天子鬯淳風萬國耆鮐依紫闕露色丹黄寳甕凝錦文黼耀雕筐設玉堦拜賜逮朝鮮金戺臚歡周月窟小臣叨秩依天閑馳驅未效徒綴班欣奉鴻圖霑渥澤萬歲聲中覲聖顔副䕶軍校徳克謹年六十一偃伯靈臺劍㦸銷長楊騎士杖趨朝錦營春色誰相似早見韶風被栁條一士非少壯亦何為此日偏從馬齒宜既醉唯歌太平曲一齊傳與羽林兒二委署親軍校巴克散年六十四側聞熙朝人瑞璇題蔚日蒸霞祖孫曾元五世一百九十四家皇帝如天曼壽臣民薄海光華微臣職叨署校欽隨鸞鳯紛葩恩騎尉吉爾章阿年七十二聖朝敦世禄超古存臣功襲爵銘太常沛澤霑龎鴻河山劵帯礪奕奕侯與公豈不念厥初例以等次窮惟皇推天恩乃復格外隆苖裔分蟬嫣爵列騎尉中樹人如樹木盛世梓楩充多材尚待施何及樗朽躬昔人述祖徳高義懐偉豐不謂微末餘翻得恩長䝉食禄不責報歲月虚帡幪復預壽宴叨何以抒愚衷願言報君徳惟有念祖風恩騎尉依徳年六十八恩騎邀恩重拜趨微齡飽徳仰瑤厨長生總是皇仁錫好繪熙朝養老圖一歡呼千叟奉椒觴定比人間日月長若向蓬萊繙食譜敬應珍重帝臺漿二恩騎尉碩慶年六十五淑氣宣瓊籥祥光燦紫宸引年隨國老開讌荷皇仁爵忝司勲例身為受禄人惟從百執事敬祝萬年春恩騎尉保善年六十二律應青陽春滿禮先黄髪恩覃五色雲開有慶三霄露湛成甘紀歲久恢鶴算餐瓊芳勝菊潭世澤一堂繁衍載歌富壽多男恩騎尉王自裕年六十一渥澤霑濡被八紘瑤堦人瑞慶稱觥筵開北闕雲霞麗頌獻南山福禄成春藹三陽隨愷樂祥占千叟邁耆英微軀叨荷恩無極長奉辰垣福曜明恩騎尉富興阿年六十一皇帝總六合醲化流無垠瑤堦萃炳爍耄叟熙陽春煥矣敞華筵觴斝敷玢璘祥飈大地洽景曜中天陳拜手環堯衢饜飫歡飲醇琳琅仙樂奏清饗協韶鈞叨恩綿奕世被澤趨良辰嵩呼億萬歲海㝢咸尊親七品典儀官薩炳阿年七十四耆朋詔許畧官階席布彤墀雁翅排馬齒已符徵召數傳誇盛事徧天街一二首六身臣己及浮夸便以絳人傳豈知更有一百五絳老于今是少年二七品典儀官三逹色年六十三二儀奠清寧萬象呈景色惟皇凝鴻庥函冐皆壽國韶春始布和嘉宴啟環翊欣聚黄耉人連星麗宸極乾行道在健仰惟天可則景爍化成時丕基膺萬億七品典儀官富察善年六十一聖世隆嘉燕瓊筵千叟俱日中光麗晉雲上象占需禮洽呼苹鹿情均在藻鳬由來歌帝力樂事慶含餔原任知縣丁熙年七十五盛典敷愷澤淑氣昭春陽霑被九州中和樂成嘉祥千三百五縣縣縣䝉安康既戴帝念深鳯詔彤雲翔臣自東武來耄齒差自强敢言䨇飛鳬徑復窺天閶小才慚製錦榮宴聞笙簧拜手沐恩膏願告諸農桑原任知縣錢清年七十一彤閶團瑞采春光浩如海三殿集仙班壽㝢高如山小臣何幸逄昌運玉饌芬蒀調美醖早歲曾叨花縣恩新年更聼鈞天韻蓬萊宫闕五雲高耄耋期頤沐雨膏百里漫云飛彩履七言欣獲捧丹毫原任知縣伊齡阿年六十七條風扇寰宇太蔟應晴旭瑞氣郁曈曨光華暎仙木九重春宴開恩波洽醽醁黄髪儀盈千青蓂茁初六推策衍萬年躋堂顔五福衎衎咏嘉魚呦呦叶鳴鹿臣昔綰銅章製錦慙觳觫幸瞻蓬瀛春帣鞲進華祝豐澤中外覃太和徧滲漉原任知縣關慶年六十七異數隆千載熙春盛事并祥酺開紫曜渥宴洽滄瀛萬國迎純嘏三呼聼頌聲小臣瞻鳯扆蕩蕩欲何名原任知縣齊佳士年六十七序合仙班左右祥欽景運貞元百里會膺民社九重新覲天閽帝許銅章再綰春頒瑤爵維温雪嶺蘭山效職洮雲隴水頌恩臣近䝉肅知恩㨂發甘縣原任知縣西登額年六十六緝熙敬止光于四方天子萬年民説無疆春王正月行慶施惠受兹介福永錫爾類黄耉鮐背多之為美飲食燕樂用錫爾祉執醬而饋薦其燔炙飲食衎衎永錫爾極集經語原任知縣張廷汲年六十五率萬國歌陶唐物殷阜民樂康親民之職帝所重黽勉陳力慙未遑餘齡依輦轂快覩呈嘉祥壽人昇平瑞元曾五世一百九十四家孚奏章帝錫大宇福耆宴新春張樗材何大幸趨覿黼座光近年益祉頌天徳洪鈞一氣薄海之内皆淳龎原任知縣莫廷梅年六十四蘿圖景運慶方長錫宴彤廷溥樂康敢謂郎官曾應宿欣隨耆叟共依光天家𤓰瓞洪禔福人瑞籛彭盛拜颺萬㝢登春和氣浹咸欽聖壽頌純常原任知縣陳曾公年六十一九華殿裏報初筵緹綺欣瞻尺五天拜跪夙嫺儀部節曾宣綸綍惠喬年一藻物猶慙製錦功叨來紫禁拜恩豐寸忱戀闕同鳬舄長伴王喬祝華嵩二原任州判佟海年七十九春開化宇仁風颺垂恩儲祉錫百康萬國共玉任嘉貢九天景慶藹吉光帝錫嘉宴祺壽昌瓊羞進爼醴溢觴雲門大濩鏗既合偓佺韓衆翩來翔鼔舞渥澤同所願奔走萬里恢紘滄願言謳吟協笙瑟和風甘雨長亨穰候選州判王鏡年七十六符平三階元化燮斗魁熙熙共仁壽率土登春臺跽趨即瑤席鞠􅎽分山罍小臣忝半刺樗櫟慚非才太平樂鼓腹耆宴欣追陪願隨輦下士歲歲歌臺萊候選州判蘓於豐年六十五忝禄四十餘載飽徳億萬斯年祥源薄海皆浹福緒大椿並延蓼彼蕭斯零露象曰雲上于天荷恩愧無以報擊壤歌成短篇把總高全年六十八仁壽恩波廣耆年宴禁廷三千臣合頌億萬載延齡儕鶴觀趨歩扶鳩肅典型橋門將駐蹕立仗羡談經把總呉得昇年六十六億萬無疆祝洪惟聖徳承蒸哉久道化允矣大猷升維嶽貞符獻如川壽籙增春臺熙皥皥蓀砌慶繩繩蕭露為儀色梧岡有翼馮龎耆綿瑞景衎燕叶嘉徵寳罋羣看酌瀛洲此載登百夫叅隊長千叟盍簪朋揣分慙微末沾恩切凜競肖翹胥遂性聖治協貞恒把總王得勝年六十五皇威鞏京籞新制五大營中營扈仙苑列衛依蓬瀛北南暨左右分峙四隅正弁職運臂指斟制如權衡糈糧渥芻秣肄練明鞬檠天恩賫賞渥銀牌捧精鍈亦有耆耄士躋堂稱瑤觥臣忝百夫總南營率强勍周甲贏一歲例得隨簪纓抃舞偕羣旅矍鑠歌太平把總皂保年六十四璇圖協瑞卿藹昭彰元正六日慶啟壽觴既集紳珮實環瀛滄糾糾袀服從鵷鷺行臣百夫長琱弓健疆職隸中營近星宿光率屯衛士飫瓊瑤漿春風鶴髪頌天恩長把總程起虎年六十四嘉會千耆集華堂五福蕃介眉羅耄耋繞膝慶曾元舞綵雲垂戺宣韶日麗垣追陪鳬藻侣拜手飫堯樽把總李克懋年六十四華封祝獻三香山會紀九介年徵前典駢禧古未有洪維仁壽世宴鎬來耆叟光輝到持㦸忱悃殷獻卣帝曰予汝嘉屯營健趨走唯益矢葵心上頌無量壽把總劉忠年六十三玉琯辰符六璇墀叟集千天家恩洽遍聖祚福􅀈駢露裛三臺湛羮先七種傳鈞天聞廣樂華髪喜隨肩把總王再興年六十一嘉會彤庭列豆籩耆英次第與華筵曾依虎旅三千隊欣際龍飛五十年壽㝢淳龎超禹甸恩波汪濊戴堯天鵷行綴處簪裾集慶幸眞堪奕禩傳把總王珍鳯年六十一聖世多壽徵南弧光炳燿臣民咸福康黄皓各彊邵共祝聖算綿長戴堯天照禱祝徧山陬謳吟及海徼屆兹千叟會肆設沐恩詔具饌復進羞馥郁爐煙繞微職列戎行期門共呼召得侍彤庭前咫尺親語笑感激矢其音願踵擊壤調例封文林郎何澐年八十卿雲晻靄春星曙華髪承恩超賜酺福與大千世界同祥追三五皇時度鳯麟海上聚為洲鸞鷟山中翔作樹不知元會運世中壽世如今㡬囘遇光融碧漢覆圓穹景爍青陽集靈煦蓼蕭湛露飫便蕃備祉詩篇歌錫祚文林勅封郎張洛年六十八鳯詔式敷闓宴龍圖慶協祥占序齒咸從爵列計齡都以春添七品文階獲侍三霄仙斚均霑莫道盈顛雪色韶陽新徧閭閻文林勅封郎曠大登年六十五光華文治燦中天冊府書成三萬編景運己超疏仡紀禎符還絢太鴻篇瀛濛漠洱皆朝列蒼耇黧鮐總闓筵煥入觚稜雲儗儗輝騰葆羽日妍妍微齡普沐天恩重嘉爵欣逄帝賜駢麗捧鸞書榮綵綺珍分麟脯飫甘鮮編摩供職猶教子臣子曠楚賢䝉林院恩供職翰編修雅頌臚歌不羡仙福曜恢祥徵㤗上成鳩一萬八千年文林勅封郎李兆瑞年七十三九重春滿三千界優禮耆年六合同億萬人書億萬壽太平萬歲字當中一霞漿高舉泛仙觚麟脯分餐出御㕑景福太平歌醉飽欣看順則滿康衢二吏部八品筆帖式徳楞額年六十三行慶展皇儀絪緼曙色披五雲瞻紫極千叟拜彤墀執簡慙官守承筐荷壽卮神州春色麗景物正恬熙户部八品筆帖式多隆武年七十忝谷囘春大地羔羊躋酒公堂帝命筵開鶴髪微臣序列鵷行玉盌陳來􅛋脯金罍滿浥瓊漿普詠一人湛露膏流奕禩綿長户部八品筆帖式阿林㤗年六十五典則垂天府耆齡帝賜醺養恬優禮制作覩叶乾文壽以人為瑞祥超古所聞賡歌環紫禁仙靄共氤氲户部八品筆帖式隆昌年六十一宴啟韶春廣聖慈三千耄耋際昌期叨陪鶴侣邀恩眷忝列鵷班荷寵綏景矞祥凝霄靄靄松喬瑞輯宇熙熙敷天樂愷歌天保長沐堯堦雨露滋倉塲八品筆帖式常生保年六十一干羽當階舞和風奏九韶萬年天子福四極壽人朝愷樂同魚藻榮光擬蓼蕭歌欣諧擊壤拜手獻歌謠兵部八品筆帖式永福年七十一酺賜春正六日詩歌天子萬年瑞紀龍飛五十仙笻鶴髪三千幸向西樞橐筆恭瞻北極開筵醇風載揚海國膏露共戴堯天兵部八品筆帖式京烏勒年六十四帝徳新皇圖展九天閶闔春杓轉堂開五福歛箕疇蓍卜萬年符大衍恩綍渙王言耆英懋前典筵排甲乙拜寵加日次丙辰逄吉撰彩飾鳩笻壽作朋香薰獸鼎文成篆願添東海籌幸副西曹選釣天廣樂奏昇平歡歌萬歲禎圖闡兵部八品筆帖式穆騰年六十二仙樂奏雲韶熙春玉律調綺筵開爛漫絳闕聳岧嶤鶴髪盈千叟鵷行序百寮圖書欽奉皥雲日喜瞻堯酒晉南山斚星囘北斗杓粉闈叨列職戎府忝分曹介福裁花勝沾恩詠露蕭謠階躋尺五聖壽仰松喬刑部八品筆帖式依常阿年六十九南極騰輝接紫宸瓊筵晨啟座生春典逾周禮登延廣恩勝虞庠上下均山阜詩從文陛進地天運洽史官陳微臣得侍瀛洲宴奎藻欣傳黼座新刑部八品筆帖式查禄年六十四天錫鴻祺維聖受命五福集疇八柄馭政高羲皇年懸仁壽鏡乃撰辰良爰占春孟禮洽千耆恩流萬姓臣職西曹恭逄篤慶皥皥熙熙以遊以泳刑部八品筆帖式徳芬年六十一喜氣賡歌帝道亨堂亷一體會耆英三千叟積春秋富尺五天垂雨露清儀鳯庥兹調舜樂擘麟旨矣味堯羮微臣幸附鸞坡末蓂莢欣看六葉生工部八品筆帖式管繼敬年七十三堂開五福疇錫殿建三雍鼎新久厠冬官備職欣瞻海宇同仁華嚴無量壽佛蓬閬有象陽春皓首龎眉盛會飲和食徳維均工部八品筆帖式期成阿年六十六瑞靄繽紛玉漏遲盈階舞蹈覲天儀星羅北極排仙仗雲擁南山獻壽卮虞陛工官曾奉職周廷事典舊分司每看河海祥圖獻禹績勤勞仰聖慈工部八品筆帖式伯岱年六十二私幸恩覃薇省渾疑身到蓬池四海得朋三壽千載欣逄一時天上鈎陳肅肅花間玉漏遲遲君子飲食燕樂醉飽攝以威儀理藩院八品筆帖式徳保年六十二尚齒恩推典禮崇殿前黄髪慶來同欣當六府平成日齊效三呼祝華嵩一職司徠逺典羣藩皓首熙熙共拜恩普錫西濛聯北海恒春仙酒碧瑤樽二内務府八品筆帖式常有年六十三春風披拂過銅街紫禁絪緼景色佳仙仗五雲羅玉殿霞觴九醖進瑤階瓊筵列坐殊恩溥鳩杖頻頌異數偕竊喜微臣逄盛典行來媵爵酒如淮内務府八品筆帖式常紹保年六十二人戴堯天浩蕩樽開舜日舒長嘉宴寵頒千叟引年典邁三王微臣職司内帑方物萃自遐方藉見穹輿廣大同徵壽㝢堂皇内務府八品筆帖式全保年六十一錫爵寧耆耉卑官亦不遺鴻恩覃壽㝢燕喜萃春墀静會嘉魚奏高歌鳴鹿詩平生嫻法從今日覩朝儀内務府八品筆帖式常徳年六十一鳯城麗日慶兹辰稠疊恩施巽命申金戺崇開千叟宴玉階榮抃萬年春自天澤普鵷行徧率土歡騰鶴髪均文綺精鏐同錫福霞漿雲液總含淳祥飈入律薰風叶徳産充庭玉帛陳扶杖幸承顔有喜職叨内府太平人詹事府八品筆帖式福僧額年六十三尚齒敦古風引年尤燕禮豈惟敷典章實以樂愷悌聖世宴耆耉慶運鴻濛啟廣樂聆笙簧醇卮捧酒醴煦日凝太和條風協嘉祉聯歩上丹墀黄髪慶濟濟欽天監八品筆帖式阿林年六十五蓬萊深處集羣仙仗簇春旗颺御煙自是昇平多壽愷稱詩長頌萬斯年一入律風和玉燭調承恩湛露下三霄小臣珥筆慚窺管竊喜南弧瑞聖朝二欽定千叟宴詩巻二十二
