body:
  text: 巻五預宴八十七人詩九十四首巡捕中營副將陳杰年六十三弧南星彩燭三辰黄髪差肩衎燕申元㑹引年逢有慶聖皇錫福被無垠翹闗自與材官選擊􅈀兼充汛掃人臣初由武進士補巡捕營守備歴奉參旗宣閫寄遂司戎纛駐淞津深慙曠職虛鈐轄重獲湔瑕隸徼巡臣前任江南提督獲咎䝉營守恩仍以巡捕備録用警夜繼因司迾卒清街並得䕶嚴闉久䝉豢養糜天廥復荷優遷拜紫綸曠典幸聨耆耉席殊榮歡飫大官珍流霞酌後顔能駐調露聆來世是春軒紀萬齡延喜誌堯年五老瑞符陳昇平祖制欣重覯歲歲臺萊獻祝新原任副將福昌年七十六羣仙甲子㑹蓬瀛何幸輇材得預名昔日雲中屯滴博臣曽署四川松潘鎮總兵今朝天上聴咸英一曽忝戎行度嶺梅恩憐垂老許歸來臣以廣東副將年老告休那期鼓腹含飴日得覲天顔法宴開二原任副將巴福書年七十二通籍五十載七旬有二齡從軍屢却敵遇賊曽獻生功牌一再得纖芥不足旌有幸奉丹詔俾出典緑營微才任分閫駑拙慚老兵退休遂所請曰歸有餘榮臣曽出兵擒賊得功牌三因年老原品休致何期介胄士獲睹皋䕫賡千叟話清讌再拜趨彤廷勝事軼圖畫瑞牒臚姓名恩慈浥露蕭雅奏聨雲英所希億萬春長此遊昇平原任副將張允師年六十七弱水三萬里東海如碧環太極老人時往還安期與羨門逍遥寄人寰豈意彤廷綴兩班人生此樂須天賦共喜鵷鸞歸禁籞拜賜金壺雨露香篋中尚有絲綸句集蘇軾詩句原任副將文壇年六十三純嘏孫生孫盛典聖繼聖久道文觀成郅治武無競軍屯一尉熟斥堠萬里淨惟聞寛大詔不事威嚴令臣忝𨽻戎行日月寄鞭鐙無能學孫呉徒愧貳亷藺昔官望蓬萊臣曽任文登營副將今乃步真境海上三山㳺寰中一人慶䕶軍統領延強年六十四仰望珠囊映星弧燭瑞占古稀綏海㝢錫福徧堂亷三極通平格羣雍協養恬南山詩再祝東海算頻添嘉㑹初筵秩承恩庶老兼歡從交泰洽飲謝典儀嚴異數參瑶席微材握玉鈐戎韜慙董率渥澤喜濡霑韶序祥颸轉春光瑞旭暹依天一何幸從此願長瞻䕶軍統領四達塞年六十一仁壽普垓埏迎韶敞盛筵旌斿瞻上象冠佩集耆年法樂聞天闕恩酺逮日邊至人宣闓意鞏運倍寅䖍頭等侍衛納漢泰年七十九需雲既卜卿月偕從受天百祿承恩九重九重巍巍近徴前典萬國熙熙叟千其選選今倍再榮際良辰惟皇之對錫被如春春澤孔長念我帝力臣既賡颺敬告萬國隔句用韻體頭等侍衛希蘭泰年七十班隨虎旅擁星旄奏凱歸來久洗刀干羽兩階齊試舞貔貅萬隊早垂櫜欣霑渥澤邀三爵敢詡英名學六韜夙識陣雲成瑞靄筵前還覩五雲髙頭等侍衛滿保年六十七憶從早嵗侍丹宸五十年來宿衛臣榮戴鶡冠依近籞欣随豹尾扈清塵詔糈久荷恩施渥奉使頻邀寵命新載錫龍光趨舜陛許扶鳩杖飫堯珍融怡暖日千官㑹披拂和風六合春咫尺彤庭開壽域期頤長此沐皇仁頭等侍衛宗室泰來年六十一良辰式燕日初長千老來稱百福觴貳膳同時分翠釜三漿以次逮鵷行春回瑞吐彤庭莢宴罷衣霑玉殿香嘉㑹共欣逢郅治紀恩身幸列銀潢頭等侍衛宗室巴爾黨年六十珠緯南弧耀采玉衡北極迴春景福地臻五福一人壽集萬人菌閣蕙樓馥郁璇源玉葉璘玢蓼蕭湛露同奏行葦況沐至仁頭等侍衛庚音素年六十皇極㑹歸備臻五福大衍同符古稀膺籙仁壽化涵曽元慶篤端履春韶暉霏晨旭光啓闕廷賞延臣僕齡有躋百旬咸及六臣叨羽衛卌載竊祿御輦分隨仙㕑寵沐海㑹熙恬嵩呼申祝載飫堯尊光華旦復頭等侍衛阿什莫特年七十五聖人御宇海隅日出罔不率服伊犁拔達山久矣𨽻臣僕同我太平以亭以育于闐嵗嵗貢琛玉地不愛寳天膏渥微臣庸陋幸得趨輦轂室家婦子廩食完足遂令邊徼臣得厠衣冠族髙厚之恩覆載均湔瑕剔垢疇比倫臣於乾隆三十一年奉㫖加恩以公爵留京上年因事革爵復䝉恩賞給頭等侍衛即今年垂七十五犬馬餘齒知報主叨宿衛預宴醑長筵列坐歌且舞祝聖壽齊天度越萬萬古捧觴拜手稽首言候蟲春鳥何以名乾坤陵總管永和楞泰年六十一稽首歌長發長白雲蒼茫飛度結岱宗萬古表東方維天降帝女茹以朱果祥鬱鬱勢蟠龍國運由兹昌神孫開奕禩赫濯當我皇阼啓五十年日恢四海康四海安耕鑿雲棟賡明良纘述超亘古聖典何煌煌敬惟臣祝君君亦榮臣觴野苹鹿呦呦朝芾鸞鏘鏘耆耉三千人瑶席分巖廊下自六十餘上有百五强皆願人嵗百引以三億長合言祝聖壽聖壽本無疆欽惟寸草心仰戀熙韶光各各有分暉人人有獻將況臣久沐恩職守五雲旁用歌發祥篇敬以陳當陽額魯特總管察漢伍巴什年六十二詄蕩天門淑氣新皇慈布濩浩如春三千里曜初臨丙九十風光首此辰一湛恩下逮詔書傳歡動林林總總年若道古來榮際㑹圖成王㑹尚疑偏二察哈爾總管嵩對年六十一金甌鞏以萬代玉燭調為四時青閣榮抽芸草文堦彩蔚華芝升恒日徳月徳箕畢風師雨師薄海溥徵人瑞長筵羨錫期頤㕘領保福年八十五千官花覆艶春光上壽堯階共晉觴釐迓三神當上日福延五代啓新堂賡歌喜聴魚麗什奉職虚隨豹尾行馬齒八旬還得五餘齡長沐聖恩長㕘領四和年八十壽曜輝南極需雲映北垣萬年天錫祜五世聖詒孫優老春祺播初筵懋典敦駑駘開八袠酺醼列千尊憶昨欃槍掃曽隨細栁屯百回摩敵壘兩鏃記功㾗臣曽於霍通胡爾哈諾爾地接仗百餘次兩受箭創繼就邱園養還施雨露恩餘齡參齒㑹喜奉霽顔温㕘領福海年七十九良辰開熙春宴典錫耋皓嘉魚歌依蒲樂愷邁飲鎬和聲龤笙簧喜氣逮蓽葆猗歟揚鴻庥晏羨祝有道平仄體㕘領海徳年七十九風吹緑野春光好彩勝棲門春燕早桃符换後飲屠蘇少年樂事新年俱景象家家若畫圖相逢客醉交相扶誰知海上蓬瀛客帝㑹三千筵八百麟脯瓊漿生未知竒珍文綺欣盈積三千貴賤殊匹倫平墄敷席儀則均龎眉皓首䝉天福拜賜歸傳與比鄰㕘領世寳年七十九協氣春喜鬯祥輝黼座盈微曹聫鶴髪嘉宴錫觩觥㝢壽三千界山呼億萬聲衢尊偕庶老昌運頌昇平㕘領巴岱年七十九聖皇開壽㝢六合承恩波旭華既榮鏡人瑞尤星羅條風應律嵗載始盛典肇舉殊常科九重巍峩啓雲陛列席次第依凰阿惟皇敷錫逮臣庶笻杖濟濟連鳴珂韻諧球玉仙樂舉春融尊斚天顔和龎眉皓首咸在列受祉數溢三千多況復列官在環衛周廬朝夕司誰何願將華邑封人祝來繼卿雲八百歌㕘領萬保年七十八恭承郎宿位老忝領軍銜賜讌周耆齒含香列殿巖魁杓分沆瀣大樂奏韶咸不羨東華籙琅書七寳函㕘領紀大恩年七十八拜舞彤墀覲聖顔中天昌運藹春寰龎眉皓髪聫翩集文綺精鏐次第頒訢鬯淳風依壽日娯游渥澤自童鬟騰歡詎數華胥國瑞達重溟慶溢山㕘領舒丹年七十七旃䝉兆嵗開青陽金船銀甕紛嘉祥聖人御宇壽而康年符大衍祥長發英耆三千來天闕黄耉鮐背排鵷列嘉醴錫宴稱瓊斚飲和斟酌瑞露寫微臣幸依瑶階下獲預嘉㑹欣鳬趨三千人同効嵩呼萬嵗者三聲有餘㕘領周景竒年七十五初筵嘉樂洽懋典頒吾皇錫福兼中外推恩徧壽康千官聫鶴髪三爵晉霞觴菌質何多幸躬逢化日長㕘領梁彬年七十五衢壤歌傳湛露瀼三千耆壽覲龍光律回葭管春無限宴闢瑶墀慶未央接席分曹瞻御座傳杯飲滿挹天漿小臣久沗朝班綴末秩曽隨禁旅驤臣於雍正九年曽出北路兵一次七袠年華欣遞衍兩朝恩澤浩難量古稀天子綏多福榮及樗材得拜颺㕘領那爾泰年七十四川岳效靈辰垣拱極聖皇綿祚九圍是式儀由雅正史淳禮則黄髪皤皤引年劭徳邇序三千逺推萬億前典重光彝訓敷錫韶陽昌輝甘醴沛澤三古莫京萬福攸集㕘領佛保年七十四華宴宏開禁籞湛恩長錫期頤人戴巍巍蕩蕩春呈皞皞熙熙馬齒自慙衰劣雞翹忝奉光儀稽首敬承渥貺比肩長祝繁釐㕘領倭新太年七十四壽星出房弧南列羽林將鈎連鼎注拱太微叢雲卿月交相向臣昔從北軍前鋒隨玉帳盧矢在箙弓在韔西山髙髙下瞰烏遜爾摩雲仰出石砦上摧鋒一晝夜司勲録功狀褭蹏之金拜天貺臣曽出北路兵於烏遜爾地力戰一畫夜奪西山砦仰獲恩賞至今矍鑠年復列紫宸仗恒河沙數華嚴藏恭惟皇帝陛下曼壽祝無量仙㕑珍大官釀景宗賸韻拜手賡湛恩下飲千夫長㕘領四十六年七十四孔子曰仁者壽老􅆅得一以貞五福堂開五代長春晝聚長庚盛㑹甘醪羽爵雅歌鼓瑟吹笙日麗萬年枝上古椿難比同榮㕘領托豁禮年七十三開泰當陽布早春長筵髙宴慶臣隣三霄玉醴欣同受五石琱弧憶昔親臣曽出兵五次得紀功牌十六恩賞銀縀日下閒身陪列舊年來華髪上頭新精鏐文綺恩重荷颺拜徒慚意未申㕘領拜思呼朗年七十三帝載無私覆陽和慶萬年龍光依黼座虎拜答瓊筵春酒觩觥馥琪花彩勝妍還同華封老鼓舞祝堯天㕘領艾申年七十三雪晴鳷鵲輝霞綺丹陛曈曨申燕喜古稀天子洪陶甄化成久道五十春香山勝結九老㑹洛下亦半中朝臣玉衡初回斗車轉蓂砌韭盤春已徧賜酺三台出上尊引年千叟來芳宴華祝觥稱樂未央蓼蕭湛露荷龍光仙韶共聴鏗鏘奏天酒都含沆瀣香仁壽光華萬方賀武衛猶䝉及參佐老臣羅列應星文紫氣髙瞻五色雲更揖崧申推絳亥臣年七十有三適符絳老榮分鳬藻羽林軍㕘領髙嶸年七十二皇極三辰正恩光萬國同春韶凝算永耆壽與時崇宴樂魚依藻謳歌鳯在桐承筐齊拜手渥賜近宸楓一樗質分微秩瑶階預大年幾回趨傍轂此日聴鳴鞭糺縵卿雲旦氤氲玉鼎烟遭逢真自幸長侍聖人前二㕘領特英額年七十二丹墀瑞日珥抱紫極吉雲葢旉耆碩臚歡式燕天家恩禮攸殊仙醖移來玉甕珍饈出自瑶㕑千叟特成髙㑹萬年永慶皇圖㕘領保成年七十二碧鷄報曉鳯律新九重丹詔三元開鱗鱗萬國恩維均曰今舉典宜先該嵗之六日春盈旬燕洽耆老觴春醅三千餘叟髙筵陳下及蒲栁上棘槐蒼蒼佳氣光紫宸五雲多處為蓬萊誕敷渥澤無涯津鮐鯢之樂如嬰孩再舉三舉典長遵行詔萬叟承恩偕進退韻體㕘領班都年七十二璚饈列御筵仰瞻天尺咫蕭露湛先春介眉歡拜起頤老樂熙朝添籌紀惇史淳風暢以融式燕先論齒在官及遂初嘉恵荷俞㫖長倚萬年枝披拂及荆杞微材忝參領延齡蒙帝祉七十一春秋沾溉恩隆矣登春葭律回就日葵心似肅就鴻臚儀南山歌樂只㕘領和保住年七十一泰階煜爚三台現淑氣融融敷廣甸天顔有喜紫宸瞻帝澤如春黄耉徧瑶漿玉醴進堯鐘重秬芳菰調禹膳此日彤廷露浥巵當時蔥嶺風傳箭神謨烈烈掃欃槍天䇿焞焞爍飛電躍馬曽隨鳴鏑馳横矟願作搴旗先計較微勞鴻羽輕疊頒寵賚銀牌絢祇今鷺堠久銷烽幸厠龍墀叨侍宴九功七徳告太平萬禩祥暉天所眷㕘領巴海年七十一詩賡九如歌書紀九疇敘豈惟侈嘉祥純嘏天錫予五十開昌期億萬衍丕緒泰運日方中奎章詔來許玉燭爛春暉瓊筵湛芳醑千官拜手歡小臣陪鵷序曽扈屬車塵年年隨虎旅慶兹曠典遭嘉讌期再舉敬獻萬壽觴卿雲靄紫籞㕘領蘇克東阿年七十二珠緯南弧慶靄佳榮叨嘉㑹廣筵排耆英九老畫圖衍曼壽一人純嘏皆仙醴幾巡陪燕斚征衣百戰紀功牌臣曽出兵三次接仗一百十次得有功牌春韶嵗月邀天錫近沐恩光次鶴儕㕘領烏興阿年七十一東陸初旋黄道南弧上應紫宸嘉讌典隆往牒耆齡序接華茵蹕路卅年雲從軍行五度星陳臣隨圍三十次出兵五次九醖普霑渥愷懽呼願頌千春㕘領齊之禮年七十一蒼龍轉珠杓輝映觚稜日壽曜朗先丁星精下太乙欽惟聖古稀諸福慶必得振麟啓雲來翽鳯歌引翼嘉宴申厖耆鴛聫兼鷺集華茵九陛敷蘭醑千觴溢臣今樗櫟年七秩復開一初由列校登洊陟領軍職虎符既榮膺鯢齒獲祓飾稽首酌流霞恩與駐顔色㕘領穆克登布年七十一臚祝願陳天保頌簽名都屬地行仙欣逢燕譽龍光日正值重熙累洽年太乙下觀藜杖植丙丁先見玉衡連敷為協氣符吹萬望處叢雲蔭大千久幸櫜鞬匡衞列何期靺鞈湛恩延擎來露醖金莖溢捧到奎章琬琰鐫並喜賡吟聫岳牧一時挹袖萃彭佺曲臺記禮書更老三五虚將故事傳㕘領盧世煥年七十一史不必書星與雲郊不必育鳯與麟瑞圖及祥牒記載徒璘彬惟皇備五福四海歡同臻猗惟百年内兩覿盛禮陳需雲式嘉㑹令日占上旬祁祁集壽耉肅肅聫冠紳微臣自早歳養育䝉鴻仁職業幸不替㕘佐許屢塵荏苒遂華首年越懸車辰臣自養育兵以年恩襲佐領洊陞㕘領老休致蒲栁被温煦駑駘行逡巡慙無涓埃報猥被雨露新再拜奉康爵祝嘏同堯民㕘領旺保祿年七十景福有福即宫為堂其數有五五福用彰五福五代長發其祥子孫曽元與身康强乾乾御天綿綿衍慶髙元一室佩璽弄璋盛矣爍乎美哉洋洋既備五福聖製煌煌飽以嘉徳醉有酒漿醉酒飽徳愷弟慈祥被之筦弦肄之膠庠臣拜稽首上壽奉觴歌詩獻祝以賡廷颺㕘領九十五年七十凱奏歸朝屬羽林春回蒲栁日華臨提戈已荷論功最臣以出兵得功牌六執㦸猶欣拜賜深胥慶大年光國典兼培朽木見天心俯慙歈唱同轅擊仰叶雲霄韶頀音㕘領孫惟誠年七十一人膺受多福九野涵濡太和上日引年羞耉盈廷佩委冠峩壽獻璇墀聲沸觥浮玉液顔酡福綏時萬時億義遵無偏無頗一七十絳人甲子八千莊叟春秋欲將寳甕承露好從海屋紀籌泰陛仰參齒序天杯下許臣酬壽㝢福林同慶華胥建徳共游二㕘領栢齡年七十引年詔下紫綸温鶴髪趨蹌覲至尊五世同堂欽樂壽萬方拱極㑹貞元需雲快集霑濡徧酺澤分傳錫予蕃蒲栁微姿叨煦育榑桑霽色藹朝暾㕘領七十年七十列職期門衞蕊珠承恩榮遇近金吾開春早覺春如海萬里金甌慶澤敷一垂衣聖主健乗乾愷樂筵為法祖筵交韔雕弓依黼座堯暉盎盎滿華顛二㕘領伍什那年七十帝祚萬有千歲天家五世一堂玉琯韶回風信瓊筵歡酌霞觴率土躋仁壽宇小臣忝陛楯郎鎬飲載賡既醉軒齡共祝無疆㕘領全徳年七十庖琴軒瑟八風諧舜榼堯尊次第排山澤詔頒羣叟徧闕廷恩被一時皆東風應律韶生琯北斗承漿釀似淮願祝鴻禧昌壽㝢長分光寵到青緺㕘領豐伸太年七十瑞靄韶光擁玉除自天華宴衆歡臚元正舉典排筵秩羣叟分行拜闕初籙奏長生瞻有喜觴稱益壽樂于胥祥符爭睹星雲爛化㝢同遊歲月舒列職共欣叨宿衞承恩最渥近周廬微臣際此真何幸臣食俸餉五十五年惟衍皇疇頌九如㕘領六十保年七十年豐人壽愜宸懷巽命重申福孔偕數再倍千䕫虎列聲三呼萬鳯鸞排綺筵次第開雲棟華髪繽紛映日階億載一時方未艾小臣惟望澤無涯㕘領鄂興年六十九九天旭日開曈曨閶闔曉啓祥雲中玉階拜舞集千叟華封共效三呼嵩臣備䕶軍職㕘領日依禁籞趨丹楓駑駘自勵竭鞭䇿羽林豢養慙無功扈隨豹尾五十載榮詔復與天㕑豐惟歌萬壽頌萬福普天之下咸登壽域披春風㕘領保祥年六十九韶序初春淑氣融耆齡尤荷國恩隆金支彩映丹霄日瓊琯音和玉陛風覲帝寧惟來五老備官更欲勵羣工㣲臣逐隊慙非分身在堯天廣讌中㕘領拔常年六十九慶霄日麗宴九華寒自積冰熱壽麻春風同坐汎流霞天南老鶴籌添海酒正行觴徧蟒綵微臣膝席主膳宰自天授簡流汗趨況臣挽强長千夫願同野老歌康衢㕘領徳明年六十九洪惟我皇神聖姿壽人壽世無不宜追軒軼嚳超庖羲昊天儲祥福履綏緬昔聖祖時臣始總角微有知仙班上壽開宴白玉墀歡聲中外傳上儀家敦慈孝人恬熙周天卦數六十有四載太和元氣周淋漓我皇膺籙式九圍揆文奮武日恢之敬天纘祖道法垂横章縱亥皆華圻内修外治聲教施鳯紀五十備煥巍廣開恩宴集壽耆前聖後聖交光輝臣榮執㦸衞羽旗耋首欣慶值昌期華筵燦灔捧御卮願抒嵩祝合億萬算延繁禧㕘領山東保年六十九吾皇廓仁壽盛運超虞唐南極映天垣舉世多樂康微臣際隆恩効力馳邊疆驅馬彎勁弧奏愷歌揚揚年久鶴髪生忝復與寵光華筵釃甘醴鈞樂諧鳯凰同列三千人拜手齊賡颺耆老歡既洽億載春方長臣不知史編萬古誰頡頏㕘領薩爾當阿年六十八臣生有幸長戴堯天五十餘載虚糜俸錢昔預戎佐奔走後先臣出兵二次今值華宴忝綴班聫歡騰寮宷靜嘉几筵扶鳩舉爵上壽敬前箾韶競奏和氣以宣小大稽首天子萬年㕘領金璉年六十八小隊弓刀列禁巡久叨世職沛皇仁筵登桃實三千歲恩被龍飛五十春熙宇同時瞻化日康衢到處聴謡民更逢拜捧金莖露榆景常依日月新㕘領富興年六十八熊羆㕘羽翼鵷鷺列班行慶洽三雍禮歡承萬歲觴敦弓流雅什頍弁有輝光舞蹈于胥樂長依壽宇康㕘領扎爾桑年六十八皇極建元化甄乃文乃武乃聖神如秋之肅温如春臣本介胄士仗威從軍屯弱冠慕勇敢獻生敵愾服振振功牌廿四賜金百何意姓名兩度圖麒麟臣出兵五次曽得功牌賞銀䝉恩給巴圖魯號入圖像二次聖朝茂賞古敦倫乃今靈臺偃伯無烽塵時和歲豐壽㝢新特舉曠典宣恩綸耆英畢集齒爵均笙簧設酒醴陳帣韝祝聖壽蹈舞隨朝紳熙熙宙合萬福臻千齡萬禩歌皇仁㕘領巴義年六十八錫宴昭天慶昌辰肆廣筵趨班欣仰聖就席勝登仙湛露金巵滿需雲玉饌鮮頌恩何以似春景浩無邊㕘領豁吉圖年六十八天臨南極動星文景福宫開爛景雲五世一堂初獲覩萬年重宴幾前聞筵開瀼露周王鎬歌陋秋風漢武汾私慶㣲臣叨虎旅賡颺此日附鵷羣㕘領堆奇年六十八宴錫曰耆曰耄物其惟有惟時授几畨畨斑鬢覲光藹藹春祺來或同人于野飲皆授簡為詩自喜頽齡可駐還欣衢酌無私㕘領魏斌年六十七獻歲開春淑景佳詔宣羣叟列金階肆之筵或授之几老者安如少者懷恵必有孚恩浩蕩徳惟攸好福根荄鈞天奏裏衢謡進盛世音真六律諧㕘領塔欽年六十七雨露三霄渥雲霞五色菲介眉綏祉福拜手沐光輝鶴髪春如許鴻恩遇所稀賡颺逢盛㑹臣悃切瞻依㕘領紀大鏞年六十七嘉宴重開往牒稀趨朝黄髪有光輝仙毫捧出香烟裊甘醖分來湛露晞十日韶華連紫陌千人耆壽集彤扉微臣司印慙衰鈍同向堯階拜賜歸㕘領年常阿年六十七乾坤䇿始大衍萬億年際昌辰王者之民多壽皇哉與物皆春芙蓉闕下筵設糺縵雲中樂陳稽拜齊歌湛露無疆福運鴻鈞一南極一星光朗黄神十樂音鏗牓有昇平人瑞易曰久道化成薄秩世承厚澤華筵躬沐餘榮扶杖偕遊郅治披圖陋彼耆英二㕘領全泰年六十七鈞天法奏聴雲璈千叟筵開瑞靄髙羣向丹墀瞻日角同依錦幄映霜毛爻占鴻漸需雲洽雅詠龍光湛露叨環衞多年供末職蓬萊今喜厠仙曹㕘領明海年六十六夀㝢珍圖啓春杓淑序還鶴籌添碧澥麟趾慶銀灣共荷嘉肴錫同霑法酒頒霞斟三爵後璈奏五雲間耉長排鵷鷺符珍際鰈鸞虞廷方燕老愷樂見酡顔㕘領木隆阿年六十六瑞靄盈丹陛欣瞻酺宴新稱觴多夀侣列校到微臣濟濟人書亥熙熙月建寅承恩五十載長此頌堯仁㕘領那興阿年六十六聖夀夀無量皇孫今見孫猗歟位以徳祿夀名俱尊推之被四海淑景開曣暄嘉宴啓耆筵儕班及虎賁寵榮襲賜綺樂愷㪺衢樽仰瞻行健天喜洽天顔温㕘領湖海年六十六側聞神仙經軒轅張樂宴洞庭神仙虚無不可信漫云玉臺金闕朝百靈我皇御極五十載作人夀考海宇寧宸居拱北極環衞列衆星祥雲五色髙捧日陽和春吐堯階蓂微臣執㦸厠虎旅三英耀首榮翠翎徳威逺播揚雷霆萬里蠕蠢潛消形歸來荷樂育績愧旂常銘年年獮狩扈清蹕獲禽舉柴䝉賜腥即今垂白覯曠典天㕑飽許餐芳馨斟法醖醉仙醽祝萬夀兮歌椿齡何必蓬萊之島逺在滄洲溟雲璈一曲天上奏花茵拜舞容徐聴㕘領富僧額年六十五聖治重熙洽寰瀛福備臻引年遵盛典賜宴及昌辰宫錦斑爛彩仙盃㶑灔春老人南極外輝爍對勾陳㕘領佛寧年六十五法宴宣傳到玉鋪遥瞻星象煥南弧問年積算贏千萬那數香山九老圖一豢養年深白髪郎趨朝長自望晨光誰知蒲栁姿雖賤得飲瑶墀玉露觴二㕘領穆庫納年六十五領職依仙仗昇平忝備員折衝無一事麋禄到耆年受賚恩同渥賡颺序共聫自欣因馬齒榮近祝堯天㕘領豁尼音保年六十五班列龍驤七萃歌賡魚藻三章從臣咸受福祉庶老亦被恩光幸列虎賁脫劒欽隨螭陛傳觴願陳億萬年紀躋堂上祝無疆㕘領蘇章阿年六十五一人開夀㝢萬象共春臺拜命鴛行秩臚歡鴈序來青藜儕倚杖彩勝照傳杯華髪叨榮遇材官愧匪才㕘領衆神保年六十五古稀天子夀無疆嘉㑹榮依日月光九醖陳時霑澤溥五雲深處紀恩長每懷奉職慙樗散何幸陳詩預柏梁願借金盤仙掌露瑶階拜手奉當陽㕘領七十六年六十五兩獲功牌給曽隨驃騎營臣曽出兵三次獲有功牌虎牙㕘衛士龍杓預耆英尉豈煩戊巳星方見丙丁三千人與歲合以慶堯齡㕘領富寧年六十四廣八極髙三霄上下千古為熙朝金甌鞏固玉燭調繁禧降與民同徼年豐人夀萬物饒盛有華宴榮臣寮非赤松豈王喬但計曼夀依陶堯合數宇宙仙之曹未見一席三千豪天厨爛炙燔烹炰苾芬馨香羅芳醪尚方之珍燦寵褒鎮以如意天意包醉飽拜受鳯儀韶率舞以職陳螭坳小臣武旅欣與叨養老豈必誇庠膠春在陬風起條年年長此鴻恩昭易曰泰地天交㕘領富寛年六十四景運長開福備臻覃敷沛澤應韶春祚隆五十中天日宴洽三千夀宇人萬載昌期欣際㑹八方淳俗荷陶甄華封自古惟心祝未若休徵覩此辰㕘領羅布藏年六十四花甲臣初過四瓊筵喜躍遭逢萬國春陽露渥一庭耆老雲從鶴算下榮犬馬鳯墀上接䕫龍亥字未推絳縣寅衷已與堯鍾叅領徳成額年六十四壤擊傳三祝疇陳驗庶徵南弧星有爛東海日之升五世昌枝衍千官喜氣騰敦龎依長養仁夀慶同登欽定千叟宴詩巻五
