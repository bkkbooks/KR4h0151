body:
  text: 巻三十三預宴一百四人詩一百二十首步甲張有年七十八春到九重城春蓂六莢萌春人廿萬嵗春樹八千榮春是天皇世春敷夀者觥春雲凝黼座春頌大韶聲句用字體步甲三格年七十八嵗在乙巳月在寅天子養老重巽申普錫華筵歌燕喜趨朝鶴髪來蒲輪六幕和氣應序洽萬年嘉慶因時新杯浮琥珀仙醴馥厨扇萐莆玉饌珍精鏐文綺各溢願國老庶老霑澤均受賜抃舞况下走榮同萬彚迎陽春步甲住得年七十八至治同翔夀㝢春風先播皇州引年旁招千叟敷福嚮用九疇渥露衢尊飫澤慶霄泰策増籌蘿圖萬億及秭長頌恩覃澨陬步甲楊雲鵬年七十八丹熟餐仙䑕春生獻土牛虎闈晨四闢兔宇昨三鈎龍扆臨華宴蛇珠賜皓叟圖皆神馬侣祥並瑞羊儔猴臂慚雕榦鷄翹醉碧甌老非功狗效頌愧墨猪投十二屬體步甲趙福年七十七春入萬年枝祥霏五色露天心照萬物耆老䝉恩顧濟濟三千侣欣欣玉墀步芝英粲九光蟠木花㡬度尊彛饜􅌬醁磬筦聆韶濩燕歸舞康衢里諺誌榮遇步甲三兒年七十七海宇承平日正長耆筵欣繞御罏香三千兒齒邀恩渥鞠􅎽同擎萬夀觴一無事旗鉦步伐齊但傳街􅈀不征鼙韶春健沐耆筵後擐甲猶能射水犀二步甲曾孟賢年七十七迎春春既至綏福福可迓仰見九重恩溥入三春社臣生獨遭幸長年荷醲化錫宴慶扶鳩祝多願同華拜舞復無言于天豈有謝身遊軒頊朝松偓齡猶亞步甲四兒年七十七九陌光風轉千門淑氣佳河遊彰瑞籙華祝獻天階㕑萐承恩普衢尊拜賜皆春熙真浩蕩壽愷洽宸懷步甲依德年七十七靄靄雲輝夀㝢熙熙宴啓韶陽恒春樹滋湛露如意杖荷崇閶鏐綺駢闐溢篚耄耆舄奕稱觴宇下乆依幬載拜賜咸頌洪長步甲葛明星年七十六壬林喜與元辰㑹甲子還超絳縣年七十餘齡叨豢養更䝉渥澤燕鈞天一夙昔雕弧與挽强文犀甲映緑沉槍瓊漿老挹天恩重只為曾参貔虎行二步甲二小子年七十六𨽻籍旌門下恩頒自九重鈞天容舞蹈小水亦朝宗苑栁舒荑細宫梅著蕚濃醪醇霑湑渥率土樂堯封步甲李成得年七十六祥雲糺縵麗佳辰耄耋均霑湛露新獨媿涓埃無可效捧觴惟祝萬年春一夀讌初開聖祖年我皇繩武敞耆筵舊時擊壤兒童隊拜舞今看鶴髪翩二步甲郭進禄年七十六聖皇錫耆福末伍登瓊筵敬從鴛班後仰覿雲輝鮮京營隸步甲著伍有嵗年擐甲者曰甲執兵曰兵然在官乃言官粗識甲用堅善􅙀尚書誓有孚爾雅箋犀甲夀百年上下旅交聫兕甲夀二百合之以重綖合甲夀三百摰鍜益無前函人知甲夀人夀如甲焉環營萬甲士六街扈星躔天威廓瀛漠壽㝢蒸垓埏頌言壽而康學頌朱綅篇步甲進才年七十六閬苑風光麗彤墀日景髙迎春開瑞莢獻壽奉仙桃虎拜趨羣隊鳩扶比列曹濃瀼霑雨露小草慶同叨步甲馮山年七十六鳳紀司春啟翠圖龍光夀宴錫天㕑露凝仙掌分甘醴風動瓊筵應萐蒲化宇欽逢千載遇鴻恩喜向八紘敷即看既醉扶鳩杖颺拜聲先益九衢步甲二格年七十六書陳風四方禮兆日五色積照人協和凝祥天耀徳躬承行伍末無知唯順則帝洽萬年歡用廓九圍式端春啟韶風衆星拱辰北光被擴無邊受慶榮何極步甲八十八年七十六錫宴逢殊禮官庖出尚方由來糧糈慣重飽㫖甘嘗典邁横汾日詩歌在鎬章好矜槐市侣先得覲龍光步甲沈國良年七十六韶春淑靄九霄多醲化陶甄洽太和共慶耆筵叨異數金膏玉液滙恩波一幾載追隨虎旅班每依清禁覲龍顔扶鳩幸獲陪仙宴旭日羣誇賜錦還二步甲劉文亮年七十六韶序舒元化瓊筵啓禁林發榮天地德安老聖人心珍膳頒仙萐祥風叶綺琴萬方符玉燭愷樂荷恩深步甲白靈阿年七十六殊恩錫福錫康寧廣集耆年宴廣廷旭日春風華髪侣依光咸得慶延齡一久隸期門愧菲才瓊筵何幸得趨陪仰瞻黼座歡無極願效嵩呼進夀杯二步甲喜兒年七十六律轉三陽斗柄東九衢春旭照曈曨宇開仁夀耆英集詔許臣民拜舞同率土霑恩榮賜酺普天稱慶效呼嵩堯階仙莢初舒六滿酌衢尊日正中步甲劉忠年七十五老向彤墀拜寵光擐犀舊得厠戎行清街持􅈀承平日喜共鳬趨奉夀觴一夀獻敷天率土濵不遺卑賤荷戈人舉頭紅日瞻依近白髪親承黼座春二步甲德兒年七十五聖皇握寶鏡四海仰臨照照以仁壽宇輝光無不到猗歟千叟筵未見自典誥熙朝盛再逢長此慶耋耄天夀祝萬年臣名隸七校欣欣拜三爵丕際春同冒應知黄髪儔長養遍陬隩步甲楊保年七十五東風吹暖律淑景含華滋夙齡隸戎伍濟濟参威儀銀牌鐫夀字笻杖捧福枝上天無邊春聖人曼夀期熙和洽嘉禮醉飽摛頌詞異數浹微末抃舞拜玉卮步甲陳德年七十七共斟仙醴到蓬萊新嵗初當玉琯回千載欣逢千叟㑹七旬纔見七籌開敷天大澤陽和扇合殿祥風嘉禮陪超距漫誇三屬甲行聫末士上春臺步甲永定年七十五洪鈞旋大造物物俱增年天運日以新貞恒本自然同在光華中更邀景慶鮮漿醴懌黄髪銀鏐溥華旜山容涵萬有海量滙百川誰言小草微觧舞春風筵步甲康裕德年七十五久道斟元化天心洽太和青陽綏夀愷白髮舞鬖髿韶景恩加渥朱顔喜更酡舒長多嵗月華祝共謳歌步甲逹塞年七十五引年厪帝衷昌時樂燕衎絳甲書有差緑醑酌無算遂令什伍士亦與三千宴步武蔚以舒筋骸強在練香沾爐篆濃賜捧盤珍燦帝徳徧生成萬年頌巍煥步甲王大年七十五大同之世集福孔多祁祁夀考湛湛恩波雲開金殿風鳴玉珂萬年環祝九如載歌龎眉濟濟鶴髪皤皤涵濡德澤洋溢春和芳罍嘉鬯珍饌駢羅帣韝玉陛鞠􅎽鑾坡步甲額爾登額年七十五丹地耆筵敞壺天旭景長芝英仙圃饌雲液帝臺漿瑞獻千秋鏡恩濃百福觴星垣瞻畢昴五老有榮光步甲謝大年七十五錫闓宴乘春陽仰天戺蔚有光洽卿尹逮戎行賤依步軍隊什什伍伍䝉恩光皇城左右翼廵警掃除職所詳中營南營暨北營以次環列各汎防恭逢皇帝訓武衛核隊伍實加糈粻養廉及公費不扣虛名糧復以中營宜列禁苑籞増置左右南北位四方廵更防察步軍事拱翊垣曜依榮閶麋來復鱗集計齒餐瑤漿猥以由庚歌步甲萬年天子夀無疆步甲胡得年七十五九天淑氣鴻鈞轉合殿新釐霱雲展鳩扶虎拜效山呼以齒入班無待選惟有袀衣擊柝人敢邀渥澤承雕輦夀宴重開萬彚熙莘莘糾糾同捧琖環海歡聲動若雷不分貴賤躋春臺麗垣咫尺天顔近積卒微星傍斗台步甲五德年七十五燕以昭慈惠恭將既醉哦一篇三致意載叶九如歌夀㝢原依斗㣲行亦飲和歡呼逢國慶澤普萬方多步甲富德年七十五於鑠聖世百昌大備河苞海琛歸我聖帝玉琯徧燮於周天瑤圖統函乎大地帝日乾乾不言祥瑞麟鳳是毛羣羽羣珠璧是山器澤器唯有人倫樂夀光被一百五歲耆臣百九四家五世是所以揚聖朝之鴻床軼前王之職志臣忝華筵老步甲隊不知數花甲知歌夀康不知赤文與緑字步甲馬瑞茂年七十五玉燭調元日瓊筵廣殿開韶陽舒燕樂耆夀慶趨陪榮附鵷鸞列恩覃葑菲材歌詩效三祝願獻萬年杯步甲劉潢年七十五三殿晴雲五色開長生酒進紫霞杯恩深湛露春如海次第東風放早梅一朶雲呈瑞露華稠尚齒筵開禮數優拜手環墀歌既醉戎行何幸與觥籌二步甲僧額年七十四盛世優耆耉筵開寵命隆一人登上壽萬歲效呼嵩酒泛鳩盤碧花簮鶴髪紅分年羅上下别席序西東共飲堯樽露咸薰舜殿風豈惟周燕盛寧數漢儀同春勝桃增彩年祥雪告豐時雍占太史南極拱宸楓步甲七十五年七十四仙禁華筵曙色分春韶人瑞集懽欣萬年共獻瑤觴碧千叟同邀玉饌芬杖賜中朝齊就日弧占太史早書雲七旬下走叨酺讌渥典延祺邁昔聞步甲宋保年七十四嵗陽在乙斗柄東指羣雍集禧三元俶始天錫曼羡聖受多祉瑞雲彌霄豐澤下被千叟來㑹式燕且喜皤皤國老黄髪鯢齒錫之上尊睿容尺咫臣忝走卒列䕶蘭錡細壤塵嶽寸葵依戺異數殊榮敬歌萬禩步甲五兒年七十四聖華久照日升東慶洽耆筵萬福同法醖仙漿能益夀年年歌舞播皇風一皇家世界本如春宴錫新韶又飲醇夀字銀牌恭捧出杖頭長帶慶煙新二步甲五格年七十四署名陪鶴列錫宴覲龍顔夀耉丹墀集恩膏紫禁頒禮真逾洛水㑹詎數香山寰宇春暉滿欣歌既醉還步甲崔大年七十四旭華金掌麗芙蓉曉躡雲閶拜九重白髪歡騰歌既醉春光天上十分濃一列名羽隊班行末錫宴彤廷禮數均信是太平多壽愷欣隨虎拜慶長春二步甲趙起鳳年七十四萬彚慶春華千耆集瑤殿熙時重人瑞嘉禮洽芳宴既列瀛海臣亦厠星廬弁矍鑠卿士班期頤引羣彦俯幸菅蒯微均被陽和扇擎跪奉恩榮長依五雲絢步甲吳傑年七十四詔許陪耆宴春風序始和龍光依咫尺鶴髪喜婆娑共挹鈞韶鬯欣依藻祓多歡聲騰玉陛抃舞醉顔酡步甲大三兒年七十四執㦸隸兵籣埀白荷豢養廪粟給天庾泉刀頒内帑優游積嵗年犬馬齒加長夙昔挽雕弧今兹錫華杖春臺衆熙熙耆齡䝉嘉賞歡欣捧錫歸日麗黄金牓步甲林福年七十四列衛班依仙陌初筵寵錫瑤墀日邊預千叟席天上捧萬年卮燕禮光有虞典酺歡陋兩漢儀六葉仙蓂敷砌共欣啿啿春祺步甲徐泰年七十四夀讌敷晴旭恩波被八紘方升徴泰運至健仰乾行兩序仙班合三春景曜呈微齡同獻祝億載慶昇平步甲福兒年七十四聖夀逾古稀一堂衍五世維兹五十春積慶開綺嵗光天化日舒南極星躔麗鮐背黄髪臣皤皤三千計稽首沐殊恩奎華捧宸製願上萬年歌嘉祥欣洊至步甲范尚仁年七十四皤皤黄髪叟三千共沐恩波飫綺筵慶覿天顔春共霽璆珍鳩杖賜耆年一額首當筵捧夀觴帝恩錫夀夀而昌韶春廿萬齡同席舒作晴穹景慶光二步甲六兒年七十四泰壹開昌運耆筵啓孟春有壬瞻懋典周甲荷深仁㫖矣笙簧盛綏之福禄申太平欣擊壤歌頌萬新步甲鄧三年七十四五雲宫闕啓雕筵盛世純禧重引年鵷序冠裳仙仗側鳳城燈火上元前韜鈐末隸趨班久雨露濃膏賜福駢玉饌分嘗思獻頌無疆聖夀祝同天步甲宋得年七十四羲佐金提主化俗建福而下職有六乘時各需才與能不如微生坐飽太倉粟軒皇列陳􅈺貔虎葢飾金枝樂棡鼓九州萬國來趨風不如生太平時霑露湑粟飽太倉年復年碧霄湑露開耆筵鶴髪鮐背同祝聖人壽今朝臣侣地行仙步甲劉貴年七十四翠葉新香獻柏卮晨開雙闕引龎眉歡騰四海承恩日夀展三朋祝聖時燕喜盛超千古牒韶光先上萬年枝鳩扶虎拜臣何幸預仰垂裳坐受釐步甲李國良年七十四大撓作甲子天地滋數從兹始舜肇十二州熙熙皥皥人歡遊古來年嵗方可紀臣逢盛世越前軌日月光中奉一人年年鼓腹歌長春春風普錫耆齡宴益夀觴開瑞景新步甲談德禄年七十四五福堂開百福隆歡騰萬姓愜宸衷鳳麟協化天符瑞草木呈華嵗效豐燕衎徴歌春浩浩龍光錫慶日融融聯翩鶴髪三千叟都在蓬萊紫氣中步甲竇祥年七十四霽日和風大地暄筵開千叟㑹初元榮叨文几霑芳澤伍黍輕騶荷渥恩萬億千齡歌曼羡上中下夀錫便蕃黄鏐捧出歡忱叶緑杖攜歸笑語温瑞露初分延夀斚徳星齊炳太微垣顓愚亦曉三多祝敬向堯階拜手言步甲朱德年七十四矞雲鼂彩上觚棱温綍宣來寵宴承五福陳疇一曰夀九如肄雅日之升堯階舜陛恩光重昊歲羲年寶籙徴九陌誰何榮列卒慶霄渥澤喜頻仍步甲臘住年七十四履端辰筮六温綍錫天閶燕以示慈惠星方聚角亢蓼蕭歌有慶雲漢仰為章祥啟三陽泰仙壺晝漏長步甲來福年七十四惟兹億兆臣庶不違咫尺天威宴以黄髪台背仁于米廪深衣衢尊斟酌元氣金銓斡運化機稽首天子萬夀帝命式于九圍步甲立柱年七十四玉琯宣韶瑞靄融辰居端拱播皇風三霄雨露滋黄髪萬國冠裳仰紫宫聖夀延洪瀛岳永仙韶宣豫鳳麟同露樽風萐叨恩渥共荷生成大造功步甲六十五年七十四雍容干羽偃琱戈扶杖嬉遊值嵗和咫尺天顔新錫宴承恩齊唱萬年歌一律轉條風雨露新九州耄耋自同春環瞻北闕趨三殿共仰南山祝一人二步甲隆福年七十四閶闔晴暾曉霽九重錫福筵開藹藹同登夀世熙熙如在春臺桃實三千瑤島宸居咫尺蓬萊天子引年典重微齡恩許榮陪步甲額和諾年七十四曈曨開曉色璀璨列瓊筵玉斚分仙醖金爐藹瑞煙卿雲丹陛繞雅樂絳霄傳飽德羣情洽皇圖鞏億年步甲禄得年七十四海宇喜同春天家雨露均龍墀正月宴鶴髪萬方臣卿月舒光滿民星颺彩新即如牛馬走亦與玖瓊茵飽粟瞻依久傾葵拜舞頻微誠咸獻頌聖夀洽鴻鈞步甲王保年七十四青陽淑氣藹新年丹陛歡騰敞綺筵此日大酺霑湛露千官拜手舞堯天一鶴髪三千曉引班欣看咫尺近天顔雲衢都慶由庚瑞瑤陛還容步甲攀二步甲楊德年七十四魚鑰千門啟龍墀萬國朝瓊膏仙露渥嘉膳玉㕑調獻夀衢成咏沾恩巷有謠普天咸抃蹈瑞靄滿雲霄步甲雙得年七十四丹詔春温自九霄三千耆叟紫宸朝歳星獻瑞來臣朔昴宿呈祥獻帝堯華陛傳宣趨國老金樽優渥徧羣僚欣偕瞻就嵩呼洽寰宇和聲叶鳳韶步甲福禄年七十四福衍箕疇錫庶民光天玉燭朗楓宸三千叟入耆英㑹斗柄初看月建寅一風因列卒麗天街榮宴還教鶴髪偕黼黻昇平春有象太和桐豫入新荄二步甲富伸保年七十四十行丹詔下天閶髦齒欣逢春日長扈獵昔曽陪豹尾賜酺今許荷龍光崇釐衍羡欽宸極珍賚駢闐出尚方鏐綺輝新笻杖健拜恩齊頌泰符昌步甲常泰年七十四重熙累洽普沐元功億萬千界在春風中妍妍化日照臨帡幪開耆叟宴三千來同九列衣冠覲乾清宫兩行綺杖陛之西東雲蒸霞蔚黼合藻從既桐以豫亦棣而通仰惟曠典列代未逢身親被之捧賜龎鴻易地天交泰運以隆候三陽至泰時以豐臣名常泰敬頌天工弓匠五保年七十九聖世多耆耋殊恩下九天太官供宿膳春殿敞華筵紀侯符陽澤臚歡酌醴泉羣工俱尚齒藝士忝隨肩弓匠張清明年七十六玉陛香傳曼倩桃弓人何幸沐恩膏材宜合九歌交韔治已登三咏載櫜式燕初欣霑御賜分糈舊許屬官曹嚮心久作傾葵想浩蕩春光黼座髙弓匠佛倫年七十六累洽重熙民物恬引年共祝萬籌添五材久荷生成德甘醴還欣次第霑一玉琯初調鬯棣通九重介夀慶昭融遠徴燕禮虞庠盛㡬見推恩到百工二弓匠齊成額年七十五臣昔丱角已學為箕臣今耄耋巧者和之天子神武合九成規誰能撟榦乃學沈絲坐糜廪禄更沐皇慈一張一弛敷政攸宜合乎天道夀耉維祺箭匠喜住年八十四弱趮豐遲一笴擎靈鼉棡鼓震天聲聖人神武乾符健竹箭逢春亦向榮一八十餘年樂帝衢毎操蓬矢記懸弧何如虎拜叨榮日竊與添籌海鶴俱二鐵匠王玉春年八十八十山陽鍛深慙老斵輪罏錘歸百鍊鼓鑄仰洪鈞惠澤周微物涵濡及賤臣春風披拂處頑鈍一時新銅匠姜亮年七十五萬物如金在冶化工鑄以陰陽鼓潤雷霆風雨郊藪麒麟鳳凰築鳬空擅一技愷燕欲賦三章千叟嘉筵獻爵萬年天子稱觴鋄匠劉五逹塞年七十四九職昭皇治臣徴具器良考工同築削銘德獻金相尊記雲雷重漿凝雨露香耆筵欣既醉惟荷聖恩長鋄匠二逹塞年七十四優老華筵舊典循殊恩重與沛新綸籌添東海如升日星炳南弧為拱辰靈夀杖扶人是瑞長生酒引物皆春珍竒稠叠䝉天賚薄技深慚厚澤均鍍匠劉雅圖年七十五分職自慚良冶勸工亦荷洪鈞金玉式我王度文章假以陽春九牧貢珍三品萬年恩命重申願鑄無量夀佛長依有道聖人畫匠四九年七十八丹雘曾聞眡梓材斒斕五色象昭回生逢久道文明晝獻技先成萬夀杯一非霧非煙布菌輪松雲棟牖萬年新微臣縱解圖巍煥豈及天工景色真二油畫匠常青年七十八雲䕶紫宸殿風翔青琑門畫屏春晝静上日百花繁循典扶笻杖依光拜獸樽慚操油素侣祝聖記方言繡匠保住年七十六聖主宵衣五十年經綸乾愓厪民天仰瞻黼黻尊宸座乂見星辰列綺筵具十二章虞作繪上千萬壽雅如川微工拜獻冠裳地綵勝先期侍偓佺匠役四住年八十四從來夀㝢廣大就瞻有喜天顔執藝舊登官府程功匪近闠闤水地長年眡景金門此日陪班為楨多是期羡成裁欲儗倕般匠役吳國柱年七十九聖人建極福祿綏之春正吉日敕宴彤墀兕觥介壽甘醴如飴下逮臣庶榮沐恩施居肆成事省試有期與居一焉春臺共熙願歌萬夀引翼維祺匠役陳國柱年七十三大衍熙皇祚春祺遍八埏玉衡廻麗景金殿錫芳筵鶴髪趨承肅龍光寵賚駢瓊卮浮湛露仙樂奏鈞天列忝英耆後工慚物曲先捧觴欣拜祝禔福萬斯年匠役二逹子年七十三令節開筵荷紫宸鵷班肅穆紀恩新簫韶曲奏條風叶仙醴杯斟湛露均濟濟共依仁夀宇熙熙真作太平人小臣願效華封祝執藝還欣擊壤頻匠役辛太年七十二湛恩覃洽慶昌期六宇熙春麗景遲錫福重開千叟宴近光齊獻萬年卮賔寅暢戊調時序弧炳逢辰叶榦枝遂及冬官咨世守不同絳老待羣推衣冠仰望光華盛奔走深懷雨露私扶杖堯階欣拜賜長依黼座祝多祺匠役三逹子年七十二菲材叨贊尚方珍蒲柳姿慙嵗月陳欣值皇春開夀㝢榮沾錫福逮㣲臣一瑤尊露浥三霄渥紫殿蓂舒六葉新鳩杖許攜身倍健葵衷長祝萬年春二苑丁德住年七十六春風廻陽和草木知能夀植根近上林膏露濃於酎臣質非松柏臣年過榆柳身作掃花人心同灌園叟松雲生堯階魚鹿樂文囿遙望南山髙萬年歌栲杻苑丁六十八年七十三晴開太液波千頃珠樹琪花好風景我皇樂事與民同上苑春新日方永苑中多植萬年枝枝枝葉葉皆仙姿昨宵湛露霏金掌今日瓊漿介玉卮九光之芝三秀草恒春樹色蓬壺島上林花發最先知向陽自喜逢春早園戸吳天喜年七十九聖世皇仁浹熙臺樂共登九州䝉睿照萬物見祥徴甘露濡芝秀青霞向柏凝新春恩廣布上苑澤先承末役臣居賤聫班夀作朋瞻天何所報惟頌福川增園戸祁永年七十七聖謨洋溢仁風翔民諴物阜臚嘉祥龎眉鶴髪齊拜手和聲盛世鳴光昌羣臣酌醴分鱗次飫及嗇夫紀慈惠欣看瑞應滿神霄芝出銅池蓂在砌蘿圖寶祚方洪延伏惟陛下夀萬年竹苞松茂歌秩秩載賡天保南山篇園戸李福兒年七十六青陽播淑歳華新藹藹耆筵荷紫宸曠典遭逢千載遇熙朝沐浴百年人蘿圖輯瑞輝東壁景曜呈祥拱北辰周雅漫誇魚藻詠天家異數逮蒲輪園戸佟玉殿年七十五淑靄縈雙闕春光啟上林向榮瞻瑞木馴舞覩仙禽尚齒忘身賤承恩荷德深陽輝無不逮寸草比臣心園户拴住年七十五暄麗春光浩蕩恩遠占環海近仙園蟠桃花發三千嵗今數先開第一番一恩榮嘉宴洽重熙既醉長歌湛露詩共喜來朝本人日早占人瑞太平時二園戸二格年七十二萬年耆宴啟皇庭韶景榮敷六葉蓂仙掌初凝珠斗露天心環聚老人星花依禁籞光常紫草近瑶林色易青况被引年叨渥澤年年從此祝堯齡園户陳明住年七十二詔寵三千叟人人慶合并仙醽斟沆瀣雅樂聽咸英時紀春初麗天開日正明身依仙苑近花木盡敷榮獸醫劉長夀年七十七我皇懋敷錫詔酺延耆老華筵敞韶春湛恩嫓蒼昊廣樂諧鳳琯雅歌叶魚藻殊榮逮微臣依光頌天保奉職周官微率舞虞廷早茂育際昌辰胞與同至道請看擊壤歌熙臺春皥皥廐丁天祐年七十四閶闔雲飛過玉䑓流沙萬里驥呈材愛烏罕貢天閑選拔逹山牽德産徠漢皁漫誇成樂府唐縑空自費詩才盛朝閑佶陳輿衛聖世菣芻及草萊㢠向長風仙仗立驅將斜日廣塲回兼年惠養綏耆耋一旦恩光浹隸儓飽棧已同臣齒長效珍猶戴帝圖來從今更識前途遠老向長楊策下駘牧丁穆隆阿年八十二須知萬物本同仁芻豢天家作牧人明德謂其肥腯産豐年同此寢訛身開筵擬執于牢豖占瑞欣逢在藪麟垂老未嫌厮養賤此身長為感恩馴牧丁耿五格年七十六恬養天恩共孳馴物性咸開樽欣手捧掌畜署頭銜仙露浮輕笠和風扇薄衫醉歸占乃夢豐嵗樂非凡牧丁來住年七十五是月也以立春天子乃綏耆耉宴臣民大宛之馬九真之麟昭靈德而沐嘉惠莫不狎委而來臻帝曰咨爾牧來思三百維羣九十其犉慶豐是育使之碩大與蕃滋臣職司牧圉臣年七十五考牧天閑萬萬古臣以馬齒率獸舞牧丁代保年七十一北齊紀天保九百餘人盡耆老後逮趙宋年景德五百祥符千史筆但傳耆耋兼不聞齒爵能兩全我朝盛典邁三古聖祖垂光皇纘武鴛行鷺序殿西東華髮鬖髿映珪組帝臺之漿九期禾方壺圓鼎燦星羅試覩兩階成福舞願進東廂上壽歌欽定千叟宴詩卷三十三
