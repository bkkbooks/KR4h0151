body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻十預宴九十二人詩九十九首司儀長竒柱年七十一聖人治天下民蕃滋老夀史臣恒書之以為天所祐乾隆五十年詔舉千叟筵先期大吏章各以所部言益州張子翼吉州古朝爵年並百歳登堂同五世樂帝嘉集殊祥特敇予襃揚天題五雲牓四字輝煌煌寵錫示彛訓義具于詩章元氣遊太和萬物熙春陽讓善歸祖德承庥昭昊蒼天道有常理作善降百祥夫耕婦以織薰德而善良大哉聖人言至訓垂洋洋既躋之仁夀復返之淳龎實以敦厚教豈惟符瑞揚一百九十四兩家尤彰彰既閲百齡久始卜五世昌天家慶更早瓞衍蘭有芳聖夀萬萬歳五福五代堂司儀長書林年六十六燕禮饗禮食禮或亦兼養老之典書可拈地則上庠東序右學東膠各引恬然惟國老始得䝉恩霑其餘庶老則又别類以羣占禮意雖厚尚覺分尊嚴豈如我朝盛典該洪纎大小臣工以齒來堂亷再舉千叟之宴羅天䪜一倍再倍帝曰汝諧僉惟天既大率土俱被漸詔錫米肉綿帛周閭閻臣年及格樂依瞻榮以耄耋儕兹皓首與蒼髯受賜孔多春陽暹但覺朝廷之羙濟濟翔翔軼古函攷典證今拜手陳詹詹司儀長永亮年六十二堯韭長生益夀垹際時同㑹見敦厖龍飛億兆京垓算鶴立一千五百䨇東角星光騰殿陛西崑使者奉旌幢不須屑玉尋餐法親受金莖露滿缸司儀長佛敏布年六十一五色祥雲䕶泰階引年欣與衆仙儕福敷天上真無量春到人間樂孔皆敢以觴行無算爵記曽凱奏得功牌臣出兵一次接仗四十三次䝉恩賞功牌五感恩益慶恩頒渥拜舞惟隨九奏諧四品典儀官吉爾占年七十聖人昌運軼軒羲寳算寧須演䇿推鳯紀欣看周太衍鸞坡同此祝繁禧天光下際重闉啓嵗首迎祥麗景遲列座圭璋瞻上輔聨曹簪紱引龎眉坐班文砌儀初肅觴捧瑶華秩有差黼帳䨇瞻朝冠近仙蒲齊受惠風吹萬年有道民咸若百辟承庥帝念兹何幸㣲臣叨盛數欣榮得似向陽葵四品典儀官黑色年六十九六符徵㤗運五緯洽昌期祕殿耆英集韶春淑氣遲拜齊鳩共放班盛鶴頻移穆穆天光近三千愼禮儀四品典儀官老格年六十六昌符岳貢景緯天呈聖皇禔福寰海昇平隆開夀㝢宴集耆英酌霞斟露齒序耼彭皥皥熙熙宸恩遹溥道洽天心典䋲祖武衢尊既徧盛事乍舉蘶蕩難名超萬萬古四品典儀官木克登布年六十三籥啟春韶溥鬯籌開聖袠洪延景慶歌賡八伯耄耆宴集三千六幕熙登夀㝢九韶和叶鈞天拜手堯階稱頌共依景福無邊四品典儀官徳明年六十二椒花方獻頌蓂莢正敷階競逐鵷行入相看鶴侣排衢尊霑既醉天眷渥惟諧拜舞恩光下春濃早已皆二等䕶衛胡圖禮年八十二喬年書亥算淑氣指寅杓夀爵欣初及榮恩已倍饒坐深銅史漏恩紀栢皇朝五福堂顔燦中天聼廣韶二等䕶衛十逹塞年七十五三千花實八千春龍集旃䝉斗在寅正是青陽舒帝皥我皇仁夀協陶鈞一麗日祥烟歳履端宜春嘉宴集千官白頭䕶衛慚衰鈍今日同遊大造寛二二等䕶衛富成年七十四乘春布惠滿乾坤品彚同霑雨露繁伏櫪憶曽司御廏濫竽猶得直王門更瞻咫尺天顔近彌感㴠濡徳意温願祝升恒無量夀瑶階拜手捧堯樽二等䕶衛杜方年七十四隷名藩屬備扶輪得麗星潢拱紫宸翊衛有司依列邸海天何處不陽春耆顔並託雲霄上夀祉長沾雨露親何幸㣲翎同燕譽真欣小草傍龍津崧高敢附生申列華祝應齊算亥民自忖無能慙馬齒重隨有慶溥鴻鈞十三年奉恩波渥臣食俸十三年億萬齡欽歳紀新綵勝華旛星靄裏玉鳩扶杖頌松椿二等䕶衛金起年七十一邸第叨榮祿耆筵預樂胥七旬添歳後正月數蓂初翎翠花争映􅌬香露不如深仁歌燕衎歡洽奉觴餘二等䕶衛同孝年七十龍池纔見柳條新燕喜光華恊令辰已仰鰈鶼元㑹盛恭逢飲饋禮筵陳帡幪瑞啟三陽泰敷錫恩先七日人勉效賡歌慚武衛祗將寸草頌洪鈞二等䕶衛福住年七十至治重引年養恬綿世徳列服共輪琛羣工各効職聖聖緒相承休祉時萬億嘉㑹啟耆筵祥光被八極皤皤黄髪儔星垣長拱北隆儀宗伯陳珍膳大官飭彤廷春晝長醉飽荷生殖報稱念㣲涓葵忱常斂抑二等䕶衛䨇保年六十八鴻圖燦爍鳯琯鏗鏘率時翊衛仰跂瑶昌旉與萬物闓暢青陽雲施畢逮酺食迭嘗沃若甘露泰尊柘奬旭日熙熙春祺穰穰羣生膏潤亶悦且康二等䕶衛四格年六十八仙壺晨聼紫芝歌丹陛開筵協慶多臺共登春春酒介觥稱上夀夀星羅三霄嶰管宣鈞豫八伯卿暉醖太和福備一人敷錫厚許教小草饜恩波二等䕶衛胡哈那年六十七皓日麗中天蓂開報春始絳叟不記年覼縷稱甲子末職𨽻藩衛叨陪肆筵几我皇述祖制嘉宴重躋羙千叟皓鬚眉臣隣歌喜起鳬藻氣矞皇龍顔天尺咫蕩蕩無能名皥皥軼惇史萬八千歳春又續三皇紀一等䕶衛七十一年六十七紫殿奏雲璈彤階植翠翿潤知蕭露湑飽喜萐厨叨綺旭敷瑶席卿雲布彩毫衢歌天浩蕩長此戴恩膏二等䕶衛他虎年六十六彤墀初日煥銀鋪嘉讌宣慈湛露濡一曲昇平千叟共堯尊先已飫中衢一昊頊齡延耀簡編聖皇仁夀總如天小臣週甲纔添六長覩星輝拱北躔二等䕶衛春寧年六十五介景凝禔曰惟上聖祚衍太衍古未有盛五福五代顔堂集慶人遊夀㝢濡化樂性黄髪庶位蒼顔兆姓近天子光捧觴􅎽敬需雲之宴裳華之詠占老人星南弧暉暎臣幸趨陪天閶髙夐曰祝純嘏宇宙榮鏡二等䕶衛重陽保年六十五盛世隂陽矩範春風草木萌芽手藤杖徵靈壽眉芝圖燦瑶華數典已超姬姒論年直邁庖媧抃舞三靈積慶繽紛絳雪彤霞二等䕶衛明德年六十五春隨鴛鷺趨彤庭龎眉皓首沾甘馨鶴綾鳩杖舒寳彩重以聖藻奎璧騰三千拜手瞻天近聖人製作物賦形苞列史貫六經帙上疊軒韻玉律應昊天禔福懋蒸蔚國家慶祉昭頻仍郅理泰清泰寧協恩膏溥出日四溟惟咸五帝三皇並列代希盛豈其能微臣跪繹玉檢字有燭霄漢祥光凝鳯闕佳氣煒日輝奉聖帝夀億萬齡二等䕶衛穆克登額年六十四南溟北溟福海五老九老祥星象胥奉珪進璧鮐叟飫德含馨春開一百九日夀祝萬八千齡小臣欣歌鳬藻未聞赫胥大庭二等䕶衛台必圖年六十四雲氣浹中天祥光溥九埏良辰駢鶴籙國老奉鳩筵各自承恩重同兹錫慶延呈輝欣捧日春滿玉階前二等䕶衛富隆阿年六十四豹尾雲垂煥炳璘虎彛霞注荷醲醇三千桃實華方始何必瑶池别有春一旭日趨蹌鵷鷺班三呼萬歳效嵩山小臣侍宴年重八為捧恩膏識駐顔二二等䕶衛古寧阿年六十三春滿瓊階燦羽旄紫煙濃處北辰髙周天琯協隨鳴鳯葢地圖呈學忭鼇慶接椒辛排綺席纔贏花甲預香醪願同鶴髪芝英侣長向雲穹聼八璈二等䕶衛烏爾棍泰年六十二丹禁紫泥書春風宴樂胥籌傳巡海鶴候啟上氷魚接席瞻雲葢中天麗斗車聖皇億萬夀真到九龍初二等䕶衛鄧老格年六十二淳懿皇恩逺軼鴻濛飽粟煖帛萬國同地與侔資天與比崇斟酌元氣揚淳龎玉衡杓建春陽豐隆偓佺靈圉紛來從神膏饜飫仙醴怡融備禮和樂宣明聰金鋪麗日瓊砌和風紀逾羲策光有熊三垣輝耀九野帡幪飲和食徳仰昊穹二等䕶衛舒海年六十一仁夀徵翔洽欣逢郅治時首春開綺宴衆叟集彤墀厨箑多珍飫階蓂六葉滋雁行聨濟濟鶴髪樂怡怡共仰天顔喜羣瞻聖澤滋卦全昭曠典策衍祝純釐接武趨丹陛分曹奉玉卮㣲軀長努力敢倚賜笻枝二等䕶衛郭賔年六十一端月紀辰條風應節敷皇恩三靈錫羡層霄煥彩萃紫垣醴泉流唐甘露集樹五彩翻東過日域西漸月窟均便蕃隨風乗流奉琛進璧侍至尊八千春秋四百甲子何足論二等䕶衛陳鑑年六十一福錫前光紹韶開大衍初瓊漿滋雨露綺席列階除天夀原無量臣心共樂胥微材慚握管效祝羡簪裾二等䕶衛瑪尼年六十融融化日熙熙春臺極維皇建福自天來引年典重養老筵開蒲輪集盛鳩杖扶偕珍厨給饌瑞液浮杯恩霑雨露身到蓬萊龍光荷錫鷺序榮陪祝聖人夀歡騰若雷騎都尉伽藍保年七十七巍焕欽堯治雲天協令占引年久道洽受祉庶僚兼嘉㑹登瀛擬恩波似海添九疇符斂錫六幕際熙恬竊愧微材陋還叨世禄霑龍光容晝接豹直侍宵嚴率土威稜讋惟皇德化漸從戎叅靺鞈歸凱奉韜鈐伏莽先驅獲臣出北路兵獲奸匪五名摧鋒利器銛樗齡䝉養育葵悃效依瞻在廏駒慚駿開榮草並纎長春仙籙粲燕衎荷堂亷騎都尉常在年七十六奉職趨丹陛分行拜紫㣲幸陪千叟列得傍五雲霏饌玉初筵秩卮香御座依騎曹才短拙何以答恩暉騎都尉嘎爾炳阿年七十四髙挹層霄太極泉由庚蕩蕩普陶甄靈蓍策衍年符萬春酒稱觥叟溢千序齒方知尊齒意受恩各有紀恩篇沙垣獮獵風雲際羽衛威儀日月邊長沐和甘同草木何期拜舞厠耼籛小臣循省慚非分更聼韶鈞飫藻筵騎都尉佟安年七十三胄䕃華沗紳葵悰仰聖人七旬涵澤久羣叟拜新恩珍膳滋顔沃瓊膏入髓春敢將三祝頌蹈舞獻丹宸巴延岱年七十三仁夀天髙萬㝢同慶符大衍運璿筩老人星炯環南極芝葢遙迎綵旭紅一仁恩覃覆慶無邊門啟乾清浹綺筵臣比絳人添一歳叨榮列爵預三千二騎都尉尚安年七十二旦尾星髙瑞旭開南山齊進萬年杯青旂風展翔鸞集黄屋春深舞鶴來亥字人人推甲子嵩呼一一近三台置身喜在彤霄上欽聼騰歡徧九垓騎都尉槐唐阿年七十一應律天開韶序維祺帝錫喬齡列爵仍雲載衍奉觴湛露斯零王㑹玉環逺獻軍符青海曽經臣曽出兵喀爾喀愛滿一次萬年祜譜周雅十日酺陋漢廷騎都尉文殊保年七十一乾元慶保合九㝢歸陶甄羣雍遂其性仰惟聖徳純番番衆耆耉偕樂熙世春上瑞軼圖牒不數鳯與麟蓍策衍五紀韶光麗初旬觩觥酌膏醴含和兼潄醇鏘洋鈞奏叶咫尺温顔親臣昔列騎尉葩瑵侍玉宸退直三十載葵向未獲伸朽株吐萌甲天上陽和新升恒九如祝敬用頌大鈞騎都尉雅圖年七十一麗日祥雲擁泰階稱觴叨與衆仙齊地疑壺嶠韶光永人到羲皇樂事皆雪髪沗隨勛爵列晶盤欣接御筵排箾韶一曲來天上拜舞春風愜睿懐騎都尉阿爾京阿年七十糺縵日光華蓬萊天尺五恩如太液深八埏皆夀宇臣僕三千人台背紛拜舞對仗峙䕫龍執㦸陳朱虎臣職襲都尉早歳充勁旅臣曽出兵三次春風被榮光草木霑膏雨天子夀萬年賡載祝純嘏騎都尉富勒賀年七十乾符坤貞聖在握耿光仰覲開瓊筵因而重之三千叟惟曰至於億萬年金門曉敞晝日接華茵肆設耆英延歸昌不數鳴鳯律熙春正及蒼龍躔霽顔笑語賜斟酌宫壺醴瀉珍珠圓臣班驃騎列雲錦喜厠鶴髪瀛洲仙騎都尉額爾清額年七十祝嘏逾三古臚歡溢萬邦螽斯今衍百鴻紀古無䨇肅穆冠裳集舂容金石撞簉筵排紫殿詔飲列瑶缸仁宇開黄屋恩源溯緑江重熙徴齒盛曠典及眉厖共詡長春宴誰誇益夀垹惟欣遊化宇被澤遍洪龎騎都尉王銘年七十紫禁趨蹌恪彤墀拜舞䖍殊恩延世賞異夀及髙年瑞露金莖渥祥風玉管宣萬方同益夀歌頌徧堯天騎都尉馬克岐年六十九春臺啿啿含春熙萬物榮遂湛露滋天恩及時被羣動陽和煦育條風吹萬年天子夀無量四海錫福多期頤庭集千叟拜且舞酌以春酒介夀眉小臣累葉荷膏澤願獻南山天保詩騎都尉蘇爾達年六十八世荷朝恩渥身叨帝澤綿丹宸修盛典皓首預華筵薄植邀勲爵濃春爕軫絃世真遊頊昊人欲效彭籛禮重東西序圖開先後天華芝呈赩奕彩鳯舞聨翩鎬飲霑千叟嵩呼慶萬年仙尊春盎盎淑氣麗祥烟騎都尉塔賔泰年六十八春日賜春盤恩光露共漙遊河疑五老授几及千官史冊徵應少蓬瀛比亦難南山齊聖夀常望五雲端騎都尉福森布年六十七令節青陽夀㝢恢千人拜舞上春臺年逾洛社衣冠集樂奏鈞天酺宴開湛露寵承三爵後吉雲長傍九霄來幸隨衢壤騰嘉頌執㦸慙無掞藻才騎都尉薩克來年六十七維皇受命荷天之庥懿鑠隆茂恩覃澤流普錫耆老旨酒思柔千叟既集百禄是遒穆穆聖祖前規載留我皇法之既渥既優瞻天歡忭華席帣韝雨膏迭沛長此扶鳩仰惟萬禩福衍箕疇騎都尉五羙年六十四拜秩華資荷䕃引年燕禮同歡鮐耉虞周四代雲龍軒頊千官星斗光羅玉陛霞漿味挹銅盤龎號曡見申錫頌徳齊抒寸丹騎都尉伸泰年六十四景慶天垂曜芝松地貢祥至文歸黼黻大樂契宫商夀㝢人維瑞春庭宴益昌三千丹赤願皓首頌羲皇騎都尉六十六年六十二古稀天子超虞唐治隆德備景祚昌卿雲糺縵日月光五福一堂慶五代遹繩祖武典舉再三千耆耋恩同拜内集臣庶外梯航筵開釦砌㪺仙漿絡繹鏐綺出上方天顔咫尺天共戴小臣無材效賡載敬獻天保章以對騎都尉德順年六十二長筵開廣殿耆叟㑹初春䋲武章由舊敷文藻掞新月陽符吉戊日次叶良辰紀盛䝉恩澤瑶墀拜舞頻騎都尉博爾中武年六十一太平天子正當陽日月升恒麗八方宇拓寰瀛同幬載治隆中古嫓虞唐重開萐讌昭䋲武廣集蒲輪許近光露湛兕觥聨鶴髪雲輝虬陛引鵷行淵𠂻志喜摛新藻惇史揚徽炳舊章願頌南山松栢茂萬年純嘏慶無疆騎都尉分成額年六十一韶陽麗景閬苑蓬壺得最先誰其登春涵泳帝澤多華顛文䄄綺席威儀之數盈三千人文闡耀東瀛西氾昭聨翩祥氛慶靄梧岡翽鳯鶴芝田衢歡里抃英聲茂實超前編騎都尉巴郎阿年六十紫極巍峩霄漢間三千黄髪幸躋攀華筵寵荷仙厨錫文綺新從内府頒禮重引年兼庶老典隆授几輯朝班天家燕喜春無量寰海騰歡覲聖顔四品頂帯原任按察使藍欽奎年七十八六琯條風叶三壺麗景遲耆筵霑露湑廣宇徧春熙陳臬慚無狀依光慶有祺南山羣獻頌鼓吹叶昌時原任道常徳年七十九吹萬敷巽風大千積叟算恭惟夀㝢開值此卿雲縵衆志熙重熙元辰旦復旦初筵燦星羅上尊洽燕衎小臣領百城考績乏竒觀昔慚疆吏節今侍玉皇案仰祝億萬齡數綜大撓幹南山竝升恒巻阿有伴奐聖人長生籙即在勤宵旰原任道永昇年七十九方靣曽經奉簡書太平有象徧田廬豐年户慶稱觥日茂俗人同擊壤初負慝深慚勤奉職䝉庥得比老懸車餘齡歳月恩深矣盛世臣民帝燕胥頒詔伏觀丹闕鳯酺筵同詠鎬京魚喬松期偓瞻天近錫羡真令樂有餘原任道李琬年七十五璇霄慶積仁風翔普天薄海凝恩光月正元日丹詔揚嶽祇瀆靈典煒煌澤煦萬國和如春老人粟帛拜賜均孝悌節順從旌門期頤人瑞棹禊新上感南極舒光昌朔越六日嘉宴將膳珍倍貳爵酌康三千綺席賡以揚臣昔宣風乘朱輪今覩盛禮羾九閽三萬六千柱下存厚澤深仁古未聞原任道靈泰年七十三皇帝萬萬壽小臣前致詞大衍衍至理臣嘗學於師其數起天一盛難淺識窺皇帝五十載初盈手中蓍端倪闢乾坤觸類而長之萬一千五百豈能推其辭以之福穹宇舉世為期頤恩榮及㣲臣交泰亨占隨易曰可酬酢臣拜滿引卮原任道宋維琦年六十三積五帝徳奉聖人年聖人首出祥開天道超乾坤竒偶六位前器維利用耒耜井臼為民先九州萬國迎日推策芝葢如雲駢放勲逮重華治具二典篇聖皇備至德五運歸陶甄聞古有十紀聖夀均逾旃臣民沐大造襁褓趨華顛衢封徒有祝渾噩忱難宣惟合五典為一人夀天恩長溥乾清筵原任道松齡年六十一五風十雨泰階平春日光暉滿鳯城祝華偕來逢曠典呼嵩再拜沐殊榮金甌永戴天恩重玉醴還霑夀斝盈世是唐虞仁瑞溥向陽葵藿共心傾原任知府王錫齡年八十辰暉臨斗北星彩曜弧南海屋籌添萬螭堦爵錫三分隨丹仗立恩飫緑醽酣小草濃沾露春光共沐涵原任知府徐觀孫年七十八瓊籥開韶瑞藹聨詔頒廣宴㑹耆年承杯仙露分厨萐入律條風叶慶絃守郡榮曽邀聖澤趨朝欣得預恩筵我皇泰策増無量共仰瑶圖億萬年原任知府永寧年七十五筵開春殿慶仙都夀愷登咸福用敷夙愧專城虚報稱仰欣湛露得沾濡布宣敢擬中和樂熙皥曽披豐樂圖拜手幸隨鴛鷺末願將河洛紀昌符原任知府兆城年七十二華髪優游歳月長重開嘉宴紹羲皇小臣慶沐恩膏久身與瓊霄列宿光一一麾出守荷專城奉職深慙召杜名壤擊豳龡行部見臚歡願上萬年觥二原任知府董世寧年六十六韶開夀㝢炳弧躔錫福彤廷列綺筵五色雲中天咫尺萬年枝下叟三千曽叨領郡披圖舊欣許稱觴拜賜駢寰海昇平嘉瑞輯聖齡億秭及洪延原任知府阿敏年六十四天門鬰嵯峨生逢堯舜君朝廷半老儒紫綬映暮年竊比稷與契䕫龍廊廟珍天屬尊堯典耿賈亦宗臣傅説已鹽梅諸儒引服䖍熊羆載吕望槎上似張騫隨雲拜東皇王喬下天壇宴引春壺滿春給水衡錢分明饌玉恩水有在藻鱗昔曽如意舞瑞錦送麒麟惟有牟尼珠焕若靈芝繁雕章五色筆大哉萬世程叶軒轅休製律仙鶴下人間朝野歡呼同圖以奉至尊處處説壺公何曽藉偓佺淳朴憶大庭古者三皇前集杜甫句原任運同劉嘉兆年六十三南極祥輝迴瓊筵錫御厨中天開夀㝢繁祉集瑶圖拜舞千官盛貞元一德孚稱觥隨耉長熙皥樂唐虞四品頂帯原任知府岱起年六十五鳯闕春和戛玉音殊榮仰被感尤深黍苗膏雨慚臣職樗櫟栽培仰主心祖武三朝繩奕奕孫枝五葉挺森森稱觴歡躍鵷班裏盛事從誇僅見今賞給遊擊降一等職䘖誠岱年八十九祝鳩紀孫圖芝英標宋志齒一古所崇聖代協其瑞木徳歳旃䝉耆年喜麕至樗櫟曷足稱久荷頭銜賜敬隨鶴隊趨並位星躔次彌性純嘏常願繹巻阿義原任都司明保年六十八香山洛社傳畫圖勝事僅足夸枌榆當時景龍大觀宴未聞國老駢肩趨古稀天子備諸福明堂泰階升六符仁皇慶典臚瑞牒式醼夀耉千茵鋪聖華上協帝錫羡日升川増叟數俱文昌上將班鵠列小臣前執丈二殳鐃歌朱鷺奏凱入上方拜賜銀牌敷臣曽出兵五次獲有功牌賞銀興安數載典管鑰干城俯愧孱薄軀就閒歳月無寸效伏幸湛露加沾濡衛州防禦厠耆㑹臣與恩宴榮尤殊原任都司張漢霆年六十四宫柳未藏鶯階蓂六葉生羲軒臨黼座佺羡滿蓬瀛綵結宜春字香浮益夀觥檀烟霏禹鼎麟脯佐堯羮樂奏鈞天廣花開閬苑明衍籌綿福禄賜杖拜恩榮日下星雲爛天邊雨露清熙朝仁宇大寰海樂昇平原任都司景文年六十四歡臚六幕御筵開齊向彤墀捧夀杯仙掌露濃春酒醉天家宴㑹勝蓬萊一執殳憶昔到邊城叨獲功牌疊記名臣出兵兩次蒙賞頭等功牌四三等功牌一親見聖朝多盛事金川西極後先平二原任都司富明阿年六十二聖主斟元化青陽溥錫祺歡臚九如頌慶衍萬年枝笻杖頒仙陛霞漿捧玉卮葵𠂻何以報䖍效華封辭原任都司趙連琰年六十一天家渥澤浩無邊尚齒筵開洽大千玉液瓊漿傳既遍衢尊同日捧堯天一詩歌同澤蚤從軍叨秩多年未効勤重幸恩深依禁籞絳霄糺縵仰彤雲二中憲誥封大夫劉玉策年七十五春酒慶稱觴酺筵澤浩洋羣僚簪珮肅千叟鬢眉蒼接座同邀寵瞻雲各紀祥庸材沾雨露沗許附鵷行中憲誥封大夫丁日振年七十四盛典錫耆齡雲霄生羽翼同依天九重親睹日五色聖世協苞符巖廊萃珪璧下逮九域春融盎敷膏澤佺僑蔚林列夀㝢恢環翊應節風啟東聨羣宿拱北珍饌羅几筵華藻荷天徳感激此近光訓行㑹皇極中憲誥封大夫張璠年七十一春日耆筵肇啟萬方夀筴來同重華首聨奎筆藻韻上曡天工慶曜如珠如璧仙班為鷺為鴻緑髪蒼顔増綺赤忱長頌丹楓中憲誥封大夫韓龍震年六十五華茵錫宴萬方歡叟列千羣肅珮冠聖澤匪今嫓大美直逾雲紀邁龍官一廣樂中天奏六莖神芝春殿茁三英慶同威鳯祥麟列萃圃游梧樂蕩平二貤封中憲大夫朱堂年六十六嵗陽紀旃䝉夀星連鶉尾天周六十四曠典光前煒聖人御六合榮鏡懸黼扆古稀法天行日升而月朏鈞樂奏九磬蟠䕃敷萬卉喜氣縵卿雲大斗敦行葦萐莆扇几筵宫錦盈筐篚錫福既穰穰凝命益亹亹五代振斯螽三雍時述螘慶覃匝瀛禆恩湛逮葑菲微生欣昭蘇寵榮貤鄂韡竊附周雅陳臺萊歌樂只朝議誥封大夫吳峩年八十二旃䝉芒雒月太簇琯候魚上氷日建除滿春滿九閶夀滿八疃共率赤𠂻羣趨翠䍐帝賚予之事醳盈瓚申以駢禠瑰珍溢盌上自潢藩下逮鄙酇東逾鯷壑西訖月館仁皇天恩皇帝載纘照嫗培植俾姟兆算來㑹廷闕三千組纂㣲臣贏八榮覲雲繖敬效顓愚識慚窺管朝議誥封大夫喬玠年七十八星雲景慶靄中天春殿從容敞綺筵錫福歡臚歌八伯引年典盛叟三千瑶堦拜舞龍光近紫禁趨陪鷺序聨醉酒恩深齊獻頌聖皇開袠暢洪延朝議誥封大夫趙貴輿年七十三四時調玉燭和氣先春柔元為四徳長仁道覆九州皇春開正月元旦羅共球五日易一候六辰嘉宴遒簪纓集端序耄耋徴巖洲帝道動法天渥澤如春優令符帝少皥辰屬寅訾陬龍宿耀角亢農祥啟扈鳩青史古未有陽春肇吟謳朝議誥封大夫閆正戸年七十二讌啟昇平世瑤階瑞靄崇白頭頻晉秩青瑣預呼嵩饌豈林泉識人非酺㑹同瞻天躔緯近就日景光融倍覺春増煦常逢歳屢豐扶藤依紫闥挾纊對和風報効規臣子寅清凛在公如川増聖夀盛典慶逾隆朝議誥封大夫曹五棟年七十六韶靄三霄鬯照耆英萬國偕來皥皥同遊夀宇熙熙共樂春臺玉陛榮舒蓂葉瑶巵醲飫松醅景福仰邀敷錫依光慶詠臺萊朝議誥封大夫何熙年六十五接武萃龍墀聨班趨鶴籞布惠錫兼珍施恩頒緑醑龎眉映金尊黄髪飫雕俎微臣沐寵光品列鵷鸞序藻黻荷皇恩綸綍聞天語春風漾慶霄麗日輝仙宇恭聴咸韶音青雲正干吕喀什噶爾四品噶雜那齊伯克黙羅爾雜年七十一巍巍頌天皇夀超萬八千歳强小臣僻處葱巔側黙徳筠冲及天方河之西源在其地䨇源並㑹和闐葉爾羌古未入中國皇帝二十四載照以日月光収以版宇理以疆開屯設官秩要荒喀什謂各色噶爾謂磚房辨訛正譯仰邀天藻詳臣官噶雜那齊者乃是回疆小臣管理地畝并賦糧因其土俗榮以品秩轄以辦事大臣陶燮成樂鄉爾來二十有六春少者壯老者夀以康臣以逖逺趨天閶得覲夀宇遊春陽乃錫蓬池宴擎跪隨趨蹌崑崙山高河源長敬祝皇帝聖夀億載天中央欽定千叟宴詩巻十
