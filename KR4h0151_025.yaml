body:
  text: 卷二十預宴八十八人詩一百首護軍校富桑阿年七十臨郊臺在廣陽四出陛千步場繚紅墻森寶坊帝車蓋位中央此是功成郊勞處辛巳丙申行兩度崑濛已縶狼貙頸笻莋盡掃蚳蝝戶䇿勳慿廟算揚武仗天威將軍抱膝見戰士解鞍歸歸來大宴武成殿臣叨列校曽親見手親賜爵盤賜金凱歌聲裏春風扇今日耆筵禮如昨昔也赳桓猶矍鑠惟將豳雅兕觥歌換却軒轅棡鼓樂護軍校老格年七十純嘏卷阿詠梧棲與鳳喈髙年環菊水嘉宴啓蘭階魚麗物維有鴻圖福孔皆華緌逮蒲襏濛渤一時偕一韻體護軍校穆忒布年七十韔厥弓納厥矢趨走桓桓稱虎士生逢堯舜治垂裳列校何當上金戺四海榮光照不偏都歸仁壽境輪前射熊由鹿強而力牧賜何知七十年即今拜舞歌湛露更億萬年當幾度歸鞍拍手笑洪崖深恩自是臣遭遇護軍校八十五年七十蓬壺春晝景遲遲庶老歡承錫福時日上觚稜旗影漾風和閶闔樂聲吹分羅綺席龎眉集環侍彤廷皓鬢垂抃舞共欣逢有道小臣長此慶融怡護軍校揚武年七十玉律回條風煦玉燭條璇儀撫青陽左個開六莢仙蓂吐五十龍飛衍慶長三千鮐耉施恩普列席遍階除傳餐盡簪組寵頒更未央殊珍出內府猗歟休哉五代五福天子萬萬年蕃釐邁千古護軍校髙住年七十日華仙掌曙光妍廣殿松雲映倍鮮已是王春頒慶典更光人日啓初筵羲軒上嫓乾坤壽黃綺同推伯仲年禁旅歸來誇賜酺彎弓躍馬尚如前護軍校武英年七十錫福耆筵盛熙春泰宇昌一人膺景貺千叟洽恩光珍饌瓊瑤列仙班鵷鷺行小臣同獻曝願進萬年觴護軍校鄂德年六十九聖治懿美春和普協慶衍一堂祥開萬業右文化興引年恩浹敦隆茂典春維孟月秩秩瓊筵皤皤黃髮玉杖金樽霞漿雲液臣慚虎貔幸備行列六度馳驅凱歌駿烈月滿雕弓風回紫埒式仰乾行載霑需澤饜飫鼎烹追陪耄耋圖應芝莖瑞敷蓂莢羣生澍濡稽首歡悅護軍校伊立善年六十九典隆惇史紀膠庠瑞集彤墀帝澤滂河玉洛國仁者壽郊麟藪鳳聖人祥金莖渥浥三霄露玉殿濃霏百和香竊幸豹班偕鷺序會踰鴈迹效鳬翔前驅霜刃摩天迥振旅鐃歌入塞長侍鵠行分中壘技盤雕秋扈大畋場功牌又荷銀牌賜凱宴還逢恩宴張翹望嵩髙齊寶笇合辭稽首奉君王護軍校托寧阿年六十九於鑠皇功怙冒萬方環海內外煦育樂康仁漸義摩化成道久維五十年慶逢春首仰符聖祖曠典重舉吉日丙辰樂此樽俎金舄赤芾大都小伯皤皤庶老罔不逾格歡動闕下衆萬是瞻嵩呼華祝宣達衡閻臣備羽衛忝伺鴛行葵藿傾誠以晞朝陽仰惟帝治髙明博厚且以悠久億萬萬夀護軍校關明年六十九懋典均霑日榮分翊衛叨建牙慚部録尚齒得恩褒仗列參隨鶴筵依矗駕鼇春風長入隊儤日看揚鑣護軍挍富慶年六十九長年卜吉兆璇圗寶祚凝庥御紫都瑞靄絪緼融淑景祥風煦嫗洽寰區聖人壽合軒轅紀郅治隆超大禹謨文化覃敷周月竁威稜逺播拓星弧氣從龍虎交成泰格及豚魚信久孚皥皥春臺徴豫順熙熙壽宇啓恬愈微臣敢道勝持戟壯嵗會叨許執殳逐隊年深習超距匪頒嵗稔濫吹竽合簮遍召華𥚑集委珮還同赤舄俱碧砌花明陪鵠立瑤階雪霽效鳬趨兕觥滉漾相將醉鳩杖聫翩亦共扶竊幸羽林逢慶典欣歌順則繼封衢護軍校住格年六十八錫福書正月充庭盛禮容雲霞髙捧嶽鸞鳯總巢松鈞奏韺䪫協天杯雨露濃鷹揚胥虎拜三祝效華封護軍校富海年六十閶闔新開淑景長置身尤喜近龍光曽持豹尾迎春旭屢扈霓旌拂曉霜鳩杖盛於九老會鵷行同進萬年觴要知舉世登仁壽不獨弧占黼座旁護軍校巴彥德年六十八甲乙東皇長養春長生嵗月是天恩老人已向丙丁見壯士會於戊巳屯一星映長庚瑞彩繁辛盤先日戴銀幡暫離執戟持壬爵象比橫戈父癸尊二體十幹護軍校達蘭太年六十八嘉會舉昌期耆英茂翊贊春風淑氣和旭日景雲焕鴻恩逮牙校綴行拜春殿馬齒慙食粟鮐背榮燕衎錫福類斯同豈有竒功冠惟祝聖壽長萬國戴以忭護軍校經文年六十八聖治符前烈天恩寵大年黑衣仍入隊丹陛許隨肩洛社傳佳話香山有列仙何如今日會玉殿敞華筵護軍校常安年六十八鴻庥駢集耄耆朝壽宇閎開八極遙薰律和先聽玉漏衢尊飫復酌仙瓢千筵分列依魚藻九奏同諧叶鳯韶臣憶從戎韜甲後冠裳雍肅拜重霄護軍校福德年六十八南山雅詠樂臺萊何以春風盛宴開光國基邦同在列聖皇曼壽錫耆台一壯嵗驍騰愧佽飛天間豢養沐恩暉從今名注長生籙親飫宜春德酒歸二護軍校吉韶年六十八伊古聞優老何如聖代榮兩朝符盛軌千叟集元正厨萐和方扇衢尊酌自盈嵩呼參雅奏洛會陋耆英玉燭祥光協金芝瑞草萌禮交墀上下樂暢簴縱橫唯以人長壽為徴世太平稱詩賡泰運鸑鷟共和鳴護軍枝彌陀保年六十八昊縡眷有德純嘏惟皇躬太平御宇五十載覃施中外仁恩濃耆筵列玉陛清醴浮金鍾奏鳯管鏗鯨鐘八珍絡繹羅鮮醲千叟抃舞同呼嵩一堂五世茂隆古萬年壽宇方延洪作人雅化首太學橋門環聽親臨雍史奏德星聚書占日再中青雲紀干吕吹萬來協風年榖順成八蠟通河海清晏車書同願偕擊壤衆含哺熙堯封護軍校富爾渾泰年六十七聖德廣被皇仁遍該羣倫覆載庶品栽培國慶熙洽天光昭回宴開螭陛春臨斗魁域內千叟喁喁其來以倍以三為國臺萊仁壽金鑑照世玉杯班分鷺序頌滿麟臺抒忱樂聖堂哉皇哉護軍校三達塞年六十七當年錦帶佩吳鈎氣壓天弧上敵樓一自洗兵登壽宇瓊漿快飲數春秋一丹詔新傳鳯闕來筵開仙釀佐春臺遙瞻鶴影紅雲外海屋籌添萬壽杯二護軍校伊林年六十七聖皇建極福祿是宗象徴景老世等羲農矞雲春麗湛露晨濃上儀懋舉天澤斯鍾酒人尊設庖正殽供羣耆頒斌億載時雍臣職列校幸預陪從紀之惇史敻古希逢護軍校格楞太年六十七雲開閶闔燦光華玉斚金尊共拜嘉聖德誕敷洪錫福歡承湛露澤無涯一惟皇建極壽而臧瑞集三多慶衍長酒醴笙簧新惠普千秋嘉會軼虞唐二護軍校西蘭泰年六十七東風吹嶰管紫殿藹珠暾春到黃金闕人歌碧玉樽螭頭頻獻壽鶴髮盡承恩陋彼昆臺叟徒遊太極門護軍校達子年六十七紫極森天象黃雲捧帝車職從施互柝恩許近爻閭王會呈圖後耆英預宴初嘉祥千古集吉慶九天儲人以升平壽春從愷樂舒歡依嵩華頌福滿範疇書拜舞龍光下欣榮馬齒餘羅鳩會上獻渥賜幸何如護軍校巴達塞年六十六川珍嶽貢星如瓜古來紀載詞何誇我皇以人為上瑞生齒涵育浩浩真無涯五十年如一日千萬國為一家華胥樂土戶可封廪髙黍稌園桑麻期頤耄耋難僂指壽人壽世如庖媧方春詔啓千叟宴公卿庶士咸拜嘉醴芳肴旅列丹陛應田編特懸崇牙當軒手賜爵齒乃並重較之三代養老恩尤加惟皇法祖慶滋溥羣生鬯達抽萌芽盈庭稽手拜且舞益信凝庥茂祉超勳華護軍校花尚阿年六十六錫慶筵開集鳯鸞祥輝糾縵望雲端長庚太乙微垣拱員嶠方壺福海寬胥奉天光瞻穆穆忝居禁旅列桓桓鐃歌朱鷺曽擐甲法駕蒼龍憶負蘭蹀躞近知糜月俸氋氃老覺愧霜翰已欣捧日隨耆耉兼喜流霞酌大官從此仙籌綿甲子萬年嘉會澤常漙護軍校克星額年六十六景運中天五十春陽回玉律慶兹辰九重錫福臨丹極千叟臚歡覲紫宸醴挹仙尊浮沆瀣樂陳華瑟叶韶鈞牌鐫養老霑恩渥共頌鴻龎福祿申護軍校福克精阿年六十六帝德彌六合雨露春風含千叟集瓊宴百僚齊盍簮方瞳垂鶴髮一一趨䟃𧽼幸備虎賁列叨依華蓋函景星舒彩耀慶靄凝赤曇祐此下國人年壽皆喬聃樗材敬瞻就肄禮餐和甘自今億萬嵗嵗嵗歌恩覃護軍校額倫太年六十六元正上日春始和雪晴鳷鵲風光多耆筵逮下備恩禮藹藹吉士從卷阿恭逢國慶萬年壽豹尾班中效奔走承露寧誇綬帶囊鈞天自叶琅璈奏粗材老作司武官敢詡貔虎稱桓桓雲旄仗下升功格天䇿軍中𨽻將壇臣前後出兵接仗得功牌二昔時穿楊意輕遽歸來執戟蒙殊遇日華當殿禮初成天保作歌名自署挽弓盤槊愧無文榮耀今瞻五色雲翠葆華芝光影裏爐煙壽字篆成文護軍校蟒哈那年六十六鶴髮三千鵷鷺聫春祺普錫浩無邉傳柑節近分仙果入律風和繞瑞煙虎旅昔會隨票姚臣出兵一次接仗三十次蒙恩賞給功牌螭坳今幸接彭籛耄耆共荷天顔喜拜手瑤階頌萬年護軍校額爾登布年六十六運超邃古重熙洽瑞協春正介祉蕃仁壽萬年開帝宇鳯麟五世衍仙源棣通令節皆涵澤詄蕩天門各就暄盛宴特頒臣逮庶舊章載舉祖貽孫螭頭携杖皆鳩健堂下稱觥有虎賁聫句已聞超漢殿手卮遙見賜堯樽春臺協氣昌昌集上苑韶光冉冉繁到此信知天廣大航瀛梯嶂共乾坤護軍校布勒庫年六十六玉琯調陽律文墀萃廣筵趨陪千叟後拜舞一人前仙醖浮花露宸章麗錦箋願賡魚藻詠愷樂遍垓埏護軍校烏爾衮太年六十六蹕路屢隨玉輦戎行亦預金川微勞暢沐膏澤懋典榮登綺筵仰覲龍光悅懌欣偕鷺序蹁躚春臺齊獻三祝瑞宇崇臻萬年護軍校哈豐阿年六十五南弧叶慶輝星街耆年錫福樂孔皆金醅玉饌登衎衎彤廷儀舞鈞韶諧臣慚駘質充虎旅許隨鵷鷺初筵排憶昔戈鋋震撻伐揚威干羽瞻皇階微勞蒙眷賚鏹渥征衣初脫腰銀牌盛朝日月積煦嫗猶誇強健舒筋骸隆儀上越萬萬古醉飽長沐恩無涯護軍校穆克登額年六十五重豆筵初啓三陽日乍舒君恩隆夏屋臣職忝周廬祝擬如川至詩賡零露湑涓塵虛報稱糜祿卅年餘護軍校巴彥布年六十五瑞旭曈曨寶宴開肩隨鵷鷺到蓬萊綴班禁衛真多幸許入耆英會裏來一微勞甄録記從戎臣出西路兵三次打仗三十二次仰蒙恩賞功牌敢紀臣功總聖功今日鐻鍝垂白髮回城伯克坐還同二護軍校常在年六十五壽宇人皆壽春臺物與春紀年符太乙諏吉此芳辰宴識龍顔喜恩頒虎士均隨班歌既醉稽首頌駢臻護軍校明亮年六十五福來備恩下覃宸樞極北壽極南木公東以朝婉姈西以參金枝五葉靈椿涵四海熙熙和氣函聿五十載春潭潭臣以一介瞻望升龍縿天威不破鏑往與從軍暴已戡臣曽隨征金川歸奉豹尾隨驂驔屢見湯網四面寬其三臣隨次圍十四詔有耆英會儀度臣未諳臣氣尚壯髮未鬘亦知瑞呈銀甕山之谽當此春光酣歌洋洋樂且湛護軍校伊昌阿年六十五皇極錫福斂聖躬瀛海比算嶽比崇龍紀五十沛闓澤漸被六合超鴻濛祥雲日捧榑桑紅鈞天韶奏聲融融瓊筵列坐春正綺湛湛蕭露猗猗桐梨顔秀眉方緑瞳揚觶洗爵拜舞同職忝列校厠星衛周廬徼道依丹楓前驅玉馱馳錦騣臣隨次圍六嵗糜玉禾廪給豐幸兹榆景恩特被長近天顔祝華嵩護軍校烏凌阿年六十五建極維皇榮開天閶俾世克壽既壽而臧環階翊序千叟濟蹌百年陶育普天汪洋率土偕樂春祺聿昌彭籛李耳夾侍陛旁紹古之作守史之藏帝顧三千錫以煒煌莆厨露甕天日化光遹來雍容鳯苞麟祥微臣何幸預此鴻龎皓髮稽首虔效賡揚護軍校六十七年六十四亨衢酌堯樽飫霑忘帝力樽在太和先衢占王道直醇醲洽四海蕩平周八極國慶五十年蹈仁而飽德遹兹嘉宴傳榮向丹墀側千巡爵無算拜稽天咫尺何以擬崇深瀛周嵩華嶷何以答髙厚愛戴踐厥職帝壽億萬年鴻庥溯開闢臣效耆筵歌傾愫表衷赤護軍校達沖阿年六十四早春佳氣滿瓊臺介雅歌中壽宇開西苑舊曽依日月東瀛今願作尊罍衣頒華藻從天降杖拂靈鳩繞闕回莫向瑤池誇侍宴白頭今已到蓬萊護軍校富明阿年六十四旭景轉鴻龍春韶藹九重壽人承渥澤天子賜歡容玉纂雕盤列仙醽寶露濃三呼羣進祝寰宇荷陶鎔護軍校春山年六十四赤墀上下序西東鶴侣鵷班拜賜同磬管鏗訇觴斚浹春臺一氣接鴻濛一健誇華髮挽雕弧列隊分營捧瑞圖春色渥丹天際滿三千羣裏飫仙酺二護軍校石祿年六十四旭景長筵啓分班侍玉宸酒行惟益夀花發是恆春五緯祥符叶三霄瑞靄新仙笻人捧賜欲䇿且逡巡護軍校七郎阿年六十四晴輝朵殿移春仗瀛海雲紅日初上筵開千叟近瑤階露靄三霄下仙掌金吾徑旅韔弓歌羽林星叨金叵羅講武承平邊事少護軍屯授聖恩多多年既廩糜天祿瀚海天山盡臣僕露版惟傳馘獻雙功牌曽許腰懸六臣曽打仗三十三次得功牌六飲至方當壯盛年迄今白髮生華顛挂弓不設承兵錡脫劍羣趨介壽筵君王偃武真神武億萬斯年受天祜願將彤矢作春籌細向金壺玉壺數護軍校道保年六十四九有山河壽宇寬衢歌巷舞盡臚歡鶴鳴霄漢松生嶽雨露滋培一例看一鸞書疊賁煥龍賓詔集耆英宴紫宸欲酌滄溟無算爵醉聆仙樂奏韶鈞二護軍枝富魁年六十四養老始虞庠三代禮可數聖祖舉耆英曠典超前古我皇景祚長引年重繩武孟春廣宴開千叟瑶階聚庶老荷鴻恩一人篤天祜臣託鵷行末盛事快親覩春臺布陽和暗靄八埏普護軍校和尚年六十四珍符協運太和翔福偹箕疇吉祚昌廣宴滿庭霑沆瀣並容禁旅覲龍光一晨開閶闔瑞煙霏二膳時饈飫賜歸曉箭傳聲晝漏永幾行華髮被宸暉二護軍校大成年六十四睿聖握箕範九五開昌期巽風既翔洽離照方重熙百年洽禮樂六幕登期頤嘉與兆人共笙簧式燕之練吉月太簇六葉仙蓂蕤禮遇邁虞廪元音追伊耆鵷鷺紛在列恩許頍辨隨恭惟神武略綏定西北陲折衝二萬里不越樽俎為臣昔效微末左右大將旗臣出兵接仗四次給有功牌太平燦珠鏡屯衛隨熊羆寧知桑榆景駐以瓊玉卮願效媚兹祝大德承蕃釐護軍校塞沙布年六十四詄蕩開閶闔耆筵錫福多堯尊欣獻酢舜善睹駢羅衎衎承嘉樂熙熙洽太和幸隨鵷鷺侣蹈舞共賡歌護軍校玉住年六十四慶典開庥祚恩綸被比閭春城融北斗化宇洽南車叶律薰絃奏凝和瑞莢舒鴻禧延晝永鶴算引年初奠斚榮三壽陳詩頌九如歡深同鎬宴嵗嵗奉皇居護軍校那音保年六十四矞雲垂景星燦恆春光華旦復旦玉琯祥符呈瑤階仙莢絢上壽中壽添海籌國老庶老分鶴算鳬趨濟濟資鳩扶虎拜一一聫魚貫綺席承光榮錦筵樂宴衎飲和食德恩波流小臣抃舞歌糾縵護軍校兆泰年六十四大聖撫寰宇玉燭道交泰春酒萃耆耉膏露溥中外朝端黃髮臣野際方瞳艾虎旅集桓桓鴻班多藹藹陪臣泛東瀛新隸馳西馱覆載皆同書含生慶嘉會拜手侍賡揚羣歡聖恩沛護軍校六十九年六十四萬景開黃屋千官拜紫微龍墀春浩蕩燕禮日光輝酌酒金莖泛聽歌玉屑霏小臣慚矍鑠同得奉巍巍護軍校五爾青額年六十四執戟依清籞瞻雲識聖顔職同仙島吏榮列大酺班春藹堯衢裏人酡舜陛間螭頭羣奉絳鶴髮共忘斑璧彩三垣麗珠光列宿環自天霑渥澤身到閬瀛還護軍校額爾竒善年六十四隂陽迭運天道以成暑寒溫肅四氣呈剛柔互體地道以平燥濕遲疾八極并皇乘天運統地九紘合清寧德協以貞人有仁義秉之以生克遊其宇壽乃閎仁陽剛配義柔隂迎合為一際散萬萌以育以正是經是程皇溥福德錫嶽瀛億兆熙熙三千英英宴隆國慶嘉且亨北斗斟曜東華舒衡合天地壽悠久徴護軍校亮德年六十四羲爻莢盈萬大衍實肇始聖祚萬萬年五十數初紀帝壽邁古皇兆民盡齯齒和甘風雨調糾縵星雲綺耆耉錫燕飲魚麗多且旨舞蹈偕賡歌羣瞻天顔喜護軍校竒郎阿年六十三曼壽凝休祜彤宫敞壽筵淳風敷億兆皓叟萃三千鯢齒霑膏渥螭頭拜賜偏熙怡遊化宇鼓腹遍垓埏護軍校海惠年六十三西濛入曜久韜戈豢養星廬渥澤多齊向雲階歌綺歲條風暖護萬年柯一錫爵壬林俾壽康聖皇世宙藹春光筵前抃舞延齡酒芝草瑤花赩翕香二護軍校福保年六十三南山頌九如北闕擬十洲敬以升恆頌猥同麟鳯遊分營鞏玉燭列衛環金甌蓂階敷曉莢斗柄臨春陬彤庭普祝鯁瑤砌容扶鳩駢蕃錫有殊汪濊恩難酬嘉會越千古卷阿萃歌謳護軍校天保年六十三積照無邊帝德春九重丹殿日華新軒皇氏族周藩甸都是神州樂壽人一來河濟濟集喁喁映席聨墀鶴貌同今日太平耆壽宴三千桃實又花紅二護軍校德成額年六十三時平瀛海靖無塵虎旅間惟奉帝闉列校不煩屯戊巳長年無事守庚申延洪壽宇開璇籙優渥恩波出紫宸內府飣盤大官醖敬持克食餉周親護軍校全保年六十三光開南極象昭回玉瀣香浮介壽杯祝嘏幸依天闕迥卿雲五色繞蓬萊一蓬萊不是海中居帝賜仙源碧玉壺瓊杖瑤臡珠貝篚春風赩爍滿黃圖二護軍校舒魯年六十三泰莢綿宸算祥源彚聖祺三多欣效祝九有慶均禧滲漉甘膏渥融怡淑晷遲耆年霑闓澤拜手頌春墀護軍校胡圖禮年六十三愔愔廣樂奏于軒楹秩秩耆叟飫于罍罌既飫仙醴式聽和聲上陳象緯景慶昭明下協昄章輪廣縱橫中宣樂壽悅豫豐亨天子之德既超韶英天子之壽實邁咸莖羣臣侍側為聃為彭匪芝术餌匪歲星精曰惟仁壽達于寰瀛既飫仙醴福祿來成式聽和聲既和且平護軍校韓德年六十三瑞靄浮南極昌朝慶典新三陽方啓泰六幕並熙春星衛依光近耆齡拜賜均稱觥歌曼壽保佑正重申護軍校達來年六十三至聖法天行健大君錫福無疆蓍䇿初衍五甲樂愷同歌萬方多男逺超堯祝尚齒盛軼虞庠率土共依仁壽惟霑沛澤洋洋護軍校隆安泰年六十三扶鳩濟濟集天閶獻歲才陳柏子觴麟兆嘉祥歌履德鳯銜恩綍韻歸昌九重燕樂韶華永四海升平壽耉長際盛飲和身自健况陪虎拜仰龍光護軍校德太年六十三職忝材官列承恩嘉禮陪瓊筵諏日啓玉殿賜酺來戰績蒙甄録鐃歌記凱回普天同慶祝壽宇共春臺護軍校孫章阿年六十三人歡綵勝映曈曨宇浹新韶綺席同圃有華平凝曉露厨開萐莆涣春風得親黼藻顔逾渥為聽笙簧耳倍聰自是天家覃渥澤慶光浩蕩接鴻濛護軍校新福年六十三春融湑露濃風和慶雲見薄海被文思殊恩逮武辨菲材猥芻秣積歲佩弓箭列隊扈星騶陳力隨雲甸翠幕迤春光彤庭值華宴榮分舜陛羹飽飫堯厨膳酡顔心共丹鶴髮春同絢勉旃勵戎行延齡荷天眷護軍校關保住年六十三壽宇開皇極耆臣宴紫微近天瞻曲蓋望月憶長圍七萃騰歡遍雙南拜捧歸白頭霑九醖德曜現祥輝護軍校福清阿年六十三楓陛耆年萃新韶愷澤敷裳華同鎬邑酺燕邁東都日暖仙蓂葉春遲玉箭壺屆期黃瓚集先日翠茵鋪列校名偕上周旬齒正逾何期榆栁質得近苾芬爐渥澤天顔喜熙陽物性孚試聼衢巷裏歌頌起喁于護軍校三鼎年六十二鳯琯初開太蔟龍華正集旃蒙玉燭四時有曜珠曩萬載長融溥需雲於光泰暢豫樂以亨豐為問圖書肇啓孰嫓帝治龎鴻護軍校冨英年六十二晴曦明紫禁錫宴會昌盈仙籙松喬並祥煙劍珮迎殽蒸羅棐几醽醁泛瑤觥醉飽恩施渥葵忱向日榮護軍校七順年六十二重熙慶運日華在午黃髮雍容同遊化宇仰惟仁皇典隆尊俎紀瑞駢聨我皇繩武集三千人鳩杖華組臣職列校前驅負弩榮效鳬趨鼚鼓軒舞澤渥昌期道光隆古洛社香山曾何足數樂壽洪敷歡騰率土護軍校興泰年六十二長庚朗朗耀珠躔黃髮分行玉陛前雨露並霑天上賜咸韶合奏頌聲連一鹿歌蘋野鳯翔梧欣飫珍厨捧爵觚小草寸荄依聖日引年一例杖同扶二護軍校福祿年六十二祥開壽宇炳弧南敷錫耆筵樂且湛老者安之宸念愜物其多矣聖恩覃騰歡詎祗香山九獻嘏還同華祝三蒲海蔥山皆幬內欣承湛露共濡涵護軍校八十太年六十二執戟五十年聨班趨禁籞異數沐恩施筵開鵷鷺序軒皇親賜臨八伯齊拜舞小臣八十太綴職領隊伍亦以犬馬齒積年叨豢糈受賜隨耆英瑤爵春風舉賡揚慙非分稠渥拜天語護軍校圖克唐阿年六十二憶昨天聲展曽隨虎旅行微勞矢報淺嘉宴被恩長仙膾金盤列瑤尊玉體香白頭欣拜舞虔頌聖當陽護軍校沈德年六十二海宇春和初轉九重錫賫新霑堯鍾舜榼歲舉臯揚夔奏長兼欣寬大詔時下祝億萬壽人添小臣稽首再拜黔黎共樂養恬護軍校伊常阿年六十二埀衣洪泰運授几遍耆筵宴錫千官集恩隆列校偏螭頭容接武豹尾疊差肩忝附從公末歡歌在藻篇護軍校竒斌年六十二丹詔先春降九霄彤庭高會宴羣僚恩光下濟環瀛濶惠靄真同瑞露饒縹眇鳴球仙樂奏氤氲瑞鶴御香飄令儀式聽歌豐草燕笑追陪詠蓼蕭編籍詎論唐彍騎䇿勛奚羡漢嫖姚承恩一例浮三爵列校邀榮荷盛朝護軍校富爾紅阿年六十二日月曜升恆河海協清宴景運集亨嘉引年徴巨典仁輝閶闔開淑氣鴻鈞轉春臺喜共登壽宇慶長衍微臣歌既醉萬福頌繁演願告環瀛中恩波流萬畎欽定千叟宴詩卷二十
