body:
  text: 卷二預宴五十二人詩六十四首綏逺城將軍積福年七十一卿靄朝融絢髮皤優年嘉會甲筵羅邉城擁節承恩重瑞牒書名荷慶多五緯暉聨躔次第三階符正世祥和畏懷聖武真綏逺曼壽那居叶雅歌江寧將軍覺羅萬福年七十二嘉宴分曹集紫宫禁城初日轉曈曨祥徵九老圖難並會列千官典倍隆赤綬寵分華牒茂銀章親領鎮兵雄趨朝秩忝台階次臣兼散秩大臣扈蹕班隨嶽牧同昨年恭遇守土聖駕南巡臣得隨班迎草載深恩慚報塞七旬華髮祝延洪人誇晚節遭逢幸天與韶光笑語融捧出賜珍濡湛露賡來藻翰叶條風願將萬福臣名進春在嵩呼萬嵗中杭州將軍宗室莽古賚年七十八建牙海國承恩澤除拜多年髮皆白滿衢麗照載暉光平野翔風更歡懌定祉及角忝公族執爵授几臣之職破格殊恩被詔來危檣駛馬春風陌成羣瑞鶴連翩至收取仙籌無算積開筵授簡柏梁吟閉戶哦詩學未得建除體寧夏將軍宗室嵩椿年六十二忝司鎖鑰駐西陲東望祥雲捧玉墀宣賜入筵沾叟宴恩容赴闕沐皇慈洪源廣衍銀潢𣲖曦曜長臨若木枝正是春風被蒲栁陽和載路詠驅馳一繩武重將綺席排朝正玉帛萬方偕子孫臣庶均蒙福衣食農蠶總厪懷日色晶明旗彩煥人情和悅樂聲諧八千椿夀嵩呼萬共洽羣歡遍六街二福建將軍常青年七十五聖德覃敷萬里遙樓船風靜海門潮引年詔許依千叟此日恩深在九霄丹地聨翩鳩作杖鈞天迢遞鳳鳴簫翹瞻豹尾心增戀宿衛曽經忝佩貂廣州將軍存泰年七十四皇帝曼壽備膺多福敷錫臣庶永綏茀祿大鈞所覆肖翹咸育人瑞孔臻天慈逾渥維孟春月始和布淑肆啓長筵式陳廣樂千叟齊齡萬年調燭益壽名卮長生注籙臣以庸下忝叨世僕嗣聨輕車建牙秉纛臣由世襲輕車都尉洊升今職嶺嶠分屯海濡駐督自維塵壤奚補山嶽華髮趨朝嵩呼申祝敬仰古稀添籌海屋直𨽻總督劉峩年六十三環海恢文治中天燦景光淳風春浩蕩湛露澤濃瀼赤絢輝宸極璿封首職方秩司屏翰重恩奉節幢長鳳闕瞻雲近鸞旗耀日揚重瀛歸燮囿三輔抃豐穰盛典敷耆耋良辰集祉祥步趨隨玉簜饜渥捧霞觴熙洽徵仁聖苞符協昊蒼圖髙軒頊紀道揭挂疇綱寶籙萬齡積神芝五葉彰璜流恬榜楫璧水煥笙簧遭際依懸鏡優遊效奉璋微涓從錦邑不次擢畿疆冠耀翎英翠衣叨綵繡黃感深崇特賜榮極念為章粟帛周紘宇絲綸沛殿廊德麟逰圃樂儀羽薄霄翔禮洽鳩扶杖詩歌菽在筐三千鸞鶴序丹悃效賡揚兩江總督薩載年六十七斗耀輝南極軒圖拱北辰萬年開寶籙八表沐洪鈞錫羡耆英聚頒酺令典循軒鼚人是瑞祥泳世如春夙忝圻封寄叨持節鉞頻軍威齊什伍民事樂原畇職領河防重恩推蔀屋新宣疏承睿畫延賞荷褒綸臣前任河道總督因陶莊引河告成蒙恩給豫騎都尉世職秩許官銜晉班衣禁禦親臣仰荷銜兼御恩加太子太保前侍衛行走江鄉迎羽衛星野奉句陳吏課陳風悉民依沛澤均金隄躬履度石堰重咨詢昨嵗皆荷聖駕南巡所蒞徐城清口髙堰各堤岸聖明閲視指授幾宜俾臻完善共仰乾行健還聞巽命申瞻顔知有喜報績愧非倫令日趨羣叟條風暢浹旬千官聨鷺序五世集麟振算積京垓衍筵排甲乙勻輇材逰化宇華髮慶韶晨列坐榮分几論年密接茵鴻儀超史牒嘉話播朝紳寵賚臚丹陛歡呼達紫宸自天賡藻翰拜手頌臣鄰閩浙總督富勒渾年六十五皇帝行健惟勤民六巡南服法祖仁臣時守土江海上湖山遍沐醲膏新萬丈鱗塘新易石桑麻澤國皆安宅輦路恩施視昔加存問高年增粟帛更有迎鑾百嵗儒頭銜司業綬新紆升平人瑞誠希見歌舞謳思遍路衢今年有詔聨千叟微臣幸玷清班後五福箕疇備一人髙明博厚徵悠久銅壺日永轉和風錦饌雕筵出禁中歸語東南諸父老聖顔晬穆與天同四川總督李世傑年六十八旃蒙嵗啓耆筵開百爾鳬藻歌臺萊井絡萬里益州部早覩鳳詔從天來小臣遭遇真踰分生值昌辰心力奮案牘初叨末秩班馳驅漸握專城印破格超資疊嵗更雲衢拔擢荷恩榮吳山楚水乘軺遍桂海松雲捧節行三巴重鎮牙旌建自揣何材膺帝眷幸際豐年協雨暘欣看邉徼勤耕佃特詔星馳覲紫宸厖眉皓首萃廷紳維天賜羡皇敷極億萬年康億兆人內大臣公西銘年六十一泛星槎越東海鳳凰城頭郁紛五色雲霏彩度江華攬覺華麗江泓泓平壤矗矗扶桑赤子同一家臣行三田渡穹碑屹千古瀝城粲有辭頌我太宗文皇帝定傾拯亂不殺真神武爾來輸忱奉職一百五十載疊蒙列聖優詔許漸摩淪浹海是恩耆夀其人兩都八道八十縣州府皇帝萬載開天閶夀星見霄寶甕光詔謂鼂華國亦得陪趨蹌頒珍天府肄禮容臺三韓方丈新詣蓬萊古之象鞮譯寄正域彼四海未聞歌鸞舞鳳引年一體偕尊罍微臣榮使節宿齒邀宸眷光華同在糾縵中三千里續三千宴臣奉奉未旋使命旨補入千叟宴九命逾恩寵內廷積頤豢夙誦箕疇建極錫極章今知星風星雨普天出日榮光粲王道蕩蕩王道平平民胞物與之翰之藩欣逢重熙纍洽鯷壑同春日長頌金甌玉燭慶皓舒祥煙散秩大臣公傅玉年七十一維嵗乙已春日載融帝斂五福用錫臣工於樂燕胥耄滋益恭有飶其馨有秩其容一仰惟聖祖尚齒筵張茂典再舉蒸哉我皇億兆京垓以引以長合千叟算上萬年觴二至誠不息恆照斯久鳳紀五旬功贊髙厚世世瓜綿洽臚九有與物皆春先逮台耉三㴠濡喣沫長養堯天吉慚共武方愧師干維帝念之恩沛露漙臣拜稽首曼夀洪延四散秩大臣公觀音保年六十一維皇祚統龍飛五十嘉承天庥萬福來集以嵗之正於吉之叶式宴千叟需雲下洽祖典用光茀康覃及禮樂交動威儀攸攝羣工在位五瑞時輯華轂朱輪雲蔭仰襲錫類恩敷重光治協佳氣蘢蔥灑掃曽給伏幸樗材榮邀晝接願祝億年長奉閶闔一等子額永武年六十二酺筵開紫禁緹室應青陽得附公侯列猶先鴛鷺行受糈叨早嵗臣以七齡襲爵食俸至今五十五年列衛奉恩光一注東華籙春同壽宇長烏珠穆沁貝勒達什衮布年六十八金閶開瓊宴集萬物悅春陽重輪皎旭日蕃釐普錫綿春祺番番黃髮臣工隨樗材櫟質猥以馬齒長得與盛筵膺懋賞夀而康鼚且舞共效謳歌拜天府喀爾喀多羅貝勒阿玉爾年六十七聖風廣被播八埏覃施無量恩無邉淳朴直追懷葛氏恬熙宛在羲皇年罔有內外大錫福乾元一氣洪陶甄六盟分𨽻世圉僕疆以周索牧北田耎光華嵗嵗逢慶祝仙莊嘉會壺中天櫜鞬左右秋獮合柘黃纛影瞻中權教駣射生試長技屬車頒賜野割鮮荏苒不覺馬齒長得依聖日加綿延太平玉燭調億萬時雍夀宇開八千斗杓璿運嵗俶始階蓂六葉舒韶妍金盤翠釡蒙醧沃鳬趨欣得陪瓊筵願將率土華封祝譜入太蔟春風絃都爾博特固山貝子博第年六十九如頌協瑞圖探丹詔春頒鳯彩毿廣與羣倫共仁壽長教太澤遍濡㴠彤墀列席聞鈞奏玉醴傳觴飫旨甘竊幸初周花甲日心殷葵獻祝惟南扎魯特輔國公彭素克年六十七皇風仁夀溥瀛寰宴啓彤廷肅曉班共慶萬齡昌聖祚欣偕千叟覲天顔賜衣夙忝殊榮荷臣曽因射麅仰蒙挂天恩賞給黃馬錫瑞重叨異數頒嵗嵗御前遮獵獸臣自乾隆六年隨侍獵獸行圍厯今四十餘載前驅供役邀遮即蒙古語所云哈嗎爾也髙年親見射生間克什克騰頭等台吉根敦達爾扎年六十一寶光雲蔭瑞彌天中外同瞻夀鏡懸名𨽻緑牌參宿衛身依丹禁列周躔臣侍直走乾清門行仙莊每幸櫜鞬扈蹕路還欣封守連召伍逹在古北口外汛掃歡承伊遜水射生技試栁條邊記從蘋野隨呦鹿仰叶豳歌效獻豜臣因射鹿褂花恩賞黃翎已拜裳華黃褶賜復承鶯領翠翎編屬車昨喜鳬迎肅癸卯秋掃除聖駕東巡臣得供役嘉會今欣鷺序聨坐近龍墀同有慶茵羅鶴髮盡如仙金盤捧膳依厨箑犀斚沾香洽御筵花甲幸周逄懋典聖釐恭祝萬斯年喀爾喀頭等台吉固穆扎布年六十六寶鏡積萬春金枝開五葉陰陽布協和造化歸鎔燮舜榼斟醍醐堯厨分蓂箑飽德既淹涵攄忱久淪浹竦翼效雲鶼泳流希海鰈昔稱四旗新今更萬里懾都爾羅斯頭等台吉阿喇布坦年六十六慶霄入侍列鴛鸞嵗奉恩華集上闌曝獻敬曾將灑馬鳬迎欣得扈鳴鑾前嵗秋同給聖駕東巡臣與六盟札薩克等掃除叨蒙思渥延祺復幸龍光洽錫福從知夀宇寬自此遠藩加額羡親陪耆燕五雲端多羅額駙丹津年六十三鞠􅎽奉聖澤萬歲歌太平臣年七九目覿大君醇化苞寰瀛圓顱方祉侣松喬而友羡彭天地覆幬萬姓多耆耋瓊膏玉醴駢祥徴臣家托鉢山忝侍丹禁紆蔥珩乳筒兒版昔承天藻詠口琴竹筆參形聲見古土御製蒙風詩長歌不足書未學惟祝聖主曼夀齊穹清輔國公額色音年六十八皇帝御宇今五十春茂時育物聖化陶甄蒲昌蔥嶺一小回臣賜居京邸食祿沐仁爵列五等齒近七旬天恩優渥肌髓浹淪酒醴以設筍簴以陳惟萬年夀祝我聖人吏部石侍郎宗室玉鼎柱年六十五玉衡啓韶序璐戺陳芳筵欣兹樂夀宇茂典軼古編龍集紀元會祖武繩維虔羲象符大衍堯階煥中天協風律吹萬晉日羣盈千皇心盎陽澤奕葉重光宣蘭肴侑椒醑璚琯諧朱絃鵠隊式濟濟鶴髮趨翩翩微臣二銓部溯本星潢聨願賡華封祝億載恆乘乾户部右侍郎諾穆親年七十祥風協氣滿天衢臺共春登福用敷甲乙筵欣依北闕丙丁星正耀南弧㲈和頀濩陳丹陛二膳時饈飫御厨捧出天題猶覺濕擕將賜杖不須扶三章未數周式燕十日寧誇漢大酺籙記長生人偓羡鏡開仁壽世唐虞恩推盛際需雲洽榮及微臣湛露濡節鉞昔慚叨大吏簪紳今忝二司徒旰宵仰處惟行健蠲貸行時久惠孚詎僅嵩呼三萬歲合千叟算聖齡符禮部左侍郎莊存與年六十七夀宇昭隆典熙朝創巨模重開千叟宴遍錫兆人酺丹扆天顔喜蓂階瑞葉敷列筵文煥綺進爵面環樞日麗雲垂珥春和樂應枹便蕃分內府斟酌到康衢令協誠懸鏡民安象覆盂詩陳堆碎玉歌作捧聨珠自忖惟樗散叨榮况錦紆追隨春掌禮侍直殿周廬身預三千列心虔萬歲呼恩榮靈夀杖拜賜許交扶兵部左侍郎瑪興阿年七十嵗陽在乙月在寅需雲宴啓初韶辰逺稽册府古未覩熙朝冉見聨冠紳古稀天子備萬福敷錫臣庶皇如春一堂曽元雅咏瓞四海耆耉風吹豳矧兹黃髮百有位久荷化育歸陶甄涓埃海嶽百靡報積久歲月來逡巡昌辰慶值尚齒會閶闔大闢英莖陳一人之福與天並班序儼翊臣哉鄰小臣草載荷豢養疊從佐憲襄樞臣葉羌和闐喀什噶駘質驅策慚踆踆臣曽于新疆三處辦事荏苒馬齒已七十恩許陪會濡鴻仁勉循夙夜更鑠勵斟來沆瀣天邊醇兵部左侍郎紀昀年六十二和氣寰瀛遍天功品物亨春風多長育小草亦兹榮科第叨先達班聨愧老成何期承聖澤更許附耆英一早歲登金馬臣以乾隆十九年進士蒙學士恩館選由編修洊擢至侍讀中年出玉關餘生蒙曲貸詞苑許重還嘉宴陪傳斚鴻恩憶賜環都緣天冉造今得預仙班乾隆三十三年臣自貽罪戾蒙力恩從寬典發往烏魯木齊效三十六年蒙擢洊恩復授編修頻邀超至今職二十載登天祿編摩嵗屢淹涓埃曽未報雨露久深霑臣自承辦四庫全書疊被所罕殊恩皆逾常格為自來詞臣覯軒樂容同聽堯雲得近瞻當筵看坐次感悚兩相兼三化宇人多夀耆年近四千相隨登綺席所見半華顛旭日輝宫闕柔颸韻管絃自欣才六十己獲伴羣仙四園綺陪雕爼松喬捧玉鍾斯人今並集此會古難逢蜎蠕乘乎化風雲繫所從乾元剛健體仰矚見天容五筵上瞻皇度天光映紫庭自慚臣謭劣彌頌帝康寧夀定兼千佛祥原應六星七旬題細楷曽見御書屏臣蒙毫芒宣賜跪觀御書玉屏拓本銀鉤鐵畫超細入諸臣咸頌聖人天亶聰明乎萬古非尋常耳目所可仿佛萬一六五代同堂慶延祥屬至尊流長知有本枝茂在蟠根古帝無倫比詞臣已討論且詢陪宴叟有幾見元孫七聖祖徴千叟衣冠會日畿家庭時誦説聞見尚依稀臣父姚安府知府紀容舒以康熙癸己宴之萬夀恩科中式曽在京師見千叟典時時為臣等誦説頌揚盛事今日霑天酒微臣侍禁闈簪毫頌繩武萬載並光輝八刑部右侍郎穆精阿年七十五聖皇拓夀宇遍德敷恩綸引年繼祖武與物熙光春紀鳯五十載籌鶴三千人運世積元會槖籥歸和鈞微臣叨佐憲淑問欽皇仁殊榮陪酺宴雨露垂華新惟曰至萬年篤祐天庥臻署理藩院侍郎薩音博爾格圖年六十七鬱蔥佳氣滿皇都夀宴同霑厚澤濡百部蕃民欣受賜萬年王會慶開圖吉雲瓊露依天仗珍醴香杭出御厨多幸瑕疵還齒録得隨率舞向亨衢原任兵部侍郎史奕昻年七十四培養眉梨遍八埏體乾健本位乘乾朔頒亥字和風布宴錫辰朝霽景妍五葉麟祥欣繞膝羣工鷺序立駢肩懸車獨愧林泉久赴闕重依日月邊會紀香山朋草七典隆嘉宴叟三千臣父大學士臣史貽直曽奉御製旨入九老會逰香山皇上詩句云九老作朋總草七恩預恩施優渥誠史册所罕聞也臣今又蒙千叟宴盛朝佳會兩世叨榮拜舞之私益增慶幸全家榮遇誇前牒盛世耆台勝列仙法醖珍厨承寵渥豐貂文綺受恩便歸田細與兒孫説聖德如天景祜綿原任兵部侍郎蔣元益年七十八鳳紀凝祥五十春湛恩汪濊遍臣民綸宣絳闕延黃耉宴啓青陽傍紫宸由舊鴻規光載錫維新景運命重申長年共預亨嘉會朝野欣霑醴澤均一髙厚鴻慈感寸衷早邀睿鑒冠南宫乾隆十年會試進士卷在第七蒙恩拔至第一簪毫捧簡員曽備琢玉探珠使屢充職佐夏官慚報稱恩隨春輅荷優隆庚子甲辰迎蒙聖駕南巡臣在籍至龍泉莊恭恩賞貂皮大縀重趨舜陛陪華宴總在璇霄雨露中二原任兵部侍郎錢士雲年七十四錫宴當芳序彤墀覲聖顔千人羅鶴髮九􅉔肅鴛班磚影曈曨候爐煙縹眇間盈觴璚醴馥疊笥錦紋斑逺邁耆英社從恢樂夀寰寸忱殷戀闕萬里緩還山詎料頽齡駐猶叨異𢾗頒葵衷彌自幸化日許寬間江西巡撫伊星阿年七十羡貺均寰宇新韶大賜酺年皆周甲子境總勝蓬壺六日春回律重門早換符辰杓旋北斗星彩耀南弧共聽鈞天樂寧論洛社圖朋原三夀錫福自一人敷臣職羈千里民疆帶五湖貪泉懲吏飲澤國貸農租湑露濃浮盞宣風愧濫竽叨榮逄盛際嵗月是唐虞山西巡撫農起年六十六臣聞伊耆御宇仁如天至今堯封三祝人間傳微臣守土陶唐國民風淳朴餘山川絳縣老人皓首能知年我皇仁夀直邁羲農前古稀有五行健惟純乾詔舉千叟開華筵列仙何必侈彭籛况逄昨嵗天家五世金枝駢史臣珥筆書祥編三多之祝今誠然湖北巡撫李綬年七十二運際重熙慶太平升恆嘉瑞紀元正人逰化宇朋三夀詔集髙年遍八紘景福羣歌天所祐鴻儀敬率祖攸行青陽啓律回珠斗黃髮聨行捧兕觥酒醴重修周燕禮衣冠詎數宋耆英微材洽似逢春木弱羽真同出谷鶯許覲龍顔賦嘉樂因隨虎拜綴仙卿圖周大衍欣逢聖嵗在重光憶䇿名釋褐幸聨珠榜重署銜兼荷玊堂清為儀敢擬鴻占陸相喚還如鹿食蘋臣兄李縉壬戌科進賜士簡任柏臺初晉秩編排桂籍遽持衡詔司學校滋蘭茝秩列卿班振佩纓豐水秀髦慚啓迪臣河南學政任滿即升授奉天府府丞提督學政鎬京巡蹕喜趨迎溫言顧問天光近寵賚便蕃晝接榮􅏡厯俯欣參內外鈞陶總是荷生成方邀棘寺遷華秩旋佐薇垣傍禁城臣蒙升內恩由大理寺卿閣學士犬馬只餘依主戀藿葵敢負向陽城憶隨羽獵雲團騎學挽雕弓月對弸錦彩稱身榮服色花驄連靷聽珂聲臣前年扈蹕恩蹕熱河射箭幸中蒙賞賜縀馬蕢桴敢詡諧韶濩涓壤何能益嶽瀛晉奉綸言宣閫重頻移使節戴星征疆分全楚南兼北鎮重諸蕃漢及荆臣前年十月蒙命巡恩視學江西去年四月奉撫江西是月調撫湖南七月調撫湖北寤寐深懷宸眷切瞻依恆矢素心盟忝隨鴛鷺分行列欣接夔龍共拜賡仰味醇和沾玉斚新餐沆瀣浥金莖篚筐疊被施彌渥几杖榮叨感倍生竊幸餘齡周綺甲髙瞻珠耀麗長庚濫竽昔玷詞臣末願奏元音盛世鳴廣西巡撫吳垣年六十三天書特賁五雲端桂海星馳振羽翰竊喜絳霄瞻日月况偕黃髮序鵷鸞濟蹌人共成嘉會拜舞臣尤愧素餐兩世承恩三建節一年荷寵數遷官每驚境判雲泥速豈止溫回黍谷寒居左東銓虛藻鑑嶺南西道繞旌竿莎城竹路民情樂癸水辰山地勢盤禮樂久馴猺獠俗洞溪都似畫圖看土宜百榖醲膏潤賮納諸蠻化宇寬蚊負山惟慚委寄鴻翔風乃快扶搏飲和深浥三危露益健真輸九轉丹聖夀無疆天眷渥萬年長慶萬方安福建水師提督公黃仕簡年六十六臣家閩海東奕世蒙宸眷授鉞水軍雄萬里鯨波偃昨嵗覲天顔恩許隨行殿春棚列賜食日飫官厨膳何期馬齒增復預螭頭宴仙璈奏八琅劍佩趨羣彥年皆花甲周蒲栁慙微賤殊施曠古逢海上人歸羡湖廣提督俞金鰲年六十九泰階平聖人夀一堂五世曽逮元邁華封祝三更洛鈐疇九太平之世人夀康合四海夀夀聖皇松僑偓羡不足比何况香山洛社遙相望嵗紀旃蒙孟春月有詔千叟集庭闕皤皤黃髮娛昌辰以八千嵗為秋八千嵗為春班聨師濟冠與紳秩上中下夀內外大小臣仙醴浮几筵設華鐘鏗簫管集文綺珍羞頒絡繹太史奏有老人星出小臣通籍五十年兜鍪一介曽無尺寸之可言叨擁節幢蒞湘楚溯從閩海粵嶠臨三邉臣由武進士厯任福建甘肅提督調補今職今日彤廷預華宴一曲陽春聽天半惟願年年嵗嵗祝南山糾縵星雲旦復旦廣東提督竇璸年六十七皇居體環極清暉溢天門絳氣下縈薄城闕生雲煙在宥天下理積久德逾宣裁成被八荒恢恢六合間日觀臨東溟聲教燭冰天鳯皇集南嶽衆星拱北辰藹藹慶雲被恩渥浹下筵八珍盈雕爼元醴染朱顔喚若春華敷容色更相鮮洪鈞陶萬類時泰玉階平集文選句振武誥封大夫李瑞年九十臣年甫逾冠幸際仁皇時甸服傳盛典嘉筵賜期頤逾今六十有四載又見郅治光重熙臣不能執鞭充武備又不能簪筆綴文詞臣子受恩深重纍官冠專閫臣無義方之訓忝捧鸞誥褒制辭臣屢受榮感誥封實深憐臣齒衰朽移子節近畿聖朝以孝治天下豈為一人要令億兆生孝思然身受者感已入肝脾臣娛馬齒臣子獲遂烏鳥私臣子國梁前任湖廣提督詢矜臣年老特陛見時蒙提督皇上天語埀調古北口以便就養檀州古塞今戶闥坐看子舍飄牙旗每嵗巡狩幸上塞出警入蹕恆瞻翠罕而迎金支天顔知有喜一顧華衮榮過之今來又得預耆宴賜爵黼座扶杖趨丹墀微臣何以答恩施昨年臣以逾九十桑榆逢春不自知但願天漿一酌長不老俾臣之子努力報國無窮期散秩大臣富保年七十五帝齡純錫轉璣璇夀世斟元遍大千椒獻九霄分湛露蓂抽六葉靄祥煙人皆周甲方登選杓指初寅又肆筵繚繞御香飄殿外氤氲旭彩麗觥邉錦開雉扇儀為羽彩列鸞旗仗是仙濟濟冠裳聨禁籞熙熙耕鑿普瀛壖欣逢天府殊恩沛遂使人寰景福駢敬仰皇裏勤法祖引年盛典後光前散秩大臣銜常保年八十二天錫景運肇五十年至聖繩武德隆福全詔集耆耉厥有三千彤廷拜舞周旋折旋敬祝聖夀麟翔鶴翩臣亦何幸榮與數焉既霑藁飫載賡雅篇曰仁者夀仁則如天副都統銜散秩大臣呼尼爾圖年六十二鳸紀司春啓翠圖華筵錫典耀金鋪恩分髙坫埀甘醴瑞集仙庖擁􅛋蒲夀宇咸躋同樂象天庥滋至大中敷詔酺五日超前漢國養千秋頌有虞蹈詠耆黎欣禮遇班行材武學歡臚萬年有道綿嘉運長見堯風遍九衢護軍統領塔永阿年七十七大衍揲箸䇿斗杓紀旃蒙星文丙位燦旭華升曈曨鵠立三千叟飫宴恩龎鴻司儀屬臣職贊唱三殿中清銜忝瑣闥奏讀依丹楓每於御門日香案陳章封仰見聖制事刑政皆大同每於臨祀時駿奔勵恪恭仰見聖重祭至誠肅天容每於朝會晨太和振鼓鐘仰見聖圖大二萬車書通樗櫟百無效鐸鉦襄元戎芻秣嵗周甲稟食年始童臣食俸餉已六十六年駑駘荷剪刷尚冀追雲騣今朝預盛禮拜跽引羣工外暨濛渤客下逮草野農小大拜稽首歡忭儀雍雍氣和人矍鑠鞠􅎽偕相從班聨已到老此會真初逢就列安期生分行東王公一聲句臚響殿角來春風護軍統領喀木齊布年六十五少小驅馳事戎幕躬逢聖武綏逺略準部回疆二萬里天聲所暨威絶漠臣時被甲從行間路越瀚海凌隂山分寸之功荷甄録凱歌喜聽三軍還臣於平定準噶爾回部議敘蒙恩給豫雲騎尉世職前後打仗二十四次得功牌十五並賞銀九十六兩勳階忝列雲騎尉茂典旌勞賞延世功牌十五書在紙篋裡猶餘白金賜微材幸得隨羽林主恩嵗月深復深雪嶺兵銷績藏舊雲臺伯偃圖埀今四海升平一人夀嘉宴宏開召千叟丹墀列坐臚賡揚白髮何期厠衰朽陽春煦育雨露均一物胥歸大造仁願陳天保詩中頌不數耆英會裏人副都統德福年六十七洪惟帝施福懋純常羣生啿啿萬彚昌昌康衢之老稱兕躋堂以介眉夀曼羡無疆爰舉舊典迪惟前光元正六日旦啓天閶廣延鱗次千叟鴈行文武內外下逮農商以齒以爵濟濟鏘鏘擎拳曲跽遍飲霞漿香山洛社曷足與方微臣何幸獲侍軒廊拜首稽首頌夀而康億萬斯年弧南耀芒副都統台蒙阿年六十七執戟班分禁衛傍年年羽獵扈長楊餘齡七帙遲添算嘉宴千人忝末行兩度櫜鞬慚駑蹇臣曽出兵兩次一時冠紱覲龍光汾歌鎬宴應難匹鼇抃還擎萬夀觴副都統覺羅圖思義年六十二天潢𣲖衍臣多幸奉職輸忠愧莫言自蹈愆尤無棄物已邀寬貸更承恩筵前雨露沾濡渥塞上氷霜砥礪存翹首紅雲瞻玉座宛同蒲桞被春溫副都統永昌年七十九春到九重閶闔恩承咫尺蓬萊千叟筵開圖畫一人算積京垓碧盞分來內宴丹綸捧出中臺鴻儀茂矣美矣嘉頌臣哉鄰哉原任署副都統達齊年七十四彤樓春曉雞人唱鳯誥傳宣百官上棽麗紫蓋肅中天靉靆香雲簇仙仗皤皤黃髮緣階升金盤玉醴雲霞蒸聖人法祖開需宴三千人作三夀朋天漿飽飫梨顔赤猶記當官儕鶴列虎帳朝蟠玉壘雲袀衣夜裹蔥山雪西邊兩度仗威稜白髮無功感聖矜闕門猶許三年住鳯敕還期再起能臣於四十七年以年老有病蒙病痊恩原品休致並準在京養病俟再行奏請當差頽齡自愧難圖效慈惠依然及衰耄獸舞虞廷樂可知陽回黍谷恩難報抽毫未敢獻蕪詞曲􅎽還賡湛露詩聖人天保升如日臣庶長欣就日時原任副都統岱興阿年七十五淑祉開初韶湛恩敞華宴雅奏羅雲英奎章屬霄漢鳬趨會三千鶴算逾草萬緬惟仁祖朝肇啓鴻儀煥愷宴占需雲光華頌復旦萃兹鮐背人競集螭坳畔寵分內府珍幸荷御厨饜自維犬馬私敢適丘林願樗散慚非才傾葵祗餘戀厯官五十年軍行一再慣臣食俸五十餘年曽出兵雲南打仗三次南滇羽檄還西域節麾建臣曽任巴里坤領隊大臣餘年咏太平嘉會娛燕衎歡呼逮朋曹矍鑠誇老健昌期值厖鴻聖齡錫曼羡願附康衢謡敬陳下里諺欽定千叟宴詩卷二
