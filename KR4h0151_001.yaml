body:
  text: 乾隆四十九年十月初九日奉上諭繄古帝王御世建極凝庥上有敷錫之君下享康寧之福洎乎近代史冊尠稱我皇祖沖齡踐阼統馭寰區仁漸義摩涵濡休養康熈年間曽舉行千叟宴與中外臣民躋夀宇而迓繁禧誠為千載一時之嘉㑹朕誕膺丕緒敬紹鴻圖仰承昊蒼眷顧福佑朕躬年逾古稀尚䏻康强勤政惟是斂時錫福期舉世咸登仁夀著於乾隆五十年正月初六日舉行千叟宴盛典用昭我國家景運昌期重熙累洽嘉與中外臣民耆老介祉延禧之至意所有一切事宜著各該衙門敬謹預備欽此十一月二十三日奉上諭眀嵗舉行千叟宴原定四品以下官員年六十五嵗以上者始准入宴現在人數已増至三千而官員與兵丁不同如必六十五嵗以上方准入宴則年過六十之職官不得邀榮者甚多著加恩凡在京四品以下現任原任各員年過六十者俱准其入宴用昭普錫春祺加惠耆臣之至意欽此十二月二十三日奉上諭新正舉行千叟宴所有與宴之官員兵民年在九十以上者俱准其子孫一人扶掖入宴其文武大臣年逾七十者令其自行揣量如歩履稍艱亦准其子孫一人扶掖入宴以示朕優待耆年有加無已之至意欽此
