body:
  text: 巻二十四預宴八十八人詩九十七首禮部贊禮郎包恩富年六十八光華文治慶登咸禹績堯勲金石鑱五色榮河呈寶字萬方壽籙啟瓊函元辰俶祉先優老千叟同稱共列銜己喜花旛裁燕勝遥瞻葩瑵麗龍縿鏘洋兼有鈞韶侑優渥無須侍史監向日共欣依璐砌餐霞詎復數芝巖期頤杖捧鳩形肅中外裾聨鶴髮髟習禮句臚隨晝陛依光景慶列朝衫由來瀼露零蕭蓼一例紅雲䕃檜杉賜斚同時陳舞蹈登瀛頓覺判仙凡駢羅國慶孚人瑞滋至天庥感聖諴箕福斂敷皇有極云亭符玉陋泥緘禮部贊禮郎羅傳英年六十三皇帝五十載台符告太平復舉養老典舊章用作程玉階列瑶席爛然弧南星司士序爵級典儀列齒觥酒正設露醑膳宰調瓊羮禮合饗與燕樂宣韶與清堦墀及兩序肅穆聨璣衡天子坐黼扆衆拜儀充盈瑶觴欽手賜列座餐珠瑛禮成捧珍賚駢繁錫光晶國運邁軒皥大典敷元亨臣職忝贊禮耆顏預崇閎三爵樂含哺再拜抒丹誠皇澤普無遺三千㑹耆英從兹億萬年翔洽徴由庚樂部司樂張清永年六十典懋三千禮樂慶延億萬春秋稽拜班隨儀鳯鏗鏘節應鳴球嘉燕南弧呈瑞聖齡東海獻籌揚觶九華光裏和聲敬獻歌謳四譯館大使吳元濤年六十萬方衆瑞繪成圖仙醴芬蒀碧玉壺瀛海東南天咫尺共涵聖徳飫醍醐一環宇都重幾譯來星羅職貢帝城隈東風律應青雲吕同上吾皇萬壽盃二原任翰林院待詔項廷謨年六十六角亢稱壽星奎璧伊文耀光暉拱紫極萬載涵積照臣昔依瀛洲文林奉珪瑁老趨丹禁筵獲承仙酒勞壽㝢逮方壺晶華溢圓嶠仰看纒緯間聨珠慶彌劭欽天監博士伯發年六十一壽星煥彩碧雲端賜宴恩深億姓歡仙醖香凝斟玉斚珍肴春湛捧金盤慶霄縵縵卿雲合瑞靄瀼瀼寶露漙喜起賡歌盈萬䙫稱觴錫福㑹千官欽天監博士徐文達年六十一宙合凝清和熙積慶咸理撫辰敬授時錫福被庶士賡虞叶䕫樂飲鎬同燕喜璚露滋韶顏春醲行浹髓小臣𨽻靈臺書雲紀惇史愷宴沐鴻施臚歡頌繁祉刑部司獄銜范紹慶年六十六璀璨南弧麗輝煌北極尊九天舒燕喜萬國仰鴻恩瑞錦舒華杖瑶筐映綠樽㣲銜仙是侣黄髮覲宫門順天府司獄王信臣年六十八春臺熙皥咸韶鳴羣沾帝澤來彭鏗耆筵再㑹虞燕禮鸞彜鳯卣瑶光呈五福堂開斑舞燦萬年觴映仙霞明武功文徳姚似上年豐人壽璣衡平臨雍講學圜璧海近光輦轂開菁英敦龎化洽邁隆古訟庭春草當堦生小臣叨附法吏末欣霑醲化邀恩榮原任按察司照磨顧斌年七十一鳩署分司憶昔年田園嵗月幸綿延欣逢詔集耆英宴身在雲霄尺五天一聞道仙籌海屋添三千臣叟拜堂廉歡欣雀躍陪恩宴此日恩真四海霑二原任按察司司獄章璇璣年六十六舊職忝㣲員何階得覲天寧期周甲齒親到拱辰躔華日臨仙掌春風浹御筵餘齡邀曠典翹首侣三千原任吏目侯習聖年七十古稀天子光華治列嶽重瀛咸覆被耆臣接武上層霄新沐條風飫醰粹帝錫淳龎宇宙同春恢闓樂祥祺備姬雅升恒歌日月羲爻叅兩崇天地小臣舊秩倅方州從今人盡呼仙吏原任巡檢劉銑年七十六絢斗三垣慶積温綸九陛恩恢人在紫霄絳闕春沾玉醴金醅東西瀛濛並列方員壺嶠同開惟共芝田鶴侣萬年長咏臺萊原任巡檢趙之鎔年七十一曉看雲物上春臺閶闔千門取次開鸞鶴繽紛遊閬苑瓊瑶璀璨宴蓬萊籌添東海浮金屋酒獻南山酌玉罍曽向閩江分簿領臣原任福建崇安巡檢天階杖履幸叨陪原任巡檢嚴杏芳年七十日華雲爛煥中天詔許承恩侍廣筵歸得擕鳩誇盛事堯樽親沃聖人前一千秋綺宴荷宸懷鵠立螭頭次第排春日融和歡白髮天心原與帝心諧原任巡檢荆元彪年六十七皇輿紘廓普天所覆日麗雲輝理依在宥凡厥有生咸際耆壽來㑹于庭三千醇茂小臣末秩夙勤堡堠亦既皤顏普䝉粻豆鷟鳴于庭麟娛于囿億萬斯年昊穹純佑候選從九品姜斌年八十三青陽俶景麗銀旛丹鳯樓開覲至尊鵷鷺分行依繡幄笙簧叶律引金樽龍光早荷春風被鶴髮咸親寄日温末秩小臣叨盛㑹稱觴長此紀鴻恩候選從九品茅盛宗年八十一寵宴寰宇寛鳩鸞鶴鵷鷺伯仲仙侣偕懽忭愜情愫酌醇酬酢酣湛澤滂汜濩姚姒始嫓媺逺邇適遭遇草茅䝉䕃蕃和吉各含哺賞賚貲瞻贏祈祝祐福祚五字同部體候選從九品薛典年八十南極摛祥耀東皇絢物華階蓂青應日朝旭麗如霞賜饌恩初渥傳觴慶有加㣲臣慚末職寵荷感無涯候選從九品余兆龍年八十景運慶熙洽寰宇歌昇平禔福膺昊貺衍慶怡皇情芳序詔錫宴人瑞臚耼彭清樽湛甘醴大樂鳴和聲酺醵亶樂愷珍賫還充盈皥皥幬載寛登春勝蓬瀛候選從九品張承業年七十五殿角祥雲擁廷階瑞景長肆筵敷福紀優老荷恩光抃舞臚鳩杖賡歌盛鷺行延洪春正懋共獻萬年觴候選從九品張鼎年年七十四曙色映三台千門萬户開卿雲縈殿栁甘露映宫梅瑞集山龍衮恩濃琥珀杯繙書陳藻黼緝雅咏臺萊福宇人同樂喬齡帝所培小臣叨一命獻頌愧非才候選從九品朱元英年七十四聖徳欽承祖徳深小臣初遂覲光心開樽優渥華裾集鳩杖前頭黼座臨一吉雲深處景光融上瑞齡増百嵗翁敢道臣年逾杖國松喬伯仲未能同二候選從九品栁士傑年七十二寶讌當春啟瑶階喜氣充嵩呼欽聖壽華祝洽宸衷耆叟三千盛賡歌八伯同扶鳩環綺席瑞靄紫霄崇候選從九品杭耀雲年七十一躋金門上玉堂拜手稽首承恩光聖人錫福徧天下臣以耆年預瑶斚幼涉詩書窺史編未聞法席周函夏大徳曰壽皇世如春敷天所覆一視同仁衢尊饜飫接台斗萬載星光拱紫辰候選從九品戴秋榮年七十銅砌韶光暖瑶階麗旭長千官齊列佩萬福慶稱觴典重傳柑㑹榮逾宴鎬章條風熙皓首玉律應青陽詔許趨楓陛詩應集栢梁傾葵心早捧忝侍五雲旁候選從九品陳理周年七十淵雅無垠福儲蒼昊六階衡平萬里黼藻一人敷錫光被四表喁喁是來國老庶老共普雲漿羣瞻星葆蟠木萬仞芝英九華三千壽侣合為一家㣲臣飫徳侍彤庭側藐彼衢歌何知何識候選從九品韓仲甫年七十菲材下走沐栽培聖主鴻恩壽爵開乍覩鸞書天上降並擕鸝服日邊來沿緣綺席筐承賚縹緲瑶笙樂奏陔饌出大庖香作屑甘浮仙醴玉為醅鬢垂雪色陪臯鶴顔醉春光對苑梅讌罷隨班同拜舞躋堂欣上萬年杯候選從九品王柱臣年六十九祥開旭日嵗華蒸慶軼鴻濛古未曽雖有兩庠傳四代詎聞千耦協三朋介眉莫紀循禪世綏耉徒傳角亢徴唯覩我朝隆再舉小臣榮幸典躬膺候選從九品林天眷年六十九鳥火雲龍古帝虞夏商周盛王淳樸未聞燕饗文明肇啟賡揚合三千人一席頌億萬壽無疆邃初圖書駢集聿歸聖世嘉祥候選從九品金國治年六十八隨鵷侣上璃庭燦黄髮捧淥醽燕禮秩于序韶樂鳴于廷嵩呼地上嶽弧曜天邊星昔皇遡攝提之世紀嵗以萬八千齡恭逢聖人錫齒宴曼壽無極惟契泰清與泰寧候選從九品劉沅年六十七㣲臣逾甲子盛宴賜天家鶴髮排鴛序龍旗展嵗華冕旒瞻瑞日紳珮燦晴霞願上升恒祝摛詞敢拜嘉候選從九品樊漢年六十七芳春上日沛恩綸似海韶光遍海濵天以昇平孚寶道帝將祺壽介臣民樽醪環飫三千席粟帛同歡億萬人經史孰云嫓大美普聨中外一家春候選從九品甘運源年六十七壽世昭雲漢推恩雨露寛瑞圖千載盛慶典萬方歡仙醖浮金斚珍肴列玉盤衢尊羣飫後葵藿盡傾丹候選從九品王洪年六十六壽㝢徴人瑞籛佺最易逢羾閶隨曳履趨陛未扶笻盛典超三五恩膏出九重扶鳩瞻日近衎燕樂時雍繡幕祥風轉瑶卮湛露濃下臣欣拜手歌頌效華封候選從九品張昻年六十五泰階符景運壽㝢開中天盛典爍隆古鴻庥揚萬年闓陽敷霽景列叟趨瓊筵矞彤舒藻耀芝醴呈華鮮伊唯三千倫輝曜依辰躔宙合既風動生成荷陶甄皤顏頌至徳上越臺萊篇候選從九品孫思桔年六十三盛事同瞻際聖朝喬年獻壽喜春饒氤氲香暖爐烟重共聽雲璈澈九霄一末秩欣隨鴛鷺班選人先得覲天顏榮看慶矞雲中彩不羡蓬瀛海上山二候選從九品蕭炳年六十三郅治蔚人瑞上春開耆筵春祺徧億兆預宴盈三千迪光典再舉錫羡籌洪延五福記五代慶緒方駢闐醇液漙仙露元音鬯鈞天小臣叨醉飽敬頌南山篇候選從九品沈鳯騰年六十三皇燮宇宙賜以耆年申之康樂鮐背華顛同宴帝澤不知年嵗花甲初周皇授籍記乙巳初春宴以昌之三千惟朋穰穰允綏衢謡巷曲敬祝我皇合天地壽被萬物光候選從九品鍾覲光年六十二五緯祥氛合三㣲麗景恢壽胥天宇廣慶賴帝筵開幬覆舒靈憲綱維運斗魁人追鴛鷺序春錫鵡螺杯福似雕文織康扶玉杖回大年依黼座肄雅祝臺萊候選從九品周心榖年六十一符景運駢法禔曜合璧辰聚奎慶膏溥瀛嶼闓宴敷鮐齯超鴻濛而軼泰始溯禪通而控攝提太平之世人多壽上瑞聨翩天所佑攄若木以䕃盃萃榮河而醻酎芸生飽徳帝萬年敬懷雅頌墀坳奏候選從九品郭奎年六十一翹首蓬瀛近臚歌嵩華歡筵開初日裏宴洽五雲端積慶耆齡共敷天壽㝢寛龍麟齊錫瑞雲鳥漫名官萬葉芝華秀千春建木蟠霜顏欣拱北祝獻寸忱丹候選從九品來元豐年六十一糺縵賡雲句雍熙擊壌年九重修舊典千叟赴新筵春宇祥烟合晴穹旭景妍禮成三祝進鴻慶紀綿延候選從九品潘掄元年六十一肇啟春陽渥澤宣扶鳩入燕衆三千問年六十剛開一臣是卑官最少年一尚齒曽聞舊典詳帝敷康爵邁膠庠環橋重舉昇平典壽宿奎垣合耿光二登勅封仕郎黄畯年七十五鳯紀邁羲軒億載首開五凝祥契昊清積慶徧寰宇新春嘉宴協千筵錫隆祜泰鴻符甄陶羣彚被繡黼㣲臣愧無能鸞書畀華組嵗積荷聖恩露零挹仙醑惟同頌徳忱禆海環歌舞登勅封仕郎趙志愚年七十二瑞靄春無際氤氲繞闕門祺開千叟壽慶沐九重恩額手當筵拜頤顏捧爵温騰華叨錦綺麗日映朝墩崇文門副使方正邦年七十八九闉瑞靄䕃華芝壽耉趨朝燦羽儀雅什臺萊環御苑仙家梨棗萃蓬池曈曈麗旭輝金牓澹澹和颸拂紫旗青玉甃旁瑶席展翠花旌下藻筵施咸英調作稱觴㑹藻黼文推擊壌思貳膳異粻齊燕衎兩壺五挺沛恩慈不遺獻頌封人祝亦遣迎祥闗吏隨惇史何如親見確引延純嘏總相宜宬皇史守吏那明阿年七十七慶霄糺縵書天瑞千叟瓊筵歌既醉同向臺萊祝壽康俯欣社櫟䝉優賜當年出塞誇赳桓星躔寶鉸繡霞鞍褭蹄親拜楓宸賞獺髓曽醫金鏃瘢臣出兵接仗得受功牌賞銀凱奏歸來荷甄錄駑材服駕増觳觫聖主恩深與棄瑕小臣遭際還䝉福丹禁崇嚴䕶玉函五朝謨烈地天參瑞圖早重唐家史慶㑹知逾柱下耼重熙累洽開瑶宴赤文綠字循環獻光燭琅霄乙巳春老人星拱宸垣燦宬皇史守吏富勒渾年七十五嵗籥啟斗柄回祥雲五色擁上台我皇錫壽歌康哉元正六日齒宴重開婆娑黄髮扶鳩侣熙熙共慶登春臺趨玉陛斟香醅天家盛㑹逾蓬萊精鏐載錫文錦新裁尚方珍異稠叠來臣職典圖籍碧牋瑶篆髙崔嵬未知古之羲皇世曽否有此三千一席聨耆鮐末吏鮮博識敢冀周家耼史商家虺承恩無以效芹曝惟奉南山獻壽杯宬皇史守吏赫齡年七十五紫禁春風灔淥醅月正六日綺筵排斟衢人樂堯樽滿介壽風從豳俗開堯樽豳俗盈春酒躋獻公堂共稱壽徳星奕奕曜南弧元氣融融㪺北斗從來北斗挹天漿大地雍和樂復康三壽都從天子錫萬年觴晉引杯長宬皇史守吏富明阿年七十一職重圖書吏人依禁闕仙瑶函尊祕籍琅爵奉春筵帝錫敷天壽臣賡積慶篇為徴九龍紀景運邁循禪宬皇史守尉徳禄年七十七春傳梅信酒挹椒香瓊筵賜宴邦家之光皤皤黄髮文賡武颺下及農民薄海同疆蹡蹡濟濟集闕庭旁齊捧華樽上祝羲皇天子萬壽福同昊蒼生意各得豫茂泰昌期頤前列手賜天漿八旬以下詔曰分觴珍賜蕃殖錦綺矞煌歡騰九宇慶積彤閶臣守祕閣聖朝典章問圖書奥系牒所蔵孰嫓景祜千叟迎祥宬皇史守尉羅郎阿年七十二神仙何必金銀臺長生那藉安期棗耋耋同嬉仁壽天億萬穣穣歸大造聖帝敷錫遍羣倫有列于朝皆綺藻有皤于野並漸被中外同霑仰穹昊臣職守尉依禁近柱下之蔵積華繅嵗華遒鬱游熙和五鳯樓邊覿輝早新春丹詔逢賜酺千叟同臻飫醇薧聿稽古來守蔵吏多以喬齡稱夀考况當聖代昭景慶融光久己超軒皥飲和食徳頌太平長共耆鮐集蓬島宬皇史守尉五爾清阿年六十六班序欣依列曜開筵正及良辰共頌我皇繩武欣逢大宇同春在坐粹醰有爵環瀛仁壽之民幸際昌期曠典簡編千古難倫館國史館吏明山年七十三世徳傳金鑑鴻編捧玉函重熙法則在善繼聖神參兩度耆筵啟千秋盛事談書正逾七七紀日又三三樂與臣民共恩沾雨露酣燃藜曽侍向守柱欲希耼數典真親見徴文况舊諳若編符瑞志弧彩見天南庫吏瑪爾泰年七十六身遊仁夀即華胥七十年來化日舒作吏舊司西什庫稱觴羣拱北辰居長生圖籙原無量大宇珍祥不絶書喜溢觚稜儕燕雀白頭長此䕶天儲庫吏烏爾清阿年七十六六葉舒瑶砌昌辰錫宴宜紀年符大衍舉典慶重熙席並春陽照樽同湛露施稱觥申忭祝敬頌九如詩庫吏巴延泰年七十四乾清春曉瑞烟開詔許耆年入宴來盛典昔聞纔總丱法筵今賜到皤鮐鹽梅和鼎迎祺序漿酒分星飫壽杯身荷生成榮末吏臣隸酒醋局欣偕黄髮詠康哉庫吏五十三年七十二聖世生成作壽人喜同熙皥共龡豳九重解阜調元化萬國蠲除拜渥綸久慶康衢符凱樂新隨嘉宴洽韶春班依筦庫參㣲秩蕭露芝雲仰紫宸庫吏奇秀年六十六博厚髙明悠久聖功幬載同符化㝢咸依帝日酺筵上繼皇謨奉職忝司管鑰隨班幸列蓬壺願以無疆進祝萬年辰拱南弧庫吏徳楞額年六十六榮依絳闕天府是釐珍儲瑰器臣職司之謹凛出納恪恭筦蕤積有嵗年比崇侔貲天道地寳矞皇瑰奇臣至于今皓首龎眉言隨鶴侣欽奉龍彛錫賚之豊人奉天施按秩班齒懋降以差皇帝萬壽乾健和頤惟福之錫惟天之儀扶靈壽杖食齋房芝鴻漸鵲躍萬年惟祺庫吏琦㻝琿年六十六盛典稱揚光華引髙年恩有加簮紱既蹌濟閭巷同芬葩率土康樂被以庥嘉脯揺瑞萐樽泛流霞㣲臣筦庫之末士夙荷甄錄寛垢瑕六十餘年沐優渥叨預榮遇歡靡涯惟願萬年綿景貺升恒日月燦爍䴡斗車庫吏慶禄年六十六韶春佳氣萃蓬萊燕喜恩筵上日開雲合三千人獻壽龍光髙處進霞杯萬年嘉慶溢天庭九宇騰歡共賜齡直似東風披拂處無邊小草共囘青二城門吏李萬鵬年七十四星輝雲爛昇平世城闕葱蘢繞佳氣彤階拜手三千人人以壽康承渥賜帝恩賜予寵殊常盈階珍綺埀嘉惠宫門禮邁膠庠序耆席儀超燕饗食追隨鴛鷺沐恩榮俯逮監門一㣲吏庥祥洊出衍疇圖敬效嵩聲祝萬嵗城門吏四達塞年七十一龍飛五十春慶滿皇輿浹鮐背競鳬趋賜酺啟閶闔金闕絳氣凝環萃九衢接紫極竦宸居崇閎峙雲堞八紘在堦宇三壽趋庭閤峩峩纓佩來濟濟冠裳攝畺臣遞叩闗海國列奉牒紳士暨襏農皤顔臻翕習但見皓鬚眉春風動毫頰羣歡天子聖錫福恩稠叠㣲臣職司閽羣叟日延納不謂菲薄姿亦被醇醲洽擐甲憶前驅昔荷天威讋臣曽出金川兵一次介雅厠宫懸餘輝映蓂莢洪惟聖壽崇品物普調燮惟進萬年觴抃舞葵忱協城門吏紀格年六十四旭日䴡階墀仁風動青瑣千門萬戸春光來天子臨軒普賜百僚坐坐玉堂飲芳醑小臣抱鍵柝初停趋走循牆躬傴僂萬里非遥九重非深門盈耆耉廷集纓簮東來紫氣浮閶闔臣職司東便門帝居青陽下徳音城門吏李純年六十聖皇錫宴承平日豹陛螭坳班秩秩蓂莢元旬吐紫㽔蟠桃千嵗成丹實右平左墄列瓊筵虎拜稽首上萬年不知計數逾廿萬真如世界成三千翠花旌下韶光麗青玉甃傍看春霽封人原觧祝多男闗吏由來知望氣鬱鬱葱葱慶典新凝庥受祉豫楓宸晨開閶闔萬方集䴢至六街環九闉通州渡口吏白永年六十五民物諴和樂阜康耆筵開處慶雲翔仙家競獻蓬萊果貢使爭攜勃律香五代同堂懽昊嵗千叟再㑹盛虞庠逄逄鼉鼓靈臺奏筏筏鸞旌璧水光福緒景來寰海廣恩波逺沐潞河長畿封近日春臺溥漕舳連雲帝庾穰先見琛球駢逺渡翹㸔珠璧曜天梁莫慚津吏膺㣲秩皓首丹墀進夀觴原任典史何喬年七十五盛世欣瞻愷澤涵耆筵拜舞頌恩覃曈曨日被雲旌展澹蕩風兼露酒酣喜近玉墀聨彩鶴曽隨花縣課紅蠶太平徴應心常記拱老人星列曜南原任典史陶景元年七十四巍峩頌聖徳溥八紘八埏韶春集祉福大宇瑞光駢五辰耀珠斗千叟列廣筵㣲臣一何幸恩榮被福縁昔從田間來末秩沾㣲員静識大化理徴在茅檐邊家家有餘粟户户多贏錢村庄言孝慈暇或及誦絃敦樸無澆訛各自全其天以之得壽性往往臻大年愚民識耕作不知帝力然至今捧粟帛壽楔百嵗懸生理謂當爾渾忘世太平臣生七十四被沐于陶甄粗識羲皇治幸叨膏澤宣俚歌代衢祝擊壌心䖍䖍原任典史鍾山年七十四韶景皇州藹崇年藻席開鴻恩推耄耋仙讌預蓬萊鶴髮欣齊祝螭頭許共陪飲和歌既醉小草荷栽培原任典史董武晉年七十四熙熙韶景鬯春陽貳宴初開廣樂張中捧賜卮承黼座旁分賞席映瑶觴慶膏浹處天衢遍嘉瑞呈餘海國揚葵藿㣲忱殷獻頌古稀天子壽無疆原任典史饒文光年七十三祝華封聖人壽御筵開將進酒古稀天子我元后錫福肄筵臚千叟松茂兮南山尊開兮北斗幸生太平時况沐恩施戴髙厚願頌聖齡億萬年洪延幬載齊悠久原任典史姚存仁年六十八得依黼座飫金卮慶值春祺懋錫時周甲儼隨千叟到由庚真奉萬年期花封百里曽叨尉壽耉三朋忝受酏基慶綏和凝五福惟將華祝展葵私原任典史王玉衡年六十七月正六日春風生四海熙娛歌太平少者以長老者養古稀天子舒韶英韶英樂奏麟鳯舞三千之倫被宫羽盡是皤顏白髮人都游積慶重熙宇朝廷重爵首台鈞爵均以齒鋪華茵百齡上壽首開秩天子當軒手賜醇舊列㣲員今白首亦厠螭坳飫天酒黄鸝彩服莫言㣲紫鳯宫門親上壽浩浩穣穣綺繡羅曽絃天保九如歌雲璈深處歌一曲星雲糺縵盈鑾坡原任典史徐毓蒼年六十六景運協中天臚歡遍八埏虞膠超舊典鎬雅遜華筵帝懋時幾勅臣歌天保篇欣偕耆耋侣親手祝皇年候選未入流葉荆玉年七十五聖壽超隆古春祺瑞靄迎耆年叨異數嘉㑹沐殊榮咫尺龍顏近三千鶴髮盈泰交符國運豫大協輿情並有升恒祝都懷瞻就情嵩呼山奏響衢頌壌添聲盡副傾葵願咸抒獻曝誠吾皇億萬壽大宇樂昇平候選未入流平紹昌年七十五寰海春融聖澤長耆齡咫尺仰恩光玉爐香裊晴雲暖同效嵩呼紫座傍一帝錫恩綸溥大千欣隨鶴侣上雲天歡聨朝野敷同日知在虞周燕饗前二候選未入流吳迪𨫼年七十五皇上逮庶老嘉讌敷春祺弱草邀湛露也許䝉恩施鳩杖集玉戺燕譽傾瑶卮條風始和暢廣樂交融怡敷天曯雲景光華呈若斯禮成益仁壽三五臻上儀懽欣浹心腑擊壌陳歌詞候選未入流陳禹枚年七十三南弧佳氣燭丹霄簮舄同趋似早朝億萬年胥賡鎬宴三千人普聽虞韶班懸流品慚樗櫟㑹擬耆英咏蓼蕭階下嵩呼同志喜天顏咫尺不曽遥候選未入流金思義年七十二聖主開耆宴恩榮鶴髮稠聨班分綺帛列序捧金鏐旭日臨螭陛春風出鳯樓㣲臣逢闓澤率舞紀歡謳候選未入流魯良周年七十二聖世三靈集慶臣齡七袠纔新麟遊雙骼共抵亥字二首六身得並翩翩符瑞同邀馥馥醲醇從此不知衰老還顏長奉丹宸候選未入流王紹晉年七十一九陛引髙年不獨以爵榮兩階列齒序不藉以才稱㣲臣叨末秩候銓依神京生長太平世涓埃未效能華衣耀彩服垂老仰太清春風紫殿開帝錫大宇齡聨翩耆耉集燦爍華筵晶元公捧夀觴鴛鷺駢颺賡㣲臣忝預列徒以嵗月増濟濟三千侣金玉相舂應曰惟仁壽宇頤養同生成醬爵邁古典敷錫慇皇情抒忱隨拜稽敬效三呼聲候選未入流茅奕懋年七十苕水老編氓頭銜等代耕幸隨蓬島㑹堪擢縉紳榮賜杖邀殊典稱觴效載賡戴恩歸里井曝背話春眀候選未入流栁國華年六十九夀㝢浩無垠祥開五十春韶光榮小草闓宴慶芳辰幸接鵷行末欣頒鳳詔新乾坤恢運會日月映陶甄嵗並從天賜筵惟與衆均三千同介祉聖夀萬年臻候選未入流陸萬程年六十九瞳曨曙色映天街萬戸千門淑氣諧丹鳯詔書周海宇新正六日壽筵排一隨班矍鑠奉祥圖莫道桑榆與栁蒲今日春風吹小草欣欣都作向榮旉二候選未入流林祖放年六十六曉漏浮金箭春旗簇彩霓九閶傳手詔千叟盡眉棃鮐背分行侍鴛班列座齊何須尋菊水天酒爛玻瓈候選未入流詹昌璇年六十三乾元太乙慶春正樂壽覃敷被八紘卿月仙霞環紫極海籌嶽祝萃蓬瀛觀頤萬物歸恬養交泰三陽叶彚征遂幸光華䝉小草始知埏埴徧羣生天衢浩蕩朋同盍露甕濃瀼酌更盈銓格待叅流外選耆年榮列㑹中英杖期未逮䝉鳩賜捧日常殷遂蟻誠觴進九霞筵百福洋洋鈞奏聽咸莖欽定千叟宴詩巻二十四
