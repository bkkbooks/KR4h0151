body:
  text: 卷十七預宴九十一人詩九十六首驍騎校劉兆麟年八十六束髪馳驅列校行承恩八十六年强官從舊職儕中壘賞乏竒功上太常丹極九天青𤨏闥朱顔三爵紫霞觴三千叟入常春宴仁夀還知洽萬方驍騎校官佛保年八十一太蔟應律生條風青帷黼幕陳法宫番番黄髪入需宴一時禮遇千人同㣲臣遭際重追舊挾纊温曽感幬覆是處營隨細栁移幾回賦媿長楊奏只今欣復荷恩綸嵗月優游過八旬願獻聖人千萬夀祥源福緒與年新驍騎校韓貴年八十韎韐刀弓八十健彊偃武脱劍祝堯晉觴雲開雉扇日麗鴛行三千黄髪拜舞賡颺欣逢盛事迭見嘉祥萬邦和協以近龍光驍騎校薩哈爾圖年八十皇帝紀元五十載嘉祥大洽天下春時和嵗豐洽恬養鼓舞萬物歸洪鈞垂裳上有古稀聖含哺下徧康衢民書陳周奭紀平格詩采天保歌羣臣今年廣殿大和㑹中外奔走來振振臣慚駑下且衰朽亦得觀國充王賔恭稽康熙錫宴嵗臣時十七猶閒身臺萊竊聞尊老頌象勺尚與兒童隣何知生長嵗八十親見日月重光輪憶惟從軍出北幕臣出北路兵一次後來講武隨平津臣前後隨圍三次鷹揚自笑虎賁老馬走猶幸龍墀親我皇乆道化成慶緝熙䋲武同天仁如臣㣲末尚䝉録燕歸得頌恩榮頻恭紀乾隆嵗乙巳元正上日日丙辰驍騎校烏爾圖那蘇圖年八十五福堂開五代三春祚首三元萬夀億萬夀晉千叟三千叟繁夙隨魚陣鳥陣就列人門㦸門風從雨從民樂露漙露湑君恩疊字體驍騎校清保年七十九夀斚分嘗玉醴甘汪洋帝澤仰淵涵温綸早荷鸞書䧏盛典還容虎士参幾度幸頒金匼匝昔年䝉賜馬驂驔臣曽䝉馬匹賞銀兩髙深覆載私銘感尺寸功勲獨抱慚砌莢乍看初秀茁苑梅先覺暗香含真教慶與年俱永湛露洪施四逺覃驍騎校清㤗年七十八太平天子景運昌紀年五十初洪長三千耆艾普錫慶㤗交六日同稱觴㣲臣自㓜霑皇澤奔走忘年長勉策忽來天上共隨班幸比南弧瞻北極九閶曈曨旭日開鈞天之樂從天來醲恩但覺紀稠疊稽首效祝慚非才驍騎校明山年七十八堯紀蘿圖輯有光藻華啟籙卜年昌福敷夀㝢恢無量徳溥春臺慶孔長豹炳從來聨七萃鳩扶忽與列千行恩榮自是生叨幸同聴謳歌協萬方驍騎校巴凌阿年七十八朝陽升髙岡流光照春曦鳯凰集梧桐燕雀懽追隨慶運昭帝徳如天覆無私推恩及黄髪錫福傳金卮㣲臣侍執㦸㓜嵗分黄旗三陪大蒐禮一誓征苖師臣隨出圍三次兵一次馬齒日以長勞績鮮足推况復威化洽鼓腹長恬嬉引年逢盛典羞耉加隆儀魏闕㑹千官振古兹一時厨萐何繽紛習習和風吹恩波被薄海抃舞同歌詩千斯萬斯年惟祝綏蕃釐驍騎校富森布年七十八幸届扶鳩嵗恭逄式燕年鵷班霑夀酒魚藻飫賔筵日暖春回律恩覃福自天醉歸環陛楯拱極瑞星懸驍騎校北帝保年七十八五校營分禁旅開壯齡芻秣到耆鮐琱戈舊記龍沙度華劍時叨豹尾廻每愧秋風飄栁質欣逢春雨灑樗材芳筵慶積層霄上寳笈恩垂薄海隈九節共扶蒼竹杖三漿同酌紫霞杯韶陽迢遞舒梅早知有祥和徧八垓驍騎校白格年七十八幬覆天同徳皇仁詎有涯時方際熙洽世共積亨嘉虎旅叨員乆龍墀拜慶賒黄樽邀玉醴皓髪煥春葩聿自參魚陣臣出兵一次曽䝉恩賞銀五十七兩由來肅兎罝隨圍三次賜金人共羡歸凱昔曽誇氣逐年彌奮恩邀數特加颺言何以報惟幸際光華驍騎校伊凌阿年七十七南極輝先列宿懸昇平世界夀無邊古稀天子重申錫福字開從五十年一瑞啟階蓂六葉新耆筵芬郁鬯韶春八屯星校三霄澤華髪隨班拜紫宸二驍騎校佟太年七十七萬年天子天廸康詔宣耆碩朝雲閶叟以千計又逾倍王公卿士農工商皤顔皓髪敬在列東國陪隸遵鵷行恩筵喜洽和氣溢頒賚珍綺騰輝光况今辟雍文教洽魚魚雅雅東西庠肇啟鉅典誠煌煌上天協應嘉祥集祝聖夀兮夀無疆驍騎校海常年七十七上瑞輝南極鑾坡淑氣新初筵三夀集嘉頌九如陳舉典稽同甲依光正及辰小臣司武衛醉飽共登春驍騎校長清年七十七錫福耆筵肇啟恩光慶賚添優昔日從瞻豹尾今晨近接螭頭楓陛祥暉照煦瑶卮湛露穠稠列校餘齡望八欣隨化宇熙遊驍騎校覺羅雲㤗年七十六彤墀暢景閬苑熙春夀弧見丙吉日逢辰惟聖人夀與天地乆筵敷五福式宴千叟趨陪鷺序近接龍光拜恩拜賜絡繹輝煌率土春臺普天夏屋㣲臣獲幸同斯景福驍騎校髙溟飛年七十六夙奉周廬職欣逢大酺辰鳩扶隨齒序雀躍荷恩頻瑞藹三壺薈歡聲六幕均皇仁膺羡貺億禩共熙春驍騎校富成年七十六律轉青陽嵗籥新恩深養老宴臣隣九霄瑞氣凝雙闕萬姓嵩呼仰一人白髪簮𥚑鳴玉佩龎眉舞蹈搢華紳篆烟風細祥光繞法樂聲和典禮馴虎拜載賡天子夀龍飛長享太平春釀成銀甕斟三雅賜出瓊厨薦八珍喜傍彩雲瞻咫尺歡迎紅日荷陶鈞六師幸備戎行列醉飽難酬聖主仁驍騎校徳克進年七十六彤廷日霽萬彚昌湛恩汪濊澤孔長一人有慶幬四海列三千叟謹對揚方今文教廣敷錫辟雍規製増輝煌登三咸五邁古帝熙春介景開夀觴臣工趨蹌萃玉帛鶴髪台背羅鵷行金爐梟梟柏子香脯擘麒麟饜瓊漿萬年天子積禔福曰拜稽首頌無疆驍騎校四格年七十五鳯紀元正月龍飛五十年輝華仁鏡普典禮耿光傳景祐昭宸極重熙煥史編吉諏端履六嘉㑹叟逾千日暖東皇馭星輝北斗躔凝霞真滿眼散雪各盈顛階舞陳干羽宫韶奏管絃萬方歌既醉三爵拜初筵忝列鷹揚未叨居虎旅前來隨青鳥使坐侍紫㣲天行慶胥無外推恩示不偏老沾金掌露長頌九如篇驍騎校四徳年七十五龍樓春靄綺筵張馥馥金猊惹御香黄屋風清齊鶴侣翠旗日麗列鵷行座中紺雪歌三奏天上流霞醉百觴羣幸蓬萊叨異數武臣殊愧拙詞章驍騎校武文隆年七十五南極祥雲繞東華淑景妍重熙春色洽五紀瑞符綿嘉㑹天顔靄賡歌泰陛聨珠英仙掌露夀篆御爐烟雅叶維祺祝恩銜既醉篇稱觥同偓羡列坐有安籛揣分牙旗末依光綵仗前萬方齊樂愷聖徳仰乘乾驍騎校哈魯堪年七十五弱冠奮趨武列前驅肅扈甘泉臣隨圍三次曽自引强恐後不知振旅爭先夀㝢欣逢鴻慶官行榮與蟬聨叟計以千再倍恩延於萬斯年驍騎校臣虎年七十五大徳大福臚箕疇耆筵在列施恩周玉階金戺燦祥景樂成儀鳯人扶鳩㣲臣列職備屯萃曽執櫜鞬膺兠鍪詔叙軍政荷嘉賚寵頒文綺兼精鏐鑾輅長隨覩羽獵飛軨葩瑵輝華斿今逢盛典賜酌斗學詩未也能衢謳驍騎校佟畢年七十五聖澤彌紘埏春和錫庥祚大宇咸沾濡湛恩榮賜酺綺席揚淳風法醴流甘露燕洽龎眉人詠歌達衢路孟陽日惟吉龍光沛恩數捧杖覲楓宸拜手隨鵷鷺祥雲紀慶矞至樂鏘韶頀君王千萬壽歡聲及臣庶驍騎校胡蘭泰年七十五五風十雨三階平卿雲煜爚輝芝英璇圖日麗瑞靄霽寶篆香浥朝霞晴液露流甘漙膏潤綸章載錫敷恩榮扶鳩先後列階序儕鶴次第翔穹清耄齡長飽御廩粟珍膳更飫天厨羮巴渝之舞下里曲敢續衢壌羾丹誠驍騎校李長松年七十五天符煥矞彤地徳輸甘醴上瑞集斯人葆性齊籛耳聖皇撫九有鳯籙逾軒紀車書盡幹衡象譯咸同軌星占南弧赤垣共北辰紫臚歡嵩華崇頌徳瀛溟瀰嘉宴洽春陽遂生到蟜蚑新綸捧粟帛厚賫耀文綺風動萬方和雲需九重喜在宥契清寧億齡綏福履驍騎校阿寧阿年七十四八萬四千仙甲子崑崙瀛海大九州往牒紀載涉汗漫昔賢常笑多虚浮恭惟聖人化久道時大和㑹羅耆叟中朝内郡外蕃服伻來龎皓爭帣鞲玊階雍容偨差列小臣亦得從兠鍪露甕五色觥酌兕夀籐九節笻扶鳩雲濡雨霈澤汪濊髙㪺北斗交勸酬簽名序齒爵無算區區荘老言春秋大撓隸首應莫紀恒河為數海屋籌恒河為數海屋籌巍巍聖壽與之侔驍騎校吉福年七十三聖夀貞元合華筵山海陳萬年正月節千叟一家春慶自敷天洽恩榮筦庫塵如臣連校士亦獲宴嘉辰驍騎校胡徳貴年七十三洛書五居中河圖十環外乾坤之䇿尚有千錯綜推衍成元㑹紀年龍集欽聖符朋來况叶三陽泰麟振振兮鳯翽翽星雲糺縵開天繪孰予奔走孰後先共對南山歌保艾湛露瀼瀼豐澤汪濊福海紀仙籌鈞天協鳴籟祥颸引華旛瑞日升芝蓋外藩逺牧連衣禬敷錫方知夀㝢大禮編史氏濡毫頻盛事寰區臚頌藹湛恩上溯仁皇年環周綺甲恩重霈驍騎校王憲章年七十三雉扇輝分獸鼎香九天閶闔宴瓊觴欲知聖主龍光渥為看仙班鶴髮長一鶡冠隊裏響鳴珂結束弓刀壯志多虎衛龍驤盡仙侣蓬萊深處萬年歌二驍騎校徳楞額年七十三太平日月慶恬熙醉飽同歌福禄宜恩自九重春更早朋髙三夀瑞斯竒祥符懋啟寰瀛樂澄醴涵濡景物滋七十小臣逢異數玉階常傍萬年枝驍騎校蕭聨積年七十三羽營依日下早嵗仰天顏虎韔慚分校鵷行許厠班簡書曽䇿遣嘉幣更恩頒臣軍政引緞匹見䝉賞耆席叨仙醴疑登霄漢間驍騎校楊桑阿年七十三協氣旁流盡飲和得瞻聖典陋巻阿筵開閶闔雲霞曙春到蓬瀛雨露多早向羽林司執㦸欣依鱗陛聽鳴珂負暄更此葵誠切願獻昇平擊壌歌驍騎校巴哈年七十三典禮隆千叟庥祥萬葉延古稀天子壽大衍太平年執㦸陪仙仗摳衣拜綺筵㣲臣叨齒序祝嘏上吟箋驍騎校雙保年七十三豹尾承恩五十年九重敷錫與瓊筵升恒日月嵩呼萬和㑹琛球禮洽千鳩杖分牋獻邠頌鸐觴浥露醉堯天八埏廣被無疆福椒酒辛盤壽祉延驍騎校宫應龍年七十三韶籥和令瑶光耀齊蓂階舒秀葭春布緹丹墀慶讌黄髮榮躋臣慙毫末健喜齒齯卮酣松釀盤饜菹臡既醉既飽以頌福禔驍騎校常新保年七十三瓊階峻處吉雲生玉盌盛来寶露清譜入宫懸周雅再鳯桐鳬藻頌歌聲一弱冠先叨豢養恩欣隨清蹕出天門臣二十嵗食餉今五十四年隨圍四次只今醉飽依宸極五色雲稠藹綠尊二驍騎校賽松阿年七十三燕喜羅千叟蕃釐集一人觀文成久道徧徳播深仁膏露三霄浥璚雲五色新綏桃登茂實瀛棗貢殊珍授几聨中外敷筵集珮紳酢酬文泰洽筐篚渥恩深靺鞈參戎隊櫜鞬扈紫宸服閑慙駿騎萌莢荷鴻鈞向日光同被如天福並臻羣歌雲漢倬億載戴尊親驍騎校八十年七十三熙朝首尊年盛典廼再舉下多彭佺流上奉羲軒主鈞奏聞雲璈長筵酌桂醑霜髯不知寒被之以春煦耄嵗荷殊榮玉陛羅仙侣身為貔虎士入與鸞鷟伍琱戈換鳩杖醉酒婆娑舞所樂在人和熙熙超邃古驍騎校麻色年七十三久奉鸞旗後欣逢燕喜時觴傳千日酒杖捧萬年枝夏屋儀文備春臺物象熙㣲臣陪宿衛長此慶昌期驍騎校和綳額年七十二豢養方慙嵗月侵濃瀼帝澤共春臨欣來九陛趨耆席願矢三多祝寸心此日扶鳩承彩煥當年䇿馬奉恩深霞觴霑醉顏能駐試聽琅璈天上音驍騎校龎上進年七十二嘉宴三千叟鴻庥五十年不遺樗櫟質同飫玖瓊筵忱矢嵩呼切儀看鷺序聨武臣叨渥澤億載戴堯天驍騎校朱紹琦年七十二沉沉閶闔敞華筵雲日爭瞻尺五天曙色有輝因雪後春醅許醉及花前年誇週甲餘重紀瑞喜長庚燦列躔徧聽歡聲同擊壌衢謡敢附紀恩篇驍騎校王遵聖年七十二皇帝五十載薄海咸臚歡聖心浹胞與首使老者安方春協氣流頤攝還賜餐甘醪既盈爵仙棗初登盤朱提給少府白粲出大官紘垓符瑞臻蓬閬嵗月寛眉棃數三千咸使扶杖觀匪徒典禮重實慶庥嘉攅珥筆上惇史盛際傳紳冠驍騎校勒福年七十二肅肅勾陳列䝉恩預宴娛杖鳩曕玉座斟蟻下仙厨景福天重協鴻庥世共敷韶英仙樂度環聽頌康衢驍騎校額爾炳額年七十二古稀天子開亨衢斂福敷與臣民俱乾清廣宴集耆耉期門虎士皆沾濡弱齡奉職備星校五十五載丹宸趨曽修矛㦸過北漠亦隨旌斾田東都吾皇神武陟禹跡詰戎不以承平殊幸叨廩禄長馬齒親覩苞采開龍圖天膏下逮醍醐飫文韶武舞歡聲臚朝陽麗天春色普足足翔鳯髙岡梧驍騎校張士偉年七十二共向華筵舉玊觥新年喜氣溢春城花迎長日墀頭仗綵曳和風殿角旌八校序隨羣隊肅三台曜列泰垣平慶烟景爍班耆老厚賫天題下禁營驍騎校五十一年七十一瓊筵開紫禁皓首列朱扉洽慶從兹始遭逢自昔稀仙班聨羨偓星次耀珠璣嵗嵗嘉祥續扶鳩集帝畿驍騎校陳徳明年七十二羞耉開嘉讌凡材列綺筵青旗常近日絳縣莫疑年玉饌調芳味金爐裊瑞烟侑觴周四座加禮備三籩吹琯春回律腰弓月照弦雲屯依紫闕長此戴堯天驍騎校孝順泰年七十一玉斚英英刻延壽麒麟之喜光燭斗紫羅設饌飲天宫史乘浮夸堪覆瓿豈若熙朝郅治彰重陳寶宴迪前光纔斟栢葉三元酒又進瓊腴萬夀觴憶昨從軍曽負弩煌煌睿算昭神武頓令九塞靜烽烟早見兩階舞干羽歸來脱劒紫宸朝属車九九候鳴鑣帳殿春風隨雉葆星廬夜月肅雞翹散材幸際昇平樂依䕃松雲奉康爵一從萐脯飫甘鮮共喜頽齡増矍鑠驍騎校巴達爾虎年七十一鳯扆迎丹旭龍樓羃紫烟昌期符大衍景運叶中天簮紱榮髙㑹笙鏞列綺筵兕斟春日酒麟擘御厨鮮擊壤華封徧占籌海屋駢冶銀頒夀富扶杖擬神仙羽衛雲霞蔚星躔日月懸堯階容曲􅎽長奉太平年驍騎校六十三年七十二雲階玉燭有光輝接跡期頤近紫㣲春到八荒同夀愷花迎瓊瓚黼屏依一仁夀庥風運際昌天家恩賚洽青陽紺曈綠髮人為瑞三祝歡呼奉帝觴二驍騎校竒臣年七十一仁夀物天道積慶深恩普引年及小臣啟筵属芳序薄海迓洪庥扶杖效率舞雅奏叶元音醉徳匪酒醑拜手盈三千臚歡播寰宇重光至徳宣曠代逢夀主願進紫霞觴萬載膺永祜驍騎校富色訥年七十一聖徳鴻絧上嫓清穆光闡前猷萬物率育年週五甲祥開百福耆耋蔚臻錫宴以禄有叟三千發春初六臣叨饜飫擎跽禮肅化逮四裔歡騰九服聖皇壽世遍錫戩榖於萬斯年端倪鈞軸驍騎校玉寶年七十盛世仁風洽光天泰運開三階調玉燭六合樂春臺添算來遥海分班首上台爐香霏䄂滿尊醴夾墀陪飽徳分天饌賡歌仰聖裁昌期今幸覯鼔舞九衢回驍騎校竒明年七十羲農之世民永年堯舜之世民難老國家仁夀徧康衢引年錫福歌熙皥青陽叶律生春風列坐長筵逾宴鎬金漿玉液滋甘霖翔舞何殊儀鳯鳥祥雲縹緲出羣仙珍賚斕斒盡鳬藻㣲臣欣幸飫徳澤大地陽和榮小草沈烽靜柝泰階平髙㑹歡聲騰四表上夀觴兮進九如澤宫又喜歌靈沼驍騎校元保年七十隊本桓桓貔虎班依婉婉䕫龍地天泰交景運雷風恒作春容億萬齡開幬覆三千水切朝宗肄雅無分介士露蕭為湑為濃驍騎校西都里年七十長養風來七政齊仙庭錫宴慶鮐齯鏡懸仁夀天同紀紘廓苞符聖日躋欲溯鴻龎超燧昊己徴耆耋徧軺鞮金盤玉醑欣沾被五色雲中捧御題驍騎校張斌年七十養老隆周典熙朝愷澤新長輝萬禩祚早樹百年人丹陛卿雲拱黄罇瑞露匀桃符瞻煥彩鳩杖獻宜春抃舞顏如赭歡呼髩似銀功㣲持畫㦸恩普慶靈椿既别東西序無分草野臣星占南極色㬅夀頌皇仁驍騎校劉燃年七十昌辰茂集蕃祉帝徳常符健行五福堂輝奕葉九重詔宴羣英鴻儀式捧鳩杖燕衎欣諧鳯笙泰運三陽式啟泰階六符以平驍騎校陳賢年七十夀㝢繁禧集耆筵茂典逢龍顏温賜斚鮐背健扶筇七萃占籌久三階仰化雍生成皆帝澤懽躍飫醇醲驍騎校和成年七十惟皇錫福澤溥垓埏籙符蓍筴弧燦星躔上儀敬秩詔錫雕筵鵠隊奕奕鶴髮翩翩日融黼幄花映華旃需雲普氾同荷陶甄臣依列仗羽校班聨欣叨鎬宴長戴堯天驍騎校雙慶年七十奮軋陽春滿諏辰典禮敦隆儀循聖祖吉瑞肇元孫夀冠九疇福齒先三達尊飲和勝菊水長此戴君恩驍騎校蒼璧年七十春臺萬物共翺翔况是身依黼座旁七十幸陪天子宴一官叨拜羽林郎康荘馬力忘駑下霄漢鴻飛戀景光此日太平歌詠盛許教簮筆到鷹揚驍騎校孝順阿年七十八埏浩蕩播陽和衎燕雍容集珮珂協紀軒齡綏福禄方中舜日盛賡歌慶霄香藹紅雲案仙露膏濃碧樹阿仰慶三階調玉燭來遊五老應榮河瓊羞花醖初筵晉鮐背朱顔九陛羅共喜耆英聨譽處並教彀騎沐恩波先驅翠輅曽持箙偃伯靈臺記荷戈白髮幸隨鵷鷺後願従鈞奏祝三多驍騎校二達色年七十戎行慚靺韐嘉讌入蓬壺勞績臣何有遭逢古所無矟幡慚左右龎皓際唐虞寶祚綿千億恩深逮栁蒲驍騎校姚經邦年七十暖日和風滿鳯城欣聞丹詔下承明筵開瑞露滋瑶斚律轉華星應玉衡七校班聨分侍從三階歌舞頌昇平昌時耆耋多稱慶踰分恩光格外榮驍騎校保寧年七十效職參蘭錡依光拜玉宸華筵承渥澤芳澤紀韶春齒近扶鳩嵗心傾賜酺辰簫韶依陛奏綵仗夾墀陳從律條風暖含膏潏露醇蘿圖綿聖算羡貺慶重申驍騎校髙忠年六十九神筴徴天授芳筵諏吉陳晴光春浩蕩洪算嶽嶙峋此宴超三古臣年近七旬感深歌醉飽磨盾紀恩新驍騎校楊廷棟年六十九受福不那百辟俾爾戩榖一人仁者夀以及物皇之世本如春位分國老庶老恩逮内臣外臣五紀得隨豹直臣食俸五十二年三陽同被鴻鈞驍騎校伊拉器年六十九元㑹運世亘以長易策詩際久盛當我皇御極五十聖當陽宇拓仁壽四海翔㑹千叟歡未央麟遊復鳯舞同此新春光春可悦小臣但鞠􅎽何以效獻納渥澤流汪洋燕衎輝鴻業超三咸五古所説金枝延連閣奕葉來晜仍雲繩繩接福流慶祚稠以疊皇心既愜天心協驍騎校李承業年六十九嘉讌天開典更隆三千仙籍許名通身隨驍騎将軍後官次期門校尉中幾見臣僚同作叟敢云矍鑠可成翁酡顔拜向彤墀舞恩共春來仰化工驍騎校伊崑年六十九鞍轡參驍騎樽罍被郅隆堯階羣捧日舜殿正歌風盛典春之首殊恩壽與同蓂邊花欲笑梅際雪初融叨有嘉魚讌慚無汗馬功惟應隨拜舞嶽頌效呼嵩驍騎校李鐸年六十九於赫聖世景福懋臻河洛啟瑞衍億萬春既多受祉亦備純嘏奎畫顏堂斂錫其五念兹臣工以叙以遷以爾在列亦既有年或備左右或職奔走雲漢為章菁莪為秀爾耆而艾爾壽而康國有慶典於爾有常皤皤耆老陳詩既醉赳赳武夫咸進于位虎賁御士以秩則㣲蓼蕭豐草迎陽則晞奏鼓振鷺吹笙鳴鹿潄醴含和無疆綏福驍騎校色克圖年六十九獻夀恭承元㑹肆筵仰洽春正莞蒲玉階分列沆瀣金罍共傾已欣二算優復竚待三雍禮行杖首白鳩來集瑞符上協昇平驍騎校王士通年六十九旦復旦兮歌喜起饗禮深衣虞尚齒洪惟我皇擴珍符於萬斯年洽化理龍飛五甲始布和青陽左个開綏履乾清錫酌敷瓊漿二十一萬壽可紀文自英韶武蘭㽔小大從之光郁嶷稽古酺宴孰與倫三千姓名在惇史㣲及一介試以朋與歌既醉祝蕃祉蕃祉維何天顧諟孫復孫兮麟之趾驍騎校常興年六十八泰爻道下濟禮運天上施引年合四代蔚彼成周時君臣敢云報戩榖䖍致辭㣲臣際聖朝夙效犬馬私春筵開鴻宇曉日揚鸞旗大小得竭誠合晉萬夀卮皤顏近七十蘭錡森追隨願言歌小雅敬陳天保詩驍騎校五布年六十八糺縵卿雲啟絪緼淑氣催龍麟華旭曙鶴髮禮筵開芝自三英秀桃應萬嵗栽養仍符夏序福更徧春臺瑞紀長生籙榮分燕喜杯引年逢曠典控騎愧庸材愷樂耆英集鴻慈造化該稱觴隨綺角獻頌共鄒枚玉佩鵷行肅金璫虎旅陪御爐馥薝葡宫漏永蓬萊葵向殷千叟嵩呼徹九垓殿前齊飽徳錫慶自天來驍騎校常英年六十八共球來同下國干羽舞于兩階虎旅錦袍久􅍥龍樓夀斚齊排禮洽壬林既備樂奏簫韶永諧聖治登咸三五栢栗巢燧羲媧驍騎驍董觀成年六十八綺席傳餐出大庖露濡玉醴薦嘉肴班分三夀東西列墀擁千官上下交憲老未須誇漢詔引年那更數周膠昇平共樂需雲宴祥叶飛龍九五爻驍騎校薩哈布年六十八熙朝鴻慶洽筵啟及春融醴泛瑶觥碧雲霏寶篆紅恩光延景鑠惠澤錫龎洪盤菜先人日廷韶協景風榮曽隨玉塞健喜習琱弓嘉㑹今叨預歡騰應華嵩驍騎校恩㤗年六十八萬方和豫歡皇情矞雲雕露垂太清合萬世夀為聖夀南山未足齊崚嶒青春初開紫殿旭燕示慈惠千叟并㣲班虎旅綴七校荷寵亦預羣籛彭往時天馬籋西徼皇威一震欃槍平臣如小草朂逺志得氣亦足資敷榮我皇盛業邁振古天祐諸福無不承乘乾健行五十載禔福煥若朝陽升玉池昨嵗報麟趾繞膝五世千祥凝太和醖釀元氣厚歌舞前後康衢盈駑駘歡躍赤墀下猶能矯首當風鳴驍騎校李雯年六十八帝績鴻規逺延洪慶典長瑞圖膺壽富福範用平康佩戛千官肅韶鳴七徳揚晴霄瞻就近五色日當陽驍騎校常住年六十八嵗韶協吉景光舒鶴髮皤皤繞玉除曼夀綏來疇福備慶暉拱處瑞雯臚化覃六幕醇風洽典秩初筵湛露湑祝奉豳觥環黼扆榮依蓂砌列簮𥚑雝喈藹似棲梧鳯游泳歡同在藻魚共上春臺瞻愷樂熙熙民物邁華胥驍騎校馮廷寶年六十八詄蕩開閶闔春韶麗景呈泰階輝藻黼需宴啟蓬瀛慶㑹登鳩杖淳流渥兕觥近光容小草敷砌預叨榮驍騎校沙喀年六十七叨從袀服侍彤墀四十年慚髮已絲臣食糧已四十年今日耆筵䝉賜酺瑞雲同捧最髙枝一健行貞觀與天同燾物均邀長養功萬户千門新嵗月宴歸華髮受春風二驍騎校佛住年六十七預宴榮環衛承恩慶耉鮐朝陽迎鳯闕和氣上春臺昔憶雕弓拓今欣玉盞陪下臣真慶幸仙樂許聞來驍騎校何山年六十七福夀星占南極延洪祚等東皇時隣人日榖日老集上庠下庠加額欣逢曠典闗心舊效戎行敬從百職事後拜晉萬年之觴驍騎校韓保住年六十七一人綏繁祺敷天暢涵育小臣效馳驅早幸恩光沐羽蓋揚葳㽔属車隨肅穆大漠齊呼鷹深林從即鹿鮐質鬢已絲還顏普錫福登筵飫飲醇歡效華封祝欽定千叟宴詩巻十七
