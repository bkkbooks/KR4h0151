body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年卷一預宴十八人詩六十三首郡王品級多羅貝勒允祁年七十四紹繩家法洽重熙三世重逢介夀祺例溯堯衢開巨典綸頒禹服沛鴻釐曾元慶裕麟之定瓜瓞祥綿鳳在岐五代一堂徵福備本支百世荷恩推展親惇敘需雲渥錫類乾清湛露滋欣見紀年符大衍繼隆嘉宴應昌期外宣牧伯趨良會羣集衣冠飭盛儀扶杖覲光瞻黼扆航瀛觀禮仰紳綦朱霞琥珀擎杯燦紫綺蒲桃簇錦披派育潢源沾慶澤葉分若彩附仙枝肆筵設席來金戺授斚承筐上玉墀寶牒書名慙矍鑠溫綸晉爵愧纓緌聨吟乞句偕賡載入座隨班領艾耆星見南弧人瑞靄地連北極帝恩施天章糾縵依先韻愷澤覃敷賜首卮歌咏敢將行葦續輸誠長此祝繁禧和碩裕親王廣祿年八十我皇御宇五十載恩覃億兆孚無疆木德乘春莢舒六宸居左個開青陽是日和風吹玉琯韶鈞大樂鳴鏗鏘三千叟上聖人夀聞歌湛露稱霞觴臣拜稽首蹈且舞天顔有喜瞻龍光曦彩騰輝分若木仙源衍派垂銀潢華茵俯伏仰黼座扇影開合依爐香金漿玉醴帝手賜一巵跪捧紅雲傍載承恩惇敘殿乾清憶昨華筵張祖宗功德地積厚子孫福澤天同長本支到今十一世奉福奉夀呈嘉祥嘉祥叟宴昔親覯八十再見身逾強四字額書欽睿藻七言句錫承天章歡欣鼓舞更矍鑠卻疑兩鬢難為霜天佑聖夀夀無量作君作師民樂康祝天皇萬八千嵗詎祗頊嚳羲農黃秋原肄武御弧矢幾餘掞藻騰星芒神威聖學古無比同符天亶如仁皇天作髙山不敢康磅礴元氣迥洪荒國祥家慶徵悠久福積長白流三江散秩大臣𢎞晸年八十乾符鴻慶衍久照麗當陽化宇登熙皥羣雍紀樂康錫疇陳洛瑞綿瓞叶姬祥行葦筵曽肆承筐幣更將引年聫寶序荷寵逮仙潢共仰重華紀恭逢千叟觴憶從嬰罪戾敢復冀恩光曠典加湔滌殊榮被服章靦顔無改率負德切慚惶豈謂施重沐真非意所望保全兼始末沾被更汪洋尚齒先鴛侣聫賡與柏梁便蕃占接畫介祝詠躋堂法醖陳中禁珍餐出上方拜承康爵授申錫大齡長旬八籖開帙魁三斗戴匡恆沙延算逺曼夀頌無疆大學士公阿桂年六十九健行綿景祚久道洽重熙五世家餘慶三多福有基清寧遊化宇仁夀驗春祺海甸多遐耉朝端半宿耆仰惟皇建極普與世延禧尚齒敷嘉惠臚歡舉盛儀引年遵舊式繩武繼隆規神契風雲合天膏草木滋冠裳聫鶴髮歌舞拜龍墀平格慚君奭重華遇帝媯遂登千叟列共祝萬年釐念昔承先蔭蒙恩際聖時丹臺注名籍粉署預追隨樞部經三擢天官計再司豸衣身早被鳩律手親持旋命除犀綬仍叨直鳳池金曹留舊署薇閣副參知軍佐殊多忝卿班愧莫禆從征方戍校帶職尚工倕仰仗天弧指平劖雪嶺隳睿謨遵北闕絶幕定西陲勃律看撈玉崑崙問織皮遙臨東印度徑縳大昆彌蒲海重平亂筠沖再濟師尋蹤追狡兔駢翼戮妖鴟赤羽驚回紇黃圖括谷蠡兩經臨月螖皆得從雲麾宣力曽無幾承恩竟不訾八門分將帥七萃統龍酈禁旅方叨入溫綸更屢施月卿邀重寄水部晉崇資國政容參畫戎機荷倚毗聖謨陳玉案皇路控金羈保氏資調護容臺辨等差殊知皆特達旅進愧委蛇况乃遷喬木居然借一枝朝簮升甲族宿衛列辰旗蔥嶺梟音噪花門螳臂支六軍事征討一劒效驅馳圍合魚麗密城留獸角危自知謀太拙幸籍算無遺屯戍宜禾嶺封疆都護治勤劬圖報稱感激棄瑕疵應召瞻雲日操鈐總虎貔駕言辭赤坂重得侍黃帷玉壘傳烽燧蠶叢阻險巇揚旌摩井絡分道指坤維棡鼓行軍久金鐃奏凱遲才疏賴指授識淺昧機宜倉卒憂深譴矜全戴聖慈戟轅建旌節玉帳領熊羆神武頻驅策姦凶乃縶縻幸將前過補敢曰首功奇最是恩連沛都非意所期凱旋歌杕杜親勞駐華芝像入凌煙畫名登太學碑舊資全引復新秩遞遷移九命膺勳爵三台拜制詞赬黃輝帶綬靺鞨映冠緌彩緌雙環暈華衣四禊披章身真耀艷顧影自驚欵更荷陶鈞力偏榮蒲栁姿五雲暉逈照六秩寵逾涯珍篚頒駢坒璇題仰陸離聫奎騰藻采朝斗頌恩私從此逢春草長為向日葵綸扉忝承旨玉署掌論思藜閣書兼領蘭臺祕得窺五刑明出入九品敘崇卑常念榮逾分深虞力漸衰慎惟懷敬凛勤每戒恬嬉馬齒雖加長龍鍾幸免嗤在公思奉職退食尚忘疲但覺恩如海寧知鬢有絲良由熙化日得以到龎眉屬有三軍事言耕四牡詩初平貝州盜于役大河湄恰喜星軺返剛逢葭管吹相隨趨黼座猶及奉瑤巵暖律開新序韶春上早曦萬年松蔚茂六葉莢葳蕤綵幄分行矗繒峰夾戺搘彤階敷繡簟紫殿敞雲楣陪列多彭祖臨軒拱虙羲相看皆鶴侣有序似鴻逵位自黃扉起年從綘縣推許如明悉獵併有下句驪樂曲陳南雅殽蒸具鼎鼒佛花茶泛盞仙露酒盈瓻錦假如霞積笻條刻玉為捧珍光溢袖叩賜感淪肌此會逢之罕諸臣見者誰熙臺遊浩蕩福海被期頤大衍貞符集先春衆志怡歡心添淑景喜氣度柔颸申錫由天佑規模自祖貽德原超古昔典復備今兹竊喜微臣幸親瞻睿藻摛近光依日月贊化謝臯夔惟有呼嵩願同聲祝萬斯大學士嵇璜年七十五聖皇錫福斟衡樞九宇在宥純禧孚承庥繩武篤安老華筵重啓榮頒酺旃蒙紀嵗孟陬月初蓂六葉彤墀敷春臺鬯煦絢暾景青陽茂對欣昭蘇黼座曈曨帝暉照閶闔詄蕩開蓬壺協風噓籥揚雉扇瑞煙梟篆縈猊爐碧海紀籌晉昊籙鈞天諧奏鏗仙竽湛露凝瀼慶叶雅矞雲蒸采祥占需展親設醴首黃祚天家序樂酣騰觚班登槐棘暨蒲榖豐排綺席聫氍毹羽儀雍雍集鵷鷺壯猷肅肅兼熊貙逺邇疆吏恪同覲鶴髮蹌躋瞻金鋪加惠百年接清問快覩三夀盈康衢慶頤黌序奬齒爵跋踰嶺嶠來江湖瀛壖東裔綷冠帶梯航銜悃共球輸詔進耆年與嘉宴海邦赤帟王會圖近光咫尺依夀宇穆容醰粹天怡愈熙熙景樂臻耉耋衎衎齡各增齱齵優加頤養復手賜醇流沆瀣觥周㪺敘平三階正七曜轅謳壤曲交嬉娛絳人僂指甲子朔南極驤首丁丙隅皓穹靈貺衍瓜瓞雲來奕葉懸祺弧堂新五福萃五代天文掞藻輝洪櫨大哉膺符五十載廣矣闢疆二萬途神武張弛捷機括民庸呼吸勤郊雩宸章佇啓五集富文閣廣插四庫俱登三綏萬民氣樂屢賜九土蠲丁租四詣陪京覲光烈六巡南國膏會吳河淮砥績海亹奠周詳指畫恢禹謨咸速恆久妙天運時哉心法接泗洙即今綸詔暢溥惠引年延賞周寰區告祀嶽瀆舉殷薦廣賚銀幣兼繒繻百僚晉秩逮襟佩五鳳銜誥敷覃訏辟雍海流道德滙創建圜水興崇模躬親講諭文思煥橋門觀聼羅英儒聖敬密闡緝熙祕帝健真與天行符古稀法古豈泥古陶周育夏超唐虞萬幾屢省獨榮鏡太和遊泳羣煦嘔純佑至諴格旭卉允釐疇采勞昕晡民恬物阜會保極萬方齊應嵩喬呼臣沐鴻慈世燾育暄潤小草生根跗早登螭頭槖筆侍頻扈豹尾褒衣趨元宵澄海怯強對當時才臣汗浹膚元宵聫句聫句御製煮石磨訶似句張照不能對又澄海樓御製似樂韶觀止句梁詩正亦不能對俱以次日補賡仙毫揮灑不經意頃刻照耀堆驪珠作記神鎗中穴虎鎗記御製虎神刻於鎗桿御甲捷矢籋雲駒乾隆八年甲胄巡幸盛京閲武萬衆上御黃金馬射一發中之咸呼嵗萬尼山祇摩端木楷臺麓恍見文殊趺曽膺重命事楗築宣防之術慚顓愚六官長二備洊陟黃扉丹籞恩遇殊得輿碩果賚藻律有得御製詩賜臣輿碩果之句璇題世美光蓬廬筆韋恩賜美匾御平世額生成感荷髙厚渥子弟更疊青紫紆瀛洲載登叨領袖學識謭陋才疏迂早朝宣聽朝漏入禁門䇿騎容徐驅大裘珍毳安且燠服而拜賜針鵜濡恭逢茂典普酬酢金巵瓊斚融醍醐梅羮釀淑隆鼎飬萐莆獻秀滋仙厨馨醲竊喜斗滿酌矍鑠更許笻能扶大韶蹡舞夔拊石那居樂豈魚依蒲堯樽舜榼霑既醉軒鼚拜手陳歌歈循環周甲宴再舉中天元會古所無蕃祺錫羡萬萬祀寶甕長挹春膏腴大學士蔡新年七十九聖德敦仁夀乾符六合同自天開景鑠法祖紹延洪海屋千籌集春臺一氣融斂時敷錫備引養洽皇衷一五代昭天貺三元啓帝昌垓埏頒慶惠嶽瀆報馨香仁厚麟振羡雲來燕翼長紀年今大衍純嘏肇無疆二嵗華初獻麗韶序靄彤墀瑞早開人日和應燭聖時階蓂符六出厨萐孴三芝帝座恩光煦青陽德溥施三虞廷賡喜起泰象叶交孚設席光依斗傳觥樂逮蒲頤齡榮鞠􅎽愷燕飫醍醐遍德酬天保堯尊廣賜酺四疆吏多耆碩恩宣入覲齊建牙金舄繹尚齒玉階躋松釀香盈斚葭吹暖布緹春風欣晝接天語及蒸黎五海國耆年選來沾帝澤醲龍金溫侑勺鳩玉健扶笻醇古陳箕範喁于祝華封梯航觀盛典率舞會時雍六稽古三雍重臨觀久道成敬原昭聖學健更法天行璧水淵源濬圜橋製度精承恩司教胄觀聽率諸生七樗材憐矍鑠家世荷陶鈞丹籞榮舒轡黃扉愧贊綸承華恭輔導奕葉總端淳和鼎甘宜養珍裘氣盎春八自返漳江棹還朝拜命嘉雲章需宴樂天藻賁光華星漏遲趨陛簮纓寵逮家鴻慈垂世世恩重獨頻加九綺宴躬逢盛當陽燭帝暉鴻逵聫衎衎鳳扆仰巍巍迥邁尋常典咸親咫尺威萬年綏萬福宸極拱璿璣十大學士伯伍彌泰年七十五元會千齡合洪圖大衍陳迪光家法紹數典綺筵因祐篤重華協禧延保佑申八方風雨應九服化裁均玉燭三霄麗瑤枝五葉新雲仍綿翼翼角趾育振振道體璣衡運神參造化甄一堂顔五福百祿集先春叶氣回杓斗韶暉布木津奮生年在乙長飬月維寅菜甲人先七弧懸丙見辰階蓂榮六莢琯籥報初旬詔沛繁釐溥風興七教淳嘉徵敷率土和氣格蒼旻恩渥蕭零露籌添嵗紀椿經綸開往迹仁夀逮羣倫爐篆歊芬郁韶音奏翕純五雲環帝座千叟接華裀韻法堯章煥賡聫漢殿掄序賢尊老老授几首親親手賜承顔近鳩扶荷寵鈞諏詢宣牧伯引翼到齊民壤擊來田叟星航自海濵北辰昭北闕南極耀南閩釃旨加三爵熬炮間八珍拜揚爭腹鼓醉飽各肌淪際會洵千載遭逄慶小臣生成培屢世覆育及兹晨昔藉微勞蔭恭惟舊秩循六旬縻廪糈五等忝朝紳禁近遷班數封圻出鎮頻經年青海月萬里玉關塵奉使慚班耿宣勤仰召郇詎知還自塞旋復召于秦揚厯曽無補涓埃未克伸芻蕘添馬齒雨露長樗身敢望香山老將疑綘縣人據鞍非矍鑠避席欲逡巡東閣方參政黃扉許掌綸吹噓回朽質陶鑄托鴻鈞被服珍裘焕褒崇寶諭諄時庸思夙夜日贊勉忱恂願逐鵷行列欣陪鶴侣臻帡幪先杖國敷錫下楓宸洽禮成歡忭稱詩愧雅馴羲文懸有象禹績被無垠巍煥崇功並雍容巨典遵衣冠咸濟濟酬酢會彬彬備位虛池鳳銘勳謝閣麟願同黎叟輩億載祝皇仁協辦大學士尚書梁國治年六十二郅治臻纍洽八紘躋夀康天皇秉元化丕休迪前光御極五十年維乙已春王正月朔六日髙宴乾清張皤皤三千叟歡宴列班行錫慶遍寰悔福祜敷無疆一無疆駿命隆古稀作元后行健德日新化成道彌久皇輿二萬里思服覃九有惟天命溥將惟皇克誕受豈繄瑞應崇良以仁恩厚薄海中外臣呼嵩頌萬夀二夀宇闓青陽六合春風遍敬誠福所綏雲仍慶蕃衍金支五葉隆昌後皇天燕下有期頤民曽元一堂臶如此二百家史册所未見惟天眷顧隆休徵符曼羡三休徵覘協應維海亦維河海塘石鱗次黃河順洪波中區樂清宴六宇還太和四隩禹貢宅萬福宣房歌乾貺復坤珍穰穰來何多茀祿純嘏常可以矢卷阿四卷阿頌豈弟翽羽鳴鳳皇乃始建辟雍圜水流湯湯規模一以肇敷教還虞唐熱河建廟學黌序開新疆御論懸日月三老義諄詳金聲玉振之文治啓光昌五光昌際嘉運大啓圖書府三萬六千册縹緗列四庫全書祕閣儲聖作開羣覩有詔頒江浙一一正魚魯詩文集大成懸象天日午維聖實維神允文斯允武六文武維聖神述作光前制釀化罔不遵蠲賑萬萬計邉陲户牖間臂指身心勢數典舉耆筵鈞樂張天際何以聫中外侯甸要荒衛何以彰嘉貺殽醴承筐幣七承筐將燕衎稠疊拜恩榮千載遇嘉會神人聼和平老老而長長孝弟油然生微臣侍禁近燕愷從耆英有如春風至萬彚暢畢呈矢詩載稽首惟以揚天聲八體蟬聫吏部尚書劉墉年六十六欽惟至人心上與昊穹屬會乾符坤珍握珠囊璇籙兹五十年春萬彚暢春育彤庭開廣宴瑞靄耀晨旭重熙纍洽時繩武忠彌朂誠孚帝錫齡化被民同俗梯航萬國來暨訖天所覆東方龍德蒼六莢蓂舒緑曰有叟三千迤邐大千續鞠􅎽阿閣傍歡趨更悚伏葵忱默傾向典誥稽前牘昌運邁陶姚淳風到軒頊理如網在綱粲若經緣督陋騫源泝崑嗤馬檄傳蜀幕外邑宜禾笮裏畬輸粟文揆與武奮元氣叶溫肅於論樂辟雍追琢詠金玉大文乃彌耀秩秩復郁郁四庫就條貫多士興棫朴是用和悅凝時若徵調燭我汜布濩之人官而物曲仙潢衍派長喜見祥麟育洪惟建極崇協疇偹多福嘉瑞應圖牒洊臻數更僕猶宵衣旰食廑獲乂從欲圓頂方趾民熙熙聫萬族矧伊在朝班光近承曦燭微臣託元造膏澤幸久沐自臣父蒙恩矜全仍簡録家聲訓承繼夙夜慙庸碌華筵綴諸耆湛露浥醇沃兕觥共稱夀籌億添海屋匪俟蟠桃實不藉華芝斸帝載契宸衷純佑久彌篤至德樂諴民九域安宅隩隴畝棲麥禾饔飱飫粟肉請寫堯民圖含哺共鼓腹幸哉帝所遊鈞樂聽金竹身心並踴躍歡欣瞻有穆敷錫頌皇仁賡詩歌夀榖禮部尚書德保年六十七夀愷當陽日祥徴乙已年詔開千叟宴典茂百王編法祖重熙盛詒孫五代全古稀天縱聖大衍祚乘乾旭旦共球集耆英几杖便一人崇寶座庶老敞瓊筵臣職司邦禮朝儀備樂懸齒惟儕洛社恩許例彭籛樗質庸奚補鴻施沐最先內庭蒙豢飬南國效旬宣屢被衡文命時催督運船櫜弓陪法駕聫句染爐煙祠部慙充位皇慈感宥愆含香濃雨露承寵惕氷淵渥澤頻霑草殊榮更賜氊春風和入律臘雪瑞敷田苑栁金芽動宫梅玉蕊連虎樽欣屬目鶴髮喜隨肩禹膳調湯鼎堯羮侑舜弦鳳鳴簫嘒嘒鷺振鼓咽咽淑氣蒸豐嵗元音暢列仙鳩扶三爵後獸舞九成前愈懌宸襟洽昭回睿藻傳卿雲符帝製景曜朗奎躔文正諸儒説詩登大雅篇賡歌呈黼扆醉飽拜花甎行健欽無逸同仁仰不偏期頤延蔀屋清宴鞏山川直欲超軒頊何須羡偓佺神芝如蓋起靈液比珠圓崇秩惟殫力蕪詞莫騁妍願將葵藿志億載荷陶甄禮部尚書姚成烈年六十九郅治當元會瓊筵啓令辰引年崇典禮繩武煥恩綸詔舉千齡宴祥開萬象春衍圖龍紀集錫福鳳書申北闕施仁普南弧耀采新直同天合德共仰聖如春餘慶瓜綿瓞騰歡雅奏豳於論鐘鼓樂式序篚筐陳存問髙年遍周咨蔀屋均禮優加二膳粻異盡兼珍湛露歌詩洽需雲取象真嘉羞供絡繹旨酒洽清醇鎬飲周耆艾虞賡接佩紳扶藜原異數傾藿况微臣郎署趨承久監司職守遵建牙叨重畀為翰荷來旬往復三吳地馳驅五嶺身近光依闕下移蒞復江濵才短愆尤積恩深訓誨頻春官邀特擢秩祀念惟寅不以衰頽廢還偕拜舞倫大酺霑玉斚廣樂合金錞真率香山社耆英洛下賔嵩呼齊獻夀超軼八千椿刑部尚書喀寧阿年六十七帝齡錫羡皇範登閎禔凝太乙祚兆長庚上儀敬秩祖制是程歡臚紳佩瑞洽埏紘達尊三備紀數千嬴璚衡啓律金殿稱觥筐篚式序磬莞和鳴需雲宴樂晉日文明劭香山會逾洛社盟臣叨世秩職領秋卿咸中衍慶式敬輸誠欣隨虎拜虔效夔賡工部尚書金簡年六十五福海綸言沛貞符泰運增健行乾不息睿照旭方升衍牒孫詒榖開筵夀作朋序聫珠樹鶴地敞紫霄鵬綺甲巡初遍龎眉澤共凝玉巵頒黼座瑤席列文繪盛典方同慶微材愧弗勝全家溫煦厚早嵗湛恩承內府班資重司曹劇要稱近光滋翼翼撫已切兢兢乃荷隆施渥兼令衆務膺虔恭趨禁瑣瞻望竦觚稜梨棗蠅頭字縑緗鳳尾綾牙籖排四庫貝葉繹三乘膳宰調珍饌茶星映玉繩樓臺仙掌露金碧佛龕燈匠氏勤呈技㡆人勉奏能物豐民力裕帑沛頌聲興寶籙無疆算璿宫最上層軒墀占瑞集輪奐鞏基慿凡此經營備咸蒙指授曽風雲邀拔擢台斗洊鶱騰宴許扶鳩拜逵先䇿馬登寵綏駢異數熙洽紀庥徵左都御史周煌年七十二古稀天子福延洪錫羡敷祺萬國同五十年來書不盡功巍文焕與天崇一耆宴仁皇昔顯庸覲光今見慶光重都來玉陛需雲洽更比金莖湛露濃三五數周回天地雙升平嘉會洽淳龎欣聞元日騰恩詔法鼓華鐘鳳闕摐三春滿經旬淑景移仙蓂六葉出葳蕤七人八榖皆佳兆先見南弧瑞彩垂四路指東華近紫微乾清詄蕩啓端闈風和日暖宜人老人意先天天不違五排當先期向玉除前楹黼座敞宸居三十賞席鋪雲麗八百酺筵拱翼舒六殿前韶樂庭清樂樂奏隆平協氣孚法曲更看人兩部舞成百夀衆仙圖七作朋三夀領班齊近接璇源帝錫禔十一世瞻奉福夀堂開五代昨親題八番番黃髮國榮懷元首股肱惟汝諧四相合成三百嵗時平風雨正三階九卿月郎星傍上台揆文奮武世多材座中更有懸車老魏闕江湖入覲來十海國耆儒拜寵頻直從弟子二成均百年人瑞還餘五生是康熙十載人十一袀衣逐隊子襟羣恆賈恆工業在勤最喜老農歌大有一生溫飽事耕耘十二北漠西瀛蜀徼畨車書尉候一乾坤直將王會圖中景寫入耆英畫裏存十三地近榑桑氣不寒朝正使到附鵷鸞定知來日颷車度有鶴銜籌海上看十四千人三倍足仙班别有銀牌荷特頒始信八方開夀宇佺喬安羡遍人寰十五九拜嵩呼玉殿前兕觥稱夀勝豳筵統將草一萬餘嵗合上君王晉大年十六九旬耄耋推上夀一品班聫冠百寮齒爵並邀天寵渥醍醐親賜酌瓊瑶十七宴衎雲天叶吉爻既多且旨大官庖羅鳩袒割徒夸語三老由來義本淆十八玉振金聲帝掞毫柏梁古體各分曹不妨詰窘如方朔賜與天章聖且豪十九新題舊韻語涵和堯戒傳心舜作歌憶到垂髫親侍日一家先後聖同科二十人到歡欣力倍加康疆筋力好年華恩深猶許兒孫掖天上歸來直轉家二十一宫綺黃封壓繡囊宣毫江研寶文房龍蟠養老乾隆字卅兩朱提出尚方二十二黃盤頒賞出宫城道路傳觀萬倍榮九節更看靈夀杖賜來扶向玉階行二十三太平有象物流形大吏騰章告帝廷五世同堂百九四天家綿瓞衍椒馨二十四盛典昌期莫不興草三史內見何曾辟雍敷教四方服帝籍勤農九榖登二十五西蜀庸才僻逺陬螭坳載筆幾春秋承恩記向中山使載得皇威海上遊二十六敡厯多年愧紱簮中樞地重柏臺深官階一品臣何有都是君師教養心二十七承華叨侍禁東南老愧觀書柱下聃一自前年蒙賜夀餘生總向聖恩涵二十八十句休假逺堂廉詔許參名上緑籖一卧城南天尺五露瀼蒲栁尚能霑二十九陳情欲去戀朝衫犬馬心殷矢結銜惟願無疆開夀宴重來闕下聽韶咸三十韻上下平原任左都御史張若溎年八十三維皇錫五福至治符蒼穹沾濡皆德澤醇化彌龎鴻盛世耆耋多泳遊和氣中芳春迎淑靄麗日欣昭融彤庭幸預宴喜起揚臣工臣家世受恩寵光疊被蒙蘭臺會執憲夙夜慎微躬愧以樗櫟材忝居繡獬崇投老仰賜間擊壤歌年豐昨春迓翠輅南國駢呼嵩扶杖覲天顔溫諭宣仁風八十嵗又三重來聼笙鏞聖夀億萬齡拜舞同華封都統王進泰年八十一聖德祥符夀宇春祺詔錫華筵叨列期門肅仗許依禁掖鳴鞭授鉞夙垂重眷賜氊兹預羣仙八秩臣年開一承恩昨錫長年臣于去年六月馬齒登八十蒙飬之恩寵錫從此蒲栁逢春皆邀雨露長賜都統德保年七十一條風啓韶序蓂莢迎朝曦彤庭介景福夀宇符重熙耆年預嘉會玉露澄瑶巵曲􅎽覲天顔湛恩荷鴻施春風揚青旗翠羽輝金支值兹盛筵開濟濟依光儀憶昨嵗中冬甫屇七秩期臣于去年十一月馬齒七十蒙并諸恩賜御書匾額珍異天筆賁光華尚方羅寵綏重疊何以報萬夀歌蕃釐都統五岱年六十二星雲糾縵重華旦聖夀作人倬天漢嶽珍川瑞慶駢羅懋典前徽益巍焕微臣侍直依乾清年年禁籞風光榮出師靺鞈稟聖武巖碉沙塞曽經行靈臺偃伯歸凱奏洊參戎纛蒙殊旌玉關賜代入朝近䇿騎甘涼小醜蠢據鞍每慕伏波風老馬猶堪服韅靷臣于上年由新疆換班回京路經甘肅請𠞰逆回平定後蒙恩加賞世職奕世恩延佩黻華慶霄日捧傾葵悃瓊筵錫福三殿開耆英濟濟聫尊罍一家中外躋仁夀榮侍南山萬嵗杯
