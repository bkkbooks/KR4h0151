body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻一預宴十八人詩六十三首郡王品級多羅貝勒允祁年七十四紹繩家法洽重熙三世重逢介夀祺例溯堯衢開鉅典綸頒禹服沛鴻釐曾元慶裕麟之定𤓰瓞祥綿鳳在岐五代一堂徵福備本支百世荷恩推展親惇叙需雲渥錫類乾清湛露滋欣見紀年符大衍繼隆嘉宴應昌期外宣牧伯趨良㑹羣集衣冠飭盛儀扶杖覲光瞻黼扆航瀛觀禮仰紳綦朱霞琥珀擎杯燦紫綺蒲桃簇錦披派毓潢源沾慶澤葉分若彩附仙枝肆筵設席来金戺授斚承筐上玉墀寳牒書名慙矍鑠温綸晉爵愧纓緌聨吟乞句偕賡載入座隨班領艾耆星見南弧人瑞靄地連北極帝恩施天章糺縵依先韻愷澤覃敷賜首卮歌咏敢將行葦續輸誠長此祝繁禧和碩裕親王廣祿年八十我皇御宇五十載恩覃億兆孚無疆木徳乘春莢舒六宸居左个開青陽是日和風吹玉琯韶鈞大樂鳴鏗鏘三千叟上聖人夀聞歌湛露稱霞觴臣拜稽首蹈且舞天顔有喜瞻龍光曦彩騰輝分若木仙源衍派垂銀潢華茵俛伏仰黼座扇影開合依爐香金漿玉醴帝手賜一巵跪捧紅雲傍載承恩惇叙殿乾清憶昨華筵張祖宗功徳地積厚子孫福澤天同長本支到今十一世奉福奉夀呈嘉祥嘉祥叟讌昔親覯八十再見身逾强四字額書欽睿藻七言句錫承天章歡欣鼓舞更矍鑠卻疑兩鬢難為霜天佑聖夀夀無量作君作師民樂康祝天皇萬八千嵗詎祗頊嚳羲農黄秋原肄武御弧矢㡬餘掞藻騰星芒神威聖學古無比同符天亶如仁皇天作髙山不敢康磅礴元氣迥洪荒國祥家慶徵悠久福積長白流三江散秩大臣𢎞晸年八十乾符鴻慶衍久照麗當陽化㝢登熙皥羣雍紀樂康錫疇陳洛瑞緜瓞叶姬祥行葦筵曽肆承筐幣更將引年聫寳序荷寵逮仙潢共仰重華紀恭逢千叟觴憶従嬰罪戾敢復冀恩光曠典加湔滌殊榮被服章靦顔無改率負徳切慚惶豈謂施重沐真非意所望保全兼始末沾被更汪洋尚齒先鴛侣聫賡與柏梁便蕃占接畫介祝詠躋堂法醖陳中禁珍餐出上方拜承康爵授申錫大齡長旬八籖開袠魁三斗戴匡恒沙延算逺曼夀頌無疆大學士公阿桂年六十九健行緜景祚久道洽重熙五世家餘慶三多福有基清寧遊化㝢仁夀騐春祺海甸多遐耉朝端半宿耆仰惟皇建極普與世延禧尚齒敷嘉恵臚歡舉盛儀引年遵舊式繩武繼隆規神契風雲合天膏草木滋冠裳聫鶴髪歌舞拜龍墀平格慚君奭重華遇帝媯遂登千叟列共祝萬年釐念昔承先䕃蒙恩際聖時丹臺注名籍粉署預追隨樞部經三擢天官計再司豸衣身早被鳩律手親持旋命除犀綬仍叨直鳳池金曹留舊署薇閣副㕘知軍佐殊多忝卿班愧莫禆従征方戍校帯職尚工倕仰仗天弧指平劖雪嶺隳睿謨遵北闕絶幕定西陲勃律看撈玉崑崙問織皮遥臨東印度徑縳大昆彌蒲海重平亂筠冲再濟師尋蹤追狡兎駢翼戮妖鴟赤羽驚回紇黄圖括谷蠡兩經臨月螖皆得従雲麾宣力曽無㡬承恩竟不訾八門分將帥七萃統龍酈禁旅方叨入温綸更屢施月卿邀重寄水部晉崇資國政容叅畫戎機荷倚毗聖謨陳玉案皇路控金羈保氏資調䕶容臺辨等差殊知皆特達旅進愧委蛇况乃遷喬木居然借一枝朝簮升甲族宿衞列辰旗葱嶺鴞音噪花門螳臂支六軍事征討一劒效驅馳圍合魚麗宻城留獸角危自知謀太拙幸籍算無遺屯戍宜禾嶺封疆都䕶治勤劬圖報稱感激棄瑕疵應召瞻雲日操鈐總虎貔駕言辭赤坂重得侍黄帷玉壘傳烽燧蠶叢阻險巇揚旌摩井絡分道指坤維棡鼓行軍久金鐃奏凱遲才疎賴指授識淺昧機宜倉卒憂深譴矜全戴聖慈㦸轅建旌節玉帳領熊羆神武頻驅策姦凶乃縶縻幸將前過補敢曰首功奇最是恩連沛都非意所期凱旋歌杕杜親勞駐華芝像入凌烟畫名登太學碑舊資全引復新秩逓遷移九命膺勲爵三台拜制詞赬黄輝帶綬靺鞨映冠緌彩緌雙環暈華衣四禊披章身真耀艶顧影自驚欵更荷陶鈞力偏榮蒲栁姿五雲暉逈照六秩寵逾涯珍篚頒駢坒璇題仰陸離聫奎騰藻采朝斗頌恩私従此逢春草長為向日葵綸扉忝承㫖玉署掌論思藜閣書兼領蘭臺秘得窺五刑明出入九品叙崇卑常念榮逾分深虞力漸衰慎惟懐敬凛勤毎戒恬嬉馬齒雖加長龍鍾幸免嗤在公思奉職退食尚忘疲但覺恩如海寜知鬢有絲良由熙化日得以到龎眉屬有三軍事言耕四牡詩初平貝州盗于役大河湄恰喜星軺返剛逢葭管吹相隨趨黼座猶及奉瑤巵暖律開新序韶春上早曦萬年松蔚茂六葉莢葳蕤綵幄分行矗繒峰夾戺搘彤階敷繡簟紫殿敞雲楣陪列多彭祖臨軒拱虙羲相看皆鶴侣有序似鴻逵位自黄扉起年従綘縣推許如明悉獵併有下句驪樂曲陳南雅殽烝具鼎鼒佛花茶泛琖仙露酒盈瓻錦叚如霞積笻條刻玉為捧珍光溢䄂叩賜感淪肌此㑹逢之罕諸臣見者誰熙臺遊浩蕩福海被期頤大衍貞符集先春衆志怡歡心添淑景喜氣度柔颸申錫由天佑規模自祖貽徳原超古昔典復備今兹竊喜微臣幸親瞻睿藻摛近光依日月贊化謝臯䕫惟有呼嵩願同聲祝萬斯大學士嵇璜年七十五聖皇錫福斟衡樞九宇在宥純禧孚承庥繩武篤安老華筵重啟榮頒酺旃䝉紀嵗孟陬月初蓂六葉彤墀敷春臺鬯煦絢暾景青陽茂對欣昭蘇黼座曈曨帝暉照閶闔詄蕩開蓬壺協風嘘籥颺雉扇瑞烟梟篆縈猊爐碧海紀籌晉昊籙鈞天諧奏鏗仙竽湛露凝瀼慶叶雅矞雲蒸采祥占需展親設醴首黄祚天家序樂酣騰觚班登槐棘暨蒲榖豐排綺席聫氍毹羽儀雍雍集鵷鷺壮猷肅肅兼熊貙逺邇疆吏恪同覲鶴髪蹌躋瞻金鋪加恵百年接清問快覩三夀盈康衢慶頤黌序奨齒爵跋踰嶺嶠来江湖瀛壖東裔綷冠帯梯航銜悃共球輸詔進耆年與嘉宴海邦赤帟王㑹圖近光咫尺依夀㝢穆容醰粹天怡愉熈熈景樂臻耉耋衎衎齡各増齱齵優加頤養復手賜醇流沆瀣觥周㪺叙平三階正七曜轅謳壤曲交嬉娯絳人僂指甲子朔南極驤首丁丙隅顥穹靈貺衍𤓰瓞雲来奕葉懸祺弧堂新五福萃五代天文掞藻輝洪櫨大哉膺符五十載廣矣闢疆二萬途神武張弛捷機括民庸呼吸勤郊雩宸章佇啓五集富文閣廣揷四庫俱登三綏萬民氣樂屢賜九土蠲丁租四詣陪京覲光烈六巡南國膏㑹呉河淮厎績海亹奠周詳指畫恢禹謨咸速恒久妙天運時哉心法接泗洙即今綸詔暢溥恵引年延賞周寰區告祀嶽瀆舉殷薦廣賚銀幣兼繒繻百僚晉秩逮衿佩五鳳銜誥敷覃訏辟雍海流道徳滙創建圜水興崇模躬親講諭文思煥橋門觀聼羅英儒聖敬密闡緝熙秘帝健真與天行符古稀法古豈泥古陶周育夏超唐虞萬㡬屢省獨榮鏡太和游泳羣煦嘔純佑至諴格旭卉允釐疇采勞昕晡民恬物阜㑹保極萬方齊應嵩喬呼臣沐鴻慈世燾育暄潤小草生根跗早登螭頭槖筆侍頻扈豹尾襃衣趨元宵澄海怯强對當時才臣汗浹膚元宵聫句聫句御製煮石磨訶似句張照不能對又澄海樓御製似樂韶觀止句梁詩正亦不能對俱以次日補賡仙毫揮灑不經意頃刻照耀堆驪珠作記神鎗中穴虎鎗記御製虎神刻於鎗桿御甲㨗矢籋雲駒乾隆八年甲胄巡幸盛京閱武萬衆上御黄金馬射一發中之咸呼嵗萬尼山祇摩端木楷臺麓恍見文殊趺曽膺重命事楗築宣防之術慚顓愚六官長貳備洊陟黄扉丹籞恩遇殊得輿碩果賚藻律有得御製詩賜臣輿碩果之句璇題世美光蓬廬筆韋恩賜美匾御平世額生成感荷髙厚渥子弟更疊青紫紆瀛洲載登叨領袖學識謭陋才疎迂早朝宣聽朝漏入禁門䇿騎容徐驅大裘珍毳安且燠服而拜賜箴鵜濡恭逢茂典普醻酢金巵瓊斚融醍醐梅羮釀淑隆鼎飬萐莆獻秀滋仙厨馨醲竊喜斗滿酌矍鑠更許笻能扶大韶蹡舞䕫拊石那居樂豈魚依蒲堯樽舜榼霑既醉軒鼚拜手陳歌歈循環周甲宴再舉中天元㑹古所無蕃祺錫羡萬萬禩寳罋長挹春膏腴大學士蔡新年七十九聖徳敦仁夀乾符六合同自天開景鑠法祖紹延洪海屋千籌集春臺一氣融歛時敷錫備引養洽皇衷一五代昭天貺三元啟帝昌垓埏頒慶恵嶽瀆報馨香仁厚麟振羡雲來燕翼長紀年今大衍純嘏肇無疆二嵗華初獻麗韶序靄彤墀瑞早開人日和應燭聖時階蓂符六出厨萐孴三芝帝座恩光煦青陽徳溥施三虞廷賡喜起泰象叶交孚設席光依斗傳觥樂逮蒲頤齡榮鞠􅎽愷燕飫醍醐徧徳醻天保堯尊廣賜酺四疆吏多耆碩恩宣入覲齊建牙金舄繹尚齒玉階躋松釀香盈斚葭吹煖布緹春風欣晝接天語及烝黎五海國耆年選来沾帝澤醲龍金温侑勺鳩玉健扶笻醇古陳箕範喁于祝華封梯航觀盛典率舞㑹時雍六稽古三雍重臨觀久道成敬原昭聖學健更法天行璧水淵源濬圜橋製度精承恩司教胄觀聴率諸生七樗材憐矍鑠家世荷陶鈞丹籞榮舒轡黄扉愧賛綸承華恭輔導奕葉總端淳和鼎甘宜養珍裘氣盎春八自返漳江櫂還朝拜命嘉雲章需宴樂天藻賁光華星漏遲趨陛簮纓寵逮家鴻慈垂世世恩重獨頻加九綺宴躬逢盛當陽燭帝暉鴻逵聫衎衎鳳扆仰巍巍迥邁尋常典咸親咫尺威萬年綏萬福宸極拱璿璣十大學士伯伍彌泰年七十五元㑹千齡合洪圖大衍陳迪光家法紹數典綺筵因祐篤重華協禧延保佑申八方風雨應九服化裁均玉燭三霄麗瑤枝五葉新雲仍緜翼翼角趾毓振振道體璣衡運神叅造化甄一堂顔五福百祿集先春叶氣迴杓斗韶暉布木津奮生年在乙長飬月維寅菜甲人先七弧懸丙見辰階蓂榮六莢琯籥報初旬詔沛繁釐溥風興七教淳嘉徵敷率土和氣格蒼旻恩渥蕭零露籌添嵗紀椿經綸開往蹟仁夀逮羣倫爐篆歊芬郁韶音奏翕純五雲環帝座千叟接華裀韻法堯章煥賡聫漢殿掄序賢尊老老授几首親親手賜承顔近鳩扶荷寵鈞諏詢宣牧伯引翼到齊民壤撃来田叟星航自海濵北辰昭北闕南極耀南閩釃㫖加三爵熬炮間八珍拜颺争腹鼔醉飽各肌淪際㑹洵千載遭逄慶小臣生成培屢世覆育及兹晨昔藉微勞䕃恭惟舊秩循六旬縻廪糈五等忝朝紳禁近遷班數封圻出鎮頻經年青海月萬里玉闗塵奉使慚班耿宣勤仰召郇詎知還自塞旋復召于秦敭厯曽無補涓埃未克伸芻蕘添馬齒雨露長樗身敢望香山老將疑綘縣人據鞍非矍鑠避席欲逡巡東閣方叅政黄扉許掌綸吹噓迴朽質陶鑄托鴻鈞被服珍裘焕褒崇寳諭諄時庸思夙夜日賛勉忱恂願逐鵷行列欣陪鶴侣臻帡幪先杖國敷錫下楓宸洽禮成歡忭稱詩愧雅馴羲文懸有象禹績被無垠巍煥崇功並雍容鉅典遵衣冠咸濟濟酬酢㑹彬彬備位虚池鳳銘勲謝閣麟願同黎叟軰億載祝皇仁協辦大學士尚書梁國治年六十二郅治臻累洽八紘躋夀康天皇秉元化丕休迪前光御極五十年維乙已春王正月朔六日髙宴乾清張皤皤三千叟歡讌列班行錫慶遍寰悔福祜敷無疆一無疆駿命隆古稀作元后行健徳日新化成道彌久皇輿二萬里思服覃九有惟天命溥將惟皇克誕受豈繄瑞應崇良以仁恩厚薄海中外臣呼嵩頌萬夀二夀㝢闓青陽六合春風徧敬誠福所綏雲仍慶蕃衍金支五葉隆昌後皇天燕下有期頤民曽元一堂臶如此二百家史冊所未見惟天眷顧隆休徵符㬅羡三休徵覘協應維海亦維河海塘石鱗次黄河順洪波中區樂清宴六宇還太和四隩禹貢宅萬福宣房歌乾貺復坤珍穰穰来何多茀祿純嘏常可以矢巻阿四巻阿頌豈弟翽羽鳴鳳皇乃始建辟雍圜水流湯湯規模一以肇敷教還虞唐熱河建廟學黌序開新疆御論懸日月三老義諄詳金聲玉振之文治啟光昌五光昌際嘉運大啟圖書府三萬六千冊縹緗列四庫全書秘閣儲聖作開羣覩有詔頒江浙一一正魚魯詩文集大成懸象天日午維聖實維神允文斯允武六文武維聖神述作光前制釀化㒺不遵蠲賑萬萬計邉陲户牖間臂指身心勢數典舉耆筵鈞樂張天際何以聫中外侯甸要荒衛何以彰嘉貺殽醴承筐幣七承筐將燕衎稠叠拜恩榮千載遇嘉會神人聼和平老老而長長孝弟油然生微臣侍禁近燕愷従耆英有如春風至萬彚暢畢呈矢詩載稽首惟以揚天聲八體蟬聫吏部尚書劉墉年六十六欽惟至人心上與昊穹屬㑹乾符坤珍握珠囊璇籙兹五十年春萬彚暢春育彤庭開廣讌瑞靄耀晨旭重熈累洽時繩武忠彌朂誠孚帝錫齡化被民同俗梯航萬國来暨訖天所覆東方龍徳蒼六莢蓂舒綠曰有叟三千迤邐大千續鞠􅎽阿閣傍歡趨更悚伏葵忱黙傾向典誥稽前牘昌運邁陶姚淳風到軒頊理如網在綱粲若經緣督陋騫源泝崑嗤馬檄傳蜀幕外邑宜禾笮裏畬輸粟文揆與武奮元氣叶温肅於論樂辟雍追琢詠金玉大文乃彌耀秩秩復郁郁四庫就條貫多士興棫樸是用和悦凝時若徵調燭我汜布濩之人官而物曲仙潢衍派長喜見祥麟育洪惟建極崇協疇偹多福嘉瑞應圖牒洊臻數更僕猶宵衣旰食廑獲乂従欲圓頂方趾民熙熙聫萬族矧伊在朝班光近承㬢燭㣲臣託元造膏澤幸久沐自臣父䝉恩矜全仍簡録家聲訓承繼夙夜慙庸碌華筵綴諸耆湛露浥醇沃兕觥共稱夀籌億添海屋匪俟蟠桃實不藉華芝斸帝載契宸衷純佑久彌䔍至徳樂諴民九域安宅隩隴畝棲麥禾饔飱飫粟肉請寫堯民圖含哺共鼓腹幸哉帝所遊鈞樂聽金竹身心並踴躍歡忻瞻有穆敷錫頌皇仁賡詩歌夀榖禮部尚書徳保年六十七夀愷當陽日祥徴乙已年詔開千叟宴典茂百王編法祖重熙盛詒孫五代全古稀天縦聖大衍祚乘乾旭旦共球集耆英几杖便一人崇寳座庶老敞瓊筵臣職司邦禮朝儀備樂懸齒惟儕洛社恩許例彭籛樗質庸奚補鴻施沐最先内庭蒙豢飬南國效旬宣屢被衡文命時催督運船櫜弓陪法駕聫句染爐烟祠部慙充位皇慈感宥愆含香濃雨露承寵惕氷淵渥澤頻霑草殊榮更賜氊春風和入律臘雪瑞敷田苑栁金芽動宫梅玉蕊連虎樽欣屬目鶴髮喜随肩禹膳調湯鼎堯羮侑舜弦鳳鳴簫嘒嘒鷺振鼓咽咽淑氣蒸豐嵗元音暢列仙鳩扶三爵後獸舞九成前愉懌宸襟洽昭回睿藻傳卿雲符帝製景曜朗奎躔文正諸儒説詩登大雅篇賡歌呈黼扆醉飽拜花甎行健欽無逸同仁仰不偏期頤延蔀屋清宴鞏山川直欲超軒頊何須羡偓佺神芝如葢起靈液比珠圓崇秩惟殫力蕪詞莫騁妍願將葵藿志億載荷陶甄禮部尚書姚成烈年六十九郅治當元㑹瓊筵啟令辰引年崇典禮繩武煥恩綸詔舉千齡宴祥開萬象春衍圖龍紀集錫福鳳書申北闕施仁普南弧耀采新直同天合徳共仰聖如春餘慶𤓰綿瓞騰歡雅奏豳於論鐘鼓樂式序篚筐陳存問髙年徧周諮蔀屋均禮優加貳膳粻異盡兼珍湛露歌詩洽需雲取象真嘉羞供絡繹㫖酒洽清醇鎬飲周耆艾虞賡接佩紳扶藜原異數傾藿况微臣郎署趨承久監司職守遵建牙叨重畀為翰荷来旬往復三呉地馳驅五嶺身近光依闕下移莅復江濵才短愆尤積恩深訓誨頻春官邀特擢秩祀念惟寅不以衰頽廢還偕拜舞倫大酺霑玉斚廣樂合金錞真率香山社耆英洛下賔嵩呼齊獻夀超軼八千椿刑部尚書喀寧阿年六十七帝齡錫羨皇範登閎禔凝太乙祚兆長庚上儀敬秩祖制是程歡臚紳佩瑞洽埏紘達尊三備紀數千嬴璚衡啟律金殿稱觥筐篚式序磬莞和鳴需雲宴樂晉日文明劭香山㑹逾洛社盟臣叨世秩職領秋卿咸中衍慶式敬輸誠忻隨虎拜䖍效䕫賡工部尚書金簡年六十五福海綸言沛貞符泰運増健行乾不息睿照旭方升衍牒孫詒榖開筵夀作朋序聫珠樹鶴地敞紫霄鵬綺甲巡初徧龎眉澤共凝玉巵頒黼座瑤席列文繪盛典方同慶微材愧弗勝全家温煦厚早嵗湛恩承内府班資重司曹劇要稱近光滋翼翼撫已切兢兢乃荷隆施渥兼令衆務膺䖍恭趨禁瑣瞻望竦觚稜梨棗蠅頭字縑緗鳳尾綾牙籖排四庫貝葉繹三乘膳宰調珍饌茶星映玉繩樓臺仙掌露金碧佛龕燈匠氏勤呈技㡛人勉奏能物豐民力裕帑沛頌聲興寳籙無疆算璿宫最上層軒墀占瑞集輪奐鞏基慿凡此經營備咸蒙指授曽風雲邀抜擢台斗洊鶱騰宴許扶鳩拜逵先䇿馬登寵綏駢異數熈洽紀庥徵左都御史周煌年七十二古稀天子福延洪錫羡敷祺萬國同五十年來書不盡功巍文焕與天崇一耆宴仁皇昔顯庸覲光今見慶光重都來玉陛需雲洽更比金莖湛露濃三五數週迴天地雙昇平嘉㑹洽淳龎欣聞元日騰恩詔法鼓華鐘鳳闕摐三春滿經旬淑景移仙蓂六葉出葳蕤七人八榖皆佳兆先見南弧瑞彩垂四路指東華近紫㣲乾清詄蕩啟端闈風和日暖宜人老人意先天天不違五排當先期向玉除前楹黼座敞宸居三十賞席鋪雲麗八百酺筵拱翼舒六殿前韶樂庭清樂樂奏隆平協氣孚法曲更看人兩部舞成百夀衆仙圖七作朋三夀領班齊近接璇源帝錫禔十一世瞻奉福夀堂開五代昨親題八番番黄髪國榮懐元首股肱惟汝諧四相合成三百嵗時平風雨正三階九卿月郎星傍上台揆文奮武世多材座中更有懸車老魏闕江湖入覲来十海國耆儒拜寵頻直従弟子貳成均百年人瑞還餘五生是康熈十載人十一袀衣逐隊子衿羣恒賈恒工業在勤最喜老農歌大有一生温飽事耕耘十二北漠西瀛蜀徼畨車書尉候一乾坤直將王㑹圖中景冩入耆英畫裏存十三地近榑桑氣不寒朝正使到附鵷鸞定知来日颷車度有鶴銜籌海上看十四千人三倍足仙班别有銀牌荷特頒始信八方開夀㝢佺喬安羡徧人寰十五九拜嵩呼玉殿前兕觥稱夀勝豳筵統將廿一萬餘嵗合上君王晉大年十六九旬耄耋推上夀一品班聫冠百寮齒爵並邀天寵渥醍醐親賜酌瓊瑶十七宴衎雲天叶吉爻既多且㫖大官庖羅鳩袒割徒夸語三老由来義本淆十八玉振金聲帝掞毫栢梁古體各分曹不妨詰窘如方朔賜與天章聖且豪十九新題舊韻語涵和堯戒傳心舜作歌憶到垂髫親侍日一家先後聖同科二十人到歡欣力倍加康疆筋力好年華恩深猶許兒孫掖天上歸来直轉家二十一宫綺黄封壓繡囊宣毫江研寳文房龍蟠養老乾隆字卅兩朱提出尚方二十二黄盤頒賞出宫城道路傳觀萬倍榮九節更看靈夀杖賜来扶向玉階行二十三太平有象物流形大吏騰章告帝廷五世同堂百九四天家綿瓞衍椒馨二十四盛典昌期莫不興廿三史内見何曾辟雍敷教四方服帝籍勤農九榖登二十五西蜀庸才僻逺陬螭㘭載筆㡬春秋承恩記向中山使載得皇威海上遊二十六敡厯多年媿紱簮中樞地重栢臺深官階一品臣何有都是君師教養心二十七承華叨侍禁東南老媿觀書柱下耼一自前年䝉賜夀餘生總向聖恩涵二十八十句休假逺堂㢘詔許參名上綠籖一卧城南天尺五露瀼蒲栁尚能霑二十九陳情欲去戀朝衫犬馬心殷矢結銜惟願無疆開夀宴重来闕下聽韶咸三十韻上下平原任左都御史張若溎年八十三維皇錫五福至治符蒼穹沾濡皆徳澤醇化彌龎鴻盛世耆耋多泳游和氣中芳春迎淑靄麗日欣昭融彤庭幸預宴喜起揚臣工臣家世受恩寵光叠被蒙蘭臺㑹執憲夙夜慎微躬愧以樗櫟材忝居繡獬崇投老仰賜間撃壤歌年豐昨春迓翠輅南國駢呼嵩扶杖覲天顔温諭宣仁風八十嵗又三重来聼笙鏞聖夀億萬齡拜舞同華封都統王進泰年八十一聖徳祥符夀㝢春祺詔錫華筵叨列期門肅仗許依禁掖鳴鞭授鉞夙垂重眷賜氊兹預羣仙八秩臣年開一承恩昨錫長年臣于去年六月馬齒登八十蒙飬之恩寵錫従此蒲栁逢春皆邀雨露長賜都統徳保年七十一條風啟韶序蓂荚迎朝㬢彤庭介景福夀㝢符重熙耆年預嘉㑹玉露澄瑶巵曲􅎽覲天顔湛恩荷鴻施春風颺青旂翠羽輝金支值兹盛筵開濟濟依光儀憶昨嵗中冬甫屇七秩期臣于去年十一月馬齒七十䝉并諸恩賜御書匾額珍異天筆賁光華尚方羅寵綏重叠何以報萬夀歌蕃釐都統五岱年六十二星雲糺縵重華旦聖夀作人倬天漢嶽珍川瑞慶駢羅懋典前徽益巍焕微臣侍直依乾清年年禁籞風光榮出師靺鞈禀聖武巖碉沙塞曽經行靈臺偃伯歸凱奏洊叅戎纛蒙殊旌玉闗賜代入朝近䇿騎甘凉小醜蠢據鞍每慕伏波風老馬猶堪服韅靷臣于上年由新疆換班回京路經甘肅請𠞰逆回平定後䝉恩加賞世職奕世恩延佩黻華慶霄日捧傾葵悃瓊筵錫福三殿開耆英濟濟聫尊罍一家中外躋仁夀榮侍南山萬嵗盃
