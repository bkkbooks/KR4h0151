body:
  text: 巻三預宴六十五人詩八十一首内閣學士伯興年七十三古稀天子夀八垠新陽紐丑鬯柢根三千䖍寅皤髪温綵勝剛夘耀銀旛日紀在辰六英暄龍集維已景耀繁拜趨從午門端門乾清軼未央含元巽命重申錫夀尊大小二酉隘莫繙攀金屈戍頌帝恩綘縣識亥何足言十二支體内閣學士塔彰阿年七十久隨蘭署仰楓宸更沐堯天雨露均曠典引年稽古少清班奉職荷恩頻歡依鳩杖人為瑞慶洽龍光澤是春兩世耆英榮盛㑹臣父大學士嵩祝曽預康熙年千叟宴今臣復䝉逢兩恩叨列耆筵世受不勝鴻庥茂典誠為異數榮感八千紀嵗頌靈椿内閣學士趙鍈年七十薇省深嚴地樗材奉職疎春韶新闓洽化日共舒徐丹地榮傳斚清班㸃佩琚我皇無量夀貝葉萬年書臣現充清字經館提調官資政誥封大夫尹均年七十一紫氣躔斗星陳天鳯樓晴擁彤雲鮮天子萬夀衆稽首厖眉千叟來駢闐鹿鳴魚藻讌愷樂六漿在斚珍在籩嘉㑹千載乃一遇金鏡髙矚丹階懸慶添繞膝五世備笑撫𤓰瓞方緜緜此事軒農所未有扶杖拜祝環羣仙微臣舊列鳯池籍臣子復侍螭坳邊仰叨世禄荷紫誥更喜擘脯陪恩筵詩人有語臣謹述受天之祜於萬年原任鑾儀衛漢儀使李文英年六十八堂陛聨嘉宴冠紳集大年正逢春似海共祝夀如天瓊液分仙斚芳茵接御筵玉階千叟聚金奏九歌傳地本同壺嶠人如列羡佺螭頭羣接武鶴髪共隨肩衰質慚蒲栁微才愧把楩節叨専閫重秩忝奉車遷臣由湖廣總兵内用京職雨露鴻鈞渥林泉小草鮮臣以年老䝉恩賜休臚歡重拜手盛事紀瑶編内務府大臣銜上駟院卿討住年七十三春風浩蕩開天閶江海日麗迎嵗芳渥恩夀人更夀世瓊筵湛湛稱華觴天家饌多珍且㫖周官膳夫臣職當萐莆生厨覩上瑞豈惟滋味調隂陽五十餘年効趨走臣在十膳房行走五餘年乾隆四十七年䝉髙厚恩賞給内務府大臣職銜恩施益增慶幸欣逢嘉㑹陪冠裳珠連玉燭雲五色鈞天樂奏諧宫商肩隨黄髮諸老後彤廷肅拜聨班行蹈舞聖世醲化普羣生澍濡君恩長内務府大臣銜熱河總管永和年七十九瑶光敞韶序錫宴啟令辰俶慶當始和懋典浹上旬寰㝢協氣播品彚光風新我皇古稀聖在位皆耆臣積算紀甲子還丹度庚申鳩頭玉杖髙鶴髮瓊筵親臣昔厠匡衛列校環勾陳曠職感優典樗材尚冠紳仙莊拱上塞鸞輅年年巡壺天奉管鑰汎掃依玉宸山光稱萬夀花蕋符恒春瀼露得沾被小草戴大鈞曼倩笑割肉臣今荷兼珍紀恩詩思窘詰屈語不倫願將蟠桃實持獻同莊椿原任内務府總管品級武備院卿西寧年八十二鹺政曾經佐度支何期遲暮荷恩施官陪内府容聨步宴錫中厨幸捧卮千載隆儀垂典册九成大樂譜聲詩逢春栁質都忘悴向日葵心本不移劍外執殳思少壯臣曽隨征金川階前扶杖待期頤無疆萬夀咸稱慶颺拜深慚獻玉墀一等男劉沛徳年六十薄材舊𨽻飛龍籍盛典新承紀鳳年錫羡有符開寳檢蕃釐多幸沐瓊筵淳母競奉堯厨箑鈞奏親聞舜軫絃日啟三陽雲糺縵風和九宇鶴翩躚絲綸共慶恩稠疊蔀屋齊徴福曼延世賞殊封糜玉廪近光欣得伴彭佺一等男陳隆年六十四湛露賡周雅横汾陋漢歌爵慚居五等祝願獻三多拜賜階鵷鷺分班領鸛鵝榮騎龍廐馬銳執羽林戈皓首陪恩讌陽春播太和駑駘還可策壯志未蹉跎一等男吳文燦年六十嵗徳辰居已時乘斗建寅宇開八埏夀臺啟六蓂春至徳璣衡耀醲恩造化均三霄卿靄積雙闕瑋璆珍共貫松筠茂同霑雨露仁貞符偕長養淳化荷陶甄竊禄膺瑶爵依光近玉宸霞觴欣拜舞效祝遍垓垠原襲三等男四格年六十八帝城和氣動青旂曉禁風迴賜宴時獻斚共瞻雲日象盈廷齊暏鳯凰儀舊膺蒲璧䝉函覆喜並茒簷樂皥熙六十八年虚豢養蠲誠拜首頌春祺浙江衢州鎮總兵賈魁武年六十四自昔成鳩道洪暉萬八千提釐頻受筴錫福特開筵集闕鮐耆㑹趨朝鷺序聨需雲占易象湛露叶詩篇綺席分曹設芳裀賜坐便飛鳬咸彩履飲兕到華顛重鎮三衢忝醲恩九㝢宣遭逢誠異數忭舞祝羲年浙江處州鎮總兵明安年六十二天皇御世錫純蝦地負海涵趨扆黼風后握機臣職司雲需宴樂陪儀舞龍徳剛中萬萬年虎觀列儒勤講古蛇耀靈珠蠵貢圖鳥紀以來祥未覩握機陣體山東登州鎮總兵馬如麟年六十八雨露周霄壤淑景春際孟筵髙叟三千仙桃應芳令懽然友期佺恩詔許行慶㫖申詳舊典帟張儀衛盛勾陳良夙懷耼彭更迭映勉成祝萬章載充虞廷詠人名體山西太原鎮總兵福敏泰年六十二閫節分三晉樗材荷總戎年逾花甲外恩近日華中列坐金章並行杯玉饌豐春韶千叟共仁夀萬方同嘉㑹陳繁露昌辰告協風今朝陪鶴髪仙籞接羣公廣西左江鎮總兵薩郎阿年七十一仁徽義軫髙以張君宫臣商民角事徵引以長有姚氏帝撫此五絃垂衣裳坐見幽冀并營青兖雍豫徐梁荆揚十二州民夀以康維時尚有有苗頑弗良格之七旬兩階干羽方洋洋伏惟我皇五十年來一徳久道超虞唐曰雨而雨暘而暘兢兢業業繼繼繩繩法祖承天保兹恢台日以昌甘醴芝蓂一一應節呈嘉祥詔頌今春孟陬六日吉重舉千叟宴之舊章觩觥稱寮友珍賜出尚方闕下與者三千人有奇海内衆庻黄耉鮐背知幾萬數良難量養老典古有淳熬淳母炮漬擣珍為熬糝肝膋之周詳未有内外文武大小臣工下逮農工匠藝逺至東瀛北溟之屬咸得拜手稽首瞻天閶臣以介胄伍健飯備職鵝觀貔貅行所轄嶺南西道屯苗疆知其種類則猺獞𦍕狪㺜狸􅩄猀犵犺黒玀白玀與獠狼岩栖谷飲莫不懷徳畏威以嬉以遊仰化光况復寰海八寅長養敦厖之黔蒼以是徵我皇萬載一徳久道超虞唐四川重慶鎭總兵馬鎮國年六十四旭日耀閶闔騰輝麗飛甍華筵次第啟濟濟羅耆英豐施不擇物鉅細皆含榮歡陪百寮後列侍依承明六膳出翠釜萬福詠兕觥祥颸遞仙樂縹緲鏗咸莖顧慙樗櫟質荷㦸來邊城守官厯秦蜀稍建專閫旌臣自甘肅行伍䝉恩由潼關營副將陞授今職天威暢遐域仁鏡函光瑩笻竹萬里貢蟠木三章賡慶兹夀曜朗獲申寸藿誠雲天叶燕衎兒齒聨簪纓恩波世沾被六幕欣化成陋彼中和樂虚流雅頌聲雲南臨元鎮總兵陳大紱年六十四丹禁筵開詠蓼蕭自欣華髪得趨朝夙參羽衛班行近今忝旄樞節控遥萬里恩威宣六詔兩階宴語接重霄祗慚汗馬輸分寸葵祝長霑雨露饒武功誥封大夫嵩山年八十千福備恩延十一世五十年問五帝徳及九皇篇地孰二萬里書疇三萬編百九十家瑞瓞巨億萬計衡錢無能名既醉既飽巍巍乎為大惟天一叟帝錫天佑三階平九宇宙上叙垣潢下逮澤藪百四十餘年長長而幼幼東西􅙡日窟月朔南衡星弧宿介春祺乾清筵啟合萬國奉一人夀二宴綏祺錫羡聖繼聖旦復旦物與長春筵開霄漢甘冽帝臺漿芬苾堯厨膳尚方珍綺百朋樂府韶鈞九變拜手稽首而颺歌太史氏奏夀星見三七一字至字體穆坪宣慰司甲勒參納木喀年六十一卬籠闗外奮天戈荷甲而今盡荷蓑笮裏燒畬鹽汲井一聲聲唱太平歌一萬里星馳祝萬年蠻司也許入班聨金漿玉醴霑恩渥王㑹圖中盡列仙二奉國將軍宗室徳敏年六十七椅桐吐春蕤分輝自若木幸逢聖華敷雨露得滲漉屬籍通金門鞶帶加肅穆豈意葑菲姿仰襲茝蘭馥前年讌展親行葦承優渥今兹錫洪釐龎耆介景福奕奕嘉筵開濟濟華茵簇引翼歌維祺稽首奉觴祝副都御史梁敦書年六十一蓬萊閬風鈞氣函春臺熙熙恩海涵時五十載徴和甘月六日冠人榖蠶老人星聚弧之南崇年錫讌普且湛自王公侯伯子男次逮卿尹羣紱簮閩耆􅓺序希桓譚陪臣海國徠䟃𧽼上夀中夀如靳驂叟以干計者凡三擘青麟脯仙漿醰金卮手賜籛老耼鑪煙浮動天蔚藍太和氣與天地參登三咸五淳治含亹恬楗鞏民弗惔圜橋璧水文瀾渰四庫秩秩森排籖五代五福堂潭潭曽元繞座垂髪鬖盛事罕載彪若談臚歡大酺飲酎酣瑰珍拜賜盈笈籃捧歸志喜迎傳柑初元旦詔書慶覃十行下布澨與嵁敷錫黎庶俱樂耽山呼雷動衆所諳大徳受命至理探量納九瀛髙重嵐臣䝉恩蔭官紀郯父書愧讀芸辟蟫司曹守郡慙試鐔洊厯大藩滋餗甔南臺譾薄懼弗堪清勤仰訓珠在頷臣父大學士臣梁詩正䝉恩賜御書清勤堂額侍宴天閶祥雲曇扶杖觀禮書史儋大理寺卿富炎泰年六十五獻嵗韶光麗敷天淑氣匀偕登仁夀宇同詠太平春鳯詔頒丹闕龍光錫紫宸弧南星正耀開宴及芳辰一茂典前庥紹敷仁自九重太和徵瑞叶夀愷慶時逢茵席班平墄韶鈞振鼔鏞升恒如日月長沐湛恩濃二鶴髪三千叟欽承詔語温字聞書綘縣慶益衍璇源合宙欣沾霑㣲誠矢負暄正逢春浩蕩長此頌羲軒三自顧如蒲栁瓊筵坐許陪蓬山真盛事棘寺愧非才苑植恒春樹人稱益夀杯拜瞻天咫尺賡詠獻臺萊四大理寺卿藍應元年六十八法祖耆筵啟承天惠澤濃八方開夀㝢萬姓祝華封春暖雲霞麗祥凝錦繡重纎埃慙備列白首慶遭逢一數典隆稽古前謨可具陳虞廷優米廪漢代重蒲輪粟帛規模舊尊罍禮意親何如今日盛祝聖慶駢臻二大徳䝉天眷繁禧疊次頒九垓千叟集五代一堂環瑞繞雲中闕輝増海上山兕觥齊獻夀並喜覲天顔三隆儀符造化涵育洽羣心樂愷成嘉㑹賡歌暢帝襟鵷班邀福遍鶴髪被恩深九奏隆平曲洋洋盛事因四原任大理寺卿徳爾泰年七十法宫玉律鈞天調氤氲祥靄凝丹霄臣工競賦蓼蕭什蔀屋亦奏康衢謡重熙累洽逢昌運臣昔菲材慚淑問好生三有出宸衷陶育深仁識矜慎五十年徵億萬年和甘滲漉徧垓埏耆鮐慶集超前牒迥軼禪通合雒編詹事徳昌年六十三乾剛廣徳運文治昭阜康兊澤布春衢萬載承天閶離南有老人耀夜呈榮光震旦普恩慈佛夀真無量巽命舉懋典再倍千叟觴坎其䕫鼓聲既醉歌濃瀼艮位臣所思拜手占嘉祥坤輿宏八維盛仰齊賡颺八卦體原任詹事興桂年六十七我皇法祖開華筵千叟讌集來日邊風和日旭春殿啟翠蓂六莢敷庭前青陽淑氣亘八埏宫梅苑栁爭芳妍人來化宇多夀耉于于帝所儀無愆螭頭列席羅貳膳金盤玉案紛駢闐蓬池之鯉銀絲鱠長春之酒斟如川宸章糺縵光瑶璇星景雲慶臨瓊箋柏梁首出藻韻和奎鈎氣象彤霄懸小臣憶昔隨班聨衰朽猶得䝉陶甄奉觴連襼歌且舞三爵以退油油然祝嘏如聼嵩之巔我皇春秋萬萬年萬萬年自今伊始帝如天皇臣佺籛原任太常寺卿肅普通阿年七十一太儀斡運聖人奉若燮成元化翔洽六幕髙下際蟠經緯懿鑠上夀中夀人瑞遞作何數瑞符麟郊鳯閣帝夀無疆徳施溥博申命引年鋪筵洗爵千叟具來威儀儼恰臣忝太常夙親煒爚恭承聖華韶簫武籥虞陛周庭衢尊咸酌萬福攸同忭言拊摶順天府府尹虞鳴球年七十七九衢騰采融春曦風和幾甸民恬熙斂福敷錫荷聖慈同歡夀愷集玉墀我皇膺圖福禄綏金鏡珠囊拓鴻基化成久道耀兩儀文徳懿爍六合彌南山允協天保詩祚昌五世榮金枝嵗符大衍揲靈蓍太蔟律應春孟時恩覃八埏溥繁禧詔頒元日鳯銜蕤法祖優老錫春祺叟徴千數三倍之鵷鸞領袖臯與䕫封疆牧伯萬里期羣工六袠同委蛇歸休重至表宿耆海外陪𨽻趨尊彜列坐華髮龎其眉袀兵褐叟次第隨爰有百齡更上推駢羅人瑞海鶴姿五雲縹緲颺龍旗金爐烟裊香風吹堆盤珍果光陸離盈案芳馨大官治仙醖芬潔明玻璃鈞天雅奏竹間絲鏗鍧鐘鼓鳴參差宸章璀璨雲霞垂彤庭賡拜春日遲臣職畿輔叨恩施犬馬之齒承帝咨龍光日近湛露滋雨暘應節田間嬉歌聲城市連茅茨幸際盛典捧玉卮醲化渥被來珍竒躬慶箑莆心傾葵惟皇治本三無私澤敷衢壤軼姚祁萬年保泰長若斯敬率畿叟祝聖釐太僕寺卿蔣良騏年六十四芳時初啟物華妍閶闔宏開賜綺筵碧斚春歡無量夀紫雲晴靄大羅天班隨期耋都稱叟身到蓬瀛儼是仙湛露濃瀼歌醉飽鳯麟儀舞玉階前一天顔有喜溢彤墀慶值龍光燕譽時奉敕特宣三夀侣當軒䖍晉萬年卮鑪烟繚繞金盤果旭景氤氲赤羽旗鵷鷺千行齊拜手山呼嶽頌兕觥詩二原任太僕寺卿佛禄年七十七瑞緯中天照八維昇平介雅捧瑶卮深嚴秘殿聆仙奏絡繹珍厨荷聖慈首嵗鳯樓新預宴頭銜龍廐舊曽司賜休曲憫頽齡憊赴局仍教散職宜臣因年老休致蒙恩著在清字經館纂修官行走梵筴開圅蓮語浄國書啟帙墨香披吉祥千佛稱無量貝葉頻繙頌夀祺候補三品京堂全魁年六十二福曜騰輝萬彚舒紀恩徴實按年臚曽叨南海中山命臣曽䝉琉球恩奉使長傍仙壺閬苑居校士兩持星使節服官濫受地卿糈神京卜鎬瞻原近仙蹕過豐扈仗徐祗媿承宣辜職業未能率屬蹈迂疎録瑕猥以隨鵷鷺拜賜仍然列珮琚夙夜惟寅心似藿生年周甲質同樗欣逢夀㝢偕咸若獲預耆筵倍樂胥澤溥由庚春啟候恩覃大衍瑞呈初法天健自承天祜國慶年豐億載書三品銜太醫院使陳世官年六十二臣生堯舜世㓜讀軒岐書大徳曰生我皇備太和元氣充寰區大雅歌綿綿小雅歌天保珍庖玉饌出天厨不數東方桃實安期棗綺旭麗祥烟飄舞七徳樂大韶奉觴上夀天顔喜八紘仁夀從今始民無疵癘物昭蘇乃知素問靈樞皆治理奉宸苑卿珠爾杭阿年六十八㫋䝉之嵗春王月淑氣冲融絢瑶闕聖皇曼夀正陽春大㑹耆年纘祖烈光天之下樂夀同徳洋恩普編溟碣禮優杖國兼杖朝典陋祝鯁還祝噎錦茵綺席羅嘉珎紫霞之杯仙醴設宫鶯苑栁皆春容近光次第星辰列奉宸備職愧衰庸一體鴛鸞逮班綴入參嘉宴許扶鳩文篚駢闐輝錦纈羣臣珥筆摛春華三殿開尊榮大耋日髙芝葢瑞靄濃夀宇春涵慶𤓰瓞張筵逺勝大酺樂太和元氣互翕歘五福堂開億萬年上軼羲軒紀䕫契管理圓明園事務中敏年六十二聖主法天勤政夀開億萬延洪五十迴超紀牒三千普廸淳龎賜福賜筵賜杖歌衢歌華歌嵩玉階旅進旅退蒼顔緑髪春風一微臣職依禁苑吉日叨預仙醽瑞應般般靈獸春光煜煜祥蓂智水仁山樂夀髙天厚地清寜敬仰一人鴻慶陶鑄軒轅大庭二歩軍翼尉給事中常慶年六十五黄樞拜恩命獻給慙官箴星廬兼翼尉兢惕殊難任自顧罷駑質竊禄徒侵尋欣逢熙皥日飽徳彌髙深蠲租恤編户萃書羅璆琳膠庠既秩秩棫樸何森森元辰錫温綍鶴髪紛華簪燦燦文綺列湛湛醍醐斟夀宇開六合逺逮東海潯陪臣荷殊寵俾厠耆艾林鳩扶望崇闕雀躍鳴歡忱列坐萃千叟獲聆韶濩音拜手歌九如肄雅附苹芩歩軍翼尉法京年七十三彤廷曉景麗青陽次第班聨泛渌觴貴齒千春臚鉅典開筵奕世廸前光豐珍瑞果文茵上雪鬢霜顔御杖旁飫徳相隨齊拜舞欣歌天錫夀無疆奉恩將軍宗室富察年六十六聖皇御極宙合同春梯航萬國來賓來臣湛恩汪濊疆理瀰淪章蔀紀元上夀唯仁超軒軼昊遹歸陶甄祥開嵗首景麗三辰夀宴蕃錫鸞鵠儷陳臣附銀潢夙佩裖袀前嵗葦宴餐甘飲醇今兹耆席調鳯擘麟皇溯水源酈菊泉分皇推木本衍枝靈椿心祝萬夀情逾兆民奉恩將軍宗室善志年六十四人瑞先人日需雲敞綺筵天厨分御膳黼座領羣仙賞徧三千叟恩深五十年露新歌湛湛禁籞渥膏全奉恩將軍宗室普政年六十二萬年熙洽五世怡愉福自天佑總宙緜區錫光夀耉象雲五需慈惠用示典隆頒酺近自宗藩下逮耆儒稱歌行葦共賦嘉魚月正元日闓澤覃敷矧兹式燕優渥涵濡懿哉皇哉超牒軼圖乾符億載皥皥于于原任奉恩將軍宗室忠順年七十四鳯紀麗青陽景運追復旦天上排綺筵夀耉胥燕衎欣彼鶴髮多入覲魚鱗貫錫羨廣慈仁海屋籌無算徴臣已乞休尚令預華宴有喜仰天顔飲爵青玉案弧南斗極明闕北卿雲爛千秋慶典逢六合歌巍奐四品頂帶宗室穆特布年九十聖徳逺超廿三史臣曽榮與二千人癸夘嵗宗室于乾賜宴清宫與者二千人臣忝在列前年丹陛隨鍭矢此日彤墀伴鳯麟流入銀潢全布潤週來花甲半重新臣年九十嵗八方夀㝢環閶闔萬族歡聲溢井闉詔下瀛濛翔濊澤筵開耆耋捧恩綸青瞳簪黼排鵷序黄髪梯航次雁臣盛樂雲韶方奏頌淳風玉燭正調辰册年惇敘鴻施溯聨句重瞻錫句頻四品頂帶宗室元星年八十三衍慶仰分宿海昌符上應弧躔已幸敦宗授几復承優老登筵魚藻喜聨鳬藻松年合並椿年天瑞鴻庥滋至聖治重光聿宣四品頂帶宗室富臣年八十三重光兩度慶耆筵豐芑謀詒億萬年六十週増天上甲三千齊列地行仙聖敷箕福鴻休協臣忝宗潢燕喜駢曾荷展親華組列恭逢養老夀祺延榮叨五豆齡加錫典懋三雍史載編寧數香山兼洛社幾人扶杖五雲邊四品頂帶宗室徳普錫年七十八卿雲五色輝仙仗春陽晞露融金掌元正六日敞御筵典重耆年隆宴賞婆娑鶴髪引千行拂曙天門開詄蕩我皇敦睦嫓陶唐天潢萬派春波盎紫殿曽經式燕來彤墀更許扶鳩上金虀玉粒足長生宿齒從今更加長願祝聖夀與天齊萬方永被堯仁廣四品頂帶宗室色赫臣年七十七紫微瞻帝曜翠幄引宗潢座暎松齡古人駢鶴算長殊恩蹻跂樂廣澤耉鮐光地浹重瀛海天周五嵗陽雲來方集慶水木得分祥冠綴青金麗衣聨候鴈翔㑹同駢譯使闓豫奉軒皇蓂莢新抽處桐椅咏雅章四品頂帶宗室明亷年七十五仁風扇九區帡幪仰在宥斟元飫天和大徳必得夀介啟錫福筵同聼鈞天奏恩優無算爵禮行有加豆聖人真古稀繁祉乃天授繩武繼述隆鉅典我朝又顧慚宗盟末銀浦環列宿願誦天保詩川増松柏茂四品頂帶宗室拉禮年七十四玉律琯符交泰金墀花報長春垂衣丕育羣物授几還榮老臣衍緒分支潢漢升華趨步星辰無疆仰祝萬夀有慶咸欽一人四品頂帶宗室徳増年七十四慶洽天潢釀太和綺筵况復沛恩波耆年寵遇寰瀛徧淑景韶光禁近多翠釜山珍欣腹果金壺法醖共顔酡大酺賜後歡聲鬯不數康衢擊壤歌四品頂帶宗室拉立布年七十四充廷鸞鷺玉琤琮萬嵗山光對酒濃始識宫壺仙漏永霞杯天上賜從容一惇敘曽經燕玉墀在宗重得賦桐椅振麟濟濟同觀禮五福堂開聖受釐二四品頂帶宗室海金年七十三鶴髮趨宸陛瓊筵浥御香冠裳榮四品嵗月衍三皇寳鏡軒圖朗珍符禹範康宗支叨寵錫南極頌逾昌四品頂帶宗室安和年七十三維皇建極歛福曰聖法祖重光綸綍傳宣普澤英耆萃止稱觴六日禮隆醬爵九霄聲聼笙簧小臣預邀寵渥拜手敬效賡揚四品頂帶宗室常平年七十三宸眷朋三夀華筵錫九重承恩趨舜陛分派托姬宗春啟條風暖膏流湛露濃醉歌行葦句祈耉喜扶笻四品頂帶宗室伊爾圖年七十三夀敷奏長春晝徳音日茂萬嵗天所佑咫尺垣隨列宿銀潢耿耿榮天胄一榮耆英際聖明運符元亨萬物遂其生台階兩兩衡平光聨南極恩注傾二恩詔言錫祉繁子惠元元廣開兮天門日者天氣宴温萬方同慶霑堯樽三慶歌詠緝熙敬超軼前聖重巽以申命三千同姓異姓夀祺亘古于斯盛四至一字七字體四品頂帶宗室永玫年七十三行葦詩歌酌大斗酒醴維醹祈黄耉三王養老皆引年九疇敘福一曰夀聖朝曠典欣特頌依古以來所未有推恩四海為一家作朋三夀合千叟需雲溶溶垂綺筵式燕衎衎侑春酒皇仁浩蕩徧遐邇如地持載如天覆祚臻久道錫純禧大有上九自天祐五福五代衍慶長天保定爾俾單厚愚臣派系叨銀潢本支百世祝悠久肆筵奠􅕌歡何窮願介維祺拜稽首四品頂帶宗室巴哈年七十二曉色觚稜靄霽華瓊筵蹌濟泛流霞星臨觚角辰占夀日啟陬訾禮協嘉萬井鳩扶咸帝錫千班鶴算與春加堯仁舜澤兼亭育景慶光中况帝家四品頂帶宗室清福年七十一涓流衍派綘河分慶裕祥源仍與雲盛典更承天上詔至尊錫宴軼横汾一寵加冠帶侍鵷班何幸承恩綺席間砌畔仙蓂凝湛露願扶鳩杖頌南山二四品頂帶宗室玉輝年七十一平成際時雍聖人錫福九㝢同旭華騰曜升當中球枝珠幹一一祥光籠蘭苕茁秀聨椅桐教胄命䕫兼敦宗臣昔贊厥職闈門書禮欽陶鎔乾乾龍徳本不息至尊敷歛承龎鴻雲仍慶衍紀瓜瓞京垓筭積呼華嵩集千叟之蹌濟開三殿兮曈曨東榮洗醆嘉禮洽三爵醻酢燕笑通耆年舞蹈請獻祝神堯上協光華重四品頂帶宗室穆璽年七十聖展宗潢禮天開夀㝢祥弧星呈燕喜蕭露沐龍光鼓萬和風洽登三化日長雍容慶千叟曲􅎽進霞觴四品頂帶宗室萬星年六十九海涵春育夀無疆帝祉如天景祚昌十一世繁軼姬牒三千叟集拜堯觴國恩莫報塵禆嶽家慶還欣派衍潢燕譽龍光羣飽徳三多百福頌嘉祥四品頂帶宗室斐業楞年六十九昇平大典慶壬林耆艾鳬趨拜澤深律紀初春風正協筵開早旭日初臨天潢錫爵長承寵人瑞偕榮陪惬心扶杖幸瞻顔有喜燕胥樂更聽韶音四品頂帶宗室納齡阿年六十九曲臺記禮傳養老曷若雅頌綏眉臻夀考庠分上下膠東西曷若國慶萬年協穹昊猗歟麗日懸中天熙朝大化成乆道天子萬夀歌無疆仁恩漸被及四表詔錫耆齡宴三千集黼藻或綴熊虎班或依鳯凰沼吹笙鼓瑟羣舞蹈或趨洛中叟或起商山皓飲和食徳皆醉飽微臣何所能忭躍奉丹詔忝分宗派來綘河幸捧金罍上蓬島上林旖旎春光好如月之恒如日升敬為昌時頌天保四品頂帶宗室隆吉哈年六十九睦族荷聖慈引年紹前烈怡愉扶杖來舞蹈縁墀列大官給法膳酒醴當筵設鴻臚導盛儀韶樂宣和節温綸次第頒賞賚均耆耋稽首效呼嵩綿延慶𤓰瓞四品頂帶宗室阿林保年六十八紫霄轉龍角春和散八埏璇階寳扇開濟濟耆老筵鉅典肇聖祖玉燭調和年醲化浹累世道裕皇極先至健運不息聖心體純乾慈讌繼盛事法祖重光宣率土臚歡洽分支荷恩聨綴食禮弗殊䖍頌行葦篇欽定千叟宴詩巻三
