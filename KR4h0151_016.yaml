body:
  text: 巻十一預宴六十九人詩八十四首左庻子九十四年六十二三王有乞言百年曰期頤惟我君之德本仁以聚之養老之珍具食齊視春時先飯辯嘗羞則下天上施四暢交乎中百官得其宜考時月定日執禮者詔之詩言其志也儀行不重辭集禮記吏科給事中玉麟年七十一聖主膺繁祉推恩徧四方來遊徵五老尚齒邁三王聿念耆而艾言嘉壽且康新綸頒歲首鉅典應期昌宴洽春初麗歡騰日乍長聯行趨玉殿拜坐受瓊漿豸服慙糜禄鵷班待晉觴恭陳萬年頌奕世覩呈祥禮科給事中柯瑾年七十一聖神文武宣重光惟帝萬壽歌無疆禮陶樂淑洽郅化斂福敷錫凝庥祥環瀛雍動調風雨咏德含淳人鼓舞上壽壽國次壽民共慶喬齡徧區宇帝曰都爾臣若鄰疇咨環侍予一人三壽作朋天佑順年年長養春臺春春光如許諧清宴上日傳宣張酺讌耆民倍得例恩推侍臣特許傳杯徧傳杯之數人三千盛儀真軼羲黄年賜詩聯咏文思盛杖玉懸鏐錫賚駢五世一堂古未有列聖基培元氣厚天子行㸔六代孫諸生所師百齡叟小臣卅載荷恩深七十善飯傾葵心何曾去學餐松术福際隆時自照臨工科給事中圖薩布年七十一地近絲綸閣東臺奉聖猷長安春正麗元㑹澤彌周獸鼎香凝篆蓮壺漏報籌後先聯黼黻左右列肴饈夀算原如鶴康强不杖鳩栢梁歌亹亹桂醑樂悠悠桃結三千實霞凝十二樓南山頻獻頌嘉祉滿皇州吏部郎中邁蘭年八十一皇澤涵如春物物得其所式覘久道成懋典盛秩序引年優上齒番番黄髮侣熙朝洽人瑞嘉宴今重舉有杖不湏扶袖底春如許雲璈韶奏翕仙醖卮浮醑晴暉藹慶霄和氣叶干吕小臣屬銓曹聯行隨進旅希世信難逢書名榮賫予願上萬年觥得賢聖所與九流祝多材六計奉當宁吏部郎中額爾德尼年六十八蕭然野鶴姿羽翼翩翾好天仗隨雲軿飛歩凌縹緲濃墨寫黄紙一一立名字蒼顔白髮略相似人間俯仰三千秋雍容已饜天庖賜誰言逺近殊蓬萊不可到萬户春濃感國恩遙聞爭誦十行詔集蘇軾句吏部郎中慶安年六十八叶氣被皇圖祥光開㝢縣同遊福禄林共入羲黄宴介夀盡龎眉開樽臨廣殿蓂葉映堦翻萐脯當㕑扇傳觴到微秩獨愧銓曹掾既非水鏡才亦豈氷壺彦欣逢錫福辰得附耆筵選擊壤效衢歌裁詩慙述撰户部郎中拔寧阿年六十二解阜協五絃修和慶六府耕屯萬里遙豐樂遍率土聖人富藏民蠲除恩屢普民穀數載登恬熙繪比户夀鏡叶夀祺春臺樂春煦在廷多耉耆賫宴浹膏雨樗材備郎署㑹計事覼縷寧期荷殊澤玉筵侍樽俎祥颸扇始和旭日照方午耕鑿頌康衢播為玉陛舞户部郎中良成年七十一蓬萊佳氣轉鴻鈞日月光華焕紫宸節先銀旛齊耀彩恩醲粉署盡含春持籌那重錙銖積布澤深知雨露勻有慶萬年依化育無為四海擴彌綸覃施叠沛蠲租令厚實都歸力穡民禾穎麥岐長紀瑞空桐丹穴悉歸仁臚歡耄耋儕鵷鷺綏福曾元萃鳯麟保赤誠求純嘏祝敷榮何幸預微臣户部郎中穆騰額年七十三掌邦圖敷五典郎署欣叨蘭握選聖朝九賦法尤良百卌年深澤涵演我皇屢降蠲租詔玉粒萬艘紓運轉帑藏頻因賑䘏頒倉箱特許輸將免豐年處處茨梁足曠典時時日期展方春斗柄鴻鈞斡酺宴羣工飫豐腆臣依聖夀效賡歌戩穀穰穰慶長衍户部郎中永祿年六十九昇平歳月共嬉遊粉署欣承惠愷稠宴啓初韶千叟聚祥徵復旦五雲浮昔叨壯齒馳戎幕臣出兵二次更忝農曹掌國籌大有惟聞歌萬億臚歡長見仰懐柔穰熙報處輿情惬蠲貸加時睿慮周從此年年仁夀宇逢春長慶播鴻庥户部郎中何廷璿年六十五嘉宴重開盛長春煦太和一人千叟燾五福百男多候叶三陽琯榮逾八伯歌天章賡舊韻純嘏詠巻阿一雲曹昔忝任農部又遷官幸值華筵啓叨聯衆叟歡髮慿嗤鶴白心自效葵丹榮聽鈞天樂身疑借羽翰二户部郎中富成額年六十六閶闔啓千門頻傳詔㫖温神功過舜禹聖夀軼羲軒暖律初消凍芳春已負暄彤廷諧舞鳳白髮萃翔鵷畫省慙司計邊陲憶屬鞬弭兵皆帝力蠲賦總皇恩貳膳榮前筯醇醪拜上尊矢音隨百爾錫宴紀含元户部郎中德禄年六十二聖主握蘿圖純禧邁軒嚳羣雍陶太和敦龎慶成俗緬昔神武揚威稜讋蠻觸司農總偫備微臣𨽻其屬封軺佐持籌飛輓結芻粟飽騰奏凱歸駑駘冀勤朂欣兹預嘉宴耆耉鏘鳴玉戢戢在藻魚恩波被濡沃聞賡湛露詩仰叶鈞天曲榮幸愧不材何以答禔福户部郎中巴陽阿年六十二聖澤旁敷日神蓍衍瑞年欣逢嘉宴啓及此令韶宣藁飫熙堯壤豐財叶舜絃綏豐祥紀萬衎燕數逾千肅穆龍光近雍容鷺序連粉闈慙綴迹玉砌幸差肩占叶需雲象懽承湛露筵今宵瞻列宿應共夀星懸户部郎中佛爾卿額年六十六嘉慶駢繁叠嵗新萬年備福仰楓宸誠惟不息恒行健物共長生飫化醇翠莢璚芝呈上瑞玉衡珠斗紀華春暉聯梧閣鴛鸞侣澤到茅檐笠屩人九節蒲抽仙葉潤六枝蓂茁玉階勻介眉酌斗歌豳協式燕承筐肄雅陳海鶴精神延夀世閬蓬嵗月紀良辰勉司㑹計叨糈久力效馳驅出塞頻小草許教霑雨露鴻庥原是廣陶鈞不慚無補依郎署欣共耆英渥賜珍户部郎中佛喜年六十三吹萬承和風方中仰聖日八紘康樂登比屋熙和輯微臣屬農曹汪恩得仰悉蠲除給賦租勸課􅎋稼穡鑿井而耕田三農咸徧德耆耉慶朋來元祉協初吉敷榮芝圃新潄醴蘭尊溢玉函雲笈籖綿綿開部帙禮部郎中諾穆福年六十一瀼瀼湛露遍林柯魚藻臚歡頌有那五代曾元膺曼羨八埏仁夀沃陽和叠逢嘉慶天多喜普暢元聲帝作歌上瑞有因惟福錫長春無量及民多引年優典敦風厚式燕維儀盡禮羅儕鶴自聞聯佩黻扶鳩兼復到烟蓑珍饈列品筵聨序瑤斚分漿色轉酡白傅詩篇寧擅勝洛陽圖繪弗同科榮承盛際均霑澤恩逮微臣飫沃波夙夜寅清慚備職許依梧鳯咏巻阿禮部郎中書敏年六十三慶雲糺縵輝當宁五典惇庸燦修舉大啓彤庭洽燕胥鵷班鶴髮聨儔侣小臣簪筆議容臺三十年來豢天糈圜橋璧水仰觀成揚扢鴻儀歌業虡羣雍熙豫咏由庚百産豐亨誦華黍俯愧星霜上髩毛深叨雨露銘心膂敬陳天保頌升恒何幸龍光接譽處禮部郎中専泰年七十一皇建有極夀世夀人錫之燕愷溥以陶甄皤皤耆艾藹藹韶辰蓼蕭仰澤蒲桺回春臣忝儀曹夙夜惟寅昔從西師天威丕伸今瞻北闕恩賚式均再拜稽首敢紀皇仁禮部郎中蘇冲阿年六十三奉職容臺列恩榮與引恬耆年重宴啓吉日六辰占樽有康衢酌籌從海屋添惟皇躬備福率土慶均霑兵部郎中明德年六十一時平戎政簡竽濫及樗材日暖韶光麗春濃御讌開嵗纔週甲子恩許到蓬萊願緝升恒頌瑤堦進夀杯兵部郎中福保年六十六天聲尉候一廣輿章亥履臣𨽻夏官屬竊禄越三紀昔者隨行間馳驅執鞭弭親聞凱歌奏耆定超前軌西師兩金川掃蕩平如砥神機本獨斷指掌瞭萬里吉語迅遞郵飛旗頻送喜功成大化普養恬遍遐邇吾皇萬萬夀京垓計甲子人登仁夀㝢嵗叶陽春啓廣庭列華髮瓊筵渥芳酏小草亦叨榮守官述前媺兵部郎中李世裕年七十四古稀天子萬夀多小臣願進擊壤歌懐蘭忝直司馬署親見寰區韜兵戈西濛北漠闢屯牧闐玉充貢馳封駝熊羆十萬㢘俸給一一汪濊沾恩波六軍鳬藻奏陔夏多士鳳翽矢巻阿㫋蒙紀嵗月太蔟南極朗曜珠嚢羅重熙累洽際恬養康强逢吉樂民和瓊筵接武胥衎衎黄髮稽首咸皤皤日升川至頌聖夀萬年琪樹森枝柯兵部郎中英珉年六十二斟元化益樂羣生土貢梯航瑞畢呈嵗酒能令老者壯娛遊原勝洛中英王正吉禁城瑞靄曉蒼蒼卉浥天漿鳳在岡槀飫筵中歌復旦元亨隆遇應期昌叶嵩三離合體兵部郎中禪布年六十六楓陛偕稱萬夀觴敢誇列宿應為郎九天日照耆英㑹千叟雲依糺縵光西賮南琛春輯瑞賔連平露嵗呈祥盛朝兩度開嘉宴五十年徵億載長一鶴髮相輝鷺序盈璇霄仙籍遞稱觥三陽泰叶三呼慶五代堂昭五福并魚藻那居占式燕笙簧宵雅叶聨情臣班樞屬叨恩渥小草生春盡向榮二兵部郎中達爾吉善年六十六和氣祥風浹寰宇到處陽春濳煦嫗桑榆晚景益傾心犬馬暮年彌戀主臣年十六際熙時五十年增嵗華予讀書欣惟讀國書臣由繙譯舉人出身仕籍登時漸華膴膺民社責罔設施作牧守臣乏風矩旬宣畿甸績無成閉户思愆由自取臣任直𨽻布政使縁事鎸職已分濩落成枯枝豈料敷榮沃甘雨中樞尚備司曹郎一命而傴再命僂更躋千叟隨王公得頌萬年獻君父臣之甲子纔過六恒河沙數何足數日月光華覲聖神億兆京垓法天祖刑部郎中伍正額年六十五聖皇御宇握化樞郅治醲浹周海隅臣職奉西曹敬陳德意敷明刑弼教邁有虞豈但三祝湯網下禹車湛恩歌龎鴻闓澤沾澍濡太和所積世曼夀甘露被野尊盈衢嵗在旃蒙孟陬吉引年鉅典占雲需天閶晨開羣叟趨鶴髮鮐背不藉鳩杖扶熙熙登春臺一一飫醍醐微臣何幸預宴酺竊禄五十年馬齒六十餘陽和布濩不遺栁與蒲稱觥鞠􅎽歡且呼古稀天子錫福同寰區刑部郎中王顯緒年六十八聖皇御宇五十載金甌玉燭開光昌維時龍飛春臣始隨鵷行臣忝乾隆丙辰士龍飛首科進從容郎署雞舌香旬宣南國自媿無寸長有負厥職心傍徨天恩髙厚洗瑕垢俾得常依日月星辰旁臣由部員外任安徽布政使獲咎蒙主事恩録用刑部歡從耆艾餐瓊漿鈞天廣奏聞鏗鏘温綸下降仁風揚甘露降庭芝生房國家刑清政簡邁虞唐華林鳳樓何足方冠裳濟濟福禄穰穰惟願彤墀肅拜共進南山觴刑部郎中運泰年六十二耆筵繩祖武懋祉錫寰區大衍羲爻紀重華舜德敷金芝綿奕禩玉斚酌中衢浩蕩風光裏恩榮荷獨殊刑部郎中文禄年六十七乞言尚齒慶時雍沛澤欣聞巽命重隆運中天瞻日麗盛時耆老亦雲從鵷行序處春光永鳩杖扶來瑞靄濃頌獻天仁齊拜手職慚淑問贊堯封刑部郎中蘇爾通阿年六十三備福因之錫福穰春臺熙皥普無疆萬年夀㝢歸涵育扶杖人皆願晉觴一青雲仙侣白雲司拜舞蹌蹌共一時從此逢春叶韶律長依化日咏遲遲二刑部郎中明德年六十四粤稽引年舊典洪惟我后時欽百壺周宴斯舉十日漢酺並斟貺以備禮備樂緬惟養陽養陰何必桓榮受錫辟雍佇法駕臨一瑞啓螽斯庭内恩濃魚藻池邉日月光臨葵向濩咸音叶􅏨緜仰覲龍光咫尺俯隨鵷序蹁躚小臣抃舞獻頌拜手稽首萬年二刑部郎中豐盛額年六十六一德風雲㑹三春雨露滋身依青𤨏闥職忝白雲司作解仁頻洽觀頤澤更施從知示慈惠黄髪遍丹墀一殿角曉風徐金鋪集彩裾祥延川至際福戴日升初屢省無刑意頻聞大有書同登太和宇芝柏藉春噓二刑部郎中赫敏年六十七大德必夀統位禄名原福之致令德是徵聖人握樞以御寰瀛皇世如春耆耉公卿正位凝命久道化成百禄是荷豫大豐亨古稀天子名莫與京函三為一夀量所并迄於庶位工作農耕引養引恬大生廣生爰集千叟盛禮慶行臣屬秋官孚讞是程仰窺聖治止辟無刑馬齒逾甲叨預光榮際仁壽世祝仁夀觥刑部郎中察朗阿年六十七介夀環星曜承恩到慶霄堂顔五代盛頌溢九如超上夀徵來備長生籙更饒璚漿仙斚渥鈞奏鳯儀調週甲齡旋筞初寅斗應杓協風韶嵗籥卿靄玉晨朝飫賜符周宴歡酺陋漢謠冬官臣忝屬露湛燕零蕭工部郎中篷林年六十五濟濟聨春醼遲遲聽曉籖千行年遞上五代福還兼已荷班分几還欣寵賚縑醖浮金掌露饌列水晶鹽白髮春風拂彤庭喜色添工虞叨職掌拜手頌堂㢘工部郎中順海年七十一惟邦六職工居一五材九範程功宻冬官記乃臣攸司省試兢兢虞愒日國家營建拓鴻規民子來因使民佚金隄楗埽屹於山粉堞垣墉比如櫛凡兹大役詎容己知過論聞天語述時雍氣召瑞呈圖敷錫恩當春廸吉般倕敢詡亮天工班馬還應慙載筆卿雲復旦際中天弧南又奏華星出工部郎中岱保住年六十五冬官職考工卅載叨濳郎臣食俸三十一年欣兹萬年㑹得預千叟觴一人山岳夀五世螽麟祥敷天頌膏澤率土躋樂康春韶啓新律逺近同依光珍㕑浥露湑文錦凝雲章不瞻蓬萊闕焉知日月長工部郎中覺羅巴彦泰年六十二身際郅隆皇運春登耆夀崇筵共仰成天平地各效虞水屯田班秩金爐紀瑞馨香粉署分妍糜禄叨榮何幸稱觴惟祝堯年工部郎中栢齡阿年七十皇帝仁壽甄殷陶虞三辰宣曜五嶽授圖首春俶祉泰陛孿孚嘉與國老式燕以濡臣忝都水仰覩聖謨海亹楗石河渠薪芻逾千百萬水衡委輸宣防鬟剔乂安八區太和翔洽雲天叶需東榮洗爵歡浹房壺寸葵晞照松偓同趨七旬開袠榮遇瑞符拜稽作頌以和康衢工部郎中都爾松阿年七十鳯城春色滿佳氣曉蘢葱玉陛聯千叟瓊筵列九重厭厭歌露湛濟濟叶雲從朱邸聯黄閣霑濡到老農一七十韶光展承恩卅載餘幸隨郎署後得預法筵初遲日涵春酎香煙拂禁除恩深何以報勤課考工書二工部郎中昆篤年六十二婆娑斑髩荷恩新耆老康强值泰辰踴躍躬逢元㑹合小年初覩八千春一兩朝曠典古無儔敷錫皇心協九疇五紀重開千叟宴一人長溥萬年庥二工部郎中明安年六十七粉署叨司飭五材鵷行此日濫追陪每懷匠石慙樗散更似侯薪附鼎來黄髪番番環紫極瑤枝葉葉耀金杯衰庸何以酬殊寵惟祝京垓夀㝢開工部郎中重安年六十二大地回春溢黍谷小草含滋煦晴旭郎曹竊禄㡬經年白首欣逢聖齡祝昇平人瑞普大千羣叟絡繹趨文筵恩賚旁敷遍衰朽飄翩杖履疑登仙綵勝銀花競韶麗五英六莖紛次第至尊含笑催傳觴仙藻還從九霄賜勝㑹嘉名曠古無一堂五代徵祥符共㸔喜起賡颺日更譜髙元集慶圖工部郎中宗室蘇成額年六十九衍派銀潢逈分暉若木崇蓼蕭恩溥洽行葦澤偏豐蓂莢晨紓緑霞漿日映紅禮成同拜手三祝效呼嵩理藩院郎中富爾遜年六十七厯官四十載職司在典屬恭逢郅化隆風聲暨羣服蒙古藩衛稱鴈臣嵗覲龍光典稠渥回部伯克内地諸土司更番面闕各有期幸生聖人世得遂瞻就私即今孟春月吉朝正時華筵序啓羅階墀有詔引年列陪貳歡呼鞠􅎽齊上萬嵗卮微臣衰劣盈鬢絲仙侣聨歩追瑤池再拜稽首衆星環北斗聖夀延洪悠以久惟曰至億年長此㑹千叟傳之史冊志不朽形諸咏歌古未有理藩院郎中富勒賀年七十四周禮懷方氏天家職貢圖微臣班典屬重譯稟藩符鱗集呼韓侍鴻賔頡利趨篇仍王㑹寫文是帝華敷夀鏡方懸㝢中尊更設衢恭陳南極曜翊拱北辰樞授几東西序聨茵甲乙鋪睿題瞻玉案仙膳出珍㕑籙總羲軒紀籌㸔山嶽輸還將無算爵錫福遍寰區理藩院郎中伊齡阿年七十三瀛寰蕩蕩車同軌盡布腹心聨臂指屏藩北衛卌九旗户闥西通二萬里皇仁普徧萬邦孚五十年深闓澤敷雁磧鶼城熙化日雪山蒲海盡康衢韶春旭綺宫雲絢雍容鶴侣駢朝彦益夀先呈益地圖極南星喜聨珠見内務府郎中班金泰年六十二糺縵卿雲䕶曉暾耆筵乍啓紀春元典隆繩武歌人瑞福錫宜民頌化源北漠東瀛添鶴算釋戈舍耒飫鳬樽三千人聽歡聲合抃舞難名大造恩一榮遇羲皇錫祉年引恬敷典敞嘉筵同依化宇栽培久用錫芸生福夀全豈有涓埃能上報惟欽膏澤總無偏盈廷耆叟蒙殊渥拜舞還賡及備員二内務府郎中仲山年六十二共遂瞻雲願偕申獻曝誠人間春晝永天上泰階平賜醴廵三爵論經辨五更瓊漿曾一酌仙籍注長生一錦繡山河麗升恒日月長喜扶天賜杖敬舉羽飛觴務比宗周職名同降嶽行惟嗤仲山甫無補舜垂裳二内務府郎中額爾金年八十一色朝衫綰綬緺玉階仙仗五更排海山佳氣籠丹地衢陌春姿轉緑荄欣覩六弧稱降嶽便酬三爵己如淮熙朝曠典儀重舉上日韶光福孔偕率土欣聞歌有慶普天共仰澤無涯扶鳩際此何叨幸齊聽􅗳􅗳翽鳯喈内務府郎中十格年六十八一人曼夀授泰秉恒二儀廵環附以衆星三代涵育共覩瑞徵四方來燕耆老盈廷五葉金枝振振緝繩六合熙熙慶洽歡騰七稽逢吉何以效靈八風叶律既和且平九府微臣乃得夀朋十千曰萬嵗祝倍并數名體内務府郎中希齡年六十七四十餘年錫賚頻耆筵今復侍楓宸大官進饌頒恩渥中使傳觴拜賜均養合膠庠三代禮情聨中外一家春含香侍直慙樗櫟載頌升恒祝聖人内務府郎中常貴年六十六奉御園承主恩蟲魚草木一例年年雨露均况值八埏九垓同慶之上春春風曉動璇閶啓祥雲羃䍥爐烟紫偓佺期羨同上萬年卮臣亦欣欣榮向此祝萬夀之洪延霑闓澤之溥長歌樂只樂未央原任郎中興保年七十六斗杓東轉新韶涵演垂鴻勒崇乘春輝闡帝德當陽介祉曼衍瑞鬰弧南矞哉盛典敞是耆筵渥慈普展錫羨添齡衎衎式宴臣職寅清臣原官禮部彝章遐緬恩予退閒夙興抱忝幸際昌辰奔趨力勉玉醴斯香瓊杯迴瀲祝效華封贊賡德範皇茂膺祺三五超踐原任郎中善岱年七十三貞觀符昌運恩波燕禮崇為郎分列宿展寀列司空臣前任工部陳力駑駘愧沾華雨露同餘齡知厚幸煦植荷春風原任郎中修禮年六十六條風協候曙光新嘉宴彤墀列㡬廵福自天臻膺曼羨恩叨帝錫惠彌綸甲周登選人華髮乙紀逢陽嵗孟春侑以和笙符奏雅饗斯朋酒叶歌豳行聨紳佩胥霑澤寵到茅芹亦飫醇席召頭班觴並授齒優九袠禮還均不湏潭菊争開醖得近仙蓬許問津榮及微臣三請祝盛傳前典六經旬監司曾列慚循職休養長兹煦令辰霑渥瓊漿歌燕衎太和洽慶荷鴻仁原任郎中袁守儀年六十六野鶴昻藏未是仙青雲飛歩不容攀豈知西省深嚴地老入明光踏舊班一不向安期覔棗􅏨强扶衰白拜君嘉十分灧瀲金杯凸坐覺春光照海涯二軾某蘇句原任郎中張模年六十一玉燭均調淑景開咸登夀愷集春臺年逢太乙天膏渥月正賓寅斗柄回篤慶一人敷億兆含飴五代衍雲來衢尊廣挹耆英㑹遍度條風綻栁梅一喜氣卿雲協大同賜酺齊到紫微宫扇來萐脯行㕑碧捧出霞銖映席紅仙樂鏗鏘聽縹緲御香馝馞裊冲融鳳啣丹詔從天下錫類今㸔秩典隆二閶闔門連瑞靄浮升恒斂福萃箕疇重光繩武開瓊席曼夀同文集海籌信有蕃釐隨地布歡臚純嘏迓天庥巍巍帝德真難並共仰堯章煥藻旒三生依輦轂厠清班臣由乾隆十七年戌散恩科進士蒙事恩選庶吉士甲館授刑部主衡校頻叨澤渥頒臣丙子奉辰蒙命為湖南副考官己夘陞本部員外郎庚恩記名御史又奉命為廣東正考官壬午分校北闈即奉命視學粤東任内陞吏部郎中祗愧才庸操玉尺每懐恩宥到蓬山晨雞自戀三元景駑馬猶依十二閑引領天閶隨擊壤春回蒲桺覲龍顔四翰林院侍讀八十二年六十二光依奎壁五雲多今日開筵洽太和好與玉堂増典故照藜仙杖錫鑾坡一香案前頭萬夀杯熙熙淑景樂春臺信知難老從天錫真向瀛洲侍宴來二原任翰林院侍講陳筌年六十五望奎壁占文昌鵷鸞濟濟欣回翔卜億萬年太平治具張巍乎煥乎瞻天章文學侍從臣榮列行木天髙蔭大小玉堂校書天禄懷藜光慚弗克副劉與揚惟仰乙夜燈右欽聖學之孜孜聆天語之煌煌七畧四部七志七録靡弗詳欽定四庫書三萬六千餘册標琳瑯屹以諸閣則有文淵文源文津文溯髙掛龍角蒼聿自金馬石渠蘭臺東觀總明德教麟趾仁夀文林之類歴代莫不沿珍藏未若我朝巨製直超書契以來什襲之汪洋復嘉惠天下士林賜以文瀾文宗文滙波首呉越恩孔長斯真大公之照日九芒而月十芒其下雖有天一叢柱倦圃傳是世學淡生千頃西亭菉竹之所蓄何足以稱搜羅包括于書倉微臣髦對螢一嚢無補纂多恐惶欣以馬齒得與拜宴登峻廊祝萬夀熾而康敬陳萬一守所常他弗暇及效賡揚江南道御史根長年六十一皇極環南極瑤觴拜紫微仙雲蓬島近韶景玉階輝仗立慙烏署烟雲染繡衣欣誇天錫夀新自賜筵歸山東道御史梁景陽年六十二稽首奉康爵臣職在臺中伏惟皇帝陛下聖闓澤渗漉湛恩龎鴻勤政朝乾夕惕若數逾千百萬至三至五普免天下惟正供臣昔忝宰屬臣由吏部郎中授御史小㢘大法綱紀整肅罔敢不靖共文德既洽耆武功聲教所暨我户我闥北漠及西濛以兹至德備諸福合萬萬算古稀天子與天崇盈廷預沃湛露濃潢汙行潦願附江漢同朝宗臣籍𨽻湖北山東道御史永清年六十六柏府地分清要楓宸人集耆英淑氣東皇乍轉夀星南極初明九醖尊浮沆瀣千行樂奏英莖嘉㑹於古未有小臣躬沐殊榮浙江道御史盛嘉祐年六十一鏡懸仁夀燕承需府事修和仰聖謨揚觶俯聆鈞奏協簪毫還幸殿巖趨㑹稽久陋元和簿燾載同歸輿地圖錫宴祗慙蘭省侍願將謠頌譜康衢山西道御史福克進年六十五紫殿晨開瑞靄重宴隨千叟慶遭逢臣心正似葵傾切聖澤真如露浥濃瑞洽一堂歌喜起賜逾三爵禮雍容却慙退食無封事奉職惟知矢靖恭陜西道御史景淑年六十七祥輝䕶閶闔瑞靄霏蓬萊太和溢夀㝢同樂臻春臺漿浥吉雲甕液泛流霞杯瞻就欣迎日舞蹈歡若雷拜職愧仗馬祝嘏隨耉鮐天㕑溉餘瀝斟酌堯尊開貴州道御史拴住年六十五烏府夙叨侍直赤墀今忝陪筵錫羨夀逾億萬賜酺春滿大千甘醖尊浮天酒金爐䄂繞御煙洛社方斯蔑矣瀛洲何以加焉一重熙典超圖牒芳筵㑹溢簪裾既醉詩備五福天保頌稱九如錫祉九重燕譽近光咫尺鸞除封事聖朝無闕紀恩願得恭書二欽定千叟宴詩巻十一
