body:
  text: 巻四預晏六十四人詩七十二首四品頂帯宗室永全年六十八甲殿溥瓊膏太乙東皇啟星從見丙占恩憶成丁始璇源演六戊臣生戊戌今年六十八共閲六戊黼衣燦兩已惇叙飫庚儀宴接辛盤美壬林頌宸極癸次仰億紀十幹體四品頂帯宗室果爾敏年六十七六葉丹蓂瑞彩敷九閶渥澤樂觀酺人來閬苑耆英㑹身在僊源積慶圖玉牒天家依日月金樽春色醉蓬壺懸知億載祥暉永景緯弧南氣似珠一詩歌行葦祈黄耉具邇曽聞禮有加至徳萬年膺寳籙純禧五葉衍皇家六街日麗趨青瑣三爵春濃醉紫霞頻嵗乾清邀宴賞榮叨章服拜㤙嘉二四品頂帯宗室康寧年六十七慶自銀潢篤㤙從綺甲延熙春開夀㝢瑞靄集華筵再見虞庠盛剛逢人日前餘齡䝉豢養何以答堯天四品頂帯宗室碩通年六十六天符昭貺延蕃釐春臺歌舞賡重熙君奭陳書頌平格曲臺記禮登期頥光華九族㤙先普屬籍同欣列簮組行葦方苞棣鄂輝前年式燕沾蘭醑開春太史獻嘉祥夀曜含暉暎斗匡七日恰先人日瑞萬齡永奉聖齡長堂開五福振麟衍禮洽三雍命䕫典扶杖龎眉際太平蒲筵綈几瑶階展聞説河逰紀放勲三千叟集鳯鸞羣小臣亦沐湛湛露九㝢咸瞻縵縵雲四品頂帯宗室星徳年六十五奕奕夀星㣲垣之北濟濟夀耆玉階之側有觩者觥淳和斯浥有翩者鳩靈夀斯執曰期曰頥如㡬如式如㡬如式聖攸輯矣曰期曰頥聖攸錫矣其輯維何大徳必得其錫維何景福來集需雲在天燕樂飲食於萬斯年歌咏聖徳四品頂帯宗室存敬年六十五魯頌詠三卿詩三夀作朋正義曰三卿也吕覽辨五叟未若機星明瑞應萬人夀我皇福龎鴻神筴泰元受諏辰廣宴開省醴㤙孔厚綵仗龍旗縿仙樂鯨鐘扣長筵羅樽罍列席彯纓綬幸此潢派分預兹酌春酒葛藟荷嘉䕃臺萊祝耆耉四品頂帯宗室努文泰年六十五皇猷鴻鬯洋溢徳聲協氣嘉應熏為太平聖人曼夀普洽含生矧列銀潢沗荷磐盟用偕黄髪拜舞抒誠華筵肆設載飫鼎烹魚藻具奏鳯翽和鳴仁風廣被天晷仰清九區克咸歡讌重賡祥源積衍帝治光亨盛哉樂乎醲化觀成四品頂帯宗室素正額年六十五聖皇斂疇福仁夀躋斯民貞符五十載茂典宣温綸月吉令始和湛露芳筵陳矞雲絢綵仗香靄凝楓宸韶韺叶雅奏沆瀣羅清醇禔福茂隆古繁祉欣具臻五世慶一堂麟趾歌振振百世玉牒衍一本銀潢親階墀敬獻夀歡洽億萬春四品頂帯宗室和爾根年六十五猗歟聖祖典隆熙皥我皇䋲武展親養老玉牒章組燕詒豐鎬頌美振鷺雅肄魚藻笙簧鐘鼓樂奏霄顥偕臣隣伍同仰康保萬年受祜長賡有道上下叶韻體四品頂帶宗室伊克騰額年六十五獻嵗祥開翊慶初九重㤙宴集華裾幸承茂緒尊堯胄更喜香炊賜禹餘六莢臚歡雲共藹兩階錫福露還湑仙音聼徹鈞韶奏嵩華聮聲遶玉除四品頂帯宗室謙益年六十五鳯紀辰奠三鴻圖甲啟五凝庥誠洽天闡業敬䋲祖瀛海被樂胥巖廊集多祜耆年聚大千聖澤超元古精神咸康彊賡揚齊古舞小臣沗在列侍宴繼惇叙大樂奏咸韺至文環繡黼唯歌億萬年熈春逰廣宇四品頂帯宗室雙玉年六十四慶襲宗潢系班聮振鷺行長筵輝耉耋瑞彩煥巖廊就日依光近稱觥介祉長寧惟歌既醉殊錫荷承筐四品頂帯宗室存誠年六十四執兕列丹陛簉鷺聮勾陳寧知白首年㤙光日以新耆筵布愷澤錫爵臨端春歡忭何所颺既酔詩重申虞廷上老老周道隆親親新㤙錫冠帯榮遇超臣隣四品頂帯宗室英保年六十四至道光昭三極天章無逸是箴仙蓂六葉斯啟玊斚千官載斟三老虞廷禮備百男周室慶深私幸榮叨華秩春殿爰揮舜琴四品頂帯宗室徳克登額年六十三昨嵗誼敦宗尺五依㤙光兹辰慶尚齒介景羅嘉祥身承天家榮兩度斟瑶觴華髪盈三千鳩杖聮鵷行更憶惇叙殿睿藻賜柏梁册載三預宴國㤙家有慶燕翼豐芑詩奕禩歌洋洋一唐堯睦九族四表歌徯應周文重本支子孫頌䋲䋲猗歟聖神代喜貺尤駢膺鴻庥十一世瑞牒傳雲仍推㤙及同姓冠帯均寵承況兹沛渥澤耆耉俱見徴小臣承寵恵拜手揚升恒二四品頂帯宗室永年六十三廣殿雲深雉尾開自天錫爵飫耆鮐小臣稽首榮章紱親沭堯仁惇叙來一寳籙斟元五十春無疆元㑹紀昌辰觚端瀛澨春齊到盡是呼嵩祝華人二四品頂帯宗室和亮年六十三如山崇萬夀環海慶三登水木沾㤙久椅桐賜宴仍一家春意盎九野日華昇嘉㑹千秋少蓬萊最上層一詔糈優品秩錫服荷光榮名附三千列歡同億兆情天家生自貴霄露近偏盈勲績㤙標史特上垂念宗室舊功傳敕纂王公勲績表追思殫寸誠二四品頂帯宗室文端年六十二泰和浹宙合景緯聮躔垣耆筵鴻慶洽際此韶春温尺五依天光一一承殊㤙分潢叨衍潤荷日欲獻暄豳觥祝萬夀翊序聮鷺鵷永惟効山呼拜手以颺言四品頂帯宗室徳滿年六十二琅霄景麗㤙光曨河珍岳瑞駢舂容聖皇御世軼邃古上越子姒超軒農東西輪輳朔南暨萬國赤子登喬松紀符乾䇿協坤䇿翹肖蠕動歸陶鎔穆清合徳如天福慶洽五代雲礽鍾十行之詔詔天下養老有典先辟雍皤然紳珮聚艾耋叟以千數倍復重青陽初開泰運發蓂徴六葉日六龍今年正月六龍治水神膏仙液飫天賜金支玉葉得䕃濃溯從甲子啟書契㡬見備福今所逢願與臣民及陪𨽻壌效康衢祝效封四品頂帯宗室永瓘年六十二分輝參寳序通籍列鴛行惇叙蒙㤙渥便蕃襲慶長治從貞觀洽春共瑞符昌懋典重華紀璇題五福堂千齡千叟晏九㝢九如章魚貫循瑶戺鮐顔浥瀣漿河沙應比算旭景共依光拜手同賡載仙磬叶八琅四品頂帯宗室赫靖年六十二璇樞啟序青陽應律嘉禮肇行芳筵斯秩有觩其兕有馨其椒肅雍充庭以播令韶三皇如春萬八千嵗俾爾夀臧華顛鮐背一曈曈若木布為金支開榮萌甲聖華被之行葦拜㤙復此耆宴慶錫便蕃雕盤珍篹歡臚鳩杖味飫仙厨椿齡億萬禮樂是謨二四品頂帯宗室色克年六十二天衢瑞叶春星燦彤廷曙啟卿雲爛龎眉皓首數三千九奏隆平起天半洋洋帝澤溥銀潢惇叙曾叨錫嘉宴五色雲中綺席新東瀛北漠和風徧人逰夀㝢總歡娱金漿玉醴闓澤殊偓佺期羡盈京都古稀天子億萬夀王㑹耆英冩合圖四品頂帯宗室蘇英額年六十一敷天夀鏡懸皇路北斗尊迴春賜酺熙朝人瑞符卿雲聖主㤙華溢湛露禮洽壬林杖飾鳩筵排甲乙廷充鷺願因燕喜奉霞觴嘉樂申延億萬祚四品頂帯宗室安祥年六十一斗柄指春寅霞標耀晴日燕衎飫醍醐推㤙始宗室昨嵗沛温綸受貺膺華秩耆筵兹復開垓極歡聲溢慶綿𤓰瓞多㤙協需雲吉願歌行葦篇重以天保什四品頂帯宗室玊星年六十一重熈協茂理嘉貺儲穹旻被風與濡化帀洽周崖根河海慶清宴月竁咸來賔我皇介繁祉握符闡坤珍三靈叶鴻祚五葉綿麟振作人頌夀考文治光璘彬煥乎四庫備樂矣三雍新衆瑞應期至甄育皇猷淳帝庸大敷錫夀㝢開王春耆耉集魏觀式燕涓芳辰禮交樂具舉忭舞三千人和氣互翕歘元符彌鬯臻純禧徳自洽景命時重申抒誠效嵩祝喜起聮臣隣四品頂帯宗室特克昇額年六十一五雲多處啟天閶宴錫韶華萬國揚泰運三登躋鶴夀本支百世荷龍光喬齡數協威儀備鴻慶春開大衍長幸際熈朝崇宿膳葵忱彌切效賡颺四品頂帯宗室造福年六十一璇源萬里衍慶長瓊㽔琳幹天中央附枝分潤煒㤙照俾得眉夀承龍光華春滿蓬莱殿新韶六日開嘉宴耆社還欣㸃末班瀛洲真喜參髙選蚴蟉玉杖輝青藜精鏐文綺寳墨題拜捧歡愉光暎席流霞飲釂觩文犀起祝聖人千萬嵗疊次瓊筵布慈恵五福堂前旭景舒雲來葉葉駢蓀砌四品頂帯宗室徳政年六十天門耆叟集靄靄五雲間序齒承華席隨肩肅曉班仙醽中使給珍賚尚方頒福溥春祺錫祥昭列宿環臚歡心就日獻頌夀如山長願堯階下年年覲聖顔四品頂帯宗室富森布年六十嘉祥洽仁宇竹柏凝甘露貞符協泰交引年蒙異數耆筵錫嘉慶寰海樂布濩溯源記玊水分條布瓊樹秩視四品崇派衍百世裕㤙深慶孔長不特歌榮遇一淳風嫓懐葛郅治登華胥六宇多耆耋引年邁古初舜琴歌南風堯樽置中衢盛筵㪺僊露階陛臚歡呼雍雍偓佺倫賡歌慶昌符翔泳夀㝢下其樂真于于二四品頂帯宗室明書年六十思皇多祐長發其祥天子穆穆萬夀無疆敷天之下載錫之光飲酒樂豈躋彼公堂一介爾景福自天申之肆筵設席夀考維祺雝雝在宫鼐鼎及鼒既飽以徳罄無不宜二蓼彼蕭斯維葉莫莫式序在位獻酬交錯食我農夫天子是若受言貺之云胡不樂三侯氏燕胥以洽百禮子孫千億介以繁祉本支百世蹌蹌濟濟酌彼康爵媚于天子四經集詩通政司副使賚圖年七十九卿雲五色籠金殿肅肅簮𥚑侍需宴薄海從占夀㝢開貞符載向昌辰見曈曨羲馭玉衡回晝接榮光濟濟來誼軌百年䋲祖武仁風萬里敞春臺帝庸作歌譜韶濩曲􅎽千行萃鵷鷺金鏞雅奏叶元音玉醴盈觴調湛露㣲臣出納仰皇謨葵藿傾陽夙願紆華顛頻喜丹綸捧綺席還欣玉戺趨大理寺少卿哈山年八十一忝竊朝班五十年欣瞻聖治勵行乾春回大地枯荄動恩到㣲臣湛露先爵捧丹墀齊拜手班分黄髪接差肩千人算衍京垓祝萬嵗聲符海嶽傳廷尉府中容伏棧耆英㑹裏預趨筵深仁詎有纎埃効鞠􅎽惟殷頌禱䖍大理寺少卿劉天成年六十二太平天子垂衣裳祝釐中外聮梯航龍飛御極五十載勲華格被超虞唐祖烈繼承錫春宴有叟附闕三千強熈熈春臺擴夀宇融和旭日開天閶爐烟馥郁繞仙仗旌旗日暖同趨蹌史䇿賜酺安足擬鹿鳴湛露歌宜詳九成樂奏羅虎拜三爵禮侑調鸞簧絡繹瓊筵列珍果參差玉盞浮金漿華貂爛漫雲錦麗碧珠璀璨牟尼光彩仗盤鳩倣靈夀仙芝如意輝朝陽便蕃天賜示優渥緯以雲漢垂奎章至隆極渥古未有聮班附列頌樂康㣲臣三巴藐一介卅載金闕儕鵷行執法詎能昭平允濫竽九列徒慚惶質如蒲栁猥週甲許隨耆耉同稱觴共被殊榮忭且舞如追驪赫遊羲皇呼嵩額手齊獻頌綿綿聖祚延無疆原任大理寺少卿都爾松阿年七十五㑹啟呈圖上筵開獻嵗初筴齡千叟綜牒福一人臚永錫歌難老重熈慶有餘依光輝景矞孚恵協華胥衢瑞符三祝詩箋演九如捧觴麟脯飫諧律鳯簫徐晷洽丹蓂晝名參寳笈書蓬門今䇿杖棘寺舊叨糈節迓韶年豫身涵化日舒㤙膏天上宴榮復到懸車太常寺少卿王杲年七十三宴協需雲衎符占景緯聮至人開夀㝢庶位錫耆年嘉㑹重熈盛長春萬載延詩成天上製人有地行僊算綜京垓積齡週甲子旋卿暉融廣殿璚醴沃初筵浙水慚司臬臣前任浙江按察使容臺佐典籩家依東海屋臣山東福山縣人籌獻願盈千太僕寺少卿齡昌年七十五三元啟淑景六月開芳辰聖人普錫慶耆筵集臣隣盛典依古罕繁祉從兹申鵷行綴瑶砌鶴髪趨華茵㣲臣沗卿貳三爵沾芳尊此生幸際遇㤙賚難具陳食禄既已渥服職惟矢勤飛黄頌伏皁欣值有道春蓼蕭賦譽處䇿駑依清塵太僕寺少卿孔敏文年六十五洪惟我皇夀世夀人優禮黄髪與物皆春㣲臣釋褐甲戌之辰天曺特擢幸荷絲綸捧持選牒跪近楓宸奔走厥職庶務勉遵東南㑹稽竹箭有筠風憲任重爰効撫循臣心悚惶巽命重申俾承旦夕得近陶鈞輿閑奉職騏驥調馴時和物茂沐我皇仁式宴嘉㑹千叟同倫峩峩列仗濟濟垂紳禮先瑶斚樂動金錞載歌載舞實惟風醇國子監祭酒覺羅吉善年六十一徳茂綿鴻運㤙滂錫介祺億齡開大衍九有慶重熙䋲武耆筵舉延庥福履綏祥呈蓂六葉豐兆麥雙岐瑞靄凝金戺和風布玉墀席分鱗次設齒序雁行差璇管咸韶協雲芽沆瀣滋鸞翔儀共肅鳩祝杖同持薄植儕樗櫟昌辰振羽儀鱣堂叨世禄臣父閩浙總督臣覺羅滿保於康熈四十五年曽任祭酒臣復蒙均叨領成皇上擢授兹職兩世㤙遇誠為希有蛾術媿専司璧水泉䟽脈雍宫地拓規擬陪香案吏恪奉聖人師丁皇上肇建辟雍鉅工告蕆釋奠講學臣恭逄盛詔於上典獲侍之私講帷榮幸預形慶忭甲子週巡始寅恭耉長隨臣年始六十一嵗而肩随欽賜司業銜郭鍾岳百有五齡乃聼講足徴熈朝盛事竒榮逢夀㝢願頌萬年詩内閣侍讀學士富崑年七十四糺雲耀仙仗瑞日光彤墀鈞天奏琅璈御酒盈瑶卮萬方集千叟咸仰春臺熈師師環百寮黄髪隆臯䕫飲和而食徳下至編氓蚩古稀錫燕慶五代綿鴻基文徳並武功千古盛於斯感頌遍九有覆載長無私燕樂承天貺羣歌保定詩内閣侍讀學士明禄年七十三省署叨分職薇郎愧典司慶逢千叟㑹春滿萬年枝受糈邀恩久論年逐序隨五雲暄麗處拜跪奉瑶卮内閣侍讀學士保良年七十山澤咸有慶地天泰乃交聖仁覆區夏六合歸符苞古稀協天夀上超皇燧巢國慶五十年耆耋養與教冠簮三千叟忭躍瞻雲旓錫爵特開筵豈數庠序膠獻嵗首行恵春風徧衡茅扶鳩䝉詔予慶喜推容包始知大君恩物與民同胞内閣侍讀學士明泰年七十法天行健古稀聖夀曜宣光暎仁鏡五世凝承五福疇千耆仰協千齡慶璧彩弧輝麗紫宸蒲筵綈几拜恩辰鶴翎度處僊籌積鳩杖扶時瑞靄新論思職沗絲綸署侍直朝朝對雞樹九㝢封圅獻樂康萬年盃斚承歡豫鳷鵲霏㣲曙景分鴻鸞簉羽玉階羣金盤幸捧三霄露瓊管恭書五色雲内閣侍讀學士五靈阿年六十六維清緝熙運際交泰帝庸施祉式宴嘉會眉梨之耋來抃于廷元暉朗照恵及區萌有垣者薇有階者葯夙塵清班今觀愷樂愷樂何如羡錫洪延仙椿峻茂維萬六千内閣侍讀學士曹學閔年六十四宴啟彤墀日嚮晨㣲臣倍感聖㤙頻甲週許續三千叟乾健方開五十春曽步花磚遷𤨏闥近承薇省列華紳澤宫已煥三雍制管見猶邀乙覽親思皇上肇建辟雍實由陳管睿裁汲古乃㤙及臣曹學閔昔年條見特沛綸著以三品京堂陞用臣遭逢深榮聖主褒奨踰常格外㤙施實幸温語特頒滋雨露榮階即轉沛絲綸柏梁聮咏名容附綺席分陪命更申何幸重霄依咫尺居然小草比松筠御厨絡繹珍肴燦僊醖芬蒀玉斚陳有喜天顔膺景貺無疆聖夀祝昌辰葵忱矢效賡颺願熙皥羣黎化澤均候補内閣侍讀學士吉夢熊年六十五升恒侔日月苞絡周乾坤兩舉千叟宴六十有四年䋲聖祖武惟聖人皇帝即阼五十春崇效卑法心乾乾四極四和元氣彌綸闢地三萬里黄金星石真見黄河源天文建七閣淵源津溯宗滙瀾教養天下臣民屢免惟正之供巨億萬萬緡東謁二京西幸五臺升嵩及岱濬防巨川築石捍海潮汐不撼亹施恵江浙經六巡行視學壁水環宫圓天篤純佑古稀天子五世生元孫絣釐錫羡雲來晜頒詔大賫㤙覃人神海耆百有五嵗跋履來七閩畨畨陪臣航朝鮮稱觥黄耉盈三千糺縵喜氣霱卿氛氲小臣蒲栁依大椿侍直清禁仰霽顔堯仁軒夀歌詠旦旦光華天翰林院侍讀學士永徳年六十四鳯琯乘陽日龍樓敕宴時彭羹調玉液堯酒賜金卮矍鑠羣聮武雍容溥介眉萬年基大衍五福迓龎祺蹌濟叨㤙澤班聮奉職司華顛趨鶴籞秘省沐鴻慈況遇嘉筵啟彌増瑞露滋自慚蒲栁質長此仰雲芝翰林院侍讀學士觀文年六十二春和日暖耀扶桑動地歡聲祝夀康玉液分沾湛露潤瓊卮還浥醴泉芳宛如閬苑僊班聚更卜蓬壺晝景長從此萬年綿國祚箕疇敷錫更無疆原任翰林院侍讀學士國柱年六十三大衍符元㑹初筵集珮珩詞林添掌故懋典廣耆英玉案依光近僊卮裛露榮天題齊捧讀不數舜廷賡一簮筆班曽㸃乗軺澤最優殊榮叨飲爵異數許扶鳩湛露凝蓬闕承雲奏酺樓萬年春有慶長被渥㤙稠翰林院侍講學士博通額年七十五鳯闕丹綸沛遥聞異數頒需雲䕃海㝢旭日敞天闗廣殿筵排秩彤庭叟入班耆英超洛社詩句記香山接武親瑶陛聮紳覲聖顔隆儀敷錫遍恩意洽人寰原任翰林院侍講學士圖鞳布年六十五金華巍殿曉光勻鈞石和調舜陛陳萬嵗絲綸敷洊福千門松竹藹濃春編開東閣匏簧振宇拓西陲版土馴農飽春犁兵貫革木天華髪共涵仁八音體四品銜管三山事李質穎年七十四古稀膺祚曼夀延荷衢提釐協地天嵗在旃蒙日云吉庚輝曉爛璇珠圓海涵春養彌六合嵩呼華祝極八埏引年用詔耆耋㑹尚齒逺溯虞周先容臺掌禮奉常樂御厨盤饌羅甘鮮憶從通籍濫科第崇資洊陟䝉陶甄節旄坐領愧顛越聖慈終始仍矜全恭逢樂宴歡夀㝢接醴尤幸陪恩筵玉階蹈舞顔有喜南山佳氣五雲巔江寧織造成善年六十九中外䝉優擢髙天雨露頻尚衣供黼黻司榷守闗津雞舌含青瑣龍墀拜紫宸臣前任奏事處行走署銜兼管鑰啟事捧絲綸星驛鳬趨遂花磚燕禮新問年稱下叟徧徳逮羣臣典越香山社恩逾洛水濵載歌魚藻樂長慶大千春淮闗監督福海年六十三閶闔晨開寳旭紅耆筵溥錫敞瑶宫琯調鈞樂元音暢露湛衢尊瑞液融斟雉人來千里外賜鳩詔下五雲中久司榷賦承㤙厚盛典重欣渥賚同光禄寺少卿宗室誠速年六十五博厚髙明貞以悠久聖人配之必得其夀臣之頌君日月山阜君乃錫民洪範衍九上下訢合純嘏單厚太和所蒸榮鏡宇宙慶萃百福燕開千叟矧乃近支璇源分胄以教以養維天幬覆昨歌洗爵前嵗臣叨預宗室宴今霑飲酎請祝聖人椿長瓞茂本支百世越周家右原任光禄寺少卿舒昌年六十九金門候管啟三陽拊石鳴球引鳯凰欣奉鸞絲聮鶴髪共擕鳩竹㑹鴛行九重春色匏樽貴萬國歡聲土鼓長飫賜㤙榮浹膚革宛看蟠木暎榑桑八音體鴻臚寺少卿何曰佩年六十三古稀天子萃貞符夀㝢延洪闓澤敷籌展萬千呈海屋蓍開五十兆河圖瑶階排當旉重席仙醴傳宣出正厨春靄氤氲交叶泰耆年衎樂宴承需九賔司贊㣲臣職千叟殊榮盛代模樂聼鈞韶環舜陛歌傳耕鑿遍堯衢漫將王㑹誇唐畫堪笑綿儀綴魯儒此日賜筵寛禮數酔歸兼有玉鳩扶原任鴻臚寺少卿寳雲年七十一大徳召至和飛霙同飫沃際此獻鳩辰酡顔暎晴旭璧水方春瀜芹藻迎暄緑延熈慶來礽六陽律調玉玉琯揚昭華金罇泛醽醁昔在仁皇時曾譜羣仙曲重開介夀筵拜受長生籙欽天監監正喜常年六十一韶回璇琯占豐穣矞雲爛爛呈千祥角亢騰精㑹箕尾下爥龎眉皓首聫鵷行臣職螭坳侍忝司太史令長調玉燭四時和在宥金甌九垓慶正朔頒書萬國朝燦如列宿承斗杓區區分野管窺耳惟天為大惟帝符唐堯引年鉅典欣再舉千叟當階鶴同舞奏夀人遊夀㝢庶民惟星協風雨蘿圖億載紫垣輝璧合珠聮貢天府欽天監監正髙慎思年六十二弱水西極西以嵗計程塗路阻記里鼔行少奇肱車一從利瑪竇來賔告祥符懐仁及若望推歩術匪踈繼忝司天臺年編時憲書大清大正朔萬年啟鴻謨聖祖學精深一氣天人儲協紀辨方正數理精藴攄豈繄西法宻皆秉神聖模請言奉朔地章亥古所無内列十七省朝鮮宅東嵎喀爾喀四部四十九旗臚琉球暨日本南交古明都我皇擴大之一四天下區卭筰衆彈丸凖回兩外郛日所入濛汜戸闥前溝渠隘神農九州矧六服唐虞一紀限象限漢唐何有乎二十八分野地與跬步俱誰言二萬里測以三角弧在天騐勾股在地皆皇輿但看時憲書横列名可呼今日千叟宴還如王㑹圖國子監司業額爾克圖年七十一大樂正大司成臣貳厥職心屏營士之秀者升諸學八旗子弟掄其英國書音義貫蒙古手口訓繹詳形聲譽髦斯士自童丱彎弓調馬一一期熟精臣舊隸夏官紅旗奏㨗飛騎迎皇威逺暢舞干羽翠翎耀首邀㤙榮今逢耆筵開又獲稱兕觥三千人共登蓬瀛天子仁夀四海昇平巍巍天為大蕩蕩能無名惟偕四門六館諸弟子詠歌圜水迎霓旌侯補司業王太岳年六十六聖皇昭大徳浩浩如天仁龍飛五十祀勲華軼前聞九圍増式廓六代歸陶甄圖書燦壁府鼔鐘振橋門禮樂昭天地寰宇同龎淳延洪天錫羡𤓰瓞綿雲昆元㑹既行慶大酺亦流㤙堯蓂六葉啟禹㑹三千陳殊珍充籩俎雅奏鏗琳珉愷樂在藻洽筐筥采菽新楙儀畢三爵蹈舞環楓宸兒齒與鮐背共作羲皇人洪惟一人慶斂敷及此民懐柔徧河嶽律吕諧風雲休氣塞六幕榮光耀三辰百産樂滋植四表惇尊親顧惟纎薄姿何能効涓塵願比芹曝獻長祝聖神君候補司業曹錫寳年六十三國家久道成傱萃庥徴現三階輝景卿四海樂澄絢古稀天子聖純嘏荷天眷五世歡同堂史冊實未見紀嵗值旃䝉龍飛符大衍䋲祖紹丕休懋舉千叟宴耼耳及龎眉承詔共懽忭臣年六十餘耆英幸為殿念臣弱冠時京兆預秋薦猥以薇省班得逐鑾坡彦方恐玷清華秋曹荷遷轉竊幸忝文衡典試赴梁汴視學奉温綸三晉更乗傳使事方告歸督儲出齊甸鉅任弗克勝奉職終冒譴矜憐感聖慈内補用郎掾惟時開石渠校書職謄繕恭邀奨叙㤙司業謬充選臣于四十二年山東粮道任内獲戾蒙㤙以部員補用旋奉命四庫館行走四十七年正月蒙㤙以國子監司業陞用無由報涓埃惟懐葵藿戀兹當夀㝢開雙闕景風煽趋隨國庶行共飫堯厨膳盛典古所無嵩呼洽歡嬿臣自通籍來屢荷大官饌憶昔己巳年金川大功臶賜晏豐澤園叨侍仰㤙眄臣于十四年在軍機處行走時以金川大功告成賜晏豐澤園曽頂前嵗壬寅春四庫敞文苑宴賚秘閣中榮頒筆與硯壬寅春四庫書成告承文綺㤙賜晏文淵閣並蒙賞賚筆硯等屈指逮今朝殊寵沐三徧重疊接龍光幾忘樗櫟賤洪惟景命隆延禧復錫羡階蓂六荚敷祥雲開宫扇鵷鷺列班行鈞樂奏廣殿耄耋共期頥駐顔同玉錬稱觴舉兕觥蹈舞相後先君歌臣載賡喜起溢簮弁拜陳萬夀詩南極祥光燦㤙賞司業銜郭鍾岳年百有五古稀天子天同夀含生賦性託髙厚㣲臣百五慶逢辰初生積嵗前辛酉自從襁褓識含哺長飽禹粮與堯韭身沐三朝煦育深目覩百嵗昇平久棘圍初入荷㤙綸榛麓當年咏薪槱商疇光近錫厥福夏諺侯度巡所守東南天臨五度時春秋臣正九十九獻頌中途手自書淡墨名邀特㫖授五載重逢六省方三春載拜羣工後頭銜優賜六品階命服章服佩瓊玖殊榮稠叠逮儒生異數驚傳沸人口臣将誇耀返里閭帝有㤙言動山藪詔開嘉讌仰重光籍列㣲臣與千叟龍光再覲覺冬温鳯藻親題自天牖新嘗正席邀賜食旋赴成均㐮登酒藉觀璧水大規模如厯銀河見星斗稽求典禮快所聞想像漢唐曽未有新正日暖日當天浹旬春入春盈缶彤扉迎旭萃鵷鸞玉墀授几皆耆耉髙句驪使亦引年札薩克臣並相耦臣得步履上雲霄髙吸沆瀣潤衰朽從今嵗月總恩賜老覺精神更抖擻歸為鄉黨説竒觀以此身名詫交友少卿竟遂出闗願漢郭丹冲晦羞與白雲偶宋郭雍犬馬依戀拱北辰子孫賦税勤南畝峩峩象魏炯長庚霏霏慶矞滋蟠糾至誠無息介鴻禔大徳日生育黔首萬民仰聖荷帡幪四海一家歌觧阜三多祝且陋封人萬年頌欲儕矇􅕓原任司業色布騰年七十三拜舞彤墀仰聖顔新沾渥澤自天頒春開六日輝雙闕叟宴千筵逮兩班瑞靄氤氲連雨露含生頌禱遍河山小臣荷賜欣翹首演漾仁風動九寰欽定千叟宴詩巻四
