body:
  text: 卷四預晏六十四人詩七十二首四品頂帶宗室永全年六十八甲殿溥瓊膏太乙東皇啓星從見丙占恩憶成丁始璇源演六戊臣生戊戌今年六十八共閲六戊黼衣燦兩已惇敘飫庚儀宴接辛盤美壬林頌宸極癸次仰億紀十幹體四品頂帶宗室果爾敏年六十七六葉丹蓂瑞彩敷九閶渥澤樂觀酺人來閬苑耆英會身在仙源積慶圖玉牒天家依日月金樽春色醉蓬壺懸知億載祥暉永景緯弧南氣似珠一詩歌行葦祈黃耉具邇曽聞禮有加至德萬年膺寶籙純禧五葉衍皇家六街日麗趨青瑣三爵春濃醉紫霞頻嵗乾清邀宴賞榮叨章服拜恩嘉二四品頂帶宗室康寧年六十七慶自銀潢篤恩從綺甲延熙春開夀宇瑞靄集華筵再見虞庠盛剛逢人日前餘齡蒙豢養何以答堯天四品頂帶宗室碩通年六十六天符昭貺延蕃釐春臺歌舞賡重熙君奭陳書頌平格曲臺記禮登期頥光華九族恩先普屬籍同欣列簮組行葦方苞棣鄂輝前年式燕沾蘭醑開春太史獻嘉祥夀曜含暉映斗匡七日恰先人日瑞萬齡永奉聖齡長堂開五福振麟衍禮洽三雍命夔典扶杖龎眉際太平蒲筵綈几瑶階展聞説河逰紀放勳三千叟集鳯鸞羣小臣亦沐湛湛露九宇咸瞻縵縵雲四品頂帶宗室星德年六十五奕奕夀星微垣之北濟濟夀耆玉階之側有觩者觥淳和斯浥有翩者鳩靈夀斯執曰期曰頥如幾如式如幾如式聖攸輯矣曰期曰頥聖攸錫矣其輯維何大德必得其錫維何景福來集需雲在天燕樂飲食於萬斯年歌咏聖德四品頂帶宗室存敬年六十五魯頌詠三卿詩三夀作朋正義曰三卿也吕覽辨五叟未若機星明瑞應萬人夀我皇福龎鴻神策泰元受諏辰廣宴開省醴恩孔厚綵仗龍旗縿仙樂鯨鐘扣長筵羅樽罍列席彯纓綬幸此潢派分預兹酌春酒葛藟荷嘉蔭臺萊祝耆耉四品頂帶宗室努文泰年六十五皇猷鴻鬯洋溢德聲協氣嘉應熏為太平聖人曼夀普洽含生矧列銀潢沗荷磐盟用偕黃髮拜舞抒誠華筵肆設載飫鼎烹魚藻具奏鳯翽和鳴仁風廣被天晷仰清九區克咸歡宴重賡祥源積衍帝治光亨盛哉樂乎醲化觀成四品頂帶宗室素正額年六十五聖皇斂疇福仁夀躋斯民貞符五十載茂典宣溫綸月吉令始和湛露芳筵陳矞雲絢綵仗香靄凝楓宸韶韺叶雅奏沆瀣羅清醇禔福茂隆古繁祉欣具臻五世慶一堂麟趾歌振振百世玉牒衍一本銀潢親階墀敬獻夀歡洽億萬春四品頂帶宗室和爾根年六十五猗歟聖祖典隆熙皥我皇繩武展親養老玉牒章組燕詒豐鎬頌美振鷺雅肄魚藻笙簧鐘鼓樂奏霄皓偕臣鄰伍同仰康保萬年受祜長賡有道上下叶韻體四品頂帶宗室伊克騰額年六十五獻嵗祥開翊慶初九重恩宴集華裾幸承茂緒尊堯胄更喜香炊賜禹餘六莢臚歡雲共藹兩階錫福露還湑仙音聼徹鈞韶奏嵩華聮聲繞玉除四品頂帶宗室謙益年六十五鳯紀辰奠三鴻圖甲啓五凝庥誠洽天闡業敬繩祖瀛海被樂胥巖廊集多祜耆年聚大千聖澤超元古精神咸康強賡揚齊古舞小臣沗在列侍宴繼惇敘大樂奏咸韺至文環繡黼唯歌億萬年熙春逰廣宇四品頂帶宗室雙玉年六十四慶襲宗潢系班聮振鷺行長筵輝耉耋瑞彩煥巖廊就日依光近稱觥介祉長寧惟歌既醉殊錫荷承筐四品頂帶宗室存誠年六十四執兕列丹陛簉鷺聮勾陳寧知白首年恩光日以新耆筵布愷澤錫爵臨端春歡忭何所揚既醉詩重申虞廷上老老周道隆親親新恩錫冠帶榮遇超臣鄰四品頂帶宗室英保年六十四至道光昭三極天章無逸是針仙蓂六葉斯啓玊斚千官載斟三老虞廷禮備百男周室慶深私幸榮叨華秩春殿爰揮舜琴四品頂帶宗室德克登額年六十三昨嵗誼敦宗尺五依恩光兹辰慶尚齒介景羅嘉祥身承天家榮兩度斟瑶觴華髮盈三千鳩杖聮鵷行更憶惇敘殿睿藻賜柏梁册載三預宴國恩家有慶燕翼豐芑詩奕祀歌洋洋一唐堯睦九族四表歌徯應周文重本支子孫頌繩繩猗歟聖神代喜貺尤駢膺鴻庥十一世瑞牒傳雲仍推恩及同姓冠帶均寵承況兹沛渥澤耆耉俱見徴小臣承寵惠拜手揚升恆二四品頂帶宗室永年六十三廣殿雲深雉尾開自天錫爵飫耆鮐小臣稽首榮章紱親沭堯仁惇敘來一寶籙斟元五十春無疆元會紀昌辰觚端瀛澨春齊到盡是呼嵩祝華人二四品頂帶宗室和亮年六十三如山崇萬夀環海慶三登水木沾恩久椅桐賜宴仍一家春意盎九野日華升嘉會千秋少蓬萊最上層一詔糈優品秩錫服荷光榮名附三千列歡同億兆情天家生自貴霄露近偏盈勳績恩標史特上垂念宗室舊功傳敕纂王公勳績表追思殫寸誠二四品頂帶宗室文端年六十二泰和浹宙合景緯聮躔垣耆筵鴻慶洽際此韶春溫尺五依天光一一承殊恩分潢叨衍潤荷日欲獻暄豳觥祝萬夀翊序聮鷺鵷永惟效山呼拜手以揚言四品頂帶宗室德滿年六十二琅霄景麗恩光曨河珍嶽瑞駢舂容聖皇御世軼邃古上越子姒超軒農東西輪輳朔南暨萬國赤子登喬松紀符乾䇿協坤䇿翹肖蠕動歸陶鎔穆清合德如天福慶洽五代雲礽鍾十行之詔詔天下養老有典先辟雍皤然紳珮聚艾耋叟以千數倍復重青陽初開泰運發蓂徴六葉日六龍今年正月六龍治水神膏仙液飫天賜金支玉葉得蔭濃溯從甲子啓書契幾見備福今所逢願與臣民及陪𨽻壤效康衢祝效封四品頂帶宗室永瓘年六十二分輝參寶序通籍列鴛行惇敘蒙恩渥便蕃襲慶長治從貞觀洽春共瑞符昌懋典重華紀璇題五福堂千齡千叟晏九宇九如章魚貫循瑶戺鮐顔浥瀣漿河沙應比算旭景共依光拜手同賡載仙磬叶八琅四品頂帶宗室赫靖年六十二璇樞啓序青陽應律嘉禮肇行芳筵斯秩有觩其兕有馨其椒肅雍充庭以播令韶三皇如春萬八千嵗俾爾夀臧華顛鮐背一曈曈若木布為金支開榮萌甲聖華被之行葦拜恩復此耆宴慶錫便蕃雕盤珍纂歡臚鳩杖味飫仙厨椿齡億萬禮樂是謨二四品頂帶宗室色克年六十二天衢瑞叶春星燦彤廷曙啓卿雲爛龎眉皓首數三千九奏隆平起天半洋洋帝澤溥銀潢惇敘曾叨錫嘉宴五色雲中綺席新東瀛北漠和風遍人逰夀宇總歡娛金漿玉醴闓澤殊偓佺期羡盈京都古稀天子億萬夀王會耆英寫合圖四品頂帶宗室蘇英額年六十一敷天夀鏡懸皇路北斗尊回春賜酺熙朝人瑞符卿雲聖主恩華溢湛露禮洽壬林杖飾鳩筵排甲乙廷充鷺願因燕喜奉霞觴嘉樂申延億萬祚四品頂帶宗室安祥年六十一斗柄指春寅霞標耀晴日燕衎飫醍醐推恩始宗室昨嵗沛溫綸受貺膺華秩耆筵兹復開垓極歡聲溢慶綿瓜瓞多恩協需雲吉願歌行葦篇重以天保什四品頂帶宗室玊星年六十一重熙協茂理嘉貺儲穹旻被風與濡化匝洽周崖根河海慶清宴月竁咸來賔我皇介繁祉握符闡坤珍三靈叶鴻祚五葉綿麟振作人頌夀考文治光璘彬煥乎四庫備樂矣三雍新衆瑞應期至甄育皇猷淳帝庸大敷錫夀宇開王春耆耉集魏觀式燕涓芳辰禮交樂具舉忭舞三千人和氣互翕歘元符彌鬯臻純禧德自洽景命時重申抒誠效嵩祝喜起聮臣鄰四品頂帶宗室特克升額年六十一五雲多處啓天閶宴錫韶華萬國揚泰運三登躋鶴夀本支百世荷龍光喬齡數協威儀備鴻慶春開大衍長幸際熙朝崇宿膳葵忱彌切效賡揚四品頂帶宗室造福年六十一璇源萬里衍慶長瓊㽔琳幹天中央附枝分潤煒恩照俾得眉夀承龍光華春滿蓬萊殿新韶六日開嘉宴耆社還欣點末班瀛洲真喜參髙選蚴蟉玉杖輝青藜精鏐文綺寶墨題拜捧歡愈光映席流霞飲釂觩文犀起祝聖人千萬嵗疊次瓊筵布慈惠五福堂前旭景舒雲來葉葉駢蓀砌四品頂帶宗室德政年六十天門耆叟集靄靄五雲間序齒承華席隨肩肅曉班仙醽中使給珍賚尚方頒福溥春祺錫祥昭列宿環臚歡心就日獻頌夀如山長願堯階下年年覲聖顔四品頂帶宗室富森布年六十嘉祥洽仁宇竹柏凝甘露貞符協泰交引年蒙異數耆筵錫嘉慶寰海樂布濩溯源記玊水分條布瓊樹秩視四品崇派衍百世裕恩深慶孔長不特歌榮遇一淳風嫓懷葛郅治登華胥六宇多耆耋引年邁古初舜琴歌南風堯樽置中衢盛筵㪺仙露階陛臚歡呼雍雍偓佺倫賡歌慶昌符翔泳夀宇下其樂真于于二四品頂帶宗室明書年六十思皇多祐長發其祥天子穆穆萬夀無疆敷天之下載錫之光飲酒樂豈躋彼公堂一介爾景福自天申之肆筵設席夀考維祺雍雍在宫鼐鼎及鼒既飽以德罄無不宜二蓼彼蕭斯維葉莫莫式序在位獻酬交錯食我農夫天子是若受言貺之云胡不樂三侯氏燕胥以洽百禮子孫千億介以繁祉本支百世蹌蹌濟濟酌彼康爵媚于天子四經集詩通政司副使賚圖年七十九卿雲五色籠金殿肅肅簮𥚑侍需宴薄海從占夀宇開貞符載向昌辰見曈曨羲馭玉衡回晝接榮光濟濟來誼軌百年繩祖武仁風萬里敞春臺帝庸作歌譜韶濩曲􅎽千行萃鵷鷺金鏞雅奏叶元音玉醴盈觴調湛露微臣出納仰皇謨葵藿傾陽夙願紆華顛頻喜丹綸捧綺席還欣玉戺趨大理寺少卿哈山年八十一忝竊朝班五十年欣瞻聖治勵行乾春回大地枯荄動恩到微臣湛露先爵捧丹墀齊拜手班分黃髮接差肩千人算衍京垓祝萬嵗聲符海嶽傳廷尉府中容伏棧耆英會裏預趨筵深仁詎有纎埃效鞠􅎽惟殷頌禱虔大理寺少卿劉天成年六十二太平天子垂衣裳祝釐中外聮梯航龍飛御極五十載勳華格被超虞唐祖烈繼承錫春宴有叟附闕三千強熙熙春臺擴夀宇融和旭日開天閶爐煙馥郁繞仙仗旌旗日暖同趨蹌史䇿賜酺安足擬鹿鳴湛露歌宜詳九成樂奏羅虎拜三爵禮侑調鸞簧絡繹瓊筵列珍果參差玉盞浮金漿華貂爛漫雲錦麗碧珠璀璨牟尼光彩仗盤鳩倣靈夀仙芝如意輝朝陽便蕃天賜示優渥緯以雲漢垂奎章至隆極渥古未有聮班附列頌樂康微臣三巴藐一介卅載金闕儕鵷行執法詎能昭平允濫竽九列徒慚惶質如蒲栁猥周甲許隨耆耉同稱觴共被殊榮忭且舞如追驪赫遊羲皇呼嵩額手齊獻頌綿綿聖祚延無疆原任大理寺少卿都爾松阿年七十五會啓呈圖上筵開獻嵗初策齡千叟綜牒福一人臚永錫歌難老重熙慶有餘依光輝景矞孚惠協華胥衢瑞符三祝詩箋演九如捧觴麟脯飫諧律鳯簫徐晷洽丹蓂晝名參寶笈書蓬門今䇿杖棘寺舊叨糈節迓韶年豫身涵化日舒恩膏天上宴榮復到懸車太常寺少卿王杲年七十三宴協需雲衎符占景緯聮至人開夀宇庶位錫耆年嘉會重熙盛長春萬載延詩成天上製人有地行仙算綜京垓積齡周甲子旋卿暉融廣殿璚醴沃初筵浙水慚司臬臣前任浙江按察使容臺佐典籩家依東海屋臣山東福山縣人籌獻願盈千太僕寺少卿齡昌年七十五三元啓淑景六月開芳辰聖人普錫慶耆筵集臣鄰盛典依古罕繁祉從兹申鵷行綴瑶砌鶴髮趨華茵微臣沗卿二三爵沾芳尊此生幸際遇恩賚難具陳食祿既已渥服職惟矢勤飛黃頌伏皂欣值有道春蓼蕭賦譽處䇿駑依清塵太僕寺少卿孔敏文年六十五洪惟我皇夀世夀人優禮黃髮與物皆春微臣釋褐甲戌之辰天曺特擢幸荷絲綸捧持選牒跪近楓宸奔走厥職庶務勉遵東南會稽竹箭有筠風憲任重爰效撫循臣心悚惶巽命重申俾承旦夕得近陶鈞輿間奉職騏驥調馴時和物茂沐我皇仁式宴嘉會千叟同倫峩峩列仗濟濟垂紳禮先瑶斚樂動金錞載歌載舞實惟風醇國子監祭酒覺羅吉善年六十一德茂綿鴻運恩滂錫介祺億齡開大衍九有慶重熙繩武耆筵舉延庥福履綏祥呈蓂六葉豐兆麥雙岐瑞靄凝金戺和風布玉墀席分鱗次設齒序雁行差璇管咸韶協雲芽沆瀣滋鸞翔儀共肅鳩祝杖同持薄植儕樗櫟昌辰振羽儀鱣堂叨世祿臣父閩浙總督臣覺羅滿保於康熙四十五年曽任祭酒臣復蒙均叨領成皇上擢授兹職兩世恩遇誠為希有蛾術愧専司璧水泉疏脈雍宫地拓規擬陪香案吏恪奉聖人師丁皇上肇建辟雍巨工告蕆釋奠講學臣恭逄盛詔於上典獲侍之私講帷榮幸預形慶忭甲子周巡始寅恭耉長隨臣年始六十一嵗而肩隨欽賜司業銜郭鍾嶽百有五齡乃聼講足徴熙朝盛事竒榮逢夀宇願頌萬年詩內閣侍讀學士富崑年七十四糾雲耀仙仗瑞日光彤墀鈞天奏琅璈御酒盈瑶卮萬方集千叟咸仰春臺熙師師環百寮黃髮隆臯夔飲和而食德下至編氓蚩古稀錫燕慶五代綿鴻基文德並武功千古盛於斯感頌遍九有覆載長無私燕樂承天貺羣歌保定詩內閣侍讀學士明祿年七十三省署叨分職薇郎愧典司慶逢千叟會春滿萬年枝受糈邀恩久論年逐序隨五雲暄麗處拜跪奉瑶卮內閣侍讀學士保良年七十山澤咸有慶地天泰乃交聖仁覆區夏六合歸符苞古稀協天夀上超皇燧巢國慶五十年耆耋養與教冠簮三千叟忭躍瞻雲旓錫爵特開筵豈數庠序膠獻嵗首行惠春風遍衡茅扶鳩蒙詔豫慶喜推容包始知大君恩物與民同胞內閣侍讀學士明泰年七十法天行健古稀聖夀曜宣光映仁鏡五世凝承五福疇千耆仰協千齡慶璧彩弧輝麗紫宸蒲筵綈几拜恩辰鶴翎度處仙籌積鳩杖扶時瑞靄新論思職沗絲綸署侍直朝朝對雞樹九宇封函獻樂康萬年杯斚承歡豫鳷鵲霏微曙景分鴻鸞簉羽玉階羣金盤幸捧三霄露瓊管恭書五色雲內閣侍讀學士五靈阿年六十六維清緝熙運際交泰帝庸施祉式宴嘉會眉梨之耋來抃于廷元暉朗照惠及區萌有垣者薇有階者藥夙塵清班今觀愷樂愷樂何如羡錫洪延仙椿峻茂維萬六千內閣侍讀學士曹學閔年六十四宴啓彤墀日嚮晨微臣倍感聖恩頻甲周許續三千叟乾健方開五十春曽步花磚遷瑣闥近承薇省列華紳澤宫已煥三雍制管見猶邀乙覽親思皇上肇建辟雍實由陳管睿裁汲古乃恩及臣曹學閔昔年條見特沛綸著以三品京堂升用臣遭逢深榮聖主褒奬踰常格外恩施實幸溫語特頒滋雨露榮階即轉沛絲綸柏梁聮咏名容附綺席分陪命更申何幸重霄依咫尺居然小草比松筠御厨絡繹珍肴燦仙醖芬蒀玉斚陳有喜天顔膺景貺無疆聖夀祝昌辰葵忱矢效賡揚願熙皥羣黎化澤均候補內閣侍讀學士吉夢熊年六十五升恆侔日月苞絡周乾坤兩舉千叟宴六十有四年繩聖祖武惟聖人皇帝即阼五十春崇效卑法心乾乾四極四和元氣彌綸闢地三萬里黃金星石真見黃河源天文建七閣淵源津溯宗滙瀾教養天下臣民屢免惟正之供巨億萬萬緡東謁二京西幸五臺升嵩及岱濬防巨川築石捍海潮汐不撼亹施惠江浙經六巡行視學壁水環宫圓天篤純佑古稀天子五世生元孫絣釐錫羡雲來晜頒詔大賫恩覃人神海耆百有五嵗跋履來七閩畨畨陪臣航朝鮮稱觥黃耉盈三千糾縵喜氣霱卿氛氲小臣蒲栁依大椿侍直清禁仰霽顔堯仁軒夀歌詠旦旦光華天翰林院侍讀學士永德年六十四鳯琯乘陽日龍樓敕宴時彭羹調玉液堯酒賜金卮矍鑠羣聮武雍容溥介眉萬年基大衍五福迓龎祺蹌濟叨恩澤班聮奉職司華顛趨鶴籞祕省沐鴻慈況遇嘉筵啓彌增瑞露滋自慚蒲栁質長此仰雲芝翰林院侍讀學士觀文年六十二春和日暖耀扶桑動地歡聲祝夀康玉液分沾湛露潤瓊卮還浥醴泉芳宛如閬苑仙班聚更卜蓬壺晝景長從此萬年綿國祚箕疇敷錫更無疆原任翰林院侍讀學士國柱年六十三大衍符元會初筵集珮珩詞林添掌故懋典廣耆英玉案依光近仙卮裛露榮天題齊捧讀不數舜廷賡一簮筆班曽點乘軺澤最優殊榮叨飲爵異數許扶鳩湛露凝蓬闕承雲奏酺樓萬年春有慶長被渥恩稠翰林院侍講學士博通額年七十五鳯闕丹綸沛遙聞異數頒需雲蔭海宇旭日敞天關廣殿筵排秩彤庭叟入班耆英超洛社詩句記香山接武親瑶陛聮紳覲聖顔隆儀敷錫遍恩意洽人寰原任翰林院侍講學士圖鞳布年六十五金華巍殿曉光勻鈞石和調舜陛陳萬嵗絲綸敷洊福千門松竹藹濃春編開東閣匏簧振宇拓西陲版土馴農飽春犁兵貫革木天華髮共涵仁八音體四品銜管三山事李質穎年七十四古稀膺祚曼夀延荷衢提釐協地天嵗在旃蒙日云吉庚輝曉爛璇珠圓海涵春養彌六合嵩呼華祝極八埏引年用詔耆耋會尚齒逺溯虞周先容臺掌禮奉常樂御厨盤饌羅甘鮮憶從通籍濫科第崇資洊陟蒙陶甄節旄坐領愧顛越聖慈終始仍矜全恭逢樂宴歡夀宇接醴尤幸陪恩筵玉階蹈舞顔有喜南山佳氣五雲巔江寧織造成善年六十九中外蒙優擢髙天雨露頻尚衣供黼黻司榷守關津雞舌含青瑣龍墀拜紫宸臣前任奏事處行走署銜兼管鑰啓事捧絲綸星驛鳬趨遂花磚燕禮新問年稱下叟遍德逮羣臣典越香山社恩逾洛水濵載歌魚藻樂長慶大千春淮關監督福海年六十三閶闔晨開寶旭紅耆筵溥錫敞瑶宫琯調鈞樂元音暢露湛衢尊瑞液融斟雉人來千里外賜鳩詔下五雲中久司榷賦承恩厚盛典重欣渥賚同光祿寺少卿宗室誠速年六十五博厚髙明貞以悠久聖人配之必得其夀臣之頌君日月山阜君乃錫民洪範衍九上下欣合純嘏單厚太和所蒸榮鏡宇宙慶萃百福燕開千叟矧乃近支璇源分胄以教以養維天幬覆昨歌洗爵前嵗臣叨預宗室宴今霑飲酎請祝聖人椿長瓞茂本支百世越周家右原任光祿寺少卿舒昌年六十九金門候管啓三陽拊石鳴球引鳯凰欣奉鸞絲聮鶴髮共擕鳩竹會鴛行九重春色匏樽貴萬國歡聲土鼓長飫賜恩榮浹膚革宛看蟠木映榑桑八音體鴻臚寺少卿何曰佩年六十三古稀天子萃貞符夀宇延洪闓澤敷籌展萬千呈海屋蓍開五十兆河圖瑶階排當敷重席仙醴傳宣出正厨春靄氤氲交叶泰耆年衎樂宴承需九賔司贊微臣職千叟殊榮盛代模樂聼鈞韶環舜陛歌傳耕鑿遍堯衢漫將王會誇唐畫堪笑綿儀綴魯儒此日賜筵寬禮數醉歸兼有玉鳩扶原任鴻臚寺少卿寶雲年七十一大德召至和飛霙同飫沃際此獻鳩辰酡顔映晴旭璧水方春瀜芹藻迎暄緑延熙慶來礽六陽律調玉玉琯揚昭華金樽泛醽醁昔在仁皇時曾譜羣仙曲重開介夀筵拜受長生籙欽天監監正喜常年六十一韶回璇琯占豐穰矞雲爛爛呈千祥角亢騰精會箕尾下爥龎眉皓首聫鵷行臣職螭坳侍忝司太史令長調玉燭四時和在宥金甌九垓慶正朔頒書萬國朝燦如列宿承斗杓區區分野管窺耳惟天為大惟帝符唐堯引年巨典欣再舉千叟當階鶴同舞奏夀人遊夀宇庶民惟星協風雨蘿圖億載紫垣輝璧合珠聮貢天府欽天監監正髙慎思年六十二弱水西極西以嵗計程塗路阻記里鼓行少奇肱車一從利瑪竇來賔告祥符懷仁及若望推步術匪踈繼忝司天臺年編時憲書大清大正朔萬年啓鴻謨聖祖學精深一氣天人儲協紀辨方正數理精藴攄豈繄西法密皆秉神聖模請言奉朔地章亥古所無內列十七省朝鮮宅東嵎喀爾喀四部四十九旗臚琉球暨日本南交古明都我皇擴大之一四天下區卭筰衆彈丸凖回兩外郛日所入濛汜戶闥前溝渠隘神農九州矧六服唐虞一紀限象限漢唐何有乎二十八分野地與跬步俱誰言二萬里測以三角弧在天驗勾股在地皆皇輿但看時憲書橫列名可呼今日千叟宴還如王會圖國子監司業額爾克圖年七十一大樂正大司成臣二厥職心屏營士之秀者升諸學八旗子弟掄其英國書音義貫蒙古手口訓繹詳形聲譽髦斯士自童丱彎弓調馬一一期熟精臣舊隸夏官紅旗奏捷飛騎迎皇威逺暢舞干羽翠翎耀首邀恩榮今逢耆筵開又獲稱兕觥三千人共登蓬瀛天子仁夀四海升平巍巍天為大蕩蕩能無名惟偕四門六館諸弟子詠歌圜水迎霓旌侯補司業王太嶽年六十六聖皇昭大德浩浩如天仁龍飛五十祀勳華軼前聞九圍增式廓六代歸陶甄圖書燦壁府鼓鐘振橋門禮樂昭天地寰宇同龎淳延洪天錫羡瓜瓞綿雲昆元會既行慶大酺亦流恩堯蓂六葉啓禹會三千陳殊珍充籩俎雅奏鏗琳珉愷樂在藻洽筐筥采菽新楙儀畢三爵蹈舞環楓宸兒齒與鮐背共作羲皇人洪惟一人慶斂敷及此民懷柔遍河嶽律吕諧風雲休氣塞六幕榮光耀三辰百産樂滋植四表惇尊親顧惟纎薄姿何能效涓塵願比芹曝獻長祝聖神君候補司業曹錫寶年六十三國家久道成傱萃庥徴現三階輝景卿四海樂澄絢古稀天子聖純嘏荷天眷五世歡同堂史册實未見紀嵗值旃蒙龍飛符大衍繩祖紹丕休懋舉千叟宴聃耳及龎眉承詔共歡忭臣年六十餘耆英幸為殿念臣弱冠時京兆預秋薦猥以薇省班得逐鑾坡彥方恐玷清華秋曹荷遷轉竊幸忝文衡典試赴梁汴視學奉溫綸三晉更乘傳使事方告歸督儲出齊甸巨任弗克勝奉職終冒譴矜憐感聖慈內補用郎掾惟時開石渠校書職謄繕恭邀奬敘恩司業謬充選臣于四十二年山東糧道任內獲戾蒙恩以部員補用旋奉命四庫館行走四十七年正月蒙恩以國子監司業升用無由報涓埃惟懷葵藿戀兹當夀宇開雙闕景風煽趨隨國庶行共飫堯厨膳盛典古所無嵩呼洽歡嬿臣自通籍來屢荷大官饌憶昔己巳年金川大功臶賜晏豐澤園叨侍仰恩眄臣于十四年在軍機處行走時以金川大功告成賜晏豐澤園曽頂前嵗壬寅春四庫敞文苑宴賚祕閣中榮頒筆與硯壬寅春四庫書成告承文綺恩賜晏文淵閣並蒙賞賚筆硯等屈指逮今朝殊寵沐三遍重疊接龍光幾忘樗櫟賤洪惟景命隆延禧復錫羡階蓂六莢敷祥雲開宫扇鵷鷺列班行鈞樂奏廣殿耄耋共期頥駐顔同玉錬稱觴舉兕觥蹈舞相後先君歌臣載賡喜起溢簮辨拜陳萬夀詩南極祥光燦恩賞司業銜郭鍾嶽年百有五古稀天子天同夀含生賦性託髙厚微臣百五慶逢辰初生積嵗前辛酉自從襁褓識含哺長飽禹糧與堯韭身沐三朝煦育深目覩百嵗升平久棘圍初入荷恩綸榛麓當年咏薪槱商疇光近錫厥福夏諺侯度巡所守東南天臨五度時春秋臣正九十九獻頌中途手自書淡墨名邀特旨授五載重逢六省方三春載拜羣工後頭銜優賜六品階命服章服佩瓊玖殊榮稠疊逮儒生異數驚傳沸人口臣將誇耀返里閭帝有恩言動山藪詔開嘉宴仰重光籍列微臣與千叟龍光再覲覺冬溫鳯藻親題自天牖新嘗正席邀賜食旋赴成均襄登酒藉觀璧水大規模如厯銀河見星斗稽求典禮快所聞想像漢唐曽未有新正日暖日當天浹旬春入春盈缶彤扉迎旭萃鵷鸞玉墀授几皆耆耉髙句驪使亦引年札薩克臣並相耦臣得步履上雲霄髙吸沆瀣潤衰朽從今嵗月總恩賜老覺精神更抖擻歸為鄉黨説竒觀以此身名詫交友少卿竟遂出關願漢郭丹沖晦羞與白雲偶宋郭雍犬馬依戀拱北辰子孫賦稅勤南畝峩峩象魏炯長庚霏霏慶矞滋蟠糾至誠無息介鴻禔大德日生育黔首萬民仰聖荷帡幪四海一家歌解阜三多祝且陋封人萬年頌欲儕矇􅕓原任司業色布騰年七十三拜舞彤墀仰聖顔新沾渥澤自天頒春開六日輝雙闕叟宴千筵逮兩班瑞靄氤氲連雨露含生頌禱遍河山小臣荷賜欣翹首演漾仁風動九寰欽定千叟宴詩卷四
