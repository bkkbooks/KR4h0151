body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年卷二十六預宴一百十一人詩一百三十首蘇拉喜住年八十律遲太蔟管門啓紫宸關仙仗環雙闕五彩爛相宣安期羡門輩其夀皆千年相引朝玉京向北仰天顔德星錫人福熙熙春日至湛露浮堯酒醴泉流出地光華下鷗鷺清輝與靈氣同立白玉墀拜舞呼萬歲數盈二十萬髙意猶未已同生大塊間幸逢太平代至尊德廣之所及南臨贍部三千界積德重熙有餘慶一人有慶兆民賴春歡雨露同霑澤黃麻敕勝長生籙異彩竒文相隱映除却三山五天竺花簇紫霞英得列嘉樹中嵗嵗似今年年年過春風集白居易句蘇拉七十五年七十四仁宇羣泳翶聖皇普嘉瑞啿啿皆登春耆筵敷渥惠曈曨閶闔開燦爛鸞皇萃黻黼舒藻飾笙簧調間吹敬從墀陛隅天容覿怡粹臚歡蹈舞齊恩施榮暨被蘇拉七十三年七十五巍巍閶闔慶雲開耄耋熙怡接武來廷藹祥風羅寶宴人依化日到春臺恩綸共荷三元節瑞液同㪺萬夀杯何幸下臣叨異數榮偕仙侣沐天培蘇拉德福年七十六帝德緝熙誕敷膏澤寰宇登春醲化滋液韶春集釐恩頒綺席愷浹藻蒲茂歌松柏鶴髮鵷班依光咫尺酌斗引年普天怡懌蘇拉白格年七十六帝澤如春敞綺筵熙朝眉夀肅班聫親從天上分甘露抃頌昌祺億萬年一玉琯韶開瑞靄融歌衢祝華矢葵衷童顔鶴髮三千侣都在堯天舜日中二蘇拉拴住年七十七宸極敷多福耆筵燦九霄歌詩同樂愷張樂鬯鈞韶令節開人日洪恩荷聖朝稱觴咸拜手三祝附羣僚蘇拉七十三年七十四維皇綏夀夀無疆恩紀渥洽頤且康上春六日覲紫極聫翩耆叟㪺千觴五福五代膺昊貺金柯玉葉輝煌煌四海耆夀協嘉應百九十四家駢祥太和亭育㴠德厚春風蓬闕敷恩光餐醇食德樂無既聖齡憶萬同天長蘇拉立住年七十四優老開筵盛春同雨露敷蟻忱隨耄耋鴻賜到胥徒杯捧流霞燦盤承鏤玉俱洪纎均浹被積慶協祥符蘇拉鐡丹年七十四閣道周廬給使令在官稍食代農耕聖朝雨露耆年被總向瓊筵拜玉觥一環墀次第敞瓊筵霽色扶鳩向日邊雪鬢霜髯依鳯闕分明蓬島采芝仙二蘇拉恩可年七十三露湛湛醲化翔迓繁釐允迪康溥夀愷儀輝煌宴樂胥傒近光霱占縵珥獻祥天南炳耀舒星芒含淳藴酎敷瓊漿綿福紀洵無疆亘億萬祀燾萬方廄長神保年七十三箕疇敷錫聖無私一例龎耆酌玉卮盈耳鈞韶天上奏仙雲長蔭萬年枝一恩深芻秣奉駢闐十二間司職所專駐景霞杯延夀杖房星曜共夀星懸二廄副音達渾年七十七條風初展嵗華新嘉會重逢侍玉宸國老尚將驚異數微臣何幸預嘉賔職司雲錦驊騮隊身列星躔鵷鷺鄰黃髮莫言樗散質皂間騰踔轉生春牧副池八兒年七十四瑞紀卿雲爛恩施湛露漙鳬趨來萬國馬走從千官共覩皇恩溥言從國老安微臣司考牧榮值荐辛盤門𨽻四兒年八十嵗我皇建極健法天德洋恩溥被紘埏春和浩蕩祥蓂啓優賫黃髮開瓊筵崇階既廣被卑微不遺旃區區一門𨽻亦得飫甘鮮天門司閽慎厥職曉闢魚鑰迎祥煙但見峩峩松喬侣衣冠蹌濟拜賜丹陛前堯樽舜榼仙盎溢景星慶雲祥符駢𨽻也從其後光景鬱昭宣竊願長奉南山松柏頌太平康樂天壽億萬年領催揚桑阿年八十五皇恩疊沛露華濃禮洽耆年慶再逢咫尺天顔欣日近鸞坡拜舞共雍容一雲開春殿鬱崔嵬酒獻瓊蘇益夀杯盈耳笙歌天上樂塵凡何幸入蓬萊二領催當阿年八十四五雲仙仗展皇儀佳氣絪緼曙色披春滿神州瞻紫極祥開麗景煥彤墀地如蓬島皆添夀人到鈞天共祝釐願播六英揚盛事賡歌載拜慶昌期領催二小年八十五聖皇隆錫福千叟效呼嵩敷醴笙簧叶開筵雨露豐地將圓嶠近人與列仙同南極輝星曜長年瑞氣融領催王祥年八十三酌天酒祝萬年旭日才臨玉殿角韶風已拂蒼旗巔敷韶筵祈黃耉生民以來聖未有博厚高明兼悠久隂陽搏梡造化爐貞元回斡機衡紐至和沆瀣凝醴甘醰醰酌遍三千叟聆廣樂拜手賡擊轅擊壤草野聲自今耆耋從天錫始信神仙是地行領催那寧年八十一薄海同春色華筵慶太平萬方來玉帛三殿集簪纓效頌尊齊獻承恩酒共傾延洪天子夀敷錫庶民榮瑞莢當階茂彤雲蔭宇明豈惟畿宇內屬國逺輸誠領催白銘年七十九北極凝雯霱朝陽麗曉暾華筵開夀宇黃髮羾天門地接鵷班近仙呈鶴算繁淳和長致福聖德體乾元領催台格保年八十一丹陛祥輝燦爛耆筵普際樂康寵綏頒玉鳩杖次第浥金爐香獻頌遙來重譯瞻雲近接九閶微生欣與榮宴倬漢仰覲天光領催薩爾泰年八十一華封三祝滿彤庭黼座凝禧臻曼齡春入綺筵恩似海紫微光映老人星一曈曨旭日麗天街九宇歡騰樂事偕白髮共知涵帝澤三千瑤席萬銀牌二領催楊宗裕年八十嵗詔禮高年福有加丁丁玉漏曉光賖千人樂勝古三老萬國歡呈今一家霽旭輝成耆夀繪霏煙篆就福祥花鼓鼘鼘奏于飛鷺共詡天分玉杖華領催閻成年八十淑景迎春序溫綸下玉墀螭坳鸞仗肅鳩杖雁行隨皓首疑仙侣和光入酒卮微躬偕組綬已勝到蓬池領催宋世臣年八十嵗簪纓式燕盡騰歡共識天家禮數寬老者安之仁者夀稱觴臚祝五雲端一豫大豐享滿帝闉蓂階六日肇初寅欲知春到何由早大宇春皆夀宇春二領催烏布里年八十嵗帝錫耆筵敷於廣宇黃髮皤皤以次而序上公捧爵上祝天祜卿士儼翼𨽻農傴僂凡在同班依齒授俎六十七十至百有五臣居其中八十始旅昔聞張蒼無齒食乳德位不及健則猶愈况近龍光錫賚蕃廡以餐以釂陋彼力努歌億萬年奉聖皇醑領催常明年八十嵗五福輝堂構寰瀛慶夀康肆筵隆尚齒傳語勸加觴春入重墀滿風恢大宇翔延年霑聖澤欲笑進昌陽領催佟長年七十九夀滿三千世界耆英之數適符依光欣雲日就聫序學華嵩呼緝閬嶠長生籙衍仙源積慶圖蠕蚑宵翹胥被福疇九五覃敷領催七祿年七十八五福敷箕疇三陽慶交泰叢雲捧日輝奕奕耆叟會東西遍瀛汜皇春世無外貴賤盡列筵所重在耆艾大年樂夀登化宇熙和繪願將鼚軒舞仰叶簫韶籟領催圖薩圖年七十八旭景曈曈瑞靄霏雞人唱曉漏聲稀蓬池開宴趨班早霽日輝騰翠羽旗一芙蓉闕下共擎觴潏露芬甘萬彚昌鵷鷺相看皆鶴髮都隨五色鳳來翔二領催三格年七十九臺郎朝獻瑞夀星見角亢盛典炳禎符皎若日月光彤墀左右列瑤席當筵再拜稱瓊觴華纓何奭赩筍簴交鏗鏘晬容瞻有喜眷此時樂康聖神膺籙億萬載合三千叟壽夀吾皇領催楊住年七十九大衍頒新紀瓊筵擁慶雲酺尊三殿酌鶴髮兩行分福始春同盎恩深酒易醺耆頥虔獻夀天保頌鴻紛領催常德年七十九元會推隆運熙春慶日長十行五色詔千叟萬年觴爵齒名先奏樽彜禮最詳筐承珍賚滿樂應廣韶昌絳縣年方永華封祝未央共登仁夀域既醉頌無疆領催喜兒年七十八丹地扶笻入瓊筵序齒升調羹金鼎渥酌醴玉壺澄歡愜盈千叟恩榮過百朋仙圖呈五嶽獻壽拜觚稜領催馬爾圖年七十六帝德何龎鴻元氣浹寰宇飲食遍羣黎恩光溢九土期頤及耄耋番番百僚序微臣幸哉逢盛世軒乎舞臣材無可稱臣勇無可賈憶昔從戎日先登隨禁旅幸弗愆步伐敢云備干櫓憶昔扈蹕時前驅負強弩幸弗失進退敢云嫺部伍方慙臣職缺彌慶君恩普彤墀敞嘉宴瓊酥瀉碧乳香分芹藻羹味甘鳳麟脯典誠曠代無報以長年補百爾共賡歌自天錫多祜領催巴彥布年七十七閶闔晨開霽景紅御階仙仗肅羣工詩歌既醉恩波渥禮重高年燕樂同紫禁張筵雲幕繞雕盤列爼繡華籠舒遲化日人仁夀萬載吾皇燮泰鴻領催許恭年七十七聫序升青雲開筵斟玉醴三千眉夀行嘉會以合禮拜跽覲龍顔矍鑠愧馬齒需雲影溶溶湛露光泥泥九節仙人杖三服齊官綺領賜出尚方捧歸詫下里鴻禧萬億年五世貞符啓領催永寧年七十六聖德貞恆協天恩錫賚多埏紘恢畜養井牧遍謳歌宇識人長夀風隨春太和瓊筵慶敷錫同饜玉山禾領催鄭義年七十六曈曈春曉漏初長黃髮歡迎霽日光兩樹寶旙觚陛上萬枝紗燭扣欄旁一聖人曼夀與天齊海有來航嶠有梯今日車書開久道上超栗陸與因提二領催常貴年七十六寶律迎春令節回中天麗日九芒開南枝梅蕚迎春放東海蓮舟泛酒來燕翼徵祥齊抃舞龍光錫慶共趨陪同時瞻望猶多幸况復親承沆瀣杯領催薩靈阿年七十六皥皥夀宇靄靄春熙肆筵設席耆耋是頤醴㪺瑤斚樂奏咸池式宴式食汜濩鴻慈微臣庸下忝綴彤墀榮邀盛典千載一時拜手獻頌萬夀綏祺領催和成厄年七十六新澤沛新年耆筵繼茶宴璧月輝璇題奎文耀金殿養老荷恩綸殊施分玉膳藹然接春溫天語垂寵眷何期逮末校趨蹌隨衆辨丹忱重依依曝暄效芹獻領催黑達色年七十四壽宇開時閶闔春星雲景慶叶昌辰耆年禮洽皇朝典嵩祝齊臻鶴髮人一椒柏盈樽頌萬年小臣陪列戴堯天今年共識春風早十二辰周獻嵗前二領催孫文科年七十六韶春初啓紫詔新頒惠養耆老和合仙寰簪以朋盍臻霄漢間有彩雲生其光斑斕溥蔭羣叟遂還童顔共祝三多趨蹌儀嫺譾譾下士欣厠鵷班葵向忱切勝丹九還領催阿爾通阿年七十六闡繹膺多福昌辰盛典行肆筵嘉鶴算樹羽奏鯨鏗藹藹依仙仗雍雍捧壽觥三千榮應瑞八百慶同賡拜賜來春殿騰歡遍大瀛祥和凝泰宇卉槇盡敷榮領催大嘴年七十七壽宇耆英渥大酺佩聲徐引上金鋪千巡香泛屠蘇酒雙闕俄瞻五嶽圖一芝英鶴毳髮同皤彩仗春臨萃玉珂無算爵賡無量壽仙山咫尺五雲多二領催臘八兒年七十七酌旨酒登天衢榮閶煥彩紅雲鋪億萬年頌天壽海漘嶽麓咸耆耉耆年生在承平時環積十干十二支年年嵗嵗享豐豫咸歸帝德綸以彌乾行健無息屯蒙咸師師趨蹌傴僂傍玉墀春光浹處纎草茂豈唯臺萊栲杻為光復為基領催孫明祖年七十七蓂莢舒英藹曙暉屠蘇春暖禁煙霏龎眉願效呼嵩祝詔許人人盡醉歸一韶妍新繪九重春既傍瓊筵飫鼎珍鶴髮酡顔勤職事升平樂業太平人二領催王四年七十六臣年七十餘臣職係領催供職勤行走紫禁嚴城隈月月飽錢糧胎髮到皓皚恭逢新春宴銓名上春臺以臣夙齒久俾得霑香醅臣計四海內壽宇升平開齒若臣比者士農吏輿儓不知億萬萬皆奉皇恩恢臣以近輦轂遂邀覲光來彤墀拜且舞萬載荷裁培領催保常年七十六鈞天樂奏萃喬齡春酒春花百和馨聖代書祥呈太史輝熒南極老人星一老人星在麗弧邊出丙見丁候尚懸今日滿天皆壽曜五辰二十八經躔二領催托保年七十六日遊大化中不知今幾年皇帝溥錫四海福使臣紀盛登瑤箋憶從當差行走始其時齒少筋力堅至今強健尚如昔唯有絲髮種種華於顛飲醇酒厠玉筵頌帝德歌人天髮之白者轉以鬒斑斕玉杖徐捧春風邊臣不知帝力之所及自惟被澤駐景歡抃歌連連領催富保年七十六觚稜金碧瑞雲封羞耉承恩盡倚笻旭日當筵傳柏葉酒香還帶露華濃一熙熙皥皥太平時壽比鴻濛復介眉直到九霄雲密處溥將福曜照瀛湄二領催孟達子年七十六蓂陛晴雲暖熙時化日舒鶴籌盈海屋鳩杖集瑤除蘭饌調珍候椒盤獻嵗初親來霄漢上歡躍慶何如領催劉德年七十六糾縵雲輝丹墄濟蹡叟集紫宸古稀天子曼壽難老臣鄰瑞人香泛屠蘇旨酒筵開閶闔瑤春升恆如日如月保定自天重申領催趙元福年七十六紀年易䇿符錫極箕疇界敦龎元氣調耄耋稱人瑞芳宴敞螭坳仙韶振鳳吹帝祉所申錫直省多五世百九十餘家祥符環以萃敷天耆席同薄海春風被眉壽溢臺萊景福超既醉領催偏兒年七十四大衍河圖至道存循環甲子紀軒轅大千世界壽無量尺五天邊春共溫鳩杖扶來行比鶴龍光照處序隨鵷應知此日龎眉叟合願登臺獻負暄領催劉啓鳯年七十六八伯賡揚鬯舜韶天恩還許小臣邀那居鎬宴知難擬元氣絪緼在慶霄一雲外三漿捧帝壺南蘭東壁展歡酺古稀膺籙春多慶齊向金階獻吉符二領催立柱年七十六鴻圖膺萬載大衍今呈祥蠲元正六日錫四海壽康領催一小臣亦覿禮樂光禮以固人肌膚之會筋骸之束使人恭敬乃益強樂以宣鬯五聲八音十二律鼓蕩壽壽宇敷鴻昌臣隨千叟侣歡歌效賡揚肫愚不知雅頌體惟知感恩頌德反復吟咏成篇章領催滿保年七十五壽宇開蓬閬祥輝麗曉暾瑤階千叟列黼座萬年尊寶霧沾衣潤和風著樹溫引年欽曠典末校荷殊恩戴鶡歡俱逮扶鳩禮共敦皇仁深浹髓浩蕩布乾坤領催郝山年七十四九重天上示深慈開宴鴻融集耄耆春景正看綿鶴算皇恩普為洽鴻禧花明金殿羅瑤席露湛仙班捧玉卮此日嵩呼瞻帝座萬年長此祝純釐領催阿保年七十五玉斚共承雲液丹庭仰近天光慶際熙朝化洽年隨春信日長詎羡鹿裘帶索欣逢麟脯分漿大宇長生有籙恭惟錫慶無疆領催五德年七十五聖人備諸福耆耉慶永年偕登熙臺景恭遇湛露筵湛露浹九天松芝煜光鮮煦及纎纎草濃瀼實紛駢龍光仰咫尺鶴算紀萬千寸葵愧微末敬頌南山篇領催達色年七十六法祖耆筵啓隨春帝澤覃蓂英才數六嵩祝聽呼三趨陛飛觴樂餘齡負羽慙慶逢蓬島會韶景繪彭聃領催富海年七十五觚稜金碧瑞雲封壽宇長開帝澤濃寶鼎調蘭仙篆裊玉杯泛露綺筵供春臺日麗輝雙闕瑤島班聨侍九重異數榮施芻秣侣禁垣趨步喜從容領催依齡阿年七十六布席椿齡萃當軒玉斚頒人遊懷葛上春滿閬蓬間積慶滄籌逺鍾靈瑞綵斑自天臻百福恩普鸛鵝班領催富成年七十五韝卷􅎽鞠擎金漾玉日吉辰良共仰清旭清旭輝輝光被九圍九圍奕祀靡不瞻依昊縡凝命錫以重慶萬壽維祺古未有盛盛澤均霑率土閭閻含譽老人交映極南領催關德年七十三聖德符乾象祥雲擁帝居春臺開壽宇化國勝華胥虎拜羅黃髮嵩呼近紫虛開韶方六日蓂葉長彤除領催八十年七十四酺尊合寰宇春物方昌昌天香染爵斚袀衣挹輝光積曜到微朱華髮咸躋堂禮踰三古盛輝從九埏翔鳩華共扶捧虎拜聫班行領催特松額年七十五揖洪崖招安期今日慶忭告爾知餐玉屑餌紫芝不逢盛遇徒爾為三壽朋九如詩軒嚳以來真古稀張廣樂奏丹墀韶開壽宴臣預之歌萬壽洽重熙億千萬歲長若兹領催五保住年七十五獻嵗春褀布階蓂六葉生御香霏壽篆仙樂播韶英酒泛瓊蘇美階登璐砌榮升恆開化宇華祝慶同聲領催宋倫年七十五高天無私照人各慶所逢和煦酣康衢際此春光濃良辰入睿懷品物歸舂容躋之以仁壽莫不欣喁喁逺受膏澤沛近者皆雲從藹吉黼座高燕喜甘露醲樂哉草莽微便儕喬與松領催官住年七十五穆穆我皇超軒軼羲眷顧四海囿之皥熙前光迪篤受福承釐臣仰盛運鼓腹而嬉詘彼求仙餌术茹芝我皇有詔錫宴壽眉蓂階蒲席春日遲遲何以曝獻寬臣無知小草蓼蕭湛湛露斯領催崔景龍年七十五旭啓金門麗風薰玉燭調銜籌同海鶴介酒叶春椒愷樂歌蕭露瞻依近斗杓殊榮叨渥錫鼓舞聽仙韶領催付發年七十五上日韶陽初啓普天渥澤均漸歡溢梯航山海祥呈魚鳥飛潛曼壽以引以翼鴻恩曰養曰恬榮幸微臣遭遇稱觴得近堂亷領催牛世輔年七十五簪紱千行陛九重春光和鬯日華濃擕笻同上瑶池宴不是洪崖即赤松一傳宣飲膳出仙厨寵渥霑逾十日酺聖壽原同無量佛喜教大衆遍醍醐二領催佛壽年七十四惟無量壽佛皇帝萬萬年臣名云佛壽有壽皆佛延得成壽者相敬願頌大恩今日無遮會膜拜稽首言佛于震旦中首運大法輪長放大光明照耀四人天一切恆沙河普度無中邊佛有優曇花衆生知所尊又有旃檀香各各令自聞大雲所遮覆蔭暍皆安眠大雨所沾溉草木都新鮮衆生各安樂方滿大願船惟此無遮會現出慈雲端坐登寶筏者下界來三千人人敬頌佛臣復何所云譬以石供佛得見千珠林願告震旦中皆生歡喜心佛偈體領催王文貴年七十四節節足足鳴九苞般般之獸遊青郊春陽入陬貞斗柄天漿賜酌盈天庖羣臣魚雅陳螭坳引年不獨詳東膠微及犬馬如草茅榮對蓂莢親唐堯地與天通稱泰交固知天大無不包領催趙一淳年七十四帝錫殊恩溥大千連翩鶴髮共朝天歡臚鳯韶頒元日慶洽瑤池啓壽筵世是大撓初紀嵗人皆絳縣不疑年祥光暗靄縈宸極縱列微星亦映躔領催黑達色年七十六猗歟芳靈言棲木公上溯太始亘壽鴻濛臣不稽古不知西東仰惟我皇日之方中下土是冒萬福來同恭際盛宴爰及薄躬山呼翔地悅豫亨豐綿綿延延以答蒼穹副領催偏兒年七十四若木舒華建木英東鶼西鰈彚祥禎周天琯遣斑螭捧蓋地圖教彩鳯呈雲積綺霄兼慶矞醴敷華闥遍瓶􅑥耆年拜舞瓊筵喜粟帛恩膏溥八紘領催趕尚年七十四嘉祉昌期集崇年懋典昭歡聲臚赤縣瑞氣靄丹霄仙瀣凝堯酒元音叶舜韶小臣遭盛會恩賫幸同邀領催康德年七十四醲化既洽盛筵斯張嵗紀木德春正王四海熙熙歌樂康壽介椒酒娛韶朝陽我皇恩詔舉盛典命耆艾集丹扆旁合算億萬成嘉祥逺近大小職同天造臣紀叨恩榮隨羣老秩秩式序以燕以處祝天子壽萬年有祜領催德福年七十三寶籙祥徵化盛蘿圖運協期昌仰九重開春宴聚千叟飫仙漿冠珮序中藹吉鈞韶聲裏賡揚微臣效華人祝萬年福慶穰穰領催蕭化鯤年七十三豐豫天人慶升恆日月昭藻魚賡在鎬梧鳯叶鳴韶素願申誠祝偏榮沛澤邀敷綸同被野扶杖共登朝鶴髮聨金戺瓊漿捧玉瓢五雲深處宴咫尺接層霄領催佛保年七十三遊盛世欣時和庶物繁昌嘉應多麟在囿兮鳯巢阿雙岐之麥九穗禾四極八維福孔那帝曰朕其徵之人壽聽賡歌五十年春卦首泰盈廷慶溢耆英會碧雞一聲扶桑開皓鶴千行露蕭沛臣叨異數榮預及豈有才華能藻繪詡有知知天大領催庫爾庫年七十三胥世躋仁壽佺彭集一堂星雲聨式序日月仰垂裳法典鈞天奏瓊筵御饌香榮惟躍鳬藻長得奉龍光領催關德年七十三瑞靄祥雲擁帝居春臺熙皥集華胥駢羅黃髮嵩呼近萬載新叨壽宴初一六日堯蓂紀瑞長寰瀛無處不韶陽恩沾聖德同天德氣轉鴻鈞澤沛滂二領催興福年七十三寰海升平會羣生曼壽期良辰占上日嘉宴祝春禧叨入松喬侣同寬拜舞儀光輝接南極恩澤渥無私領催文之師年七十三春如海壽若山紫垣慶洽星光圜彤霱祥輝凝九關微臣歡躍隨仙班無疆祝萬壽有喜瞻天顔韶景舒長渥賜頒甘醴灔瀲珍斒斕拜賡文詞慚未嫺願效擊壤同區寰領催達色年七十三引年隆矌典錫宴樂升平甘露芳辰沛條風令節迎祥輝環太乙吉曜煥長庚獻祝申葵向康衢叶頌聲領催李培林年七十三旭日麗彤墀和風動金鑰鳴珂逐隊聲鏘鏘來赴耆筵揚愷樂青青上闌松矯矯南山鶴瑞氣氤氲勃律香卿雲糾縵蓬萊閣恩覃海宇多高年熙春溥慶帡幪託挹天漿㪺瑤爵拜稽陳歡衷蕪詞歌景爍領催甘永年年七十三元化調春和天祺鬯昭懋肆筵會耆老蓬崖挹芝秀福綏鳩杖登顔霽兕觥侑采騰黼黻華樂協韶韺奏願以淳和音鼓兹敦龎宙滋液承膏醲銜杯均益壽領催何世福年七十三玉燭和調寶籥新御筵敷錫慶昌辰承恩昊嵗三千叟臚頌堯天億萬春鶴髮隨肩歌醉飽鵷行以齒洽臣鄰期頥從此欣誇瑞扶杖年年覲聖人領催王為琇年七十三禁城藹春色梅霙嵗可驗時和景物熙長此樂豐贍錫福逮耆耉安老厪帝念鴻恩布玉墀風入酒波灔筵登大官庖腹果小人饜珍奇賜絡繹品次分不僭微末效文詞愧向天庭掞領催玉德年七十三聖皇御世綿綿翼翼諏吉韶春爰溥鴻澤衢歌衢酌歡溢萬國三千之選光依垣側微逮小臣飲和飽德大造無私藝生遍植小草知春順帝之則歌咏太平以奉厥職領催蔡良弼年七十三璇闕靄春吉庥嘉凝紫微貞符開慶會壽宇洽恩輝百榼溢堯酒五絃揚舜徽叨榮紀隆典鷺序挹祥霏領催花連布年七十萬户作椒頌和風叶韶候共仰天上春今日慶榮遘尚齒序以爵小大荷仁覆日下黃雲現詎待太史奏錫豫優且蕃何自酬高厚願合千叟年以為一人壽領催四格年七十蓂舒六莢啓韶春日麗瑤階曙色新繚繞矞雲輝紫極老人星聚盡堯民一疑年絳縣數春秋六十何如七十優無頂帶人七十方得預宴及格年華逢曠典三千人共宴瀛洲二親軍阿克敦年七十六豢養列禁營力效壯與少春風吹皓髮嘉宴拜丹詔天門鞠跽入暫釋櫜與鞘生逢聖治隆盛化被翹肖觥籌禮數寬盎醴耆年釂扶杖榆街中裲襠帶星耀親軍莫爾根額年七十五詔許耆筵集春瞻日曜臨青旗懷栁色丹陛麗葵心鐃忝揚朱鷺槍慚獻緑沉黃封沃天酒感溢聖恩深親軍四達色年七十三養老典超亘古開筵禮逮微臣金貂春煦繡甲玉斚風皴酒鱗介馬長懷栁帳扶鳩榮覲楓宸叨見蓬壺深處枝枝花放恆春護軍福祿年七十九瓊鋪芳宴鬯韶陽耆叟朝天廣樂張還憶戎行荷甄録精鏐頒賜被恩光一金鏡同輝玉燭調壽祺同列慶今朝叨榮宿衛鈎陳伍原綴珠星布紫霄二護軍達色年七十九乾坤端倪清寧奠聖皇懋德錫耆宴遹開春殿延青陽恩覃台耉傳觴遍珍賚疊沛何滂洋醴泉滭沸芝草芳壽弧呈祥天炳耀三千拜舞彤雲翔扶鳩日下春光映欣效嵩呼齊祝聖光華日月曜無邉京垓億兆膺天慶護軍五十九年七十九聖謨廣運炳威弧憶奮前驅備執殳欣自升平舞干羽長扶鳩杖步天衢一耄耆式燕沐恩波元氣彌綸鼓太和莫詡明年登八十比臣長者更多多二護軍五十三年七十八鶴集三千叟龍飛五十春延韶弧出丙介壽策逢辰天上神仙聚壺中嵗月新近光隨虎旅被澤荷楓宸護軍阿蘭太年七十六榮合三千人嵗咸歸壽宇符苞慶協星雲景麗歡占地天泰交應節仙蓂茁砌登筵瑞萐生庖竟解百年犀甲同依九級螭坳護軍岱祿年七十六發嵗瓊筵敞趨階鶴髮齊億齡符聖壽五福耀天題羣拱辰垣北真超月􅀢西淳風恢栗陸祥紀過因提獻瑞殊青鳥依光荷紫泥韜弓隨國叟瞻就許同躋護軍安保年七十四奕奕泰階平衡光昭煌煌龍角轉北斗杓春風溥協帝奏韶簫盈庭與聞黃髮佺喬禁營末士職𨽻弓刀恭逢偃革重幸餐瑤玉山之禾天漿之瓢醉飽饜飫欽頌仁堯護軍德克瑾年七十三春曦照彤扉藹藹矞雲匝吾皇重壽耉嘉宴臚歡洽豐肴佐醇醴珍綺蔚稠疊衆喜共持觥平時久脫甲恩光遍八紘喜氣周六合有生慶遭逢崇高何以答護軍朱隆阿年七十三尚齒隆皇化春光大宇妍同聞天上樂更賜尚方筵挹酒蟬聯坐陳詩雁序編太平真盛事袀士樂華顛護軍倭興額年七十一鳳詔垂初春鴻恩被九服暖律回韶陽耆齡荷煦育彤階帝垂衣光華凝黼幄樽醪捧醇甘爐香挹芬馥屯營一微士環衛依輦轂垂老得躋堂抒忱效賡祝拜跪頌皇仁錫極斂五福欽定千叟宴詩卷二十六
