body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年卷首一御製詩千叟宴恭依皇祖原韻抽祕無須更騁妍惟將實事紀耆筵追思侍陛髫垂日與皇祖於壬寅嵗舉行千叟宴實從古未有之曠典維時宴王大臣命諸皇子賜觴以示慈惠至年未及嵗之皇子皇孫並慶錫命侍立觀禮余時年甫十二躬逢嘉會親見耆筵龍光燕譽之隆閲今乙巳凡六十四年矣訝至當軒手賜年今嵗乙已朕御極五十年恭依皇祖盛典於新正初六日再舉千叟宴禮有年屆九十及一品大臣以上皆召至御筵前手賜之觴以昭天恩國慶酬酢一堂之盛君酢臣酬九重會天恩國慶萬春延祖孫兩舉千叟宴史策饒他莫並肩附諸臣恭和詩大學士公臣阿桂升平景物入春妍法殿駢羅八百筵愧領朝班承慶典欣回使節引耆年三千人合三元算五福堂開五代延跽進霞觴榮更甚籛佺伏拜總隨肩大學士臣嵇璜宿雪新花雨逞妍耆齡恩許拜春筵臚歡共慶無疆夀錫福頻書大有年丕迪前光章並煥感叨世澤賞仍延從知盛典依旬舉扶杖重看喜接肩大學士臣蔡新九重旭日正暄妍恩逮耆臣敞盛筵人瑞蔚蒸千倍數帝祺歡祝萬斯年鸞笙韻暖春初啓鶴髮班齊福普延宴飫霞觴歌喜起玉鳩拜賜慶駢肩大學士伯臣伍彌泰和風融日正喧妍春共登臺敞綺筵慶集一人開夀宇澤敷千叟引耆年繩繩繼聖恩逾浹世世叨榮賞自延式燕禮成真異數期頤以上忝齊肩協辦大學士尚書臣和珅寅月辰朝曙色妍祥開春殿啓瓊筵承恩拜賜三千叟祝嘏呼嵩億萬年盛典再行臣可屆天章許和算維延臣今年稚齒僅三十有六若至六十聖夀滿百再舉斯典則臣年已一嵗亦得與宴不勝私心慶忤一堂五福無疆夀咨爾期頤孰比肩協辦大學士尚書臣梁國治似海春光分外妍三千鶴髮引登筵隆儀載覩賡前韻御斚親酬問百年福自天家開曼羡恩先人日慶洪延太和從此彌寰宇拜賜駢蕃看接肩吏部尚書臣劉墉春到皇都景物妍歡傳千叟賜華筵仁風廣被欽繩武渥澤新沾慶引年就日瞻雲心共遂飲和食德夀均延臣叨葵藿依光近耆耋班隨幸接肩吏部右侍郎臣彭元瑞蒼顔春入更增妍杖影巵光捧御筵百五嵗謂郭鍾嶽稱萬嵗夀三千人合一人年堯樽親酌祥蒲茁周雅升歌瑞瓞延拜手真承逾格賜宴中最少尚隨肩入宴年最少者六十於臣尚為五年以長方幸預觀盛典乃蒙誠感逾格優賞鴻恩户部左侍郎臣董誥人瑞韶華共麗妍敷天錫福繼長筵策開大衍符羲卦上溯皇上御極五十年康熙壬寅適六十四載人瑞盛典重光天符古今罕比算積稀齡合叟年五世猗蘭逢慶會九重康爵授洪延西清例許賡仙藻筐篚申頒拜接肩户部右侍郎臣曹文埴松蒼柏翠侍階妍耆宴重開法祖筵嵗備全爻符卦象自逮今六聖祖仁皇帝舉行千叟宴十四年皇上恩隆再舉紀嵗適符卦爻積算益綿蓍策策推大衍邁羲年開正盛典重逢皇上臨御五十年數由大衍推而至於千萬策無疆之慶逺邁羲年矣三千數較前恩倍康熙年間預千叟宴者千三十人今乃至三千之多夀世延禧益徵祥洽九五疇徵大德延熙洽端由行健得用敷錫共仰仔肩禮部左侍郎臣達椿陽敷紫極氣瑄妍法祖重開介夀筵寶燕占祥方獻嵗鴻龍叶瑞正書年堯天共戴春祺溥舜日常瞻麗景延欣聽雲韶歌既醉瑶階鶴髮喜聨肩禮部左侍郎臣莊存與九重春暖物華妍國叟三千拱御筵多夀載逢遵祖典中天有道祚皇年便蕃拜賜臚歡盛優渥承恩淑景延新嵗喜占龍馬日六為馬日日支在辰兆民同慶一人肩兵部右侍郎臣金士松籥轉春臺淑景妍彤廷錫宴列耆筵福敷寰宇惟繩武夀啓昌期重引年五十瑞膺蓍䇿衍三千數叶海籌延駢蕃珍賜天膏浹拜手稱觴喜接肩工部左侍郎臣胡髙望東風應候正韶妍千叟承恩敞御筵嘉醴樽開無算爵修齡人引太平年初辰華祝歡聲洽上苑春熙景福延圖寫天家耆老會和鳴重疊聳詩肩內閣學士臣朱圭賓寅茂對首春妍太乙重開尚齒筵南極聚星光夀宇東鯷航海會耆年千叟倍蓰同多益五代仍來更引延自分蒲姿羞摘頷恩貤棣蕚幸隨肩臣圭兄堂蒙恩與宴詹事府少詹事臣童鳯三夀宇新開淑景妍皤皤耆耋侍宸筵數符桃實三千嵗韻叶堯文六十年錫類恩推天覆幬同春人慶地環延稱觥共獻臺萊頌願拜彤墀更接肩內閣侍讀學士臣吉夢熊玉座春和萬象妍尚方分膳列瓊筵鳬趨嘉會三千叟鳯紀昌期五十年賡韻堯章聲善繼登歌舜琯喜長延微臣竊幸陪芳宴黃髮通班近接肩翰林院侍講學士臣彭冠糾縵雲增夀宇妍我皇法祖啓華筵京垓廣益三千叟萬億初基五十年福錫寰瀛春最永籌添耄耋景長延呼名臣是籛彭裔獻祝鴛行許並肩司經局洗馬臣黃軒梅花晴雪景舒妍廣殿春融列夀筵錫爵恩推耆舊日扶鳩人咏太平年歡臚國庶前型懋慶裕雲仍世德延久道化成凝昊眷孜孜彌仰一心肩翰林院侍讀臣吳夀昌慶典春頒景倍妍三千鶴侣賜長筵老兼國庶臚歡日堂會髙元紀瑞年酌斗分霑天寵渥扶笻齊祝聖齡延九重賡韻殷繩武熙洽丕基億載肩翰林院侍講臣孫效曽春回正喜浹旬妍星曜弧南捧慶筵五福同凝文治日七旬宣洽太平年螭頭風入仙韶動鮐背巵傳瑞牒延繼序引祺歌樂愷緝熙基命凛仔肩翰林院侍講臣季學錦芳序新開淑景妍泰和庭陛列重筵瑞觴遍飫三千叟寶籙同欽萬億年振雅臺萊音自合凝禧瓜爬慶長延普天膏露元正浹禆海龎眉亦聳肩翰林院修撰臣汪如洋六日春風萬彚妍敬繩祖武錫恩筵星雲八伯追虞旦甲子三千邁綘年禮先圜橋歡並洽祥分衍瓞慶彌延熙朝齒讓真殊遇仙圃無煩羡拍肩欽定千叟宴詩卷首一
