body:
  text: 卷三十二預宴九十五人詩一百五首馬甲塔金泰年七十一重重慶典國徴祥沛澤鴻叨普地翔笻倚夀符鳩輯瑞仗排仙序鶴分行濃花聚候呈春好翠莢開時計日長逢此共占眉溢喜從來福宴協期昌回文體馬甲亮德年七十一天顔咫尺瞻龍光彤墀宴集鵷鷺行衣冠濟濟鬚眉蒼微臣顧何人得與承庥祥弱冠事執戟垂老猶受粻伏聞絳縣之老不知嵗第以甲子長短相較量臣今四百餘甲子屈指將與斯人當華筵寵沐尚方賜自幸旅力猶堅剛擘玉脯餐瑶漿鏗鐄雅奏宣璈琅拜手稽首晉夀爵古稀天子萬年逢吉身康強馬甲伊郎阿年七十一春風拂拂景遲遲盛際熙熙皥皥時就日日從黃道見疑年年共絳人推鷺振振集淵淵鼓鳯翽翽翔菶菶枝迾卒愧桓桓糾糾瓊筵欽濟濟師師瀼瀼露澤欣欣渥燦燦雲華旦旦垂願此繩繩長祝聖將將翼翼肅朝儀疊字體馬甲格圖肯年七十一杓回北斗斟天酒天上陽和播九有番風兩候舒仙英鳯樓麟閣春光盈殿前鶴髮蹌蔥珩蔥珩聲叶紫芝曲萬年枝上鵷鸞賡古稀天子協久道八埏夀曜輝長庚宴出蓬壺千人列膏垂雨露萬卉榮微臣鵲躍恩髙厚羽騎環從末階右嘉名聖錫榮稱叟仰祝曼夀如山阜馬甲曽浩年七十一愔愔末騎榮登天閶未嫻儀節詎知賡揚懸弧之志以射天狼日戈霜鋋載列戎行雉有力奮乃隨鳯翔嵗溢花甲欣際恩光朱鷺之鼓白鶴之觴萬載鴻笇六合春陽馬甲李兆祿年七十一九華麗日靄初升天保詩歌靡不增青瑣闥前頒醴鬯紫宸殿外拜殽蒸欣看夀侣嬴千耦各奉恩光錫百朋叨預耆筵隨立仗未嫻俎豆倍兢兢馬甲徐登舉年七十一皤髮龎眉臚夀宇卿雲紺露記華春從來史牒聞希覯嘉會重熙第二巡一職近星廬霑錫渥營隨雲騎煦春溫三千叟共奉康爵七十齡先沐聖恩二馬甲七十兒年七十一丹禁清嚴地春輝逮虎賁寵榮依羽仗騶迾傍倚門幸際耆英會彌沾化育恩日華瞻舜藻山鞏慶堯樽鳯闕雲霞麗龍顔笑語溫紫猊煙馥郁絳鶴舞翩翻帝極三辰朗天庥百福繁萬方同獻夀叶氣滿乾坤馬甲朱丙信年七十一虯箭勻催天向曉璇霄五色祥光繞鵷班雲集玉珂鳴千叟承恩會蓬島鴻施疊賁法筵開緑蟻春醪泛玉杯古貌蒼松兼翠柏韶光細栁共新梅微臣芻秣受恩久得伴華簪隨錦綬豹尾曽知侍屬車龍驤不用鳴刁斗玉階拜手祝無疆慶澤光天化日長雀躍鳬趨鳩杖健鑾坡頻捧萬年觴馬甲福勒賀年七十一聖人作錫夀康極一星臨九閶曈曨紫殿煜爚青陽鳩杖連蜷鶴髮蒼詔賜無算爵擎拳曲􅎽承璚觴黃神十樂鏘宫商微臣愧樗質末校聨班行精鏐拜捧承天慶丹霄湛露滋瀼瀼醲恩曷以報願億萬載夀宇恢無疆馬甲二達塞年七十一宏規十二仰天閽閶闔晨開拜聖恩奉職老曽司互柝計年春許飫壺樽何勞巡警傳營汛惟見謳歌入國門籛偓攜來安羡侣春風衢上飲堯尊馬甲代保年七十一天閶詄蕩丹地崇髙春浮玉醴樂奏雲璈簪纓黃髮列侍金鼇遹在鮐耉扶杖均叨俯慙駑劣榮預趨朝太倉豢養卌載常邀環營列衛鞭弭時操鴻釐溥錫燕喜欣遭新韶迓祉咸沐恩膏馬甲恩倬年七十虯箭神傳寶宴開敷天同慶上春臺九州鮐耋如雲集諸部鴻臣向日來瑞莢輝分青玉杖甘膏醲泛紫霞杯銜恩叨奉銀牌賜小草均邀帝力培馬甲敦巴年七十淑景麗彤廷和風扇芳樹一人古稀聖羣彥春臺聚天光仰下臨秀眉式歌舞亨衢列環衛舄奕見簪組忝以騎士微敢企露膏湑恭承尚齒筵天上榮尊俎仙醴溢醇和永言頌多祜馬甲達賴年七十鳬鷖既醉歌太平未若聖世多豐亨天苞地符物畢致夀衢福宇人同登漙漙瑞露斟仙酒祥星煜煜輝南斗龎眉扶杖三千人稱觥同祝聖人夀椒屏萬福瑞光延接席連茵春滿筵鵠立班餘隨騎士雕盤捧得御珍還馬甲金偉年七十慶衍洪長運恩開愷樂筵椒盤三露潤芝蓋五雲鮮洗爵逢嘉會歌鐃記昔年長懷雲日想忭舞覲堯天馬甲皂保年七十少曽隨羽士策馬疆場先凱功荷天算芻豢安餘年鳯紀周五甲瑞應南弧躔獻嵗延淑景尚齒開仙筵年已七十矣虎賁隨三千精銀捧駢賜緑醑邀遞宣惟皇集繁祉虔頌春風前馬甲官柱年七十卿霄濟濟集鵷鸞錫慶春風滿上闌馬齒喜隨驃騎後龍光親奉紫雲端萬方觀聽齊元會九拜賡歌洽聖歡何幸微生周七甲預從執爵侍金鑾馬甲愛隆阿年七十嵗屆春和雲麗慶霱黃髮番番羣遊化日仙韶鏗鏘祥飄金闕湛露恩深瓊筵禮秩臣忝櫜鞬亨衢遮迾夙叨芻養榮被蓬蓽慶際熙時得隨耉耋飽飫珍厨舞蹈詠述聖人錫福茂育萬物馬甲齊克慎年七十金戺韶和列綺筵欣陪酺宴覲堯天班隨虎旅常依闕春許鳩扶為引年瑞應三階雲郁郁昌符五世瓞綿綿葵忱擬獻升平頌共慶蘿圖景祚延馬甲陳富國年七十令節慶元會嘉筵啓孟陬共欽錫福遍中外蒙仁庥式燕以衎耆老儔三千濟濟誰與侔菲材叨食粟豢芻積春秋雲街星户麗遮迾司扞掫常懷驅走效自愧非驊騮春風欣欣閶闔啓得以夙齒環螭頭扶玉杖捧精鏐堯樽北斗歡醉止欣仰萬年玉燭符圖疇馬甲五逹禮年七十春風奚敢跂鵷行馬齒榮叨帝澤長七十齡猶隨虎旅三千人共荷龍光堯尊共浥三霄露舜陛叨霑九醖觴既醉瓊膏增矍鑠春和銷却鬢邊霜馬甲馬知年七十弱冠叨芻秣馳驅五十年衰齡隨豢養駢接一千筵杯泛三微露身依尺五天春風真得意捧賜趁歸鞭隔句對體馬甲格布奈年七十七十霜華照鐵衣葵心親對日光輝從戎舊逐熊羆健臣出兵二次射獵頻看雉兔肥隨圍十次甲子長年咨絳縣春王正月侍彤扉好將物象占天象福曜端應護紫微馬甲九格年七十赫奕天朝武孔揚漸被聲教綏遐荒丁年荷戟事戎旅煙沙漠漠幕府張三十九次臨戰場功牌垂腰生輝光歸來紫閣歌凱宴黃封白鏹賜尚方臣曽得賞銀五十兩今叨嘉燕上閶闔扶鳩受賜黼座旁飽餐玉粒酣瓊漿稱觥三復天保章馬甲石圖年七十一人曼夀頌無疆瀛海升平日月長頤養百年雲映紫睂開千叟氣添黃銜恩自覺顔增渥捧賜惟賡澤孔長老作騎兵無報稱猶知棡鼓聽軒皇馬甲寧廷顯年七十調元鬯春臺錫福建皇極九重夀宇開尚齒兼尚德顧臣小草荄何期與斯席憶從奮霆雷彎弧拓雙戟騰驤萬龍騋非驥亦鳴櫪韜甲禁城隈捧觴聖人側謬以蓬葆材著在蓬壺籍亦解北山萊賡歌續八伯二韻體馬甲曹文魁年七十大衍祥開景祚綿殊恩錫福布耆筵非徒挾纊歡聲動樂府新添華祝篇一末騎曽經列戰場凱歌聲裏舉春觴昔隨萬陳貔貅旅今厠千筵鵷鷺行二馬甲宋文璜年七十磨盾俯書絳甲荷戈上直星匡有位共添海屋列騶預浥仙漿令德令儀令色如山如阜如岡燕樂以需君子敷錫厥福惟皇馬甲馬越年七十堯階六葉抽仙蓂南弧宿映角亢庭九重華宴召耆叟翩聨鶴髮趨闕廷鈞天載奏廣筵闢衰朽亦得霑餘榮小臣微末預行陳曽從捧檄看洗兵蜀徼湟源及西路攻城奪寨恢星營國家威稜暨無外東鶼西鰈通寰瀛仁夀之朝萃人瑞白頭接武歌升平拜手稽首稱兕觥萬年長聽臚歡聲馬甲魏華封年七十藹藹雲敷遲遲日永宇積慶光燦爍彪炳帝錫隆儀與慶霄並俾耆耉倫耀蓬山境材愧赳桓顧叨殊等赴宴春臺髙年翼引湛露渥滋祥星照炯臣名知祝效華封詠馬甲關住年七十七甲周餘被澤雱殊恩今喜上天閶干支細數年齊絳旗物均頒色首黃憶昨從戎過細栁幾回講武侍長楊儲胥愧逐風雲護田表親依日月光糈沐薪芻叨月廪翼分左右綴星行敢言衰朽鞍難據重際升平甲久藏敬以夙齡逢錫福欣隨庶老亦登堂承恩頓覺衰顔駐兑澤需雲快飫將馬甲伍爾登額年七十皇帝曼福民樂胥澤洋恩普覃九區御極五十年嵗在旃蒙初春韶錫宴開天厨凡百卿尹以及士夫國老庶老咸臻步趨小臣何幸逢頒酺沐浴膏澤同霑濡分營習軍伍嵗月積以紆叨沐芻秣惠微勞愧靡抒即今年垂周甲餘不才自分櫟與樗幸偕千叟倫共獻九如圖聖人萬載調璇樞馬甲馮智舒年七十鳯紀重熙日龍飛大衍年承天欽建極法祖特開筵鮐耉丹墀集絲綸紫誥宣酒如仙液滿肴自大官傳託迹雲霄上攀光日月邊樗材依夀宇景福頌如川馬甲李廷灼年七十臣聞五福一曰夀維皇膺福古無有健行不息五十年川嶽乾坤共長久威加六合恩八紘彩鳯般麟集郊藪良時偃武更修文嵗紀屢豐民物阜小臣司迾忝星騶知祝升恆日翹首欣逢曠典預華筵忝附耆英酌大斗既醉稱歌樂未央全勝豳風獻羔韭馬甲金玉璽年七十慶積升平世頻思豢養初紀元符大衍受糈愧微樗湛露零瓊闕春風遍玉除欣陪耆老集載燕樂于胥馬甲董深年七十惟天祚聖聖紹祖引年巨典若稽古夀宿森芒叟計千神蓍衍策數逢五宋代賜飲五百竒上遡唐時或倍之坐列冠裳間裋褐鵷行鮐背兩差池我皇錫宴開長樂劍珮趨朝兼齒爵叨秩星騶侍玉鑾承恩廣殿浮金勺猶憶從師衣絳袀憑仗威稜送喜頻升平世宙梯航合偃武韜戈積慶新敢言矍鑠蒙天眷皓首還陪禁中宴南弧耀彩角亢明聖祺引翼羣黎遍馬甲黃維有年七十丹墀錫宴會鵷鸞羽士承恩列佩冠騶騎敢誇勤職守星營長幸扈巡闌九重春色珠垣粲百福瓊漿露掌團自幸此身依日月叨榮時奉萬年歡敖爾布富本年八十七登蓬萊望扶桑不如九宇遊春陽采仙芝訪雲岫不如四海人人夀其夀維何瞻泰始奕祀錫之自天子天子萬夀賡喜起擊壤熙熙洽化美有詔臣工來逺邇歡宴一庭榮預此大小拜揚惟以齒稽前古盛無比不信試徵草三史敖爾布趙士英年七十九日色瑶階麗春色夀宇濃鶴當珠樹集龍喜彩雲從逐隊申多祝叨榮幸此逢願惟長鼓腹恩賜慶重重敖爾布門衛國年七十八夀星現紫微聖人萬萬嵗餘輝被下土歡躍及臺𨽻濟濟千叟筵錫羡示慈惠添籌共祝釐近仰天顔霽萬年夀宇中仙次壺與桂銜花微蟻忱亦助慶雲麗敖爾布蔣玉年七十七六莢仙蓂啓上春堯階瑞色紀恩新夔龍稷契衣冠偉亦厠遊河祝華人一食工絳縣或疑年步伐馳驅壯者先誰似小臣逢曠典星杠晃耀紫微前二敖爾布徐琪年七十五華黍歌韶春品彚日滋長造物豈有私雨露均含養生遊熙宇中同入軒鏡朗不遺駑下材嵗月逐輪兩耆筵優寵宴樂聼鈞天廣迢迢霄漢間承露望仙掌炮手王士祿年八十效職曽馳紫塞承恩與宴彤廷千叟榮霑厨萐六符祥協階蓂既醉申以嵩祝同歌蕭斯露零南弧環拱紫極長輝春丙秋丁炮手王天喜年七十四萬年寰宇靄仁輝戰士還家耀錦衣鼓化惟聽雷啓蟄間雲長護佛郎機一錫夀欣逢屆上辰恩膏洋溢忭微臣登筵近列三千似擊壤還同億兆人二養育兵張士南年八十聖治上登三箕疇敷用五樂夀遍八紘禔福逾千古戎行小臣介習武忽聽耆筵坎坎鼓欣榮化宇太平人萬載同依慶隆舞卷錦鞲擎霞杯春光皥皥從天來養育兵二格年七十六星麗南弧春回北斗地蟠天際主聖臣夀懋昭盛典以引以恬上自鵷閣下逮茅簷臣隸戎行七十有六得近光華皆荷優渥月給緡錢日餐廪粟未敢言兵但感養育養育兵塞克圖年七十五聖夀符升恆姬瓞衍千億韶春始和鬯共球賀萬國錫羡沛龎鴻濟濟羅耆德玉墀啓髙宴仙醴酌溫克頭白魚麗士忝列拜紫極惟仰膏澤深延年駐顔色養育兵張士傑年七十三肅肅列期門末熙熙同夀宇春夙慚鷹揚奮勇近樂兔罝化仁宴錫韶風鬯被歌賡湛露榮均慶遇昌符駢疊列隨虎拜歡陳五營馬兵張永德年七十七共聼新春詔仁輝布九天鴻禧凝上日嘉宴集髙年鳩祝歡隨列鳬趨慶接聨膏傾金掌露香惹玉爐煙心忝戎行末身叨渥澤偏龍鍾忘倚杖矍鑠竟揚鞭兩翼期門外千營禁籞邊承恩臣早逮溢喜已先傳五營馬兵劉漢文年七十五夀宴階墀列天家錫福新稱觴同燕喜紀律仰鴻鈞禮習衣冠肅光依譽處頻戎行一何幸歌舞樂熙春五營馬兵馬芳年七十三詹吉先人日耆年紀典崇行分槐棘下身入鷺鵷中玉陛光華燦瓊筵禮數隆顔知春倍溢額慶賜偏豐蓂紀韶初啓葵傾日正中歡歌遍遐邇萬福頌來同五營馬兵吕奉鐸年七十三青陽啓律金殿稱觥人羅佺偓福被埏紘需雲既上晉日初升儀寬仗陛喜溢蓬瀛矍鑠三千星雲匝合榮及介士恩厚何答敢效歌詠以伸獻納億萬斯年稽首閶闔五營馬兵陳起龍年七十一錫福開隆燕吾皇重引年依天恢夀宇就日次髙躔懋典超虞夏仙班儷偓籛景風歡雀躍湛露詠蟬聨春愛寅賓屆人同亥字傳誰知厮養賤親得拜堯天五營馬兵顧天池年七十一紫禁班從鵷鷺聨蓬萊地迥得春先月華西館來靈圉星麗南榮耀偓佺球玉總隨王會集璣衡逺邁保章傳皤顔咫尺依醲化肅拜醇醪飫綺筵五營步兵樊自誠年七十六玉案紅雲遙拱彤墀霽旭初暾鳩笻幾輩就列魚藻三章共論紫陌徼巡賦餼層霄錫宴銘恩聖神天子多夀共酌康衢設尊五營步兵劉俊年七十三聖神御世億萬載恢皇綱揭帝紘東焜西爥六合盡仁宇峩峩夀者來簪纓蟻忱跪祝環紫極聿舉令典肇錫嘉宴吹簧笙金樽寶醑釀自九霄露和以崑圃瓊芝英嵗陽旃蒙律太簇日在丙辰嘉禮成三千人濟濟鳬趨雀躍稱觩觥有芑邁豐水于蒲超鎬京漢唐賜酺豈足數如天巍蕩臣真無能名五營步兵吳彪年七十一九如頌裏歌升日三素雲中拜聖人康爵賜均千叟會夀祺溥作萬方春銀幡拂勝韶風麗丹砌開蓂淑景新潄醴含膏胥鬯洽天家懋典古無倫五營步兵趙國棟年七十二三靈翔協氣九有熙昌時天錫純嘏帝受之恢為萬古升恆不息之鴻禧是以太和所蒸被八埏四海多龎眉今年春正加寵綏上徵虞庠典旁搜周雅詩饗燕之隆未有三千聨席如今兹帡幪仰在宥榮預示惠慈何以頌景運拜手罄臣私惟願飽食春日長遊嬉望中佳氣充九逵五營步兵張坤年七十一錫爵從來重引年欣逢耆宴列春筵兕觥鳩杖天階上畢雨箕風太古前運際重熙遊浩蕩恩隆渥賜沛連駢六街巡衛身何似小草榮霑雨露便五營步兵楊進忠年七十一夀宇瓊筵盛春光玉燭調相隨鳩祝杖共聽鳯儀簫瑞軼遊河叶恩均宴鎬邀老看黑衣隊榮奉紫宸朝五營步兵何成貴年七十一太平熙景樂新春佳會欣逢寵命申燦爛星雲連玉闕蹁躚鸞鶴集楓宸銀牌遍給文鐫夀綵勝初裁日近人禁衛森嚴叨列卒九重深處沐恩綸五營步兵黃德年七十一慶澤周無外春逢燕喜時陽和隨豹尾瑞靄繞龍旗蒲萐承恩膳醍醐介夀卮會躋千叟列頌有九如詩仙樂鏗鏘奏祥雲糾縵移微軀同燕雀飛傍萬年枝五營步兵馬玉年七十露草匪陽周雅星雲復旦堯天時平乂用五福夀引欲至萬年甄陶鴻化無外巡衛鸞旗在前何幸叨榮渥賜春暉中近星躔五營步兵孫建德年七十式燕春敷澤羅鳩杖賜耆同人登夀世大衍應昌期籥轉三陽泰蓂占六葉滋瑞圖繩祖武福範茂孫枝帝錫延年慶人遊化日熙翔鵷環藻席祝鯁遍楓墀淑啓需雲象歡騰湛露詩願陳岡阜頌蓬島近堯曦五營步兵于清年七十喬嶽敦艮大圓洪覆悠久無疆嘉生咸茂煦之大和俾爾單厚是惟貞符朝多耆舊泰元俶辰晉日接晝鳩杖咸羅獸尊式侑樂聆九㲈禮忝四豆何以祝華聖人多夀五營步兵趙玉章年七十世如春而多夀皇恩祜以受釐九陌雞人曉唱五雲犀斚榮持臣甲周逾星紀王春數協神蓍籌算爵添無數臺熙人慶重熙步甲稍兒年九十二上日諏春吉彤墀敞御筵南弧星照地東海福增川式燕同芳醴扶鳩各長年蹶張居步隊抃舞共堯天步甲黑子年八十七瑞靄曈曨啓端月雲華髙映蒼龍闕玉筵瓊席羅殽蒸三千人為一大朋中外擎拳小大忭躍圓壺方嶠蓬萊山仙人何如老人樂聖人三萬六千年河圖逢十長開筵自此叨榮受恩始蟻緣雀躍臣願長至前步甲關得年八十七日上紅雲早天臨紫陌寬乾符徵大衍需宴洽長安祺與春光集詩聽湛露漙叨從依玉陛榮擬上金鑾蒲質長分潤葵心共效丹迎陽歌燕喜還協萬方歡步甲六十一年八十六聖德符三極春祺暢八垓無疆推日策有慶奉霞杯鳩杖人寬賤鵷行會許陪耆英傳盛事筵向九重開步甲德福年八十六神芝出地星麗穹和氣所積寰區同迓庥儲祉溢中外熙皥如見唐虞風獻嵗新晴應璿律斗杓東指春融融蒼顔鶴髮列嘉會珂鳴紘揚齊呼嵩小臣年經幾甲子異數喜以垂老逢七萃風雲向頻忝九重雨露今何濃賜酺從嗤鳯樓集作圖不數香山工堯天日月綿萬紀單厚多益皇基隆步甲五十九年八十五八旬有五荷仁暉盛典叨榮近紫微鳩杖登筵諧鷺序兕觥當仗映龍旗黃圖此日欣長健赤羽從來效一揮矍鑠莫言身下走袀衣真惹御香歸步甲伯成年八十四景運孚璿筒昌符應南極茀祿隨春來渾噩協帝則夀合三千臣延齡肇萬億仙露浥三漿芝雲絢五采佳氣藹鉤陳小草荷滋植步甲麥住年八十二栁營環列步生風干羽猶能舞慶隆化宇熙臺遊最久太平嘉宴沐恩同一炊金饌玉出天厨藁飫分榮賜大酺韶景年年常得駐仙杯春喜溢屠蘇二步甲王坤年八十二春滿象魏闕下恩深魚藻池邊盛超漢室酺燕榮及絳人嵗年日月光臨砥屬松雲夀養蜵蜎放諸薄海而凖身在太古以前步甲文保年八十一久道敷仁夀韶暉紀盛筵鴻鈞旋淑氣景福曜中天鶴髮尊罍共螭頭拜舞駢捧觴同有祝篤慶萬斯年步甲趕生兒年八十一干羽升階日春和帝有俞養恬恢舜典藁飫渥堯厨淑氣籠雙闕歡聲溢九衢叨霑逮厮養身賤亦嵩呼步甲胡德年八十七顯顯令德懿鑠淳茂萬夀維祺亘古罕遘長養率土載歌黃耉和以天倪亦孔之厚福祿來崇龎眉皓首帝曰臣民綏爾眉夀眉夀祝聖自天降康子孫千億五世一堂推恩錫類蘭殿稱觴華封三多天保六章職無貴賤載賡載揚仁風之煦化日之長步甲二德年八十太蔟回春律蒼龍斗轉衡萬方同福祿奕祀頌升平宴喜開蓂砌恩叨酌兕觥合簮隨綺角聨袂接籛彭步伐何分賤追陪共慶榮年年逢此會願預聽咸英步甲白達子年八十新詔開鳯紀恩宴及芳辰象闕圖王會螭坳集老臣三千耆夀盛八十嵗華新叨預春光照榮加賤者倫步甲劉得年八十古皇養老召祥符丹鳥青鸞瑞應俱何似聖朝隆作述耆筵兩度耀蘿圖一綵斿日霽動天顔春酒恩榮次第頒惟願需雲長燕衎年年身預列仙班二步甲陳延年八十詄蕩天門啓春風綵仗齊金莖均浥露鐵甲已藏奎席接千官末笻分九節攜不圖芻秣賤叨向泰階躋步甲閻士榮年八十槐街迾卒愧無能八十驚心馬齒增今日天家頒慶賞鵷行玉陛喜同升一小草長邀雨露恩白頭何幸挹蘭樽從兹擊壤歌衢後擁曝茅簷話子孫二步甲舒昌阿年八十砆石五百嵗久成黃澒稽淮南以知人間物惟其夀者增竒談况臣尤厚幸夀命皆蒙元氣涵恩榮預錫宴賤微一一偕朝參卷􅎽拜天子既歌且醉樂且湛欽聞元日詔道敷四海恩方覃步甲他思哈年七十九中天輝麗日嘉禮協芳辰已慶文成化真看世似春戎行叨齒長耆耉引年均渥澤深霑浹惟慚荷聖仁步甲二達色年七十九瑞滿蓬萊旭日紅筵開天上集羣工嵩呼華祝區區意步向雲衢願總同一寰宇升平瑞應多人躋仁夀樂婆娑賜酺人與登廷宴鼓腹皆為飲太和二步甲三格年七十九五福堂中瑞瓞綿熙春慶溢廣輪圓詔開廣宴梯航集班序髙年鵷鷺聨蕭露遍霑皆夀愷蓬壺能到即真仙微臣願比封人祝盛典長叨億萬年步甲張六年七十八聖恩優詔大年人引養筵開宴列臣身樂太平長嵗月今朝近仰九重春一行間效力被恩多挾纊年年自有歌從此承筐霑兕爵不須醵飲重紅螺二步甲九兒年七十八盛世彰人瑞三千鶴髮排溫綸敷日下春宴啓天階令節翔和氣年光愜壯懷叨榮受康爵渾忘束鞞靫步甲官得年七十八黼藻洽萬類鴻龎臻百福錫祉萐盈千慶瑞蓂啓六雲瞻碧漢崇氣映瓊階淑南極乍呈黃東皇正舒緑仁夀懤九宇龍光燦輦轂詎言山澤臞餐芝餌甘菊步甲立住年七十八邊陲即敘久韜戈帝闕開筵錫太和吹萬熙臺春色滿三千黃髮醉顔酡一稍食天家賜豫寬持更戒夜𨽻兵籣丹霄喜共陪耆席春酒溫生氣不寒二步甲成得年七十八帝城麗日耀昌辰稠疊恩施巽命申金戺崇開千叟宴玉墀齊慶萬年春自天澤溥鵷行遍率土歡騰鶴髮均文綺精鏐同錫福霞漿雲液總含淳祥飈入律笙鏞叶德貺充庭玉帛陳扶杖幸承天有喜熙遊長作太平人步甲二格年七十八玉饔兼銀饔長占瑞應圖姬爻需有象羲畫泰相孚四閣敷文治三登協聖娛貞符隨曼夀扶杖聽都俞步甲陳得年七十八星雲迎策日龍鳥紀官初景運開疏仡皇猷邁赫胥瀛濛恢赤縣珠璧護丹除愷樂從髫齔娛遊遍粒糈春祺耆耉洽華宴醴肴舒盛世歌熙皥濃恩頌燕譽鵷班聨肅穆璃珮集紓徐帝夀超千億神穹福祉儲欽定千叟宴詩卷三十二
