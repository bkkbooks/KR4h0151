body:
  text: 卷十八預宴九十六人詩一百七首驍騎校李清泰年六十七金石競奏觴豆旅前木公挹袖洪崖拍肩水玉益夀房芝延年火珠明堂盛典春筵土鼓蕢桴臣頌洪延五行體驍騎校羅秉銓年六十七熙朝歌衎宴耄叟樂春融糾縵先人日祥和洽聖風班隨黃髮後身在碧霄中虔效稱觥祝維皇夀華嵩驍騎校塔賓太年六十七祥開瑤籙帝圖昌普錫春祺霈澤長鮐背龎睂齊獻祝萬年長晉紫霞觴一壯挽雕弧扈朔風老擎玉醴預春融深涵聖澤天齊久惠養心將訓練同二驍騎校蘇爾肯年六十七光華復旦慶中天糾縵祥雲紫闕連清晏正逢三祝頌甲辰嵗河海皇上六巡江浙親視回鑾之月誕皇元孫生熙平宜上九如篇指南重譯綏邦萬向北安車召叟千絳老春秋分席侍黃公甲子敘班先曾隨羽仗臨桃驛頻備周廬近柳邉縱埒遙分原野繡韜弓與獻大庖鮮豹胎割翠頒腥遍虬脯燔紅賜炙傳再從漆沮占吉日復經井絡奮戈鋋臣前後隨圍三次金川隨征一次恩榮世受延華閥典禮親承到法筵間奏新宫觀合舞共嘗二膳拜羞籩保和茀祿徵同泰行健精神見秉乾長養堯春逢五紀丙辰數過甲辰年臣蒙五十恩歷俸年驍騎校七十一年六十七春光普護夀籌增祝嘏偕來頌日升爵捧瑶階班濟濟筵排扣砌影層層瀛臺應許仙為侶閬苑欣看夀作朋攜得御爐香滿袖銜恩世世及雲仍驍騎校永海年六十七吉祥花仁夀鏡日月光華一人聖無疆萬夀膺天慶凡我大小臣鄰濟濟莘莘錫以嘉福同兹大春千年不數桃餐實三山漫詡脯擘麟洗爵斝聯圭紳膏露澤物含和醇驃姚夙備龍驤翼蒙聖恩深歌聖德驍騎校伊隆阿年六十七引年溯虞代遭遇荷恩殊黃髮仙羣集靑陽慶典敷筵陳榮列几樽設擬中衢愧附鵷鸞末嵩髙敢效呼驍騎校王宗裕年六十七維天於穆克健其行維山敦艮克協其貞皇矣聖主久道化成上蟠下際禮備樂明熙熙夀宇濟濟耆英及爾蕃服逮於耉氓天子有命各簽爾名申以衎燕首祚元正天子有命各聯爾情孰開九帙錫是觩觥羣歡是洽蕃祉是並臣列末校獲與拜賡惟聖之賜繄臣之榮驍騎校楊勇年六十六乾元保太和至誠通悠久策衍河洛先慶燾麟趾後桐生被煦嫗函夏沐高厚協氣蒸巖廊韶春轉杓斗衎燕諏嘉辰帣鞲集龎叟臣忝屯騎末袀衣給奔走敢誇驤霞轡愧乏射雕手雅詩詠敦弓亦用祈黃耉幸沐中衢尊恭承長樂酒聖人夀萬年賡歌祝山阜驍騎校馬逢泰年六十六史牒推遐算天皇萬八千恭惟聖主夀全綜耉耆年敷幄南山對開尊北斗懸恩輝戎隊洽長此慶酺筵驍騎校舒隆阿年六十六惟天貞以恆萬物資根荄惟皇仁以夀六宇咸滋培篤祜天貺集繼武春筵開微臣厠環衛觀酺陪黃鮐殊榮得未有抃舞依堯階共祝億萬年福祿與天偕驍騎校五格年六十六紫殿祥雲麗黃圖淑氣開盛筵干品列嘉會百僚陪窈眇調元曲雍容獻夀杯自慚樗櫟質猶得侍蓬萊驍騎校李德年六十六盛軌今逾宴鎬祥符昔協遊河樂宇百年天錫夀人萬國星羅花放玉階春早酒斟銀甕恩多雲日輝騰糾縵奎華敬捧宸歌驍騎校崔永祚年六十六璇宫錫宴紀昌辰耆耋同登浩蕩春中外一家排綺席東西兩席薦華茵金漿潤浥千巵盎翠莢祥敷六葉新瑞聖雲章標景矞象功樂奏鬯韶鈞綴班喜接螭頭陛聯步榮偕鶴髮人忝列八屯承渥澤依光長願荷陶甄驍騎校恩柱年六十六聖主多祺普錫下臣懋典榮膺共祝萬年慶衍正當五世祥徵扈從夙依仙蹕凱旋久仗威稜臣曽扈一圍十次出兵次春早敬陪廣宴惟偕耆艾歡騰驍騎校王光勳年六十六天佑聖淸於萬斯年洪惟我皇纘緒體乾蘿圖瑞輯玉燭和宣慶衍五世澤覃八埏乃普春祺乃敞恩筵耄耆雲集鵷鷺班聯叨參列騎欣躡羣仙載賡天保方至如川驍騎校額爾登保年六十六瑞啓瑶階六葉蓂卿雲靄靄護彤庭天開夀宇凝祥祉人在春風拜闕廷仙仗光分鵷鷺席彩爐煙裊芷蘭馨恭逢五福敷黎庶四海謳歌紀輯寧驍騎校八十七年六十六昔聞秩禮宴髙年未見耆英再倍千今日身從天上會始知真有地行仙一五雲深處慶良辰麗日祥風燕譽新鷺序鵷行齊拜舞三千人共祝堯仁二驍騎校西昌阿年六十六龍紀嵗符大衍鴻鈞律轉三陽化宇慶聯中外夀星輝見角亢鯢齒芝睂在列鳳歌鸞舞成行何幸兜鍪下士仰因祝聖躋堂驍騎校張慶餘年六十六文教覃敷及遠邦綜寰瀛內錫敦龎髙年士許登螭陛大酺人教捧玉缸肅序鴛行齊鼓舞和宣鐘律共舂撞三千隊裏慙星校惟頌純禧福夀雙驍騎校吾爾棍布年六十六勾萌元氣首春寅遍育蒸黎作夀人露潏雲雕逢國慶齊來絳闕頌皇仁一就中上夀百年過手賜天漿煥綺羅末士躬承環衛久蒙恩雀躍綴歡歌二驍騎校德住年六十六雲龍肇紀麟鳳來遊溯姚軼姒苞商越周穹輿契極瀛嶽環騶錫世曼夀芝英鶴籌尊設于衢宇奠於甌宴以昌之慈惠惟稠稽首拜舞慶祝歌謳景卿光煥和甘物柔頌言綏履玉瓚黃流驍騎校馬燮年六十六寵綍遙傳北闕華樽敬獻東楹春旗風外鸞翥法曲雲間鳳鳴金笈南山曼夀銀繩中岱長生堯封瑞告星昴河渚榮光曉明驍騎校布藍太年六十六方壺員嶠三千界皓首龎睂草萬齡合頌鴻禔凝景運弧南星共擁樞星一道崇聖帝勵乾乾和會恩膏溥列仙今日太和元會始嵗星五十次周天二驍騎校杜國璉年六十六春回黍谷物敷榮已醉屠蘇詠太平百産陰陽含納甲萬年奎壁煥長庚民之質矣升恆頌帝念在兹宵旰情欲廣知仁齊樂夀特頒禮樂應文明鹿蘋魚藻恩沾渥燕譽龍光喜載賡此日肴蒸蒙酒醴兩階球玉叶咸英得隨鸑鷟瞻佳氣舊𨽻貔貅列禁兵知有期門傳盛事白頭軍校上蓬瀛驍騎校趙廷錡年六十五運會統元一氣星辰映日承光天子曼夀無極臣工茀祿有常引年筆書惇史燕禮巵晉公堂騎曹幸叨從事葵心益凛晞陽驍騎校李瑛年六十五嘉宴錫嘉名何須叟訓更龍光逢兩舉魚藻暢羣情軒籙延方茂堯衢泰以平人皆慶睂夀治益洽心亨錫羡滋雱霈熙春慶阜盈垓埏當此日籲祝户稱觥驍騎校富善年六十五仁風瑞萐播天厨湛露膏承仙掌濡拜手兕觥紫鶴錦三千恩寵貢苞符一春到華筵齒髮榮重霄景貺五雲城歸從蒲坂瞻雲後遍聽康衢擊壤聲二驍騎校楊恆安年六十五禁籞紅雲藹曉光夀祺敷錫鬯春陽欣從七萃弓衣列許接三霄劍佩行紀候階蓂舒六葉承恩衢醴泛千觴幹符明炳昭文治枝應昌辰叶聖祥鳳琯宣韶瞻大酺瑶籌開帙頌無疆期門久𨽻叨分職竊愧同賡湛露章驍騎校富敏泰年六十五隆典優耆老仙厨盛饌羅萬年敷化永三夀作朋多耉碩均懷德臣民盡飲和嘉珍兼席進良醖幾巡過秩秩階趨鷺逢逢鼓扣鼉白盈顛自潤紅映頰微酡福宇開金鑰春祺展玉珂于胥康且樂湛露載賡歌驍騎校劉溫年六十五泰山安四維河水潤千里繩檢表矞煌苞符集旖旎我皇敷錫福崇增何可擬引年典載申拜舞集杖履朝班列有爵同位序以齒齒爵所最先帝手賜之醴殊珍以次頒精鏹及文綺微臣藐無識卌載承蘭錡宴得與春溫恩已髙嶽峙為聽康衢歌僅表微忱耳帝德蕩無名天顔晬有喜驍騎校寧貴年六十五丹徼昔年獻捷春墀此日綏睂聖德乾坤髙厚天恩雨露涵滋列叟筵開兩序引年酒過三巵瞻就堯雲舜日敬賡祝嘏摛詞驍騎校富永年六十五帝德通三極箕疇衍萬年升恆開夀宇景慶麗中天雙闕黃雲彩元辰瑞景鮮西山呈萬象南極萃羣仙廣樂諧鳴鳳和膏酌醴泉宸衷涵造化庶彚入陶甄共效康衢舞真欣皇路平兜鍪參末校簪紱與耆筵就日龍光近呼嵩鷺序聯京垓周甲子寶籙慶長綿驍騎校依常阿年六十五北斗敞瓊筵南弧映彩躔詔申千叟宴恩自九重天驍騎鷹揚末樗齡鶴算延載摛難老頌惟曰萬斯年驍騎校李國瑞年六十五象緯中霄盛恩膏碧漢垂藻魚環玉戺芝鶴聚瓊墀雨露三陽啓星雲八伯隨甕真輝瑪瑙盤盡飾玗琪天萃敦龎氣人參矍鑠姿鳳麟娛德圃龍馬煥文池運啓符徵泰祥開道在頤微名七校末長祝萬年基驍騎校郭士和年六十五羣僚次第荷龍光扣砌新迎綺旭長繚繞爐煙雲景煥載賡聖主夀無疆一綺席圓方法饌珍擎來賜篚彩璘彬熙熙舞蹈溫顔霽仗外歡傳六合春二驍騎校楊阿泰年六十五旃蒙啓嵗籥寰宇熙春風夀祺茂敷錫宴敞蓬萊宫仙液斟雉羮鶴髮扶鳩笻生成荷聖世福祿承皇躬何須餌芝术早已凌喬松皥皥遊虞唐拜手頌元功驍騎校成保年六十五珠囊金鏡應時昌夀宇宏開景運長諏吉笙簧榮耉老宜春鵷鷺接班行恩推虎旅均霑澤日暖螭坳各捧觴敬效嵩呼輸寸悃歡傳喜氣溢天閶驍騎校常住年六十五元朔頒書衍慶長符占六日啓靑陽翩翩耆耉咸敷席拜手恭擎介夀觴一夀是亨途福是衢欣隨鴻造接天樞春來花栁無邉色添入皇家積慶圖二驍騎校張廷佐年六十五封史采五石葛洪圖九芝仙經服食侈耆頤何如聖皇御宇飲和飫德多龎睂長生之籙注玉陛瑶函琳札徒爾為臣班列校荷嘉宴駐顔喜捧流霞巵宫八十一絲商七十二絲鏘洋雅奏諧咸池千秋曼夀無如此時歌千叟之譽處兮示天子之惠慈驍騎校全德年六十五寶籙超元古殊祥景曜開林泉耆彥聚海國夀人來湛露沾恩重需雲捧賜回唯將千萬嵗擎跽祝春臺驍騎校孫煜年六十五曈曈春日瑞光駢五色雲中敞夀筵咫尺堯階同拜舞仙醽醉後又延年一萬國耆台荷聖恩須知喜氣滿乾坤古稀天子乾清宴一席三千鶴髮溫二驍騎校五十四年六十四尚齒仁恩溥欣霑雨露深華筵頒御饌庶老預朝簮象協三階瑞韶鳴九奏音願歌天保句遍德和薰琴驍騎校蔡永恩年六十四聖皇春錫慶恩施及黃髮溫綸下丹墀和風拂綺席燕衎歌衢尊鷺序咸有繹堯厨旨且多歡舞餐瓊液爰同耆艾福遍霑膏雨澤四海登春臺頌聲被金石驍騎校奎福年六十四聖神燾化宇耄耋覲天顔春到殊恩錫筵前睿藻頒祥徵河洛數慶積地天寰皥皥朝暉麗歡騰拜賜還驍騎校佛爾卿額年六十四紫殿晨開丹墀春啓瑞靄如雲瓊筵燦綺式飲耆齡以燕樂只仰瞻九重天顔有喜涵以聖涯煦以溫旨惟國之慶惟天之祉積幾元會躬逢盛軌臣飫渌醽臣餐瑶蘂鶴髮蒼顔敬仰垣紫驍騎校潘永泰年六十四真得長生道躬為郅治人雕弧添甲子華糈洊冬春飯是瓊爢設漿從寶甕陳年年賡聖夀翹首仰楓宸驍騎校李廷輔年六十四新年瑞色滿皇都渥澤醲垂萬姓孚介夀金樽陳黼座引年玉饌出珍厨中和樂奏鏘金石耆老歡騰儼畫圖欲和九如慙里曲惟欣身已到蓬壺驍騎校佛佑保年六十四皇都萬象春蹈舞上楓宸紀嵗方周甲開筵正賜辛鐃歌曽唱凱仙樂此寧人醉飽還家喜便蕃捧異珍驍騎校汪昌緒年六十四宇內歡歌億兆盈有生無不慶長生千官一例名千叟萬嵗三呼合萬聲手賜瓊巵班齒爵詔傳瑶杖到農氓欣從弱嵗參環衛今日蓬瀛會上行驍騎校官保年六十四惟皇御九有萬物臻純熙日星成圭璧卿矞揚氛霏河海式清晏嶽鎮朝逶迤東西瀛入覲南海北海覆幬無所遺羣生為一家振緒循綱維煦以飽暖斆以孝慈儉勤樂業中和靖綏天乃錫以嘉瑞人人睂夀無與私貴者夀於寧賤者夀於畦賢則夀以爵愚則夀以麋九重綽楔嵗嵗下升平人瑞溥四陲皇帝御宇五十載輝煌恩詔元旦既以施越六日舉千叟宴錫福優老介夀睂謂今天道地寶景運軼往史嘉與三千耉叟同享之臣年初杖鄉臣愚靡有所知步彤廷捧華巵敬思上乾下坤夀宇萬萬載敢效祝嘏陳昌詞驍騎校豐伸住年六十四嘉祥駢聖世嘉宴敞新春法酒傳三雅仙厨飫八珍溫綸敷祉備里曲紀恩頻率土同稱祝嵩呼達紫宸驍騎校常德年六十四郁郁慶雲敷習習條風揚丹墀列耆筵黃髮扶鳩杖霞觴闓澤覃玉醴春和盎春到遍寰陬觴傳夾綵仗我皇溥至治曼夀夀無量恩流幬載中德邁羲軒上賤植依周廬荷戈憶少壯宿齒幸承恩抒誠效謡唱驍騎校伊成額年六十四皇建有極錫民永年遹繩祖武恩綸載宣孟陬六日懋舉耆筵鳩杖舄奕鷺序駢闐乾坤合策雅頌昭宣備禮和樂燦九重天臣綴班末榮附彭籛呼嵩祝華聖祚洪延驍騎校四格年六十四古稀天子沛深仁暢垓宣埏六幕春夫惟大德得其夀用敷皇極錫厥民猗歟五十載太和被寰海臣庶多耆年熙熙歌樂愷繩武錫宴輝前光天門詄蕩華筵張奏廣樂兮㪺仙漿太平日月彌舒長小臣良自幸遭逢及榆景榮分末席效鳬趨恍遊華胥侍壺嶺從今九宇增春祺羣歌湛露詠蕭斯合千叟算祝聖夀億萬萬年天佑之驍騎校尚維祥年六十四條風駘蕩搖靑旗仙蓂六甲舒彤墀三千叟來獻華祝聖皇繩武敷春祺瑞靄祥雲輝紫殿欣遊帝所如佺羡小臣無以效涓埃更荷長春預嘉宴班行幸附鵷鷺羣鑾坡咫尺欣瞻雲願效嵩呼共拜舞百千萬年歌聖君驍騎校三音布年六十四熙春沾介福詔許與芳筵髮短華松丈顔酡醉橘仙杖鄉兼杖國知老不知年世際昌平日歡呼雨露天驍騎校石柱年六十四彤宫曉闢絢晴霞澤沛寰區億萬家酒泛金樽甘露滿香浮寶鼎篆煙斜封中萬嵗齊稱祝仗下千官盡拜嘉宴罷喜承鳩杖賜耆年駐景樂無涯驍騎校立柱年六十四解澤霏潭潭需雲樂溶溶陽和四序調玉燭平明廣殿鳴金鐘皇躬斂福用敷錫嘉會千載今正逢銀鱗既可膾紫駝亦有峰頓勝靑田獻美醖油油三爵監史恭溫語從天下扶老詔攜笻或歌或咢陳歡悰但願黃髮鮐背侶年年嵗嵗兮歌康衢而祝華封驍騎校薩炳阿年六十三彤墀宴敞集龎睂喜入新年晝景熙郅治太平真有象法天大道本無私尊浮玉醴三霄露階挺瓊柯五色芝耆老齊聲呼萬夀重霄稠疊湛恩施驍騎校李國梁年六十三筵羅耆瑞泰交孚治法心傳邁典謨醴湧瑶源通碧沼芝生瓊圃叶昌符八埏風動昭華琯五福疇呈衍慶圖次第金尊㪺露醖便蕃玉膳出珍厨恩均共喜螭坳侍賚渥還容鳩杖扶臣愧菲才叨化育騰歡常願效鳬趨驍騎校鄭之炯年六十三皇帝御宇五十載純嘏緝熙登夀愷煦嫗覆育物咸若太和瑞氣蒸耆艾丹詔春從天上頒國慶洪釐盛嘉會樂以天下大引年恩推自古所未逮五雲仙醖如醍醐燔炙馨香薦醯醢賡歌天保稱萬年抃舞期門幸展宷驍騎校什圖庫年六十三黼座駢釐景祚昌豐排綺席仰天閶蓂開六葉韶光煦星聚三階茀祿康環拱龍顔真咫尺騰歡魚藻異尋常人蒙綏福籌增海長願年年獻夀觴驍騎校鐵圗年六十三夀斝承恩渥天顔快就瞻山呼地嵩嶽海會佛華嚴味飫嘉肴列香濃法酒添從兹策筋力荷戟侶丁男驍騎校魏煥年六十三嵗在旃蒙始春六日夀獻霞觴風調玉律景星既燦卿雲維霱載布耆筵其香有飶熙皥同春康強逢吉天子萬年所其無逸驍騎校明福年六十三開春駢國慶夀宇多耆年陬澨未勝詳近者羅三千詔許扶鳩至擎跽登長筵鶴舉共翺翔雁序自後先渥賜出尚方各各成班聯海水非不深山髙可陟巔未似今日恩珠榜懸天仙驍騎校巴什年六十三飲天和食舊德不服靈丹頭自白白頭紅頰醉金觴曰奉春酒躋公堂天子賜宴恩殊常旭日曈曨和風祥洽階有仙蓂厨瑞萐叩頭三爵拜恩波昔日從戎金鎖甲驍騎校佛隆保年六十三引年繩祖武耋老盡叨榮恩許扶鳩杖歡同奉兕觥聯行鵷鷺集接翼鳳鸞鳴願獻長生頌熙熙樂太平驍騎校楊懋德年六十三春熙翔洽慶升平喜溢耆筵瑞氣盈申命九天叶重巽歌詩萬物樂由庚條風披拂資和煦闓澤涵濡共阜成膏醴遍霑珍賚渥純常臚頌願同賡驍騎校徹式年六十三帝德敷寰宇祥光繞紫微三千羅夀宇咫尺近綸扉風拂仙鸞舞雲迎綵鳳飛樗材叨醉飽春惹御香歸驍騎校六十九年六十三侍宴來天上承恩遍海壖大酺梅鼎飫春酒露盤鮮獻瑞籌增億依光叟溢千微臣儕五校踴祝敢爭先驍騎校梅朝棟年六十三雞人初唱虯箭頻催觚稜日麗殿閣風回鳴珂迭至委珮齊來瑶墀燦列嘉宴鴻開溶溶玉醴灧灧金杯臣拜稽首帝命欽哉歡騰萬國慶洽九垓式遊化宇更上春臺驍騎校興昌年六十三瑞靄絢韶春彤庭廣宴陳仙蓂開吉戊厨萐紀昌辰酌斗敷多福扶笻捧異珍小臣欣得所長作祝堯人驍騎校薑文逺年六十三麒麟在藪鳳來儀人瑞臚歡集盛時草萬齡為一人夀三千臣賦九如詩春濃宴上六淸酒風亞筵前四照枝尚有茅簷同擊壤來朝試聽使車詞驍騎校永福年六十三斂福還敷福瑶墀盛綺筵昌辰開五十曼夀引三千茂典殷繩祖清躬健法天佛稱無量夀聖衍古稀年日耀龍光近風噓鷺序聯春臺勤獻祝純嘏慶綿延驍騎校裴成烈年六十二景雲縵九霄端捧朝旭麗丹露貯千年灑作醍醐味歡聲震八方拜手祝萬嵗既醉紀韶春渥賜下瑶砌願告光祿勳天憲即常例自此萬萬年年年沐嘉惠驍騎校馬瑞翰年六十二聖德懋諴和乘時受福那延洪同祝算安樂夙名窩渥貺惟稠疊嘉祥漫縷覼昈分營羽騎髦更拜恩多驍騎校六十一年六十二太和釀膏醴庶彚滋根荄乘春覃渥澤萬宇歡無涯引年自古重恬養三王皆榮惟我朝盛懋舉恢堯階良辰燕喜集廣殿魚鱗排沐德附賡歌傾聽虞韶諧驍騎校傅瑞年六十二珠樹森森舞鶴羣瓊筵許厠虎賁軍佛光現處瞻天近龍象長依五色雲一經營膂力昔方剛仁育恩推受溥將投老惟知遊化宇熾而昌與夀而臧二驍騎校舒通阿年六十二廣殿晴開廣宴春旗暖揚春光共仰垂衣穆穆羣聽珮玉鏘鏘恩沾既醉既飽夀稱如阜如岡欣列螭頭豹尾長依扇影爐香驍騎校蕭昌葆年六十二日華麗天行五色朝霞披龍飛紀元五十載貞符景福開軒羲靑牛白鹿丹房芝天下老人同秀睂諸藩來賀重譯知何況朝臣鵠立當丹墀大臣雍容小奔走臯揚言虎拜手初時少年今白首一日承恩侍宴來南山佳氣入春杯仙籌算衍蓬瀛帙甲乙重重章蔀開驍騎校富蒙額年六十二四海熙恬日耄年境倍安敢希附人瑞竟得列仙官典重春祺茂恩隆禮數寬雖慚稱介士鶴髮偉衣冠驍騎校周玉年六十一雲中鳳闕聳岧嶤金殿筵開坐九霄式燕君臣歌鎬樂迎陽律呂協虞韶延齡仙酒三漿泛飫德珍厨五味調已喜駑駘參末校恭逢湛樂暢熙朝雍容忝接鴛鸞步矍鑠欣隨騄駬鑣中壘護餘遭曠典蓂階長得奉神堯驍騎校三格年六十一嵗序三陽啓春光普燕筵迎禧近人日錫福遍耆年海積籌添萬嵩呼數倍千純常膺景貺至健本符天驍騎校尚維枚年六十一爐香裊裊結祥雲上日連輝拜聖君列席新成蓬島會搴旗舊𨽻羽林軍迎年譜曲鸞箋疊益夀斟杯鷺序分從此嬉春長預祝九天應許麗星文驍騎校佟士祿年六十一紅日花磚挂曉鉦新年詔許宴蓬瀛瓊漿飲罷春祺普環海同呼萬嵗聲一禹糧堯韭味何長蔀屋齊開春甕香鶴在雲霄遙望日芝田路近共翺翔二驍騎校金國甡年六十一聖德體乾行不息自然久庥徵應嘉祥海宇躋仁夀學兼隆四代詔特宴千叟樽俎遍堂階班聯煥組綬呦鹿歌既登嘉魚儀孔厚自慚鵷行末曽列豹尾後何幸及餘齡欣逢酌大斗舞蹈仰皇仁婆娑拜稽首驍騎校吳興綱年六十一德化千年洽仁輝萬國同星辰咸拱北江漢本朝東仙聚蓬壺上恩翔雨露中生成皆帝力錫福更無窮驍騎校皂保年六十一紫宸髙殿仰垂裳樂奏咸韶綺席張繡戟春風頻侍直金莖甘露忽分嘗宇躋仁夀茅簷富牒衍雲仍玉葉長自是貞符協蒼縡賡歌微賤豈能揚驍騎校奇常阿年六十一祥麟在藪威鳳儀郊是徵頤夀用叶泰交化隆軒嚳治邁羲巢爰詔鮐背式燕螭坳湛恩廣被寰海咸包歡徵耄耋慶溢衡茅壺凝玉液膳錫珍庖歌陳衢壤志暢笙匏驍騎校戴起龍年六十一引爵深恩到荷矛放鷹壯志敢扶鳩直言間享升平樂技擊於今尚黑頭一大千叟列御筵髙盛事同教記各曹此度宴開千萬度九重春合紀蟠桃二驍騎校札隆阿年六十一法祖筵開再凝庥叟集千松喬方接武睢洛恰差肩揲易需雲象歌詩湛露篇遭逢誠曠典拜手祝羲年驍騎校三達子年六十一三千鯢齒會堯階康爵雍容降福皆列衛每欣參袴褶從戎猶記束鞞靫雕翎敢詫無雙羽幕府曽頒第一牌荏苒餘齡慚駿足欣誾韶景吐新荄得隨鷺綴東西序兼奉瓊筵甲乙排肅肅壺尊揚玉觶纍纍組綬映青緺五雲旭捧天顔近兩候風先人日佳花甲才周榮預宴願同翽鳳賦嗈喈驍騎校王巖年六十一斗柄報春回筵同曙色開上辰詹六日朋夀接三台蓬島祥雲合瑤池瑞雀來叨榮隨近侍共進萬年杯驍騎校常山年六十一引年四代儀文舊復古原於泥古殊淸切禁庭臚鶴侶巍峩春殿許鳬趨筵分閬苑森陳綺星見南維朗耀弧式燕以敖和氣暢俾耆而艾惠心孚醇醲拜賜樽齊飫抃舞騰歡杖共扶直以諴民卜純嘏萬年有道邁唐虞驍騎校何廷樞年六十一歡聲溢九區愷澤慶沾濡特賜耆年宴新逢六日酺春光舒蔀屋仙境坐蓬壺萬祀開多福先呈瑞應圖欽定千叟宴詩卷十八
