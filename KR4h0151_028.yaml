盤奉靈芝繡檻榮柔菹初馞郁芳醴倍澄清有慶成嘉禮其湛洽衆情龍光宣譽處萬億頌生成刑部九品筆帖式髙大源年六十六世曼夀時純熙皇帝陛下奉三無私刑措之世夀考治開明堂進耉耆上夀百五下逮六十歲莫不稽首拜手來庭墀左建星罕右建雲旗陳瑶斚進金卮古稀天子親勞之穆羽交奏和風四吹三多之頌九如詩小臣誦之當祝釐願皇萬歲德澤長敷施刑部九品筆帖式都爾松阿年六十六西卿序秋官實佐天地仁導揚太和氣其在慎狴狺咸中積有慶盛世以祥詢臣職隸末秩恪敬夙所陳分省十八司司司效誠淳詳哉悉五聽大者建十倫奏進荷乙覽屢省義益諄善惡由自取輕重皆細甄仰見大宇內正民輔育民徒有畫衣冠益見謹步逡漸摩積幬紀樂闓敦醇誾庥風溢廣海一一皆壽人熙陽溥洪澤瑞景躋皇春微齡備職久玉陛餐甘醇中和匝霄宇醲化歸陶鈞敬陳郅治篇洪鬯恢無垠工部九品筆帖式保綬年七十玉衡初啓芳序化宇蕃祺普頒需宴恩承北闕頤觴頌獻南山冬官職司斤削春日拜舞斕斒添健欣扶鳩杖微材忝附鵷班工部九品筆帖式伊星阿年六十三至治泳闓洽耆齡普春筵臣年六十贏厠隨考工員側聞唐虞世工虞本同官若上下草木鳥獸皆奠安周家列事典富養民物便天時及地氣材美工巧全匠人建營國眂景𣙗以縣廣崇以行水遂溝洫澮川磬折欘柯矩半矩謂之宣飭材辦民器百工居一焉勾稽列簿籍翻録臣所専熙朝定嘉量和鈞合陶甄河隄循軌轍海若護墉楗浩浩協大道閎閎契乾端聖皇敷愷樂域內沾濃漙請歌修治績平成邁中天工部九品筆帖式富色賀年六十二百工之事皆聖作規矩陰陽天地人大為體國復經野小之斫削兼輮輪五材備物器殖阜六典飭官工巧淳小臣翻書備末職恩筵釜旊頌皇仁工部九品筆帖式泰昌年六十一鼓舞並黎元趨蹌跂九門丹鋪羅劍佩華髮附鸞鵷末秩慙周甲醇醪拜上尊東華吹暖律長仰霽顔溫都察院九品筆帖式六十五年六十五大衍昌期協中天景運隆耆筵承聖澤純嘏集皇躬五福雲礽慶三雍禮樂崇弧躔懸燦燦璧水寫瀜瀜大典因時舉鴻恩薄海豐環墀皆耄耋受澤自髫童班綴鳩笻後榮分柏府中依光容獻頌抃舞愜葵衷翰林院九品筆帖式何博年六十二聖風熙洽遍登春敷錫耆筵紀令辰典重引年扶玉杖恩容列坐綴華茵備官夙幸蓬山近飫澤榮邀寶露均天夀延洪臣庶樂三千黃髮遍含醇光祿寺九品筆帖式馬涵泰年六十三蒼螭赤豹聨翩集白鳳青鸞次第翔何用物華誇上世由來人瑞是真祥榆輝碧漢星垣晃蓮拂彤霞嶽井香寶􅛋堯厨華渚飫伶筒軒樂洞庭張良珍脯熟頒琪席醇玉醪清捧壽觴矩範陰陽歌愷樂紀年元會運無疆光祿寺九品筆帖式覺羅堪卓年六十效職依中禁分曹隸大官欣陪鮐叟會榮飫􅛋厨餐廣殿卿雲爛崇墀湛露漙聖年增億萬寰海正臚歡國子監九品筆帖式赫著年八十四珠囊金鏡協時昌福衍箕疇聖祚長五緯星辰連瑞景九閶鴛鷺接班行承平有慶開嘉宴元會當陽晉壽觴四十餘年邀厚糈更叨天酒浥芬芳中書科九品筆帖式德恆年六十六鶴髮時霑渥澤鳳池日煦溫綸九宇歌歡函夏千觴宴洽熙春玉琯宣調虞樂瑶階駢集堯民忭舞垓埏普暢三多長祝聖人內務府九品筆帖式哈福年八十祥呈南極象昭回聚老人星映斗台不待春分才見丙凝輝如月照蓬萊一九重閶闔普耆年綺席鱗排次第聨自是皇家春浩蕩人霑天酒大羅天二內務府九品筆帖式化亮年七十四玉燭輝南極瑶樞拱北辰萬方耆齒會重譯壽眉人扣砌和風轉龍樓瑞色新引年兼序爵授几更敷茵洵覺班羅鶴同欣嵗紀椿上尊祈爾祉和氣酌其淳禁苑通仙籍餘齡沐大鈞長筵歌燕喜敷作八方春內務府九品筆帖式拴住年六十九壽宇生軒羲世春和滿閶闔門典隆上庠給廩道在中衢置樽九疇錫庶民福萬壽奉天子尊被渥常教沾祿餘生何以酬恩內務府九品筆帖式沙旌阿年六十八酒醴下丹鋪鵷鸞拜玉除恩筵開殿陛壽宇合車書景運隆三古耆年頌九如醲春逢澤沛化日正長舒內務府九品筆帖式五格年六十八春回斗柄紀新年詹吉欣逢敞御筵鮐背競趨層殿上龍顔敬奉五雲邉擎杯共飲瓊漿沃執醬爭誇玉食鮮從此人人躋上壽長瞻舜日樂堯天內務府九品筆帖式額爾登年六十七閶闔開和風萬方昭景鑠耆筵錫春祺天漿泛瑶爵皤皤壽而康蹲蹲舞且樂文瀾漾瀛澥貢道通卭筰年高杖扶鳩恩溥觴飛鶴小臣管庫屬飫德傾葵藿內務府九品筆帖式伊星阿年六十七仙樂奏雲和趨蹌應玉珂一人開壽宇四海沐恩波酒泛霞觴暖籌添海屋多騰驤臣職隸臣隸上駟院龍馬獻新歌內務府九品筆帖式成福年六十七時頒內帑水衡錢將作經營忝備員造隸營司帝矩皇模締造逺化成久道萬斯年一萬年枝上五雲蒸韶樂中和夾陛應味浹醍醐嘉宴錫光依日月祝升恆二內務府九品筆帖式錫善年六十五鶴算頻添海屋籌丹墀拜舞共扶鳩人依國慶咸增夀天為時和迭降庥唯見若華榮日月不知蟠木幾春秋小臣榮與鴛班後同仰皇家寵澤優內務府九品筆帖式薩炳阿年六十五聖皇體乾乾大宇臻熙樂至德所敷施南瀛暨北漠飲食服御間精理天酬酢內府置七司三院區資格近臣親見之宥密達景鑠新春渙闓席耆叟臻繹絡嘉宴所賜珍天府早丹艧鳳鸞映錦綺珠貝駢璀錯杖飭瑞鳩笻盤瑩花磁爵龍賔兼虎僕觿玦如意琢承筐爛有輝寧復數酺醵臣齡周綺甲臣職邇璿籥叨蒙蕃錫恩歌繼剬詩作內務府九品筆帖式吉爾圖堪年六十四積數地支天幹得餐玉芑瓊麻人到絳霄以上春環碧海為家五色崑崙瑞露九光蓬島朱霞環跪墀坳上夀萬年日月光華內務府九品筆帖式五福年六十二龍墀鏘玉佩鶴髮滿瓊筵闓澤洪敷福崇儀懋引年純常天積慶熙皥地行仙寰海歡聲洽昌符慶瓞綿內務府九品筆帖式額爾精額年六十四重熙纍洽慶太平時大禮隆樂錫恆春儀域內之老被澤靡遺近天子光三千委蛇天顔如春晬穆有怡天道地寶萬物共之既賜以齒復綏以祺飲以醇醴增以鴻釐以育以養耄耋期頤微秩入宴臣何人斯輝光景爍頌萬年詩品咸安宫九筆帖式嶽興阿年六十四舒為藻祓萃為楨天漢儲材育俊英白髮小臣承籍久紫霄常聽讀書聲一宫禁森嚴秩嵗叨更來耆席飫香醪從知身是佺喬侣景慶光中聽八璈二品景運門九筆帖式額爾登阿年六十六鴻圖億祀瑞象千雯濡為醴露敷為霱雲聖王御世陶育九􅊷俾躋壽耉鋪華濃紛春風瑶爵錫以分蒀龎眉鶴髮三千斯羣衆拜稽首覲光志殷既涵膏澤嵩祝維勤峩峩絳闕煌煌紫氛式洽隆禮光被無垠欽定千叟宴詩卷二十三
