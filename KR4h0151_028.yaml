body:
  text: 欽定四庫全書欽定千叟宴詩乾隆五十年巻二十三預宴九十四人詩一百二首原任八品筆帖式札蘭泰年七十七北拱載霄漢佳氣向金闕五雲起九重丹陛實咫尺先朝常宴㑹羲和流徳澤聖圖天廣大時序遞回斡霈澤施蓬蒿台星入朝謁日月繼髙衢衣冠拜紫宸仰思調玉燭一氣轉鴻鈞鳯凰從天來海上有靈槎列宿頓輝光天下今一家每䝉天一笑所重王者瑞自哂同嬰孩朝班及暮齒風雲際㑹期湛露即歌詩日出黄霞映傾陽逐露葵集杜甫句原任八品筆帖式圖山年七十六魚旟衆兆雀角平氣調陽亢消隂爭氐羗屯衛庤錢鎛邊徼房序鳴匏笙心源溯河黄金色尾閭鬯海中亹聲箕疇攸叙敷錫徧斗車所指瞻就誠紈牛綺馬琛各獻女媧神禹功疇京兹開耆宴紫虚上三危露浥三千觥銀漢之支首帝室壁立文武徠漠瀛章縫奎聚農賈逮工公輸巧離婁明胃神辭蔬飫珍錯遊河入昴騰光晶三王養老口佔畢觜蠵卜吉身逢亨曉參漏靜排綺席井養鼎養同大烹勝鬼臾區跨籛偓更奪韓栁詞鏘鏗老人星效童者舞錦張杖授鏐鎔精羣臣濟濟復翼翼敬聆舜軫宣咸英二十八宿體原任八品筆帖式惠保年七十一至誠徵不息行健祉無疆輯瑞凝庥渥推符賜福長鳧鷖遵渚陸鳴鸐上臯陽嘉禮宜韶景殊歡沐寵光雲霞圍綺席景慶聚瑶房匠氏呈能細工官奉法常臣前任營造司雝官九範肅璧沼五材量陛慶瓊筵敞庭偕玉佩瑲荷恩章遍錫被澤醴先嘗秩秩騰歡普賡歌進夀觴原任八品筆帖式八十三年七十春祺啿啿皇釐爾鈞奏洋洋帝貺之雲葉瑞呈三素影桐蕤長䕃萬年枝蓬瀛杯斚羣沾洽綺角衣冠更濟師何幸散材䝉雨露玉階鵷鷺得追隨原任八品筆帖式心常年六十五耆年臚北闕錫宴聖恩覃蓼彼詩初奏灑如酒正酣蕃釐瞻夀萬懋典際春三日映金觚麗雲垂翠斚甘開筵均海嶽在席盡鏗耼拜手抒華祝汪洋闓澤涵原任八品筆帖式舒明阿年六十三歲月恩波裏風光禁籞中佳辰叨法膳異數感愚衷應律三元肇分甘萬國同連墀天酒渥耄叟樂春融原任八品筆帖式徳保年六十一太和景運平三台調元㪺化運斗魁率土首奉春澤渥唯仁錫夀天所培紀年大衍舉耆席背鮐髪黃鴻溶來呼嵩祝華環九陛跪捧瑶爵分山罍小臣庸愚職無似猥以齒甲叨追陪雲章炳燭映霄漢敬陳周雅歌臺萊戸部大使和徳年六十四聖澤潤羣生燕衎徵喜起耄耋熈昌朝懽言酌芳醴玉罍信湛湛甘液咸霑被至樂鏗韶韺聲振包衆美輝煌燭斗極瑞叶雲物紀耆年盛事多曠典軼惇史承恩感優渥周詩媚天子禮部恊律郎何億秀年六十四龍飛五十載紀元協神蓍引年茂古典繩武徵上儀中朝英英集紳珮寵賚亦逮羣蒸黎珍㕑紛瑞􅛋瑶階爛金芝虞書周典所未覩實超栗陸踰循蜚微臣職管磬識樂慚伶䕫有風入律雲干吕遊麟儀鳳森葳蕤聆音仰元化歡忭傾葵私䖍祝億萬年同獻長春卮翰林院典簿尹榮世年六十九太蔟聲中報早春簪裾列坐賜華裀玉階􅎽鞠三千叟萬六千年祝大椿一叨職榮分閬苑華夙從泮水播休嘉臣由教官推陞今職翰林内外皆清秩夀宿文躔碧海涯二理藩院司務富通阿年六十四卿雲糺縵接星台春列耆筵閶闔開甘醴涵濡欽皥世祥飈披拂洽軒臺泰交象自三階肇需澤恩隨五福來滋液長流黄露甕昇平更捧紫霞杯戎亭息警安重譯海宇呼嵩遍九垓龍節環墀歌樂只象胥駢席詠康哉樂聞儀鳳皆宫羽人許扶鳩晉耉鮐飲順湌和真幸事熈陽小草荷栽培子八品堂官忠武力年六十一聖皇建極懋法天體健徳奮武靖萬方敷文洽四國於論振大鏞彛訓九圍式精禋契穹昊降福慶齊稷元春敞耆筵夀祺崇引翼耄耋偕期頥並荷尚方食湛露既均霑弧星羣拱北獻頌厪下忱聖夀增萬億子八品堂官依里庫年六十五健徳符天行龍飛位九五五十聖祚開延洪引祺緒天五地亦五五五合有所萬一千五百其䇿聖人主五代共一堂是為五福聚文教追五帝五學辟雍舉聖人七十五無疆首作覩開筵宴千叟百五翁拜舞剛柔五方平調劑五辰撫五色現雲物五聲儀鳳羽臣年六十五春風樂和煦子八品堂官舒昌年七十六職趨瑶戺肅精禋元日洪釐聖受新紫緯錫華珠璧合黃輿孚瑞賮球陳圖膺萬禩無窮算酒飫千叟不計巡為是太平多樂夀小臣同拜澤如春太醫院八品吏目劉雯年七十二嘉宴羅千叟中天旭景長三辰調玉燭太乙陋砂牀日月升恒祝雲霞沆瀣漿萬方同樂夀寧藉枕函方太醫院吏目徐聖功年七十一宴開千叟樂訢誾感荷恩光到小臣露挹瓊霄添絳彩雲蟠玉殿兆青鱗已知身到蓬壺境真見人來偓羨倫不假長桑書夀世軒皇錫夀慶兹辰太醫院吏目呉遵䕫年六十四羣老陪歡讌芳辰飫賜筵升恒歌日月仁夀慶垓埏醴浹醲膏沛盤縈法饌鮮黃輿同受福絳闕並登仙自有靈樞奥寧須玉版篇聖皇春錫祉齊慶萬斯年品景山八教習五十六年七十一聖夀慶作人奉璋蔚多士考文太學懋典成巍煥橋門與璧水莪莪萃俊髦莘莘聯胄子推恩勲舊逮枝葉象勺儀容習髫齒屯騎通經及小侯盛事寧數漢唐史家嫻矍圃容里有槐街市微臣忝教軄小學晰粗㫖恭承尚齒筵依光近玉戺百年禮樂方彬麟秀眉黄髪延繁祉歌夀愷賦燕喜累洽重熈古無比萬歲千秋今伊始殿武英庫掌觀音保年六十六聖皇御㝢膺嘉符五十肇紀徳化敷夀世夀人天鍚慶丹霄朗耀輝南弧春風茂典宴千叟欽惟法祖承前模鵷行濟濟㑹華紱鳩笻奕奕趨金鋪五音迭奏鏗廣樂八珍羅列供珍㕑屬國藩臣覲光切鼂華崑宇同燕胥精鏐瑞錦富賞賚次第拜捧歡聲臚㣲臣筦庫慙薄植慶仰渥澤餐醍醐殿武英庫掌髙六達塞年六十二玉爐香篆裊祥烟仗立千官鷺序聯温㫖特頒春澤普不離瑶席拜筵前一鸞掖瓊函職所司金褫玉軸慶葳蕤畧窺四閣琳琅富書契而來未有之二八品催長薩賔阿年七十燕饗歡傳御墨鮮鳩扶羅拜聖人前花迎旭日開蘭楯春上需雲䕶綺筵叨典八材供玉府曾經三捷奏甘泉臣曾出兵三次寧徒醉飽霑高厚豢養先叨五十年八品催長明保年六十三龍飛尊九五泰交祉元吉優齒禮維崇恩膏中外溢長養託堯蒲暄妍依舜日螭階春正啟鮐叟筵初秩上引三台平下逮羣黎質駢羅錫珍貺燀爍揚茂實是惟運㑹孚萬宇霑嘉栗熈陽曜廣衢拜稽賡彤霱八品催總武爾賽年六十五上日諏春吉瑶墀敞御筵南弧初朗曜東海正増川式燕同沾醴扶鳩各賜年叨榮依末秩抃舞共陶然八品催總尚祥年六十一芙蓉雙闕羅千官醲恩普錫㪺金盤從容鳩杖欣就日斗邊沆瀣忘春寒六出飛霙先報瑞晴梅吐蕚春光媚氤氲同裛玉爐香饜飫並沾金斚惠萬年景福介昭明耆夀今朝慶彚征九重拜舞榮天賜駐景從看勝閬瀛八品掌傘副總領達子年六十八劍佩聯行侍玉除雲龍供帳拜恩初泰元神筴天増授萬葉洪暉瑞牒書一條風吹暖上珠竿仙珮聲臚玉陛歡華葢一星依帝座大雲普覆影團圞二八品司匠齡徳年七十四惟徳召和惟仁洽夀仰迪前光敬承天佑熈然同春祥符景宿載布福筵用綏耆舊五代一堂繁禧輻輳於樂辟雍樅鏞迭奏華祝千叟寵加六豆廣儲庀材臣隸職廣儲司萬年永茂八品司匠七十年七十一玉律春回淑景融萬年枝上拂和風九重嘉㑹龍光近千叟殊榮燕喜同寳鼎香濃凝黼座春祺花燦映珠櫳酒行無算尊同溥饌出兼珍膳益豐愷樂並知沾澤渥賡歌不待選詞工臣司戎備觀光切願效三呼祝華嵩八品司匠馬隆阿年六十一彤扉肅穆丹陛嚴森有來繹絡環集纓簪厥惟夀侣萃若琳琛春陽湛湛嘉祉愔愔帝用敷錫饌玉炊金夀卮上獻天光俯臨奎壁舒華拜捧惟欽周逺嶽陬達大海潯龎眉鶴髪羣獻丹忱九拜階前賡韶濩音八品司匠必希罕年六十五春風開畫黼天夀慶平格海㝢樂昇平聖心凜乾惕修和越禹謨緝熈邁文徳景運協泰始萬方陳玉帛蓂舒六葉青雲噴三霄碧鳳詔集耆年雲階肆瑶席華饌餐五芝仙杖扶九節雖在草莽臣亦隸蓬壺籍况復佐庶司歴經分百職葵向久瞻依日華臨咫尺汪濊沐恩波㑹歸奉皇極委弓匠固山達差必那年六十二典隆千叟宴慶澤浹垓埏酒浥三危露香濃百和烟麟膏司匠契燕角飭弧堅質擬參鈞勁規成九合圓貞符彌宇宙薄質荷陶甄景福如川至椿齡頌大年八品牙匠黄兆年六十二雲漿露液泛深卮捧向瑶堦拜聖慈不數耆英真率㑹共遊懷葛太平時技成鏤刻心參匠職在雕鏤器有司逺跡粤東瞻上瑞近光辰北預隆儀五羊持穀金仙到千鶴銜花玉漏遲應向里閭誇盛事桃枝攜得自天逵八品䤹匠四達色年六十八百昌繁衍乾元所育羣生曶爽離照所燭皇矣聖人錫慶淵穆至于萬年斂時五福地寶光華太和渗漉銀甕器車布在圖籙倬漢之文章相金玉臣執藝事考工著録耆彦莘莘禮筵肅肅瞻仰龍光三多晉祝八品鐡匠都爾松阿年六十八慶洽千叟㑹祥開五福堂河圖呈昴宿璧水耀文昌薄技司鳧㮚洪恩泛鶴觴向榮殷就日歲歲頌無疆八品牛牧長六格年七十七清川細草烏犍閒阿童馭此雙角彎偶然磨樹花亂落歸來背胛紅斑斑臣謂相牛經可廢土徳純順皆受治與天作牛與人種此出自然非用智臣格尺箠時後先牧人從古入時篇職在草野忽堂陛夢為太平兆豐年八品羊牧長四達子年七十箕範維皇有極豳詩祝聖無疆嘉應正符考牧泰平况叶元陽禮越四豆五豆恩逮上庠下庠拜手敬臚吉兆年豐衆庶呈祥八品典儀官二達子年七十五鷄籌曉報司天唱曙光欲動黄麾仗九天宫殿藹祥雲十部鏗鏘鈞奏鬯風和日麗藻筵開蹌濟雍容萃耉鮐玉膳芬蒀調翠釡金漿瀲灔汎霞杯體乾健徳綏民福慶衍璇源邁軒頊元辰恩沛鳳銜書湛露瀼瀼甘雨漉欣覩辰朝集瑞多稱觴賜杖繞鑾坡聖朝兩見鴻儀爍八極同春鼓腹歌候選縣丞鄭文煦年七十五皓齒承恩日下均光華景燦八千椿樗材幸附耆英後親向天㕑飫八珍一百里殷膏職勸農聖朝縣倅匪哦松莫言謁選逡巡老猶解趨朝祝華封二原任縣丞張傑年七十一地軸呈輪廣天樞運蔚藍山環嵩華北星耀丙丁南聖徳仁逾皥民風夀越耼瓊筵蹌濟合玉醑耉耆耽麟鳳祥斯輯圖書道益參萬方駢送喜風雨燮和甘原任縣丞張一飛年六十五耆耉萃簪裾聯行宴玉除蕃釐川至候景福日升初共戴無私惠頻聞大有書花封曾佐職熈皥徧閭胥候選教諭侯鍈年六十五文思溥四表薄海置學官人欽弦誦貴士習居稽安上禀聖謨訓為世飭井榦潔修實圭琰文章匪帨鞶淳風積浩浩芹藻澄漪瀾孰司秉鐸責必以詩書端㣲臣忝何能需次從鉛丹宿齡趨夀宴溥協四海歡光華恢學苑祥祉揚文壇萬年孚聖治翽鳳與祥鸞原任教諭張秉仁年七十四朶殿環千叟温綸許署銜冠裳高洛社歌頌叶嵩巖紀鳳貞符啟羅鳩淑氣諴引年春澤溥珍膳及卑凡原任教諭梁巖年六十六韻疊一先筵開千叟奎璧文章角亢星斗盤簇珍肴觴盈㫖酒濟濟雍雍小大稽首洪惟聖皇燾昌九有博厚髙明徵諸悠久枯荄重榮願附薪槱以矢其音天子萬夀順天府薊州訓導髙日新年七十一曉聽仙璈奏身依彩仗前韶春雙闕麗旭日五雲懸廣殿駢佳氣金爐擁瑞烟兩班排宿衛千叟集瓊筵職忝星畿麗榮分璧水鮮青衿崇右序皓髪奉嘉籩獻夀螭坳近稱觴鷺羽聯奎文敷至教福澤永洪延候選訓導金式金年七十八南極祥輝映景星夀祺溥錫宴彤廷共承玉宇三霄露初紀瑶階六葉蓂典洽引年榮賜杖恩崇敷福慶延齡中和樂職諸生業芹更増春藻更馨候選訓導陳炳年七十一皇仁燾普黎蒸泰華為山夀瀛渤為川増元氣布濩一世界黄髪鮐背鯢齒方瞳碧眼皆