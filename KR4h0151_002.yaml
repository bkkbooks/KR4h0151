  text: 欽定四庫全書欽定千叟宴詩
  hash: sha256:d28eb417fb510c698f1fadfea27e0a7d101c596bd5a7a703e882c1d0d58c7245
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0151_WYG_002-1a, image: WYG1452/WYG1452-0002c.png}
body:
  text: 提要臣等謹案千叟宴詩三十六巻乾隆五十年奉勑編洪惟我皇上斟元陳樞體乾行健㑹歸有極徳合無彊曼夀延洪固預卜億萬斯年康强逢吉而品彚含生得沐盛朝之涵育亦旉與盛長百昌蕃秀熙熙然弗異華胥在廷紱珮既多符君奭之銘即蔀屋茅簷嵗以百齡䝉賜者春官之籍亦縷指不能殫數豈但東都耆舊僅有潞公晉邑老人惟傳絳縣而已哉斯誠太平至治之徴也昔我聖祖仁皇帝以海甸承平咸登仁夀曽以康熙壬寅詔開嘉宴以千叟為名我皇上揚烈覲光克繩祖武嵗乙巳正月六日親臨賜宴式繼前規一時龎眉皓首扶鳩杖瞻龍顔者計三千餘人仍以千叟賜名舉成數也亦循舊典也燕飲歡洽錫賚便蕃睿藻先頒頌聲競作儒臣排次成編凡得三十六巻既恭呈御覽剞劂頒行謹恭録入四庫全書以昭久道化成之盛羙夫草木滋榮根抵盤深人知草木之滋不知天之功也川嶽流峙亘古貞固人知川嶽之流峙不知地之力也然則四海恬熈高年耆耉非臣民之自能夀惟皇上之深仁厚澤培養而致此夀此臣等所以拜手稽首為聖人頌也抑徳侔天地者夀亦必符扵天地臣等能勿拜手稽首為聖人祝哉乾隆五十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7e64ace14b5a895cd678e1db03c0ab0ea8effdc79bcd2d8ea0f7f5e748870c01
