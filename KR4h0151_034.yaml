body:
  text: 巻二十九預宴一百五人詩一百二十五首馬甲孫士英年七十五彤雲霏霏羅蒼雯晴梅氲氲舒芳英天閶嘉筵開良辰龎眉朱顏三千盈戎行衣糧身霑優春風年年同長生歌衢歡為長春人躋堂來稱長春觥軍中清商嫻鐃笳天邊旋宫聞韶韺龢甘涵濡愉情騰歌齊茅檐豐年聲全平體馬甲張正忠年七十五盛世宴典耋皓錫被列左右位九拜渥賜聖萬萬壽福以徳致自上下下丙曜翊次以愛養久集此上瑞慶祝逺暨喜氣下逮粟鏹沐厚饜禁膳味借馬齒健永𨽻七萃全仄體馬甲劉洪經年七十五嵗陽紀旃䝉星躔次營室御宴張闕廷金奏播琴瑟養國老庶老萃籩實豆實自百有五嵗逮七十六十種桃華正開餐芝壽能益弱草亦向榮甘膏滋萌茁馬甲胡連瑣年七十五春風射栁鬬分棚玉弩無芒壽曜明白髪禁營稍廪給殿頭猶得奉瑶觥一詔許耆年集鳯墀瓊漿仙醖賜盈卮如天敷貺洪纎被小草均含雨露滋二馬甲馬汝亮年七十五黼座臨中央光華達四旅東方朝鮮臣席末敬傴僂西際準回疆伯克識鼓舞南方逾洱海壽星所明宇北逮喀爾喀舊藩衆䝉古四方既和會耆席粲以舉敬歌大九州樂壽遍率土五方體馬甲施士益年七十五珠鏡騰輝日神蓍衍瑞時敷天同鬯遂率土徧恬熙闓澤先優齒春風共介眉香山人自古洛社會如斯漏滴銅壺永雲開綵扇移賜笻攜鳯竹給饌飽瓊芝薄植經霜草微忱浥露葵稱觥效豳俗聖壽祝維祺馬甲趙國璽年七十五慶霄日華中聖世嘉祥集殊榮感鴻慈燕譽隨鵠立綺筵春風生玉案爐烟裛鹿鳴歌承筐賜予上方給養恬有露甕導引陋雲笈何以頌壽祺南山披雅什馬甲劉繼旺年七十五玉階親上萬年巵曉日曈曨淑景遲靈壽捧來天上賜春鳩飛向一枝枝一燕樂熙朝萬福同幕調玉燭播韶風庭花宫樹皆滋露小草驩承瑞景融二馬甲管繼賢年七十五帝開乾清宫耆年錫豐隆禮越虞夏商亦超周膠庠辰輝弧與角列曜景燦爍豈但等韶徴洽燕萬方喜微臣𨽻赤羽萬嵗歌壽㝢五音體馬甲李廷佐年七十五慶霄緜茀禄熙皥樂春臺五世天庥備三陽禮讌開彤堦濡沆瀣白屋荷栽培薄海堯仁渥歌聲徧九垓馬甲佟銑年七十五旭日麗中天一人膺景福初筵啟令辰嘉會集耆宿恬養徧八紘耄耋徧六服食徳且飲和含哺而鼓腹豈惟一日澤願上萬年祝馬甲蕭國太年七十五春曉日曈曨龎眉萃禁中令儀歌燕譽洪燾荷元工筵有賡歌合人皆煦嫗功無私欽錫福寰宇播淳風馬甲王文煥年七十五和風麗日綺嵗初旬覲鳯鸞闕開錦繡春皇錫禔福被九宇人依光進爵鴻萃鱗臻上自紱繡下及袀祳有期頤瑞及艾老臣乾元保合太和訢淳湛恩洪被景曜常新馬甲劉耀祖年七十五熙和翔雅化壽愷樂堯封敷政乾行健推恩巽命重笙簧儀益懋耄耋禮彌恭曠古夐難覯垓埏霈澤濃馬甲姚之竒年七十五廣殿筵開曉日紅春承麗景扇和風自欣未席隨鴛鷺愧乏微勲躡駬驄一同邀渌醑捧瑶尊華杖光聯瑞竹繁正是昇平均被澤昌時耆耉最承恩二馬甲國星阿年七十五月正規乗震崇年籥筮頤兩朝昭繼美五葉際蕃釐介壽春稱兕乘濤暖奮鰭願陪熊虎士長此奉軒羲馬甲富桑阿年七十五田製旗旜旟旐武樂酌桓賚般微臣昔從振旅垂老猶依上闌今聽簫韶雲際恭霑樽醴雲端知頌景星卿靄祥暉萬載常團馬甲達拉丹布年七十五福祚昌時彚耆英慶典逢雲閶開詄蕩玉珮集雍容照並熙陽煦膏含湛露濃禮成欣介祉歌祝徧堯封馬甲赫綳額年七十五九霄春暖露華濃綺宴趨承仰聖容龍顔日角天長健黄繖亭亭倚葢崇一新嵗同增一嵗新三千人合碧桃春同賡夀紀臻無量甲子知周億萬巡二馬甲色爾泰年七十五握金鏡提珠囊逺軼二帝超三王坐觀四海沾恩慶七曜遵躔二儀正筵開耆夀宴端辰蓂莢六葉舒晴春維天皇萬八千嵗燕翼曾元綏兆民馬甲窩和年七十五韶春禁掖曙光生詔宴羣仙瑞靄呈寶露甕盛㪺耄耋董絃琴奏叶咸英時調玉燭祥輝爛慶衍蘿圖協氣盈鶴髪聯翩賡既醉願偕華祝紀昇平馬甲佛興年七十五新韶靄靄瑞日曈曈禔福普錫典禮攸崇蒲筵藻席下管新宫國老庶老序西序東歡臚慶洽澤沛恩隆天章宣豫聖袠延洪詞賡祝華忱切呼嵩敬偕七萃軒舞皇風馬甲阿拉虎年七十五皇路騰驤上絳霄曉隨黄髪共趨朝但看甲士齊期羡也有邨農侣偓僑一得近星辰覲紫微三垣焜燿六階輝光騰二十八分野都有南弧布九圍二馬甲都爾札年七十五春正吉日肆設廣筵堯衢尊滿舜琯韶宣福敷夀㝢讌集耆年臣工濟濟鵷鷺班聯下逮民庶鶴髪駢闐既醉既飽舞蹈蹁躚祥徴㬅羡徳致洪延長歌復旦共叶薫絃馬甲石圖年七十五卿雲糺縵繞星辰寶曜珠囊拱紫宸福備一堂綿五世典超四代集千人葵因向日能依日樹是恒春得早春珪組簪紳咸在列逮袀裖士笠蓑民馬甲寧珠器年七十五賜宴恩榮及大千不湏仙草問瓊田共擎天際流霞酌上祝君王萬萬年一萬載鴻恩被九區不求知識詠康衢春王正月三千叟繪入皇家福夀圖二馬甲阿爾住年七十五黄星如連珠一一羅絳霄祥光被下土萬類皆昭昭㣲生涵仁壽鶴髪隨臣僚仰吸金盤醇徧數玉燭調釋戈而執杖䇿馬來聨鑣愧無賡歌材拜舞聞簫韶馬甲黒達色年七十五古稀天子惠耆年繼聖重開百福筵曼夀久符春育量祗今恩更暨朝鮮一天門霞蔚復雲蒸人上春臺樂夀増戸口嵗添億萬萬耆年有福到孫曽二馬甲宋彭年年七十五春宴錫醲華恩波翔福海熙和九宇康率育用嘉乃星日總旁羅鬱紛鸞鳯彩大信浹豚魚深仁濡蓓蕾紀嵗邁容成廓紘越章亥騰輝照宙合斑髪歌燕愷馬甲林廷芳年七十五彩帖銀幡勝花敷上苑新恩光重開宴民氣倍熙春耕鑿安中外修和仰聖神延緜咏嘉樂生世際昌辰馬甲林枚年七十五飽太倉遊康衢身為健士行于于何以能致此云惟我皇錫福連九區逺自陬澨近京都耄年嵗月皆敷腴天街雨潤如酥詔開宴集大小俱敂閶闔效嵩呼千萬億載綿貞符雲龍鳥火紀所無人間何處誇蓬壺馬甲楊興祖年七十五盛際重熙會耆年慶盍簪春風筵啟玉甘醴琖浮金蒲栁霑濃澤松椿蔚茂林陽暉無不照煦育仰天心馬甲梁珙年七十五踴躍慶有生熙熙歌太平伏遇皇帝陛下化洽四海康以寧神農大九州一徳兼包并大小臣工罔不效職各各寳榮名觚竹北户西王母日下東西南北羅黄星上皇帝稱兕觥詔曰凡此夀世上下來宴無分形臣非偓與彭亦非香山洛社之耆英逢盛典擎仙醽欣欣拜跪陳私誠伏願皇帝萬嵗億兆京垓重舉千叟宴夀者咸得瞻天廷踴躍慶有生馬甲葉成徳年七十五五雲輝舜日八極麗堯天春滿延年殿恩深錫福筵鵷行聲祝萬鳩枝數逾千忝厠貔貅隊何期並列仙馬甲蔡之義年七十五羽林皎皎環天布臣𨽻戎旃唱朱鷺櫪前耄齒愛糜菣尚逐驊騮逞蹇歩少時每想日千里老去得邀天一顧嘉宴欣奉重慶年人人歡洽依瓊筵賦粟已多飽芻秣伏櫪猶欲施鞍韉雖瘦尚知工行歩鸞和隨處騋三千馬甲李得玉年七十五宵旰與天同健陽春被物無私典舉九重夀宴恩逢萬載昌期日暎珠琪有耀春浮玉斚如飴九拜欣惟額手萬年願以介眉馬甲多隆武年七十五尚齒遙傳天語温堯階此日盡銜樽不須海上求仙果人瑞怡顔飽聖恩一鵷鸞歌舞到天閶未旅叨趨虎豹行息革韜戈韶嵗久唯知屬饜五雲漿二馬甲六達色年七十五糺縵卿雲繞玉墀晴光春煦萬年枝節先綵勝臚黄髪尊盎瓊漿映紫芝深愧駑駘蒙豢養惟依輿衛效馳驅承恩得附班聨末愷樂還賡在鎬詩馬甲廣舒年七十五春色麗皇州芳甸呈淑氣華筵敞九霄金鼎調百味進酒祝南山介福歌既醉鶴髪何翩翩弧星何晰晰長年荷天慶廣殿集人瑞鼓腹慶昇平載賡民攸塈馬甲索住年七十五景運三陽泰恩施六合同笙簧隆鉅典酒醴徧羣工日向葵心切春回綺殿融恬熙逢夀㝢長此祝延洪馬甲那錦年七十五巍乎功業煥平文蕩蕩何能頌聖君呼並嵩華韶協奏班如鵷鷺瑞聨羣和甘酌處真仙露喜氣蒸來作慶雲雀躍戎行増舞蹈承筐璀璨九霞雯馬甲常生年七十五南弧朗曜聨奎璧秩秩彤庭布綺席龎眉皓首集鵷班髙會均沾帝恩澤兕觥其觩璚露清直瀉銀河作仙液駑駘執㦸備戎行三十年前登尺籍靈臺伯偃久韜戈軍符戎伍仍加額老知赳赳慚干城覲光朶殿崇墀側熙和景洽泰交孚侍宴從容入鸞掖介胄之士愧不文戴髙惟仰天咫尺馬甲多爾吉年七十五五雲深處夀弧明宴啟瓊鋪渥賚盈葵藿有心長就日蟠桃樹下共芝榮一晨開閶闔瑞烟濃髙會仙班捧玉鍾舊𨽻羽林叨列騎也隨鵷鷺許扶笻二馬甲常官保年七十五聖世天純佑彤庭設廣筵介眉逢令序受祜樂長年酒泛瓊樽盎珍調玉膳鮮隆恩普耆耋拜手向堦前馬甲西成額年七十五維皇建極普錫厥福夀㝢咸登湛恩徧沐典舉引年安車接轂尊罍斯張饜飫滋渥劍佩花迎景霱晨旭仰歌九功願賡三祝馬甲烏爾泰年七十五靈曜旋天機萬物回春陽堯階蓂六葉曠典恩膏滂肆筵羅耆英吹萬悦羣方煦兹長養風庶草榮芬芳珍厨出豐膳鶴髪陪鴛行温語聆從容雲漢昭為章願賡天保詩億載景祜長馬甲特通額年七十五南極星暉暎玉墀引年嘉會泛瓊巵膏凝曉露仙人掌澤溥春波太液池星見丙丁昭盛典筵開乙巳應昌期仙僚已勝蓬萊宴介士分榮荷聖慈馬甲李永英年七十五韶籥青陽啟春風到上林耆筵人瑞集夀㝢帝輝臨仙籙今駢紀衢尊本共斟殊榮叨沐幸芹曝獻㣲忱馬甲林永旺年七十五懽承恩詔八方來鶴髪三千獻夀杯瑞莢榮依仙仗簇慶雲暉暎綺筵開萬年慶祝昌期懋七字欽瞻聖藻裁抃舞瓊鋪真盛事天家髙㑹勝蓬萊馬甲金光漢年七十五郁郁瑞藹呈紫極端耄耆來臻慶雲同團既萃蹌濟亦多赳桓以夀而昌以康而安下集百福上洽皇歡㣲材無識荷帡幪寛如彼小草承雨露漙尚方授几衛士傳餐秪以積齒俾榮大觀惟賡夀愷長依上䦨馬甲朱雲平年七十五紫禁春韶藹瑞烟羣仙歡會大羅天共覘人瑞齡逾百溥沐天恩叟倍千和樂宣韶諧玉琯珍厨頒箑入瓊筵需雲宴樂皆殊寵敬頌延洪億萬年馬甲吕明旺年七十五春殿綺筵開恩邀侍宴來引年叨玉饌介夀捧霞杯喜溢三千侣歌賡八伯才戎行逢盛典願頌雅臺萊馬甲劉自義年七十五恩輝普洽禮年優扶杖欣蒙寵錫鳩身似瓊田仙草茁長生日月記春秋一慶溢鵷班協氣融賤㣲何以效葵衷三多更進華封祝五福堂開萬福同二馬甲特克慎年七十五聖主調元化恩膏浹萬邦瑞徴多耄耋醲化洽敦厖溥宴金樽渥臚歡玉佩瑽三千齊獻嘏嘉會古無雙馬甲三圖年七十五熙熙韶景藹天街錫宴彤庭綺席排玉饌共承春似海金樽同挹酒如淮百齡老叟趨嘉會萬嵗昌符炳泰階聖主夀祺崇引翼稱觴欣與衆仙儕馬甲查立善年七十五耆老如雲集偕來齒徳并豐年滋萬彚夀㝢育羣生芬飶中厨饌諧和樂府聲就瞻顔有喜扶杖荷殊榮馬甲七十年七十五訢誾海宇樂昇平瑞靄黄扉淑景明錫福春初頒媵爵承恩日下飫如羮銀旛佇戴長春勝玉琯新調太蔟笙願上堯樽稱聖夀億齡萬國慶豐亨馬甲奎成年七十五鳯紀綿禔福春筵啟帝廷臣民同入宴蕃衛盡來庭劍佩花間度琅璈雲外聽歡聲騰玉陛億萬祝延齡馬甲四達塞年七十五引年嘉宴敞金門筐篚還膺錫賚蕃馬齒從今更加長駑駘思報秣芻恩一帝恩深被似春曦臣子那將報答期唯有頤顔臻上夀多將人瑞表重熙二馬甲李成綱年七十五詄蕩天門集玉珂鸞笙協奏鳯簫和龍驤兩翼慚騏驥鶴鬢千行列鸛鵞身到蓬山仙有分酒如菊水面㣲酡瓊筵飽飫同懽忭珍綺還蒙錫賚多馬甲張得成年七十五廣醼聨耆耋觚稜麗曉暾人皆臻化㝢瑞正衍璇源雲繞黄麾仗香浮緑醑樽九天光日月萬國夀乾坤臯載天章冠嵩呼樂府翻雲華瞻咫尺㣲賤亦承恩馬甲髙鑅年七十五綴班花甲富列座綺筵排瑶爵凝華徧金墀降福皆皇圖登夀愷宸念暢安懐譜入簫韶奏春陽律吕諧馬甲陳廷敬年七十五恩言賁九閶嘉宴敷茂祉千叟何莘莘肆筵以酌醴導和物訢如泝埏民樂只引年典尤崇便蕃錫珍綺作歌效康衢億萬延鳯紀馬甲額僧阿年七十五虎拜聨翩馬齒同龍顔咫尺鶴觴隆欽知聖徳如天大樂愷聲臚覆幬中一鉅典春先璧水儀玉階晴晝日遲遲駑駘何幸承恩寵也附臣隣拜紫墀二馬甲七格年七十五夀㝢延青陽斟元醲化協綺旭榮喬松條風拂瑞莢瑶階福範陳瓊枝衍萬葉髙夀自百五穉齡亦週甲都來益夀筵合作長生牒弮甲歌南山丹梯喜登躡馬甲滿徳年七十五水有負圖龍並奏器車出火珠萃瀛航精璆來月窟金鏐聖弗寶所重在黄髪木與蟠若鄰䕃曦作花實土宇皆樂夀敷筵符太乙穀旦在春寅微臣歌黼黻六府體馬甲巴海年七十五露凝仙掌映星躔香露金爐挹御筵西汜東溟齊釀酒東鶼西鰈佐加籩一純禧溥錫自吾皇既醉重歌難老章元會運先符大衍九埏愷樂夀而康二馬甲木克登布年七十五熙洽逢全盛承恩誦至仁臣民皆就日耄耋自同春仙醖金壺列珍盤海錯陳一人長衍慶錫福紀昌辰馬甲巴彦年七十五鶴髪雍容化日長各扶鳩杖謁天閶貔貅盡入鵷鸞隊上夀歡逾飲至觴一萬年枝上五雲蒸瑶席排陳瑞氣凝九奏中和韶樂備雅歌先譜日之升二馬甲特普阿年七十五帝徳祥占日麗中自天錫福徧臣工璇源綿瓞無疆慶化宇陳樞有道隆醖挹瓊巵凝湛露香霏玉戺布春風五雲深處天顔霽釐祝堯階舞蹈同馬甲武拉布年七十五五福堂凝瑞靄九霄宴啟昌辰光榮徧被耆耋儀舞咸徴鳯麟慶挹仙漿滋漉歡邀珍賚璘彬鴻規信超姚姒昊嵗熙熙上春馬甲張希聖年七十五聖夀慶無疆埏垓被多福優詔開御筵仙羣以齒録旭日照無私大雲興以族頌禱及濛渤沾濡徧臣僕春臺衆咸熙騎士觴同渥額首飲醇和封人願三祝馬甲管剛年七十五詄蕩千門啟長筵玉殿東盃均酺飲洽典邁上庠隆領席台司在分行騎士同瞻依至尊近黄髪共呼嵩馬甲董徳年七十五聖朝開夀讌黄髪慶駢羅不棄胥徒賤同看飲饋多寵光眞就日瑞應想遊河禮洽東西序恩覃逺近波昇平恒捧斚愷樂久韜戈授簡慙風雅猶能擊壤歌馬甲祖懋續年七十五老𨽻期門籍何曾拜玉階句臚隨導引班綴更差排額慶新繒綺腰鞬舊鞞靫仙厨親得飫殊錫荷銀牌馬甲張珀年七十五慶霄糺縵垂景倬漢羣仰天文嘉會元辰肇啟仙韶廣殿徐聞賜巵飾延喜玉承幄覩吉祥雲榮幸枋榆鷃翼班隨蓬島鸞羣馬甲陳元璞年七十五敕宴登千叟陽符泰畫三侍筵皆綺角扶杖總彭耼慶自熙臺洽恩從引養覃祥占聖人夀丙曜麗弧南馬甲西蘭太年七十五閶闔曈曨日正長乘春行慶樂無疆聖人御宇嘉符集海宇同風福祚昌賜爵儀應卑漢酺引年典自邁虞庠臣歌既醉偕儀舞翹首欣瞻倬漢章馬甲穆克登布年七十五榮隨鳩杖未春宇聽鳴珂同有傾葵志來申擊瓖歌萬年齊七政五代慶三多飽飫仙厨饌春臺樂太和馬甲福昌年七十五天恩蕩蕩總難名世值重熙久道成何意小臣星騎侣也從霄漢渥金莖一藹藹丹墀吉士多三千鶴髪沐恩波鸞鏘鳯舞儀諧樂虎衛龍驤武止戈二馬甲豐伸年七十五恭承驅䇿列衛天衢積有嵗月皓首皤如以豢以養恩浹髓膚在少壯日健力歩驅亦既耄老榮承燕胥帝恩如天不遺櫟樗養勁士氣久巡直廬恩賚所頒銀鏐醴糈榮光所被班序同酺三光積曜四海同書夀筵樂歌上獻丹鋪馬甲富保年七十五熙和休養百餘年九㝢耆齡集禮筵醴郁盃分仙掌露氤氲衣惹玉爐烟雲圍四座光華仰綵映千門黼黻駢不讓虞廷誇率舞玉階鴛鷺自翩躚馬甲𤨏住年七十五景福開仁夀熙朝典特殊隆恩翔六合大衍啟貞符鳯律和聲叶螭階瑞靄俱星輝羅紫極雲彩麗黄圖有壤方同擊維嵩亦效呼九天承藁飫寧數列仙臞馬甲舒英阿年七十五國老謳歌庶老歡氤氲佳氣紫雲端昇平世效馳驅力玉饌瓊漿喜得餐一春臺濟濟寵恩覃私效華封跽祝三大徳久徴仁夀篤萬千年祜拱弧南二馬甲若楷年七十五維天老人星在弧南近地常以春分初見於祥丙位孟春日在丙次與躔無異戎行職琱矢亦近弧星義郁郁三千人賤亦臻其次皆知扈三階皆知頌萬嵗星見積輝光生世飫醰粹俚歌繼嵩呼微星作天瑞馬甲達山年七十五濟濟冠裳集綺筵五雲多處嵗華鮮稱觴執爵華芝侣荷㦸腰弓細栁前仁夀甄陶皆得嵗昇平豢養不知年何須騎士能成賦宵雅惟吟第六篇馬甲賽松阿年七十五盛時瑞應翔膏澤甘液懸珠凝竹柏甕㴠寶露夀徴多燕啟需雲恩數特萬國迎春賜大酺三千人傍丹庭趨普天耆耉還無數同望卿雲向九衢馬甲常保住年七十五扈獮曾趨紫塞承華得覲丹宸壯力效貔貅侣耆年與鵷鷺鄰正值蓬萊花滿欣觀崑圃瑶新燕衎慶邀天酒和風溥被夀人馬甲李奉先年七十五大衍堯年紀耆筵舉孟陬夀崇行益健福盛典彌優黄耉羣趨集丹墀洽獻酬華封同獻祝億載仰鴻庥馬甲周世福年七十五普天同沐聖恩長敬祝吾皇茀禄康旭日融融風景麗衣冠齊惹御爐香一嵗嵗弧星曜丙躔慶光眞為太平妍親從北闕看南極不待書祥史氏編二馬甲劉崇義年七十五宇宙凝熙和曼夀集禔瑞孟春設大酺耄耋三千萃百年曰期頤六十耆指使同為籛佺倫上尊拜天賜異數古未逢盛典今大備雲光籠金鋪露華湛玉觶馬甲王之炳年七十五三元啟秩廣殿晨開環斟夀酒捧紫霞杯中朝耆老榮春宴東國陪臣渡海來我皇溥錫臣民福孚感蒼穹膺茀禄一堂五代衍曾元貞符歴代未聽矚臣列貔貅侣鵠鸞拜舞彤墀獻三祝馬甲張正忠年七十五曼齡凝介祉茂典慶延洪舞蹈羅鳩杖雍喈協鳯筩椅桐承湛湛蕭蓼會沖沖袀服供驅䇿咸邀聖澤隆馬甲常保住年七十五維嵗在旃䝉孟陬日練吉聖人廸前光引年臚耄耋綺筵敞彤廷鈞韶調玉律鮐背競歡呼鶴髪喜洋溢微賤荷生成禁衛分旗翼時平久􅌢戈期門扈仙蹕復兹沐殊榮珍賚膺温綍春風汜瑶墀和煦入韶律馬甲陸玉相年七十五鳯琯宣韶晝漏遲推恩耆老宴彤墀仙厨分得長生粒導引無煩問鍊師一皓髪鬖髿老荷戈今朝猶得沭恩波閒將矢服弓衣理筋力飛騰手尚和二馬甲鄭枋年七十五丹殿拱崔嵬春韶嘉㑹開御筵排璐砌天酒酌金罍梅雪東風煦星辰北斗迴餘齡叨渥錫超距愧庸材馬甲閆粦年七十五懋典掄年大小從扶鳩人集祝華封材慙虎旅瞻天近身到崑蓬浥露濃一春臺熙洽溥瀛寰人享耆齡大福頒百五老翁嫻拜舞朝班今果是仙班二馬甲周世榮年七十五拜手奉康爵華髪羅軒楹春臺協氣鬯黼座昌輝盈雉扇雲綺猊爐烟清笙鏞柷敔聲和鳴羽騎就班列盛典增光榮玉醴醲飫瑶觥擎帝庸作歌許普賡惟聞軒轅棡鼓十二曲馬上歌之奏太平馬甲百嵗年七十五聖治邁羲年新韶迎嵗首祥開仁夀㝢長筵集千叟抃舞飫天厨延年酌大斗臣取名百嵗百嵗今常有衍為萬萬夀至誠貞悠久甲子積京垓綜此三千叟馬甲姜大保年七十五瑞結彤雲藹上春春迎紫陌已經旬菜挑七種先人日弧見一星朝帝辰皤髪分行叨宴渥黄封標記拜恩匀太平盛事今重覯歡勝耆英洛社人馬甲徳住年七十五箕疇斂福錫福天保如升如恒五十蘿圖大衍三千華髪欽承丹鳯銜書初下玉鳩扶杖以登春風麗日韶景太和之所醲蒸馬甲三格年七十五優老承前典延和洽大仁初筵羅福曜上瑞集新春億萬乾元筴三千夀耉臣翹闗慙射士禮會以年掄馬甲三頂年七十五聖人以六合為夀太和之㝢期年皆春風浩蕩敷無涯需雲嘉宴承玉階大官引膳圓方排盤飫仙果珍核懐皤皤黄髪飲康爵滿浥仙露榮春荄是用賜之緑玉枝副以鑿落銀鏤牌手捧身佩盈天街恩光歸述誇同儕南榮偃曝榮與偕馬甲毛雅圖年七十五初筵秩秩耆鮐集仁夀敷民都福庭昨夜司天瞻帝座中天翊拱老人星一慶霄珠露浥濃華端綺朱提物有加數典杖朝榮更倍一枝靈夀出天家二馬甲文殊保年七十五雲漢仰天章京垓綜聖夀煒哉大衍陳適符紀年久湛露洽暄春化日舒長晝筵開示燕惠手賜隆耆舊國老及庶老鳩杖三千授皓首飲瓊漿懽聽鈞韶奏欽定千叟宴詩巻二十九
