body:
  text: 巻二十一預宴九十人詩九十六首䕶軍校六格年六十二天上白玉京結髪受長生雙吹紫鸞牙鸑鷟有時鳴星辰上森列歡娛樂恩榮聖代復元古天地為橐籥天子刻玉杖瑶臺有黄鶴光禄紫霞杯五色雲間鵲水流知入海輕塵集嵩嶽庻觀無量夀即知蓬萊石望極九霄迴廣運無不至天人清且安如心之使臂濟濟雙闕下飄飄神仙氣龍顔一解四海春彤庭左右呼萬嵗造天闗侍軒轅重光疊輝播於八埏進退成行落落綺皓九苞鳯皇今日醉飽萬户千門入畫圗東風己緑瀛洲草九十誦古文跡與星辰髙長吟播諸天絃歌詠唐堯集李白句䕶軍校永泰年六十二昇平慶瑞啟天閶耆老懽騰化日長世是春臺歌樂愷人登夀㝢協嘉祥笙歌鏘玉仙音朗觚爵流霞法酒香共向五雲瞻紫氣瑶階抃舞拜恩光䕶軍校杭什年六十二糺縵卿雲䕶紫宸遊河入昴瑞圗臻普天黄髪霑瑶席並效華封祝聖人一雲衢抃舞浩春輝宴次人人領賞歸九節貞笻雙織錦仙家未有世間稀二䕶軍校根敦年六十一揮鞭出塞淨天欃昔日同裳拜賜咸績賞金牌光列校臣出兵接仗六次得賞功牌二面勲書羽檄署頭銜臣保頭等五次開筵更荷仙厨渥既醉尤寛酒正監耆席爭誇難老賜春輝垂照寸心緘䕶軍校扎爾杭阿年六十一人瑞羅千靈春祺鬯九有協序啟南弧斟元符北斗白玉燦爛盃黄封郁芬酒暢以中和音序兹進退耦歡臚億萬齡敬承羲黄夀濟濟來天閶韶光煦蒲栁䕶軍校阿隆阿年六十一蓬萊闕下㑹髙年末校追陪拜賜駢饗食燕儀兼四代下中上夀列三千老農亦預耆英集武士欣隨翰墨筵信是延洪開夀治添籌捧斚醉華顛䕶軍校石林年六十一天門春旭麗長樂曉鐘傳旛勝迎風轉松梅帶雪妍大官羞玉饌偏校列耆筵榮幸逾花甲小年附大年䕶軍校元杭年六十一法酒榮頒啟御筵升恒嘉慶帝恩駢三千人瑞今真見扶杖天街鶴髪仙一周甲春纔度一齡菲材何幸預椿靈從今薄植添强健親到弧南挹夀星二䕶軍校索柱年六十一聖世三台協旌門七校閒春生螭序外風藹羽林間福曜輝皇極紅雲覲帝顔耆筵欣拜賜長此頌南山䕶軍校福格年六十一我皇徳邁軒與羲重熙累洽百福基東風入律春正早民物和樂遨以嬉瓊筵玉醴以齒敘彤階饗宴樂有儀蒼顔鶴髪相追隨湛恩汪濊淪膚肌小臣榮幸趨瑶陛普天率土歌昌時䕶軍校明全年六十一天錫聖祚日月升恒嘉祥丕洽和㑹蒸蒸維兹臣工三夀作朋扶杖優游典禮是承臣忝筵末感恩倍増熙熙春臺與物同登䕶軍校福禄年六十一曈曨旭日暎觚稜上苑春歸瑞藹凝鶴髪盈千環玉砌泰符欣覩五雲升一膳府頻傳玉露盃千官捧祝㑹蓬萊羽林列校名居末天上星文貫斗魁二䕶軍校阿楞年六十一泰運延軒紀耆英萃帝閶珠肴分六膳玉醴湛三漿卿景呈輝爛垓埏洽慶長微臣同草木煦育戴春陽䕶軍校五十六年六十一夙乏健鋭姿少年備戎伍恭遇昇平世舞階戢干羽琛來西海遥璧翠東瀛普覆冒遍敷錫徼籓皆樂土何况神州民垓億耆夀聚國慶積久道蠲吉隆儀舉春光慶舒疊長筵賜酒脯雉尾拜稱觴萬年秩皇祜䕶軍校徳隆額年六十一糺縵光華旦祥符景緯聨扶鳩觀盛典執㦸赴華筵露酒春同普星廬慶益駢耆年趨舜陛舞蹈詠堯天䕶軍校索住年六十一羽林千騎列雲屯環拱微垣太一尊日月山川天子夀東西南朔聖人恩葵心共矢傾陽切照鬢同知就日温虬箭仙壺春景永彤階蹈舞捧瑶樽䕶軍校雙全年六十一聖人御六合坐致羣黎安曼夀千萬嵗引年宴洽彤庭歡溯自鴻濛肇啟扶輿始蟠雲龍有秩鳥火有官繣隂陽之稠鬱辰紀支而幹紀干追軒軼頊包虞越周孰及吾皇之恩徳擴坤倪而聳乾端嵗舉耆宴照臨大觀蓼蕭載咏零露漙拜賡喜起祥雲團小臣拜瞻抃舞益仰蒼穹寛䕶軍校艾申年六十一福禄來崇協瑞占皇春帝夏一人兼龍顔有喜恩膏渥鶴髪都寛禮數嚴九宇恩酺推饗燕萬年長養樂熙恬從兹班序延齡頌長慶韶光照蔀檐䕶軍校格圗肯年六十一貞符調玉燭乾筞衍元包燕樂占需象裁成叶泰交慶雲輝閬苑晴旭麗螭坳廣樂鈞韶奏來儀鳯九苞䕶軍校八凌阿年六十一曽經束髪事戈鋋優録微勲帝賚駢暮齒自惟慙驥櫪仙班何幸接鵷聨瓊芝颺彩依金掌玉醴浮春挹御筵湛露信知豐草渥龍光載詠蓼蕭篇䕶軍校雅爾哈年六十一景命千祥集皇圗五世昌規天符大衍繩祖叶重光員鼎調仙膳豐觚挹斗漿願言隨鶴髪矍鑠贊鷹揚䕶軍校巴金太年六十一早春開秘殿優老命稱觴魚鑰晨鐘起虬壺午漏長芳醪仙掌露瑞篆御爐香折俎還加豆捶琴更鼓簧分甘羞碩果侑飲薦瑶筐萬夀民同祝康衢樂未央䕶軍校瑪桑阿年六十一慶行饗燕浹春湑人似黄星捧直廬扶杖千行隨羽仗垂裳萬載仰宸居瓊筵麗日光初曙金闕祥雲彩正舒為報山中洪羡輩龍光近覩幸誰如䕶軍校五徳年六十一皇州春色滿夀讌溥仁風笻飾鳩為杖笙鳴鳯在筩九衢尊已徧八闥鏡長融積照周寰宇深涵仰化工林多開福禄户盡錫亨豐受賜諸耆耋涵恩自丱童羣躋熙皥樂更沐寵光隆歩武烟霄接聨翩露掌通玉花曾肆馬金爵幸儕鴻願效堯封祝謳歌薄海同䕶軍校隆保年六十一寳饌瓊漿八味馣春風華髮喜鬖鬖河清幸覩千年一嵩祝長呼萬嵗三率土熙熙瞻化逺普天浩浩慶恩覃戎行乆荷承平樂盛際端辰更盍簮䕶軍校六十四年六十一垓埏躋夀㝢愷澤應時宣羽仗排瑶闕雲階敞綺筵爵分金掌露香拂玉爐烟黄髪承恩渥同賡保定篇䕶軍校佛保住年六十青陽應律旭景昭融為嵗之首在天之中絳闕肇啟龎眉來從聖人作覩萬年六龍若千叟者來如雲風或班朝序或豫巖嵏聿有紳儒亦逮軍戎象鞮奕奕譯寄重重初臻有千繼倍而豐乃三作朋旅覲丹楓帝嘉賜之㫖醴仙笻内府之珍繹絡豐崇依秩而班計齒而隆其未與者粟帛龎鴻羣捧銀牌上祝蒼穹禮包四代恩軼三雍世登太皥光超有熊臣佛保住敬歌天工䕶軍校四十六年六十東皇開節序南極焕天文地喜蓬萊近膏從太液分絲綸宣巽令墀陛溥需雲幸際休嘉㑹賡歌叶舜薰䕶軍校巴寧阿年六十遊聖世飽而嬉犬馬齒無所為望天光欣自私何所求介夀眉維聖人超軒羲賜嘉宴胥樂兮春光盎盎日遲遲臣之慶幸臣何知願萬年普若斯歌愷樂欽文思原任䕶軍校徳成額年八十三恩筵既集桐豫帝祉之施棣通列席威儀既秩承筐禮意攸隆緑尊甘露凝瑞丹闕卿雲兆豐循省引年身退欣逢萬福來同原任䕶軍校富廣年七十四於皇帝徳玉振金聲天以為則民莫能名涵煦萬類久道化成聨珠合璧祥協日星騶虞麟趾于野于廷皇帝曰咨兹詎瑞徴耉老蹌濟人瑞斯稱乃降殊典載延耆英萬里奔走萃于神京夀筵斯啟鵷班聿升肴核維旅飶香椒馨臣拜稽首竊愧無能昔預訓練不忘翦鯨威稜所至百神效靈何力之有厥志兢兢獲逢錫羡慶莫不承億萬斯年載歌升恒原任䕶軍校富爾散年七十四旭日曈曨閶闔開盈庭祝獻紫霞杯童顔爭識天顔喜詔許從容䇿杖回一扈蹕長隨翠葆馳五雲多處奉恩私投閒重飫天厨饌誇向田間野老知二原任䕶軍校蘇沖阿年六十八嘉㑹超千古卿雲縵吉祥普天安以樂率土夀而康文錦頒天府珍盤出尚方扶鳩同拜賜荷㦸亦輝光原任䕶軍校跟太年六十七際曉卿雲瑞色開追隨鴛鷺集蓬萊歡情共叶需雲象喜氣同霑湛露盃麟定鴛行田野逮東瀛西汜海隅該生逢聖主籌添算長效華封獻夀來原任䕶軍校恩特賀年六十六古稀天子夀無疆瀛海為籌懋典光佛日仙霞輝共照乾符人瑞慶方長就閒嵗月皆天賜衎燕尊罍被露瀼同祝三多歌五福彬麟禮樂叶嘉祥六品職銜䕶軍福永年六十二彤廷春晝啟瑞靄接朝暉夀㝢多耆老醲膏逮賤微櫜弓欽豢養捧爵飫芬菲一統金甌固淳風洽九圻署歩軍校張毓英年七十一玉琯宣韶日瓊筵賜酺辰卿雲凝鳯闕仙靄擁楓宸鶴髮分行入鵷班綴序均歡臚寰海頌味飫大官珍聖瑞三階煥天題七字新下臣依景運抃舞萬年春署歩軍校蕭忠義年七十堯階新慶六舒蓂焕爍天垣麗景星鮐背扶攜鳩刻杖龍墀拜舞鶴揚翎功成延喜星飛渚慶集昭華琯在廷萬載恩榮諧忭詠小臣何幸醉仙醽署歩軍校唐興仁年六十四維天行健日月乃升恒維皇法天人道以化成𤓰綿瓞衍五代昌符呈萬福敷錫庻民咸遂生有來萃者千叟揚祥徴遹繩祖武賜宴班耆英龍紀五十藹藹春之正珠聨璧合四海揚頌聲歡臚慶洽億萬祝聖齡署歩軍校梁長太年六十二恩筵曉厰旭曈曨耆耋懽騰覲九重鈞樂和聲宣詄蕩仙壺瑞液飫醇醲便蕃捧到雕文綺舞蹈攜歸碧玉笻芹曝微忱何以效三多獻祝慶堯封署歩軍校雙闗保年六十一聖人御極徴上祥普天民物臻阜康夀愷作人洽雅化箕疇衍福篤其慶月紀孟陬日次六春風和暢占辰良詔命特舉引年典寰宇耆耋歡趨蹌大官珍膳列金鼎尚方法醖斟瓊漿雍雍黄髪拜三爵國老庻老生輝光我皇泰策衍無疆願賡天保依詩章署歩軍校劉準年六十曼夀増仙籌熙春錫嘉宴階蓂華露滋厨萐條風扇松軒奏雲璈綺席羅珍膳何期虎旅班獲飫天厨膳還列三千臣嵩聲極歡抃署歩軍校長官保年六十引年厪帝念黄髪被恩榮拜賜趨雙闕稱名陋五更如春皇有象錫福聖之情法酒霑同露仙肴飫若瓊身家増愷樂耳目益聰明願效華封祝區區報太平六品典儀官巴達年七十五寳幄瞻層霄趨鳬㑹千叟天開夀㝢圗曠古㡬曽有我朝獨數典惟慶澤彌厚人復倍二千酌以瑶光斗盈廷齊祝聖合聲億萬夀更推四海恩豈數香山九六品典儀官巴寧阿年七十二淑氣蒸和㑹純熙洽大同升恒昭日月几杖序西東彩勝輝頭白霞觴映面紅自週花甲後一紀又春風六品典儀官訥爾京額年六十七懿歟茂哉上儀盛事萬世一時恩翔光被乘乾申巽旭旦首春滂福慶夀繄臣暨民民遐臣邇遥酺近宴列席分曹伯佺仲羡坎坎蹲蹲既歌且舞兢兢業業登三咸五六品典儀官富通年六十五春和始布令品彚滋暢逹天子居青陽百官拜瑶闥順時行慶恵未聞聚籛葛羞耉徴典章我朝方綜括羅氏授几杖雖重猶其末大臣陳酒漿特宴實古越八公與五老孰似三千佸河渚徒翔翔康衢自軒豁原任布政司經厯韓紹賢年六十九甘露釀酒其香有餘芳蘭為肴其味誰如一從仙厨飫珍膳乃知麟脯鳯髓談非虚吾皇萬夀超古初諸福畢備史未書詔開寳宴集千叟衣冠勝㑹鏘瓊琚祥颸拂拂吹仙裾麗日曈曈輝玉除鳩扶雀躍拜手更稽首共欣樂愷逾酺醵歌臺萊樂樂胥熙熙皥皥同昌運南極星躔朝帝車捐職布政司經厯楊祖幹年八十綵勝韶年集華平瑞葉開元辰歌燕樂千叟到蓬萊接席聨鳩杖分行捧玉盃天家覃慶澤浩蕩到春臺捐職布政司經厯汪之隆年七十四綏桃以三千年為花實靈椿以八千嵗為春秋物性秉異有若此人生赤松王喬之倫實與儔海中圓嶠方壺蓬萊及瀛洲類多寓言金銀宫闕琅玕樓未若人生盛世沐大化我皇一一錫以夀履恢箕疇新春溥嘉宴三千捧瓊甌臣生同草木得與華芝靈椿共炳彪亦偕鳯舞隨麟游齡過七甲更四嵗長向彤庭瞻彩斿捐職布政司經厯孔年泰年六十六祥雯麗野景靄凝霄日隨春霽風因律調游麟儗儗翔鳯翹翹國慶積萬帝恩渥饒既三皇登以五帝超禮燕饗食杖鄉國朝頒天府珍聽覿未邀被以繡黻豫以咸韶伊三千人仰北斗杓登之雅頌普為聲謡捐職布政司理問闞士林年七十一昌辰開夀㝢景福錫耆筵彩仗迎朝旭濃香靄瑞烟依蒲霑鎬酒鼔腹樂堯天小草同邀賜欣依雨露鮮捐職布政司理問祝文陞年六十五溯珍符歌瑞典雲蒸川増風和氣晼雕景降為雯福夀凝成篆值部判之一時軼嫏嬛之萬簡帝増神筴億萬年耆筵拜舞依瓊輦原任通判孫霑年七十三聖皇鎬宴班千叟五十熙春平盛久翠鳳含綏徳耀長丹魚在藻恩波厚綵旓繡葆擁丹墀九拜親呈瑞玉巵曠典引年人瑞集君臣同樂古今稀瓊瑶檻樹芳蘭圃殿閣深嚴奏歌舞一聲仙樂天上來潏露飛甘仁澤溥小臣引退賦懸車紫禁彤闈許歩趨祝嘏同聲歌萬夀天行剛健邁唐虞原任通判王湛年七十三生長堯天雨露中傾陽常自效葵衷太平式燕膺嘉㑹多祉繁禧集聖躬一曽紆緑綬預華簪親見閭閻樂意酣嵗嵗頒行人瑞牓只今同祝丙丁南二原任通判馮誠年六十一時值履端春始世逢錫極恩多青陽盡披瑞錦黄髪同餐玉禾髙下二儀斡運廣輪萬國呈歌蓬萊五色雲近紳綬欣傳珮珂捐職州同楊名義年八十葱葱鬱鬱氣佳哉玉堂正對金鑾開仙山一見五色羽愷悌君子神所予聖主如天萬物春角尾奕奕蒼龍蟠上追軒頊相唯諾旁資老耼釋迦文暉暉日向金輿轉鳥能歌舞花能言真珠為漿玉為醴更識人間有真味莫笑華顛飄彩勝到處聚觀香案吏福禄正似川方増有生何處不安生玉徳金聲寓於石粗識軒轅奏樂聲後者無繼前無偶新年已賜黄封酒何人作頌比崧髙萬古斯文齊岣嶁集蘇軾句捐職州同李鑾年七十三黄髪肩隨入覲清時眉夀同登沆瀣丹霄露湛醍醐玉斚香凝錫福天家福備覃恩兆庻恩承拜祝乾坤悠久長瞻日月升恒捐職州同髙日暐年七十二彩霞旦展玉漏晨催龍墀鳯暖魚鑰晴開几陳珍膳甕滿春醅頤年疊至眉夀齊來雅歌山阜樂奏臺萊星暉朗潤雲漢昭回徳彌六合恩浹九垓一人有慶百工熙哉捐職州同李廷榮年七十聖主符珍闡握小民衢巷歌謡嵗值五旬紀瑞詔徴千叟來朝玉液杯傳九陛雲璈樂奏三霄夀㝢嘉祥疊見昌辰盛典常昭捐職州同髙攀試年七十聖人御世億兆含醇萬年慶衍九㝢夀臻普頒丹詔齊覲紫宸拜恩玉陛錫宴昌辰雲飛雉尾日繞龍鱗爰斟甘醴載列兼珍恵覃耆耋福賁冠紳願同小草仰祝仙椿捐職州同徐大年年七十蒲藻文魚樂芩苹瑞鹿游履端春慶積迎筴日華稠齒作松喬萃恩同江海流便蕃靈夀杖扶掖逮遥陬捐職州同董母班年六十六歌華藻溥春祺自有鴻濛以來未見一席三千宴若兹伊此三千人生在羲皇世積累以熙洽漸以深仁摩以義濟濟位朝班亦及農兵工商聨職志厯厯以齒序豈必二首六身疑年書亥字皇錫慶膏溥萬物以濃春皇抒奎藻垂天地之大文臣愚靡有知識敬頌瑞星卿靄玢玢復璘璘捐職州同温世爵年六十五聖夀符昌運元正渥澤覃升恒緜寳籙蹈詠集朝篸流慶新祺溥登春樂意含榮踰燕禮二歌協鹿鳴三扇箑和風鼓㪺觴湛露甘御爐香靄靄宫栁緑毶毶授杖鳩初刻添籌鶴共諳臺萊歌日茂山北與山南捐職州同張徳星年六十四軒轅命大撓製甲子神禹使章亥步九州陽干隂支斡運㡬千載南輪東廣囊括四大洲乾苞坤符積景運覩此聨珠合璧效珍修貢之鴻庥夀人徧列天地間夀祺普錫春風寰峩峩絳闕人三千睿照如日仁如天皇帝御宇五十載昊清垂禎覿雲采月正元日陳琛球越六日敷宴以愷艾耋復期頤齡多百嵗躋東瀛復西宇祝環九衢普韶陽旭景舒曈曨天子曉闢乾清宫華髪藹藹仰渥澤六十以上一百五嵗以下咸所同扶攜仙笻鶴髪健晻映雲錦酡顔紅羣知熙愉康寧遊夀㝢詎識九重參贊超元工議敘州同孫有誦年六十六崇禧駢集逢韶春下詔引年盛筵陳甘膏珍賚沛稠疊鶴髪鯢齒來紛綸扶桑海國來捧日南極弧星環拱辰雅管頌笙調鳯凰金盤玉饌擘麒麟扶靈夀杖拜恩渥進恒春觴祝嘏純視學養老各有義佇覩橋門圜萬人千總劉汝翼年七十六聖皇繩武嘉讌重開釐延籌屋歡洽春臺祥光應莢協氣調梅星羅玉陛露渥金罍貔貙忝列鵷鷺榮陪御園小草長沐恩培千總鄭文元年六十六署色曈曨萬户開際新春日上春臺誰知需次千夫長也預君王恩宴來一華筵慶祝萬年齡臣是天園列籞星景慶光中清蹕路年年福曜䕶長坰二千總蔡永興年六十五大化敷寰極春筵啟禁中耆台邀澤厚酒醴荷恩隆見丙星彌耀由庚樂至崇階階同舞蹈稽首效呼嵩千總姜凱年六十五紫氣翹瞻帝闕貞符慶祝華封乾筞上推河洛仙籌下衍椿松荷㦸忝居一隊稱觥得到九重父子同沾華宴恩榮亘古未逢臣侍臣父姜天章同預嘉宴千總張新在年六十三繡㦸祥光䕶紫微司門咫尺凜天威人遊化㝢増綿算春永仙臺炳曙暉濃湑再欣開綺席皤頒相慶列彤扉黄圗瑞啟靈長運璧合珠聨拱帝畿千總韓國鍈年六十三重闉司管鑰七校奉韜鈐斗仰三霄近籌知四海添慶逢弧曜啟祥共嶽圗占紫殿羣仙集瓊巵雨露霑千總王璋年六十一鳯律占延洪鶴籌添景羨韶旉閬苑春懽洽蓬山徧霽雪引祥光和風錫嘉讌尚齒萃鵷鸞賜酺及微賤自慚虎旅班忝附金閶彦芝鶴共繽紛星雲同糺縵祝綿億萬齡仰識蒼穹眷原任千總徐質年七十六玉律祥風起丹墀瑞氣環歡聲騰薄海洪算頌如山日麗元辰後筵開霄漢間何期叨未秩咫尺仰天顔原任千總鄒志亮年七十四丹霞夾虹彩景星出雲間聖代垂光華五色一何鮮夀民多松喬羣老過百年彤廷列耆舊鶴髪皆翩然一人穆端拱禔福為廣延瓊筵賜春酒盛事萬載傳原任千總張廣潤年六十八貞元綿景運夀㝢應昌期啟淑榮三露呈祥絢五芝嵩聲諧玉琯旭彩暎金巵燕喜偕營弁恩叨解組時候補千總紀士端年六十二嵗首陽和淑氣新祥煙瑞靄焕丹宸靈臺玊律風吹艮令節青旗斗建寅交泰地天成夀㝢昇平宇宙樂長春微臣幸接恩光近同聽仙韶萬舞均候補千總岑儀年六十一五甲周元化三辰協泰交軒圗開鶴笇堯莢茂螭㘭嘉㑹䝉頒杖微班愧執鐃縁知千億夀聖徳自兼包候補千總楊毓芳年六十一祥曦開紫垣門鑰職忝備敢誇松栢年願比佺喬嵗聖人臨夀㝢淳化浹天地瑞瓞慶緜緜一堂隆五世韶春溥羣叟儀度何醰粹茀禄承洪庥仰識龍顔霽盛典頌耆筵錫羡皆天惠六品職銜靈毓年六十三優游聖世被恩寛冠服榮叨六品官惟有忱依雙闕上豈知身到五雲端頒來文綺青瑶席捧出殊珍碧玉盤額首隨班依九陛髪今重鬒面重丹儒林勅封郎鄧崇鎬年七十蕃釐廣被八極景祚仰慶延洪少飫衢尊至老人沾夀醴還童金爐香繞旭日瑶墀樂奏條風耆臣式拜且舞頌揚惟效呼嵩儒林勅封郎羅紹麟年六十六玉戺肆瓊筵丹墀開酺醼舉旅徧臣工引年羅貴賤微臣楚澤臞皓首執經巻幸叨紫誥榮得預朝金殿同分大官酒俱飫天厨膳捧賜朂葵忱校書勤述譔臣子編修羅修源現充四庫全書處提調儒林勅封郎李化樟年六十六昊天儲百福景爍萃我皇六巡南紀奠海岳一舉西旅恢紘綱蠲供數以垓億計拓地里餘二萬强邊庭設郡縣髙閣庋圗章文敷四海何煌煌豐亨豫大廓元運燾依宇下夀而康三千耆耋拜舞歌帝力辰垣輝耀同天長儒林勅封郎周之鳯年六十二星雲呈糺縵瑞氣浹穹輿禮錫髙年爵文同薄海書吟隨八百後頌軼九皇初國慶人増夀恩光帝用譽儒林勅封郎祖率英年六十二華藻春祺宴鴻龎昔未聞青髫醇化浹黄髪慶膏殷鷺序承瑶爵鸞書荷錦雯松喬寧有此佺羡得同羣疊璧恒流彩編珠自耀文九皇超太古萬禩瑞氤氲勅封郎姜天章年八十八草野不知書弓馬是家世但解小説家曽讀洞微志太平興國中瓊州楊遐舉其年八十其父叔連百廿二其祖宋卿一百九十五雞巢中小兒乃其九代祖不知嵗年不食亦不語其説若有據其事或荒唐生當汴宋既非郅隆代逺處儋海不到天闕旁豈如臣多幸生世如虞唐膝下千夫長堂前武信郎父子叨預宴蕭露霑龍光座分上下席杖列左右行三千人中亦多兒孫侍但得扶掖不得天厨嘗臣視他人感恩更難量臣子凱年六十二八十有八臣天章武信勅封郎孫文運年八十一世業榮叨豹侣天恩久賁鸞書齒協黄鍾九九日行青道初初慶奉珍厨健飯普同海宇安車簽名並題武信白頭幸珮瓊琚六品廕生六十七年六十四絳鶴聲長麗景披紫猊烟潤暖風吹琪筵燕衎天顔喜綺席光華睿藻垂折俎欣逢恩共溥加籩竊愧分非宜九衢春滿人同慶拜舞彤廷進夀巵阿克蘇所屬拜城六品噶雜那齊伯克庫爾班黙特年六十六飽聖徳歌天衢臣派巴噶爾臣家阿克蘇自有生以來未識中華文字黄與虞恭逢皇帝陛下戡亂定猰㺄天堂黙徳帡大化帕爾西語回字非睢盱汗木素爾山之南塔什哈什逹巴漢東隅自從哈宻闢展土魯番以及哈喇沙爾暨庫車西過烏什喀什噶爾葉爾羌和闐額里齊域玉水交盤紆悉歸皇帝覆幬徳外及左右哈薩克東西布魯特抜逹克山痕都斯坦在古罽賓大宛之故墟年年琛貢集紫閣荷皇帝恩酣醍醐臣之所轄在拜城噶雜那齊綜理田畞及税租拜城乃在賽喇木西喀喇烏蘇東所屬邨莊二十二距京一萬三百餘里奉璇圗昔年紅銅鑄錢薄迄今乾隆通寳耀逺模不須五十普爾即為一騰格國寳流衍一百普爾作一騰格輸回民具有知識函血氣以生以養以教以訓皆睿謨碧眼髙額多長夀臣年六十有六䖍效職貢來皇都恭逢盛朝溥錫千叟宴西濛小臣亦得綴燕胥皇帝萬萬嵗豐年長敷腴小臣唯有墾稻畞勤額賦率諸伯克聽於伊什罕伯克阿竒木伯克上從駐劄大臣覲聖符千叟宴樂何如抃舞大地承恩初伊犂六品宻拉璞伯克拉伊木年六十五嘉㑹三元綺讌陳西濛同被化工新屯開二萬膏腴地身與三千福夀人宻拉璞官司水利額齊斯境捧天珍伊犁河水皇春滿親到蓬萊更識春欽定千叟宴詩巻二十一
