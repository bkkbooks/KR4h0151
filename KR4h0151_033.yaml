body:
  text: 巻二十八預宴一百六人詩一百二十六首馬甲王國鳯年七十七睿聖啟貞符在宥物時敘龍紀衍億千箕疇錫九五包涵亭育參經緯天人普煌煌舉上儀遹駿超三古圓葢中央黄立仗両階羽中和邁漢儀慶善陳韶舞煒兹嘉宴開濟濟松喬侶芝雲䕃輪囷蕭露歌濃湑班隨煇翟微榮預簪紱伍眉夀祝萬年純禧播區宇馬甲孫益方年七十七玉燭調和開景運帝見乎離出乎震法天行健五十年兼皞農軒嚳堯舜古稀天子徳日新徳為福基福自臻萬年蓍衍天家祚六葉蓂舒黼座春引懋典排嘉宴瑞日祥雲敞春殿詩牋疊獻效賡歌洵堪譜作羣仙傳馬甲巴蘭泰年七十七慶值九華燦爛欣看五色輝煌青龍闕麗霽景赤鳳旗迎曉光白髪樽開濟濟黒衣侣效蹌蹌黄繖中臨玉座天章黼黻為章五色體馬甲全保年七十七際盛世飲太和飽芻糧負琱戈營偃月陣鸛鵝無所事髪已皤仰徳化恩滂沱養老宴髙嵯峨三千人戛鳴珂兕觩角顔許酡拜天恩矢頌歌小臣叨幸何其多馬甲伏魔保年七十七聖人御極澤沛恩覃金門開宴玉殿傳柑羣工衆庶既樂且湛星拱于北山祝如南小臣何幸亦預分甘拜手獻頌敬附彭耼馬甲常格年七十七綵仗風和接上蘭長筵肆啟簇春盤蘭階五世延洪慶鶴髪千行拜舞歡雉尾隨班雲物麗螭頭獻爵露華漙恩榮振古何曽有應作瑤臺仙㑹看馬甲順格年七十七羽仗雲開列仙曹日下排駑駘惟齒長鸞鶴此時偕佛夀真無量天恩詎有涯初聞韶樂翕率舞向瑤階馬甲什圖年七十七陶鈞庶彚亮天工暢􅑴垓埏一道同為念耄耆彰泰運特開筵讌溥春融恩綸澤被風重巽盛㑹輝凝日再中共仰繁禧純嘏茂萬年嘉與萬方同馬甲吉蘭泰年七十七曉日曈曨玉殿開詔宣耉老集蓬萊醍醐滿泛天厨酒逈勝金莖露一杯一霞觴遞舉遍耆齡瑤砌春朝淑氣凝叨幸一時軍隊士居然上應老人星二馬甲劉世傑年七十七聖人握乾符醲化覃紘埏夀愷集上瑞錫福開耆筵衢尊飫仙醴式序羅三千臯䕫賡拜手松偓榮比肩瑤砌煦朝旭綺席凝祥煙葵忱效封祝聖夀億萬年馬甲富森布年七十七皇都春麗日帝澤溥華筵齒列金階上顔開玉斚前雲門聴樂部露燕誦詩篇盛典承家法鴻庥億萬年馬甲陳良玉年七十七八百羣筵綺序排字鐫養老朗懸牌同聲並進南山祝九宇騰歡愜睿懐一恩頒夀爵醉醍醐逮賤尤驚禮數殊福祉駢多敷錫溥登歌雅化效騶虞二馬甲巴金太年七十七海宇化敷日久仙壺慶啟筵初錫福天開蕊殿熙春人到華胥濟濟扶鳩酌兕蹌蹌戛珮曵裾上夀欽隨千叟同聲敬頌九如馬甲塞爾特年七十七舉兕觥缷兕甲介夀筵髙歡宴洽承恩何必須壯顔况復遭逢是堯萐帝徳光天超昊羲四海沐化凝純熙夀㝢如春春正永九天膏澤歌鴻施逺陬澨近京畿同風擊壤歌巍巍萬年長此依仁輝馬甲永成年七十七春光十二律旋宫立春後十二日夀㝢重開八表融御仗風和韶奏細光華燦處即方蓬一耆集三千古未聞戎行何幸獲瞻雲仰承錫福恩膏渥純嘏延洪頌聖君二馬甲湯受福年七十七上古赤文緑字中天玉策金書未見朝盈皓髮詎聞宴錫丹除六十四年典舊三百六旬春初雲日欣瞻黼扆拜跪羣歌樂胥馬甲于天禄年七十七泰元調氣淳厚敦龎盛治光天錫民慶豐千班序立萬國來同曰仁曰夀惟華惟嵩樂歌在藻儀詠其桐慶雲朝煥甘露春融萬年聖紀光超有熊馬甲魯宗益年七十七聖皇御㝢能夀人洪疇斂錫純嘏臻乾坤二筞起大衍幬覆一氣敷洪鈞上中下夀筵載啟燕饗食禮典重申引年珪紳列階陛尚齒袀襏瞻楓宸近光樂愷以時集飽德醉酒與物春熙誾懌愉效衢頌億年順則同堯民馬甲六格年七十七景慶星雲靄玉除普天樂愷暢華胥瓊霄露錫仙班徧玉琯春調鳯律初耆耋拜恩依夀㝢彭耼協瑞拱宸居尚方金綺頒稠疊聖澤汪洋幬載如馬甲王鐸年七十七玉琯韶宣太蔟瓊杓景鬯青陽闕下耄耆畢集庭前几席斯張日近銀旛彩勝風和彩仗儀鍠愧昔馳驅綴列欣今沆瀣盈觴馬甲富明年七十七化宇洪禔集新韶燦景光普歡開燕飲式序入鵷行露渥金巵捧雲深雉扇張天顔臨咫尺恩禮邁尋常瑤席膏同沐彤階旭正長柏梁效賡載先得捧宸章馬甲額爾謹年七十七欣傳賜醴到戎行綺席華茵燦有光恩賚便蕃齊抃舞功過舞羽治垂裳一春臺喜洽沐恩波列宴瑤階厠玉珂莫羨華封工致祝軒皇棡鼔奏靈鼉二馬甲孫竒林年七十七春滿蓬壺淑氣和千官劍佩㑹鸞坡域中仁夀唐虞世天上升恒保定歌彩翽鳯梧温室樹恩流魚藻液池波迎陽共矢葵心赤駐景同看鶴髮皤化日光輝皆樂土清時吟咏有巻阿臚歡競獻延年頌翹首璿霄瑞靄多馬甲劉廣基年七十七九天啟閶闔冠珮羣鳬趨瞻雲芝殿迥何日葵心輸昌時曠典開耆耉邀榮殊拜賜效華祝鳩杖欣同扶惟皇夀億萬愷澤長鴻敷藩部暨朝鮮莫不恩與俱引年恢懋典煥若王㑹圖詎惟數膠庠巍巍超唐虞馬甲索爾吉年七十七尚齒成嘉㑹恭聞聖祖年九重修令典千叟赴髙筵耆耋心顒若衣冠序秩然霞觴傳沆瀣玉饌飫芳鮮祥肇履端候恩敷人日前三多斂福備奕禩戴堯天馬甲王三保年七十七聖主膺圖福孔皆欣開廣宴樂聲諧虞庠杖撰先三代禹㑹干和舞兩階木徳風含花似錦液波凍解酒如淮欲知化日舒長候復旦光華布九垓馬甲虎兒年七十七擊鼓騰騰樹羽旗少年技擊多所為生力騎來蹄踣鐵直與飛鳥相追馳即今壯志猶如昔未有竒功及勲格聴名慚喚阿塔思脱郤袀衣入耆席感戴天恩沛澤濃昇平軍士遭竒逢腰間長箭置不用尚賜鳩頭五尺笻馬甲七十八年七十七春陽被細栁膏澤望青瑣詔許共扶笻例得暫釋笴煌煌曠古典卑賤叨宴坐自忝馬齒微久與壯夫左三千得榮預鶴髮鬖以瑳仰惟豢養恩感激慶長荷拜手祝萬年芹曝獻應可踴躍覲龍光追風思馺騀馬甲永徳年七十七錫羨沛恩膏叨榮慶特遭引年均酌醴投水陋分醪春入仙蓂翠風催細栁髙萬年祝宸扆愷樂告同袍馬甲全四兒年七十七天開若木耀珠旗靺鞈隨班獻玊巵黄髪三千齊效祝萬年同仰錫春禧一卿雲糺縵駐光華信有蓬池甲子賖從此敢援恩宴例期頤長得挹流霞二馬甲戴長庚年七十七景緯呈祥協氣佳四時通正八方諧恩筵燦爛陳金戺仙仗輝煌擁玉階率土耆年咸醉飽蕃封陪𨽻盡柔懐昇平夀㝢同歡洽抃舞堯天福孔皆馬甲觀福年七十六綺甲三陽啟蒲筵九陛陳人瞻金殿曉天賜玉壺春槐棘叨聨次松喬喜作鄰駑駘榮杖履雍肅比朝紳馬甲特克慎年七十六玉琯春囘曉鑰開羣仙翔步入蓬萊増年新慶屠蘇酒錫福榮叨曼夀杯雨露無偏周海甸星雲有耀照輿臺悚惶喬野儕文墨也捧瑤箋獻頌來馬甲兆徳年七十六扶杖承恩入趨風戛珮珊金莖承湑露玉醴飫韶顔盛事千秋少温綸萬國頒五雲金闕迥恍是閬蓬間馬甲常金年七十六帝徳崇高帝算綿湛恩汪濊逮耆年三多華祝歡騰地四海鴻禧慶錫天酒獻椒盤春乍盎宴羅瑤戺月將弦人間亦有枌榆㑹何似身霑雨露鮮馬甲達爾紅阿年七十六執㦸愧糜糈容覲天子光嘉宴普天庭冠珮來蹌蹌曰惟耄耋儔攜杖可同行膏澤豈有偏邇者乃賡颺蘿圖慶有祉康衢歡無疆同兹依夀㝢穰穰䧏嘉祥馬甲富貴年七十六虎威豹直舊頭銜欣與虞階鵷鷺叅酺飲大官仙味飽五雲春殿感恩覃一九天沛澤浩無私四海歡歌共聴時介胄寜須解文字蠡猶思測管思窺二馬甲舒金年七十六化宇多登夀皇仁重引年韶陽舒上日羽仗㑹羣仙共效臺萊頌長依藻黼筵無疆歌景福錫慶亘無邊馬甲范宜達年七十六古稀天子夀齊天賜詔金門集大年風動鸞旂開瑣闥日升瀛海上花磚雍容杖履瑤臺鶴整肅簪裾閬苑仙爐靄香熏縈綺席鼎調玉食肆瓊筵分攜絲錦天恩沛遍給銀牌夀字鐫山嶽比崇髙億萬春秋合算富三千位殊貴賤情胥洽勢隔尊卑禮以聨小草幸承新雨露鴛行鷺序得駢肩馬甲李沛年七十六繽紛彩仗引朝儀抃舞隨班拜赤墀綸綍恩多羣與宴七旬憶作羽林兒一佳氣氤氲協瑞符恭逢聖治邁唐虞三千鯢齒懽嘉㑹鼂采榮光遍九衢二馬甲劉澍兆年七十六聖人握寶籙歲首凝庥祜嘉宴集耆老懋典法皇祖瓊筵列三千扶杖共抃舞慶洽運日隆時亨澤逾溥微臣樗櫟質榮叨列瑤圃醉飽歌渥恩盛事超萬古馬甲竒成額年七十六從説蓬萊到者稀朝衣班裏覩袀衣始知天上微垣直也有期門共佽飛一律囘太簇啟青陽夀讌祥開喜近光菜甲春盤先日好蘿圖寶算億年長二馬甲天津保年七十六喜覲天光天尺咫春風執㦸明光裏已隨小隊列虬營還扈長楊埀象弭星騶歲月數從頭聖主恩深浹肌髓旭日恩綸煥彩衢九華春醼齊年齒軒皇上夀古無倫五十龍飛新鳯紀湛露瀼瀼物共霑慶煙裊裊霄逾綺光風影裏拜金壺天樂聲中斟玉醴閬苑蓬山空爾為紫芝黄竹詎堪擬宜春人日繡紅幡綵燕筵前先送喜馬甲官福年七十六黄髪埀春丹壺煦晝萃三千人以釂以侑率葵藿忱祝黼扆夀恭惟帝夀仁覆如天四時百物行焉生焉日星照耀雨露駢翩凡厥有生普積歲年渥以春陽彚以大千微如小草被沐均妍敬樂天徳九宇同宣敬歌天夀萬載洪延馬甲烏爾占年七十六聖夀綏多福敷天夀㝢登彤墀初日麗皓髪瑞雲蒸衎燕新祺普賡歌曠典承拜颺齊蹈舞蕃祉頌升恒馬甲羅太年七十六紫宫瑞色靄朝曦恩宴耆年溥夀祺夙綴末行依豹尾更逢嘉㑹侍龍墀條融協律三階朗慶矞舒霄五色披榮值萬齡長錫福獻忱惟頌九如詩馬甲伊特格爾圖年七十六維皇崇典瑞符太乙錫慶有加湛恩洋溢泰逺邠國濮鉛祝栗日月所照㒺不俾率三古舊章萬年崇恩顯謨纘緒聖祖神孫葛天八闋大容雲門頡史以來罕見莫倫不襲縟儀實超惇憲天無私照下迨微賤䕫龍虎羆尹虺奭旦拜手稽首未逢斯宴馬甲石如琪年七十六赫赫蘿圖輝輝瑤籙道協清寜祥徵岳瀆㤗彚茅三瑞紀蓂六羣仰九重來同萬福人集瓊筵天調玉燭露浥瀼湑雲凝紛郁寶甕滿斟衢尊顒祝馬甲孫起豹年七十六夀㝢承禧六合同瓊筵有詔特恩隆齒惟犬馬馳驅後身在䕫龍拜舞中列仗旌旗排曉日翔恩殿閣起春風欣當既醉歌純嘏長養方知造化功馬甲馬國瑞年七十六詄蕩天閶啟彤階麗景舒尚方傳授席耆叟慶聨裾瑞叶卿雲縵膏霑寶露湑至尊膺景貺獻頌藹魚魚馬甲劉起龍年七十六春風被宇皇夀岱瀛調泰鴻氣舒甲散萌蔚炳文教赫濯駿聲九服同祺如元起貞鳬鷖作頌鸞鷟翔庭厠貔貅旅聆鳯皇笙烝哉嘉宴拜舞籛彭馬甲五達色年七十六班聨松偓奉羲黄嶽豆溟杯荷寵光忝列戎旃慙弩末也隨虎拜沐瑤觴一昔年琱甲與從征太液曽邀虎旅觥今日耆筵舒愷樂夀歌聲憶凱歌聲二馬甲王芝植年七十六韶序青陽啟鴻恩拜玉墀宴張千叟㑹星藹萬年枝玉饌駢羅席天漿溥挹巵深慚葑菲質亦得被恩施馬甲髙士俊年七十六太清泰寜鞏惟帝徳中及萬靈泳游食息元㑹靡間干支遞積弁歌襫舞以樂皇極微及星騶並循大則雕錦華樽椿紀蓮刻疇笇大年時萬時億馬甲張時龍年七十六至治軼唐虞均沾湛露濡東風調玉琯南極朗雲衢夀世承嘉樂耆年奉燕娯何期恩下逮周浹到庸愚馬甲善保年七十六繽紛仙仗肅丹墀晴日䓤籠碧玉枝法釀香斟分太液蟠桃氷脆滴瑤池欣逢聖主恩頻錫忝與耆筵澤屢施太史書呈春日瑞恰看星拱泰階時馬甲八十七年七十六茂典耆年集雲衢振羽翰醵儀傳禮器酺飲載周官未若天恩重均沾露澤漙稱歌同拜舞瑞靄布金鑾馬甲富朱禮年七十六昌辰開耆叟宴珍膳出大官厨愷澤春墀千席祥暉泰階六符溥歌魚在在藻集吉鳯喈喈梧自顧榮逾常分欣隨玉陛聨趨馬甲穆克登額年七十六簫韶陳九奏旭日麗罘罳景鑠重熈典鴻龎億載基酡顔沾玉液黄髪列金墀五緯聨珠夜同歌湛露詩馬甲何臣泰年七十六椒盤美酒進屠蘇韶景中天萬彚娯更喜九重隆夀耉直敎千叟聚春酺置身已共洪崖侣效祝同為嵩嶽呼濟濟期頤争獻頌古稀聖主握乾符馬甲西登庫年七十六韶景雲衢滿簪裾廣殿羅絳籌添福海綠字應榮河仙杖承靈夀瓊筵酌太和聖人千萬歲寶籙衍圖蘿馬甲姜利年七十六瑲瑲玉佩集神洲不數觀河五老遊鶴立三千呈瑞應書銜紫鳯杖扶鳩一億年此是紀恩初九醖芬芳侍玉除長祝歲豐人夀愷瑤笙璇管叶嘉魚二馬甲烏林太年七十六五甲周鸞書元辰啟鳯琯日舒徳㝢長春盎仙壺滿天厨萐迓祥海屋籌增算夀朋締三千此㑹從來罕上有鵷鷟羣下及貔虎選譾劣荷鴻恩韶光慶洪衍馬甲劉光逺年七十六久𨽻袀衣隊何階謁禁垣俯忻年矍鑠獲與錫便蕃九節承卭竹三漿飲上尊願賡天保頌冀以答洪恩馬甲福禄年七十六聖人頒大惠羣老共趨蹌廿萬齡聨席三千叟獻觴瓊筵羅㫖美金醴泛芬芳葢地圖曾獻鈞天樂正張陽春舒建木麗日蔚榑桑鼓腹堯民樂歌陳玉陛旁馬甲誠志年七十六瓊筵仙屨集璁珮韻琤瑽盛典看彪蔚皇風鬯駿龎千門春似海百榼酒如江詔錫延年杖仁恩普萬邦馬甲舒成年七十六重熙慶洽千秋㑹瑞靄祥雲繞鳯城樂夀㝢開朝日上耆英羣聚寵光榮鼎中斟雉甘初飽仗外扶鳩歩欲輕六合共依天浩蕩三春同愛歲崢嶸熊羆列隊弓刀健鵷鷺隨行劍佩迎自是瑤墀親受賜不同仙露望金莖馬甲舒明阿年七十六熙熙迓天庥濟濟集人瑞人偕黄髪羣恩自紫宸逮從來雨露恩原不遺庶類寵錫大官庖榮列庶老位七旬雖耄耋八旗原子弟允矣歌昇平劍㦸鑄農器馬甲七十五年七十六左把浮邱袖右拍洪厓肩徒爾餐松學仙術未若仁夀之宇億萬年一飲天漿長不老不餐籛鏗雉不數安期棗手扶鳩杖飽以遨一草一木涵恩膏虎旅連營琱㦸耀龍光錫宴璚筵髙馬甲徐永成年七十六瑞靄舒霄景矞鮮繁禧敷錫敞耆筵衢尊潤溥瑤階下厨萐甘分玉案前春到皇州開夀㝢人遊聖世即神仙傾葵願效華封祝既醉還歌鎬飲篇馬甲呉有鳯年七十六九重丹詔沛殊恩星耀南弧聖夀尊五十年春春浩蕩春風春日帝顔温一幸厠雲衢列扞騶騰驤昔與奉星斿老來不愧無勞績親捧天家碧玉甌二馬甲巴克唐阿年七十六盛治協咸熙春光滿帝畿分行趨玉陛入宴覲宸闈瀛海耆年集星躔福曜暉稱觴申頌祝丹悃重瞻依馬甲窩什騰年七十六玉琯調春仰徳元多祺引翼沛殊恩福敷億兆承丹詔叟集三千飫玉樽仁㝢共欣遊浩蕩榮施還沐賚便蕃夀人夀世綿鴻算萬國熙熙頌昊軒馬甲何承宗年七十六閶闔扇和風耆筵敞紫宫自天敷夀愷率土荷元功玉饌芬芳溢天漿沆瀣融敬隨黄髪侣拜手效呼嵩馬甲髙士俊年七十六葵藿本向日雲衢欣荷天天門九重攝衣入贊拜濟濟皆彭籛仙筵列七寶食之後天而不老蓬壺景恒春閬苑花長好羽林七萃步後塵弓衣矢箙常隨身承平樗櫟欣増歲柏子盃中酒釀春馬甲郎揚芳年七十六寶鼎香濃裊裊煙皤皤黄髪共朝天杖扶靈夀應難老身到蓬萊總是仙玉饌遍餐春似海金樽頻泛酒如泉涓埃仰報誠何補竊附衢歌祝萬年馬甲郎應騫年七十六天上韶咸玉管清殿前仙酒和蘭笙銀牌捧出誇同伍厮養今邀衎宴榮一正逢春鬯九衢時黄髪欣欣仰盛儀為問瀛洲偓佺侣幾曽親獻萬年巵馬甲薩哈連年七十六日月光久照健運如初升龍躔啟太衍恩浹春臺登鯢鮐應詔來舞蹈筋力勝光榮霑被渥寵賚尤頻仍晴雲絢平墄綺旭舒觚稜皇哉登夀㝢茀禄川方增馬甲魯常阿年七十六聖徳溥春澤恩筵廣集禧稱觴陳國慶扶杖習朝儀雲日垂金鏡星辰煥玉墀共賡皇萬福億禩被蕃祺馬甲二達塞年七十六楓宸闓澤光夀耉玉斚金樽㫖且有眉梨鱗集三千人共喜扶鳩酌春酒易占需雲正宴樂詩詠魚藻兼臺萊雲中正奏隆平樂太蔟音宣淑景開雲開紫殿壺天藹新排丹陛樂中在九衢浩浩聴歌歡遙和釣韶聲似海馬甲塞克圖年七十六鞠􅎽奉金巵拜手歌氷嬉西苑紫垣側瀛臺太液池春隂與秋風麗景光參差一陽凍初堅萬頃凝玻瓈涓吉排名籖習技分八旗氷牀施御幄平如步雲逵列翼張鶴羽綴行連魚麗身手好結束輕比一鳥飛著地齒齒鐵束跟條條韋春雷三聲起籋雲不須騎圓球上騰騰旌門髙巍巍雲合倐霞散風驟而雨馳頭籌奪錦標㨗足先得之國俗循舊典肄武寓於斯皇恩加優賞普為生計資下走踰七旬敢負矍鑠姿氷嬉不能預耆宴前致詞見獵心輒喜迴思少年時馬甲三德年七十六欣隨儀舞上彤墀樂奏鈞天醴滿巵麗日迥臨三秀草春風新茁萬年枝丹囊彩煥華芝合寶甕輝騰絳露滋六合同風徵樂夀盛朝嘉慶軼軒羲馬甲毛錢林年七十六豢養天閑惠普存又躋樂夀沐天恩鶴齡長飫三霄露麟趾方徵五葉孫一啿啿春韶錫福時大酺廣宴澤優滋扶鳩玉闕聨眉夀松柏南山各獻詩二馬甲萬住年七十六三春開夀宴耆耉萃如雲黄髪瑤尊映彤階瑞靄薫未申犬馬力也厠鷺鵷羣幬覆真無外賡歌媿不文馬甲周玉柱年七十六韶開瓊籥曉報銅籖九重張宴千叟均霑英韶奏叶鏐綺頒兼錫極保極引養引恬並掄星萃俾捧雲縑歡騰殿陛慶洽閭閻祝天子夀海屋籌添馬甲五十兒年七十六金膏玉齊注堯鍾拜受天家雨露濃深幸三千鶴髪輩齊瞻温霽聖人容一袀衣初未與朝紳皓首今欣鬯早春鸞鶴髙飛卑燕雀都分宫樹一枝新二馬甲王啟福年七十六玉衡啟序春風生千叟華讌開彤廷温綸渙發遍海宇羣仙接武同日遊蓬瀛臣昔期門供使令馳驅未效華髪盈聖人久道臻化成武功耆定文徳明自昔山車澤馬應期出孰如今日純禧郅治真難名酌瓊醴吹瑤笙華封三祝巻阿賡拜手稽首聆咸䪫馬甲姜那爾太年七十六帝徳浩無名天心申眷佑太和播四海作朋慶三夀東逮扶桑濱西越崑崙岫受生咸耆齡一一歸我囿恩賜仙厨珍近聆咸英奏稱觥祝聖人萬年洪幬覆馬甲海保年七十六介眉羞耉樂枌榆處處豳歌入畫圖正值耆筵天上啟恭惟盛典古來無英英蘭甕醇和溢啿啿春輝景福敷較射敢矜身手健幸承九節瑞笻扶馬甲觀保年七十六萬年緜寶籙五世茂金枝大地仁風洽敷天湛露施斑斕扶玉杖矍鑠向龍墀鉅典超千古含哺樂聖時馬甲三格年七十六當軒日馭五雲開釦砌豐崇拜賜來洛社香山推盛事幾人親得捧天盃一天開夀㝢共呼嵩詔賜趨蹌紫禁中扶出鳩笻增矍鑠不須扶掖仗兒童二馬甲得合年七十六九天錫宴慶溥春祺合三千人下走與之身列馬甲未諳朝儀黄扉丹陛有目未親覩大禮隆樂何以逮賤微帝錫恩言賚夀耆上自上夀百有餘嵗下至六十周干支九秩與一品親跪玉堦受御巵餘以齒列承繁禧菲材馳驅列擎跽鞠􅎽夙所知感恩抃舞言春王正月六日承鴻施馬甲額爾登額年七十六曉日曈曨春殿開九霄雲色映昭囘節先人日陳嘉宴鶴髪鳩頭入座來一三多願獻封人祝五福早敷箕子疇九拜天階呼萬歲樽移北斗海添籌二馬甲官桂年七十六貳粻宿肉只尋常箑扇仙厨錦宴張千叟倍三齊介夀一人理萬正當陽引年典已超虞夏養老文何論漢唐頒糈賜銀恩並渥猶知矍鑠勵戎行馬甲仁舒年七十五聖皇握金鏡仁夀臻重熙大鈞富陶育海宇多龎眉三千為數盈五福用錫之當春開嘉筵嚮晨趨崇墀斯民久皥皥夀者來祁祁願獻九如頌拜手祝純釐馬甲噶郎阿年七十五添籌海屋羽觴飛五老聨光向紫微試看星雲環玉闕九天南極正騰輝一凱宴榮分飲至樽普天安樂舞蹲蹲欣隨七萃連茵坐春㬉同袍擁日暄二馬甲富勒渾年七十五浩蕩春開晴晝巍峩殿敞雲闗玉饌徧嘗鯢齒金巵同奉龍顔人在丹邱綘縣境如員嶠蓬山扶老欣逢賜杖生小矢箙刀鐶馬甲達罕㤗年七十五雲開糺縵鬱嵯峨珍饌芳筵湛露多萬國梯航齊入貢鐃歌都作夀人歌一鶴侣駢闐謁帝閽執殳人亦飲堯樽更懸果脯青絲鞚歸與兒孫説聖恩二馬甲達晉泰年七十五五福疇臻鏡日華金巵鞠􅎽頌椒花長生酒賜羣生福銀篆牌懸綺㪚霞一七旬壯志未蹉跎躍馬何曾更荷戈細數少年初入伍月錢歲米較來多二馬甲虎什八年七十五郅治昭翔洽天淵亘際蟠排筵開甲帳飛臛雜辛盤春始陽和溥恩深禮數寛醉扶靈夀起歸去萬人看馬甲三達塞年七十六玉帳春風囘融和帝澤普觴斚承神漿綺帛出内府錫賚擎當墀恩膏濡率土仁夀被無垠風雲此攸聚微臣執㦸徒亦得飫甘醑皇哉仰黼宸麟鳯偕儀舞馬甲黑達塞年七十五環海恬波仰鏡華熙熙新歲彩符加椒花酒奉瑤巵泛馬齒叨霑聖澤賖一若木華開巨海濱西濛神樹藻歌新同來玉殿霑香醴萬八千年祝大椿二馬甲烏爾泰年七十五嘉㑹聨耆彦天施慶澤豐合尊斟寶露接翼受和風耄耋恒沙紀輿圖福海同聖齡綿萬億元氣酌鴻濛馬甲葉布沖阿年七十五太和凝夀㝢萬象春融融恩覃八埏徧歡普四海同肆筵集耆老典曠儀惟隆鏗鍧播仙樂翕習宣條風飲和兼食德滋液皆元功惟當擬華祝向日攄葵衷馬甲六十一年七十五鳯紀迎韶化日長恒春樹底綺筵張金虀玉膾光華滿天上頒來益夀觴一東瀛西旅萃璘玢同作鸞歌鳯舞人末校久依雕甲侣今隨琛玉入華茵二馬甲額爾琪年七十五兒時曾記啟耆筵中外重看帝澤宣文徳武功昭綴兆東濛西竁入陶甄可封戸盡歌嵩華上瑞人偕並偓佺喜溢皤顔新與宴聖神榮鏡鬯無邊欽定千叟宴詩巻二十八
